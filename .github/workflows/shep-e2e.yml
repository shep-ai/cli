# =============================================================================
# Shep E2E Pipeline
# =============================================================================
# Manually triggered workflow that runs shep on a real repository to create
# a feature end-to-end: from prompt to merged PR.
#
# Uses the shep-ai/sheep repo as the test target.
# =============================================================================

name: Shep E2E

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  shep-e2e:
    name: Shep E2E Feature
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------------
      # 1. Checkout this repo (shep CLI source) and build it
      # ---------------------------------------------------------------------
      - name: Checkout shep CLI
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shep CLI
        run: pnpm run build

      - name: Link shep globally
        run: npm link

      # ---------------------------------------------------------------------
      # 2. Clone the target repo (shep-ai/sheep)
      # ---------------------------------------------------------------------
      - name: Clone target repo
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/shep-ai/sheep.git" /tmp/sheep
          cd /tmp/sheep
          git config user.name "shep-bot"
          git config user.email "bot@shep.ai"

      # ---------------------------------------------------------------------
      # 3. Run shep feat new (fast mode, allow-all, push + PR)
      # ---------------------------------------------------------------------
      - name: Run shep feat new
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          shep feat new "add a hello-world script that prints hello world to the console" \
            --fast \
            --allow-all \
            --pr

      # ---------------------------------------------------------------------
      # 4. Verify PR was created on shep-ai/sheep
      # ---------------------------------------------------------------------
      - name: Verify PR created
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          echo "Checking for open PRs created by shep..."
          PR_URL=$(gh pr list --repo shep-ai/sheep --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "::error::No open PR found on shep-ai/sheep"
            exit 1
          fi
          echo "PR created: $PR_URL"
          echo "PR_URL=$PR_URL" >> $GITHUB_ENV

      # ---------------------------------------------------------------------
      # 5. Merge the PR
      # ---------------------------------------------------------------------
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          echo "Merging PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --delete-branch
          echo "PR merged successfully"

      # ---------------------------------------------------------------------
      # 6. Verify feature is marked as completed in shep
      # ---------------------------------------------------------------------
      - name: Verify feature completed
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          echo "Checking feature status in shep..."
          FEATURE_STATUS=$(shep feat ls --json 2>/dev/null | jq -r '.[0].status // empty')
          if [ "$FEATURE_STATUS" = "completed" ] || [ "$FEATURE_STATUS" = "Completed" ]; then
            echo "Feature is marked as completed"
          else
            echo "::warning::Feature status is '$FEATURE_STATUS' (expected 'completed')"
            echo "Listing all features for debugging:"
            shep feat ls 2>/dev/null || true
          fi
