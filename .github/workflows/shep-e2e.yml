# =============================================================================
# Shep E2E Pipeline
# =============================================================================
# Manually triggered workflow that runs shep on a real repository to create
# a feature end-to-end: from prompt to merged PR.
#
# Uses the shep-ai/sheep repo as the test target.
# =============================================================================

name: Shep E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/shep-e2e.yml'

env:
  NODE_VERSION: '22'

jobs:
  shep-e2e:
    name: Shep E2E Feature
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------------
      # 1. Checkout this repo (shep CLI source) and build it
      # ---------------------------------------------------------------------
      - name: Checkout shep CLI
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shep CLI
        run: pnpm run build

      - name: Link shep globally
        run: npm link

      # ---------------------------------------------------------------------
      # 1b. Install Claude Code CLI (required by shep agent executor)
      # ---------------------------------------------------------------------
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ---------------------------------------------------------------------
      # 2. Clone the target repo (shep-ai/sheep)
      # ---------------------------------------------------------------------
      - name: Clone target repo
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/shep-ai/sheep.git" /tmp/sheep
          cd /tmp/sheep
          git config user.name "shep-bot"
          git config user.email "bot@shep.ai"

      # ---------------------------------------------------------------------
      # 3. Run shep feat new (fast mode, allow-all, push + PR + merge)
      #    Shep handles the full lifecycle: implement → push → PR → merge
      # ---------------------------------------------------------------------
      - name: Run shep feat new
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          shep feat new "add a hello-world script that prints hello world to the console" \
            --fast \
            --allow-all \
            --push \
            --pr \
            --allow-merge

      # ---------------------------------------------------------------------
      # 4. Verify PR was created AND merged by shep on shep-ai/sheep
      # ---------------------------------------------------------------------
      - name: Verify PR merged
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          echo "Checking for merged PRs created by shep..."
          PR_URL=$(gh pr list --repo shep-ai/sheep --state merged --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "::error::No merged PR found on shep-ai/sheep — shep should have merged it"
            echo "Open PRs (should be none):"
            gh pr list --repo shep-ai/sheep --state open
            exit 1
          fi
          echo "PR merged by shep: $PR_URL"
