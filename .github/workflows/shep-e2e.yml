# =============================================================================
# Shep E2E Pipeline
# =============================================================================
# Manually triggered workflow that runs shep on a real repository to create
# a feature end-to-end: from prompt to merged PR.
#
# Uses the shep-ai/sheep repo as the test target.
# Tests shep's own CLI commands: feat new, feat ls, feat show.
# =============================================================================

name: Shep E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/shep-e2e.yml'

env:
  NODE_VERSION: '22'

jobs:
  shep-e2e:
    name: Shep E2E Feature
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------------
      # 1. Checkout this repo (shep CLI source) and build it
      # ---------------------------------------------------------------------
      - name: Checkout shep CLI
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shep CLI
        run: pnpm run build

      - name: Link shep globally
        run: npm link

      # ---------------------------------------------------------------------
      # 2. Install Claude Code CLI (required by shep agent executor)
      # ---------------------------------------------------------------------
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ---------------------------------------------------------------------
      # 3. Clone the target repo (shep-ai/sheep)
      # ---------------------------------------------------------------------
      - name: Clone target repo
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/shep-ai/sheep.git" /tmp/sheep
          cd /tmp/sheep
          git config user.name "shep-bot"
          git config user.email "bot@shep.ai"

      # ---------------------------------------------------------------------
      # 4. Create feature with shep (returns immediately, agent runs in bg)
      # ---------------------------------------------------------------------
      - name: Create feature
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          shep feat new "add a hello-world script that prints hello world to the console" \
            --fast \
            --allow-all \
            --push \
            --pr \
            --allow-merge

      # ---------------------------------------------------------------------
      # 5. List features — verify the feature appears
      # ---------------------------------------------------------------------
      - name: Verify feature listed
        working-directory: /tmp/sheep
        run: |
          echo "=== shep feat ls ==="
          shep feat ls

      # ---------------------------------------------------------------------
      # 6. Poll feature status until terminal (completed/failed/crashed)
      # ---------------------------------------------------------------------
      - name: Wait for feature to complete
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: /tmp/sheep
        run: |
          # Get feature ID from shep feat ls output (first 8-char hex ID)
          FEATURE_ID=$(shep feat ls 2>/dev/null | grep -oP '[0-9a-f]{8}' | head -1)
          if [ -z "$FEATURE_ID" ]; then
            echo "::error::Could not find feature ID from shep feat ls"
            exit 1
          fi
          echo "Feature ID: $FEATURE_ID"

          MAX_WAIT=600  # 10 minutes
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            echo ""
            echo "=== Checking status (${ELAPSED}s elapsed) ==="
            shep feat show "$FEATURE_ID" 2>&1 || true

            # Check for terminal states in feat show output
            STATUS_OUTPUT=$(shep feat show "$FEATURE_ID" 2>&1 || true)

            if echo "$STATUS_OUTPUT" | grep -qi "completed"; then
              echo ""
              echo "Feature completed!"
              echo "FEATURE_ID=$FEATURE_ID" >> $GITHUB_ENV
              exit 0
            fi

            if echo "$STATUS_OUTPUT" | grep -qi "failed\|crashed\|interrupted"; then
              echo ""
              echo "::error::Feature reached terminal error state"
              echo "$STATUS_OUTPUT"
              exit 1
            fi

            echo "Still running, waiting ${INTERVAL}s..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Feature did not complete within ${MAX_WAIT}s"
          shep feat show "$FEATURE_ID" 2>&1 || true
          exit 1

      # ---------------------------------------------------------------------
      # 7. Show final feature details — PR info must come from here
      # ---------------------------------------------------------------------
      - name: Show completed feature
        working-directory: /tmp/sheep
        run: |
          echo "=== Final feature details ==="
          shep feat show "$FEATURE_ID"

      # ---------------------------------------------------------------------
      # 8. Verify PR was merged BY SHEP (not by us)
      # ---------------------------------------------------------------------
      - name: Verify PR merged by shep
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          echo "Checking shep-ai/sheep for merged PRs..."
          MERGED=$(gh pr list --repo shep-ai/sheep --state merged --limit 1 --json url,mergedAt --jq '.[0].url')
          if [ -z "$MERGED" ]; then
            echo "::error::No merged PR found — shep must create AND merge the PR"
            gh pr list --repo shep-ai/sheep --state open
            exit 1
          fi
          echo "PR merged by shep: $MERGED"
