$schema: https://json-schema.org/draft/2020-12/schema
$id: WorkflowConfig.yaml
type: object
properties:
  openPrOnImplementationComplete:
    type: boolean
    default: false
    description: "Create PR on implementation complete (default: false)"
  approvalGateDefaults:
    $ref: ApprovalGateDefaults.yaml
    description: Default approval gate preferences for new features
  ciWatchEnabled:
    type: boolean
    default: true
    description: "Enable CI watch/fix loop after push (default: true)"
  ciMaxFixAttempts:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: "Maximum number of CI fix/push/watch iterations before giving up (default: 3)"
  ciWatchTimeoutMs:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: "Timeout in milliseconds for watching a CI run (default: 600000 = 10 minutes)"
  ciLogMaxChars:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: "Maximum characters of CI failure logs to pass to the executor (default: 50000)"
  ciWatchPollIntervalSeconds:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: "Poll interval in seconds for gh run watch (default: 30)"
  stageTimeouts:
    $ref: StageTimeouts.yaml
    description: "Per-stage timeout overrides for the feature agent (default: 600000 = 10 minutes per stage)"
  analyzeRepoTimeouts:
    $ref: AnalyzeRepoTimeouts.yaml
    description: "Timeout overrides for the analyze-repository agent (default: 600000 = 10 minutes)"
  enableEvidence:
    type: boolean
    default: false
    description: "Enable evidence collection after implementation (default: false)"
  commitEvidence:
    type: boolean
    default: false
    description: "Commit evidence to PR (default: false, requires enableEvidence)"
  evidenceRetries:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: "Maximum number of evidence collection retry attempts when validation fails (default: 3)"
  hideCiStatus:
    type: boolean
    description: "Hide CI status badges from UI (default: true)"
required:
  - openPrOnImplementationComplete
  - approvalGateDefaults
  - ciWatchEnabled
  - enableEvidence
  - commitEvidence
description: Global workflow configuration defaults
