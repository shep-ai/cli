$schema: https://json-schema.org/draft/2020-12/schema
$id: EnvironmentConfig.yaml
type: object
properties:
  defaultEditor:
    $ref: EditorType.yaml
    default: vscode
    description: Preferred code editor
  shellPreference:
    type: string
    default: bash
    description: Preferred shell
  terminalPreference:
    $ref: TerminalType.yaml
    default: system
    description: Preferred terminal emulator
  defaultCloneDirectory:
    type: string
    description: Default directory for cloning GitHub repositories (e.g. ~/repos)
required:
  - defaultEditor
  - shellPreference
  - terminalPreference
description: Environment and tooling preferences
