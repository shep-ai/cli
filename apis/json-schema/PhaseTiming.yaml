$schema: https://json-schema.org/draft/2020-12/schema
$id: PhaseTiming.yaml
type: object
properties:
  agentRunId:
    type: string
    description: Agent run this timing belongs to
  phase:
    type: string
    description: "Graph node name: analyze, requirements, research, plan, implement"
  startedAt:
    type: string
    format: date-time
    description: When the phase started executing
  completedAt:
    type: string
    format: date-time
    description: When the phase finished executing (null if still running)
  durationMs:
    type: string
    description: Duration in milliseconds (computed on completion)
  waitingApprovalAt:
    type: string
    format: date-time
    description: When the phase started waiting for user approval (null if no approval needed)
  approvalWaitMs:
    type: string
    description: Duration in milliseconds the phase waited for user approval (null if no approval needed)
  prompt:
    type: string
    description: The composed prompt sent to the agent for this phase
  modelId:
    type: string
    description: Model identifier used for this phase execution
  agentType:
    type: string
    description: "Agent executor type: claude-code, cursor, gemini-cli"
  inputTokens:
    type: string
    description: Number of input tokens consumed (prompt + context)
  outputTokens:
    type: string
    description: Number of output tokens generated by the agent
  cacheCreationInputTokens:
    type: string
    description: Tokens used to populate the prompt cache (cache misses)
  cacheReadInputTokens:
    type: string
    description: Tokens served from the prompt cache (cache hits)
  costUsd:
    type: number
    description: Estimated cost in USD for this phase execution
  numTurns:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: Number of agentic turns (tool-call round-trips) in this phase
  durationApiMs:
    type: string
    description: Time spent waiting for the API (excludes tool execution)
  exitCode:
    type: string
    description: "Execution outcome: success, error, timeout, interrupted"
  errorMessage:
    type: string
    description: Error details when exitCode is not success
required:
  - agentRunId
  - phase
  - startedAt
allOf:
  - $ref: BaseEntity.yaml
description: Execution record for a single agent graph node. Tracks timing, prompt, token usage, and outcome.
