$schema: https://json-schema.org/draft/2020-12/schema
$id: FeatureFlags.yaml
type: object
properties:
  skills:
    type: boolean
    default: false
    description: Enable Skills navigation and functionality in the web UI
  envDeploy:
    type: boolean
    default: true
    description: Enable environment deployment features in the web UI
  debug:
    type: boolean
    default: false
    description: Enable debug UI elements and verbose client-side logging
  githubImport:
    type: boolean
    default: true
    description: Enable GitHub repository import in the web UI
  adoptBranch:
    type: boolean
    default: false
    description: Enable adopt branch feature to import existing branches as tracked features
  reactFileManager:
    type: boolean
    default: false
    description: Use the built-in React file manager instead of the native OS folder picker
required:
  - skills
  - envDeploy
  - debug
  - githubImport
  - adoptBranch
  - reactFileManager
description: Feature flag toggles for runtime feature control
