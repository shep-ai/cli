$schema: https://json-schema.org/draft/2020-12/schema
$id: Repository.yaml
type: object
properties:
  name:
    type: string
    description: Human-readable name for the repository (typically the directory name)
  path:
    type: string
    description: Absolute file system path to the repository root (unique)
  remoteUrl:
    type: string
    description: "Remote GitHub URL this repository was cloned from (normalized: lowercase, no .git suffix)"
  isFork:
    type: boolean
    description: Whether this repository is a fork created by shep for contributing to a repo the user lacks push access to
  upstreamUrl:
    type: string
    description: "Original upstream repository URL when isFork is true (normalized: lowercase, no .git suffix)"
required:
  - name
  - path
allOf:
  - $ref: SoftDeletableEntity.yaml
description: A code repository tracked by the Shep platform
