# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The evidence gallery in the merge review component renders items with keys derived
  from `${type}-${relativePath}`. When the evidence manifest contains duplicate entries
  (same type and same file path), React produces a warning about non-unique keys.

  ## Success Criteria

  - [x] Evidence entries are deduplicated at the data layer before reaching the UI
  - [x] Gallery keys include array index to guarantee uniqueness
  - [x] No React duplicate key warnings in production

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | get-merge-review-data server action | Low | Added deduplication filter |
  | merge-review component | Low | Key now includes index |

  ## Dependencies

  None identified.

  ## Size Estimate

  **S** - Simple fix in two files

