  ## Codebase Analysis

  ### Project Structure

  The project is a monorepo managed by pnpm workspaces:

  - `packages/core/src/` — Core business logic (Clean Architecture layers)
    - `domain/` — Domain entities, value objects, generated TypeSpec models
    - `application/` — Use cases, output port interfaces, services
    - `infrastructure/` — DI container, persistence, repositories, external services
  - `src/presentation/` — User-facing layers
    - `cli/` — Commander.js CLI with commands for agents, features, sessions, settings
    - `tui/` — Terminal UI
    - `web/` — Next.js web application
  - `tsp/` — TypeSpec definitions (domain models, agents, deployment, UI)
  - `tests/` — Unit, integration, e2e, and manual tests
  - `specs/` — Feature specifications (YAML source of truth)
  - `docs/` — Architecture, development, and API documentation
  - `scripts/` — Build and validation scripts
  - `apis/` — API definitions

  ### Architecture Patterns

  **Clean Architecture** with four layers (dependencies point inward):

  1. **Domain** — Pure business entities and value objects. Models generated from
     TypeSpec via `@typespec-tools/emitter-typescript`. No external dependencies.
  2. **Application** — Use cases organized by feature area (agents, features, IDE,
     repositories, settings, tools, upgrade). Output ports define interfaces.
  3. **Infrastructure** — Concrete implementations: SQLite persistence via
     better-sqlite3, agent services via LangChain/LangGraph, git integration,
     filesystem services, DI container via tsyringe.
  4. **Presentation** — CLI (Commander.js), TUI, and Web (Next.js/React).

  **Key patterns:**
  - TypeSpec-first domain modeling (`tsp/` → generated `output.ts`)
  - Dependency injection via tsyringe (`container.ts`)
  - Agent resolution through `IAgentExecutorProvider` (no hardcoded agent types)
  - Repository pattern for data access
  - Spec-driven development workflow

