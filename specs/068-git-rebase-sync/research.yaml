# Markdown content (the full research document)
content: |
  ## Status

  - **Phase:** Research
  - **Updated:** 2026-03-16

  ## Executive Summary

  This feature adds two git operations to the platform: rebase-on-main with
  agent-powered conflict resolution, and sync-main for keeping the local main
  branch current. The implementation follows established codebase patterns
  throughout — extending IGitPrService for git operations, using
  IAgentExecutorProvider for agent invocation, creating application use cases
  with tsyringe DI, and wiring CLI commands and web server actions.

  No new external libraries are required. All git operations use the existing
  ExecFunction injection pattern, and agent invocation uses the existing
  IAgentExecutorProvider chain.

  ## Technology Decisions

  ### 1. Conflict Resolution Architecture

  **Decision:** Create a dedicated `ConflictResolutionService` rather than
  inlining resolution logic in the use case.

  **Rationale:** The conflict resolution loop involves prompt building, agent
  invocation, file validation, staging, and retry logic. This is a complex
  responsibility that deserves its own service, following the pattern where
  `CiWatchFixLoop` is separate from the merge use case. The service is
  injectable via tsyringe with `IAgentExecutorProvider` and `IGitPrService`
  as dependencies, enabling focused unit testing with mocked agents.

  ### 2. Agent Invocation Pattern

  **Decision:** Follow the CI watch/fix loop pattern using
  `IAgentExecutorProvider` to resolve the agent executor at runtime.

  **Rationale:** This is mandatory per codebase rules — no hardcoded agent
  types. The provider resolves from user settings, supporting all configured
  agent types (Claude Code, Cursor, Gemini CLI, etc.). The `retryExecute`
  helper provides logging and error handling. The iterative loop maps
  directly: invoke agent → validate markers → stage and continue or retry.

  ### 3. Git Operations Layer

  **Decision:** Extend `GitPrService` (the existing `IGitPrService`
  implementation) with new methods rather than creating a new service.

  **Rationale:** GitPrService is the established home for all git operations.
  It already has `ExecFunction` injection, `parseGitError`, and methods like
  `localMergeSquash` that handle similar workflows. New methods (`syncMain`,
  `rebaseOnMain`, `getConflictedFiles`, `stageFiles`, `rebaseContinue`,
  `rebaseAbort`) are natural extensions. The interface is additive — no
  breaking changes to existing consumers.

  ### 4. Error Handling Strategy

  **Decision:** Add `REBASE_CONFLICT` and `SYNC_FAILED` to `GitPrErrorCode`.

  **Rationale:** Different failure modes need different recovery guidance.
  Rebase conflicts require `git rebase --abort` while merge conflicts require
  `git merge --abort`. The existing enum is designed for extensibility.
  `parseGitError` extends naturally with pattern matching for rebase-specific
  stderr messages.

  ### 5. Sync Main Strategy

  **Decision:** Branch-aware sync — `git fetch origin main:main` from feature
  branches, `git pull --ff-only` when on main.

  **Rationale:** `git fetch origin main:main` fails when the main branch is
  checked out. Detecting the current branch via `git rev-parse --abbrev-ref
  HEAD` is a minimal check that handles all scenarios. The `--ff-only` flag
  prevents accidental divergence.

  ### 6. Prompt Design

  **Decision:** Pure function prompt builder following merge-prompts.ts pattern.

  **Rationale:** The codebase uses pure functions that return markdown strings
  for agent prompts. `buildConflictResolutionPrompt` takes parameters
  (conflicted files with contents, branch context, attempt number, previous
  feedback) and returns a focused prompt. This is testable, consistent with
  existing patterns, and works with all agent types.

  ### 7. Worktree Support

  **Decision:** Support both worktree-based and standard feature branches.

  **Rationale:** Features may or may not have worktrees. The use case checks
  `IWorktreeService.exists()` to resolve the correct working directory,
  falling back to the repository root. This matches how other use cases
  handle path resolution.

  ### 8. Retry Strategy

  **Decision:** Up to 3 agent attempts per conflicted commit with feedback.

  **Rationale:** Matches the CI watch/fix loop's iterative retry pattern.
  Each retry includes feedback about remaining markers. The abort fallback
  ensures clean recovery. Cost is bounded by NFR-9.

  ## Codebase Pattern Analysis

  ### ExecFunction Pattern (Git Operations)
  All git commands run through the injected `ExecFunction` which is
  platform-aware (Windows gets `shell: true`). Error handling uses
  try-catch with `parseGitError` to classify stderr patterns into
  `GitPrErrorCode` values. Methods follow the signature pattern:
  `method(cwd: string, ...params): Promise<Result>`.

  ### Agent Orchestration (CI Watch/Fix Loop)
  The `CiWatchFixLoop` pattern provides the template:
  1. Detect failure state
  2. Invoke agent via `IAgentExecutorProvider.getExecutor()`
  3. Agent resolves the issue
  4. Validate the fix
  5. Retry or continue based on validation result
  6. Track attempts with max retry limit
  7. On exhaustion, clean up and report failure

  This maps directly to conflict resolution:
  1. Detect conflict markers
  2. Invoke agent with resolution prompt
  3. Agent edits conflicted files
  4. Validate no remaining markers
  5. Stage and continue rebase, or retry
  6. After max retries, abort rebase and report

  ### Use Case Structure
  Use cases are `@injectable()` classes with `@inject('Token')` constructor
  injection. They have a single `execute()` method that: resolves entities
  by ID/prefix, validates preconditions, performs operations via injected
  services, and returns typed results. Registration in the DI container
  uses `registerSingleton` for class + `useFactory` alias for string tokens.

  ### CLI Command Pattern
  Commands use a factory function (`createXxxCommand()`) returning a
  `Command` instance. Actions resolve use cases from the DI container,
  use `spinner()` for progress indication, and `messages.success/error()`
  for output. Error handling sets `process.exitCode = 1`.

  ### Web Server Action Pattern
  Actions use `'use server'` directive, resolve from the server container
  via string tokens, perform validation, and return discriminated unions
  like `{ success: true }` or `{ success: false, error: string }`.

  ## Risk Assessment

  | Risk | Likelihood | Impact | Mitigation |
  | ---- | ---------- | ------ | ---------- |
  | Agent fails to resolve conflicts | Medium | Medium | 3-retry limit + abort fallback; worktree always restored |
  | Mid-rebase dirty state on error | Low | High | Every error path calls rebaseAbort; catch block ensures cleanup |
  | Local main diverged from remote | Low | Low | SYNC_FAILED with clear guidance; never force-update |
  | Agent modifies non-conflicted files | Low | Medium | Prompt restricts scope; validation checks only conflicted files |
  | Cross-platform path issues | Low | Medium | All paths via ExecFunction; normalize with replace |

  ## No New Dependencies

  This feature requires zero new external libraries:
  - Git operations: Existing `ExecFunction` (promisified `execFile`)
  - Agent invocation: Existing `IAgentExecutorProvider`
  - DI: Existing `tsyringe`
  - CLI: Existing `Commander.js`
  - Web: Existing Next.js server actions
  - Testing: Existing `Vitest`

