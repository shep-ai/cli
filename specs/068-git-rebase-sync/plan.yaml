name: git-rebase-sync
summary: >
  Implement git rebase-on-main with agent-powered conflict resolution and
  sync-main across all four architecture layers. Extends IGitPrService with
  rebaseOnMain and syncMain methods, adds two application use cases with DI
  registration, a conflict resolution agent loop, CLI commands for feat rebase
  and repo sync, and web server actions. Follows existing patterns throughout
  (ExecFunction injection, GitPrError codes, spinner CLI, discriminated union
  web returns, IAgentExecutorProvider for agent invocation).

