content: |
  ## Summary

  The implementation is structured in 5 phases with 21 tasks totaling approximately
  9.5 hours of work.

  Phase 1 (Foundation) establishes the type-level contracts: new error codes and interface
  method signatures. This is the smallest phase but unlocks all subsequent work since every
  layer depends on these types.

  Phase 2 (Git Service) implements the core git operations on GitPrService: syncMain with
  branch-aware fetch/pull, rebaseOnMain with dirty-worktree guard and conflict detection,
  plus helper methods (getConflictedFiles, stageFiles, rebaseContinue, rebaseAbort) that the
  conflict resolution service needs. It also extends parseGitError for the new error codes.

  Phase 3 (Application) is the heaviest phase, building the conflict resolution prompt,
  the ConflictResolutionService with its iterative agent → validate → continue loop, both
  use cases (SyncRepositoryMainUseCase and RebaseFeatureOnMainUseCase), and DI registrations.
  The rebase use case orchestrates the full flow: resolve feature → determine cwd → auto-sync
  main → rebase → handle conflicts via agent.

  Phase 4 (Presentation) wires up CLI commands and web actions. The CLI commands follow the
  existing spinner + messages pattern. The web actions follow the discriminated union return
  pattern. Both are thin presentation layers that delegate entirely to use cases.

  Phase 5 (Integration & Verification) adds integration tests against real temporary git
  repos for sync and rebase operations, then runs the full test suite to verify zero
  regressions. Integration tests exercise actual git commands rather than mocks, providing
