# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The web UI displays a stale version number because `NEXT_PUBLIC_*` env
  vars are inlined at Next.js build time. When the CLI upgrades, the UI
  still shows the old version from the build.

  ## Solution

  Add `export const dynamic = 'force-dynamic'` to the `/api/version`
  route so Next.js reads env vars at request time on the server.

  ## Success Criteria

  - [x] `/api/version` returns current runtime version
  - [x] Version page shows correct version
  - [x] Unit tests pass for the version API route

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | Web API | Low | Single route change to force dynamic rendering |

  ## Dependencies

  None identified.

  ## Size Estimate

  **S** - Single-line fix with test update
