content: >
  ## Problem Statement


  The repository drawer tab was empty even though the repository node exposes

  rich git data (branch, commit message, committer name, behind count).

  This feature surfaces that data in a clean, sectioned UI.


  ## Success Criteria


  - [x] Git status section shows branch badge, behind count badge, commit
  message, committer name, and relative timestamp

  - [x] Open With section provides IDE, shell, and folder actions

  - [x] Metadata section displays repository path

  - [x] Storybook stories cover default, with-git-info, and on-default-branch
  scenarios

  - [x] Unit tests cover all sections (20 tests passing)


  ## Affected Areas


  | Area | Impact | Reasoning |

  | ---- | ------ | --------- |

  | repository-drawer.tsx | High | Complete redesign of drawer body |

  | repository-drawer-client.tsx | Medium | Enriched data wiring |

  | repository-drawer.stories.tsx | Medium | New stories for all states |


  ## Dependencies


  None identified.


  ## Size Estimate


  **M** - Single component redesign with stories and tests


