summary: >
  The interactive feature agent (spec 074, iteration 1) was built with manual child_process.spawn(),
  readline stdout parsing, and hand-rolled JSON-line protocol handling. The official
  @anthropic-ai/claude-agent-sdk (v0.2.81) wraps all of this — process management, typed message
  streaming, session persistence, and resumption — behind a clean TypeScript API. This iteration
  replaces the manual CLI wrapper with the SDK's V2 session API (createSession/resumeSession/send/stream),
  deletes ~500 lines of process management code, and preserves the existing UI, SSE streaming,
  SQLite persistence, and idle timeout behavior. A PoC commit (5ab568c4) has already proven
  persistent sessions work with the SDK.

