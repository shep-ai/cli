name: "interactive-feature-agent"
number: 74
branch: "feat/074-interactive-feature-agent"
oneLiner: "Add an interactive chat tab to feature detail pages, backed by a persistent per-feature agent process with full worktree context and configurable auto-timeout."
userQuery: "I want to support interactive mode on features in our UI. We need a new tab which is like classic gtp chatbox with our prompt controls and nice agent/user messages. To support interactive agent, i want to spawn agent instance once, and then use interactive I/O on top of same process. For each feature we need a new tab (feature in ANY phase, even completed). Each feature tab will be correlated 1-1 to db record which tracks the spawned agent, for first time when user clicks on the tab - he will need to click Start interactive agent button which will boot the agent (should take about 8-10s), once ready, it will say something like Hey, how can i help. After setup user can interact with the agent, the agent spawner with worktree as cwd, and it should receive full context of feature its opened in (in consice format). Chat also can be turned off, and has auto-turnoff option with 15m default, all configurable on Settings page! The agent will be able to perform all operation including git/gh etc.\n"
summary: "Each feature detail page gains a new \"Chat\" tab exposing a classic GPT-style chat interface backed by a single, long-lived agent process per feature (spawned on demand, CWD set to the feature worktree). The agent is bootstrapped with concise feature context, persists across messages in the same OS process, and is automatically torn down after a configurable idle timeout (default 15 min) managed via the global Settings page. Messages are persisted to SQLite and delivered to the browser via the existing SSE infrastructure.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures: []
