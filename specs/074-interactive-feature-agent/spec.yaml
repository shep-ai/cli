summary: >
  Iteration 2 of the interactive feature agent. Three architectural corrections:
  (1) Add use cases as the boundary between presentation and application layers —
  API routes must call use cases, never services directly.
  (2) Integrate SDK via the existing IAgentExecutor/IAgentExecutorFactory pattern —
  create IInteractiveAgentExecutor interface and ClaudeCodeInteractiveExecutor, not a
  standalone adapter. Each agent type encapsulates its own interactive logic.
  (3) Thread agent type and model selection from the UI through API → use case →
  service → executor. The chat UI's agent/model picker must be honored.
  Replace ~500 lines of manual CLI process management with the SDK's V2 session API,
  all contained within the ClaudeCodeInteractiveExecutor.

