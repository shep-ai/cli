openQuestions:
  - question: "How should interactive session support integrate with the existing IAgentExecutor pattern?"
    resolved: true
    options:
      - option: "Add optional methods to IAgentExecutor"
        description: >
          Add createInteractiveSession() and resumeInteractiveSession() as optional
          methods on IAgentExecutor. Check support via supportsFeature(). Pollutes
          the executor interface with optional methods.
        selected: false
      - option: "Create separate IInteractiveAgentExecutor interface"
        description: >
          New interface alongside IAgentExecutor. Add createInteractiveExecutor()
          to IAgentExecutorFactory. Each agent type registers its own interactive
          executor implementation. Clean separation — executors that don't support
          interactive mode simply don't register one.
        selected: true
    selectionRationale: >
      Separate interface keeps IAgentExecutor clean. The factory already handles
      agent type resolution — adding createInteractiveExecutor() follows the same
      pattern. Each agent type encapsulates its own interactive logic (Claude uses
      SDK, others can use their own approaches).
    answer: "Separate IInteractiveAgentExecutor interface + factory method"
  - question: "Should API routes call services directly or through use cases?"
    resolved: true
    options:
      - option: "Call services directly (current approach)"
        description: >
          API routes resolve IInteractiveSessionService via DI and call methods
          directly. Simpler, fewer files. But violates the established codebase
          pattern where ALL API routes go through use cases.
        selected: false
      - option: "Use cases as mandatory boundary"
        description: >
          Create use case classes (StartInteractiveSessionUseCase, etc.) following
          the existing @injectable() + @inject() tsyringe pattern. API routes resolve
          use cases, never services. Consistent with every other API route.
        selected: true
    selectionRationale: >
      Every API route in the codebase uses resolve<UseCase>('UseCaseName'). The
      interactive session routes are the only ones that skip this boundary. This
      is a Clean Architecture violation that must be corrected.
    answer: "Use cases as mandatory boundary"
content: |
  ## Problem Statement

  Iteration 1 of the interactive feature agent has three architecture violations:
  1. API routes call IInteractiveSessionService directly, bypassing the use case boundary
     that every other route respects.
  2. The interactive agent logic is contained in a standalone adapter (ClaudeAgentSdkAdapter)
     instead of following the IAgentExecutor/IAgentExecutorFactory pattern used by all other
     agent operations. This creates a parallel resolution path that duplicates agent-type handling.
  3. The chat UI's agent/model selector is not threaded through the API → service → executor
     chain. The model is hardcoded in the adapter.

  Additionally, the manual CLI wrapper (child_process.spawn + readline + JSON parsing) should
  be replaced with the official @anthropic-ai/claude-agent-sdk, but encapsulated WITHIN the
  ClaudeCode executor, not in a separate adapter.

  ## Success Criteria

  - [ ] IInteractiveAgentExecutor interface defined with InteractiveAgentSessionHandle
  - [ ] IAgentExecutorFactory extended with createInteractiveExecutor() method
  - [ ] ClaudeCodeInteractiveExecutor implements IInteractiveAgentExecutor using SDK
  - [ ] All SDK message parsing happens inside the executor (not in the session service)
  - [ ] Use cases created: StartInteractiveSession, SendInteractiveMessage, StopInteractiveSession, GetInteractiveChatState
  - [ ] API routes use resolve<UseCase>() pattern (never resolve services directly)
  - [ ] agentType and model parameters threaded from UI → API → use case → service → executor
  - [ ] Session service uses IInteractiveAgentExecutor instead of IInteractiveAgentProcessFactory
  - [ ] Manual process management code (spawn, readline, JSON parsing, SIGTERM) removed
  - [ ] InteractiveAgentProcessFactory and its interface deleted
  - [ ] Incorrect ClaudeAgentSdkAdapter and IInteractiveAgentAdapter deleted
  - [ ] All existing tests pass (updated for new architecture)
  - [ ] React UI components unchanged (API contract preserved)

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | application/ports/output/agents/ | High | New IInteractiveAgentExecutor interface; extend IAgentExecutorFactory |
  | application/use-cases/interactive/ | High | New use case classes (4) |
  | infrastructure/services/agents/common/executors/ | High | ClaudeCodeInteractiveExecutor using SDK |
  | infrastructure/services/agents/common/agent-executor-factory.service.ts | Medium | Add createInteractiveExecutor() |
  | infrastructure/services/interactive/interactive-session.service.ts | High | Refactor to use executor instead of process factory |
  | infrastructure/services/interactive/feature-context.builder.ts | Low | Simplify for SDK systemPrompt |
  | infrastructure/di/container.ts | Medium | Register use cases, update executor factory |
  | presentation/web/app/api/interactive/ | Medium | Routes use resolve<UseCase>() |
  | infrastructure/services/interactive/interactive-agent-process.factory.ts | Delete | Replaced by executor |
  | infrastructure/services/interactive/claude-agent-sdk.adapter.ts | Delete | Wrong pattern — replaced by executor |
  | application/ports/output/agents/interactive-agent-process-factory.interface.ts | Delete | Replaced by executor interface |
  | application/ports/output/agents/interactive-agent-adapter.interface.ts | Delete | Wrong pattern — replaced by executor interface |

  ## Size Estimate

  **M (3-5 days)** — Focused refactoring across application and infrastructure layers.
  Presentation layer and persistence layer are mostly unchanged.

