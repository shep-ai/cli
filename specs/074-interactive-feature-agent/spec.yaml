openQuestions:
  - question: "Should we use the stable V1 query() API or the unstable V2 session API?"
    resolved: true
    options:
      - option: "V1 query() — stable, async generator based"
        description: >
          The V1 API uses query({ prompt }) returning an AsyncGenerator<SDKMessage>.
          Multi-turn requires passing an AsyncIterable<SDKUserMessage> as prompt and
          coordinating when to yield the next message after receiving a result. More
          complex coordination logic but stable API surface.
        selected: false
      - option: "V2 unstable_v2_createSession() — simpler session-based API"
        description: >
          The V2 API provides createSession()/resumeSession() returning an SDKSession
          with send(message) and stream() methods. Much simpler for multi-turn interactive
          use: send a message, iterate the stream, repeat. Marked as unstable/alpha but
          maps perfectly to our interactive session model.
        selected: true
    selectionRationale: >
      V2's send()/stream() model maps directly to our InteractiveSessionService's
      sendMessage/subscribe pattern. The V1 async generator coordination for multi-turn
      adds unnecessary complexity. The PoC (commit 5ab568c4) already validated V2 works.
      The "unstable" label means the API may change between SDK versions, but we pin our
      dependency version and can adapt on upgrade.
    answer: "V2 unstable_v2_createSession() — simpler session-based API"
  - question: "Should we keep IAgentExecutorProvider for interactive mode or use SDK directly?"
    resolved: true
    options:
      - option: "Keep IAgentExecutorProvider abstraction"
        description: >
          Continue resolving agent type through IAgentExecutorProvider, then conditionally
          use the SDK when Claude Code is selected. Maintains architectural consistency
          with non-interactive agent execution. However, the SDK only supports Claude Code
          (it bundles the CLI), making the abstraction hollow for interactive mode.
        selected: false
      - option: "Replace with SDK-specific adapter for interactive mode"
        description: >
          Create a thin IInteractiveAgentAdapter interface that wraps the SDK directly.
          Interactive mode is Claude-Code-only (the SDK bundles it). Non-interactive
          agent execution continues to use IAgentExecutorProvider for multi-agent support.
          Cleaner separation of concerns.
        selected: true
    selectionRationale: >
      The SDK is inherently Claude-Code-specific (it embeds the CLI binary). Routing
      through IAgentExecutorProvider for interactive mode adds an unnecessary abstraction
      layer that can never resolve to anything else. A dedicated IInteractiveAgentAdapter
      is honest about this constraint while keeping the interface mockable for tests.
      Non-interactive agent execution retains IAgentExecutorProvider for Cursor/Gemini support.
    answer: "Replace with SDK-specific adapter for interactive mode"
  - question: "Should we use the SDK's built-in session persistence or keep our SQLite tables?"
    resolved: true
    options:
      - option: "SDK persistence only — remove our SQLite tables"
        description: >
          The SDK persists sessions to disk and provides listSessions(), getSessionMessages()
          APIs. Could eliminate our interactive_sessions and interactive_messages tables.
          However, the SDK stores data in Claude Code's internal format, not queryable
          by our UI without going through the SDK API for every read.
        selected: false
      - option: "Dual persistence — SDK for agent context, SQLite for UI queries"
        description: >
          Keep our SQLite tables for fast UI queries (message history, session status,
          feature scoping). The SDK handles its own persistence for agent context
          resumption. Our tables serve a different purpose: UI state, feature scoping,
          and cross-session message history that the SDK doesn't provide.
        selected: true
    selectionRationale: >
      Our SQLite tables serve the UI layer — fast queries for message lists, feature-scoped
      history, session status. The SDK's persistence serves the agent's context window.
      These are complementary, not redundant. Removing our tables would couple the UI
      to the SDK's internal storage format and require SDK API calls for every page load.
    answer: "Dual persistence — SDK for agent context, SQLite for UI queries"
content: |
  ## Problem Statement

  The interactive feature agent (iteration 1) manually spawns the Claude CLI via child_process.spawn(),
  parses JSON-line stdout with readline, manages process lifecycle (SIGTERM, stdin writes, process
  monitoring), and handles session resumption via --resume flags. This is ~500 lines of hand-rolled
  process management code that duplicates what the official @anthropic-ai/claude-agent-sdk provides
  out of the box with a clean, typed TypeScript API.

  The SDK (v0.2.81) wraps the Claude CLI internally, handles all IPC protocol complexity, provides
  typed SDKMessage streams, and offers session create/resume/send/stream primitives. A PoC commit
  (5ab568c4) has already proven persistent sessions work with the V2 API.

  ## Success Criteria

  - [ ] @anthropic-ai/claude-agent-sdk is installed as a dependency
  - [ ] InteractiveSessionService uses SDK V2 createSession()/resumeSession() instead of child_process.spawn()
  - [ ] Message sending uses session.send() instead of stdin.write()
  - [ ] Response streaming uses session.stream() async generator instead of readline JSON parsing
  - [ ] InteractiveAgentProcessFactory is replaced with a thin SDK adapter
  - [ ] All manual CLI flag construction (--output-format, --dangerously-skip-permissions, etc.) is removed
  - [ ] All readline-based stdout parsing code is removed
  - [ ] All manual child_process lifecycle management (SIGTERM, spawn, stdio pipe) is removed
  - [ ] Feature context injection uses SDK systemPrompt option instead of manual stdin writing
  - [ ] Session resumption uses SDK's resumeSession() instead of manual --resume flag
  - [ ] SDK permissionMode replaces --dangerously-skip-permissions flag
  - [ ] Existing SSE streaming to browser continues to work (source changes, delivery unchanged)
  - [ ] Idle timeout behavior is preserved
  - [ ] Concurrent session cap is preserved
  - [ ] All existing unit tests pass (updated for new implementation)
  - [ ] All existing integration tests pass (SQLite repositories unchanged)
  - [ ] Message history persistence across session restarts is preserved
  - [ ] React UI components require zero changes (API contract unchanged)

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | packages/core/src/infrastructure/services/interactive/interactive-session.service.ts | High | Core refactoring target — replace spawn/readline with SDK session API |
  | packages/core/src/infrastructure/services/interactive/interactive-agent-process.factory.ts | High | Replace with SDK adapter or delete entirely |
  | packages/core/src/application/ports/output/agents/interactive-agent-process-factory.interface.ts | High | Replace IInteractiveAgentProcessFactory with IInteractiveAgentAdapter |
  | packages/core/src/infrastructure/services/interactive/feature-context.builder.ts | Medium | Simplify — context now passed as SDK systemPrompt option |
  | packages/core/src/infrastructure/di/container.ts | Medium | Update DI registrations for new SDK adapter |
  | package.json | Low | Add @anthropic-ai/claude-agent-sdk dependency |
  | tests/unit/infrastructure/services/interactive/ | High | Update all unit tests for SDK-based implementation |
  | src/presentation/web/ | None | API routes and React components unchanged (contract preserved) |
  | packages/core/src/infrastructure/persistence/sqlite/ | None | SQLite tables, mappers, repositories unchanged |

  ## Dependencies

  - **@anthropic-ai/claude-agent-sdk v0.2.81+** — the SDK to adopt
  - **zod@^4** — peer dependency of the SDK
  - **Existing SQLite persistence** — retained for UI queries
  - **Existing SSE infrastructure** — retained, source changes from readline to SDK stream
  - **Existing React components** — unchanged, API contract preserved

  ## Size Estimate

  **M (3-5 days)** — This is a focused refactoring within the infrastructure layer:

  1. Install SDK + create adapter interface (S)
  2. Refactor InteractiveSessionService to use SDK V2 API (L — core work)
  3. Delete InteractiveAgentProcessFactory and manual process management (S)
  4. Update FeatureContextBuilder for SDK systemPrompt format (S)
  5. Update unit tests for new implementation (M)
  6. Cleanup dead code paths and unused imports (S)
  7. Verify all existing tests pass (S)

  The refactoring is contained to the infrastructure layer. No domain, application port,
  presentation, or persistence changes are needed. The API contract between the service
  and the API routes is preserved.

