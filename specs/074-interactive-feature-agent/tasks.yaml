content: |
  ## Summary

  The 29 tasks form a strict dependency chain across 6 phases. The implementation begins with
  TypeSpec model definitions (tasks 1-4) because every other layer imports from the compiled
  output. Once the generated types exist, the database migration and mapper/repository layer
  (tasks 5-9) can be built and TDD-tested in isolation using in-memory SQLite.

  With a stable repository layer, the application ports and service logic (tasks 10-14) are
  layered on top. The InteractiveSessionService (task-14) is the most complex unit: it orchestrates
  process spawning, stdin/stdout IPC, idle timeout management, and concurrent session capping. Its
  TDD cycle uses mock ChildProcess objects so no real agent process is spawned during unit tests.

  API routes and DI wiring (tasks 15-20) are thin adapters that delegate entirely to the service.
  They are implemented once the service contract is stable. The dedicated SSE stream route (task-20)
  is the only route with non-trivial logic (ReadableStream lifecycle, back-pressure handling).

  React components (tasks 21-26) use the assistant-ui library (@assistant-ui/react) instead of
  custom components. Task 21 installs dependencies. Task 22 creates a custom Thread component
  using assistant-ui primitives (ThreadPrimitive, MessagePrimitive, ComposerPrimitive) with
  react-markdown for assistant messages. Task 23 implements the useChatRuntime hook using
  ExternalStoreRuntime with invisible agent management (auto-boot, session restore, SSE streaming,
  polling fallback, StatusMessage pattern). Task 24 creates the minimal ChatTab orchestrator
  (~30 lines). Task 25 creates comprehensive Storybook stories with MockChatProvider. Task 26
  registers the Chat tab in feature-drawer-tabs. This approach eliminates 4 custom components
  (ChatMessageBubble, ChatInput, ChatMessageList, AgentStatusBadge) and their stories, reducing
  UI code by ~70%.

  Settings integration (task-27) and E2E validation (tasks 28-29) close the loop, confirming that
  the feature toggle correctly gates tab visibility and that the full boot-to-stop conversation
  flow works end-to-end against a live Next.js server.
