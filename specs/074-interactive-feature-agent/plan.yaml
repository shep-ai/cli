content: |
  ## Architecture Overview

  ```
  Presentation (routes)
       │ resolve<UseCase>()
  Application (use cases → IInteractiveSessionService → IAgentExecutorFactory)
       │ createInteractiveExecutor()
  Infrastructure (ClaudeCodeInteractiveExecutor → SDK → CLI)
  ```

  ## Implementation Strategy

  **Phase 1 first**: The executor interface and implementation are the foundation.
  Everything else depends on this.

  **Phase 2 after Phase 1**: Use cases need the service interface, which needs the
  executor. But the use case classes themselves are thin and can be created once
  the service interface signature is settled (accept agentType, model).

  **Phase 3 after Phase 2**: The session service refactoring is the core work.
  It replaces the process factory dependency with the executor factory and rewrites
  the message exchange loop.

  **Phase 4 after Phase 3**: Dead code cleanup only after the service no longer
  references the old factory.

  **Phase 5 last**: Tests are updated throughout, but final comprehensive verification
  runs after all code changes are complete.

  ## Key Refactoring: Session Service

  Before:
  ```
  constructor(sessionRepo, messageRepo, processFactory, featureRepo, contextBuilder)
  startSession() → processFactory.spawn() → ChildProcess → readline → JSON.parse
  sendMessage() → executeTurn() → spawnTurnProcess() → stdin.write → stdout parse
  ```

  After:
  ```
  constructor(sessionRepo, messageRepo, executorFactory, featureRepo, contextBuilder)
  startSession(featureId, worktreePath, agentType?, model?) →
    executorFactory.createInteractiveExecutor(agentType) →
    executor.createSession({ cwd, model, systemPrompt }) →
    InteractiveAgentSessionHandle stored in SessionState
  sendMessage() → handle.send(content) → for await (event of handle.stream()) → emit SSE
  stopSession() → handle.close()
  ```

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | SDK V2 unstable API | Pin version; executor isolates SDK surface |
  | New use cases add boilerplate | Thin delegation — 4 files, ~20 lines each |
  | Factory extension breaks existing executors | createInteractiveExecutor() is additive; existing methods unchanged |
  | Model selection breaks existing sessions | Default to settings when omitted; backward compatible |
