content: |
  ## Architecture Overview

  The refactoring is contained entirely within the infrastructure layer. The SDK adapter
  becomes the new boundary between our code and the Claude Code CLI:

  ```
  presentation (API routes, React)     ← UNCHANGED
       ↓
  application (port interfaces)         ← One new interface (IInteractiveAgentAdapter)
       ↓                                  One deleted interface (IInteractiveAgentProcessFactory)
  infrastructure (service, adapter)     ← REFACTORED
       ↓
  @anthropic-ai/claude-agent-sdk       ← NEW (replaces manual child_process.spawn)
       ↓
  Claude Code CLI (bundled in SDK)     ← Same CLI, now managed by SDK
  ```

  **Before (iteration 1):**
  ```
  InteractiveSessionService
    → InteractiveAgentProcessFactory
      → IAgentExecutorProvider.getExecutor()
        → child_process.spawn('claude', [...flags])
          → readline.createInterface(stdout)
            → JSON.parse(line) per stdout line
  ```

  **After (iteration 2):**
  ```
  InteractiveSessionService
    → IInteractiveAgentAdapter
      → ClaudeAgentSdkAdapter
        → unstable_v2_createSession() / unstable_v2_resumeSession()
          → session.send() / session.stream()
  ```

  ---

  ## Implementation Strategy

  **Phase 1 → Phase 2 dependency**: The session service refactoring depends on the adapter
  being available. Phase 1 establishes the adapter interface and implementation.

  **Phase 2 → Phase 3 dependency**: Dead code cleanup must happen after the service is
  refactored — we need to verify the service works with the SDK before deleting the old code.

  **Phase 3 → Phase 4 dependency**: Test updates happen last because we need the final
  code shape to write accurate tests. Some tests will be updated during Phase 2 as part
  of TDD, but Phase 4 handles comprehensive test cleanup.

  ---

  ## Key Refactoring Patterns

  ### Pattern 1: Session Creation

  **Before:**
  ```typescript
  const process = await this.processFactory.spawn(worktreePath);
  const rl = readline.createInterface({ input: process.stdout });
  // Manual boot detection via JSON parsing
  ```

  **After:**
  ```typescript
  const session = await this.adapter.createSession({
    cwd: worktreePath,
    model: settings.model,
    systemPrompt: { type: 'preset', preset: 'claude_code', append: context },
    permissionMode: 'bypassPermissions',
    allowDangerouslySkipPermissions: true,
    includePartialMessages: true,
  });
  // Session is ready when createSession resolves
  ```

  ### Pattern 2: Message Sending

  **Before:**
  ```typescript
  process.stdin.write(JSON.stringify({ type: 'user', content: message }) + '\n');
  ```

  **After:**
  ```typescript
  session.send(message);
  ```

  ### Pattern 3: Response Streaming

  **Before:**
  ```typescript
  rl.on('line', (line) => {
    try {
      const event = JSON.parse(line);
      if (event.type === 'assistant') { /* emit delta */ }
      if (event.type === 'result') { /* emit done */ }
    } catch { /* skip malformed lines */ }
  });
  ```

  **After:**
  ```typescript
  for await (const msg of session.stream()) {
    if (msg.type === 'assistant') { /* emit delta via SSE */ }
    if (msg.type === 'result') { /* emit done via SSE, persist to SQLite */ }
  }
  ```

  ### Pattern 4: Session Termination

  **Before:**
  ```typescript
  process.kill('SIGTERM');
  process.on('exit', () => { /* cleanup */ });
  ```

  **After:**
  ```typescript
  session.close();
  // SDK handles process cleanup
  ```

  ---

  ## Testing Strategy (TDD: Tests FIRST)

  | Layer | What to Test | Approach |
  | ----- | ------------ | -------- |
  | Adapter (new) | createSession/resumeSession map options correctly | Unit test with mocked SDK imports |
  | Session Service (refactored) | send/stream/close lifecycle | Unit test with mocked adapter returning fake SDKSession |
  | Session Service (refactored) | SDK message → SSE event mapping | Unit test: feed typed SDK messages, assert SSE events |
  | Session Service (retained) | Idle timeout resets on activity | Unit test: unchanged logic, new trigger points |
  | Session Service (retained) | Concurrent cap enforcement | Unit test: unchanged logic |
  | Integration | SQLite repositories | Unchanged — no modifications to persistence |
  | E2E | Full chat flow | Existing Playwright test should pass unchanged |

  ---

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | SDK V2 API is marked "unstable" | Pin exact SDK version in package.json; V2 API is functional (PoC validated); upgrade path is contained to adapter |
  | SDK bundles large CLI binary (~50MB) | Already bundled in node_modules; no impact on dev or CI (not shipped to users differently than before) |
  | SDK message types differ from expected | Adapter maps SDK types to our internal types; comprehensive unit tests validate mapping |
  | Session resume behavior differs from manual --resume | PoC commit 5ab568c4 already validated resume works; adapter test covers this path |
  | Existing tests break during refactoring | Refactor in phases: Phase 2 updates service + its tests together; Phase 4 cleans up remaining test issues |
  | zod@^4 conflicts with existing zod@3 | SDK uses zod@^4 as peer dep; check for version conflicts; may need to install zod@4 alongside |
