content: |
  ## Architecture Overview

  The interactive chat feature spans every Clean Architecture layer without violating the
  inward dependency rule. The dependency graph is:

  ```
  presentation (API routes, React components)
       ↓
  application (port interfaces, use cases)
       ↓
  infrastructure (service impl, repositories, process factory)
       ↓
  domain (TypeSpec-generated models, domain errors)
  ```

  **Domain layer** receives two new generated types: `InteractiveSession` and `InteractiveMessage`,
  plus a `ConcurrentSessionLimitError` domain error. These are derived from the TypeSpec models
  compiled via `pnpm tsp:compile`, consistent with every other domain model in the codebase.

  **Application layer** defines four output-port interfaces:
  - `IInteractiveSessionRepository` — CRUD for sessions
  - `IInteractiveMessageRepository` — CRUD for messages
  - `IInteractiveAgentProcessFactory` — spawns a `ChildProcessWithoutNullStreams` via the resolved agent executor
  - `IInteractiveSessionService` — public API consumed by API routes (startSession, stopSession, sendMessage, getMessages)

  **Infrastructure layer** contains the implementations:
  - `SQLiteInteractiveSessionRepository` and `SQLiteInteractiveMessageRepository` — follow the mapper
    pattern established in `sqlite-feature.repository.ts` and `agent-run.repository.ts`
  - `InteractiveAgentProcessFactory` — queries `IAgentExecutorProvider`, spawns the CLI in pipe mode
  - `InteractiveSessionService` — singleton, owns all `NodeJS.Timeout` timers and all live `ChildProcess`
    handles; manages the full session lifecycle
  - `FeatureContextBuilder` — serialises a concise feature summary (~400-600 tokens) as the bootstrap
    system prompt written to stdin before the greeting exchange

  **Presentation layer** has two sub-layers:
  - API routes under `src/presentation/web/app/api/interactive/` — thin request-parsing + DI resolution,
    identical in structure to existing routes like `/api/sessions`
  - React components using assistant-ui library:
    - `src/presentation/web/components/assistant-ui/thread.tsx` — custom Thread with Markdown rendering
    - `src/presentation/web/components/features/chat/useChatRuntime.ts` — ExternalStoreRuntime hook
      with invisible agent management (auto-boot, session restore, SSE, polling)
    - `src/presentation/web/components/features/chat/ChatTab.tsx` — minimal orchestrator (~30 lines)

  ---

  ## Key Design Decisions

  ### IPC Protocol: stdio pipe + readline + stream-json end-of-turn

  The agent CLI is spawned with `stdio: 'pipe'` and `--output-format stream-json`. Each JSON line
  emitted to stdout is forwarded immediately to the per-session SSE stream. A `result` type event
  in the JSON stream signals end-of-turn. This extends the pattern already used by
  `ClaudeCodeExecutor` — no new protocol work, no new dependencies (just `node:readline`).

  ### Two-Channel SSE Design

  Coarse session lifecycle events (`booting`, `ready`, `stopped`, `error`) travel over the existing
  `/api/agent-events` 500ms-poll channel. Fine-grained token chunks travel over a new per-session
  `ReadableStream` route. Each channel is optimised for its event frequency; consumers are not
  forced to filter noise from mismatched event rates.

  ### Server-Side Idle Timeout

  `InteractiveSessionService` stores one `NodeJS.Timeout` per session in a private `Map`. The timer
  resets on every user message AND on every stdout chunk received. When the timer fires, `stopSession`
  is called, `SIGTERM` is sent, and the DB record is updated. On server restart, all sessions with
  status `booting` or `ready` are bulk-marked `stopped` during `initializeContainer()`.

  ### Concurrent Session Cap

  Enforced inside `startSession()` by querying the active count from the repository before spawning.
  Returns `ConcurrentSessionLimitError` on breach; the API route translates this to HTTP 429.
  Business rules stay in the service layer per Clean Architecture.

  ### TypeSpec-First Domain Models

  Two new `.tsp` files in `tsp/agents/` follow the same structure as the existing `agent-session.tsp`
  and `agent-run.tsp`. Settings extended in `tsp/common/settings.tsp` with `InteractiveAgentConfig`.
  Default values (`enabled: true`, `autoTimeoutMinutes: 15`, `maxConcurrentSessions: 3`) are applied
  at runtime via nullish coalescing — no migration of existing settings files required.

  ---

  ## Implementation Strategy

  **Phase 1 must complete before Phase 2** because all layers reference TypeSpec-generated types.

  **Phase 2 (repositories) must complete before Phase 3 (service)** because the service depends
  on repository interfaces. However, interface definitions in Phase 3 can be written in parallel
  with Phase 2 implementations — the TDD cycle for the service will mock the repositories.

  **Phase 4 (API routes) depends on Phase 3 (service)** — routes call the service via DI.

  **Phase 5 (React components) can begin once Phase 4 defines the API contract** — the
  useChatRuntime hook calls the API routes and SSE stream endpoint. assistant-ui handles
  the rendering layer with minimal custom code.

  **Phase 6 (Settings + E2E) comes last** because the E2E test exercises the entire stack and
  the settings section depends on the `enabled` flag wiring that gates tab visibility.

  Phase 5 is simplified by assistant-ui: instead of building 4 custom components bottom-up,
  we create a custom Thread component using assistant-ui primitives and a useChatRuntime hook
  using ExternalStoreRuntime. The ChatTab orchestrator is ~30 lines.

  ---

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | stdin/stdout framing errors when agent emits multi-line JSON | readline.createInterface handles line-buffering automatically; per-line JSON parse with try/catch drops malformed lines |
  | Agent process crashes mid-session | readline 'close' event triggers stopSession(); SSE stream closes gracefully; DB record marked error |
  | Zombie processes on server restart | initializeContainer() calls markAllActiveStopped() before the server accepts requests |
  | Context window overflow from large task lists | FeatureContextBuilder caps plan tasks at 30 entries; content trimmed to ~600 tokens |
  | Race condition: two simultaneous start requests for same feature | startSession() checks active count inside a DB transaction; unique constraint on feature_id+status guards against duplicates |
  | SSE back-pressure when client disconnects mid-stream | ReadableStream cancel() handler calls stopSession() or clears the stdout listener to avoid unbounded buffering |
  | TypeSpec compile errors blocking all downstream work | Phase 1 is the first thing built; compile errors are caught before any hand-written code references generated types |
  | Storybook rejecting components without stories | MANDATORY rule; ChatTab.stories.tsx uses MockChatProvider with useExternalStoreRuntime for assistant-ui compatibility |
