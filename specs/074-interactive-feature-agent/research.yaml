  ## Security Considerations

  - **No shell interpolation**: User messages are written directly to the agent stdin as plain
    bytes via `childProcess.stdin.write(message + '\n')`. No shell involvement; no injection risk (NFR-9).
  - **Process isolation**: Each session runs as a separate OS process. A crashed session cannot
    affect other sessions or the Next.js server process (NFR-3).
  - **Worktree scope**: The agent CWD is set to the feature worktree path. The agent inherits
    the local user OS permissions — consistent with the existing feature-agent runner.
  - **Input validation**: The POST /messages route validates that content is a non-empty string
    of at most 32KB before writing to stdin and the DB.
  - **Concurrent cap**: Prevents resource exhaustion from rapid session creation via the API.
  - **Session ownership check**: All session routes verify the sessionId belongs to the expected
    featureId before acting, preventing cross-feature session manipulation.

  ---

  ## Performance Implications

  - **SSE back-pressure**: The per-session ReadableStream uses Node.js built-in back-pressure.
    If the browser client disconnects, the ReadableStream cancel() closes the connection without
    buffering unbounded chunks in memory.
  - **readline buffering**: readline.createInterface buffers by newline. Long agent lines are
    capped at 1MB to prevent memory accumulation.
  - **Message history pagination**: GET /messages returns the last 200 messages by default
    (configurable via ?limit query param). The feature_id + created_at index ensures
    sub-millisecond SQLite queries on typical history sizes.
  - **Context window trimming**: When resuming a session, only the last N messages that fit
    within a configurable token budget (default 8000 tokens) are included, trimming oldest first.
  - **Concurrent session cap**: Default cap of 3 limits memory pressure. Each claude process
    uses approximately 150-400MB RAM; 3 sessions equals 450MB-1.2GB peak overhead.

