name: "interactive-feature-agent"
summary: >
  Iteration 2: Replace manual CLI process management with @anthropic-ai/claude-agent-sdk V2 session
  API. The SDK wraps Claude Code CLI internally, provides typed message streaming, session
  create/resume/send/stream primitives, and eliminates ~500 lines of hand-rolled IPC code.

relatedFeatures:
  - "074-interactive-feature-agent (iteration 1)"

technologies:
  - "TypeScript"
  - "@anthropic-ai/claude-agent-sdk v0.2.81+ (V2 session API)"
  - "zod@^4 (peer dep of SDK)"
  - "Next.js 16 App Router (route handlers)"
  - "React 19"
  - "SQLite / better-sqlite3"
  - "tsyringe (DI container)"
  - "Server-Sent Events (ReadableStream)"
  - "assistant-ui/react v0.12+"
  - "Vitest (unit + integration tests)"

relatedLinks:
