  ## Architecture Notes

  ### Layer Placement

  Following Clean Architecture (dependencies point inward):

  ```
  domain/         — InteractiveSession, InteractiveMessage (TypeSpec-generated)
  application/    — IInteractiveSessionService (output port), IInteractiveSessionRepository,
                    IInteractiveMessageRepository, IInteractiveAgentProcessFactory
  infrastructure/ — InteractiveSessionService (impl), SQLiteInteractiveSessionRepository,
                    SQLiteInteractiveMessageRepository, InteractiveAgentProcessFactory,
                    FeatureContextBuilder, migration 045
  presentation/   — 5 API routes, ChatTab + 4 child components + stories
  ```

  ### DI Registration

  New bindings in `container.ts`:
  ```typescript
  container.register('IInteractiveSessionRepository', {
    useFactory: () => new SQLiteInteractiveSessionRepository(db)
  });
  container.register('IInteractiveMessageRepository', {
    useFactory: () => new SQLiteInteractiveMessageRepository(db)
  });
  container.register('IInteractiveAgentProcessFactory', {
    useFactory: c => new InteractiveAgentProcessFactory(
      c.resolve('IAgentExecutorProvider'), spawnWithPipe
    )
  });
  container.registerSingleton('IInteractiveSessionService', InteractiveSessionService);
  ```

  String token aliases for web routes added alongside existing aliases (container.ts lines 410-508).

  ### Startup Cleanup

  Called during `initializeContainer()` after DB and repository registration:
  ```typescript
  const sessionRepo = container.resolve<IInteractiveSessionRepository>(
    'IInteractiveSessionRepository'
  );
  await sessionRepo.markAllActiveStopped(); // cleanup zombie sessions from prior restart
  ```

