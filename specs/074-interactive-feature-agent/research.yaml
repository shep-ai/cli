decisions:
  - title: "Replace manual CLI spawning with Claude Agent SDK"
    chosen: |
      Use @anthropic-ai/claude-agent-sdk V2 session API (unstable_v2_createSession /
      unstable_v2_resumeSession) to replace all manual child_process.spawn() + readline
      + JSON-line parsing code. The SDK:
      - Bundles Claude Code CLI internally (no separate binary resolution)
      - Handles all IPC protocol (stdin/stdout JSON-line framing)
      - Provides typed SDKMessage stream (22+ message types)
      - Manages process lifecycle (spawn, signal, cleanup)
      - Supports session persistence and resumption natively
      - Offers includePartialMessages for streaming deltas
    rejected:
      - "Keep manual child_process.spawn wrapper — ~500 lines of hand-rolled process management that duplicates SDK functionality; maintenance burden grows with each Claude CLI protocol change"
      - "Use SDK V1 query() API — requires complex async generator coordination for multi-turn; V2 send()/stream() maps directly to our session model"
      - "Direct Anthropic API calls via @anthropic-ai/sdk — loses all Claude Code tooling (file read/write, bash, git); would need to rebuild tool infrastructure from scratch"
    rationale: |
      The SDK is the official wrapper for Claude Code CLI, maintained by Anthropic. It provides
      everything we built manually (process spawn, JSON parsing, session resume) plus features
      we didn't have (typed messages, in-process custom tools, hooks, MCP server management).
      The PoC commit (5ab568c4) validated that V2 persistent sessions work correctly.
      Adopting the SDK reduces our infrastructure code by ~500 lines and ensures we stay
      compatible with future Claude Code protocol changes.

  - title: "SDK V2 Session API for Multi-Turn Conversations"
    chosen: |
      Use the V2 unstable API surface:
      - unstable_v2_createSession(options) → SDKSession for new sessions
      - unstable_v2_resumeSession(sessionId, options) → SDKSession for resumed sessions
      - session.send(message) to send user messages (replaces stdin.write)
      - session.stream() async generator yielding SDKMessage (replaces readline parsing)
      - session.close() to terminate (replaces process.kill SIGTERM)
      - session.sessionId for tracking (replaces manual UUID management)

      SDK options used:
      - model: from settings or default
      - cwd: feature worktree path
      - systemPrompt: { type: 'preset', preset: 'claude_code', append: featureContext }
      - permissionMode: 'bypassPermissions' (replaces --dangerously-skip-permissions)
      - allowDangerouslySkipPermissions: true
      - includePartialMessages: true (for streaming deltas to SSE)
      - persistSession: true (SDK handles session disk persistence)
    rejected:
      - "V1 query() with AsyncIterable prompt — complex generator coordination for multi-turn; must manually yield SDKUserMessage at correct timing; V2 eliminates this entirely"
      - "V1 query() with string prompt per turn (no session resume) — loses conversation context between turns; defeats the purpose of persistent sessions"
    rationale: |
      V2's send()/stream() model is a direct replacement for our current
      stdin.write() + readline-stdout-parsing flow. Each turn is: send message,
      iterate stream for responses, done. The "unstable" label means the API shape
      may evolve, but we pin the SDK version and can adapt on upgrade. The PoC
      already validated this works end-to-end.

  - title: "Replace IInteractiveAgentProcessFactory with IInteractiveAgentAdapter"
    chosen: |
      Delete the IInteractiveAgentProcessFactory interface and its implementation
      (InteractiveAgentProcessFactory). Replace with a thinner IInteractiveAgentAdapter
      interface:

      interface IInteractiveAgentAdapter {
        createSession(options: InteractiveSessionOptions): Promise<SDKSession>;
        resumeSession(sessionId: string, options: InteractiveSessionOptions): Promise<SDKSession>;
      }

      The adapter wraps SDK calls and maps our InteractiveSessionOptions to SDK
      SDKSessionOptions. This is the only place in the codebase that imports from
      @anthropic-ai/claude-agent-sdk — all other code interacts through the adapter
      interface, keeping the SDK a swappable implementation detail.
    rejected:
      - "Keep IInteractiveAgentProcessFactory returning ChildProcess — the SDK manages the child process internally; exposing ChildProcess would mean reaching into SDK internals"
      - "No adapter, use SDK directly in InteractiveSessionService — couples the service to the SDK; harder to test; violates DI principle"
      - "Route through IAgentExecutorProvider — the SDK only supports Claude Code (it bundles the CLI); the abstraction is hollow for interactive mode"
    rationale: |
      A thin adapter keeps the SDK as an implementation detail behind a clean interface.
      The InteractiveSessionService depends only on the adapter interface, making it
      testable with mocks. The adapter is the single point where SDK imports live,
      making future SDK version upgrades contained to one file.

  - title: "SDK Message Type Mapping to SSE Events"
    chosen: |
      Map SDK message types to our existing SSE event format:

      SDKPartialAssistantMessage → SSE 'delta' event (streaming token chunks)
      SDKAssistantMessage → SSE 'message' event (complete message, persisted to SQLite)
      SDKResultMessage (success) → SSE 'done' event (end-of-turn)
      SDKResultMessage (error) → SSE 'error' event
      SDKStatusMessage → SSE 'log' event (status updates, tool usage)
      SDKToolUseSummaryMessage → SSE 'log' event (tool use summaries)

      The mapping happens in InteractiveSessionService when iterating session.stream().
      The SSE event format sent to the browser is unchanged — React components need
      zero modifications.
    rejected:
      - "Pass raw SDK messages to the browser — browser would need to understand SDK message types; tight coupling to SDK internals; breaks if SDK changes message format"
      - "Only emit complete messages (no streaming) — loses GPT-style token streaming feel; regresses UX from iteration 1"
    rationale: |
      Mapping SDK messages to our existing SSE event format preserves the API contract
      between the backend and frontend. The React components (useChatRuntime, Thread)
      continue to consume the same SSE event shapes. This makes the SDK adoption a
      pure backend refactoring with zero frontend changes.

  - title: "Dual Persistence Strategy"
    chosen: |
      Keep both persistence layers:
      - SDK persistence: handles agent context (session history for Claude's context window,
        tool outputs, file checkpoints). Managed automatically by the SDK.
      - Our SQLite tables: handle UI state (interactive_sessions status tracking,
        interactive_messages for feature-scoped history display, fast queries for
        message lists and session status). Unchanged from iteration 1.

      On session.send(), we:
      1. Persist user message to our SQLite interactive_messages table
      2. Call session.send() (SDK handles its own persistence internally)
      3. Iterate session.stream() and persist complete assistant messages to our table
    rejected:
      - "Remove our SQLite tables, use SDK APIs for everything — SDK's listSessions/getSessionMessages APIs are not feature-scoped; querying per-feature history would require loading all sessions and filtering; no index optimization"
      - "Remove SDK persistence, relay all context ourselves — defeats the purpose of using the SDK; we'd need to manage context window trimming manually again"
    rationale: |
      The two persistence layers serve different purposes and are complementary:
      - SDK persistence: agent's internal context (opaque to us)
      - Our SQLite: UI layer queries (fast, indexed, feature-scoped)
      Trying to use one for both purposes would compromise either the SDK's context
      management or our UI query performance.

  - title: "Feature Context Injection via SDK systemPrompt"
    chosen: |
      Replace manual stdin writing of feature context with SDK's systemPrompt option:

      const session = await adapter.createSession({
        cwd: worktreePath,
        systemPrompt: {
          type: 'preset',
          preset: 'claude_code',
          append: featureContextBuilder.build(feature)
        },
        // ... other options
      });

      The FeatureContextBuilder.build() method stays the same (generates ~400-600 token
      summary). Only the injection mechanism changes — from stdin writing to SDK option.
    rejected:
      - "Pass context as first user message — pollutes message history; agent sees it as a user turn, not system context"
      - "Skip context entirely, let agent read files — degrades first-response quality; agent wastes a turn reading spec files"
    rationale: |
      The SDK's systemPrompt option with preset: 'claude_code' ensures the agent gets
      both its standard Claude Code instructions AND our feature context. The append
      field cleanly adds our context without replacing Claude Code's default behavior.
      This is cleaner than our iteration 1 approach of writing to stdin.

openQuestions: []

content: |
  ## Technology Decisions

  ### 1. Claude Agent SDK Adoption (Core Decision)

  **Chosen:** @anthropic-ai/claude-agent-sdk V2 session API

  The SDK (v0.2.81) bundles Claude Code CLI internally and provides:
  - Process lifecycle management (spawn, signal, cleanup)
  - JSON-line IPC protocol handling
  - Typed message stream (22+ SDKMessage types)
  - Session create/resume/send/stream primitives
  - Permission mode configuration
  - System prompt injection
  - Streaming partial messages

  **Replaces (to be deleted):**
  - Manual `child_process.spawn()` with CLI flag construction
  - `readline.createInterface()` for stdout JSON-line parsing
  - Manual `stdin.write()` for message sending
  - Manual `process.kill(SIGTERM)` for session termination
  - `--resume` flag management for session resumption
  - `--output-format stream-json` flag construction
  - `--dangerously-skip-permissions` flag
  - `windowsHide`, `stdio: pipe` configuration
  - `CLAUDECODE` env var stripping
  - JSON-line parsing with error recovery

  **Retained (unchanged):**
  - SQLite persistence (interactive_sessions, interactive_messages tables)
  - SSE streaming to browser (event format preserved)
  - Idle timeout via NodeJS.Timeout per session
  - Concurrent session cap enforcement
  - FeatureContextBuilder (output reused, injection mechanism changes)
  - React components and API routes (contract preserved)

  ---

  ### 2. V2 Session API Usage Pattern

  **Session creation:**
  ```typescript
  import { unstable_v2_createSession, unstable_v2_resumeSession } from '@anthropic-ai/claude-agent-sdk';

  // New session
  const session = unstable_v2_createSession({
    model: settings.model ?? 'claude-sonnet-4-6',
    cwd: worktreePath,
    systemPrompt: { type: 'preset', preset: 'claude_code', append: featureContext },
    permissionMode: 'bypassPermissions',
    allowDangerouslySkipPermissions: true,
    includePartialMessages: true,
    persistSession: true,
  });

  // Resumed session
  const session = unstable_v2_resumeSession(claudeSessionId, {
    model: settings.model ?? 'claude-sonnet-4-6',
    cwd: worktreePath,
    permissionMode: 'bypassPermissions',
    allowDangerouslySkipPermissions: true,
    includePartialMessages: true,
  });
  ```

  **Message exchange:**
  ```typescript
  session.send(userMessage);

  for await (const msg of session.stream()) {
    switch (msg.type) {
      case 'assistant':
        // SDKPartialAssistantMessage — streaming delta → SSE 'delta' event
        break;
      case 'result':
        // SDKResultMessage — end of turn → SSE 'done' event
        // Persist complete assistant message to SQLite
        break;
    }
  }
  ```

  ---

  ### 3. SDK Message Type Mapping

  | SDK Message Type | SSE Event | Purpose |
  | ---------------- | --------- | ------- |
  | SDKPartialAssistantMessage | delta | Streaming token chunks |
  | SDKAssistantMessage | message | Complete assistant message |
  | SDKResultMessage (success) | done | End-of-turn signal |
  | SDKResultMessage (error) | error | Agent error |
  | SDKStatusMessage | log | Status changes (compacting, etc.) |
  | SDKToolUseSummaryMessage | log | Tool use summaries |
  | SDKToolProgressMessage | log | Long-running tool progress |

  ---

  ### 4. Code to Delete

  | File | What to Remove | Reason |
  | ---- | -------------- | ------ |
  | interactive-agent-process.factory.ts | Entire file | SDK manages process spawning |
  | interactive-agent-process-factory.interface.ts | Entire file | Replaced by IInteractiveAgentAdapter |
  | interactive-session.service.ts | spawn/readline/stdin logic | Replaced by SDK session API |
  | interactive-session.service.ts | JSON-line parser | SDK provides typed messages |
  | interactive-session.service.ts | claudeStdoutParser utility | SDK handles protocol parsing |
  | container.ts | IInteractiveAgentProcessFactory registration | Replaced by IInteractiveAgentAdapter |

  ---

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | @anthropic-ai/claude-agent-sdk | Official SDK wrapping Claude Code CLI | **Adopt** | Replaces ~500 lines of manual process management; typed API; maintained by Anthropic |
  | zod@^4 | Peer dependency of SDK | **Add** | Required by SDK; no breaking changes to our code (we use zod@3 internally but ^4 is compatible) |
  | node:child_process | Manual process spawning | **Remove usage** | SDK manages processes internally |
  | node:readline | Stdout line buffering | **Remove usage** | SDK handles IPC protocol |

  ---

  ## Security Considerations

  - **permissionMode: 'bypassPermissions'** — same security posture as iteration 1's
    --dangerously-skip-permissions flag. Agent operates with local user OS permissions.
    This is a local single-user tool; no additional sandboxing applied.
  - **allowDangerouslySkipPermissions: true** — required safety acknowledgment flag
    when using bypass mode. Explicit opt-in prevents accidental use.
  - **No new attack surface** — SDK is a wrapper around the same Claude CLI binary.
    No network exposure changes. All communication remains local IPC.

  ---

  ## Performance Implications

  - **Reduced latency** — SDK's internal message routing is direct (no readline buffering
    overhead). Streaming deltas arrive with lower latency.
  - **Memory** — SDK bundles Claude Code CLI (~50MB on disk). Runtime memory footprint
    is comparable to manual spawn (same underlying process).
  - **Startup time** — SDK session creation may be slightly faster than manual spawn
    due to optimized initialization path.
