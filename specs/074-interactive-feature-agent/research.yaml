  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | @assistant-ui/react | Chat UI primitives (Thread, Message, Composer) | Use | Production-grade composable primitives with ExternalStoreRuntime adapter; replaces 4 custom components |
  | react-markdown | Markdown rendering in assistant messages | Use | Lightweight, well-maintained; integrates cleanly with assistant-ui MessagePrimitive |
  | node:child_process | Spawn interactive agent process | Use | Already used by existing executors; no new dependency |
  | node:readline | Line-buffer agent stdout | Use | stdlib; idiomatic for line-based stdout parsing; zero npm cost |
  | better-sqlite3 | SQLite persistence | Use | Already the project DB; no change |
  | tsyringe | DI container | Use | Already the DI framework; new bindings follow existing pattern |
  | CopilotKit | Full-stack AI chat framework | Reject | Requires CopilotKit backend; too opinionated for custom backend integration |
  | Vercel AI SDK (useChat) | Chat hook with streaming | Reject | Tightly coupled to Vercel AI SDK backend protocol; our backend uses custom SSE + REST |
  | ws / socket.io | Bidirectional comms | Reject | SSE + REST POST is sufficient; avoids new dependency |
  | @anthropic-ai/sdk | Direct Claude API calls | Reject | Interactive mode uses the claude CLI process; API SDK is for direct model calls not process-based agents |
  | xterm.js | Terminal emulator in browser | Reject | Over-engineered for a chat UI; plain text rendering is correct for GPT-style UX |

