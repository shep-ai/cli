# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 14 tasks across 4 phases. Phase 1
  (Foundation) lays the groundwork with the feature flag, route skeleton, and
  sidebar nav item — these have no external dependencies and unblock all
  subsequent work. Phase 2 (UI Components) installs the 6 prompt-kit
  components via shadcn CLI and creates the feature component shell (ChatView,
  ChatEmptyState, ChatHeader, ChatPageClient) with Storybook stories for
  each, all testable with mock data. Phase 3 (State & Streaming) builds the
  core logic — the useChat hook with useReducer for state management and
  fetch/ReadableStream for SSE consumption, plus the POST /api/chat/stream
  endpoint that calls IAgentExecutor.executeStream(). This phase is heavily
  TDD-driven with unit tests for every reducer action and streaming scenario.
  Phase 4 (Integration) wires the hook into the components, implements error
  handling with retry and toast notifications, adds accessibility (aria-live,
  focus management, keyboard nav), and verifies responsive design with final
  Storybook stories.

  Tasks within each phase are ordered by dependency. Phase 1 tasks 2 and 3
  depend on task 1 (feature flag) but are independent of each other. Phase 2
  tasks 5-7 depend on task 4 (prompt-kit install) but the component tasks can
  proceed in parallel. Phase 3 tasks 9-10 (hook) are sequential, but task 11
  (endpoint) is independent and can proceed in parallel. Phase 4 is strictly
  sequential since each task builds on the previous integration step.

  ---

