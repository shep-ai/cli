# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  The chat interface follows the established Clean Architecture patterns in the
  Shep codebase. The feature is entirely within the presentation/web layer —
  no domain or application layer changes are needed since chat state is
  ephemeral and agent execution uses the existing IAgentExecutor interface.

  **Routing**: `app/chat/page.tsx` (server component) checks the chat feature
  flag and renders `ChatPageClient` (client component). This matches the
  pattern used by /tools, /skills, and /settings routes — server component
  does flag checking and data fetching, client component handles interactivity.

  **State Management**: A custom `useChat` hook with `useReducer` manages all
  chat state locally. No global context needed — chat state is page-scoped and
  ephemeral. The reducer handles message append, streaming token updates,
  error state, and clear conversation. A `sessionId` is stored in reducer
  state to enable multi-turn conversations via `resumeSession`.

  **Streaming**: A dedicated `POST /api/chat/stream` endpoint receives the
  user message and optional sessionId, resolves `IAgentExecutorProvider` from
  the DI container, calls `executeStream()` on the resolved executor, and
  forwards `AgentExecutionStreamEvent` objects as SSE events. The client
  consumes the stream via `fetch()` with `ReadableStream` reader (not
  EventSource, since we need POST with a JSON body).

  **Components**: prompt-kit components install as source files into
  `components/ui/` via the shadcn CLI, matching the existing shadcn/ui
  component pattern. Feature-level components live in
  `components/features/chat/` following the settings/tools pattern.

  **Data Flow**:
  ```
  User types message → useChat.sendMessage(content)
    → POST /api/chat/stream { message, sessionId }
      → resolve IAgentExecutorProvider → getExecutor()
        → executor.executeStream(prompt, { resumeSession, systemPrompt })
          → AsyncIterable<AgentExecutionStreamEvent>
            → SSE stream: data: { type, content, timestamp }
    → useChat reads ReadableStream
      → dispatch({ type: 'stream_token', content })
        → UI re-renders with new content appended to assistant message
  ```

  ## Key Design Decisions

  ### 1. Ephemeral State over Persistence
  Chat messages live in React state (useReducer) and are lost on page
  refresh. This keeps scope at size M by avoiding TypeSpec model changes, DB
  migrations, new repositories, and new use cases. Persistence is a natural
  follow-up feature. The agent's own session management (via sessionId /
  resumeSession) handles conversation continuity within a session.

  ### 2. Direct executeStream() over Use Case Layer
  The API route resolves IAgentExecutorProvider directly from the DI container
  rather than creating a new ChatUseCase. Chat is a thin pass-through — the
  route validates input, resolves the executor, calls executeStream(), and
  forwards events. A use case would add a file with minimal logic. This
  matches how existing API routes (/api/agent-events, /api/feature-logs)
  access the DI container directly.

  ### 3. POST + ReadableStream over EventSource
  The SSE stream is initiated via POST (to send message content and sessionId
  in the request body) and consumed via fetch() ReadableStream. EventSource
  only supports GET requests. The fetch pattern also gives us AbortController
  for cancellation when the user navigates away or submits a new message.

  ### 4. prompt-kit as Source Files over npm Package
  prompt-kit components are installed as source files via `npx shadcn@latest
  add "https://prompt-kit.com/c/<component>.json"`. This means zero runtime
  dependency (other than use-stick-to-bottom for auto-scroll), full
  customization control, and seamless integration with the existing shadcn/ui
  setup. Bundle impact is minimal (< 30KB gzipped).

  ### 5. Separate SSE Endpoint over Reusing agent-events
  The existing /api/agent-events endpoint is designed for SDLC lifecycle
  notifications via DB polling. It has no concept of chat streaming and uses
  a different event schema. A dedicated /api/chat/stream endpoint keeps
  concerns clean and allows a purpose-built streaming protocol.

  ### 6. Local ChatMessage Type over TypeSpec Model
  A local ChatMessage interface ({ id, role, content, timestamp, status })
  avoids TypeSpec changes for ephemeral state. The role values align with
  MessageRole enum (user, assistant). The status field (sending | streaming |
  complete | error) drives UI state.

  ### 7. Hardcoded System Prompt
  A static system prompt in the API route sets the AI persona for chat
  interactions. It can reference the project name and path from settings.
  AgentExecutionOptions.systemPrompt is already supported. User-configurable
  prompts can be added as a follow-up.

  ### 8. Session-Based Conversation Continuity
  After the first message, the sessionId from AgentExecutionResult is stored
  in the useChat reducer state and passed as resumeSession in subsequent
  messages. Claude Code (the primary agent) supports session-resume natively.
  For agents that don't support sessions, each message is independent.

  ## Implementation Strategy

  Work proceeds in four phases, each building on the previous:

  **Phase 1 (Foundation)** comes first because it establishes the navigable
  route skeleton and feature flag that all other phases depend on. The flag
  must exist before the sidebar can conditionally render the nav item, and
  the route must exist before components can mount into it.

  **Phase 2 (UI Components)** installs prompt-kit and creates the feature
  component shell. This is done before the hook/endpoint because components
  can be developed and storied with mock data, validating the UI design
  independently of backend integration.

  **Phase 3 (State & Streaming)** builds the core logic — the useChat hook
  and SSE endpoint. This is heavily TDD-driven. The hook is tested in
  isolation with mock fetch responses. The endpoint is tested with mock DI
  container and agent executor.

  **Phase 4 (Integration)** wires everything together. The hook connects to
  real components, the prompt input triggers sendMessage(), streaming tokens
  render progressively, error handling and retry work end-to-end, and
  accessibility is verified.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | prompt-kit components may not install cleanly with current shadcn/ui config | Install components in phase-2 early; verify each renders; fall back to manual copy from prompt-kit source if CLI fails |
  | use-stick-to-bottom dependency may conflict with existing packages | Check for version conflicts during install; the package is small with no transitive dependencies |
  | Agent executor may not support streaming for all agent types | Check executor.supportsFeature(AgentFeature.streaming) before calling executeStream(); fall back to execute() and simulate streaming for non-streaming agents |
  | Long streaming responses may cause scroll performance issues | use-stick-to-bottom uses ResizeObserver (not scroll events) for efficient auto-scroll; test with 100+ messages per NFR-1 |
  | Markdown re-parsing on each streaming token may be expensive | prompt-kit Markdown component handles incremental rendering; profile if jank is observed |
  | SSE connection drops during long responses | Implement reconnection in useChat hook; preserve partial content on reconnection |

