name: gpt-chat-interface
summary: >
  Implementation plan for a GPT-style chat interface in the Shep web UI. The
  approach installs prompt-kit components as source files via shadcn CLI, builds
  a custom useChat hook with useReducer for ephemeral state management, creates
  a dedicated POST /api/chat/stream SSE endpoint that calls
  IAgentExecutor.executeStream() directly, and wires a /chat route into the
  existing AppShell with sidebar navigation gated by a chat feature flag. Work
  proceeds in four phases: foundation (flag, route, sidebar), UI components
  (prompt-kit install + feature components), state and streaming (useChat hook +
  SSE endpoint), and integration (wiring everything together with error
  handling, empty state, and clear conversation).

