    name: 'Foundation — Feature Flag, Route, and Sidebar'
    description: >
      Establish the skeleton: add the chat feature flag to FeatureFlagsState,
      create the /chat route with a minimal placeholder page, and add the Chat
      nav item to the sidebar gated by the flag. This phase has zero external
      dependencies and produces a navigable route that other phases build upon.
      Everything is testable independently — flag logic, route rendering, and
      sidebar conditional display.
    parallel: false

  - id: phase-2
    name: 'UI Components — prompt-kit Installation and Feature Shell'
    description: >
      Install prompt-kit components (chat-container, message, prompt-input,
      markdown, code-block, loader) as source files via the shadcn CLI. Create
      the chat feature component directory with ChatView, ChatEmptyState, and
      ChatHeader components. Write Storybook stories for every component. This
      phase depends on phase-1 for the route to mount components into, but
      the components themselves are self-contained and testable with mock data.
    parallel: false

  - id: phase-3
    name: 'State and Streaming — useChat Hook and SSE Endpoint'
    description: >
      Build the useChat hook with useReducer managing messages, streaming state,
      error state, and sessionId. Create the POST /api/chat/stream SSE endpoint
      that resolves IAgentExecutorProvider from the DI container, calls
      executeStream(), and forwards AgentExecutionStreamEvent as SSE events.
      This is the core logic phase — heavily TDD-driven with unit tests for
      every state transition in the hook and integration tests for the SSE
      endpoint. Hook and endpoint are tested in isolation before UI wiring.
    parallel: false

  - id: phase-4
    name: 'Integration — Wire UI, Hook, and Endpoint Together'
    description: >
      Connect the useChat hook to the ChatView component, wire the prompt input
      submission to sendMessage(), display streaming tokens progressively,
      implement error handling with retry, add the empty state with suggestion
      chips, implement clear conversation with confirmation, ensure
      accessibility (aria-live, focus management, keyboard navigation), and
      verify responsive design. Final Storybook stories for integrated states.
    parallel: false

