  ### Integration Points

  1. **AppShell → AppSidebar** — Chat nav item added alongside existing nav items
  2. **Feature Flags** — chat flag flows through FeatureFlagsProvider → useFeatureFlags()
  3. **DI Container** — /api/chat/stream resolves IAgentExecutorProvider via resolve()
  4. **Agent Executor** — executeStream() provides AsyncIterable<AgentExecutionStreamEvent>
  5. **Session Management** — sessionId from AgentExecutionResult enables multi-turn conversations

  ### Data Flow

  ```
  User types message → useChat.sendMessage(content)
    → POST /api/chat/stream { message, sessionId }
      → resolve IAgentExecutorProvider → getExecutor()
        → executor.executeStream(prompt, { resumeSession, systemPrompt })
          → AsyncIterable<AgentExecutionStreamEvent>
            → SSE stream: event: progress/result/error, data: { content, timestamp }
    → useChat reads ReadableStream
      → dispatch({ type: 'stream_token', content })
        → UI re-renders with new content appended to assistant message
  ```

  ### Consistency with Existing Patterns

  - **Route pattern**: app/chat/page.tsx matches app/tools/page.tsx, app/settings/page.tsx
  - **Client component**: ChatPageClient matches SettingsPageClient, ToolsPageClient
  - **Hook naming**: use-chat.ts follows use-agent-events.ts, use-notifications.ts
  - **API route**: app/api/chat/stream/route.ts follows app/api/agent-events/route.ts
  - **Feature component dir**: components/features/chat/ follows components/features/settings/
  - **Storybook**: Colocated .stories.tsx with tags: ['autodocs']
  - **Testing**: Vitest + React Testing Library mocking Next.js hooks

