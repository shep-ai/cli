# Research Artifact (YAML)
# This is the source of truth. Markdown is auto-generated from this file.

name: gpt-chat-interface
summary: >
  Technical research for the GPT chat interface feature. Key decisions: use
  prompt-kit components installed via shadcn CLI as source files, create a
  dedicated /api/chat/stream SSE endpoint that calls IAgentExecutor.executeStream()
  directly (bypassing the SDLC agent graph), manage chat state with a custom
  useChat hook using useReducer, add the /chat route as a top-level App Router
  page within the existing AppShell layout, and gate visibility behind a new
  `chat` feature flag defaulting to true.

