name: fix-spec-yaml-generation
summary: >
  Implement centralized YAML serialization with forced double-quoting to
  eliminate parse failures from unescaped quotes in AI-generated content.
  Create safeYamlDump helper in node-helpers.ts, migrate all yaml.dump call
  sites, and enhance agent prompts (phase + repair) with explicit YAML
  escaping guidance and concrete examples. No new dependencies required —
  leverages existing js-yaml@^4.1.1 with proper options.

