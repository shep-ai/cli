oneLiner: fix broken yaml generation with unescaped quotes in agent-generated spec files
summary: >
  The feature-agent system occasionally generates invalid YAML in spec files when AI-generated
  content contains unescaped single quotes, double quotes, or special characters. This causes
  YAML parse failures during validation, requiring multiple repair cycles. The fix involves
  improving YAML serialization options, enhancing agent prompts with escaping guidance, and
  strengthening validation/repair mechanisms.
phase: Analysis
sizeEstimate: M

