content: |
  ## Summary

  Implementation proceeds in four phases: (1) establish foundation with safeYamlDump
  helper and comprehensive unit tests, (2) migrate all internal yaml.dump call sites
  to ensure consistent quoting across nodes/use cases/CLI, (3) enhance agent prompts
  with YAML escaping guidance to prevent malformed output at the source, (4) validate
  end-to-end behavior with integration test and ensure backward compatibility with
  regression test.

  Foundation first (phase 1): Cannot migrate call sites until helper exists. Tests
  before code ensures helper correctness before integration. Edge case coverage (quotes,
  newlines, special chars, nested structures) builds confidence in serialization
  behavior.

  Internal migration (phase 2): Start with node-helpers.ts (clearCompletedPhase,
  markPhaseComplete) since they're used by all nodes. Then migrate use cases (approve,
  reject), implement node, and CLI output. Each task verifies quoting behavior and
  ensures no unmigrated calls remain.

  Prompt enhancements (phase 3): Add "YAML Output Rules" section to all phase prompts
  (analyze, requirements, research, plan) with consistent guidance: quoting, escaping,
  block scalars. Enhance repair prompt with specific before/after examples. Prompts
  are the first line of defense — prevent malformed YAML at the source. Consistency
  across prompts ensures agents receive uniform expectations regardless of phase.

  Validation (phase 4): Integration test verifies full validation → repair →
  re-validation cycle works end-to-end. Regression test ensures existing spec.yaml
  files (written before forced quoting) parse successfully, guaranteeing backward
  compatibility. No user migration required — safeYamlLoad handles both old (unquoted)
  and new (force-quoted) YAML.

  All code tasks follow TDD: write failing test (RED), implement minimal code (GREEN),
  clean up (REFACTOR). Non-code tasks (grep verification, prompt enhancements) include
  acceptance criteria but no TDD cycles.
