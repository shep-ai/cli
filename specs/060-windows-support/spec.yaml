name: windows-support
number: 060
branch: feat/060-windows-support
oneLiner: Add Windows (win32) platform support across CLI, Web UI, tool installer, process management, CI, and build scripts
userQuery: >
  Currently the project support linux and osx, add support to windows
summary: >
  The @shepai/cli project currently runs on Linux and macOS. While some services already
  include win32 platform branches (browser opener, file/folder dialogs, CLI symbol detection),
  many critical areas lack Windows support: shell command execution uses Unix-only 'sh',
  binary detection uses 'which' (not available on Windows), Web UI open-shell/open-folder
  actions have no win32 entry, build scripts use rm/cp/mkdir shell commands, process
  management relies on Unix signals (SIGTERM/SIGKILL) and negative-PID process groups,
  tool JSON files lack win32 install commands, path validation assumes Unix '/' prefix,
  and CI runs exclusively on ubuntu-latest. This feature adds complete Windows platform
  support so that developers on Windows can install, run, and use the full shep CLI and
  Web UI without WSL or other compatibility layers.
phase: Requirements
sizeEstimate: L

