# Open questions (must be resolved before implementation)
openQuestions:
  - question: 'Should we support native Windows (CMD/PowerShell) or only WSL/Git Bash?'
    resolved: true
    options:
      - option: 'Native Windows (CMD/PowerShell)'
        description: >
          Full native support using PowerShell and cmd.exe. No dependency on WSL or Git Bash.
          Maximizes Windows user reach and provides the most seamless experience. Requires
          adapting all shell commands, process management, and path handling for win32.
        selected: true
      - option: 'WSL/Git Bash only'
        description: >
          Require Windows users to run through WSL or Git Bash. Simpler to implement since
          Unix commands work in these environments, but limits adoption and adds a hard
          prerequisite that many Windows developers may not have configured.
        selected: false
      - option: 'Native + WSL fallback'
        description: >
          Attempt native Windows support first, with WSL detection as a fallback. Adds
          complexity with two code paths on the same platform and makes debugging harder.
        selected: false
    selectionRationale: >
      Native Windows support is recommended because the goal is to make shep accessible to
      all Windows developers. Requiring WSL is a significant barrier — many corporate
      environments restrict WSL, and casual users won't install it just to try a CLI tool.
      Node.js already provides cross-platform APIs (path, os, fs) that make native support
      feasible without excessive complexity. The codebase already uses platform detection
      patterns (os.platform() with Record lookups) that extend naturally to win32.
    answer: 'Native Windows (CMD/PowerShell)'

  - question: 'Which Windows package manager to target for tool install commands?'
    resolved: true
    options:
      - option: 'winget only'
        description: >
          Target only winget (Windows Package Manager). Built into Windows 10 1709+ and
          Windows 11. No third-party install required. Covers the widest base of modern
          Windows users with zero prerequisites. Has the largest and fastest-growing package
          repository among Windows package managers.
        selected: true
      - option: 'Chocolatey only'
        description: >
          Target only Chocolatey. The most established Windows package manager with the
          largest package catalog. However, requires separate installation and admin rights
          for many packages. Not built into Windows.
        selected: false
      - option: 'All three (winget, choco, scoop)'
        description: >
          Support winget, Chocolatey, and Scoop with a preference cascade. Maximum
          compatibility but triples the maintenance burden for 16 tool JSON files (48 new
          command entries). Adds complexity to the installer logic for fallback detection.
        selected: false
    selectionRationale: >
      winget is recommended as the sole Windows package manager because it ships built-in
      with Windows 10 1709+ and all Windows 11 systems, requiring zero additional setup.
      This aligns with the project's goal of minimal prerequisites. The winget repository
      includes all tools the project needs (git, gh, node, docker, etc.). Supporting
      multiple package managers would triple the tool JSON maintenance burden without
      proportional user benefit, since winget covers the vast majority of modern Windows
      installations.
    answer: 'winget only'

  - question: 'Should CI run the full test suite on windows-latest or a reduced matrix?'
    resolved: true
    options:
      - option: 'Reduced matrix (unit + build)'
        description: >
          Run only unit tests and build verification on windows-latest. Skip integration
          and E2E tests which are slower and more complex to set up on Windows runners.
          Provides basic Windows compatibility assurance while keeping CI fast and costs low.
          Windows CI runners are ~2x more expensive than Linux runners on GitHub Actions.
        selected: true
      - option: 'Full test suite'
        description: >
          Run the complete test suite (unit + integration + E2E) on windows-latest. Maximum
          confidence but significantly increases CI time and cost. E2E tests require browser
          installation on Windows runners and may surface environment-specific flakiness.
        selected: false
      - option: 'Unit tests only'
        description: >
          Run only unit tests on Windows. Minimal CI cost but misses build verification,
          which is critical for catching Windows-specific compilation issues with native
          dependencies like better-sqlite3.
        selected: false
    selectionRationale: >
      A reduced matrix (unit + build) is recommended because it validates the two most
      critical Windows concerns — correct runtime behavior (unit tests) and successful
      compilation of native dependencies and build scripts (build step) — while keeping CI
      costs manageable. Windows GitHub Actions runners cost ~2x more per minute than Linux.
      Integration tests exercise external services that are environment-independent, and E2E
      browser tests add disproportionate setup complexity on Windows runners. The reduced
      matrix can be expanded later once the Windows support is stable.
    answer: 'Reduced matrix (unit + build)'

  - question: 'How should process group termination be handled on Windows?'
    resolved: true
    options:
      - option: 'Use tree-kill package'
        description: >
          Add the tree-kill npm package which provides cross-platform process tree
          termination. On Windows it uses taskkill /T /F, on Unix it uses process group
          signals. Well-maintained, small footprint (~3KB), widely used (10M+ weekly
          downloads). Abstracts platform differences behind a single API.
        selected: true
      - option: 'Custom taskkill implementation'
        description: >
          Write custom code that uses taskkill.exe on Windows and negative-PID kill on
          Unix. No new dependency but requires maintaining platform-specific process
          management code and thorough testing of edge cases (zombie processes, permission
          errors, already-exited processes).
        selected: false
      - option: 'Use process.kill with platform checks'
        description: >
          Use Node.js built-in process.kill() with platform-conditional logic. On Windows,
          kill individual processes without group semantics. Simplest approach but may leave
          orphaned child processes on Windows since there is no native process group concept.
        selected: false
    selectionRationale: >
      tree-kill is recommended because it solves a genuinely complex cross-platform problem
      (process tree termination) with a battle-tested, minimal-footprint package. Writing
      custom taskkill logic risks edge cases around permission errors, zombie processes, and
      process trees deeper than one level. The package has 10M+ weekly downloads and is the
      standard solution in the Node.js ecosystem. Using process.kill alone would leave
      orphaned child processes on Windows, which is unacceptable for daemon and agent
      management.
    answer: 'Use tree-kill package'

  - question: 'Should the tool installer use where.exe on Windows or a cross-platform binary-exists check?'
    resolved: true
    options:
      - option: 'Cross-platform which check (Node.js)'
        description: >
          Use a cross-platform approach: check if the binary exists by attempting to resolve
          it via Node.js APIs or a small cross-platform package like which (npm). This
          provides a single code path for all platforms, uses which on Unix and where.exe
          under the hood on Windows. Simpler maintenance, no platform branching needed.
        selected: true
      - option: 'Platform-conditional where.exe/which'
        description: >
          Use os.platform() to choose between execFile("which") on Unix and
          execFile("where.exe") on Windows. Follows the existing platform-detection pattern
          in the codebase but adds another platform branch to maintain. where.exe output
          format differs from which (may return multiple lines).
        selected: false
    selectionRationale: >
      A cross-platform approach is recommended because it eliminates platform branching in
      the binary detection logic entirely. Node.js 16+ can resolve binaries via
      child_process.execFile with the shell option, or a lightweight package like the npm
      which package can abstract this. Since the codebase already has platform branching
      in many places, reducing it where possible improves maintainability. The which npm
      package handles Windows where.exe semantics internally, including PATHEXT resolution.
    answer: 'Cross-platform which check (Node.js)'

  - question: 'How should build scripts be made cross-platform?'
    resolved: true
    options:
      - option: 'Node.js fs APIs in a build script'
        description: >
          Replace shell commands (rm -rf, cp -r, mkdir -p) in package.json scripts with a
          Node.js build script using fs.rm(), fs.cp(), and fs.mkdir(). Zero new dependencies.
          Uses APIs available in Node.js 16+ (fs.rm with recursive, fs.cp with recursive).
          The script is fully cross-platform and can be tested.
        selected: true
      - option: 'Cross-platform npm packages (rimraf, cpy-cli, mkdirp)'
        description: >
          Add rimraf, cpy-cli, and mkdirp as devDependencies to replace shell commands.
          Each is a well-known cross-platform alternative. Adds 3 new dependencies but
          keeps build commands declarative in package.json. Risk of dependency bloat.
        selected: false
      - option: 'shx (shell commands cross-platform)'
        description: >
          Add shx which provides Unix-like commands cross-platform (shx rm -rf, shx cp -r,
          shx mkdir -p). Minimal change to existing scripts — just prefix with shx. Single
          dependency but adds a runtime shim for every build command.
        selected: false
    selectionRationale: >
      Node.js fs APIs are recommended because they add zero new dependencies and use built-in
      APIs that are guaranteed cross-platform. Node.js 16+ provides fs.rm({recursive: true}),
      fs.cp({recursive: true}), and fs.mkdir({recursive: true}) which directly replace
      rm -rf, cp -r, and mkdir -p. A small build.mjs script keeps logic testable and
      maintainable. This avoids adding shx or rimraf as dependencies, which is consistent
      with the project's preference for minimal external dependencies.
    answer: 'Node.js fs APIs in a build script'

  - question: 'How should shell command execution (sh -c) be adapted for Windows?'
    resolved: true
    options:
      - option: 'Use spawn with shell: true option'
        description: >
          Replace spawn("sh", ["-c", cmd]) with spawn(cmd, { shell: true }). Node.js
          shell option automatically uses cmd.exe on Windows and sh on Unix. Single code
          path, no platform branching needed. The shell option is designed exactly for this
          use case. Works with all child_process methods (spawn, exec, execFile).
        selected: true
      - option: 'Platform-conditional shell selection'
        description: >
          Use os.platform() to choose between spawn("sh", ["-c", cmd]) on Unix and
          spawn("cmd.exe", ["/c", cmd]) on Windows. Explicit but adds platform branching
          and requires testing both paths. PowerShell could also be used instead of cmd.exe.
        selected: false
    selectionRationale: >
      Using spawn with shell: true is recommended because it is the idiomatic Node.js
      solution for cross-platform shell command execution. Node.js internally handles
      platform detection, using /bin/sh on Unix and cmd.exe on Windows. This eliminates
      the need for manual platform branching and is the approach recommended by the Node.js
      documentation. It also handles command quoting and escaping differences between
      platforms.
    answer: 'Use spawn with shell: true option'

# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The @shepai/cli platform currently supports Linux and macOS but lacks Windows compatibility.
  While the codebase includes partial win32 support in some services (browser opener, file/folder
  dialogs, CLI Unicode detection), many critical subsystems use Unix-only APIs: `sh -c` for
  shell execution, `which` for binary detection, SIGTERM/SIGKILL for process management,
  negative-PID process group kills, and `rm -rf`/`cp -r`/`mkdir -p` in build scripts. The Web
  UI's open-shell and open-folder actions explicitly exclude Windows, path validation assumes
  Unix-style absolute paths starting with `/`, and all CI/CD jobs run on `ubuntu-latest` only.

  Windows is the most-used desktop OS worldwide. Without native Windows support, the project
  excludes the majority of potential users and limits adoption in corporate environments where
  Windows is the mandated platform. This feature adds complete win32 platform support so that
  Windows developers can install, configure, and use shep without WSL or compatibility layers.

  ## Success Criteria

  - [ ] `pnpm build` succeeds on Windows (cmd.exe and PowerShell) without shell errors
  - [ ] `pnpm test:unit` passes on Windows with zero platform-related failures
  - [ ] CLI commands (`shep init`, `shep start`, `shep stop`, `shep ui`) work on native Windows
  - [ ] Web UI actions (open shell, open folder, open IDE, deploy) work with Windows paths
  - [ ] Tool installer detects installed binaries on Windows using cross-platform check
  - [ ] Tool installer runs winget install commands on Windows for all 16 tool definitions
  - [ ] Daemon start/stop lifecycle works on Windows (process creation, liveness check, termination)
  - [ ] Agent process management (fork, kill, liveness check) works on Windows
  - [ ] Path validation accepts both Unix (`/home/user/repo`) and Windows (`C:\Users\user\repo`) absolute paths
  - [ ] GitHub Actions CI includes a windows-latest job running unit tests and build
  - [ ] All existing Linux and macOS functionality remains unchanged (no regressions)
  - [ ] E2E tests for daemon lifecycle are platform-aware (use .cmd scripts on Windows)

  ## Functional Requirements

  - **FR-1: Cross-platform shell execution** — Replace all `spawn('sh', ['-c', cmd])` calls
    with `spawn(cmd, { shell: true })` or equivalent cross-platform pattern. Applies to
    tool-installer.service.ts and any other service using explicit `sh` invocation.

  - **FR-2: Cross-platform binary detection** — Replace `execFile('which', [binary])` with
    a cross-platform binary existence check (e.g., the npm `which` package or Node.js
    `child_process` with `shell: true`). Applies to tool-installer.service.ts and
    json-driven-ide-launcher.service.ts.

  - **FR-3: Windows tool install commands** — Add `win32` entries to all 16 tool JSON files
    in `packages/core/src/infrastructure/services/tool-installer/tools/`. Use winget as the
    package manager (e.g., `winget install --id Git.Git -e --source winget`). Each tool must
    have a valid winget package ID.

  - **FR-4: Web UI open-shell action** — Add a `win32` entry to the SHELL_COMMANDS record
    in `open-shell.ts` that opens Windows Terminal (wt.exe) or PowerShell as a fallback,
    with the working directory set to the repository path.

  - **FR-5: Web UI open-folder action** — Add a `win32` entry to the FOLDER_COMMANDS record
    in `open-folder.ts` that opens Windows Explorer (`explorer.exe`) at the repository path.

  - **FR-6: Cross-platform path validation** — Replace all `startsWith('/')` absolute path
    checks with a cross-platform validator that accepts both Unix paths (`/home/...`) and
    Windows paths (`C:\...`, `D:/...`, UNC paths `\\server\share`). Applies to open-shell.ts,
    open-folder.ts, open-ide.ts, deploy-repository.ts, and dev-executor.service.ts.

  - **FR-7: Cross-platform process tree termination** — Replace `process.kill(-pid, signal)`
    negative-PID process group kills with tree-kill or equivalent cross-platform process tree
    termination. Applies to deployment.service.ts, stop-daemon.ts, and test helpers.

  - **FR-8: Cross-platform daemon lifecycle** — Ensure daemon start (detached spawn with
    stdio redirection) and stop (signal then force-kill) works on Windows. The detached
    option in Node.js spawn works differently on Windows (creates new console window vs
    new process group).

  - **FR-9: Cross-platform build scripts** — Replace Unix shell commands (`rm -rf`, `cp -r`,
    `mkdir -p`) in package.json build scripts with a Node.js build script using fs.rm(),
    fs.cp(), and fs.mkdir() APIs.

  - **FR-10: Windows CI pipeline** — Add a `windows-latest` runner job to the GitHub Actions
    CI workflow that runs unit tests and build verification. The job should use pnpm setup
    and Node.js setup consistent with the existing Linux jobs.

  - **FR-11: Cross-platform test fixtures** — Update E2E test files that use Unix-specific
    patterns: replace shebang scripts with platform-appropriate executables (.cmd on Windows),
    replace `chmodSync(0o755)` with platform-conditional logic, replace `pkill` and `sleep`
    commands with cross-platform alternatives, and update process group kills in test helpers.

  - **FR-12: Cross-platform path separator handling** — Replace hardcoded `/` path separators
    in string operations (e.g., `filePath.startsWith(home + '/')` in
    claude-code-session.repository.ts) with `path.sep` or `path.join()`.

  - **FR-13: Feature agent process management** — Ensure `fork()` with detached mode and
    `process.kill(pid, 0)` liveness checks work correctly on Windows. The kill-with-zero
    signal works on Windows in Node.js, but detached fork behavior differs.

  ## Non-Functional Requirements

  - **NFR-1: No regressions on Linux/macOS** — All existing tests must continue to pass on
    Linux and macOS. Windows support must be additive, not replacing platform-specific logic
    that already works.

  - **NFR-2: Minimal new dependencies** — Prefer Node.js built-in APIs over new npm packages.
    Only add packages (tree-kill, which) where the built-in alternative is significantly more
    complex or error-prone. Maximum 2 new runtime dependencies.

  - **NFR-3: Consistent platform detection pattern** — Follow the existing codebase convention
    of `os.platform()` with `Record<string, ...>` lookups for platform-specific logic. New
    win32 branches should match the style of existing darwin/linux entries.

  - **NFR-4: CI cost management** — Windows CI jobs should run only unit tests and build, not
    the full E2E suite. Windows runners are ~2x more expensive than Linux on GitHub Actions.
    Total CI time increase should be under 5 minutes.

  - **NFR-5: Maintainable tool metadata** — Each tool JSON file's win32 entry should use a
    single, consistent package manager (winget). No fallback chains or detection logic in
    tool metadata — keep tool JSON files simple and declarative.

  - **NFR-6: Path handling correctness** — All path operations must use Node.js path module
    (path.join, path.resolve, path.sep, path.isAbsolute) instead of string concatenation or
    Unix-specific checks. This applies to both production code and tests.

  - **NFR-7: Graceful degradation** — If a Windows-specific feature is unavailable (e.g.,
    Windows Terminal not installed for open-shell), fall back to a universally available
    alternative (PowerShell) rather than returning an error.

  - **NFR-8: Security** — Windows-specific commands must not introduce command injection
    vulnerabilities. All paths passed to spawn/exec must be properly escaped or passed as
    array arguments rather than interpolated into shell strings.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Native Windows vs WSL/Git Bash? | Native Windows (CMD/PowerShell) | Maximizes user reach; WSL is a barrier in corporate environments; Node.js APIs support native Windows |
  | 2 | Which Windows package manager for tool installs? | winget only | Ships built-in on Windows 10 1709+/11; zero prerequisites; covers all needed tools |
  | 3 | Full or reduced CI matrix on Windows? | Reduced (unit + build) | Validates core compatibility at manageable cost; Windows runners are ~2x more expensive |
  | 4 | How to handle process group termination? | tree-kill package | Battle-tested (10M+ downloads), handles taskkill on Windows; custom code risks edge cases |
  | 5 | Binary detection approach? | Cross-platform which check | Eliminates platform branching; npm which package handles PATHEXT on Windows |
  | 6 | Build script portability approach? | Node.js fs APIs in build script | Zero new dependencies; uses built-in fs.rm/fs.cp/fs.mkdir; testable and maintainable |
  | 7 | Shell command execution adaptation? | spawn with shell: true | Idiomatic Node.js; automatic platform detection; recommended by Node.js docs |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/tool-installer/tool-installer.service.ts` | High | Uses `execFile('which', ...)` and `spawn('sh', ['-c', ...])` — neither available on Windows |
  | `packages/core/src/infrastructure/services/tool-installer/tools/*.json` (16 files) | High | Most tool JSON files lack `win32` install commands; only list `linux` and `darwin` |
  | `src/presentation/web/app/actions/open-shell.ts` | High | SHELL_COMMANDS record has no `win32` entry — returns error on Windows |
  | `src/presentation/web/app/actions/open-folder.ts` | High | FOLDER_COMMANDS record has no `win32` entry — returns error on Windows |
  | `src/presentation/web/app/actions/open-ide.ts` | High | Path validation uses `startsWith('/')` — rejects Windows paths like `C:\...` |
  | `src/presentation/web/app/actions/deploy-repository.ts` | High | Same `startsWith('/')` path validation issue |
  | `packages/core/src/infrastructure/services/deployment/deployment.service.ts` | High | Uses `kill(-pid, 'SIGTERM')` and `kill(-pid, 'SIGKILL')` for process groups — negative PID not supported on Windows |
  | `src/presentation/cli/commands/daemon/stop-daemon.ts` | High | Uses `process.kill(pid, 'SIGTERM')` then `process.kill(pid, 'SIGKILL')` |
  | `src/presentation/cli/commands/daemon/start-daemon.ts` | Medium | Detached spawn with `stdio: ['ignore', logFd, logFd]` — may behave differently on Windows |
  | `packages/core/src/infrastructure/services/agents/feature-agent/feature-agent-process.service.ts` | Medium | Uses `fork()` with detached mode and `process.kill(pid, 0)` for liveness check |
  | `packages/core/src/infrastructure/services/ide-launchers/json-driven-ide-launcher.service.ts` | Medium | Uses `execFile('which', ...)` for availability check — not available on Windows |
  | `packages/core/src/infrastructure/services/agents/common/executors/dev-executor.service.ts` | Medium | Uses `startsWith('/')` for absolute path validation |
  | `packages/core/src/infrastructure/services/filesystem/shep-directory.service.ts` | Low | Uses `mode: 0o700` in mkdir — permissions ignored on Windows but harmless |
  | `package.json` build scripts (`build:cli`, `build:web:prod`) | High | Uses `rm -rf`, `mkdir -p`, `cp -r` — Unix shell commands not available in CMD/PowerShell |
  | `.github/workflows/ci.yml` | Medium | All jobs use `runs-on: ubuntu-latest` — no Windows CI coverage |
  | `src/presentation/cli/ui/symbols.ts` | Low | Already has Windows terminal detection — no changes needed |
  | `packages/core/src/infrastructure/services/browser-opener.service.ts` | Low | Already has win32 entry — no changes needed |
  | `packages/core/src/infrastructure/services/file-dialog.service.ts` | Low | Already has win32 PowerShell command — no changes needed |
  | `packages/core/src/infrastructure/services/folder-dialog.service.ts` | Low | Already has win32 PowerShell command — no changes needed |
  | `packages/core/src/infrastructure/services/notifications/desktop-notifier.ts` | Low | node-notifier supports Windows toast — no changes needed |
  | `tests/e2e/cli/daemon-lifecycle.test.ts` | Medium | Creates shell scripts with shebangs, uses `chmodSync(0o755)`, hardcodes Unix PATH separator |
  | `tests/e2e/cli/feat.test.ts` | Medium | Uses `pkill` and `sleep` commands — Unix-only |
  | `tests/helpers/cli/server.ts` | Medium | Uses `process.kill(-pid, signal)` for process group termination |
  | `packages/core/src/infrastructure/services/agents/sessions/claude-code-session.repository.ts` | Low | Uses `filePath.startsWith(home + '/')` — needs path.sep on Windows |
  | `packages/core/src/infrastructure/services/git/worktree.service.ts` | Low | Path normalization only handles macOS `/private/var` — may need Windows-specific handling |

  ## Dependencies

  ### Already Cross-Platform (no changes needed)
  - `node-notifier` — Supports Windows toast notifications
  - `better-sqlite3` — Native binding with Windows prebuilds (in `onlyBuiltDependencies`)
  - `commander` — CLI framework, cross-platform
  - `@inquirer/prompts` — Terminal prompts, cross-platform
  - `picocolors` — Terminal colors, cross-platform
  - `next` — Web framework, cross-platform
  - `path.join()`, `path.normalize()`, `homedir()` — Already used correctly in most places

  ### Needs Windows Adaptation
  - `child_process` usage patterns — `sh -c`, `which`, negative-PID kill
  - Build scripts — Need cross-platform replacements for `rm`, `cp`, `mkdir`
  - Tool JSON metadata — Need `win32` install commands
  - GitHub Actions — Need Windows runner matrix

  ### New Dependencies (recommended)
  - `tree-kill` — Cross-platform process tree termination (replaces negative-PID kill)
  - `which` (npm) — Cross-platform binary existence check (replaces `execFile('which')`)

  ### Not Needed (use built-in Node.js APIs instead)
  - `rimraf` — Use `fs.rm({ recursive: true })` (Node.js 16+)
  - `shx` — Use Node.js build script with fs APIs
  - `cross-env` — Not needed; no environment variable setting in build scripts
  - `cpy-cli` — Use `fs.cp({ recursive: true })` (Node.js 16+)

  ## Size Estimate

  **L (week+)** — This feature touches 20+ files across all layers (infrastructure services,
  web actions, CLI commands, build scripts, CI, tool metadata, and tests). The critical areas
  are process management (signal handling, process groups), shell command execution (replacing
  `sh -c` and `which`), and build script portability. Many services already have the
  platform-detection pattern in place, so the adaptation follows an established convention.
  However, testing on actual Windows environments and updating CI adds significant scope.

  Key work streams:
  1. **Shell/binary detection** (FR-1, FR-2) — 3 files, moderate complexity
  2. **Tool metadata** (FR-3) — 16 JSON files, low complexity per file
  3. **Web UI actions** (FR-4, FR-5, FR-6) — 4 files, low-moderate complexity
  4. **Process management** (FR-7, FR-8, FR-13) — 4 files, high complexity
  5. **Build scripts** (FR-9) — 1 new build script + package.json, moderate complexity
  6. **CI pipeline** (FR-10) — 1 workflow file, low complexity
  7. **Test portability** (FR-11, FR-12) — 5+ test files, moderate complexity
