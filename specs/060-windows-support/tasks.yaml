      "node:path". This makes the path validation accept Windows paths like
      C:\Users\... in addition to Unix paths.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'open-shell.ts uses path.isAbsolute() instead of startsWith("/")'
      - 'Tests pass for Unix paths (/home/user/repo)'
      - 'Tests pass for Windows paths (C:\Users\user\repo)'
      - 'Empty/relative paths still return error'
    tdd:
      red:
        - 'In open-shell.test.ts, add a test that calls openShell with repositoryPath="C:\\Users\\test" and asserts success (not the current "must be an absolute path" error)'
        - 'The test should fail because the current startsWith("/") rejects Windows paths'
      green:
        - 'Replace repositoryPath?.startsWith("/") with repositoryPath && path.isAbsolute(repositoryPath) in open-shell.ts'
        - 'Add import path from "node:path"'
      refactor:
        - 'Verify no other path validation logic needs updating in this file'
    estimatedEffort: '20min'

  - id: task-3
    phaseId: phase-2
