name: windows-support
summary: >
  15 tasks across 5 phases implementing Windows (win32) runtime support.
  Covers dependency installation, path handling, shell/binary detection,
  process management, Web UI actions, and tool metadata.

relatedFeatures: []
technologies: []
relatedLinks: []

