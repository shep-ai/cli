content: |
  ## Summary

  This task breakdown implements Windows runtime support across 15 tasks in
  5 phases. The work follows a bottom-up dependency order:

  First, we install the two new runtime dependencies (tree-kill, which) that
  subsequent phases require. Then we fix the path handling foundation by
  replacing Unix-only startsWith("/") checks with Node.js path.isAbsolute()
  across six files — these are the simplest, lowest-risk changes.

  Next, we tackle shell execution and binary detection by replacing
  spawn("sh", ...) with spawn({ shell: true }) and execFile("which") with
  the npm which package in the two infrastructure services that need them.

  The highest-complexity work comes in Phase 4: replacing negative-PID process
  group kills with tree-kill in the deployment service and daemon stop command,
  and adding windowsHide to daemon spawn options.

  Finally, we add the win32 platform entries to the Web UI action Records
  (PowerShell for terminal, explorer.exe for file manager) and winget install
  commands to the 10 tool JSON files with Windows-available packages.

  Each code task has explicit TDD cycles. Existing tests already mock
  os.platform() and process.kill() — the win32 test cases that currently
  assert errors will be updated to assert the correct Windows behavior. The
  tool JSON metadata task is a declarative data change with no TDD cycle.
