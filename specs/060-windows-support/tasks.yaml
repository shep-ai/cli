  # ──────────────────────────────────────────────────────────────────────
  # Phase 1: Dependencies & Foundation
  # ──────────────────────────────────────────────────────────────────────

  - id: task-1
    phaseId: phase-1
    title: 'Install tree-kill and which packages'
    description: >
      Add tree-kill@^1.2.2 and which@^5.0.0 as runtime dependencies to
      packages/core/package.json. Run pnpm install to update the lockfile.
      Verify both packages resolve correctly and their types are available.
      tree-kill provides cross-platform process tree termination; which
      provides cross-platform binary detection.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'tree-kill@>=1.2.2 appears in packages/core/package.json dependencies'
      - 'which@>=5.0.0 appears in packages/core/package.json dependencies'
      - 'pnpm install succeeds without errors'
      - 'TypeScript can import both packages without type errors'
      - 'pnpm build compiles successfully with the new dependencies'
    tdd:
      red:
        - 'Write a smoke test that imports tree-kill and which, verifying they export functions'
      green:
        - 'Run pnpm add tree-kill which in packages/core'
        - 'Verify the smoke test passes'
      refactor:
        - 'Ensure @types/which is added if needed for TypeScript support'
        - 'Verify tree-kill version is >=1.2.2 (RCE fix) in lockfile'
    estimatedEffort: '15min'

  # ──────────────────────────────────────────────────────────────────────
  # Phase 2: Cross-Platform Path Handling
  # ──────────────────────────────────────────────────────────────────────

