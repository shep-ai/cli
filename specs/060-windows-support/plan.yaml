name: windows-support
summary: >
  Add Windows (win32) runtime support by replacing Unix-only APIs with
  cross-platform alternatives across 5 work streams: (1) install two new
  dependencies (tree-kill, which), (2) replace execFile('which') and
  spawn('sh') with cross-platform equivalents, (3) add win32 entries to Web
  UI action Records and tool JSON files, (4) replace negative-PID process
  group kills with tree-kill, and (5) fix path validation and separator
  handling. All changes follow the existing codebase convention of
  Record<string, ...> platform lookups and DeploymentServiceDeps-style
  dependency injection. No build scripts, CI, or test fixtures are modified.

relatedFeatures: []
technologies:
  - Node.js child_process (spawn, fork, execFile)
  - Node.js path module (isAbsolute, sep, join)
  - Node.js os module (platform, homedir)
  - tree-kill (npm v1.2.2) — cross-platform process tree termination
  - which (npm v6.x) — cross-platform binary existence check
  - PowerShell — Windows terminal for open-shell action
  - explorer.exe — Windows file manager for open-folder action
  - winget — Windows Package Manager for tool install commands
relatedLinks:
  - https://nodejs.org/api/child_process.html#child_processspawncommand-args-options
  - https://www.npmjs.com/package/tree-kill
  - https://www.npmjs.com/package/which

phases:
  - id: phase-1
    name: 'Dependencies & Foundation'
    description: >
      Install tree-kill and which as runtime dependencies in packages/core.
      These are prerequisites for all subsequent phases — process management
      and binary detection changes depend on them.
    parallel: false

  - id: phase-2
    name: 'Cross-Platform Path Handling'
    description: >
      Replace all startsWith("/") absolute path checks with path.isAbsolute()
      and replace hardcoded "/" path separators with path.sep. These are small,
      low-risk, isolated changes that establish the cross-platform path
      foundation needed by later phases. Six files affected: open-shell.ts,
      open-folder.ts, open-ide.ts, deploy-repository.ts, dev-executor.service.ts,
      and claude-code-session.repository.ts.
    parallel: false

  - id: phase-3
    name: 'Shell Execution & Binary Detection'
    description: >
      Replace spawn("sh", ["-c", cmd]) with spawn(cmd, { shell: true }) in
      tool-installer.service.ts. Replace execFile("which", [binary]) with the
      npm which package in tool-installer.service.ts and
      json-driven-ide-launcher.service.ts. These changes make the two core
      infrastructure services work on Windows.
    parallel: false

  - id: phase-4
    name: 'Process Management'
    description: >
      Replace negative-PID process.kill(-pid, signal) with tree-kill in
      deployment.service.ts. Replace process.kill(pid, SIGTERM/SIGKILL) with
      tree-kill in stop-daemon.ts. Add windowsHide: true to daemon spawn
      options in start-daemon.ts. These are the highest-complexity changes,
      affecting daemon lifecycle and dev server management.
    parallel: false

  - id: phase-5
    name: 'Web UI Actions & Tool Metadata'
    description: >
      Add win32 entries to SHELL_COMMANDS in open-shell.ts (PowerShell) and
      FOLDER_COMMANDS in open-folder.ts (explorer.exe). Add winget install
      commands to the 10 tool JSON files that have Windows-available packages.
      Update platform arrays for tools gaining win32 support.
    parallel: false

