name: remove-feature-name
summary: >
  Presentation-layer-only change removing the "Feature Name" input from the web UI drawer.
  The description field becomes required and drives both validation and userInput composition.
  No domain, TypeSpec, DB, or use-case changes needed — the AI MetadataGenerator already
  produces the feature name from userInput, and the use case already handles name being absent.

relatedFeatures: []

technologies:
  - TypeScript
  - React (Next.js)
  - shadcn/ui (Input, Textarea, Label)
  - Tailwind CSS
  - Vitest + React Testing Library
  - Storybook

relatedLinks:
  - https://github.com/shep-ai/cli/issues/192

decisions:
  - title: 'Scope of changes — presentation layer only vs full-stack'
    chosen: 'Presentation layer only (drawer component + server action)'
    rejected:
      - >
        Full-stack removal of name field (TypeSpec, DB migration, 50+ file updates) —
        rejected because the name field is still valuable as an AI-generated display label
        used across CLI output, web sidebar, canvas nodes, and SSE events. Removing it from
        the domain would require a TypeSpec recompile, DB migration to drop the column, and
        updates to every surface that displays feature.name — massive blast radius for no
        user-facing benefit.
    rationale: >
      The issue (#192) says "remove feature name" meaning remove the user-facing INPUT, not
      the concept of a feature having a name. The CreateFeatureInput.name field is already
      optional (types.ts:12), and the use case already falls back to
      `input.userInput.slice(0, 100)` when name is not provided (create-feature.use-case.ts:132).
      The MetadataGenerator replaces this temporary name with an AI-generated one during
      initializeAndSpawn(). Changes are confined to 4 files: the drawer component, its test
      file, its Storybook stories, and the server action.

  - title: 'composeUserInput() refactoring approach'
    chosen: 'Replace name-prefixed format with description-only format'
    rejected:
      - >
        Keep the "Feature: {name}" prefix using description as the name — rejected because
        this would add an artificial "Feature: " prefix to the userInput that the AI metadata
        generator doesn't need. The CLI already passes raw description text without any prefix,
        and the AI generates better metadata from natural language input.
      - >
        Remove composeUserInput() entirely and pass description directly — rejected because
        the function still has value for appending attachment paths to the userInput string.
        Removing it would inline the attachment composition logic into the server action body.
    rationale: >
      The current composeUserInput() builds "Feature: {name}\n\n{description}\n\nAttached files:..."
      which embeds the user-typed name. After removing the name input, the function should
      compose from description only: just the description text with attachments appended if
      present. This aligns with how the CLI passes userInput — raw description text, no
      artificial prefix. The function signature changes from (name, description, attachments)
      to (description, attachments).

  - title: 'FeatureCreatePayload interface changes'
    chosen: 'Remove name field, make description required'
    rejected:
      - >
        Keep name as an optional field — rejected because the name input is being removed
        from the UI entirely. Keeping it in the payload interface would be misleading and
        create dead code paths. The payload should accurately reflect what the form produces.
      - >
        Make description optional (allow attachments-only submissions) — rejected because
        the AI metadata generator needs text input to produce quality names and slugs.
        Attachment-only submissions would produce poor metadata since the generator would
        have no meaningful text to work with. The CLI already requires a description argument.
    rationale: >
      The FeatureCreatePayload currently has `name: string` (required) and
      `description?: string` (optional). After removing the name input, the payload should
      have `description: string` (required) with no name field. This mirrors the CLI behavior
      where description is the sole required argument. The submit button validation shifts
      from `!name.trim()` to `!description.trim()`.

  - title: 'Server action validation change'
    chosen: 'Validate description is non-empty instead of name'
    rejected:
      - >
        Validate both description and name — rejected because name no longer exists in the
        payload. There is nothing to validate.
      - >
        No server-side validation (rely on client-side only) — rejected because server
        actions should always validate their inputs independently. The current pattern
        validates name server-side (create-feature.ts:58), and we should maintain the same
        defensive pattern for description.
    rationale: >
      The server action currently checks `if (!name?.trim())` at line 58 of create-feature.ts.
      This changes to `if (!description?.trim())`. The error message changes from
      "name is required" to "description is required". This maintains the existing validation
      pattern while adapting to the new field structure.

  - title: 'How to pass name to createRecord() use case'
    chosen: 'Stop passing name — let use case fall back to userInput.slice(0, 100)'
    rejected:
      - >
        Pass description as name — rejected because this conflates two different fields.
        The name should be AI-generated, not a copy of the description. Passing description
        as name would create a low-quality initial name that differs from how the CLI works.
      - >
        Generate a name client-side before calling the use case — rejected because the
        entire point of MetadataGenerator is to produce the name server-side via AI. Adding
        client-side name generation would duplicate logic and add complexity.
    rationale: >
      The CreateFeatureUseCase.createRecord() already handles the case where input.name is
      undefined: `const featureName = input.name ?? input.userInput.slice(0, 100)` (line 132).
      This temporary name is only used until initializeAndSpawn() replaces it with the
      AI-generated name from MetadataGenerator. The CLI already omits the name field and
      relies on this fallback — the web UI should do the same for consistency.

  - title: 'Form dirty-check approach after removing name'
    chosen: 'Check description and attachments only'
    rejected:
      - >
        Check only description — rejected because attachments also represent unsaved work.
        If a user adds file attachments but hasn't typed a description, closing the drawer
        should still trigger the discard confirmation dialog to prevent data loss.
      - >
        Remove dirty check entirely — rejected because the close guard prevents accidental
        data loss, which is a critical UX safeguard. The DrawerCloseGuardProvider pattern
        is used across the codebase and should be maintained.
    rationale: >
      The current isDirty check is `name.trim() !== '' || description.trim() !== '' ||
      attachments.length > 0` (line 130). After removing name, it becomes
      `description.trim() !== '' || attachments.length > 0`. This preserves the existing
      close-guard behavior for the remaining form fields. The useGuardedDrawerClose hook
      continues to work unchanged — it only reads the isDirty boolean.

