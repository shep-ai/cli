content: |
  ## Technology Decisions

  ### 1. Scope of Changes — Presentation Layer Only

  **Chosen:** Presentation layer only (drawer component + server action)

  **Rejected:**
  - Full-stack removal of name field — TypeSpec recompile, DB migration, 50+ file updates.
    The name field is still valuable as an AI-generated display label across all surfaces.

  **Rationale:** The issue says "remove feature name" meaning the input, not the domain concept.
  `CreateFeatureInput.name` is already optional, the use case already handles it being absent
  via `input.userInput.slice(0, 100)` fallback, and MetadataGenerator replaces it during
  `initializeAndSpawn()`. Changes confined to 4 files.

  ### 2. composeUserInput() Refactoring

  **Chosen:** Replace name-prefixed format with description-only format

  **Rejected:**
  - Keep "Feature: {name}" prefix using description — artificial prefix degrades AI metadata quality
  - Remove function entirely — still needed for appending attachment paths

  **Rationale:** Current format is `"Feature: {name}\n\n{description}\n\nAttached files:..."`.
  New format: just description text with attachments appended. Aligns with CLI behavior which
  passes raw description without prefix. Function signature changes from `(name, description, attachments)`
  to `(description, attachments)`.

  ### 3. FeatureCreatePayload Interface

  **Chosen:** Remove `name` field, make `description` required (`string`, not `string | undefined`)

  **Rejected:**
  - Keep name as optional — misleading dead code path
  - Make description optional — AI needs text for quality metadata

  **Rationale:** Payload should reflect what the form produces. Submit validation shifts from
  `!name.trim()` to `!description.trim()`.

  ### 4. Server Action Validation

  **Chosen:** Validate `description` is non-empty instead of `name`

  **Rejected:**
  - No server-side validation — server actions must validate independently
  - Validate both — name no longer exists in payload

  **Rationale:** Maintain existing defensive validation pattern. `!name?.trim()` → `!description?.trim()`.

  ### 5. Use Case Name Passing

  **Chosen:** Stop passing `name` to `createRecord()` — let use case use `userInput.slice(0, 100)` fallback

  **Rejected:**
  - Pass description as name — conflates fields, produces low-quality initial name
  - Generate name client-side — duplicates MetadataGenerator responsibility

  **Rationale:** The CLI already omits name and relies on this fallback path. Web UI should do the same.

  ### 6. Dirty-Check After Name Removal

  **Chosen:** Check `description.trim() !== '' || attachments.length > 0`

  **Rejected:**
  - Check description only — misses unsaved attachment work
  - Remove dirty check — critical UX safeguard for accidental data loss

  **Rationale:** Remove `name.trim() !== ''` from isDirty. useGuardedDrawerClose hook unchanged.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | shadcn/ui Input | Name text input | Still used | Used by ParentFeatureCombobox search input — keep import |
  | shadcn/ui Textarea | Description input | Still used | Becomes the primary text input — no changes to the component itself |
  | shadcn/ui Label | Form labels | Still used | One Label removed (feature name), description Label text updated |
  | React Testing Library | Unit tests | Still used | Tests updated to remove name-field assertions, add description-validation assertions |
  | Storybook | Component stories | Still used | Stories updated to remove name references from docs, interactions, and play functions |

  ## Security Considerations

  **Low risk.** This change reduces the attack surface slightly by removing one input field.

  - **Server-side validation maintained:** The server action continues to validate required fields
    before calling the use case. The validation target shifts from `name` to `description`.
  - **No new inputs:** No new fields are added. Description was already accepted (optional → required).
  - **XSS surface unchanged:** Description text is already handled safely by React's JSX escaping
    and the server action's text composition. No raw HTML rendering.
  - **No auth/authz changes:** Feature creation permissions are unchanged.

  ## Performance Implications

  **No performance impact.**

  - One fewer `useState` hook and one fewer controlled input — negligible React render improvement.
  - `composeUserInput()` does slightly less string concatenation (no "Feature: " prefix).
  - No additional API calls, no database changes, no new network requests.
  - AI metadata generation unchanged — same MetadataGenerator call path.

  ## Architecture Notes

  ### Clean Architecture Alignment

  This change is cleanly confined to the presentation layer, consistent with Clean Architecture:

  - **Domain layer:** No changes. Feature entity retains `name` as an AI-generated field.
  - **Application layer:** No changes. `CreateFeatureInput.name` stays optional. Use case fallback
    (`input.userInput.slice(0, 100)`) already handles the absent-name case.
  - **Infrastructure layer:** No changes. DB schema, repositories, agent services unaffected.
  - **Presentation layer:** All changes here — drawer component, server action, tests, stories.

  ### Files to Modify

  1. **`feature-create-drawer.tsx`** — Remove name state, name input JSX, update validation/isDirty/handleSubmit/resetForm,
     update FeatureCreatePayload interface, update description label and placeholder text.
  2. **`create-feature.ts`** (server action) — Remove name from CreateFeatureInput interface,
     refactor composeUserInput() to use description only, update validation, stop passing name to createRecord().
  3. **`feature-create-drawer.test.tsx`** — Remove name-input rendering/typing/validation tests,
     add description-validation tests, update payload assertions, update placeholder references.
  4. **`feature-create-drawer.stories.tsx`** — Update docs referencing "Feature Name", update
     play functions that type into the name input, update placeholder references.

  ### CLI Consistency

  The CLI `feat new` command (src/presentation/cli/commands/feat/new.command.ts) already operates
  in the target state: it takes a single `<description>` argument, passes it as `userInput` to the
  use case, and does NOT pass a separate `name` field. This change brings the web UI into alignment
  with the CLI's existing behavior.

  ---

  _Research complete — proceed to planning phase_
