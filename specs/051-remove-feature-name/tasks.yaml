content: |
  ## Summary

  The implementation follows a bottom-up approach across 2 phases. Phase 1 updates the
  server action contract first — removing the name field from the interface, refactoring
  composeUserInput() to use description-only composition, and stopping the name field from
  being passed to createRecord(). Phase 2 follows TDD discipline: first update the unit
  tests to assert the new behavior (task-3, RED), then update the drawer component to
  pass those tests (task-4, GREEN), then update Storybook stories (task-5), and finally
  run a full verification pass (task-6).

  The key ordering rationale is that the server action defines the contract the drawer
  consumes. Changing the contract first gives the component changes a stable target.
  Within phase 2, TDD is enforced by writing tests before modifying the component, ensuring
  every behavioral change is test-driven.
