content: |
  ## Summary

  The implementation is broken into 12 tasks across 3 phases, totaling an estimated
  14.5 hours of work.

  Phase 1 establishes the streaming data pipeline: a POST API route at
  /api/decision-chat that wraps IAgentExecutor.executeStream() in a ReadableStream,
  and a useDecisionChat React hook that manages messages, streaming state, and
  AbortController lifecycle. These two pieces form the backend-to-frontend data
  flow that all UI components depend on.

  Phase 2 builds the visual layer bottom-up. First, the shared markdownComponents
  utility is extracted from TechDecisionsReview for reuse. Then ChatMessageBubble
  handles individual message rendering with role-based styling and markdown.
  ChatMessageList composes bubbles in a scrollable container with auto-scroll.
  Finally, DecisionChatPanel brings everything together — message list, input, send
  button, and approve/reject buttons — as a drop-in replacement for DrawerActionBar
  in chat-enabled contexts.

  Phase 3 wires the components into the existing drawer system. TechReviewTabs and
  PrdQuestionnaire swap DrawerActionBar for DecisionChatPanel. ControlCenterDrawer
  threads featureId and serialized review context down to the review components.
  Stories are updated, tests are run, and accessibility is audited to ensure no
  regressions and WCAG compliance.
