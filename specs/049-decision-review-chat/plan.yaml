summary: >
  Implementation plan for adding agent-based chat to the tech review and PRD review
  drawers. The approach replaces DrawerActionBar with a new DecisionChatPanel component
  that provides multi-turn chat alongside approve/reject actions. A custom useDecisionChat
  hook manages messages and streaming state. A POST API route at /api/decision-chat
  streams agent responses via ReadableStream, resolving the executor through
  IAgentExecutorProvider. Three new presentational components (DecisionChatPanel,
  ChatMessageList, ChatMessageBubble) follow existing codebase conventions with
  colocated config and stories files. No new dependencies or domain/infrastructure
  changes are required — the feature is entirely in the presentation layer.

