summary: >
  Add @cubone/react-file-manager as an in-app fallback folder picker for platforms
  where native OS dialogs (zenity on Linux) are unavailable. Introduce a new
  "reactFileManager" feature flag in Settings so users can explicitly prefer the
  React-based picker over the native OS one. The React picker renders as a modal
  dialog in the web UI, displaying only directories from a server-side directory
  listing API. When the flag is off, the native picker is attempted first and the
  React picker activates automatically on failure. When the flag is on, the React
  picker is used directly, bypassing the native dialog entirely.
