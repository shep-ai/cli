name: react-file-manager
summary: >
  Add @cubone/react-file-manager as an in-app fallback folder picker with a feature flag toggle.
  Implementation follows four phases: (1) domain model and feature flag plumbing, (2) server-side
  directory listing API, (3) React file manager dialog component with Storybook story, and
  (4) integration into the existing AddRepositoryButton with fallback logic. Key decisions include
  server-side directory filtering (directories only, hidden excluded by default), try-catch fallback
  in the client wrapper, and shadcn/ui Dialog wrapping a dynamically-imported FileManager component.

relatedFeatures: []
technologies:
  - '@cubone/react-file-manager'
  - React 19
  - Next.js 16 (App Router)
  - TypeSpec
  - shadcn/ui (Dialog, Switch, Checkbox)
  - Tailwind CSS
  - Vitest
  - Storybook 8
  - Node.js fs/promises
  - sonner (toast)

relatedLinks:
  - https://github.com/Saifullah-dev/react-file-manager
  - https://www.npmjs.com/package/@cubone/react-file-manager

phases:
  - id: phase-1
    name: 'Domain Model & Feature Flag Plumbing'
    description: >
      Extend the FeatureFlags TypeSpec model with the reactFileManager boolean, regenerate output.ts,
      wire the new flag into the feature-flags resolution logic (DB-primary + env var fallback), and
      add the toggle row in the Settings UI. This phase comes first because all subsequent phases
      depend on being able to read the flag value to decide picker behavior.
    parallel: false

  - id: phase-2
    name: 'Directory Listing API'
    description: >
      Create the Next.js API route at /api/directory/list that reads the filesystem using
      fs.readdir with withFileTypes, filters to directories only (optionally including hidden),
      validates paths for security (absolute check, traversal normalization), and returns a
      JSON response matching the FileManager data contract. This phase is independent of the
      UI component but must be ready before the dialog can fetch real data.
    parallel: false

  - id: phase-3
    name: 'React File Manager Dialog Component'
    description: >
      Install the @cubone/react-file-manager package and create the ReactFileManagerDialog
      component in the common components tier. Wraps @cubone/react-file-manager FileManager
      inside a shadcn/ui Dialog with dynamic import (ssr: false). Includes directory navigation
      via API fetches, selection management, hidden files toggle, loading states, and a Storybook
      story with mock data. Follows the established delete-feature-dialog pattern with colocated
      config, stories, and index files.
    parallel: false

  - id: phase-4
    name: 'Pick-Folder Integration & Fallback Logic'
    description: >
      Wire the ReactFileManagerDialog into AddRepositoryButton with conditional logic based
      on the reactFileManager feature flag. When flag is ON, open the dialog directly. When
      flag is OFF, attempt the native picker first and fall back to the dialog on error.
      Correctly distinguish user cancellation (null path, no error) from failure (thrown error)
      to avoid false fallback triggers. Update Storybook mocks for the fallback scenario.
    parallel: false

filesToCreate:
  - src/presentation/web/app/api/directory/list/route.ts
  - src/presentation/web/components/common/react-file-manager-dialog/react-file-manager-dialog.tsx
  - src/presentation/web/components/common/react-file-manager-dialog/react-file-manager-dialog-config.ts
  - src/presentation/web/components/common/react-file-manager-dialog/react-file-manager-dialog.stories.tsx
  - src/presentation/web/components/common/react-file-manager-dialog/index.ts
  - tests/unit/presentation/web/api/directory-list.test.ts
  - tests/unit/presentation/web/lib/feature-flags-react-file-manager.test.ts
  - tests/unit/presentation/web/components/add-repository-button-fallback.test.ts

