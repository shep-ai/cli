      pnpm build still succeeds. This is a prerequisite for creating the dialog component.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - '@cubone/react-file-manager listed in package.json dependencies'
      - 'pnpm install completes without peer dependency warnings for react'
      - 'pnpm build succeeds (package does not break the build)'
