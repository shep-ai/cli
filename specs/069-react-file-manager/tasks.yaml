content: |
  ## Summary

  The implementation is broken into 13 tasks across 4 phases, totaling approximately 8.5 hours
  of development effort.

  The work begins with **Phase 1 (Feature Flag Plumbing)** — extending the TypeSpec model,
  wiring the flag through the resolution logic, and adding the Settings UI toggle. This is
  the lowest-risk phase since it follows an established pattern exactly (adding a fourth flag
  alongside skills, envDeploy, and debug).

  **Phase 2 (Directory Listing API)** builds the server-side filesystem browsing endpoint.
  This is self-contained and testable in isolation — the API route reads directories with
  security validation (path traversal prevention, absolute path enforcement) and returns
  filtered entries (directories only, hidden excluded by default). The API is the data source
  that the React file manager dialog will consume.

  **Phase 3 (Dialog Component)** is the largest phase — it installs the @cubone/react-file-manager
  package, creates the component directory with all four required files (component, config,
  stories, index), and implements the dialog with navigation, selection, loading states, and
  hidden files toggle. The component is wrapped in shadcn/ui Dialog and loaded via dynamic
  import with SSR disabled.

  **Phase 4 (Integration)** wires everything together by modifying the existing
  AddRepositoryButton to conditionally use either the native picker or the React dialog
  based on the feature flag, with automatic fallback from native to React on error. This
  phase has the most nuanced logic (distinguishing cancel from error for fallback decisions)
  and touches the most sensitive existing code.

  The final task validates the entire feature end-to-end by running the full test suite,
  build, and manual verification.
