name: react-file-manager
summary: >
  13 tasks across 4 phases implementing the React file manager fallback with feature flag toggle.
  Phase 1 sets up the domain model and feature flag plumbing (3 tasks). Phase 2 builds the
  directory listing API with security validation (2 tasks). Phase 3 creates the React file manager
  dialog component with Storybook story (4 tasks). Phase 4 integrates the dialog into the existing
  AddRepositoryButton with fallback logic (4 tasks).

relatedFeatures: []
technologies:
  - '@cubone/react-file-manager'
  - TypeSpec
  - Vitest
  - Storybook 8
  - shadcn/ui
  - Next.js 16
  - Node.js fs/promises

relatedLinks: []

tasks:
  # ──────────────────────────────────────────────────────────────────────────────
  # Phase 1: Domain Model & Feature Flag Plumbing
  # ──────────────────────────────────────────────────────────────────────────────

  - id: task-1
    phaseId: phase-1
    title: 'Add reactFileManager field to FeatureFlags TypeSpec model'
    description: >
      Add a `reactFileManager: boolean = false` field with @doc annotation to the FeatureFlags
      model in tsp/domain/entities/settings.tsp, then run pnpm tsp:compile to regenerate
      output.ts. This is the foundation — all subsequent feature flag wiring depends on this
      field existing in the generated types.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'FeatureFlags model in settings.tsp contains reactFileManager: boolean = false with @doc'
      - 'pnpm tsp:compile succeeds without errors'
      - 'Generated output.ts includes reactFileManager in the FeatureFlags interface'
      - 'pnpm validate passes (no type errors introduced)'
    tdd:
      red:
        - 'Write a test that imports FeatureFlags from output.ts and asserts reactFileManager property exists as boolean type'
      green:
        - 'Add the reactFileManager field to settings.tsp FeatureFlags model'
        - 'Run pnpm tsp:compile to regenerate output.ts'
      refactor:
        - 'Verify @doc annotation matches the description convention of existing flags'
    estimatedEffort: '20min'

  - id: task-2
    phaseId: phase-1
    title: 'Wire reactFileManager into feature flag resolution logic'
    description: >
      Extend the FeatureFlagsState interface and getFeatureFlags() function in feature-flags.ts
      to include the new reactFileManager flag. Follow the existing pattern: DB-primary resolution
      from Settings.featureFlags, with NEXT_PUBLIC_FLAG_REACT_FILE_MANAGER env var as fallback.
      Default to false when neither DB nor env var is set.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'FeatureFlagsState interface includes reactFileManager: boolean'
      - 'getFeatureFlags() returns reactFileManager from DB when settings exist'
      - 'getFeatureFlags() falls back to NEXT_PUBLIC_FLAG_REACT_FILE_MANAGER env var'
      - 'getFeatureFlags() defaults to false when neither DB nor env var is set'
      - 'Deprecated featureFlags getter proxy includes reactFileManager'
    tdd:
      red:
        - 'Write test in feature-flags-react-file-manager.test.ts that asserts getFeatureFlags() returns reactFileManager: false by default'
        - 'Write test that asserts reactFileManager reads from DB when settings exist'
        - 'Write test that asserts NEXT_PUBLIC_FLAG_REACT_FILE_MANAGER env var fallback works'
      green:
        - 'Add reactFileManager to FeatureFlagsState interface'
        - 'Add reactFileManager to the DB resolution branch in getFeatureFlags()'
        - 'Add reactFileManager env var fallback in the else branch'
        - 'Add reactFileManager getter to deprecated featureFlags proxy'
      refactor:
        - 'Ensure the new flag follows the exact same code pattern as existing flags (skills, envDeploy, debug)'
    estimatedEffort: '30min'

  - id: task-3
    phaseId: phase-1
    title: 'Add React File Manager toggle to Settings UI'
    description: >
      Add the reactFileManager flag to FLAG_KEYS, FLAG_LABELS, and FLAG_DESCRIPTIONS in the
      feature-flags-settings-section.tsx component. This makes the toggle appear in Settings >
      Feature Flags alongside existing toggles (Skills, Deployments, Debug).
    state: Todo
    dependencies:
      - task-2
    acceptanceCriteria:
      - 'FLAG_KEYS array includes reactFileManager'
      - 'FLAG_LABELS maps reactFileManager to "React File Manager"'
      - 'FLAG_DESCRIPTIONS maps reactFileManager to description explaining behavior'
      - 'Toggle switch renders in Settings > Feature Flags section'
      - 'Toggling persists to database via updateSettingsAction'
    tdd:
      red:
        - 'No dedicated unit test needed — the component is purely declarative mapping additions'
        - 'Verification via Storybook visual check and existing integration patterns'
      green:
        - 'Add reactFileManager to FLAG_KEYS array'
        - 'Add reactFileManager entry to FLAG_LABELS: "React File Manager"'
        - 'Add reactFileManager entry to FLAG_DESCRIPTIONS with behavior explanation (FR-2, NFR-15)'
      refactor:
        - 'Verify alphabetical or logical ordering of FLAG_KEYS is consistent'
    estimatedEffort: '15min'

  # ──────────────────────────────────────────────────────────────────────────────
  # Phase 2: Directory Listing API
  # ──────────────────────────────────────────────────────────────────────────────

  - id: task-4
    phaseId: phase-2
    title: 'Create directory listing API route with security validation'
    description: >
      Create GET /api/directory/list route that accepts path and showHidden query params.
      Validates path is absolute (400 if not), resolves with path.resolve() to prevent traversal,
      checks directory exists (404 if not), then reads with fs.readdir({ withFileTypes: true }).
      Filters to directories only (FR-7) and excludes hidden entries by default (FR-8).
      Returns JSON { entries: [...], currentPath: string }. Defaults to os.homedir() when
      path is omitted (FR-9). Skips inaccessible entries silently.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'GET /api/directory/list returns 200 with entries array and currentPath'
      - 'Each entry has name, path, isDirectory (true), and updatedAt fields (FR-6)'
      - 'Only directories returned — no files, symlinks, or other entry types (FR-7)'
      - 'Hidden entries (starting with .) excluded by default (FR-8)'
      - 'showHidden=true query param includes hidden entries'
      - 'Missing path param defaults to os.homedir() (FR-9)'
      - 'Relative path returns 400 (NFR-1)'
      - 'Path with ../ sequences resolved via path.resolve() (NFR-2)'
      - 'Non-existent path returns 404 (FR-10)'
      - 'Empty directory returns 200 with empty entries array (FR-10)'
      - 'Inaccessible entries skipped without failing the request'
    tdd:
      red:
        - 'Write test: GET with valid absolute path returns 200 with directory entries'
        - 'Write test: GET with relative path returns 400 with error message'
        - 'Write test: GET with non-existent path returns 404'
        - 'Write test: response only contains directories (mock readdir with mixed entries)'
        - 'Write test: hidden entries excluded by default'
        - 'Write test: showHidden=true includes hidden entries'
        - 'Write test: path with ../ resolved correctly (traversal prevention)'
        - 'Write test: missing path defaults to os.homedir()'
        - 'Write test: empty directory returns empty entries array'
      green:
        - 'Create src/presentation/web/app/api/directory/list/route.ts'
        - 'Implement GET handler with path validation, resolution, readdir, and filtering'
        - 'Use NextResponse.json() following existing API route patterns'
      refactor:
        - 'Extract validation logic into a helper function if the handler grows too long'
        - 'Ensure error messages are user-friendly and consistent'
    estimatedEffort: '1h 30min'

  - id: task-5
    phaseId: phase-2
    title: 'Handle permission errors and edge cases in directory listing API'
    description: >
      Harden the directory listing API for production edge cases: permission-denied errors
      on individual entries (skip silently), symlinks to directories (include or exclude based
      on resolution), and very large directories (streaming or pagination if needed). Also
      add stat() calls for updatedAt (mtime) on each entry.
    state: Todo
    dependencies:
      - task-4
    acceptanceCriteria:
      - 'Permission-denied on readdir child entries skipped without failing the request'
      - 'Each entry includes updatedAt timestamp from fs.stat mtime'
      - 'Symlinks to directories included when they resolve to accessible directories'
      - 'Symlinks to files or broken symlinks excluded'
      - 'API does not crash on directories with 1000+ entries'
    tdd:
      red:
        - 'Write test: permission-denied entry skipped, other entries returned normally'
        - 'Write test: each entry has an updatedAt ISO 8601 string'
        - 'Write test: broken symlink excluded from results'
      green:
        - 'Add try-catch around stat/access calls per entry to skip on permission error'
        - 'Add fs.stat to retrieve mtime for updatedAt field'
        - 'Handle symlink resolution with fs.stat (follows symlinks) vs fs.lstat'
      refactor:
        - 'Ensure stat calls are parallelized with Promise.all for performance'
        - 'Verify response time stays under 2s for directories with 1000 entries (NFR-4)'
    estimatedEffort: '45min'

