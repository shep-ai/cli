# Markdown content (the full tasks document)
content: |
  ## Summary

  9 tasks across 3 phases implement viewport persistence and first-repo auto-focus for the
  features canvas.

  **Phase 1 (Viewport Persistence Hook)** builds the useViewportPersistence hook in complete
  isolation using TDD. Task 1 covers the core read/write/validate logic with mocked localStorage.
  Task 2 adds the debounced onMoveEnd save with fake timers. The hook has zero React Flow
  dependencies, making it fully unit-testable.

  **Phase 2 (Canvas Integration)** wires the hook into the rendering pipeline. Task 3 extends
  FeaturesCanvasProps with the new defaultViewport and onMoveEnd props. Task 4 connects
  ControlCenterInner to the hook and passes props through. Task 5 adds Storybook stories
  demonstrating both saved and default viewport scenarios.

  **Phase 3 (First-Repo Auto-Focus & Drawer)** implements the onboarding UX flow. Task 6
  modifies handleAddRepository to return first-repo metadata. Task 7 wires useReactFlow
  and fitView in ControlCenterInner for auto-centering. Task 8 adds the delayed drawer
  auto-open. Task 9 runs final validation (build, test, lint) to confirm everything works.

  The ordering ensures each phase builds on stable foundations: the hook is tested before
  integration, integration is wired before orchestration, and final validation confirms
  no regressions.
