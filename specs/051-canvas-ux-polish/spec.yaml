content: |
  ## Problem Statement

  Two UX issues on the features canvas need addressing:

  **Issue #213 — Preserve canvas pan/zoom on refresh:**
  When users pan and zoom the canvas to a comfortable position, that state is lost on page refresh.
  The viewport resets to the hardcoded default `{x: 30, y: 30, zoom: 0.85}` every time. For users
  with many features spread across the canvas, this forces them to re-navigate to their working
  area on every page load.

  **Issue #208 — First repo on canvas alignment:**
  When a user first opens shep with an empty canvas and adds their first repository, the new repo
  node appears at a position that may not be visible or centered. It's unclear what to do next.
  The UX should auto-center the viewport on the new repository node AND automatically open the
  New Feature drawer so the user is guided to create their first feature.

  ## Codebase Analysis

  ### Project Structure

  Key directories relevant to this feature:

  | Directory | Purpose |
  | --------- | ------- |
  | `src/presentation/web/components/features/features-canvas/` | ReactFlow canvas component |
  | `src/presentation/web/components/features/control-center/` | Canvas wrapper with state management |
  | `src/presentation/web/hooks/use-graph-state.ts` | Domain-model-driven graph state (Maps → nodes/edges) |
  | `src/presentation/web/lib/layout-with-dagre.ts` | Dagre-based hierarchical layout engine |
  | `src/presentation/web/lib/derive-graph.ts` | Pure function deriving nodes/edges from domain Maps |
  | `src/presentation/web/components/common/repository-node/` | Repository node component |
  | `src/presentation/web/components/common/feature-node/` | Feature node component |
  | `src/presentation/web/components/common/base-drawer/` | Reusable drawer component |

  ### Architecture Patterns

  **Domain-model-driven graph state:** The canvas does NOT use React Flow's internal state for
  source of truth. Instead, domain Maps (`featureMap`, `repoMap`, `pendingMap`) are the single
  source of truth. Changes flow: Domain Maps → `deriveGraph()` → `layoutWithDagre()` → React Flow render.
  `onNodesChange` is a no-op.

  **Viewport is currently uncontrolled:** The `<ReactFlow>` component uses `defaultViewport`
  (uncontrolled) rather than a controlled `viewport` prop. This means React Flow manages viewport
  state internally. To persist viewport, we need to either:
  - Keep it uncontrolled and use `onMoveEnd` + `useReactFlow().setViewport()` for save/restore
  - Switch to controlled viewport (adds complexity, may cause jank)

  **Repository addition flow:** `handleAddRepository` in `use-control-center-state.ts` creates
  a temp repo node optimistically, calls the server, then replaces with real ID. The canvas
  re-renders via domain Map updates. There is no post-add viewport adjustment or drawer opening.

  **URL-based drawer routing:** Drawers open via Next.js URL navigation (e.g., `/create`,
  `/feature/:id`). The create-feature drawer opens at `/create?repo=<path>`. This means
  auto-opening the drawer after first repo add requires a `router.push('/create?repo=...')`.

  ### Relevant Technologies

  - **@xyflow/react v12.10.0:** Provides `useReactFlow()` hook with `setViewport()`, `fitView()`,
    `getViewport()`, and `onMoveEnd` callback for tracking viewport changes.
  - **localStorage:** Browser-native persistence, no additional dependencies needed.
  - **Next.js App Router:** URL-based navigation for drawer state.
  - **@dagrejs/dagre:** Layout positions are cached and only re-computed on topology changes.

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `features-canvas.tsx` | High | Must add `onMoveEnd` handler and restore saved viewport; replace `defaultViewport` with saved value |
  | `control-center-inner.tsx` | High | Must detect first-repo-added scenario, trigger viewport focus + drawer navigation |
  | `use-control-center-state.ts` | Medium | `handleAddRepository` callback may need to signal first-repo event for auto-focus |
  | New: `use-viewport-persistence.ts` hook | High | New hook to save/restore viewport from localStorage |
  | `features-canvas.stories.tsx` | Medium | Must add stories demonstrating viewport persistence behavior |
  | `control-center-inner` stories/tests | Medium | Must cover first-repo auto-focus + drawer open behavior |
  | Unit tests for viewport hook | High | TDD for localStorage save/restore logic |

  ## Dependencies

  - **@xyflow/react** `useReactFlow()` hook — for `getViewport()`, `setViewport()`, `fitView()`
  - **localStorage API** — for viewport persistence
  - **Next.js `useRouter`** — for auto-opening create drawer after first repo
  - Existing `handleAddRepository` in `use-control-center-state.ts` — needs enhancement to signal first-repo scenario
  - Existing `FeaturesCanvas` component — needs viewport callbacks

  ## Implementation Approach (High-Level)

  ### Issue #213 — Viewport Persistence

  1. Create a `useViewportPersistence` hook that:
     - Reads saved viewport from `localStorage` on mount
     - Returns the saved viewport (or default) as `initialViewport`
     - Provides an `onViewportChange` callback that debounces writes to `localStorage`
  2. In `FeaturesCanvas`, use the saved viewport as `defaultViewport`
  3. Add `onMoveEnd` to `<ReactFlow>` to capture viewport changes
  4. Wire the hook through `ControlCenterInner` → `FeaturesCanvas`

  ### Issue #208 — First Repo Auto-Focus

  1. In `ControlCenterInner`, detect when transitioning from 0 repos to 1 repo
  2. After the first repo node appears and is laid out, use `useReactFlow().fitView()` or
     `setViewport()` to center on it
  3. Automatically navigate to `/create?repo=<path>` to open the New Feature drawer
  4. This should only trigger once (on the literal first-ever repo add, not on refresh)

  ## Success Criteria

  - [ ] Canvas viewport (pan + zoom) persists across page refreshes
  - [ ] Viewport is stored in localStorage with a stable key
  - [ ] When first repo is added to empty canvas, viewport auto-centers on it
  - [ ] New Feature drawer auto-opens after first repo is added
  - [ ] Auto-focus only triggers on first repo add, not on subsequent page loads
  - [ ] All existing canvas interactions continue to work unchanged
  - [ ] Unit tests cover viewport persistence hook (save, restore, default fallback)
  - [ ] Storybook stories exist for new/modified components
  - [ ] `pnpm build`, `pnpm test`, `pnpm lint` all pass

  ## Size Estimate

  **M** — Two focused UX enhancements touching 4-6 files. The viewport persistence hook is
  straightforward (localStorage + debounce). The first-repo auto-focus requires careful
  detection logic and coordination between state management and viewport control, but is
  well-scoped. Estimated 2-3 days including TDD cycles and stories.

