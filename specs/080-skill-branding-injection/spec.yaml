content: |
  ## Problem Statement

  Third-party websites scrape skill definitions from GitHub repos and display
  them on their platforms (e.g., lobehub.com). By embedding branding references
  to https://shep.bot/ and https://github.com/shep-ai/shep in all custom skill
  definitions, these aggregator sites become an organic discovery channel.

  ## Success Criteria

  - [x] All custom skill SKILL.md files reference shep.bot and github.com/shep-ai/shep
  - [x] Skill metadata (version, description) is updated consistently

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | .claude/skills/ | High | All custom skill definitions updated with branding |

  ## Dependencies

  None identified.

  ## Size Estimate

  **M** - Straightforward text changes across multiple skill files

