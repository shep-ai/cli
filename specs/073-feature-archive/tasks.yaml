content: |
  ## Summary

  The implementation spans 18 tasks across 6 phases, following strict dependency order
  from domain foundation through presentation layer.

  **Phase 1 (Domain & Infrastructure)** establishes the TypeSpec model changes, database
  migration, mapper updates, and repository filtering — the foundation every other layer
  depends on. The TypeSpec changes produce the Archived enum value and previousLifecycle
  field in generated types, while the migration and mapper enable persistence.

  **Phase 2 (Use Cases & DI)** builds the core business logic: ArchiveFeatureUseCase
  validates state eligibility and child dependencies before transitioning to Archived,
  while UnarchiveFeatureUseCase restores the previous lifecycle state. Both are registered
  in the DI container with singleton and string-token patterns.

  **Phase 3 (CLI)** adds user-facing commands (feat archive, feat unarchive) and the
  --show-archived flag on feat ls, providing a fast verification path for the use cases
  before tackling the more complex web UI.

  **Phase 4 (Web Server Actions & State)** creates the server action bridge, wires up
  the showArchived toggle state in use-control-center-state, and integrates client-side
  filtering into the deriveGraph pipeline for instant toggle response.

  **Phase 5 (Web Visual Components)** adds the archived node state config (icon, muted
  styling, badge), updates state derivation, adds archive/unarchive controls to feature
  nodes, and integrates the toolbar toggle. Also updates the SSE mapping.

  **Phase 6 (Stories & Polish)** completes the feature with Storybook stories for all
  new components and a full test/build verification pass.
