      - "task-5"
    acceptanceCriteria:
      - "Use case is @injectable() with @inject('IFeatureRepository')"
      - "Resolves feature by findById ?? findByIdPrefix"
      - "Throws if feature not found"
      - "Throws if lifecycle is not Maintain, Pending, or Blocked"
      - "Throws if feature has active (non-archived, non-deleted) children"
