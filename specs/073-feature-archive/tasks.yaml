name: "feature-archive"
summary: >
  18 tasks across 6 phases. Covers domain model changes (TypeSpec enum + field), database
  migration, repository filtering, two use cases with TDD, CLI commands, server actions,
  web UI state management, visual components, SSE integration, and Storybook stories.

relatedFeatures: []
technologies: []

relatedLinks:
  - title: "GitHub Issue #435 - Add archive option for features"
    url: "https://github.com/shep-ai/shep/issues/435"

tasks:
  # ═══════════════════════════════════════════════════════════════════
  # Phase 1: Domain & Infrastructure Foundation
  # ═══════════════════════════════════════════════════════════════════

  - id: "task-1"
    phaseId: "phase-1"
    title: "Add Archived enum value and previousLifecycle field to TypeSpec"
    description: >
      Add Archived to SdlcLifecycle enum in lifecycle.tsp and add optional previousLifecycle
      field (type SdlcLifecycle) to Feature model in feature.tsp. Run pnpm tsp:compile to
      regenerate output.ts. Verify the generated types include the new enum value and field.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "SdlcLifecycle enum in lifecycle.tsp includes Archived with appropriate doc annotation"
      - "Feature model in feature.tsp has previousLifecycle?: SdlcLifecycle optional field"
      - "pnpm tsp:compile succeeds without errors"
      - "Generated output.ts includes SdlcLifecycle.Archived and Feature.previousLifecycle"
    tdd:
      red:
        - "Verify that SdlcLifecycle.Archived does not exist in current generated output (baseline)"
      green:
        - "Add Archived enum value to lifecycle.tsp with doc annotation"
        - "Add previousLifecycle optional field to feature.tsp"
        - "Run pnpm tsp:compile to regenerate output.ts"
      refactor:
        - "Verify doc annotations are consistent with existing enum value style"
    estimatedEffort: "20min"

  - id: "task-2"
    phaseId: "phase-1"
    title: "Create database migration for previous_lifecycle column"
    description: >
      Create migration 044-add-previous-lifecycle.ts that adds a nullable TEXT column
      previous_lifecycle to the features table. Follow the idempotent pattern from migration
      040+ (check table_info before ALTER TABLE). The column stores the lifecycle state
      prior to archiving for restoration on unarchive.
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "Migration file exists at 044-add-previous-lifecycle.ts"
      - "Uses idempotent pattern (check table_info before ALTER TABLE)"
      - "Adds previous_lifecycle TEXT column (nullable, no default)"
      - "down() is a no-op function"
      - "Migration runs without errors"
    tdd:
      red:
        - "Write test that migration adds previous_lifecycle column to features table"
      green:
        - "Create 044-add-previous-lifecycle.ts following the pattern from 040-add-repository-remote-url.ts"
        - "Implement idempotent up() with table_info check"
      refactor:
        - "Ensure naming consistency with existing migrations"
    estimatedEffort: "15min"

  - id: "task-3"
    phaseId: "phase-1"
    title: "Update feature mapper with previous_lifecycle field"
    description: >
      Add previous_lifecycle to FeatureRow interface and update toDatabase() and fromDatabase()
      functions to map between Feature.previousLifecycle and the database column. Follow the
      existing pattern for optional fields (null when undefined, spread when non-null).
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "FeatureRow interface includes previous_lifecycle: string | null"
      - "toDatabase() maps feature.previousLifecycle to previous_lifecycle (null when undefined)"
      - "fromDatabase() maps previous_lifecycle to previousLifecycle using spread pattern"
      - "Existing mapper tests still pass"
    tdd:
      red:
        - "Write test that toDatabase maps previousLifecycle to previous_lifecycle column"
        - "Write test that fromDatabase maps previous_lifecycle back to previousLifecycle"
        - "Write test that null previous_lifecycle results in no previousLifecycle property"
      green:
        - "Add previous_lifecycle to FeatureRow interface"
        - "Add previousLifecycle mapping to toDatabase()"
        - "Add previous_lifecycle mapping to fromDatabase() using spread pattern"
      refactor:
        - "Verify consistency with other optional field mappings (e.g., spec_path, worktree_path)"
    estimatedEffort: "20min"

  - id: "task-4"
    phaseId: "phase-1"
    title: "Add includeArchived filter to repository interface and SQLite implementation"
    description: >
      Add includeArchived?: boolean to FeatureListFilters interface. Update
      SQLiteFeatureRepository.list() to exclude features with lifecycle = Archived by default
      (when includeArchived is falsy), following the exact pattern of includeDeleted.
    state: "Todo"
    dependencies:
      - "task-1"
      - "task-2"
      - "task-3"
    acceptanceCriteria:
      - "FeatureListFilters has includeArchived?: boolean with doc comment"
      - "list() excludes Archived features by default"
      - "list({ includeArchived: true }) includes Archived features"
      - "Filtering is via SQL WHERE clause, not JS post-filter (NFR-2)"
    tdd:
      red:
        - "Write test that list() excludes features with lifecycle=Archived by default"
        - "Write test that list({ includeArchived: true }) includes Archived features"
        - "Write test that list({ lifecycle: SdlcLifecycle.Archived }) still returns Archived features (explicit lifecycle filter overrides exclusion)"
      green:
        - "Add includeArchived to FeatureListFilters in feature-repository.interface.ts"
        - "Add WHERE clause condition in sqlite-feature.repository.ts list() method"
      refactor:
        - "Ensure the condition is placed consistently with includeDeleted (both at the top of conditions array)"
    estimatedEffort: "30min"

  - id: "task-5"
    phaseId: "phase-1"
    title: "Update SQLite repository update() to persist previous_lifecycle"
    description: >
      Add previous_lifecycle to the UPDATE statement in SQLiteFeatureRepository.update() so
      the previousLifecycle field is persisted when archiving/unarchiving features.
    state: "Todo"
    dependencies:
      - "task-3"
    acceptanceCriteria:
      - "UPDATE statement includes previous_lifecycle = @previous_lifecycle"
