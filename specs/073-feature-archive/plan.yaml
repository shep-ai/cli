name: "feature-archive"
summary: >
  Implementation plan for feature archiving. The approach adds Archived as a new SdlcLifecycle
  enum value with a previousLifecycle field for state restoration on unarchive. Filtering follows
  the existing includeDeleted pattern via a SQL WHERE clause. Two focused use cases
  (ArchiveFeatureUseCase, UnarchiveFeatureUseCase) handle business validation. The web UI uses
  client-side filtering for instant toggle response, and the CLI adds dedicated archive/unarchive
  subcommands. All changes are additive and follow established codebase patterns — no new
  libraries required.

relatedFeatures: []

technologies:
  - "TypeSpec (SdlcLifecycle enum, Feature model)"
  - "SQLite / better-sqlite3 (persistence, migrations via umzug)"
  - "tsyringe (DI container for use case registration)"
  - "React Flow / @xyflow/react (canvas rendering, toolbar prop)"
  - "Next.js server actions (archive/unarchive mutations)"
  - "Commander.js (CLI feat archive/unarchive subcommands)"
  - "lucide-react (Archive, ArchiveRestore icons)"
  - "Storybook (component stories)"
  - "sonner (toast notifications)"

relatedLinks:
  - title: "GitHub Issue #435 - Add archive option for features"
    url: "https://github.com/shep-ai/shep/issues/435"

phases:
  - id: "phase-1"
    name: "Domain & Infrastructure Foundation"
    description: >
      Establishes the domain model changes (TypeSpec enum + field), database migration, mapper
      updates, and repository filtering. This phase comes first because every subsequent layer
      (use cases, CLI, web UI) depends on the Archived lifecycle state existing in the generated
      types and the database schema supporting previousLifecycle storage.
    parallel: false

  - id: "phase-2"
    name: "Application Layer — Use Cases & DI"
    description: >
      Creates ArchiveFeatureUseCase and UnarchiveFeatureUseCase with full business validation
      (state eligibility, active children check, previousLifecycle restoration). Registers both
      in the DI container with singleton + string-token aliases. This phase depends on Phase 1
      for the domain types and repository interface changes.
    parallel: false

  - id: "phase-3"
    name: "CLI Commands"
    description: >
      Adds feat archive, feat unarchive subcommands and --show-archived flag to feat ls.
      Follows the existing Commander.js pattern (del.command.ts, start.command.ts). Depends on
      Phase 2 use cases being available in the DI container.
    parallel: false

  - id: "phase-4"
    name: "Web UI — Server Actions & State Management"
    description: >
      Creates archive-feature and unarchive-feature server actions, updates use-control-center-state
      with archive/unarchive handlers and showArchived toggle state, and wires the toggle through
      use-graph-state to deriveGraph for client-side filtering. Depends on Phase 2 for use cases
      and Phase 1 for domain types.
    parallel: false

  - id: "phase-5"
    name: "Web UI — Visual Components & Canvas Integration"
    description: >
      Adds the archived FeatureNodeState config (icon, muted styling, badge), updates
      derive-feature-state to map SdlcLifecycle.Archived, adds archive/unarchive action buttons
      to the feature node, and integrates the toolbar toggle into FeaturesCanvas. Also updates
      the SSE LIFECYCLE_TO_NODE mapping. Depends on Phase 4 for state management and callbacks.
    parallel: false

  - id: "phase-6"
    name: "Storybook Stories & Integration Polish"
    description: >
      Creates colocated Storybook stories for all new/modified UI components (archived node state,
      toolbar toggle, archive/unarchive buttons). Verifies end-to-end behavior across all layers.
      This phase is last because it exercises the complete feature stack.
    parallel: false

