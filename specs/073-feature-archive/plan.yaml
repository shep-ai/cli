content: |
  ## Architecture Overview

  The feature archive capability fits cleanly into the existing Clean Architecture layers:

  **Domain Layer**: A new `Archived` value joins the `SdlcLifecycle` enum alongside existing
  special states (`Blocked`, `Pending`, `Deleting`). A new optional `previousLifecycle` field
  on the Feature entity stores the pre-archive state for restoration — following the same
  pattern as `specPath`, `worktreePath`, and `parentId` (optional fields that only apply in
  certain lifecycle states).

  **Application Layer**: Two focused use cases — `ArchiveFeatureUseCase` and
  `UnarchiveFeatureUseCase` — follow the established pattern of `DeleteFeatureUseCase` and
  `StartFeatureUseCase`: constructor injection via `@inject('IFeatureRepository')`, ID
  resolution via `findById ?? findByIdPrefix`, and throwing `Error` on validation failure.

  **Infrastructure Layer**: The `SQLiteFeatureRepository.list()` method already builds dynamic
  WHERE clauses from `FeatureListFilters`. Adding `includeArchived?: boolean` follows the
  identical `includeDeleted` pattern: when false (default), append `lifecycle != ?` with
  `'Archived'` as the param. A migration adds the `previous_lifecycle` TEXT column, and the
  feature mapper gains the corresponding field mapping.

  **Presentation — CLI**: Dedicated `feat archive <id>` and `feat unarchive <id>` subcommands
  follow the Commander.js pattern of `del.command.ts` and `start.command.ts`. The `feat ls`
  command gains a `--show-archived` flag mirroring the existing `--include-deleted` concept.

  **Presentation — Web**: Server actions follow the `delete-feature.ts` pattern. The canvas
  toggle uses React `useState` in `use-control-center-state` (session-only persistence per
  FR-10). `get-graph-data.ts` always fetches with `includeArchived: true` so the client has
  full data for instant toggle response (NFR-3). `deriveGraph` filters archived features
  before building nodes when the toggle is off.

  ## Key Design Decisions

  ### 1. Lifecycle State vs Soft-Delete (Research Decision #1)
  Archive uses a new `Archived` lifecycle enum value — NOT the soft-delete mechanism. This
  preserves the semantic distinction: archived features have `deletedAt = null` and remain
  fully queryable when the filter is disabled (NFR-5). Overloading `deletedAt` would conflate
  "hidden but preserved" with "actually deleted."

  ### 2. Previous Lifecycle Restoration (Research Decision #2)
  The `previousLifecycle` optional field on Feature is a simple, type-safe approach using the
  existing TypeSpec pattern of optional fields. One nullable TEXT column in SQLite. The
  alternative (metadata table or JSON blob) adds unnecessary complexity for a single scalar.

  ### 3. Separate Use Cases (Research Decision #4)
  Archive and unarchive have different validation rules: archive checks state eligibility +
  active children; unarchive only checks Archived state + previousLifecycle presence. Keeping
  them separate follows the single-responsibility pattern of existing use cases.

  ### 4. Client-Side Toggle Filtering (Research Decision #5)
  The server always returns all features (including archived). The client filters before
  calling `deriveGraph()`. This ensures instant toggle response (NFR-3) without server
  round-trips. The tradeoff is slightly more data transfer, but archived features are
  lightweight (no active agent runs).

  ### 5. Lifecycle Gates Exclusion
  `Archived` is NOT added to `POST_IMPLEMENTATION` in lifecycle-gates.ts. An archived parent
  should not unblock child features — archiving is about hiding, not completing.

  ## Implementation Strategy

  The phases follow strict dependency order — each layer depends on the one below it.
  Domain/infrastructure first (types must exist), then application (use cases need types +
  repository), then presentation (CLI/web need use cases).

  Within presentation, CLI comes before web because CLI commands are simpler (no state
  management) and provide a fast verification that the use cases work correctly. Web UI
  comes last because it has the most moving parts (state management, canvas integration,
  SSE events).

  Storybook stories are grouped in a final phase because they exercise the complete component
  stack and serve as visual verification of all archived states.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec compilation breaks existing generated types | Run `pnpm tsp:compile` immediately after editing .tsp files; verify output.ts diff is additive only (new enum value + new optional field) |
  | Archived features leak into existing queries (feat ls, canvas, SSE) | Default `includeArchived: false` in FeatureListFilters; explicit WHERE clause exclusion. Unit test that list() excludes Archived by default |
  | Unarchive with null previousLifecycle | UnarchiveFeatureUseCase validates previousLifecycle is non-null before proceeding. Unit test for this edge case |
  | Child features orphaned when parent archived | ArchiveFeatureUseCase checks findByParentId for active children; rejects with descriptive error. Unit test for this guard |
  | SSE LIFECYCLE_TO_NODE TypeScript error for missing Archived key | Record<SdlcLifecycle, string> is exhaustive — add Archived mapping immediately after TypeSpec regeneration |
  | Feature node state config incomplete | FeatureNodeState union type enforces exhaustive config — TypeScript will error if archived config is missing |
  | Toggle state persists across page reloads | Use React useState (not localStorage); state naturally resets on component unmount per FR-10 |
