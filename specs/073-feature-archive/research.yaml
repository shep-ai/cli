# Structured technology decisions
decisions:
  - title: "Archive mechanism — lifecycle state vs soft-delete"
    chosen: "New Archived lifecycle state with lifecycle-based filtering"
    rejected:
      - "Reuse soft-delete (deletedAt) — rejected because archived features are NOT deleted. Overloading deletedAt would conflate two distinct concepts (hidden-but-preserved vs actually-deleted), break the existing soft-delete/restore semantics, and make it impossible to soft-delete an archived feature later. NFR-5 explicitly states archived features must retain deletedAt = null."
      - "Separate archived_at timestamp column — rejected because the lifecycle enum already provides a state machine for features. Adding a parallel timestamp creates dual-state tracking (lifecycle + archived_at) that can get out of sync. The lifecycle approach is simpler and consistent with how Deleting, Blocked, and Pending states already work."
    rationale: >
      The codebase already uses SdlcLifecycle as the primary state machine for features. Adding
      Archived as a new enum value follows the established pattern (Deleting, Blocked, Pending are
      all special states outside the main SDLC flow). Filtering by lifecycle in the repository
      list() WHERE clause mirrors the existing includeDeleted pattern without conflating concerns.
      The previousLifecycle field cleanly stores the pre-archive state for restoration.

  - title: "Previous lifecycle storage — new field vs metadata column"
    chosen: "New previousLifecycle optional field on Feature entity via TypeSpec"
    rejected:
      - "Store in a separate metadata/history table — rejected because this is a single scalar value (the pre-archive lifecycle) that has a 1:1 relationship with the feature. A separate table adds unnecessary JOIN complexity and migration overhead for what is just one nullable TEXT column."
      - "Encode in a JSON metadata column — rejected because the Feature entity already has strongly-typed fields for all state. Burying previousLifecycle inside a JSON blob loses type safety and makes it invisible to TypeSpec-generated types. The existing pattern is explicit nullable columns (e.g., specPath, worktreePath, parentId)."
    rationale: >
      The Feature model in TypeSpec already uses optional fields for state that only applies in
      certain conditions (specPath, worktreePath, agentRunId, parentId). Adding previousLifecycle
      as an optional SdlcLifecycle field follows this exact pattern. The generated TypeScript type
      will include it as Feature.previousLifecycle?: SdlcLifecycle, giving full type safety. The
      database migration adds a single previous_lifecycle TEXT column — trivial and consistent with
      prior migrations (e.g., 040-add-repository-remote-url.ts).

  - title: "Repository filtering approach — WHERE clause vs application-level filter"
    chosen: "SQL WHERE clause exclusion in repository list() method"
    rejected:
      - "Application-level filtering (fetch all, filter in JS) — rejected because NFR-2 explicitly requires no separate query or N+1 pattern. For repositories with many features, fetching all and filtering wastes memory and bandwidth. The SQL WHERE clause is the established pattern used for includeDeleted filtering."
    rationale: >
      The SQLiteFeatureRepository.list() method already builds dynamic WHERE clauses based on
      FeatureListFilters (lines 111-134). Adding an includeArchived boolean follows the identical
      pattern as includeDeleted: when false (default), add 'lifecycle != ?' with 'Archived' as
      the param. This keeps filtering at the database level for performance (NFR-2) and requires
      minimal code changes to an existing, well-tested method.

  - title: "Use case architecture — single use case vs combined"
    chosen: "Separate ArchiveFeatureUseCase and UnarchiveFeatureUseCase"
    rejected:
      - "Single ToggleArchiveUseCase — rejected because archive and unarchive have different validation rules (archive checks archivable states + active children; unarchive only checks that lifecycle is Archived). Combining them into one use case with a direction flag muddies the single-responsibility principle and makes testing harder."
      - "Extend UpdateFeatureLifecycleUseCase — rejected because that use case is a generic lifecycle setter with no business validation. Archive needs specific guards (state eligibility, child feature check) that don't belong in a generic updater. Adding conditional logic to the generic use case would violate open/closed principle."
    rationale: >
      The codebase follows a pattern of focused use cases (DeleteFeatureUseCase, StartFeatureUseCase,
      ResumeFeatureUseCase) rather than generic CRUD operations. Each use case encapsulates its own
      validation and business rules. ArchiveFeatureUseCase validates archivable states + no active
      children; UnarchiveFeatureUseCase validates the feature is Archived and has a previousLifecycle.
      Both register in the DI container as singletons with string-token aliases for web routes,
      following the established container.ts pattern.

  - title: "Web UI archive toggle — client-side vs server-side filtering"
    chosen: "Client-side filtering with server data fetch including archived features"
    rejected:
      - "Server-side filtering only (refetch on toggle) — rejected because NFR-3 requires immediate toggle response without server round-trip. Refetching via server action adds latency (DB query + network) every time the user toggles. The canvas already has all feature data in memory via the domain Maps in use-graph-state.ts."
      - "Hybrid (server-side default, client-side toggle with cache) — rejected because it adds complexity with no benefit. The initial server fetch already filters via the repository list() method. The client already maintains a full feature Map. Toggling just needs to filter/unfilter the Map before passing to deriveGraph()."
    rationale: >
      The web UI already maintains in-memory domain Maps (featureMap, repoMap, pendingMap) in
      use-graph-state.ts. The server fetch (get-graph-data.ts) calls ListFeaturesUseCase which
      respects the includeArchived filter. For the toggle, the server fetch should always include
      archived features (includeArchived: true) so the client has full data. The client then
      filters the featureMap before calling deriveGraph() based on the toggle state. This gives
      instant toggle response (NFR-3) while keeping the architecture simple.

  - title: "CLI command structure — subcommands vs flags"
    chosen: "Dedicated archive and unarchive subcommands under feat"
    rejected:
      - "Single feat lifecycle command with --archive/--unarchive flags — rejected because this overloads a generic command with specific business logic. Archive has unique validation (state eligibility, child check) that doesn't fit a generic lifecycle setter."
      - "feat hide/unhide naming — rejected because 'archive' is the domain term used throughout the spec and UI. Using different terminology in the CLI creates confusion."
    rationale: >
      The CLI follows Commander.js patterns with dedicated subcommands for feature actions
      (feat del, feat start, feat resume, feat stop). Adding feat archive and feat unarchive
      follows the same pattern. Each command resolves its use case from the DI container,
      validates inputs, and provides consistent error formatting. The --show-archived flag on
      feat ls mirrors the existing --include-deleted flag pattern.

  - title: "Feature node visual state — new state vs conditional styling"
    chosen: "New 'archived' FeatureNodeState with dedicated config in feature-node-state-config.ts"
    rejected:
      - "Conditional CSS classes applied to existing states — rejected because the state config system (feature-node-state-config.ts) is the established pattern for visual differentiation. It provides icon, border color, label, badge, and progress bar config in one place. Bypassing it with ad-hoc CSS creates inconsistency."
    rationale: >
      The feature-node-state-config.ts file defines a FeatureNodeState union type and a
      STATE_CONFIG record mapping each state to its visual properties (icon, borderClass,
      labelClass, label, etc.). The existing 'deleting' state provides the exact template —
      gray/muted styling with a distinct icon. Adding 'archived' as a new state value with
      Archive icon, gray-500 border, and 'Archived' label follows this pattern perfectly. The
      derive-feature-state.ts function will map SdlcLifecycle.Archived to 'archived' state,
      just as it maps SdlcLifecycle.Deleting to 'deleting'.

  - title: "Database migration numbering"
    chosen: "Migration 044-add-previous-lifecycle.ts"
    rejected:
      - "Bundling with another migration — rejected because each migration should be atomic and focused on a single schema change. The previous_lifecycle column is independent of other changes."
    rationale: >
      The latest migration is 043-default-hide-ci-status-true.ts. Following the sequential
      numbering pattern, the new migration will be 044. The migration uses the idempotent
      pattern (check table_info before ALTER TABLE) established in migration 040+. It adds
      a single nullable TEXT column — no DEFAULT, no NOT NULL, no index needed (lifecycle-based
      filtering uses the existing lifecycle column, not previous_lifecycle).

  - title: "SSE LIFECYCLE_TO_NODE mapping for Archived"
    chosen: "Map Archived to 'archived' node name"
    rejected:
      - "Map to 'blocked' (reuse existing) — rejected because this would cause archived features to show as blocked in the SSE event stream, which is semantically incorrect. The UI needs to distinguish archived from blocked for proper rendering."
      - "Omit from mapping (don't emit events) — rejected because the LIFECYCLE_TO_NODE mapping is typed as Record<SdlcLifecycle, string>, meaning every enum value must have a mapping. Omitting Archived would cause a TypeScript error."
    rationale: >
      The LIFECYCLE_TO_NODE record in route.ts must be exhaustive (it's typed as
      Record<SdlcLifecycle, string>). Adding Archived with its own 'archived' node name
      ensures the SSE event stream correctly identifies archive transitions. The UI's
      derive-feature-state.ts will use this to render the archived visual state.

