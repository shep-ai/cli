openQuestions:
  - question: "Should archived features be fetched from the server at all when the toggle is off?"
    resolved: true
    options:
      - option: "Always fetch archived features, filter client-side"
        description: "Server always returns all features (includeArchived: true). Client filters before deriveGraph(). Instant toggle, simpler server logic, slightly more data transferred."
        selected: true
      - option: "Only fetch archived features when toggle is on"
        description: "Server respects the toggle via query param. Less data when toggle is off, but toggling requires a server round-trip and refetch."
        selected: false
      - option: "Lazy-load archived features on first toggle"
        description: "Default fetch excludes archived. First toggle triggers a one-time fetch of archived features that are cached client-side. Complex state management for edge case."
        selected: false
    selectionRationale: >
      NFR-3 requires immediate toggle response without server round-trip. The simplest way to
      achieve this is always having archived features in the client's featureMap. Since archived
      features are lightweight (no active agent runs, no SSE polling overhead), the additional
      data transfer is negligible. The get-graph-data.ts server function will pass
      includeArchived: true when fetching, and the client's deriveGraph filtering handles the
      toggle state.

  - question: "Should the findByParentId method exclude archived children when checking for active children?"
    resolved: true
    options:
      - option: "Filter out archived children in the use case logic"
        description: "Call findByParentId (which returns all children), then filter in JS to exclude those with lifecycle = Archived. Simple, no repository changes needed."
        selected: true
      - option: "Add an excludeArchived parameter to findByParentId"
        description: "Modify the repository interface to accept a filter. More SQL-efficient but changes an interface used by other features (delete cascade)."
        selected: false
      - option: "Create a separate findActiveChildrenByParentId method"
        description: "New repository method that excludes archived and deleted children. Clean separation but adds API surface area for a single use case."
        selected: false
    selectionRationale: >
      The existing findByParentId intentionally includes all children (including soft-deleted)
      for cascade operations. Modifying it would change behavior for delete cascades. Since the
      ArchiveFeatureUseCase only needs to check if active (non-archived, non-deleted) children
      exist, filtering the result in JS is straightforward: children.filter(c => c.lifecycle !==
      'Archived' && !c.deletedAt). The child count is typically small (< 10), so the JS filter
      has no performance impact.

  - question: "How should the archive toggle state be managed in the web UI?"
    resolved: true
    options:
      - option: "React useState in the ControlCenter component"
        description: "Simple local state, resets on page reload. No persistence, no URL params. Minimal implementation matching the spec's 'persists during session but resets on reload' requirement."
        selected: true
      - option: "URL search parameter (?showArchived=true)"
        description: "Toggle state in the URL allows sharing and bookmarking. But adds complexity (URL sync, router integration) for a transient filter toggle."
        selected: false
      - option: "localStorage persistence"
        description: "Toggle state survives page reloads. Better UX for users who always want to see archived, but contradicts the spec's 'resets on reload' requirement."
        selected: false
    selectionRationale: >
      The spec (FR-10) explicitly states the toggle 'persists during the session but resets on
      page reload.' React useState is the exact match for this behavior — it persists across
      re-renders within the same page lifecycle but resets when the component unmounts (page
      reload/navigation). No external state management needed.

content: |
  ## Status

  - **Phase:** Research
  - **Updated:** 2026-03-20

  ## Technology Decisions

  ### 1. Archive Mechanism — Lifecycle State vs Soft-Delete

  **Chosen:** New `Archived` lifecycle state with lifecycle-based filtering

  **Rejected:**
  - Reuse soft-delete (`deletedAt`) — conflates two distinct concepts; archived features must retain `deletedAt = null` per NFR-5
  - Separate `archived_at` timestamp — creates dual-state tracking that can get out of sync with lifecycle

  **Rationale:** The codebase uses `SdlcLifecycle` as the primary state machine. Adding `Archived` as a new enum value follows the pattern of special states (`Deleting`, `Blocked`, `Pending`). Filtering by lifecycle in the repository `list()` WHERE clause mirrors the `includeDeleted` pattern without conflating concerns.

  ### 2. Previous Lifecycle Storage

  **Chosen:** New `previousLifecycle` optional field on Feature entity via TypeSpec

  **Rejected:**
  - Separate metadata/history table — unnecessary JOIN complexity for a single scalar value
  - JSON metadata column — loses type safety and TypeSpec integration

  **Rationale:** The Feature model already uses optional fields for conditional state (`specPath`, `worktreePath`, `agentRunId`). Adding `previousLifecycle?: SdlcLifecycle` follows this pattern. Database migration adds one nullable TEXT column (`previous_lifecycle`), trivial and consistent with prior migrations.

  ### 3. Repository Filtering

  **Chosen:** SQL WHERE clause exclusion in `list()` method

  **Rejected:**
  - Application-level filtering — violates NFR-2 (no separate query), wastes memory for large feature sets

  **Rationale:** `SQLiteFeatureRepository.list()` already builds dynamic WHERE clauses from `FeatureListFilters`. Adding `includeArchived` boolean follows the identical `includeDeleted` pattern: when false (default), append `lifecycle != ?` with `'Archived'` param.

  ### 4. Use Case Architecture

  **Chosen:** Separate `ArchiveFeatureUseCase` and `UnarchiveFeatureUseCase`

  **Rejected:**
  - Single `ToggleArchiveUseCase` — different validation rules for each direction
  - Extend `UpdateFeatureLifecycleUseCase` — generic setter has no business validation

  **Rationale:** Follows the established focused use case pattern (`DeleteFeatureUseCase`, `StartFeatureUseCase`). Each encapsulates its own validation. Both register in DI with singleton + string-token aliases.

  ### 5. Web UI Toggle — Client-Side Filtering

  **Chosen:** Client-side filtering with full data fetch (always include archived)

  **Rejected:**
  - Server-side filtering only — violates NFR-3 (immediate toggle without server round-trip)
  - Hybrid approach — unnecessary complexity

  **Rationale:** `get-graph-data.ts` fetches with `includeArchived: true`. The client's `featureMap` contains all features. Toggle filters the Map before calling `deriveGraph()`. Instant response, zero server calls on toggle.

  ### 6. CLI Command Structure

  **Chosen:** Dedicated `feat archive` and `feat unarchive` subcommands

  **Rejected:**
  - Generic lifecycle command with flags — overloads a generic command with specific logic
  - `feat hide/unhide` naming — inconsistent with domain terminology

  **Rationale:** Follows Commander.js pattern of dedicated subcommands (`feat del`, `feat start`, `feat resume`). `--show-archived` flag on `feat ls` mirrors `--include-deleted`.

  ### 7. Feature Node Visual State

  **Chosen:** New `'archived'` FeatureNodeState with config in `feature-node-state-config.ts`

  **Rejected:**
  - Conditional CSS classes — bypasses the established state config system

  **Rationale:** `feature-node-state-config.ts` defines visual properties per state. The `'deleting'` state provides the exact template — gray/muted styling. Adding `'archived'` with `Archive` icon and gray-500 border follows this pattern. `derive-feature-state.ts` maps `SdlcLifecycle.Archived` to `'archived'`.

  ### 8. Database Migration

  **Chosen:** Migration `044-add-previous-lifecycle.ts`

  **Rejected:**
  - Bundling with another migration — each migration should be atomic

  **Rationale:** Next sequential number after 043. Single nullable TEXT column, idempotent `table_info` check pattern.

  ### 9. SSE LIFECYCLE_TO_NODE Mapping

  **Chosen:** Map `Archived` to `'archived'` node name

  **Rejected:**
  - Map to `'blocked'` — semantically incorrect, UI can't distinguish
  - Omit from mapping — `Record<SdlcLifecycle, string>` type requires exhaustive coverage

  **Rationale:** Exhaustive Record type forces a mapping for every enum value. Using a distinct `'archived'` name lets the UI render the correct visual state via SSE events.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | TypeSpec | Domain model enum + field | Use (existing) | Already used for all domain models. Add `Archived` enum value and `previousLifecycle` field. |
  | better-sqlite3 | Database persistence | Use (existing) | Already used. Add `previous_lifecycle` column via umzug migration. |
  | tsyringe | DI container | Use (existing) | Already used. Register new use cases as singletons + string-token aliases. |
  | umzug | Migration framework | Use (existing) | Already used. Create migration 044 following established pattern. |
  | @xyflow/react | Canvas rendering | Use (existing) | FeaturesCanvas already accepts `toolbar` prop for injecting controls. |
  | Commander.js | CLI commands | Use (existing) | Already used. Add `archive`/`unarchive` subcommands following `del` pattern. |
  | lucide-react | Icons | Use (existing) | Already available. Use `Archive` and `ArchiveRestore` icons. |
  | sonner | Toast notifications | Use (existing) | Already used in `use-control-center-state.ts` for action feedback. |
  | @inquirer/prompts | CLI confirmation | Use (existing) | Already used in `del.command.ts` for interactive prompts. |

  **No new libraries needed.** All implementation uses existing dependencies.

  ## Security Considerations

  - **Authorization**: Archive/unarchive operations go through the same use case layer as all feature mutations. No new auth surface — the web UI uses server actions, CLI uses the DI container.
  - **Data integrity**: `previousLifecycle` is write-only from the use case layer (NFR-6). No public API exposes it for direct editing. The field is set atomically with the lifecycle transition.
  - **Input validation**: ArchiveFeatureUseCase validates (1) feature exists, (2) lifecycle is in archivable set (Maintain/Pending/Blocked), (3) no active children. UnarchiveFeatureUseCase validates (1) feature exists, (2) lifecycle is Archived, (3) previousLifecycle is not null.
  - **No git operations**: Archive triggers zero git operations (no branch cleanup, no PR operations). This eliminates the security surface of unintended repository modifications.

  ## Performance Implications

  - **Archive/unarchive latency**: Single `UPDATE features SET lifecycle = ?, previous_lifecycle = ?, updated_at = ? WHERE id = ?` — well under NFR-1's 100ms target.
  - **List filtering**: WHERE clause `lifecycle != 'Archived'` uses the existing `lifecycle` column. No new index needed — the column is low-cardinality and the table scan for small-to-medium feature counts is negligible.
  - **Client-side toggle**: Filtering the in-memory `featureMap` before `deriveGraph()` is O(n) where n = feature count. For typical usage (< 100 features), this is sub-millisecond.
  - **SSE polling**: No impact. Archived features have no active agent runs, so they generate no SSE delta events. The 500ms poll interval is unchanged.
  - **Data transfer**: Fetching archived features in `get-graph-data.ts` adds minimal payload — archived features are just additional rows with no attached agent run data.

  ## Architecture Notes

  ### Domain Layer Changes
  - `tsp/common/enums/lifecycle.tsp` — add `Archived` enum value
  - `tsp/domain/entities/feature.tsp` — add `previousLifecycle?: SdlcLifecycle` field
  - `packages/core/src/domain/lifecycle-gates.ts` — no changes needed (Archived is excluded by omission from `POST_IMPLEMENTATION` set)
  - Run `pnpm tsp:compile` to regenerate `output.ts`

  ### Application Layer Changes
  - `feature-repository.interface.ts` — add `includeArchived?: boolean` to `FeatureListFilters`
  - New `ArchiveFeatureUseCase` — validate state + no active children, set lifecycle to Archived, store previousLifecycle
  - New `UnarchiveFeatureUseCase` — validate Archived state, restore previousLifecycle, clear previousLifecycle
  - `container.ts` — register both use cases (singleton + string-token alias)

  ### Infrastructure Layer Changes
  - `sqlite-feature.repository.ts` — add `includeArchived` filtering to `list()` WHERE clause
  - `feature.mapper.ts` — add `previous_lifecycle` to `FeatureRow`, `toDatabase()`, `fromDatabase()`
  - New migration `044-add-previous-lifecycle.ts` — ALTER TABLE features ADD COLUMN previous_lifecycle TEXT

  ### Presentation Layer — Web
  - `get-graph-data.ts` — fetch with `includeArchived: true`
  - `derive-graph.ts` — accept `showArchived` param, filter features before building nodes/edges
  - `feature-node-state-config.ts` — add `'archived'` state config
  - `derive-feature-state.ts` — map `SdlcLifecycle.Archived` to `'archived'`
  - `feature-node.tsx` — add archive/unarchive hover buttons
  - `features-canvas.tsx` — toolbar receives toggle from parent
  - `use-control-center-state.ts` — add `showArchived` state, `handleArchiveFeature()`, `handleUnarchiveFeature()`
  - `use-graph-state.ts` — pass `showArchived` flag to deriveGraph
  - New server actions: `archive-feature.ts`, `unarchive-feature.ts`
  - `route.ts` (SSE) — add `Archived` to `LIFECYCLE_TO_NODE` mapping

  ### Presentation Layer — CLI
  - New `archive.command.ts` — `feat archive <id>` with confirmation + `--force` flag
  - New `unarchive.command.ts` — `feat unarchive <id>`
  - `ls.command.ts` — add `--show-archived` flag, display archived status in muted styling

  ### Key Patterns to Follow
  - **Use case pattern**: Constructor injection via `@inject('IFeatureRepository')`, ID resolution via `findById ?? findByIdPrefix`, throw Error on validation failure
  - **DI registration**: `container.registerSingleton(UseCase)` + `container.register('UseCaseName', { useFactory })` for string-token alias
  - **Server action pattern**: `'use server'` directive, `resolve<T>('TokenName')`, return `{ feature?, error? }`
  - **CLI command pattern**: Commander subcommand with `.argument('<id>')`, `.option()`, `.action()`, confirmation via `@inquirer/prompts`
  - **Feature node state**: Add to `FeatureNodeState` union type, add config to `STATE_CONFIG` record
  - **Migration pattern**: Check `table_info` before ALTER TABLE, no-op `down()` function
