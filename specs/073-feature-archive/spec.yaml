content: |
  ## Problem Statement

  All features are always visible on the web UI canvas, regardless of their lifecycle state.
  As users create more features over time, the canvas becomes cluttered with completed
  (Maintain) or inactive features that no longer need active attention. There is currently
  no way to hide a feature from the canvas without deleting it entirely — which permanently
  removes the feature's conversation history, plan, artifacts, and triggers git branch cleanup.

  Users need a lightweight way to "archive" features to declutter the canvas while preserving
  all data for future reference. The archive action must be non-destructive, easily reversible,
  and available from both the web UI and CLI.

  ## Success Criteria

  - [ ] New `Archived` lifecycle state added to SdlcLifecycle enum via TypeSpec
  - [ ] Generated TypeScript types include `Archived` after `pnpm tsp:compile`
  - [ ] Features in Maintain, Pending, or Blocked states can be archived via web UI
  - [ ] Features in Maintain, Pending, or Blocked states can be archived via CLI (`shep feat archive <id>`)
  - [ ] Archiving a feature with active (non-archived) children is rejected with a clear error
  - [ ] Archived features are hidden from the canvas by default
  - [ ] Archived features are hidden from `shep feat ls` by default
  - [ ] Toolbar toggle in the web UI canvas shows/hides archived features
  - [ ] Archived features appear dimmed with an ARCHIVED badge when shown
  - [ ] CLI flag `--show-archived` on `shep feat ls` includes archived features
  - [ ] Features can be unarchived via web UI context menu (restores previous lifecycle state)
  - [ ] Features can be unarchived via CLI (`shep feat unarchive <id>`)
  - [ ] Previous lifecycle state is stored and restored on unarchive
  - [ ] Archived features retain all data (messages, plan, artifacts, git branches)
  - [ ] No git branch cleanup or PR operations are triggered by archiving
  - [ ] Archive/unarchive state changes propagate via SSE for real-time canvas updates
  - [ ] Storybook stories for all new/modified UI components
  - [ ] Unit tests for ArchiveFeatureUseCase and UnarchiveFeatureUseCase
  - [ ] Unit tests for repository filtering of archived features
  - [ ] Integration tests for CLI archive/unarchive commands

  ## Functional Requirements

  - **FR-1**: Add an `Archived` value to the `SdlcLifecycle` enum in TypeSpec (`tsp/common/enums/lifecycle.tsp`). Regenerate TypeScript types via `pnpm tsp:compile`.

  - **FR-2**: Add a `previousLifecycle` field to the Feature entity (TypeSpec model) to store the lifecycle state prior to archiving. This field is nullable and only populated when the feature is in the Archived state.

  - **FR-3**: Create an `ArchiveFeatureUseCase` that transitions a feature's lifecycle to `Archived`, storing the current lifecycle in `previousLifecycle`. The use case must validate that the feature is in an archivable state (Maintain, Pending, or Blocked) and that no active (non-archived) child features exist.

  - **FR-4**: Create an `UnarchiveFeatureUseCase` that restores a feature's lifecycle from `Archived` to its `previousLifecycle` value, then clears `previousLifecycle`.

  - **FR-5**: Add `includeArchived` boolean to `FeatureListFilters`. Default: `false`. When `false`, the repository `list()` method must exclude features with `lifecycle = 'Archived'`.

  - **FR-6**: Update `SQLiteFeatureRepository.list()` to exclude Archived features by default (when `includeArchived` is not `true`), following the same pattern as `includeDeleted`.

  - **FR-7**: Add a database migration to add the `previous_lifecycle` column to the features table (TEXT, nullable).

  - **FR-8**: Create `archive-feature` and `unarchive-feature` Next.js server actions following the existing pattern (resolve use case from DI, return `{ feature?, error? }`).

  - **FR-9**: Add archive/unarchive controls to the feature node in the web UI. Archive button appears on hover for features in archivable states (Maintain, Pending, Blocked). Unarchive button appears for features in Archived state (when show-archived toggle is on). No confirmation dialog required for either action.

  - **FR-10**: Add a toolbar toggle button inside the FeaturesCanvas (using the existing `toolbar` prop pattern) that controls whether archived features are included in the graph. Default: hidden. The toggle persists during the session but resets on page reload.

  - **FR-11**: When the show-archived toggle is enabled, archived features render with reduced opacity and an "ARCHIVED" badge. Add `archived` to `FeatureNodeState` with gray/muted styling similar to `deleting`.

  - **FR-12**: Add `shep feat archive <id>` CLI command. Resolves the feature by ID prefix, validates archivable state, and executes `ArchiveFeatureUseCase`. Supports `--force` flag to skip confirmation.

  - **FR-13**: Add `shep feat unarchive <id>` CLI command. Resolves the feature by ID prefix and executes `UnarchiveFeatureUseCase`.

  - **FR-14**: Add `--show-archived` flag to `shep feat ls` command. When present, includes archived features in the output. Archived features display with a distinct status indicator (e.g., muted "Archived" label).

  - **FR-15**: Update the SSE event route (`agent-events/route.ts`) to handle the `Archived` lifecycle state in the `LIFECYCLE_TO_NODE` mapping, so archive/unarchive transitions propagate to the canvas in real-time.

  - **FR-16**: Update `deriveGraph` to respect the archived filter state, excluding archived features from nodes and edges when the toggle is off.

  - **FR-17**: Update lifecycle gates (`lifecycle-gates.ts`) to exclude `Archived` from `POST_IMPLEMENTATION` gate. Archived features should not count as satisfying parent completion gates for child feature unblocking.

  ## Non-Functional Requirements

  - **NFR-1**: Archive and unarchive operations must complete within 100ms (single database update, no git operations or external API calls).

  - **NFR-2**: The repository `list()` filtering must not require a separate database query for archived features — the exclusion must be part of the existing WHERE clause to avoid N+1 performance issues.

  - **NFR-3**: The toolbar toggle state must update the canvas immediately (client-side filtering) without requiring a server round-trip when toggling between show/hide archived.

  - **NFR-4**: All new UI components (toolbar toggle, archive button, archived badge) must have colocated Storybook stories with both archived-visible and archived-hidden states demonstrated.

  - **NFR-5**: The archive feature must not affect existing soft-delete behavior. Archived features are NOT soft-deleted — they retain `deletedAt = null` and remain fully queryable when the archive filter is disabled.

  - **NFR-6**: The `previousLifecycle` field must not be exposed or editable through any public API beyond the archive/unarchive use cases. It is an internal implementation detail for state restoration.

  - **NFR-7**: CLI commands must follow existing patterns — DI container resolution, consistent error formatting, and exit codes (0 for success, 1 for errors).

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Which lifecycle states should be eligible for archiving? | Terminal and idle states only (Maintain, Pending, Blocked) | Covers the primary use case while preventing archiving of features with active agent work |
  | 2 | What should happen to child features when a parent is archived? | Block archiving if active children exist | Prevents orphaned children on the canvas; user must handle children first |
  | 3 | Should unarchive restore the previous lifecycle state? | Yes, store and restore previous lifecycle | Best UX — features return exactly where they were; trivial schema addition |
  | 4 | Where should the archive toggle appear in the web UI? | Toolbar toggle button inside the canvas | Follows existing toolbar prop pattern on FeaturesCanvas; most discoverable |
  | 5 | Should the archive action require confirmation? | No confirmation needed | Archive is non-destructive and trivially reversible; no data loss or git operations |
  | 6 | How should archived features appear when shown? | Dimmed/faded with an ARCHIVED badge | Clear visual distinction from active features; follows muted styling pattern |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `tsp/common/enums/lifecycle.tsp` | High | Add `Archived` to SdlcLifecycle enum |
  | `tsp/` (Feature model) | Medium | Add `previousLifecycle` field to Feature |
  | `packages/core/src/domain/generated/output.ts` | High | Regenerated from TypeSpec changes |
  | `packages/core/src/application/ports/output/repositories/feature-repository.interface.ts` | Medium | Add `includeArchived` to FeatureListFilters |
  | `packages/core/src/infrastructure/repositories/sqlite-feature.repository.ts` | Medium | Update list() queries to exclude Archived by default |
  | `packages/core/src/infrastructure/database/migrations/` | Medium | New migration for previous_lifecycle column |
  | `packages/core/src/application/use-cases/features/` | Medium | New ArchiveFeatureUseCase and UnarchiveFeatureUseCase |
  | `packages/core/src/domain/lifecycle-gates.ts` | Low | Exclude Archived from POST_IMPLEMENTATION gate |
  | `src/presentation/cli/commands/feat/` | Medium | New `archive` and `unarchive` subcommands, `--show-archived` flag on ls |
  | `src/presentation/web/app/actions/` | Medium | New archive-feature and unarchive-feature server actions |
  | `src/presentation/web/components/common/feature-node/` | Medium | Archive/unarchive buttons, archived visual state, ARCHIVED badge |
  | `src/presentation/web/components/common/feature-node/feature-node-state-config.ts` | Low | Add `archived` state config with muted styling |
  | `src/presentation/web/components/features/features-canvas/` | Medium | Toolbar toggle for showing/hiding archived features |
  | `src/presentation/web/hooks/use-graph-state.ts` | Low | Handle archived state in domain maps |
  | `src/presentation/web/lib/derive-graph.ts` | Medium | Filter archived features from derived graph |
  | `src/presentation/web/app/(dashboard)/get-graph-data.ts` | Low | Pass archive filter through to use case |
  | `src/presentation/web/app/api/agent-events/route.ts` | Low | Add Archived to LIFECYCLE_TO_NODE mapping |
  | `src/presentation/cli/commands/feat/ls.command.ts` | Low | Add --show-archived flag, display archived status |
  | `tests/` | High | Unit tests for use cases, repository, CLI; component stories |

  ## Dependencies

  - **Existing soft-delete infrastructure** — The archive pattern follows the same
    filtering approach (exclude by default, include with flag) but uses lifecycle state
    rather than deletedAt timestamp, since archived features are NOT deleted.
  - **TypeSpec compiler** — Must regenerate domain types after adding Archived enum value
    and previousLifecycle field.
  - **Feature lifecycle context** — The lifecycle-context.ts and lifecycle-gates.ts files
    need awareness of Archived state to prevent invalid transitions and exclude from gates.
  - **SSE event system** — Archive/unarchive state changes must propagate via SSE for
    real-time canvas updates.
  - **Database migrations** — New migration for the previous_lifecycle column must run
    before any archive operations.
  - **Feature parent-child relationships** — ArchiveFeatureUseCase must check for active
    children via IFeatureRepository.findByParentId().

  ## Size Estimate

  **M** — This feature touches multiple layers (domain, application, infrastructure,
  presentation) but follows well-established patterns in the codebase. The soft-delete
  infrastructure provides a clear blueprint for archive filtering. Most changes are
  additive (new enum value, new field, new use cases, new CLI commands, new UI controls)
  rather than refactoring existing code. The previousLifecycle field adds one migration
  and one column. The main implementation risk is ensuring consistent filtering across
  all query paths (repository list, SSE polling, graph derivation).

