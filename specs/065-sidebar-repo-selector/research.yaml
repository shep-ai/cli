  - question: 'How should the selected repository state be managed in the form?'
    resolved: true
    options:
      - option: New selectedRepositoryPath state in FeatureCreateDrawer
        description: >
          Add a useState for selectedRepoPath, initialized to repositoryPath. When repositoryPath
          is empty, the combobox sets this state. The form submit uses selectedRepoPath instead of
          the prop directly. Simple and follows the same pattern as parentId state.
        selected: true
      - option: Lift state to CreateDrawerClient
        description: >
          Manage selected repo in the client wrapper and pass it down. Adds prop drilling and
          splits form state across two components unnecessarily.
        selected: false
      - option: Use URL query parameter for selected repo
        description: >
          Update the URL with ?repo=selected when user picks a repo in the combobox. This would
          cause a server component re-render (since CreateDrawerPage reads searchParams),
          introducing a round-trip for every selection change.
        selected: false
    selectionRationale: >
      The FeatureCreateDrawer already manages all form state internally (description, parentId,
      approvalGates, etc.). Adding selectedRepoPath as another piece of form state is the
      natural extension. When repositoryPath prop is non-empty (canvas flow), selectedRepoPath
      initializes to that value and the combobox is hidden. When empty (sidebar flow), the user
      selects via combobox and the state updates. The handleSubmit function already reads
      repositoryPath from the prop — it will instead read from this new state.

