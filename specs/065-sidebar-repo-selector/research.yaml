      stories should get new variants showing the repo selector mode.

# Markdown content (the full research document)
content: |
  ## Technology Decisions

  ### 1. Sidebar Button Visibility Strategy

  **Chosen:** Remove `showNewFeature` prop — always render the button

  **Rejected:**
  - Keep `showNewFeature` prop and set to `true` in AppShell — unnecessary indirection; the prop was a temporary workaround from feature 057
  - Feature-flag the button via featureFlags context — over-engineered for core navigation

  **Rationale:** The `showNewFeature` prop was a temporary workaround to hide a non-functional button. Now that we're adding repo selection capability, the button should always be visible. Removing the prop simplifies the `AppSidebar` interface. The `AppShell` already passes `onNewFeature` but not `showNewFeature`, so removing the prop makes the API consistent.

  ### 2. Repository Combobox Component Approach

  **Chosen:** New `RepositoryCombobox` component following the existing `ParentFeatureCombobox` pattern (Popover + Input + role=listbox buttons)

  **Rejected:**
  - Use shadcn/ui Command primitives — `ParentFeatureCombobox` deliberately avoids Command; consistency within the same form matters more
  - Use third-party library (cmdk, downshift) — adds bundle weight (NFR-7: 50KB limit), new dependency, deviates from established patterns

  **Rationale:** The `ParentFeatureCombobox` at lines 877-1012 of `feature-create-drawer.tsx` uses a proven, lightweight pattern: Popover trigger with `role="combobox"`, plain Input for search, native buttons with `role="option"` and `aria-selected`. Zero new dependencies, fully accessible, and testable. The `RepositoryCombobox` mirrors this pattern with consumer-owned filtering on name and path.

  ### 3. Repository Data Flow Architecture

  **Chosen:** Server-side fetch in `CreateDrawerPage` via `ListRepositoriesUseCase`, passed as props through `CreateDrawerClient` → `FeatureCreateDrawer`

  **Rejected:**
  - Client-side fetch via useEffect — violates NFR-6 (no new client-side fetching), introduces spinners and layout shift (NFR-1 violation)
  - Fetch in dashboard layout via context — over-couples repos to entire dashboard, adds unnecessary re-renders

  **Rationale:** `CreateDrawerPage` already resolves `ListFeaturesUseCase` from DI and passes data as props to `CreateDrawerClient`. Adding `ListRepositoriesUseCase` follows the identical pattern. Repos are available at render time = interactive within 100ms (NFR-1), no layout shift, no loading states.

  ### 4. Conditional Rendering Strategy

  **Chosen:** Show combobox when `repositoryPath` is empty; show read-only repo name when provided

  **Rejected:**
  - Always show combobox with pre-selected repo — adds complexity for canvas flow; users shouldn't change repo from canvas context
  - Always show but disable when repo provided — confusing UX, implies change is possible

  **Rationale:** Spec requires conditional rendering (FR-5, FR-9). Matches the existing conditional pattern for `ParentFeatureCombobox` (line 655). An empty `repositoryPath` string signals "no repo context" — the same sentinel value already used by the existing code.

  ### 5. Disabled Button State for Zero Repositories

  **Chosen:** Render button always, disable with Tooltip "Add a repository first" when no repos exist

  **Rejected:**
  - Hide button entirely — undiscoverable for new users
  - Show enabled button, error in drawer — dead-end UX flow

  **Rationale:** FR-10 explicitly requires visible-but-disabled with tooltip. The shadcn/ui Tooltip is already used extensively. `AppSidebar` needs a new `repositoryCount` prop (or `hasRepositories` boolean) to control disabled state.

  ### 6. Repository Count Data Source for Sidebar

  **Chosen:** Fetch repository count in dashboard layout server component, pass to `AppShell` → `AppSidebar`

  **Rejected:**
  - New SidebarRepositoriesProvider with client-side fetch — violates NFR-6, adds complexity for a single integer
  - Extend SidebarFeaturesProvider to include repos — mixes concerns of different domain entities

  **Rationale:** The dashboard layout already calls `getGraphData()` server-side. If this data includes repositories (likely, since the canvas shows repo nodes), the count can be derived without an additional call. If not, a simple `ListRepositoriesUseCase.execute()` call is added to the layout.

  ### 7. Form Submit Button Disabled Logic

  **Chosen:** Extend existing disabled condition: `disabled={!description.trim() || isSubmitting || needsRepo}`

  **Rejected:**
  - Validate on submit with error toast — poor UX; disabled state is more discoverable
  - HTML5 required on hidden input — fragile with custom combobox

  **Rationale:** The submit button already checks `!description.trim() || isSubmitting` (line 527). Adding a `needsRepo` check (true when `repositoryPath` is empty AND no repo selected in combobox) is a simple extension providing clear visual feedback.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | shadcn/ui Popover | Combobox container | Use (existing) | Already used by ParentFeatureCombobox — no new dependency |
  | shadcn/ui Input | Search field | Use (existing) | Already imported in feature-create-drawer |
  | shadcn/ui Tooltip | Disabled button tooltip | Use (existing) | Already used in AppSidebar and create drawer |
  | shadcn/ui Button | Combobox trigger | Use (existing) | Already imported |
  | lucide-react (ChevronsUpDown, CheckIcon) | Combobox icons | Use (existing) | Already imported in feature-create-drawer |
  | cmdk | Alternative combobox | Reject | Adds ~5KB gzipped, not used by ParentFeatureCombobox pattern |
  | downshift | Alternative combobox | Reject | ~14KB gzipped, heavy for this use case |
  | @radix-ui/react-select | Alternative dropdown | Reject | Select is for static lists; we need search/filter capability |
  | ListRepositoriesUseCase | Fetch tracked repos | Use (existing) | Already implemented in core, injectable via DI |
  | tsyringe resolve() | DI resolution | Use (existing) | Standard pattern for server components in this codebase |

  ## Security Considerations

  - **No new attack surface**: The repository list flows from server to client via props, not user input. No user-supplied strings are used in queries or commands.
  - **Path validation**: The `repositoryPath` used in `createFeature` server action is already validated server-side (returns error if empty). The combobox provides values from the server-fetched repository list, so the path is always a known-good value from the database.
  - **No XSS risk**: Repository names and paths are rendered as text content, not dangerouslySetInnerHTML. React's default escaping handles this.
  - **No CSRF concern**: The `createFeature` server action already uses Next.js server action security (automatic CSRF protection via action IDs).

  ## Performance Implications

  - **Zero new client-side fetches**: All repository data flows from server components via props (NFR-6 compliance).
  - **No bundle size increase**: No new npm dependencies. The RepositoryCombobox reuses existing shadcn/ui primitives already in the bundle.
  - **Minimal render overhead**: The combobox renders a flat list of repositories. With typical repo counts (<50), no virtualization is needed. If virtualization becomes necessary in the future, it can be added without API changes.
  - **Server component overhead**: One additional `ListRepositoriesUseCase.execute()` call in the create drawer page. This is a simple database read with no joins — negligible latency (<10ms typical).
  - **No layout shift**: Repositories are pre-fetched server-side, so the combobox renders with data immediately (NFR-1 compliance).

  ## Architecture Notes

  ### Component Hierarchy (Modified)

  ```
  Dashboard Layout (server)
    ├── AppShell (client) — now receives repositoryCount prop
    │   └── AppSidebar — showNewFeature prop REMOVED, new hasRepositories prop
    │       └── SidebarFooter — always renders "New feature" button (disabled if no repos)
    └── @drawer/create/page.tsx (server) — adds ListRepositoriesUseCase
        └── CreateDrawerClient (client) — new repositories prop
            └── FeatureCreateDrawer (client) — new repositories prop, new selectedRepoPath state
                ├── RepositoryCombobox (when repositoryPath is empty)
                └── Read-only repo label (when repositoryPath is provided)
  ```

  ### Data Flow

  ```
  Server: ListRepositoriesUseCase.execute()
    → CreateDrawerPage passes repos as prop
    → CreateDrawerClient threads repos to FeatureCreateDrawer
    → FeatureCreateDrawer renders RepositoryCombobox with repos
    → User selects repo → selectedRepoPath state updated
    → Form submit includes selectedRepoPath in payload
  ```

  ### Files to Modify

  | File | Change | Impact |
  | ---- | ------ | ------ |
  | `app-sidebar.tsx` | Remove `showNewFeature` prop, add `hasRepositories` prop, always render button, add disabled+tooltip state | Medium |
  | `app-shell.tsx` | Remove `showNewFeature` usage, pass `hasRepositories` to AppSidebar | Low |
  | `app/(dashboard)/layout.tsx` | Fetch repository count, pass to AppShell | Low |
  | `app/(dashboard)/@drawer/create/page.tsx` | Resolve ListRepositoriesUseCase, pass repos to CreateDrawerClient | Low |
  | `create-drawer-client.tsx` | Accept and thread `repositories` prop | Low |
  | `feature-create-drawer.tsx` | Add RepositoryCombobox component, selectedRepoPath state, conditional rendering, extended submit disable logic | High |
  | `app-sidebar.test.tsx` | Update tests: remove showNewFeature tests, add always-visible button tests, add disabled state tests | Medium |
  | New: `repository-combobox.stories.tsx` | Storybook stories for isolated RepositoryCombobox | New file |
  | Existing: `feature-create-drawer.stories.tsx` | Add story variants for repo selector mode | Medium |
  | Existing: `app-sidebar.stories.tsx` (if exists) | Add story for disabled button state | Low |

  ### Integration Points

  - **ListRepositoriesUseCase**: Already exists at `packages/core/src/application/use-cases/repositories/list-repositories.use-case.ts`. Returns `Repository[]` with `id`, `name`, `path` fields. Registered in DI as `'ListRepositoriesUseCase'`.
  - **Repository entity**: Defined in generated output as `SoftDeletableEntity & { name: string; path: string }`. The combobox needs `id`, `name`, and `path` — all available.
  - **server-container resolve()**: Standard pattern at `@/lib/server-container`. Used in create page to resolve use cases.
  - **createFeature server action**: Already validates `repositoryPath` is non-empty. No changes needed — the selected repo path flows through the existing payload.
  - **Custom events**: `shep:feature-created` event already includes `repositoryPath` from the payload. No changes needed.

