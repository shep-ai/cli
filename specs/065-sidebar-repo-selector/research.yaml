        selected: false
      - option: Create a dedicated RepositoryCombobox.stories.tsx alongside feature-create-drawer
        description: >
          Even though RepositoryCombobox is inline, create a separate stories file that exports
          the combobox for isolated testing. Requires exporting RepositoryCombobox from the module.
        selected: true
      - option: Only test via integration stories in the full drawer
        description: >
          No isolated combobox stories; only test through the drawer stories. Misses the
          mandatory requirement for colocated stories for new components.
        selected: false
    selectionRationale: >
      NFR-4 requires all new components to have colocated stories with at least two variants.
      While RepositoryCombobox is defined inline, it should be exported (named export) so it can
      be rendered in isolation in a stories file. The stories file should live alongside the
      feature-create-drawer (e.g., repository-combobox.stories.tsx in the same directory). This
      allows testing the combobox in isolation (empty list, populated list, pre-selected, disabled)
