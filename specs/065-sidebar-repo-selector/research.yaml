name: sidebar-repo-selector
summary: >
  Technical research for re-enabling the sidebar "New feature" button with a repository selector.
  Key decisions: remove showNewFeature prop entirely (always render button), create a
  RepositoryCombobox component following the existing ParentFeatureCombobox pattern (Popover + Input
  + listbox, no new dependencies), thread repositories from server component via
  ListRepositoriesUseCase, and conditionally render the selector only when repo context is missing.

# Relationships
relatedFeatures: []

technologies:
  - Next.js 15 (App Router, parallel routes, server components)
  - React 19 (client components, hooks, context)
  - shadcn/ui (Sidebar, Popover, Input, Tooltip, Button primitives)
  - Tailwind CSS
  - TypeScript
  - Vitest + React Testing Library
  - Storybook
  - tsyringe (DI container)

relatedLinks: []

# Structured technology decisions
decisions:
  - title: 'Sidebar button visibility strategy'
    chosen: 'Remove showNewFeature prop — always render the button'
    rejected:
      - 'Keep showNewFeature prop and set it to true in AppShell — adds unnecessary indirection; the prop was a temporary workaround introduced in feature 057 and violates YAGNI'
      - 'Feature-flag the button via featureFlags context — over-engineered for a button that should always be visible; feature flags are for experimental features, not core navigation'
    rationale: >
      The showNewFeature prop was introduced as a temporary workaround to hide the button when it
      could not function (no repo context). Since we are adding repo selection capability, the
      button should always be visible. Removing the prop simplifies the AppSidebar interface,
      eliminates dead code paths, and aligns with YAGNI. The AppShell already passes
      onNewFeature but not showNewFeature — removing the prop makes the API consistent.

  - title: 'Repository combobox component approach'
    chosen: 'New RepositoryCombobox component following the existing ParentFeatureCombobox pattern (Popover + Input + role=listbox buttons)'
    rejected:
      - 'Use shadcn/ui Command primitives (Command + CommandInput + CommandItem) — the existing ParentFeatureCombobox deliberately avoids Command in favor of a simpler Popover + Input + listbox pattern; consistency with the existing combobox in the same form is more important than reusing Command'
      - 'Use a third-party combobox library (e.g., cmdk, downshift) — adds bundle weight (NFR-7 constraint of 50KB gzipped), introduces a new dependency, and deviates from the established pattern in the codebase'
    rationale: >
      The ParentFeatureCombobox (defined at lines 877-1012 of feature-create-drawer.tsx) is the
      only combobox in the create drawer form and uses a lightweight pattern: Popover from
      @radix-ui + plain Input + native buttons with role="option" and aria-selected. This pattern
      is proven, accessible, and requires zero new dependencies. The RepositoryCombobox should
      mirror this exact pattern — Popover trigger button with role="combobox", a search Input,
      and a scrollable list of repository options with check icons. Consumer-owned filtering
      (case-insensitive on name and path) keeps the logic simple and testable.

  - title: 'Repository data flow architecture'
    chosen: 'Server-side fetch in CreateDrawerPage via ListRepositoriesUseCase, passed as props through CreateDrawerClient to FeatureCreateDrawer'
    rejected:
      - 'Client-side fetch via useEffect + fetch("/api/repositories") — violates NFR-6 (no new client-side data fetching) and introduces loading states, spinners, and layout shift that NFR-1 forbids'
      - 'Fetch repositories in the dashboard layout and pass via context — over-couples the repository list to the entire dashboard; the data is only needed by the create drawer, and context adds unnecessary re-renders'
    rationale: >
      The existing CreateDrawerPage server component already resolves use cases from the DI
      container (ListFeaturesUseCase) and passes data as props to CreateDrawerClient. Adding
      ListRepositoriesUseCase follows the identical pattern. Repositories are fetched server-side
      at page render time, meaning the combobox has data immediately when the drawer opens
      (NFR-1: interactive within 100ms, no layout shift). This approach requires no new API
      routes, no client-side fetching, and maintains the clean server-to-client data flow.

  - title: 'Conditional rendering strategy for repository selector'
    chosen: 'Show combobox when repositoryPath is empty; show read-only repo name label when repositoryPath is provided'
    rejected:
      - 'Always show the combobox with the current repo pre-selected — adds complexity for the canvas flow where repo context is already known; users from canvas should not be able to change the repo (it would disconnect from the node they clicked)'
      - 'Show combobox always but disable it when repo is provided — confusing UX; a disabled combobox implies the user might want to change it but cannot'
    rationale: >
      The spec explicitly requires conditional rendering (FR-5, FR-9). When repo context exists
      (canvas flow), showing the repo name as informational text is simpler and prevents
      accidental changes. When repo context is missing (sidebar flow), the combobox enables
      selection. This matches the existing conditional pattern used for ParentFeatureCombobox
      (line 655: hasFeatures && initialParentId !== undefined). The FeatureCreateDrawer already
      receives repositoryPath as a prop — an empty string signals "no repo context" and triggers
      the combobox.

  - title: 'Disabled button state for zero repositories'
    chosen: 'Render the button always but disable it with a Tooltip reading "Add a repository first" when repositories list is empty'
    rejected:
      - 'Hide the button entirely when zero repos — makes the feature undiscoverable; new users would not know the button exists'
      - 'Show the button enabled and display an error in the drawer — creates a dead-end UX flow where users open the drawer only to find they cannot proceed'
    rationale: >
      FR-10 explicitly requires the button to be visible but disabled with a tooltip. The
      shadcn/ui Tooltip component is already imported and used extensively in the create drawer.
      The AppSidebar will need a new optional prop (e.g., repositoryCount or
      hasRepositories) to know whether to disable. The AppShell can derive this from
      the SidebarFeaturesProvider context or from a new lightweight check. Since repositories are
      fetched server-side for the create drawer page but the sidebar is rendered by AppShell
      (which does not currently have repo data), the simplest approach is to add a
      repositoryCount prop to AppSidebar, sourced from a new provider or a server-fetched value
      threaded through the dashboard layout.

  - title: 'Repository count data source for sidebar disabled state'
    chosen: 'Fetch repository count in the dashboard layout server component and pass it to AppShell as a prop, which threads it to AppSidebar'
    rejected:
      - 'Add a new SidebarRepositoriesProvider context with client-side fetch — violates NFR-6 (no new client-side fetching) and adds complexity for a single integer'
      - 'Use the existing SidebarFeaturesProvider to also fetch repos — mixes concerns; features and repositories are separate domain entities with different lifecycle and update patterns'
    rationale: >
      The dashboard layout (app/(dashboard)/layout.tsx) already calls getGraphData() which
      fetches initial data server-side. Adding a ListRepositoriesUseCase.execute() call there
      (or extracting the count from getGraphData if it already includes repos) provides the
      repository count at render time with zero client-side cost. This count is passed through
      AppShell to AppSidebar. If getGraphData already returns repository data (it likely does
      since the canvas shows repo nodes), we may not need any additional server call.

  - title: 'Form submit button disabled logic'
    chosen: 'Extend existing disabled condition to include repository selection check: disabled when repositoryPath is empty AND no repository selected in combobox'
    rejected:
      - 'Validate on submit and show error toast — poor UX; users should see the button is disabled before attempting to submit'
      - 'Use HTML5 required attribute on a hidden input — fragile, does not work well with custom combobox components'
    rationale: >
      The existing submit button is already disabled when description is empty
      (line 527: disabled={!description.trim() || isSubmitting}). Adding a repository check
      is a simple extension: disabled={!description.trim() || isSubmitting || needsRepo}.
      The needsRepo condition is true when repositoryPath is empty and no repo has been selected
      in the combobox. This provides clear visual feedback to the user and prevents invalid
      submissions. The state for selected repo can be managed with a simple useState in
      FeatureCreateDrawer, similar to parentId state.

