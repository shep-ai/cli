content: |
  ## Summary

  The implementation is organized into 11 tasks across 3 phases, totaling approximately 5.5 hours
  of work.

  **Phase 1 (Sidebar button restoration)** starts by removing the `showNewFeature` prop and always
  rendering the button (task 1). Then a `SidebarRepositoryCountContext` is created (task 2) and
  wired to the ControlCenter (task 3) so the sidebar can know whether repositories exist. Finally,
  the disabled state with tooltip is added (task 4). This phase is self-contained and makes the
  button visible immediately.

  **Phase 2 (Repository combobox and create drawer integration)** begins by fetching repositories
  in the CreateDrawerPage server component (task 5) and threading them through CreateDrawerClient
  (task 6). The FeatureCreateDrawer gets state management and conditional rendering logic (task 7),
  then the RepositoryCombobox component is built following the ParentFeatureCombobox pattern
  (task 8). The combobox is wired into the form (task 9), and Storybook stories are created for
  all new components (task 10). Task 5 has no dependencies and can start in parallel with Phase 1.

  **Phase 3 (Validation)** runs the full validation suite and confirms zero regressions (task 11).

  The implementation follows a strict server-to-client data flow with no new client-side fetching,
  reuses existing shadcn/ui primitives with zero new dependencies, and mirrors established
  codebase patterns (ParentFeatureCombobox, SidebarFeaturesContext) for consistency.
