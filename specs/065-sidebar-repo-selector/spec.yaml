content: |
  ## Problem Statement

  The sidebar "New feature" button was hidden in commit bfcc60c9 (feature 057) via a `showNewFeature`
  prop that defaults to `false`. The `AppShell` component does not pass `showNewFeature={true}` to
  `AppSidebar`, so the button is currently invisible.

  When the button was active, clicking it navigated to `/create` without a `?repo=` query parameter.
  This means the `CreateDrawerPage` server component receives an empty `repo` param, and the
  `FeatureCreateDrawer` opens with `repositoryPath=""`. Since `repositoryPath` is required by the
  `createFeature` server action (returns error if empty), the user cannot submit the form.

  In contrast, when creating a feature from the canvas (+) button on a repository node, the
  `handleAddFeatureToRepo` callback passes `?repo=<encoded-path>`, so the drawer correctly
  receives repository context.

  The fix requires two changes:
  1. Re-enable the sidebar "New feature" button (remove the `showNewFeature` prop workaround)
  2. Add a repository selector to the feature create flow so users can pick a repo when one
     isn't provided via the URL

  ## Success Criteria

  - [ ] The "New feature" button is visible in the sidebar footer by default
  - [ ] Clicking the sidebar "New feature" button opens the create drawer
  - [ ] When the create drawer opens without repo context, a searchable repository selector is displayed
  - [ ] The user can search/filter repositories in the selector by name or path
  - [ ] Selecting a repository enables the form submit button
  - [ ] The form cannot be submitted without a repository selected
  - [ ] When the create drawer opens WITH repo context (canvas flow), the repository selector is hidden and the repo name is shown as a read-only label
  - [ ] The canvas (+) button flow continues to work identically to current behavior
  - [ ] When zero repositories are tracked, the sidebar button is visible but disabled with a tooltip
  - [ ] The `showNewFeature` prop is removed from `AppSidebar` (no longer needed)
  - [ ] A `RepositoryCombobox` component exists following the same pattern as `ParentFeatureCombobox`
  - [ ] All new components have colocated Storybook stories
  - [ ] All new logic has unit tests written TDD-style (red-green-refactor)
  - [ ] `pnpm validate` passes with zero errors

  ## Functional Requirements

  - **FR-1**: Remove the `showNewFeature` prop from `AppSidebar` and always render the "New feature" button in the sidebar footer
  - **FR-2**: The sidebar "New feature" button must navigate to `/create` (without `?repo=` param) when clicked
  - **FR-3**: The `CreateDrawerPage` server component must fetch the list of tracked repositories via `ListRepositoriesUseCase` and pass them to the client component
  - **FR-4**: The `FeatureCreateDrawer` must accept an optional `repositories` prop containing the list of tracked repositories
  - **FR-5**: When `repositoryPath` is empty and `repositories` is provided, the drawer must display a searchable repository combobox at the top of the form (before the description field)
  - **FR-6**: The repository combobox must allow the user to search/filter repositories by name or path (case-insensitive)
  - **FR-7**: Selecting a repository in the combobox must set the `repositoryPath` value used in the form payload
  - **FR-8**: The form submit button must be disabled until a repository is selected (when in repo-selector mode)
  - **FR-9**: When `repositoryPath` is provided (non-empty, i.e., canvas flow), the repository selector must not be shown; instead, display the repository name as informational context
  - **FR-10**: When zero repositories are tracked, the sidebar "New feature" button must be rendered in a disabled state with a tooltip reading "Add a repository first"
  - **FR-11**: The `CreateDrawerClient` must thread the `repositories` list from server props to `FeatureCreateDrawer`
  - **FR-12**: The repository combobox must follow the exact same UI pattern as the existing `ParentFeatureCombobox` (Popover + search input + check icons + keyboard navigation)

  ## Non-Functional Requirements

  - **NFR-1**: The repository combobox must render and be interactive within 100ms of the drawer opening (no layout shift or loading spinner for repos — they are fetched server-side)
  - **NFR-2**: The repository selector must be fully keyboard-accessible (Tab, Enter, Escape, Arrow keys)
  - **NFR-3**: The repository combobox must include appropriate ARIA attributes (`role="combobox"`, `aria-expanded`, `aria-label`) for screen reader compatibility
  - **NFR-4**: All new components must have colocated `.stories.tsx` files with at least two variants (with repos, empty repos)
  - **NFR-5**: All new logic must be covered by unit tests (minimum 80% branch coverage for new code)
  - **NFR-6**: The feature must not introduce any new client-side data fetching — all repository data flows from server component to client via props
  - **NFR-7**: The create drawer must remain under 50KB gzipped total bundle contribution (no new heavy dependencies)
  - **NFR-8**: The existing canvas (+) button flow must not be affected by these changes (zero behavioral regression)

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should the repo selector always be visible or only when no repo context? | Conditional — only when no repo context | Preserves canvas flow, reduces clutter, limits scope |
  | 2 | How should the button behave with zero repositories? | Show button but disable it | Discoverable but prevents dead-end flow |
  | 3 | Should the showNewFeature prop be removed or kept? | Remove prop entirely | It was a temporary workaround; YAGNI principle |
  | 4 | Combobox or simple dropdown for repo selection? | Searchable combobox | Matches existing ParentFeatureCombobox pattern, scales better |

  ## Codebase Analysis

  ### Project Structure

  The web UI follows Next.js App Router conventions under `src/presentation/web/`:

  - `app/(dashboard)/layout.tsx` - Dashboard layout, calls `getGraphData()` for initial data
  - `app/(dashboard)/@drawer/create/page.tsx` - Parallel route for create drawer, reads `?repo=` param
  - `app/actions/create-feature.ts` - Server action, validates `repositoryPath` is non-empty
  - `components/layouts/app-shell/app-shell.tsx` - Root shell, orchestrates sidebar + content
  - `components/layouts/app-sidebar/app-sidebar.tsx` - Sidebar with feature list + footer button
  - `components/common/feature-create-drawer/feature-create-drawer.tsx` - Create form (client)
  - `components/common/control-center-drawer/create-drawer-client.tsx` - Wrapper with submit logic

  ### Architecture Patterns

  - **Clean Architecture**: domain -> application -> infrastructure -> presentation layers
  - **URL-driven navigation**: drawers open via `router.push('/create?repo=...')` (parallel routes)
  - **Server components + client boundary**: `CreateDrawerPage` (server) fetches data, `CreateDrawerClient` (client) handles interaction
  - **Custom events**: `shep:add-repository` and `shep:feature-created` for cross-component communication
  - **Optimistic UI**: features appear on canvas immediately with 'creating' state
  - **DI container**: use cases resolved via `resolve<T>('Token')` in server components

  ### Relevant Technologies

  - **shadcn/ui**: Sidebar primitives (`SidebarFooter`, `SidebarMenuButton`), Popover, Switch, Label
  - **Next.js parallel routes**: `@drawer` slot renders drawer alongside main content
  - **React Flow (@xyflow/react)**: Canvas with repository and feature nodes
  - **Combobox pattern**: Already implemented in `ParentFeatureCombobox` within the create drawer

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `components/layouts/app-shell/app-shell.tsx` | Medium | Remove `showNewFeature` prop usage, keep `onNewFeature` callback |
  | `components/layouts/app-sidebar/app-sidebar.tsx` | Medium | Remove `showNewFeature` prop, always show button, add disabled state for zero repos |
  | `components/common/feature-create-drawer/feature-create-drawer.tsx` | High | Add repository combobox (new `RepositoryCombobox` subcomponent), conditional rendering based on `repositoryPath` |
  | `components/common/control-center-drawer/create-drawer-client.tsx` | Medium | Accept and thread `repositories` prop, manage selected repo state |
  | `app/(dashboard)/@drawer/create/page.tsx` | Medium | Fetch repositories list via `ListRepositoriesUseCase`, pass to client |
  | `app/actions/create-feature.ts` | None | No changes needed — already validates repositoryPath |
  | `tests/unit/presentation/web/layouts/app-sidebar.test.tsx` | Medium | Update tests: remove showNewFeature tests, add disabled state tests |
  | Storybook stories (app-sidebar, feature-create-drawer) | Medium | Add stories for repo selector variant and disabled button state |

  ## Dependencies

  - **ListRepositoriesUseCase** (`packages/core/src/application/use-cases/repositories/list-repositories.use-case.ts`): Already exists, returns all tracked repos
  - **Repository domain entity** (`packages/core/src/domain/generated/output.ts`): Defines repo shape (id, name, repositoryPath, createdAt)
  - **ParentFeatureCombobox pattern**: Existing searchable combobox in the create drawer — serves as template for `RepositoryCombobox`
  - **server-container resolve()**: DI resolution for server-side use case access
  - **shadcn/ui Popover + Input components**: Already available for combobox UI
  - **Tooltip component**: shadcn/ui Tooltip for disabled button state messaging

  ## Size Estimate

  **M** — This feature touches 6-8 files across the presentation layer. The main work items are:
  (1) removing the `showNewFeature` prop and always rendering the button, (2) adding a
  `RepositoryCombobox` component following the existing `ParentFeatureCombobox` pattern,
  (3) threading the repositories list from server to client, and (4) conditional rendering
  in the create drawer. No domain or infrastructure changes required. Estimated 1-2 days with TDD.

