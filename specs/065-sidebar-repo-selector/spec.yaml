  - question: 'Should the repository selector always be visible in the create drawer, or only when no repo context is provided via URL?'
    resolved: true
    options:
      - option: 'Conditional — only when no repo context'
        description: >
          Show the repository selector only when repositoryPath is empty (sidebar flow).
          When repo context is provided via URL (canvas flow), hide the selector and show the
          repo name as a read-only label. Keeps the canvas flow unchanged and uncluttered.
        selected: true
      - option: 'Always visible — allow changing repo'
        description: >
          Always show the repository selector pre-filled with the current repo, allowing users
          to change the target repo even when opened from the canvas. More flexible but adds
          complexity and risk of accidental repo changes.
        selected: false
