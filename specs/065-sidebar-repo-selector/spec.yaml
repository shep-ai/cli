  - question: 'Should the repo selector always be visible or only when no repo context is provided?'
    resolved: true
    options:
      - option: 'Conditional — only when no repo context'
        description: >
          Show the repository combobox only when the drawer opens without a ?repo= param (sidebar flow).
          When repo context exists (canvas flow), hide the selector and show the repo name as a read-only label.
          Preserves existing canvas UX, reduces visual clutter, and limits implementation scope.
        selected: true
      - option: 'Always visible — editable repo selector'
        description: >
          Always show the repository selector, pre-filled when repo context exists but still editable.
          Gives users flexibility to change the target repo even from the canvas flow.
          Adds complexity and changes existing canvas behavior.
        selected: false
    selectionRationale: >
      Conditional display preserves the existing canvas (+) button flow without behavioral changes,
      reduces visual clutter in the common case, and limits implementation scope. Users who start
      from the canvas already have clear repo context — an editable selector would add confusion.
    answer: 'Conditional — only when no repo context'

  - question: 'How should the sidebar button behave when zero repositories are tracked?'
    resolved: true
    options:
      - option: 'Show button but disable it'
        description: >
          Render the button visually but in a disabled state with a tooltip reading "Add a repository first".
          The button is discoverable so new users know the feature exists, but clicking does nothing.
          Prevents a dead-end flow where the drawer opens with nothing to select.
        selected: true
      - option: 'Hide the button entirely'
        description: >
          Do not render the button at all when no repositories exist. Simplest implementation but
          reduces discoverability — new users may not know the feature exists until they add a repo.
        selected: false
      - option: 'Show button and open drawer with empty state'
        description: >
          Allow the drawer to open even with zero repos, showing an empty state message like
          "No repositories tracked. Add a repository from the canvas first." More complex UX
          but gives users a clear call to action.
        selected: false
    selectionRationale: >
      Showing the button disabled with a tooltip is the best balance of discoverability and UX.
      Users can see the feature exists and understand what's needed (add a repo), without being
      led into a dead-end drawer with no actionable options.
    answer: 'Show button but disable it'

  - question: 'Should the showNewFeature prop be removed or kept for future use?'
    resolved: true
    options:
      - option: 'Remove prop entirely'
        description: >
          Delete the showNewFeature prop from AppSidebar and always render the button.
          The prop was a temporary workaround added in feature 057 when the button lacked repo context.
          With the repo selector, the workaround is no longer needed. Follows YAGNI principle.
        selected: true
      - option: 'Keep prop with default true'
        description: >
