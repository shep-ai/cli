      - option: 'Hide button when no repos'
        description: >
          Only show the "New feature" button when at least one repository is tracked.
          Cleaner sidebar when empty but less discoverable.
        selected: false
      - option: 'Show button and let drawer handle it'
        description: >
          Always show the button enabled; when clicked with no repos, the drawer opens
