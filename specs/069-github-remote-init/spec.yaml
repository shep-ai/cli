summary: >
  Add a new CLI command `shep repo init-remote` that creates a GitHub repository via `gh repo create`
  and configures the local git remote for repositories that don't yet have one. This integrates into
  the existing Clean Architecture layers: new methods on IGitPrService, a new use case
  (InitRemoteRepositoryUseCase), and a new CLI command under the `repo` command group. The command
  detects missing remotes, creates a private GitHub repository (by default), sets the `origin` remote,
  and pushes the current branch — enabling all downstream shep workflows (PRs, CI, push) to function.
