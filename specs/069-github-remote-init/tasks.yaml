# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 10 tasks across 4 phases, totaling approximately
  4h 40min of effort. The work follows strict dependency ordering: interface and error
  types first (Phase 1), then service method implementations with tests (Phase 2), then
  the use case with tests (Phase 3), and finally the CLI command with integration test
  (Phase 4).

  Phase 1 is pure type-level work — extending the GitPrErrorCode enum and IGitPrService
  interface. No runtime behavior changes, verified by TypeScript compilation.

  Phase 2 implements the two new GitPrService methods (addRemote and createGitHubRepo)
  following TDD: tests are written first against the interface contract, then minimal
  implementations are written to make them pass. The createGitHubRepo method uses the
  atomic `gh repo create --source=. --push` approach, and parseGhError is updated to
  support the REPO_CREATE_FAILED code.

  Phase 3 creates the InitRemoteRepositoryUseCase with comprehensive unit tests covering
  all orchestration paths: happy path, gh not installed, remote already exists, create
  failure, default name derivation, custom name, org support, and visibility toggle.
  The use case is then registered in the DI container.

  Phase 4 is the presentation layer: the CLI command is created with argument parsing
  and error-specific output formatting, registered in the repo command group, and
  verified with an integration test that exercises the full stack.

