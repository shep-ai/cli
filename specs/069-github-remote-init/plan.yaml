# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This feature adds a single vertical slice through all four Clean Architecture layers:

  1. **Output Port (Interface)** — Extend `IGitPrService` with two new methods and two new error codes
  2. **Infrastructure (Adapter)** — Implement the methods in `GitPrService` using `ExecFunction`
  3. **Application (Use Case)** — `InitRemoteRepositoryUseCase` orchestrates precondition checks and repo creation
  4. **Presentation (CLI)** — `shep repo init-remote` command parses arguments, invokes the use case, and formats output

  The existing `IGitPrService` already owns remote-related operations (`hasRemote`, `getRemoteUrl`, `push`)
  with 18 methods total. Adding `createGitHubRepo()` and `addRemote()` is a natural extension that
  maintains cohesion without exceeding interface size. The concrete `GitPrService` already injects
  `ExecFunction` and has `parseGhError`/`parseGitError` helpers that the new methods reuse directly.

  ## Key Design Decisions

  ### 1. Atomic gh repo create (vs. three-step manual approach)

  **Chosen:** `gh repo create <name> --private/--public --source=. --remote=origin --push`

  This single command creates the GitHub repo, adds the `origin` remote, and pushes the current
  branch — satisfying FR-7, FR-8, and FR-9 atomically. The alternative (three separate subprocess
  calls) introduces partial failure states that are harder to recover from. The `addRemote()` method
  is still implemented separately on `IGitPrService` for reusability in future features.

  ### 2. Error codes: REMOTE_ALREADY_EXISTS + REPO_CREATE_FAILED

  Two new `GitPrErrorCode` values enable the CLI to produce targeted, actionable error messages.
  `REMOTE_ALREADY_EXISTS` is a user error (not retryable); `REPO_CREATE_FAILED` covers all
  `gh repo create` failures (name taken, org permissions, network). The existing `GH_NOT_FOUND`
  and `AUTH_FAILURE` codes handle gh-not-installed and gh-not-authenticated cases respectively.

  ### 3. Private by default (no interactive prompt)

  FR-3 specifies private by default with `--public` override. This matches `gh` CLI defaults and
  enterprise security expectations. No interactive prompting — the command is designed for
  autonomous/scripted use.

  ### 4. gh availability: binary check + parseGhError two-tier

  `IToolInstallerService.checkAvailability('gh')` catches missing binary (cheap PATH check).
  Auth errors are caught by `parseGhError` from the actual `gh repo create` call. This avoids
  a redundant `gh auth status` subprocess on every invocation.

  ### 5. Use case injects IGitPrService + IToolInstallerService

  The use case depends on interfaces (not concrete classes) via string DI tokens, maintaining
  testability and Clean Architecture compliance. Both services are already registered as singletons
  in the DI container.

  ## Implementation Strategy

  Phase ordering follows dependency flow: interface first (all layers depend on it), then
  infrastructure (use case calls service methods), then use case (CLI calls use case), then CLI
  (final consumer). Each phase is TDD: write failing tests first, implement minimal code, refactor.

  The infrastructure phase implements both `createGitHubRepo()` and `addRemote()` with full test
  coverage before the use case phase begins, ensuring the use case can mock well-defined methods.

  The CLI phase is last because it's the thinnest layer — it parses arguments, resolves the use
  case from the DI container, and formats output. The integration test verifies the full stack.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Partial failure: repo created but remote not set | The `--source=. --push` flags make the operation atomic. Post-creation `hasRemote()` verification catches edge cases. NFR-7 requires guidance on re-run. |
  | Command injection via repo name | `ExecFunction` uses `execFile` (not shell interpolation). Arguments are passed as an array, not concatenated. |
  | Accidental public repo creation | Private by default (FR-3). `--public` is an explicit opt-in flag. |
  | Overwriting existing remote | `hasRemote()` guard aborts with `REMOTE_ALREADY_EXISTS` before any mutation (NFR-3). |
  | gh CLI not installed | `IToolInstallerService.checkAvailability('gh')` provides actionable install instructions before attempting repo creation. |
  | gh CLI not authenticated | `parseGhError` classifies auth failures from `gh repo create` output, producing a "Run `gh auth login`" message. |
  | Duplicate GitHub repo name | `gh repo create` returns an error; wrapped as `REPO_CREATE_FAILED` with the gh error message preserved. |

