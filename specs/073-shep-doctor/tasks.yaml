    estimatedEffort: "30min"

  - id: task-4
    phaseId: phase-2
    title: "Extend IGitHubRepositoryService with checkPushAccess and forkRepository"
    description: >
      Add two new method signatures to the existing IGitHubRepositoryService interface:
