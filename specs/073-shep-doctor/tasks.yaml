name: "shep-doctor"
summary: >
  15 tasks across 6 phases implementing the shep doctor feature. Covers TypeSpec domain
  models, service interface definitions, infrastructure implementations (GitHub issue creation,
  push access detection, fork handling, programmatic PR creation), use case orchestration,
  CLI command with interactive prompts, DI wiring, and integration testing. All code tasks
  follow TDD with RED-GREEN-REFACTOR cycles.

relatedFeatures:
  - "041-ci-watch-fix-loop"

technologies:
  - "Commander.js"
  - "tsyringe"
  - "@inquirer/prompts"
  - "gh CLI"
  - "Vitest"
  - "TypeSpec"

relatedLinks:
  - title: "GitHub Issue #436 - Feature request: Shep doctor"
    url: "https://github.com/shep-ai/cli/issues/436"

tasks:
  # ── Phase 1: Domain Models & TypeSpec ──────────────────────────────────

  - id: task-1
    phaseId: phase-1
    title: "Create DoctorDiagnosticReport TypeSpec value object"
    description: >
      Define a DoctorDiagnosticReport value object in TypeSpec that captures
      the structured diagnostic data for a doctor session: user description,
      failed agent run summaries (agentType, agentName, error, timestamp),
      system info (nodeVersion, platform, arch, ghVersion), and CLI version.
      This is a transient value object (no BaseEntity) since it is never persisted.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "tsp/domain/value-objects/doctor-diagnostic-report.tsp exists with DoctorDiagnosticReport model"
      - "Model includes userDescription (string), failedRunSummaries (array), systemInfo fields, and cliVersion"
      - "FailedRunSummary sub-model includes agentType, agentName, error, and timestamp fields"
      - "pnpm tsp:compile succeeds and generates types in domain/generated/output.ts"
      - "No existing generated types are broken by the addition"
    tdd:
      red:
        - "Verify that DoctorDiagnosticReport type does not exist in domain/generated/output.ts"
      green:
        - "Create tsp/domain/value-objects/doctor-diagnostic-report.tsp with the model definition"
        - "Run pnpm tsp:compile and verify the type appears in generated output"
      refactor:
        - "Review field naming for consistency with existing TypeSpec models"
        - "Ensure @doc annotations are clear and complete"
    estimatedEffort: "30min"

  - id: task-2
    phaseId: phase-1
    title: "Extend WorkflowConfig with doctorMaxFixAttempts"
    description: >
      Add an optional doctorMaxFixAttempts field (int32, default 1) to WorkflowConfig
      in the Settings TypeSpec entity. This controls how many fix attempts the doctor
      command makes before giving up. Follows the existing ciMaxFixAttempts pattern.
    state: "Todo"
    dependencies:
      - task-1
    acceptanceCriteria:
      - "tsp/domain/entities/settings.tsp WorkflowConfig model has doctorMaxFixAttempts optional int32 field"
      - "pnpm tsp:compile succeeds and WorkflowConfig type in generated output includes the new field"
      - "Existing WorkflowConfig fields are unchanged"
    tdd:
      red:
        - "Verify that WorkflowConfig in generated output does not have doctorMaxFixAttempts"
      green:
        - "Add doctorMaxFixAttempts?: int32 with @doc annotation to WorkflowConfig in settings.tsp"
        - "Run pnpm tsp:compile and verify the field appears"
      refactor:
        - "Ensure the @doc annotation clearly describes the default value and purpose"
    estimatedEffort: "15min"

  # ── Phase 2: Service Interfaces (Output Ports) ────────────────────────

  - id: task-3
    phaseId: phase-2
    title: "Define IGitHubIssueService interface"
