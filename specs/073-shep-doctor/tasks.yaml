content: |
  ## Summary

  The implementation is organized into 15 tasks across 6 phases, building the feature
  bottom-up through the Clean Architecture layers.

  First, we establish the domain foundation with TypeSpec models -- DoctorDiagnosticReport
  value object and WorkflowConfig extension. These compile to generated types that all
  subsequent code depends on.

  Next, we define the service interface contracts: a new IGitHubIssueService for issue
  creation, and extensions to IGitHubRepositoryService (push access detection, forking)
  and IGitPrService (programmatic PR creation with cross-fork support). These ports are
  the contracts both implementations and the use case depend on.

  With interfaces defined, we implement the infrastructure services: GitHubIssueService
  wrapping gh issue create, push access detection via gh api, fork handling via gh repo fork,
  and createPrFromArgs for programmatic PR creation. Each is independently testable with
  a mocked ExecFunction.

  The use case layer ties everything together. DoctorDiagnoseUseCase is split across two
  tasks: first diagnostic collection (querying agent runs, gathering system info), then
  the full workflow orchestration (issue creation, access detection, repo setup, agent
  invocation, PR creation, cleanup). Both maintainer and contributor flows are handled
  with graceful degradation throughout.

  Finally, the CLI command and DI wiring connect the feature to users. The doctor command
  handles argument parsing, interactive prompts, progress display, and error reporting.
  Integration tests validate both flows end-to-end. A final build verification ensures
  no regressions.

  ---

  _Task breakdown complete -- ready for implementation_
