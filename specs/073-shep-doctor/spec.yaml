content: |
  ## Problem Statement

  When shep encounters operational failures (agent crashes, incorrect outputs, broken workflows),
  users currently have no built-in way to report these issues or trigger self-healing. Users must
  manually file GitHub issues and wait for maintainer fixes. The `shep doctor` feature provides a
  self-service mechanism where users can report problems, and shep will automatically:

  1. Collect the user's problem description and recent operation context (failed agent runs, errors)
  2. Diagnose the root cause using AI analysis of the collected context
  3. Open a structured GitHub issue on shep-ai/cli describing the failure with full diagnostic data
  4. Optionally invoke an AI agent to attempt a fix in the shep codebase (via fork)
  5. Open a cross-fork PR with the proposed fix

  This closes the feedback loop -- shep can fix itself.

  Reference: [GitHub Issue #436](https://github.com/shep-ai/cli/issues/436)

  ## Success Criteria

  - [ ] `shep doctor` command is registered and accessible as a top-level CLI command
  - [ ] Running `shep doctor --help` displays usage information with all options
  - [ ] User can provide a problem description via positional argument (`shep doctor "description"`)
  - [ ] User is prompted interactively for a description if none is provided as argument
  - [ ] Doctor automatically collects recent failed agent runs from IAgentRunRepository
  - [ ] Doctor collects the current shep CLI version as diagnostic context
  - [ ] Doctor formats a structured GitHub issue with title, description, diagnostic context, and reproduction steps
  - [ ] Doctor creates the issue on shep-ai/cli via `gh issue create` and displays the issue URL to the user
  - [ ] Doctor prompts the user asking whether to attempt a fix (skippable with --fix or --no-fix flags)
  - [ ] When fix is requested, doctor forks shep-ai/cli via `gh repo fork`, clones it, and creates a fix branch
  - [ ] Doctor invokes the AI agent (via IAgentExecutorProvider) with the issue context as a fix prompt
  - [ ] Doctor opens a cross-fork PR referencing the created issue and displays the PR URL
  - [ ] Doctor gracefully handles missing `gh` CLI with a clear error message and installation instructions
  - [ ] Doctor gracefully handles unauthenticated `gh` with a clear error message and `gh auth login` instructions
  - [ ] Doctor gracefully handles agent execution failures without crashing
  - [ ] The --no-fix flag skips the fix attempt and only creates the issue
  - [ ] The --fix flag skips the confirmation prompt and proceeds directly to fix attempt
  - [ ] The --workdir flag allows specifying a custom directory for the cloned fork
  - [ ] Unit tests cover the DoctorDiagnoseUseCase with mocked dependencies
  - [ ] Unit tests cover the IGitHubIssueService implementation
  - [ ] Integration tests cover the end-to-end doctor workflow with mocked external services

  ## Functional Requirements

  - **FR-1: CLI Command Registration** — A top-level `shep doctor` command is registered in the CLI
    program via `program.addCommand(createDoctorCommand())`. The command accepts an optional
    positional argument `[description]` for the problem description, and supports `--fix`,
    `--no-fix`, and `--workdir <path>` options.

  - **FR-2: Problem Description Collection** — If no description is provided as an argument, the
    command interactively prompts the user to describe the problem. The prompt should support
    multi-line input (press Enter twice to submit or use a readline-based prompt).

  - **FR-3: Diagnostic Context Collection** — Doctor automatically queries `IAgentRunRepository`
    for recent agent runs (last 10, filtered to failed/errored status). For each failed run, it
    collects: agent type, agent name, error message, prompt used, and timestamps. It also collects
    the current shep CLI version via `IVersionService`.

  - **FR-4: Issue Formatting** — Doctor formats a structured GitHub issue body containing:
    (a) User-provided problem description,
    (b) Shep CLI version,
    (c) Recent failed agent run summaries (agent type, error, timestamp),
    (d) A "Reported via `shep doctor`" footer tag.
    The issue title is derived from the first line/sentence of the user description, prefixed
    with "[shep doctor]".

  - **FR-5: GitHub Issue Creation** — Doctor creates an issue on the `shep-ai/cli` repository
    using a new `IGitHubIssueService` service that wraps `gh issue create`. The service returns
    the created issue's URL and number. The issue is labeled with `bug` and `shep-doctor`.

  - **FR-6: Fix Confirmation Gate** — After issue creation, doctor asks the user whether to
    attempt a fix. The `--fix` flag bypasses this prompt and proceeds automatically. The
    `--no-fix` flag skips the fix attempt entirely. Without either flag, an interactive
    confirmation prompt is shown.

  - **FR-7: Repository Fork and Clone** — When a fix is requested, doctor forks `shep-ai/cli`
    into the user's GitHub account (if not already forked) using `gh repo fork`, then clones
    the fork into a working directory (temp dir by default, or `--workdir` if specified). Creates
    a fix branch named `doctor/fix-<issue-number>`.

  - **FR-8: AI Agent Fix Invocation** — Doctor invokes the configured AI agent via
    `IAgentExecutorProvider.getExecutor()` with a structured prompt containing:
    (a) The issue title and body,
    (b) Instructions to analyze the shep codebase and propose a fix,
    (c) The specific error context from failed agent runs.
    The agent executes in the cloned fork directory with a `repositoryPath` option.

  - **FR-9: PR Creation** — After the agent completes, doctor commits any changes, pushes to
    the fork, and opens a cross-fork PR against `shep-ai/cli` using `gh pr create`. The PR
    title references the issue, the body includes a summary of the fix attempt, and it links
    to the created issue with "Fixes #N" or "Relates to #N".

  - **FR-10: Progress Reporting** — Doctor displays clear progress messages at each step using
    the existing `messages.*()` and `spinner()` utilities: collecting diagnostics, creating
    issue, forking repo, running agent, creating PR. Each step shows success/failure status.

  - **FR-11: Prerequisite Validation** — Before starting, doctor validates that `gh` CLI is
    installed and authenticated. If `gh` is not found, it displays an error with installation
    instructions. If `gh` is not authenticated, it displays an error with `gh auth login`
    instructions. This check uses the existing `IToolInstallerService.checkAvailability('gh')`
    pattern.

  ## Non-Functional Requirements

  - **NFR-1: Graceful Degradation** — If any step fails (issue creation, fork, agent execution,
    PR creation), doctor reports the failure clearly and continues with subsequent steps where
    possible. For example, if the agent fails to produce a fix, doctor still reports the issue
    URL and informs the user that the fix attempt failed.

  - **NFR-2: No Sensitive Data Leakage** — Diagnostic context included in the GitHub issue must
    not contain API keys, tokens, passwords, or other secrets from user settings. Agent run
    records should be sanitized to remove any credential-like values before inclusion.

  - **NFR-3: Idempotent Fork** — If the user already has a fork of shep-ai/cli, the fork step
    should detect the existing fork and use it rather than failing or creating a duplicate.
    `gh repo fork` handles this natively.

  - **NFR-4: Clean Architecture Compliance** — The feature must follow the existing clean
    architecture: domain models in TypeSpec, use case in application layer, service interface
    (port) in application layer, service implementation in infrastructure layer, CLI command
    in presentation layer. No layer may skip or shortcut the dependency direction.

  - **NFR-5: Testability** — All external operations (gh CLI, file system, agent execution)
    must be injected via interfaces, enabling full unit test coverage with mocks. No direct
    subprocess calls from the use case.

  - **NFR-6: Performance** — The diagnostic collection step (querying agent runs, version info)
    should complete in under 2 seconds. The overall doctor flow (excluding agent execution and
    network operations) should have no unnecessary delays.

  - **NFR-7: User Feedback** — Every operation that takes more than 1 second must show a
    spinner or progress indicator. The user should never see a frozen terminal with no feedback.

  - **NFR-8: Cleanup** — If using a temp directory for the clone, it should be cleaned up after
    the PR is created (or after failure). If `--workdir` is specified, the directory is
    preserved for user inspection.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Clone directly vs fork? | Fork then clone | Most users lack push access to shep-ai/cli; fork+PR is the standard open-source contribution model |
  | 2 | How to collect problem description? | Argument with interactive fallback | Follows existing CLI patterns; supports both scripted and interactive usage |
  | 3 | Auto-fix or ask first? | Ask before fixing | Respects user autonomy and AI token budget; --fix flag available for automation |
  | 4 | What diagnostic context to collect? | Recent agent runs and errors | Most actionable data for bug reports; avoids exposing sensitive settings |
  | 5 | How many fix attempts? | Single attempt | Best-effort fix for a meta-feature; PR goes through upstream CI anyway |
  | 6 | Where to clone for fix? | User-configurable directory | Temp dir default with --workdir override for power users |
  | 7 | New interface or extend existing? | New IGitHubIssueService | Clean separation per ISP; keeps IExternalIssueFetcher read-only |

  ## Codebase Analysis

  ### Project Structure

  The codebase follows Clean Architecture with four layers in `packages/core/src/`:

  - **domain/** — Core business logic, TypeSpec-generated models (`output.ts`)
  - **application/** — Use cases and output port interfaces (services, repositories)
  - **infrastructure/** — External implementations: SQLite repos, agent services, git/GitHub services
  - **presentation/** — CLI commands (`src/presentation/cli/`), TUI, Web UI

  CLI commands live in `src/presentation/cli/commands/` organized by feature group (feat/, agent/, repo/, settings/).
  Top-level commands (run, start, stop, ui, etc.) are standalone files. Commands are registered in
  `src/presentation/cli/index.ts` via `program.addCommand()`.

  ### Architecture Patterns

  - **Use Case Pattern**: Each operation is a `@injectable()` class with a single `execute()` method,
    dependencies injected via `@inject()` tokens. ~58 use cases exist.
  - **Repository Pattern**: SQLite-backed repositories behind interfaces (e.g., `IFeatureRepository`,
    `IAgentRunRepository`).
  - **Agent Executor Abstraction**: All agent invocations go through `IAgentExecutorProvider` →
    `IAgentExecutor`. Agent type resolved from settings, never hardcoded.
  - **Service Interfaces (Output Ports)**: `IGitPrService`, `IGitHubRepositoryService`,
    `IExternalIssueFetcher` — all defined as interfaces in `application/ports/output/services/`.
  - **DI Container**: tsyringe container in `infrastructure/di/container.ts` registers all
    repositories, services, and use cases.

  ### Existing Infrastructure to Reuse

  1. **GitHub Issue Fetcher** (`infrastructure/services/external/github-issue.service.ts`) —
     Currently read-only (fetches issues via `gh issue view`). Informs the design of the new
     `IGitHubIssueService` for issue creation.
  2. **Git PR Service** (`infrastructure/services/git/git-pr.service.ts`) — Already has `createPr()`,
     `pushBranch()`, `getCiStatus()`, `getDiffSummary()`. Reusable for PR creation.
  3. **Agent Executor** — `IAgentExecutorProvider.getExecutor()` provides a configured
     `IAgentExecutor` with `execute(prompt, options)`. Ready to use for fix attempts.
  4. **CI Watch/Fix Loop** (`infrastructure/services/agents/feature-agent/nodes/merge/ci-watch-fix-loop.ts`)
     — Pattern reference for iterative fix attempts. Not directly reused in v1 (single attempt)
     but informs future enhancement.
  5. **CLI UI utilities** (`src/presentation/cli/ui/`) — `messages.*()`, `spinner()`, `colors.*()`,
     `renderDetailView()` for consistent CLI output.
  6. **Tool Installer Service** — `IToolInstallerService.checkAvailability()` for validating
     gh CLI installation.
  7. **Version Service** — `IVersionService` for collecting shep CLI version in diagnostics.
  8. **Agent Run Repository** — `IAgentRunRepository.list()` for querying recent failed runs.

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/cli/commands/` | High | New `doctor.command.ts` top-level command |
  | `src/presentation/cli/index.ts` | Low | Register the new doctor command |
  | `packages/core/src/application/use-cases/` | High | New `DoctorDiagnoseUseCase` with diagnose → issue → fix → PR flow |
  | `packages/core/src/application/ports/output/services/` | Medium | New `IGitHubIssueService` interface for issue creation |
  | `packages/core/src/infrastructure/services/external/` | Medium | New `GitHubIssueService` implementation wrapping `gh issue create` |
  | `packages/core/src/infrastructure/services/git/` | Low | Reuse existing `git-pr.service.ts` for PR creation |
  | `packages/core/src/infrastructure/di/container.ts` | Low | Register new use case and IGitHubIssueService |
  | `tsp/` | Low | Optional TypeSpec model for DoctorDiagnosisResult value object |
  | `tests/` | High | Unit tests for use case, service; integration tests for workflow |

  ## Dependencies

  - **gh CLI** — Must be installed and authenticated for issue/PR creation and forking
  - **IAgentExecutorProvider** — For invoking AI agent to attempt fixes
  - **IGitPrService** — For creating PRs with fix attempts
  - **IAgentRunRepository** — For querying recent failed agent runs as diagnostic context
  - **IVersionService** — For collecting shep CLI version in diagnostics
  - **IToolInstallerService** — For validating gh CLI availability before starting

  ## Size Estimate

  **L** — This feature requires a new CLI command, a new use case with multi-step orchestration
  (diagnose → create issue → fork/clone/branch → invoke agent → create PR), a new service interface
  and implementation for GitHub issue creation, and comprehensive testing. The workflow is more
  complex than a simple CRUD operation but can leverage significant existing infrastructure (agent
  executor, PR service, CLI patterns, tool installer). Estimated at 1-2 weeks of development.

  ---

