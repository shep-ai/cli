name: "shep-doctor"
number: 73
branch: "feat/073-shep-doctor"
oneLiner: "Diagnose shep operation failures, auto-create GitHub issues, attempt fixes, and open PRs"
userQuery: "I'd like to have a \"shep doctor\" feature that will let me tell shep that something went wrong in its operation - shep should then open an issue, try to fix, and open a PR.\n"
summary: "Add a top-level `shep doctor` CLI command that allows users to report problems with shep's own\noperation. When invoked, doctor collects the user's problem description and recent operation\ncontext (agent run logs, errors), diagnoses the root cause, opens a GitHub issue on the\nshep-ai/cli repository with a structured bug report, invokes an AI agent to attempt a fix in\nthe shep codebase, and opens a PR with the proposed fix. Supports both shep maintainers (who\npush directly to shep-ai/cli) and external contributors (who fork first). This is a self-healing\nmeta-feature where shep fixes itself.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures:
  - "041-ci-watch-fix-loop"
technologies:
  - "Commander.js (CLI framework)"
  - "tsyringe (dependency injection)"
  - "LangGraph (agent workflow orchestration)"
  - "gh CLI (GitHub issue/PR creation)"
  - "Vitest (testing)"
  - "TypeSpec (domain model generation)"
relatedLinks:
  - title: "GitHub Issue #436 - Feature request: Shep doctor"
    url: "https://github.com/shep-ai/cli/issues/436"
openQuestions:
  - question: "How should doctor handle repository access for the fix attempt — fork or push directly?"
    resolved: true
    options:
      - option: "Always fork"
        description: "Always fork shep-ai/cli into the user's GitHub account via `gh repo fork`, regardless of whether they have push access. Simple and uniform flow but forces maintainers to work through forks unnecessarily."
        selected: false
      - option: "Auto-detect push access"
        description: "Use `gh api repos/shep-ai/cli --jq '.permissions.push'` to check if the authenticated user has push access. If yes (maintainer/owner), clone shep-ai/cli directly, create a branch, and push. If no (external contributor), fork first then clone the fork. Provides the optimal flow for both user types automatically."
        selected: true
      - option: "User-specified via flag"
        description: "Add a `--fork` / `--no-fork` flag to let the user explicitly choose. Gives full control but adds cognitive overhead — users shouldn't need to think about whether they need to fork."
        selected: false
    selectionRationale: "Auto-detecting push access provides the best UX for both user types. Shep maintainers/owners get the streamlined direct-push flow without unnecessary forks cluttering their GitHub accounts. External contributors automatically get the fork+PR flow. The `gh api` permissions check is a single lightweight API call. This eliminates the need for users to think about their access level."
    answer: "Auto-detect push access"
  - question: "How should doctor collect the problem description from the user?"
    resolved: true
    options:
      - option: "CLI argument only"
        description: "User passes the problem as a positional argument: `shep doctor \"agent crashed during planning\"`. Simple but limited for multi-line descriptions."
        selected: false
      - option: "Interactive prompt only"
        description: "Doctor always opens an interactive prompt (e.g., via inquirer or readline) for the user to describe the problem. More flexible but cannot be used in scripts or CI."
        selected: false
      - option: "Argument with interactive fallback"
        description: "Accept an optional positional argument or --description flag. If not provided, fall back to an interactive prompt. Supports both scripted and interactive usage."
        selected: true
      - option: "Editor-based input"
        description: "Open the user's $EDITOR for a detailed description (like git commit). Rich input but heavyweight for quick reports."
        selected: false
    selectionRationale: "Argument-with-fallback follows the existing CLI pattern in the codebase (e.g., `shep feat new` accepts a description argument but could prompt). It supports both quick one-liner reports (`shep doctor \"X broke\"`) and detailed interactive descriptions when no argument is given."
    answer: "Argument with interactive fallback"
  - question: "Should doctor automatically attempt a fix, or should it ask the user before invoking the AI agent?"
    resolved: true
    options:
      - option: "Always auto-fix"
        description: "After creating the issue, immediately invoke the AI agent to attempt a fix. Fastest path to resolution but consumes AI tokens without user consent."
        selected: false
      - option: "Ask before fixing"
        description: "After creating the issue, prompt the user: 'Would you like shep to attempt a fix?' User can opt out and just have the issue filed. Respects user autonomy and token budget."
        selected: true
      - option: "Flag-controlled (--fix / --no-fix)"
        description: "Default to attempting a fix, but allow --no-fix to skip. Or default to issue-only and require --fix to attempt. Scriptable but less discoverable."
        selected: false
    selectionRationale: "Asking before fixing respects the user's autonomy and token budget. The fix attempt involves cloning a repo, running an AI agent (which costs money), and opening a PR. Users should consciously opt in. A --fix flag can be added alongside for scripted/CI usage to bypass the prompt."
    answer: "Ask before fixing"
  - question: "What context should doctor automatically collect for diagnosis?"
    resolved: true
    options:
      - option: "Minimal - user description only"
        description: "Only use what the user tells us. Simple but may result in low-quality issue reports."
        selected: false
      - option: "Recent agent runs and errors"
        description: "Query IAgentRunRepository for recent failed/errored agent runs, include their error messages, agent type, and prompts. Also include shep CLI version. Provides actionable context without being invasive."
        selected: true
      - option: "Full diagnostic dump"
        description: "Collect agent runs, settings (redacted), system info (OS, Node version, gh version), recent CLI command history, and log files. Comprehensive but may include sensitive data and be overwhelming."
        selected: false
    selectionRationale: "Recent agent runs and errors provide the most actionable diagnostic context. Failed agent runs contain error messages, stack traces, and the prompts that triggered them -- exactly what a developer needs to reproduce and fix the issue. Adding CLI version gives version context. Full diagnostic dumps risk exposing sensitive settings and are rarely needed for initial triage."
    answer: "Recent agent runs and errors"
  - question: "How many fix attempts should doctor make before giving up?"
    resolved: true
    options:
      - option: "Single attempt"
        description: "One shot -- invoke the agent once, open a PR with whatever it produces. Fast, low cost, but may not succeed."
        selected: true
      - option: "Up to 3 attempts with CI validation"
        description: "Like the ci-watch-fix-loop pattern: attempt a fix, run tests, retry up to 3 times if tests fail. More thorough but much slower and costlier, and the agent is fixing shep itself (not user code), so CI may not be easily runnable in the fork."
        selected: false
      - option: "Configurable via settings"
        description: "Let the user configure max attempts in shep settings. Flexible but adds complexity for a meta-feature that should be simple."
        selected: false
    selectionRationale: "A single attempt is appropriate for this meta-feature. The doctor is filing a bug report and making a best-effort fix -- it's not a production CI pipeline. The PR will go through shep-ai/cli's own CI when opened, and maintainers will review it. Multiple retry loops would be slow, expensive, and complex to implement for a first iteration. The CI-watch-fix pattern can be added in a future enhancement if needed."
    answer: "Single attempt"
  - question: "Where should the cloned shep repository be placed for the fix attempt?"
    resolved: true
    options:
      - option: "System temp directory"
        description: "Clone into os.tmpdir()/shep-doctor-<uuid>/. Auto-cleaned by OS, no clutter in user workspace. But user may want to inspect the fix locally."
        selected: false
      - option: "User-configurable directory"
        description: "Default to a temp directory but allow --workdir flag to specify where to clone. Balances convenience with flexibility for power users who want to inspect or modify the fix before PR."
        selected: true
      - option: "Current working directory"
        description: "Clone into ./shep-doctor-fix/ in the current directory. Visible and accessible but pollutes the user's project directory."
        selected: false
    selectionRationale: "Defaulting to temp with an optional --workdir flag gives the best of both worlds. Most users won't need to inspect the fix locally (they'll see it in the PR), but power users and shep developers can specify a directory to review changes before the PR is opened."
    answer: "User-configurable directory"
  - question: "Should doctor create a new service interface or extend IExternalIssueFetcher for issue creation?"
    resolved: true
    options:
      - option: "Extend IExternalIssueFetcher"
        description: "Add a createGitHubIssue() method to the existing interface. Keeps issue-related operations together but violates the interface segregation principle (fetching vs. creating are different responsibilities)."
        selected: false
      - option: "New IGitHubIssueService interface"
        description: "Create a dedicated service interface for GitHub issue creation/management, separate from the fetcher. Clean separation of concerns, follows ISP. The existing fetcher stays read-only."
        selected: true
      - option: "Direct gh CLI calls in the use case"
        description: "Shell out to gh directly from the use case without a service abstraction. Quick to implement but untestable and violates clean architecture."
        selected: false
    selectionRationale: "A new IGitHubIssueService interface follows the codebase's clean architecture pattern and interface segregation principle. The existing IExternalIssueFetcher is a read-only fetcher by design -- adding write operations would muddy its contract. A separate service for issue creation is independently testable and can be extended later (e.g., issue updates, label management)."
    answer: "New IGitHubIssueService interface"
content: "## Problem Statement\n\nWhen shep encounters operational failures (agent crashes, incorrect outputs, broken workflows),\nusers currently have no built-in way to report these issues or trigger self-healing. Users must\nmanually file GitHub issues and wait for maintainer fixes. The `shep doctor` feature provides a\nself-service mechanism where users can report problems, and shep will automatically:\n\n1. Collect the user's problem description and recent operation context (failed agent runs, errors)\n2. Diagnose the root cause using AI analysis of the collected context\n3. Open a structured GitHub issue on shep-ai/cli describing the failure with full diagnostic data\n4. Optionally invoke an AI agent to attempt a fix in the shep codebase\n5. Open a PR with the proposed fix — either directly (for maintainers) or via fork (for external contributors)\n\nThis closes the feedback loop — shep can fix itself. The feature supports both shep\nmaintainers/owners (who have push access to shep-ai/cli and push directly) and external\ncontributors (who fork first and open cross-fork PRs).\n\nReference: [GitHub Issue #436](https://github.com/shep-ai/cli/issues/436)\n\n## Success Criteria\n\n- [ ] `shep doctor` command is registered and accessible as a top-level CLI command\n- [ ] Running `shep doctor --help` displays usage information with all options\n- [ ] User can provide a problem description via positional argument (`shep doctor \"description\"`)\n- [ ] User is prompted interactively for a description if none is provided as argument\n- [ ] Doctor automatically collects recent failed agent runs from IAgentRunRepository\n- [ ] Doctor collects the current shep CLI version as diagnostic context\n- [ ] Doctor formats a structured GitHub issue with title, description, diagnostic context, and reproduction steps\n- [ ] Doctor creates the issue on shep-ai/cli via `gh issue create` and displays the issue URL to the user\n- [ ] Doctor prompts the user asking whether to attempt a fix (skippable with --fix or --no-fix flags)\n- [ ] Doctor auto-detects whether the user has push access to shep-ai/cli via `gh api` permissions check\n- [ ] When user has push access (maintainer/owner): doctor clones shep-ai/cli directly and pushes the fix branch\n- [ ] When user lacks push access (external contributor): doctor forks shep-ai/cli, clones the fork, and opens a cross-fork PR\n- [ ] Doctor invokes the AI agent (via IAgentExecutorProvider) with the issue context as a fix prompt\n- [ ] Doctor opens a PR referencing the created issue and displays the PR URL\n- [ ] Doctor gracefully handles missing `gh` CLI with a clear error message and installation instructions\n- [ ] Doctor gracefully handles unauthenticated `gh` with a clear error message and `gh auth login` instructions\n- [ ] Doctor gracefully handles agent execution failures without crashing\n- [ ] The --no-fix flag skips the fix attempt and only creates the issue\n- [ ] The --fix flag skips the confirmation prompt and proceeds directly to fix attempt\n- [ ] The --workdir flag allows specifying a custom directory for the cloned repo\n- [ ] Unit tests cover the DoctorDiagnoseUseCase with mocked dependencies\n- [ ] Unit tests cover the IGitHubIssueService implementation\n- [ ] Unit tests cover both the direct-push path (maintainer) and the fork path (external contributor)\n- [ ] Integration tests cover the end-to-end doctor workflow with mocked external services\n\n## Functional Requirements\n\n- **FR-1: CLI Command Registration** — A top-level `shep doctor` command is registered in the CLI\n  program via `program.addCommand(createDoctorCommand())`. The command accepts an optional\n  positional argument `[description]` for the problem description, and supports `--fix`,\n  `--no-fix`, and `--workdir <path>` options.\n\n- **FR-2: Problem Description Collection** — If no description is provided as an argument, the\n  command interactively prompts the user to describe the problem. The prompt should support\n  multi-line input (press Enter twice to submit or use a readline-based prompt).\n\n- **FR-3: Diagnostic Context Collection** — Doctor automatically queries `IAgentRunRepository`\n  for recent agent runs (last 10, filtered to failed/errored status). For each failed run, it\n  collects: agent type, agent name, error message, prompt used, and timestamps. It also collects\n  the current shep CLI version via `IVersionService`.\n\n- **FR-4: Issue Formatting** — Doctor formats a structured GitHub issue body containing:\n  (a) User-provided problem description,\n  (b) Shep CLI version,\n  (c) Recent failed agent run summaries (agent type, error, timestamp),\n  (d) A \"Reported via `shep doctor`\" footer tag.\n  The issue title is derived from the first line/sentence of the user description, prefixed\n  with \"[shep doctor]\".\n\n- **FR-5: GitHub Issue Creation** — Doctor creates an issue on the `shep-ai/cli` repository\n  using a new `IGitHubIssueService` service that wraps `gh issue create`. The service returns\n  the created issue's URL and number. The issue is labeled with `bug` and `shep-doctor`.\n\n- **FR-6: Fix Confirmation Gate** — After issue creation, doctor asks the user whether to\n  attempt a fix. The `--fix` flag bypasses this prompt and proceeds automatically. The\n  `--no-fix` flag skips the fix attempt entirely. Without either flag, an interactive\n  confirmation prompt is shown.\n\n- **FR-7: Push Access Detection** — Before cloning, doctor checks whether the authenticated\n  GitHub user has push access to `shep-ai/cli` by calling\n  `gh api repos/shep-ai/cli --jq '.permissions.push'`. This determines whether to use the\n  direct-push path (maintainer flow) or the fork path (external contributor flow). The\n  permission check result is cached for the duration of the doctor session.\n\n- **FR-8: Repository Setup — Maintainer Flow** — When the user has push access to shep-ai/cli,\n  doctor clones shep-ai/cli directly into the working directory (temp dir by default, or\n  `--workdir` if specified) and creates a fix branch named `doctor/fix-<issue-number>`. After\n  the agent completes, doctor pushes the branch directly to shep-ai/cli and opens a same-repo\n  PR.\n\n- **FR-9: Repository Setup — External Contributor Flow** — When the user lacks push access,\n  doctor forks shep-ai/cli into the user's GitHub account (if not already forked) using\n  `gh repo fork`, then clones the fork into the working directory. Creates a fix branch named\n  `doctor/fix-<issue-number>`. After the agent completes, doctor pushes to the fork and opens\n  a cross-fork PR against shep-ai/cli.\n\n- **FR-10: AI Agent Fix Invocation** — Doctor invokes the configured AI agent via\n  `IAgentExecutorProvider.getExecutor()` with a structured prompt containing:\n  (a) The issue title and body,\n  (b) Instructions to analyze the shep codebase and propose a fix,\n  (c) The specific error context from failed agent runs.\n  The agent executes in the cloned directory with a `repositoryPath` option. This step is\n  identical regardless of whether the maintainer or external contributor flow was used.\n\n- **FR-11: PR Creation** — After the agent completes, doctor commits any changes, pushes to\n  the appropriate remote (upstream for maintainers, fork for external contributors), and opens\n  a PR using `gh pr create`. The PR title references the issue, the body includes a summary of\n  the fix attempt, and it links to the created issue with \"Fixes #N\" or \"Relates to #N\".\n  For cross-fork PRs, the `--repo shep-ai/cli` flag is used to target the upstream repository.\n\n- **FR-12: Progress Reporting** — Doctor displays clear progress messages at each step using\n  the existing `messages.*()` and `spinner()` utilities: collecting diagnostics, creating\n  issue, checking permissions, cloning/forking repo, running agent, creating PR. Each step\n  shows success/failure status. The permission check step should indicate which flow was\n  selected (e.g., \"You have push access — cloning directly\" or \"Forking shep-ai/cli to\n  your account\").\n\n- **FR-13: Prerequisite Validation** — Before starting, doctor validates that `gh` CLI is\n  installed and authenticated. If `gh` is not found, it displays an error with installation\n  instructions. If `gh` is not authenticated, it displays an error with `gh auth login`\n  instructions. This check uses the existing `IToolInstallerService.checkAvailability('gh')`\n  pattern.\n\n## Non-Functional Requirements\n\n- **NFR-1: Graceful Degradation** — If any step fails (issue creation, permission check, fork,\n  agent execution, PR creation), doctor reports the failure clearly and continues with\n  subsequent steps where possible. For example, if the agent fails to produce a fix, doctor\n  still reports the issue URL and informs the user that the fix attempt failed. If the\n  permission check fails, doctor falls back to the fork path as the safe default.\n\n- **NFR-2: No Sensitive Data Leakage** — Diagnostic context included in the GitHub issue must\n  not contain API keys, tokens, passwords, or other secrets from user settings. Agent run\n  records should be sanitized to remove any credential-like values before inclusion.\n\n- **NFR-3: Idempotent Fork** — If the user already has a fork of shep-ai/cli, the fork step\n  should detect the existing fork and use it rather than failing or creating a duplicate.\n  `gh repo fork` handles this natively.\n\n- **NFR-4: Clean Architecture Compliance** — The feature must follow the existing clean\n  architecture: domain models in TypeSpec, use case in application layer, service interface\n  (port) in application layer, service implementation in infrastructure layer, CLI command\n  in presentation layer. No layer may skip or shortcut the dependency direction.\n\n- **NFR-5: Testability** — All external operations (gh CLI, file system, agent execution,\n  permission checks) must be injected via interfaces, enabling full unit test coverage with\n  mocks. No direct subprocess calls from the use case. Both the maintainer and external\n  contributor flows must be independently testable.\n\n- **NFR-6: Performance** — The diagnostic collection step (querying agent runs, version info)\n  should complete in under 2 seconds. The permission check (single `gh api` call) should\n  complete in under 3 seconds. The overall doctor flow (excluding agent execution and network\n  operations) should have no unnecessary delays.\n\n- **NFR-7: User Feedback** — Every operation that takes more than 1 second must show a\n  spinner or progress indicator. The user should never see a frozen terminal with no feedback.\n\n- **NFR-8: Cleanup** — If using a temp directory for the clone, it should be cleaned up after\n  the PR is created (or after failure). If `--workdir` is specified, the directory is\n  preserved for user inspection.\n\n- **NFR-9: Permission Check Resilience** — If the `gh api` permission check fails (network\n  error, rate limiting, API change), doctor must not crash. It should fall back to the fork\n  path as the safe default and inform the user that permission detection failed.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | How to handle repo access for fix? | Auto-detect push access | Maintainers push directly (no unnecessary fork); external contributors auto-fork. Single `gh api` call detects permissions. |\n| 2 | How to collect problem description? | Argument with interactive fallback | Follows existing CLI patterns; supports both scripted and interactive usage |\n| 3 | Auto-fix or ask first? | Ask before fixing | Respects user autonomy and AI token budget; --fix flag available for automation |\n| 4 | What diagnostic context to collect? | Recent agent runs and errors | Most actionable data for bug reports; avoids exposing sensitive settings |\n| 5 | How many fix attempts? | Single attempt | Best-effort fix for a meta-feature; PR goes through upstream CI anyway |\n| 6 | Where to clone for fix? | User-configurable directory | Temp dir default with --workdir override for power users |\n| 7 | New interface or extend existing? | New IGitHubIssueService | Clean separation per ISP; keeps IExternalIssueFetcher read-only |\n\n## Codebase Analysis\n\n### Project Structure\n\nThe codebase follows Clean Architecture with four layers in `packages/core/src/`:\n\n- **domain/** — Core business logic, TypeSpec-generated models (`output.ts`)\n- **application/** — Use cases and output port interfaces (services, repositories)\n- **infrastructure/** — External implementations: SQLite repos, agent services, git/GitHub services\n- **presentation/** — CLI commands (`src/presentation/cli/`), TUI, Web UI\n\nCLI commands live in `src/presentation/cli/commands/` organized by feature group (feat/, agent/, repo/, settings/).\nTop-level commands (run, start, stop, ui, etc.) are standalone files. Commands are registered in\n`src/presentation/cli/index.ts` via `program.addCommand()`.\n\n### Architecture Patterns\n\n- **Use Case Pattern**: Each operation is a `@injectable()` class with a single `execute()` method,\n  dependencies injected via `@inject()` tokens. ~58 use cases exist.\n- **Repository Pattern**: SQLite-backed repositories behind interfaces (e.g., `IFeatureRepository`,\n  `IAgentRunRepository`).\n- **Agent Executor Abstraction**: All agent invocations go through `IAgentExecutorProvider` →\n  `IAgentExecutor`. Agent type resolved from settings, never hardcoded.\n- **Service Interfaces (Output Ports)**: `IGitPrService`, `IGitHubRepositoryService`,\n  `IExternalIssueFetcher` — all defined as interfaces in `application/ports/output/services/`.\n- **DI Container**: tsyringe container in `infrastructure/di/container.ts` registers all\n  repositories, services, and use cases.\n\n### Existing Infrastructure to Reuse\n\n1. **GitHub Issue Fetcher** (`infrastructure/services/external/github-issue.service.ts`) —\n   Currently read-only (fetches issues via `gh issue view`). Informs the design of the new\n   `IGitHubIssueService` for issue creation.\n2. **Git PR Service** (`infrastructure/services/git/git-pr.service.ts`) — Already has `createPr()`,\n   `pushBranch()`, `getCiStatus()`, `getDiffSummary()`. Reusable for PR creation.\n3. **GitHub Repository Service** (`infrastructure/services/external/github-repository.service.ts`)\n   — Has `checkAuth()` for verifying `gh` authentication. Can be extended or a new method added\n   to check repository-level push permissions via `gh api`.\n4. **Agent Executor** — `IAgentExecutorProvider.getExecutor()` provides a configured\n   `IAgentExecutor` with `execute(prompt, options)`. Ready to use for fix attempts.\n5. **CI Watch/Fix Loop** (`infrastructure/services/agents/feature-agent/nodes/merge/ci-watch-fix-loop.ts`)\n   — Pattern reference for iterative fix attempts. Not directly reused in v1 (single attempt)\n   but informs future enhancement.\n6. **CLI UI utilities** (`src/presentation/cli/ui/`) — `messages.*()`, `spinner()`, `colors.*()`,\n   `renderDetailView()` for consistent CLI output.\n7. **Tool Installer Service** — `IToolInstallerService.checkAvailability()` for validating\n   gh CLI installation.\n8. **Version Service** — `IVersionService` for collecting shep CLI version in diagnostics.\n9. **Agent Run Repository** — `IAgentRunRepository.list()` for querying recent failed runs.\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| `src/presentation/cli/commands/` | High | New `doctor.command.ts` top-level command |\n| `src/presentation/cli/index.ts` | Low | Register the new doctor command |\n| `packages/core/src/application/use-cases/` | High | New `DoctorDiagnoseUseCase` with diagnose -> issue -> fix -> PR flow |\n| `packages/core/src/application/ports/output/services/` | Medium | New `IGitHubIssueService` interface; possible `IGitHubRepositoryService` extension for permission check |\n| `packages/core/src/infrastructure/services/external/` | Medium | New `GitHubIssueService` implementation wrapping `gh issue create`; permission check implementation |\n| `packages/core/src/infrastructure/services/git/` | Low | Reuse existing `git-pr.service.ts` for PR creation |\n| `packages/core/src/infrastructure/di/container.ts` | Low | Register new use case and IGitHubIssueService |\n| `tsp/` | Low | Optional TypeSpec model for DoctorDiagnosisResult value object |\n| `tests/` | High | Unit tests for use case, service; integration tests for both maintainer and contributor flows |\n\n## Dependencies\n\n- **gh CLI** — Must be installed and authenticated for issue/PR creation, forking, and permission checks\n- **IAgentExecutorProvider** — For invoking AI agent to attempt fixes\n- **IGitPrService** — For creating PRs with fix attempts\n- **IAgentRunRepository** — For querying recent failed agent runs as diagnostic context\n- **IVersionService** — For collecting shep CLI version in diagnostics\n- **IToolInstallerService** — For validating gh CLI availability before starting\n- **IGitHubRepositoryService** — For checking push permissions on shep-ai/cli\n\n## Size Estimate\n\n**L** — This feature requires a new CLI command, a new use case with multi-step orchestration\n(diagnose -> create issue -> check permissions -> clone or fork/clone -> invoke agent -> create PR),\na new service interface and implementation for GitHub issue creation, push access detection logic\nwith two distinct flows (maintainer vs external contributor), and comprehensive testing of both\npaths. The workflow is more complex than a simple CRUD operation but can leverage significant\nexisting infrastructure (agent executor, PR service, CLI patterns, tool installer, GitHub\nrepository service).\n\n---\n\n_Requirements defined — proceed with research_\n"
