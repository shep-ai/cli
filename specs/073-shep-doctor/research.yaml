name: "shep-doctor"
summary: >
  Technical research for the shep doctor feature covering architecture, service design,
  CLI patterns, diagnostic collection, GitHub integration (issue creation, fork detection,
  PR creation), AI agent invocation, and security considerations. Key decisions include
  a new IGitHubIssueService interface for issue creation, extending IGitHubRepositoryService
  for push-access detection, using @inquirer/prompts for interactive input, and leveraging
  the existing IAgentExecutorProvider for fix attempts.

