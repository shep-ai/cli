decisions:
  - title: "Use case orchestration strategy"
    chosen: "Single DoctorDiagnoseUseCase with step-based orchestration"
    rejected:
      - "Multiple small use cases (DiagnoseUseCase, CreateIssueUseCase, FixUseCase) — over-fragmented for a sequential workflow; adds DI complexity and cross-use-case coordination without clear benefit. The steps are tightly coupled (each step depends on outputs of prior steps)."
      - "LangGraph agent workflow — heavyweight for a deterministic sequential flow; LangGraph is appropriate for iterative AI-driven loops (like ci-watch-fix) but doctor's flow is linear: collect -> diagnose -> issue -> fix -> PR. No conditional branching or retry loops in v1."
    rationale: >
      The existing codebase uses single use cases for multi-step orchestrations (e.g.,
      CreateFeatureUseCase handles analysis, repository setup, and feature creation in one
      execute() call). The doctor workflow is inherently sequential with each step depending
      on the prior step's output (diagnosis feeds issue body, issue number feeds branch name,
      branch feeds PR). A single use case keeps the flow readable and testable with clear
      input/output. The use case delegates to injected services for each external operation,
      maintaining clean architecture separation.

  - title: "GitHub issue creation service design"
    chosen: "New IGitHubIssueService interface in application/ports/output/services/"
    rejected:
      - "Extend IExternalIssueFetcher with createIssue() — violates interface segregation principle. IExternalIssueFetcher is a read-only fetcher designed for external issue references (GitHub issues, Jira tickets). Adding write operations changes its contract and responsibilities."
      - "Direct gh CLI calls in the use case — violates clean architecture (infrastructure concern in application layer), untestable without mocking subprocess calls, and inconsistent with how every other external operation is abstracted in the codebase."
    rationale: >
      The codebase consistently defines service interfaces as output ports in
      application/ports/output/services/ with co-located DTOs and error types. A new
      IGitHubIssueService follows this exact pattern (see IGitPrService, IGitHubRepositoryService).
      The interface will define createIssue() and return a structured result with issue URL
      and number. The implementation wraps gh CLI calls via the injected ExecFunction,
      matching the pattern in GitPrService and GitHubRepositoryService. This keeps the use
      case testable with a simple mock.

  - title: "Push access detection approach"
    chosen: "Add checkPushAccess(repoNameWithOwner) method to IGitHubRepositoryService"
    rejected:
      - "New dedicated IPermissionService — over-engineering for a single method call. Permission checking is a GitHub repository operation and belongs with the existing repository service that already handles auth checks and repo operations."
      - "Check push access in the CLI command layer — violates clean architecture. Permission logic is a business concern that belongs in the use case or infrastructure service, not the presentation layer."
    rationale: >
      IGitHubRepositoryService already handles GitHub repository operations (checkAuth,
      cloneRepository, listUserRepositories). Adding a checkPushAccess() method that calls
      gh api repos/{owner}/{repo} --jq '.permissions.push' is a natural extension of this
      service. It uses the same ExecFunction injection and error handling patterns. The method
      returns a boolean, with false as the safe fallback on any error (network, rate limit,
      API change). This follows NFR-9 (permission check resilience).

  - title: "Repository fork handling"
    chosen: "Add forkRepository(repoNameWithOwner) method to IGitHubRepositoryService"
    rejected:
      - "New IForkService interface — unnecessary fragmentation. Forking is a GitHub repository operation, not a separate domain concept. The existing service already handles clone and list operations on GitHub repos."
      - "Inline gh repo fork call in the use case — violates clean architecture and makes the fork operation untestable without subprocess mocking."
    rationale: >
      The fork operation naturally belongs with IGitHubRepositoryService which already
      manages repository-level GitHub operations. The gh repo fork command is idempotent
      (NFR-3) — if a fork already exists, gh detects it and returns the existing fork.
      The method returns the fork's nameWithOwner (e.g., username/cli) so the use case
      knows where to clone from. This mirrors the cloneRepository pattern already in the
      service.

  - title: "Interactive prompting library"
    chosen: "@inquirer/prompts (confirm, input)"
    rejected:
      - "node:readline — lower-level, requires manual cleanup, missing features like Ctrl+C handling. Only used in one legacy command (init.command.ts). The rest of the codebase uses @inquirer/prompts."
      - "Custom prompt utility — unnecessary when @inquirer/prompts is already a project dependency with established patterns for confirm() and input() across multiple commands."
    rationale: >
      @inquirer/prompts is the established prompting library in the codebase, used in
      del.command.ts (confirm), model.command.ts (select), and workflow.command.ts (select).
      It provides clean APIs for confirm() (fix attempt gate) and input() (problem description
      fallback). The Ctrl+C handling pattern (checking err.message.includes('force closed'))
      is well-established. No new dependency needed.

  - title: "Diagnostic context collection scope"
    chosen: "Agent runs + CLI version + system info (OS, Node, gh version)"
    rejected:
      - "User description only — insufficient for meaningful bug reports. Developers need error messages, stack traces, and environment info to reproduce issues."
      - "Full dump with settings — risks exposing agent.token and other secrets. Settings contain sensitive auth data that must never appear in public GitHub issues."
    rationale: >
      The spec requires full diagnostic dump (open question #4), but with sanitization per
      NFR-2. The practical implementation collects: (1) recent failed agent runs from
      IAgentRunRepository.list() filtered in-memory to failed/errored status (last 10),
      (2) CLI version from IVersionService, (3) system info via process.version,
      process.platform, process.arch (matching version.command.ts pattern), (4) gh CLI
      version via gh --version. Agent run records naturally contain error messages and
      agent types without secrets. Settings are excluded entirely to prevent leaking
      agent.token or other credentials.

  - title: "PR creation approach for cross-fork PRs"
    chosen: "Add createPrFromArgs() to IGitPrService with --repo flag support"
    rejected:
      - "Reuse existing IGitPrService.createPr(cwd, prYamlPath) — requires writing a temp YAML file just to pass structured data. The pr.yaml pattern is designed for the feature workflow where an agent generates the YAML, not for programmatic PR creation."
      - "Create PR in IGitHubIssueService — muddies the issue service with PR concerns and violates single responsibility. PR creation belongs with the existing PR service."
    rationale: >
      The existing createPr() reads from a pr.yaml file because the feature workflow
      generates pr.yaml files. Doctor needs programmatic PR creation with specific args
      (title, body, labels, --repo flag for cross-fork). A new method with explicit
      parameters is more direct. For the maintainer flow, gh pr create runs in the cloned
      shep-ai/cli directory. For the external contributor flow, gh pr create --repo shep-ai/cli
      targets the upstream. This also benefits any future feature needing programmatic PR creation.

  - title: "Working directory management"
    chosen: "os.tmpdir() with UUID subdirectory by default, --workdir override"
    rejected:
      - "Always use current working directory — pollutes the user's project with a shep-ai/cli clone. The user runs shep doctor in their own project, not in the shep codebase."
      - "XDG cache directory — overly complex for a temp clone that will be deleted after the PR is created. The OS temp directory is the standard location for ephemeral data."
    rationale: >
      The temp directory (os.tmpdir()/shep-doctor-<uuid>/) is appropriate because the clone
      is ephemeral — it exists only for the duration of the fix attempt. After PR creation,
      it's cleaned up (NFR-8). The --workdir flag overrides this for power users who want to
      inspect the fix locally. The uuid suffix prevents collisions if multiple doctor sessions
      run concurrently.

  - title: "Agent execution for fix attempts"
    chosen: "IAgentExecutorProvider.getExecutor() with repositoryPath pointing to cloned dir"
    rejected:
      - "Spawn a new shep process in the cloned directory — over-engineering. The agent executor already supports running in any directory via the repositoryPath option."
      - "Hardcode agent type (e.g., always Claude Code) — violates the mandatory rule that no component may hardcode an agent type. All resolution must flow through IAgentExecutorProvider."
    rationale: >
      The codebase's mandatory rule requires all agent invocations to go through
      IAgentExecutorProvider, which reads the configured agent type from settings. The
      IAgentExecutor.execute(prompt, options) method accepts AgentExecutionOptions which
      includes repositoryPath. The doctor use case sets repositoryPath to the cloned
      shep-ai/cli directory. This is identical to how the feature agent works.

  - title: "Settings extension for doctor configuration"
    chosen: "Add optional doctorMaxFixAttempts field to WorkflowConfig in TypeSpec"
    rejected:
      - "New top-level DoctorConfig section in Settings — over-engineering for a single config field. Doctor only needs max fix attempts, which is conceptually similar to ciMaxFixAttempts."
      - "Hardcode max attempts to 1 — the spec's open question #5 resolved to 'configurable via settings'. While the default should be 1, power users should be able to increase it."
    rationale: >
      WorkflowConfig already contains ciMaxFixAttempts for the CI watch-fix loop pattern.
      Adding doctorMaxFixAttempts follows the same pattern and keeps all workflow-related
      configuration in one place. The TypeSpec model in tsp/domain/entities/settings.tsp
      is extended with an optional int32 field defaulting to 1.

  - title: "TypeSpec domain model additions"
    chosen: "Add DoctorDiagnosticReport value object in TypeSpec"
    rejected:
      - "No TypeSpec models, use plain TypeScript interfaces — violates the mandatory TypeSpec-first rule. All domain models must be defined in TypeSpec."
      - "Full DoctorSession entity with BaseEntity — over-engineering. Doctor doesn't need persistence; it's a run-once command. A value object for the diagnostic report is sufficient."
    rationale: >
      The mandatory rule requires TypeSpec-first domain models. A DoctorDiagnosticReport
      value object captures the structured diagnostic data (user description, failed runs
      summary, system info, CLI version) that gets formatted into the issue body. Defined in
      tsp/domain/value-objects/doctor-diagnostic-report.tsp. It's a value object (no
      BaseEntity) because it's transient — created during the doctor flow and never persisted.

