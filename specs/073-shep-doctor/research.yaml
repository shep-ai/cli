  - question: "Should the doctor service interface be a single IDoctorGitHubService or split into IGitHubIssueService and extend IGitHubRepositoryService?"
    resolved: true
    options:
      - option: "Single IDoctorGitHubService"
        description: "One interface handling issue creation, PR creation, fork management, and permission checks specifically for the doctor workflow. Cohesive but tightly coupled to the doctor feature."
        selected: false
      - option: "IGitHubIssueService + extend IGitHubRepositoryService"
        description: "A new IGitHubIssueService for issue creation (reusable beyond doctor), and extend IGitHubRepositoryService with checkPushAccess() and forkRepository() (reusable for any GitHub repo operation). More interfaces but more reusable."
        selected: true
      - option: "Extend IGitHubRepositoryService only"
        description: "Add all new methods (createIssue, checkPushAccess, forkRepository) to the existing interface. Keeps interface count low but violates ISP by mixing read, write, and permission operations."
        selected: false
    selectionRationale: >
      Splitting into IGitHubIssueService (for issue creation) and extending
      IGitHubRepositoryService (for push access and fork) follows the interface segregation
      principle and makes each capability independently reusable. Issue creation is a distinct
      responsibility from repository management. The push access check and fork operation are
      natural extensions of the existing repository service. This matches the spec's resolved
      question #7 which chose a new IGitHubIssueService.

  - question: "How should the PR be created for the doctor fix — reuse IGitPrService or new method?"
    resolved: true
    options:
      - option: "Reuse IGitPrService.createPr(cwd, prYamlPath)"
        description: "Write a temporary pr.yaml file and pass it to the existing method. Reuses existing code but requires constructing a YAML file just to pass structured data, which is indirect."
        selected: false
      - option: "Add createPrFromArgs() to IGitPrService"
        description: "Add a new method to IGitPrService that accepts title, body, labels, base branch, and optional --repo flag as parameters instead of reading from YAML. More flexible and direct."
        selected: true
      - option: "Put PR creation in IGitHubIssueService"
        description: "Handle PR creation alongside issue creation in the same service. Keeps doctor-related GitHub operations together but muddies the issue service with PR concerns."
        selected: false
    selectionRationale: >
      Adding a createPrFromArgs() method to IGitPrService is the cleanest approach. The
      existing createPr() method reads from a YAML file because the feature workflow
      generates pr.yaml files. Doctor needs to create PRs programmatically with specific
      args (title, body, labels, --repo flag for cross-fork). A new method with explicit
      parameters is more direct than writing a temp YAML file.

  - question: "How should the fix attempt prompt be structured for the AI agent?"
    resolved: true
    options:
      - option: "Minimal prompt with issue body only"
        description: "Pass the issue body text as the prompt. Simple but lacks specific instructions for the agent on how to approach the fix."
        selected: false
      - option: "Structured prompt with issue context and fix instructions"
        description: "Build a prompt that includes: the issue title, the error context from failed runs, specific instructions to analyze the codebase and propose a fix, and guidelines to run tests. Gives the agent clear direction."
        selected: true
      - option: "Use a prompt template file"
        description: "Store the fix prompt template as a file in the codebase and interpolate issue-specific data. More maintainable for complex prompts but adds file management overhead for a single use case."
        selected: false
    selectionRationale: >
      A structured prompt built programmatically in the use case gives the agent the best
      chance of producing a useful fix. The prompt includes the issue title (what's wrong),
      error context (specific errors and stack traces from failed agent runs), and
      instructions (analyze the codebase, identify the root cause, implement a fix, run
      tests). This mirrors how the feature agent receives structured prompts with context.

content: |
  ## Technology Decisions

  ### 1. Use Case Orchestration Strategy

  **Chosen:** Single DoctorDiagnoseUseCase with step-based orchestration

  **Rejected:**
  - Multiple small use cases (DiagnoseUseCase, CreateIssueUseCase, FixUseCase) — over-fragmented for a sequential workflow; adds DI complexity and cross-use-case coordination without clear benefit
  - LangGraph agent workflow — heavyweight for a deterministic sequential flow; doctor's steps are linear, not iterative

  **Rationale:** The existing codebase uses single use cases for multi-step orchestrations. The doctor workflow is inherently sequential with each step depending on the prior step's output. A single use case keeps the flow readable and testable.

  ### 2. GitHub Issue Creation Service Design

  **Chosen:** New IGitHubIssueService interface in application/ports/output/services/

  **Rejected:**
  - Extend IExternalIssueFetcher — violates ISP; the fetcher is read-only by design
  - Direct gh CLI calls in the use case — violates clean architecture, untestable

  **Rationale:** Follows the codebase's consistent pattern of service interfaces as output ports with co-located DTOs and error types. The implementation wraps gh CLI calls via ExecFunction.

  ### 3. Push Access Detection

  **Chosen:** Add checkPushAccess(repoNameWithOwner) to IGitHubRepositoryService

  **Rejected:**
  - New IPermissionService — over-engineering for a single method
  - Check in CLI command layer — violates clean architecture

  **Rationale:** IGitHubRepositoryService already handles GitHub repo operations. Push access detection is a natural extension using `gh api repos/{owner}/{repo} --jq '.permissions.push'`. Returns boolean with false as safe fallback.

  ### 4. Repository Fork Handling

  **Chosen:** Add forkRepository(repoNameWithOwner) to IGitHubRepositoryService

  **Rejected:**
  - New IForkService — unnecessary fragmentation
  - Inline in use case — violates clean architecture

  **Rationale:** Forking is a GitHub repository operation. `gh repo fork` is idempotent (detects existing forks). Returns fork's nameWithOwner for downstream clone.

  ### 5. Interactive Prompting Library

  **Chosen:** @inquirer/prompts (confirm, input)

  **Rejected:**
  - node:readline — lower-level, legacy; only used in one old command
  - Custom utility — unnecessary when @inquirer/prompts is already used

  **Rationale:** Established library in the codebase with patterns for confirm(), input(), and Ctrl+C handling.

  ### 6. Diagnostic Context Collection Scope

  **Chosen:** Agent runs + CLI version + system info (OS, Node, gh version)

  **Rejected:**
  - User description only — insufficient for meaningful bug reports
  - Full dump with settings — risks exposing agent.token and other secrets

  **Rationale:** Recent failed agent runs contain error messages and stack traces — the most actionable data. System info (process.version, process.platform) matches the existing version.command.ts pattern. Settings are excluded per NFR-2.

  ### 7. PR Creation for Cross-Fork PRs

  **Chosen:** Add createPrFromArgs() to IGitPrService with --repo flag support

  **Rejected:**
  - Reuse existing createPr(cwd, prYamlPath) — requires writing a temp YAML file, which is indirect
  - Put PR creation in IGitHubIssueService — muddies the issue service with PR concerns

  **Rationale:** The existing createPr() reads from pr.yaml files (feature workflow pattern). Doctor needs programmatic PR creation with specific args including --repo for cross-fork PRs. A new method with explicit parameters is cleaner.

  ### 8. Working Directory Management

  **Chosen:** os.tmpdir() with UUID subdirectory, --workdir override

  **Rejected:**
  - Current working directory — pollutes user's project
  - XDG cache — overly complex for ephemeral data

  **Rationale:** Temp directory is appropriate for an ephemeral clone. UUID prevents collisions. Cleaned up after PR creation (NFR-8). --workdir preserves for power users.

  ### 9. Agent Execution for Fix Attempts

  **Chosen:** IAgentExecutorProvider.getExecutor() with repositoryPath option

  **Rejected:**
  - Spawn new shep process — over-engineering; agent executor supports any directory
  - Hardcode agent type — violates mandatory agent resolution rule

  **Rationale:** Mandatory rule requires all agent invocations through IAgentExecutorProvider. The executor accepts repositoryPath in AgentExecutionOptions.

  ### 10. Settings Extension for Doctor Configuration

  **Chosen:** Add optional doctorMaxFixAttempts to WorkflowConfig in TypeSpec

  **Rejected:**
  - New DoctorConfig section — over-engineering for one field
  - Hardcode to 1 — spec resolves to "configurable via settings"

  **Rationale:** WorkflowConfig already has ciMaxFixAttempts. Adding doctorMaxFixAttempts follows the same pattern. Default is 1 for v1.

  ### 11. TypeSpec Domain Model Additions

  **Chosen:** DoctorDiagnosticReport value object

  **Rejected:**
  - Plain TypeScript interfaces — violates mandatory TypeSpec-first rule
  - Full DoctorSession entity — over-engineering; doctor doesn't need persistence

  **Rationale:** A value object captures diagnostic data (description, failed runs, system info, version). Defined in tsp/domain/value-objects/ and compiled to generated output.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | @inquirer/prompts | Interactive user input (confirm, input) | Use (existing) | Already a project dependency; used in 5+ commands for confirm/select/input prompts |
  | Commander.js | CLI command definition | Use (existing) | Core CLI framework; all commands use it |
  | tsyringe | Dependency injection | Use (existing) | Core DI framework; all services and use cases use it |
  | gh CLI | GitHub operations (issues, PRs, forks, API) | Use (existing runtime dep) | Required for all GitHub interactions; already used by GitPrService and GitHubRepositoryService |
  | node:os | Temp directory, platform info | Use (built-in) | os.tmpdir() for working directory; os.platform()/os.arch() for diagnostics |
  | node:crypto | UUID generation for temp directory | Use (built-in) | crypto.randomUUID() for unique temp directory names |
  | node:fs/promises | Temp directory creation and cleanup | Use (built-in) | mkdir, rm for temp directory lifecycle |
  | picocolors | Terminal color output | Use (existing) | Already used via the colors/fmt utilities in presentation/cli/ui/ |
  | @octokit/rest | GitHub API client | Reject | Over-engineering when gh CLI handles all needed operations. Adding a full API client introduces auth complexity and a large dependency. |
  | simple-git | Git operations library | Reject | The codebase uses ExecFunction to shell out to git directly. Adding a git library would be inconsistent with the existing pattern. |
  | ora | Spinner library | Reject | The codebase has its own spinner utility (src/presentation/cli/ui/spinner.ts) that integrates with the existing UI patterns. |

  ## Security Considerations

  ### Sensitive Data Sanitization (NFR-2)

  The diagnostic report included in the GitHub issue must be sanitized:

  1. **Agent run records**: Include agentType, agentName, status, error, and timestamps. Exclude prompt and result fields which may contain user code or secrets.
  2. **Settings exclusion**: Never include any settings data. The agent.token field contains API keys. Even "redacted" settings could leak structure information.
  3. **Environment variables**: Do not collect or include environment variables. They commonly contain secrets (API_KEY, TOKEN, etc.).
  4. **File paths**: Include repository paths but redact the user's home directory to prevent leaking usernames (replace with ~/).
  5. **Log files**: Do not include raw log file contents. They may contain agent prompts with user code or API responses with sensitive data.

  ### GitHub Token Permissions

  The gh CLI uses the user's existing GitHub authentication. The doctor feature requires:
  - `repo` scope for issue creation and PR creation on shep-ai/cli
  - `read:org` scope for permission checks (if shep-ai is an org)
  - `workflow` scope is NOT required (doctor doesn't modify GitHub Actions)

  If the user's token lacks required scopes, gh CLI will return appropriate errors which the service handles gracefully.

  ### Cross-Fork PR Security

  When an external contributor forks and opens a PR, the PR content is visible to the upstream maintainers. The agent's fix attempt may include:
  - Code changes (intended and safe)
  - Commit messages (safe)
  - No secrets since the agent runs with the user's local shep-ai/cli clone, not the user's project

  ## Performance Implications

  ### Diagnostic Collection (NFR-6: < 2 seconds)

  - `IAgentRunRepository.list()` returns all records (SELECT * FROM agent_runs). For users with many agent runs, this could be slow. Mitigation: filter in-memory to last 10 failed/errored runs, and consider adding a listRecent(limit, statusFilter) method if performance is an issue.
  - `IVersionService.getVersion()` is synchronous (reads from package.json at startup). Instant.
  - `process.version`, `process.platform`, `process.arch` are synchronous globals. Instant.
  - `gh --version` is a local command, typically < 100ms.

  ### Permission Check (NFR-6: < 3 seconds)

  - `gh api repos/shep-ai/cli --jq '.permissions.push'` is a single HTTP request. Typically 200-500ms.
  - Cached for the session duration — only called once.

  ### Network-Bound Operations

  These are inherently slow and get spinners (NFR-7):
  - `gh issue create` — 1-3 seconds (API call)
  - `gh repo fork` — 5-15 seconds (creates fork on GitHub)
  - `gh repo clone` — varies by repo size (shep-ai/cli is moderate)
  - Agent execution — 30 seconds to several minutes depending on the agent and model
  - `gh pr create` — 1-3 seconds (API call)

  ### Cleanup

  Temp directory cleanup (rm -rf) is fast for the cloned repo. Performed in a finally block to ensure cleanup even on failure. Skipped when --workdir is specified.

  ## Architecture Notes

  ### Layer Mapping

  ```
  Presentation (CLI)
    doctor.command.ts
      - Resolves DoctorDiagnoseUseCase from container
      - Handles --fix/--no-fix/--workdir flags
      - Collects user description (arg or @inquirer/prompts input)
      - Displays progress via messages.*/spinner()

  Application (Use Cases)
    DoctorDiagnoseUseCase
      - @inject('IAgentRunRepository')      — query failed runs
      - @inject('IVersionService')           — CLI version
      - @inject('IGitHubIssueService')       — create issue
      - @inject('IGitHubRepositoryService')  — push access check, fork, clone
      - @inject('IGitPrService')             — create PR
      - @inject('IAgentExecutorProvider')    — get agent for fix attempt
      - @inject('ISettingsRepository')       — read doctorMaxFixAttempts

  Application (Ports)
    IGitHubIssueService (NEW)
      - createIssue(repo, title, body, labels) -> { url, number }
      - Co-located: GitHubIssueCreateError, GitHubIssueCreateResult
    IGitHubRepositoryService (EXTENDED)
      - checkPushAccess(repoNameWithOwner) -> boolean
      - forkRepository(repoNameWithOwner) -> { nameWithOwner }
    IGitPrService (EXTENDED)
      - createPrFromArgs(cwd, { title, body, labels, base, repo? }) -> PrCreateResult

  Infrastructure (Implementations)
    GitHubIssueService (NEW) — wraps gh issue create
    GitHubRepositoryService (EXTENDED) — adds checkPushAccess, forkRepository
    GitPrService (EXTENDED) — adds createPrFromArgs

  Domain (TypeSpec)
    DoctorDiagnosticReport (NEW value object)
    WorkflowConfig (EXTENDED with doctorMaxFixAttempts)
  ```

  ### DI Registration

  New registrations needed in container.ts:
  - `container.registerSingleton<IGitHubIssueService>('IGitHubIssueService', GitHubIssueService)`
  - `container.registerSingleton(DoctorDiagnoseUseCase)`

  No new registration for IGitHubRepositoryService or IGitPrService — they are already registered as singletons. The new methods are added to existing implementations.

  ### CLI Command Registration

  In src/presentation/cli/index.ts:
  - `import { createDoctorCommand } from './commands/doctor.command.js'`
  - `program.addCommand(createDoctorCommand())`

  ### Existing Infrastructure Reuse

  | Component | How It's Reused |
  | --------- | --------------- |
  | IAgentRunRepository.list() | Query recent failed agent runs for diagnostics |
  | IVersionService.getVersion() | Include CLI version in diagnostic report |
  | IToolInstallerService.checkAvailability('gh') | Validate gh CLI is installed before starting |
  | IGitHubRepositoryService.checkAuth() | Validate gh is authenticated before starting |
  | IGitHubRepositoryService.cloneRepository() | Clone shep-ai/cli (or fork) for fix attempt |
  | IAgentExecutorProvider.getExecutor() | Get configured AI agent for fix attempt |
  | IGitPrService.pushBranch() | Push fix branch to remote |
  | spinner() | Show progress for async operations |
  | messages.success/error/warning/info() | User-facing status messages |
  | colors, symbols, fmt | Consistent CLI output formatting |
  | @inquirer/prompts confirm() | Fix attempt confirmation gate |
  | @inquirer/prompts input() | Interactive problem description input |

  ### Flow Diagram

  ```
  User: shep doctor ["description"]
    |
    +- 1. Validate prerequisites (gh installed, gh authenticated)
    |
    +- 2. Collect problem description (arg or interactive prompt)
    |
    +- 3. Collect diagnostics
    |     +-- Query IAgentRunRepository for recent failed runs
    |     +-- Get CLI version from IVersionService
    |     +-- Gather system info (Node, OS, gh version)
    |
    +- 4. Format and create GitHub issue
    |     +-- Build structured issue body from DoctorDiagnosticReport
    |     +-- IGitHubIssueService.createIssue() -> issue URL + number
    |
    +- 5. Fix confirmation gate (--fix / --no-fix / interactive prompt)
    |     +-- If no-fix -> display issue URL, exit
    |
    +- 6. Detect push access
    |     +-- IGitHubRepositoryService.checkPushAccess('shep-ai/cli')
    |
    +- 7a. Maintainer flow (has push access):
    |     +-- Clone shep-ai/cli directly
    |     +-- Create branch: doctor/fix-<issue-number>
    |     +-- Run agent fix attempt
    |     +-- Push branch to origin
    |     +-- Create same-repo PR
    |
    +- 7b. Contributor flow (no push access):
    |     +-- Fork shep-ai/cli (idempotent)
    |     +-- Clone the fork
    |     +-- Create branch: doctor/fix-<issue-number>
    |     +-- Run agent fix attempt
