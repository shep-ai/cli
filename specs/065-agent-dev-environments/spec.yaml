  │       ├── services/deployment-service.interface.ts   # IDeploymentService output port
  │       └── agents/                   # IAgentExecutor, IAgentExecutorProvider, IAgentRegistry
  ├── infrastructure/
  │   ├── services/
  │   │   ├── deployment/               # Current naive deployment service (5 files)
  │   │   └── agents/
  │   │       ├── common/               # Shared agent infra (executors, factory, registry, runner)
  │   │       ├── feature-agent/        # Full SDLC agent (reference implementation)
  │   │       └── analyze-repo/         # Simple single-node agent (reference for minimal agent)
  │   ├── di/container.ts               # DI registration
  │   └── persistence/sqlite/           # DB connection, migrations, mappers
  └── presentation/
      └── web/
