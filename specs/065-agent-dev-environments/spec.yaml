# Open questions (must be resolved before implementation)
openQuestions:
  - question: 'What cache strategy should be used for DeploySkill persistence?'
    resolved: true
    options:
      - option: 'Cache-first with manual invalidation'
        description: >
          Always use cached DeploySkill if available; user can manually trigger
          re-analysis. Auto-invalidate on deployment failure. Build configs
          change rarely so cache hits will dominate. Simple to implement and
          reason about.
        selected: true
      - option: 'TTL-based expiration'
        description: >
          Cache expires after a configurable duration (e.g., 24h). Ensures
          stale configs are eventually refreshed. Adds complexity for TTL
          management and may cause unnecessary LLM calls when config hasn't
          changed.
        selected: false
      - option: 'File-hash invalidation'
        description: >
          Hash key project files (Dockerfile, package.json, etc.) and
          invalidate when hashes change. Precise but requires knowing which
          files matter per method, and hashing adds latency on every start.
        selected: false
    selectionRationale: >
      Cache-first with manual invalidation is simplest and most pragmatic. Build
      configs change rarely in practice, so cache hits will dominate. The
      auto-retry on failure provides a safety net for stale configs without
      adding complexity. Manual invalidation gives users control when they
      intentionally change their setup.
    answer: 'Cache-first with manual invalidation'

  - question: 'Which deployment methods should be supported in the initial release?'
    resolved: true
    options:
      - option: 'Script + Docker Compose + Docker'
        description: >
          Covers the three most common local dev scenarios: direct script
          execution (npm/pnpm/yarn/python/go), multi-container orchestration
          (docker compose), and single-container builds (Dockerfile). Covers
          90%+ of real-world repositories.
        selected: true
      - option: 'Script only'
        description: >
          Minimal scope — only shell command execution. Fast to implement but
          misses Docker-based projects entirely, limiting the "any repo" value
          proposition.
        selected: false
      - option: 'Script + Docker Compose + Docker + Kubernetes'
        description: >
          Full coverage including K8s manifests and Helm charts. Significantly
          increases scope (minikube/kind setup, kubectl integration, health
          check complexity) for a deployment method rarely used in local dev.
        selected: false
    selectionRationale: >
      Script + Docker Compose + Docker covers 90%+ of local dev scenarios
      without overextending scope. Kubernetes is rarely used for local dev
      environments and would add significant complexity (minikube/kind setup,
      kubectl integration). The DeployMethod enum already includes Kubernetes
      and Manual, so these can be added in a future iteration.
    answer: 'Script + Docker Compose + Docker'

  - question: 'How should the agent produce deployment configuration output?'
    resolved: true
    options:
      - option: 'Structured output via zod schema'
        description: >
          Use IAgentExecutor's outputSchema parameter with a zod schema that
          mirrors the DeploySkill TypeSpec model. Guarantees valid JSON output
          matching the expected shape. Eliminates parsing fragility and retry
          loops for malformed output.
        selected: true
      - option: 'Free-text output with regex/JSON parsing'
        description: >
          Agent produces free-text or markdown; system extracts deployment
          config via parsing. More flexible for the LLM but fragile — requires
          retry logic for malformed output and edge case handling.
        selected: false
    selectionRationale: >
      Structured output via zod is the established pattern in this codebase
      (IAgentExecutor already supports outputSchema). It eliminates the entire
      class of parsing bugs and produces type-safe results directly usable by
      the deploy node.
    answer: 'Structured output via zod schema'

  - question: 'What graph structure should the deploy agent use?'
    resolved: true
    options:
      - option: 'Two nodes: analyze and deploy'
        description: >
          Clean separation between the cacheable analysis step (LLM call that
          produces a DeploySkill) and the stateful execution step (spawning
          processes/containers). The analyze node output is what gets cached.
          Simple, testable, easy to reason about.
        selected: true
      - option: 'Three nodes: analyze, validate, deploy'
        description: >
          Adds an explicit validation node between analysis and deployment to
          verify the DeploySkill is executable (e.g., Docker is installed,
          ports are available). More defensive but adds a node that could be
          handled as a pre-check within the deploy node itself.
        selected: false
      - option: 'Single node with internal branching'
        description: >
          One monolithic node that analyzes, caches, and deploys. Simpler graph
          but harder to test, cache, and reason about. Defeats the purpose of
          graph-based orchestration.
        selected: false
    selectionRationale: >
      Two nodes provides the cleanest separation of concerns. The analyze node
      is the cacheable unit — its output (DeploySkill) is what gets persisted.
      The deploy node is stateful and non-cacheable. Validation checks (Docker
      installed, ports available) are better handled as pre-flight checks
      within the deploy node rather than as a separate graph node.
    answer: 'Two nodes: analyze and deploy'

  - question: 'Where should DeploySkill cache be stored?'
    resolved: true
    options:
      - option: 'Main SQLite database with new migration'
        description: >
          Add a deploy_skills table to the existing SQLite database used for
          features, repositories, and settings. Follows established persistence
          patterns, reuses the connection singleton, and keeps all data in one
          place. Backed up and migrated together.
        selected: true
      - option: 'Separate SQLite database file'
        description: >
          Create a dedicated deploy-skills.db file. Isolates deployment cache
          from core data but adds a second database connection, complicates
          backup/migration, and diverges from established patterns.
        selected: false
      - option: 'JSON file per repository'
        description: >
          Store .shep/deploy-skill.json in each repository directory. Travels
          with the repo but pollutes user projects, requires gitignore
          management, and makes cache listing/clearing harder.
        selected: false
    selectionRationale: >
      The main SQLite database is the established pattern for all persistent
      data in this project. Features, repositories, and settings all use the
      same database with the same migration system. Adding deploy_skills as
      another table is consistent, reuses the existing connection singleton,
      and simplifies backup and cleanup.
    answer: 'Main SQLite database with new migration'

  - question: 'What should be used as the cache key for DeploySkill lookups?'
    resolved: true
    options:
      - option: 'Absolute repository path'
        description: >
          Use the resolved absolute filesystem path as the unique key. Already
          used as targetId in the deployment service. Deterministic, zero
          computation, naturally unique per machine. May break if repo is
          moved, but manual invalidation handles this.
        selected: true
      - option: 'Git remote URL + branch'
        description: >
          Use the repository's git remote origin URL combined with the current
          branch. Portable across machines but requires git access, doesn't
          work for non-git repos, and the same repo at different paths would
          share a (potentially wrong) skill.
        selected: false
      - option: 'Content hash of config files'
        description: >
          Hash the contents of detected config files (package.json, Dockerfile,
          etc.). Automatically invalidates when config changes but requires
          knowing which files to hash, adds I/O on every lookup, and is harder
          to reason about cache identity.
        selected: false
    selectionRationale: >
      Absolute repository path is the simplest and most reliable key. It is
      already used as targetId throughout the deployment system. It requires
      zero computation, is naturally unique per machine, and avoids the
      complexity of git access or file hashing. If a repo is moved, the user
      simply triggers re-analysis.
    answer: 'Absolute repository path'

  - question: 'How should the deployment service interface be extended?'
    resolved: true
    options:
      - option: 'Extend IDeploymentService with new methods'
        description: >
          Add analyzeRepository() and getSkill() to the existing interface.
          Keeps the deployment lifecycle cohesive in one service. Callers
          already have IDeploymentService injected. Minimal DI changes.
        selected: true
      - option: 'Create separate IDeployAnalysisService'
        description: >
          New interface for analysis concerns, separate from deployment
          lifecycle. Better separation of concerns but doubles the injection
          points, requires coordinating two services for a single deployment
          flow, and adds DI complexity.
        selected: false
    selectionRationale: >
      Extending IDeploymentService keeps the deployment lifecycle cohesive.
      Analysis is a step in the deployment flow, not an independent concern.
      Server actions and hooks already inject IDeploymentService; adding
      methods there avoids new DI registrations and keeps the API surface
      unified.
    answer: 'Extend IDeploymentService with new methods'

  - question: 'How should the deploy method be surfaced in the UI?'
    resolved: true
    options:
      - option: 'Show method label in DeploymentStatusBadge'
        description: >
          Add a small label (e.g., "Script", "Docker Compose", "Docker") next
          to the existing state indicator in the badge. Minimal UI change,
          gives users transparency into what the agent chose without requiring
          navigation to a separate view.
        selected: true
      - option: 'Dedicated DeploySkill detail panel'
        description: >
          Create a new expandable panel showing the full DeploySkill details
          (method, instructions, ports). More informative but significantly
          more UI work and likely unnecessary for the common case where users
