    answer: 'Show method label in DeploymentStatusBadge'

content: |
  ## Problem Statement

  The current deployment service (`packages/core/src/infrastructure/services/deployment/deployment.service.ts`) is a simple process spawner:

  1. It reads `package.json` to find a dev script (`dev`, `start`, or `serve`)
  2. It spawns the script via the detected package manager (`pnpm`, `yarn`, or `npm`)
  3. It watches stdout/stderr for port-detection regexes to determine when the server is ready
  4. It provides an in-memory log ring buffer and SSE streaming

  **Limitations of the current approach:**
  - Only supports Node.js projects with a recognizable dev script in package.json
  - Cannot deploy Python, Go, Rust, Java, or other ecosystems
  - Cannot use Docker, Docker Compose, or Kubernetes
  - No intelligence about the repository — blind script execution
  - No caching — every start re-detects the dev script (though detection is fast, the lack of a DeploySkill means no learning)
  - No persistence — all state is in-memory, lost on daemon restart
  - The TypeSpec models (`LocalDeployAgent`, `LocalDeployAgentOperations`, `DeploySkill`, `Deployment`, `DeployTarget`) are fully defined but have **zero implementation** — the current service ignores them entirely

  The user requests an **agent-based deployment** that:
  - Can start a dev environment for **any** repository (not just Node.js)
  - Uses AI to analyze the repo and determine the optimal deployment strategy
  - Caches the deployment configuration (DeploySkill) per-repo for fast subsequent starts
  - Manages the full deployment lifecycle (Booting → Ready → Stopped)

  ## Success Criteria

  - [ ] Deploy agent graph is implemented as a LangGraph StateGraph with analyze and deploy nodes
  - [ ] Agent can analyze a Node.js repository and produce a valid DeploySkill with method=Script
  - [ ] Agent can analyze a Docker Compose repository and produce a valid DeploySkill with method=DockerCompose
  - [ ] Agent can analyze a Dockerfile-only repository and produce a valid DeploySkill with method=Docker
  - [ ] DeploySkill is persisted to SQLite deploy_skills table keyed by repository path
  - [ ] Subsequent starts for the same repo use the cached DeploySkill without LLM call (< 100ms to resolve)
  - [ ] User can trigger re-analysis to invalidate and regenerate a cached DeploySkill
  - [ ] Failed deployment automatically triggers re-analysis on next start attempt
  - [ ] The deploy node executes Script-method skills by spawning the command from DeploySkill.instructions
  - [ ] The deploy node executes DockerCompose-method skills by running `docker compose up`
  - [ ] The deploy node executes Docker-method skills by running `docker build` + `docker run`
  - [ ] Port detection and readiness state transitions (Booting → Ready) work for all three methods
  - [ ] Real-time log streaming via SSE continues to work for agent-driven deployments
  - [ ] DeploymentStatusBadge shows the deploy method (Script/DockerCompose/Docker) alongside state
  - [ ] All new code has corresponding unit tests (TDD — tests written first)
  - [ ] All new/modified web components have Storybook stories
  - [ ] Agent resolution uses IAgentExecutorProvider — no hardcoded agent types
  - [ ] Existing deployment tests continue to pass (no regressions)

  ## Functional Requirements

  - **FR-1**: The system SHALL implement a deploy agent as a LangGraph StateGraph with two nodes: `analyze` (produces a DeploySkill) and `deploy` (executes the skill to start the dev environment).
  - **FR-2**: The `analyze` node SHALL use an AI agent (via IAgentExecutor) to inspect the repository contents (package.json, Dockerfile, docker-compose.yml, Makefile, pyproject.toml, go.mod, etc.) and produce a structured DeploySkill with method, instructions, and port mappings.
  - **FR-3**: The `analyze` node SHALL use zod-validated structured output to guarantee the DeploySkill conforms to the TypeSpec-defined schema (method: DeployMethod, instructions: string, ports: PortMap[]).
  - **FR-4**: The `deploy` node SHALL execute the DeploySkill based on its method: spawn a shell command (Script), run `docker compose up` (DockerCompose), or run `docker build` + `docker run` (Docker).
  - **FR-5**: The system SHALL persist DeploySkills to a SQLite `deploy_skills` table with the absolute repository path as the cache key.
  - **FR-6**: On deployment start, the system SHALL check for a cached DeploySkill for the given repository path. If one exists, it SHALL skip the analyze node and proceed directly to the deploy node.
  - **FR-7**: The system SHALL provide a mechanism (server action) for users to explicitly invalidate and re-analyze a cached DeploySkill.
  - **FR-8**: If a deployment fails to start using a cached DeploySkill, the system SHALL automatically invalidate the cache and re-run the analyze node on the next start attempt.
  - **FR-9**: The `IDeploymentService` interface SHALL be extended with `analyzeRepository(targetId: string, targetPath: string): Promise<DeploySkill>` and `getSkill(targetId: string): DeploySkill | null` methods.
  - **FR-10**: The DeploymentService implementation SHALL delegate to the deploy agent graph for repository analysis while retaining existing process lifecycle management (port detection, log buffering, SSE emission, graceful shutdown).
  - **FR-11**: The deploy agent graph SHALL be registered in the AgentRegistryService with lazy loading, following the established pattern (analyze-repo, feature-agent).
  - **FR-12**: The deploy agent graph factory SHALL accept an IAgentExecutor parameter (no hardcoded agent types), following the mandatory agent resolution rule.
  - **FR-13**: The DeploymentStatusBadge component SHALL display the deploy method (e.g., "Script", "Docker Compose", "Docker") alongside the deployment state when a DeploySkill is available.
  - **FR-14**: The web server actions (deploy-feature, deploy-repository) SHALL be updated to use the agent-driven deployment flow, triggering analysis when no cached skill exists.
  - **FR-15**: A new `deploy_skills` SQLite migration SHALL be added following the established migration pattern, with columns for id, repository_path (unique), method, instructions, ports (JSON), created_at, and updated_at.
  - **FR-16**: A DeploySkill mapper SHALL be implemented following the established mapper pattern (toDatabase/fromDatabase) with camelCase/snake_case conversion and JSON serialization for the ports array.
  - **FR-17**: A DeploySkill repository SHALL be implemented with methods: `save(skill: DeploySkill): void`, `findByRepositoryPath(path: string): DeploySkill | null`, `delete(repositoryPath: string): void`.

  ## Non-Functional Requirements

  - **NFR-1**: Cached deployment starts (with existing DeploySkill) SHALL resolve in < 100ms, excluding actual process spawn time.
  - **NFR-2**: The analyze node (LLM call) SHALL complete within 60 seconds for typical repositories. A timeout SHALL be enforced via the executor's timeout option.
  - **NFR-3**: The deploy agent graph SHALL be lazy-loaded in the AgentRegistryService to avoid increasing CLI startup time (no @langchain/langgraph import at registration).
  - **NFR-4**: All agent interactions SHALL use the configured agent type from settings (IAgentExecutorProvider), never hardcoding a specific LLM provider.
  - **NFR-5**: The deploy_skills table SHALL use a UNIQUE constraint on repository_path to prevent duplicate cache entries.
  - **NFR-6**: Docker and Docker Compose deployments SHALL use detached mode where applicable, with the system managing container lifecycle independently.
  - **NFR-7**: All new infrastructure code SHALL have unit test coverage with mocked dependencies (IAgentExecutor, SQLite, child_process).
  - **NFR-8**: The deploy agent state annotation SHALL follow LangGraph patterns with typed channels, reducers, and defaults matching the feature-agent reference implementation.
  - **NFR-9**: Error messages from the analyze node (e.g., "Could not determine deployment method") SHALL be surfaced to the user through the existing log streaming infrastructure.
  - **NFR-10**: The TypeSpec model extensions (if any) SHALL be backward-compatible — existing DeploySkill consumers must not break.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Cache strategy for DeploySkill | Cache-first with manual invalidation | Build configs change rarely; auto-retry on failure provides safety net |
  | 2 | Which deployment methods to support initially | Script + Docker Compose + Docker | Covers 90%+ of local dev scenarios; Kubernetes/Manual deferred |
  | 3 | Structured vs free-text agent output | Structured output via zod schema | IAgentExecutor already supports outputSchema; eliminates parsing fragility |
  | 4 | Deploy agent graph structure | Two nodes: analyze and deploy | Clean separation of cacheable analysis from stateful execution |
  | 5 | Cache storage location | Main SQLite database with new migration | Follows established persistence patterns (features, repositories) |
  | 6 | Repository cache key strategy | Absolute repository path | Already used as targetId; deterministic, zero computation |
  | 7 | Interface design approach | Extend IDeploymentService | Deployment is a cohesive lifecycle; splitting adds DI complexity |
  | 8 | UI visibility of DeploySkill | Show skill summary in deployment status badge | Minimal UI change provides agent transparency |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `tsp/deployment/deploy-skill.tsp` | Medium | Needs `repositoryPath` field for cache key association and `updatedAt` for cache management |
  | `packages/core/src/domain/generated/output.ts` | Low | Auto-regenerated from TypeSpec changes |
  | `packages/core/src/infrastructure/services/agents/deploy-agent/` (new) | High | New LangGraph graph: state annotation, analyze node, deploy node, prompts |
  | `packages/core/src/infrastructure/services/deployment/deployment.service.ts` | High | Refactored to delegate to deploy agent graph for analysis; execution logic updated to handle Script/DockerCompose/Docker methods |
  | `packages/core/src/application/ports/output/services/deployment-service.interface.ts` | Medium | Extended with analyzeRepository() and getSkill() methods |
  | `packages/core/src/infrastructure/persistence/sqlite/migrations.ts` | Medium | New migration for deploy_skills table |
  | `packages/core/src/infrastructure/persistence/sqlite/mappers/deploy-skill.mapper.ts` (new) | Medium | toDatabase/fromDatabase mapper for DeploySkill |
  | `packages/core/src/infrastructure/persistence/sqlite/repositories/deploy-skill.repository.ts` (new) | Medium | CRUD repository for deploy_skills table |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Register deploy agent graph, deploy skill repository, updated deployment service |
  | `packages/core/src/infrastructure/services/agents/common/agent-registry.service.ts` | Low | Add lazy registration for deploy-agent graph |
  | `src/presentation/web/app/actions/deploy-feature.ts` | Medium | Update to trigger agent analysis when no cached skill |
  | `src/presentation/web/app/actions/deploy-repository.ts` | Medium | Update to trigger agent analysis when no cached skill |
  | `src/presentation/web/app/actions/analyze-repository.ts` (new) | Low | New server action for explicit re-analysis |
  | `src/presentation/web/components/common/deployment-status-badge/` | Low | Show deploy method alongside state |
  | Tests (new + updated) | High | TDD: deploy agent graph tests, deploy skill repo tests, mapper tests, updated deployment service tests, updated server action tests, Storybook stories |

  ## Dependencies

  **Existing code this feature depends on:**
  - `IAgentExecutor` / `IAgentExecutorProvider` — agent resolution (mandatory: no hardcoded types)
  - `IAgentRegistry` / AgentRegistryService — lazy graph registration
  - LangGraph `StateGraph`, `Annotation`, `START`, `END` — graph construction
  - `IDeploymentService` interface — current output port (to be extended)
  - TypeSpec-generated types: `DeploySkill`, `Deployment`, `DeploymentState`, `DeployMethod`, `PortMap`, `LocalDeployAgent`, `DeployTarget`
  - SQLite persistence layer: `better-sqlite3`, migrations system, mapper pattern, singleton connection
  - Existing deployment infrastructure: `LogRingBuffer`, `parsePort`, `detectDevScript`, deployment logger, SSE endpoint
  - Web presentation: server actions, `useDeployAction` hook, `DeploymentStatusBadge` component
  - `zod` — structured output schema validation

  **External libraries (already in project):**
  - `@langchain/langgraph` — agent graph framework
  - `better-sqlite3` — SQLite driver
  - `tree-kill` — cross-platform process tree termination
  - `zod` — schema validation for structured agent output

  ## Size Estimate

  **L** (1-2 weeks) — This feature requires:
  1. A new LangGraph agent implementation (deploy-agent graph with analyze + deploy nodes)
  2. New prompts for repository analysis and deployment strategy selection
  3. TypeSpec model extension (repositoryPath on DeploySkill)
  4. A new SQLite migration + repository + mapper for DeploySkill caching
  5. Refactoring the existing DeploymentService to delegate analysis to the agent and support Docker/Docker Compose execution
  6. Extending the IDeploymentService interface
  7. Updating web UI server actions and DeploymentStatusBadge component
  8. New Storybook stories for modified components
  9. Comprehensive TDD test suites for all new code (graph, repository, mapper, service, server actions)

  The scope is L because it touches all four architecture layers, introduces a new
  agent graph (the third after analyze-repo and feature-agent), adds persistence,
  and requires careful integration with the existing deployment infrastructure.
