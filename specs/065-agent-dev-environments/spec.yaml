  ### Architecture Patterns

  **Clean Architecture** with four layers (dependencies point inward):
  - Domain: TypeSpec-generated types, no external deps
  - Application: Use cases + output port interfaces (IDeploymentService, IAgentExecutor)
  - Infrastructure: Implementations (services, repositories, DI container)
  - Presentation: CLI, TUI, Web UI (Next.js + shadcn/ui)

  **Agent System (LangGraph):**
  - Agents are LangGraph StateGraphs with typed state annotations
  - Nodes are pure async functions receiving state, returning partial state updates
  - Agent resolution: `Settings.agent.type → IAgentExecutorFactory → IAgentExecutor`
  - No component may hardcode an agent type (mandatory rule)
  - Reference implementations: `analyze-repo/` (simple, single-node) and `feature-agent/` (complex, multi-node with validation/repair loops)

  **Existing Caching Patterns:**
  - AgentExecutorFactory: per-type singleton executor cache
  - AgentRegistry: lazy-loaded graph definitions with placeholder metadata
  - Settings: in-memory singleton via `globalThis.__shepSettings`
  - SQLite: WAL mode with 8MB page cache, singleton connection

  **Dependency Injection (tsyringe):**
  - String-token registration: `container.register<IDeploymentService>('IDeploymentService', ...)`
  - Singleton instances for services
  - Factory pattern for DB-dependent repositories

  ### Relevant Technologies

  - **LangGraph** (`@langchain/langgraph`): State machine orchestration for agent workflows
  - **TypeSpec**: Domain model definitions compiled to TypeScript
  - **SQLite** (`better-sqlite3`): Persistent storage with WAL mode
  - **tsyringe**: DI container
  - **Next.js**: Web UI with server actions and SSE streaming
  - **Vitest**: Test framework (TDD mandatory)
  - **Storybook**: UI component documentation (mandatory for web components)

