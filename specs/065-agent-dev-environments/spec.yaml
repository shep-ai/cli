summary: >
  Replace the current naive deployment service (which only spawns `npm run dev`
  and detects ports via regex) with an AI agent-driven dev environment system.
  A new LangGraph-based deploy agent will analyze repositories to detect optimal
  deployment strategies (Docker, Docker Compose, scripts, etc.), cache the
  resulting DeploySkill per-repo for fast subsequent starts, and manage the full
  deployment lifecycle. The TypeSpec models (LocalDeployAgent, DeploySkill,
  Deployment, DeployTarget) already exist but have no graph implementation.
