# Open questions (must be resolved before implementation)
openQuestions:
  - question: 'Should the deploy agent analyze the repo on every start or only when no cached DeploySkill exists?'
    resolved: true
    options:
      - option: 'Cache-first with manual invalidation'
        description: >
          Use cached DeploySkill if one exists for the repo path. Only re-analyze
          when the user explicitly requests it (e.g., a "re-analyze" button) or when
          the cached skill fails to start. Fastest repeat starts, minimal LLM cost.
        selected: true
      - option: 'Cache with TTL-based expiration'
        description: >
          Cache the DeploySkill but expire it after a configurable duration (e.g., 24h).
          Balances freshness with speed but adds complexity and may trigger unnecessary
          re-analysis on repos that rarely change their build setup.
        selected: false
      - option: 'Always re-analyze'
        description: >
          Run the agent analysis on every start. Always up-to-date but slow and expensive
          in LLM tokens. Defeats the purpose of caching.
        selected: false
    selectionRationale: >
      Cache-first with manual invalidation is the simplest approach that satisfies the
      user's requirement for "fast" subsequent starts. Build configurations change
      rarely, so time-based expiration adds complexity without proportional benefit.
      Automatic re-analysis on failure provides a safety net without manual intervention.
    answer: 'Cache-first with manual invalidation'

  - question: 'What deployment methods should the agent support in the initial release?'
    resolved: true
    options:
      - option: 'Script + Docker Compose + Docker'
        description: >
          Support the three most common local dev patterns: custom scripts (npm/pnpm/yarn
          dev, python manage.py, go run, make dev, etc.), Docker Compose for multi-service
          projects, and standalone Docker for single-container apps. Covers the vast
          majority of real-world repos without Kubernetes complexity.
        selected: true
      - option: 'Script only'
        description: >
          Only support script-based deployment (shell commands). Simplest to implement
          but misses Docker-based repos entirely, which are increasingly common.
        selected: false
      - option: 'All five methods (including Kubernetes + Manual)'
        description: >
          Support all DeployMethod enum values including Kubernetes and Manual. Full
          coverage but Kubernetes local dev (minikube/kind) is complex and Manual
          defeats the purpose of automation. Significantly increases scope.
        selected: false
    selectionRationale: >
      Script + Docker Compose + Docker covers 90%+ of local development scenarios.
      Kubernetes adds substantial complexity (minikube/kind setup, manifest generation)
      for a niche use case in local dev. Manual is a no-op. Keeping the enum values
      available means we can add Kubernetes support later without model changes.
    answer: 'Script + Docker Compose + Docker'

  - question: 'Should the agent use structured output (zod schema) or free-text for the DeploySkill result?'
    resolved: true
    options:
      - option: 'Structured output via zod schema'
        description: >
          Define a zod schema matching the DeploySkill TypeSpec model and use the
          agent executor outputSchema option to enforce structured JSON output. Guarantees
          parseable results, eliminates regex/parsing fragility, and maps directly to
          the domain model. Requires the agent executor to support outputSchema (already
          supported in the IAgentExecutor interface).
        selected: true
      - option: 'Free-text with post-processing'
        description: >
          Let the agent output free-text instructions and parse them with regex or a
          second LLM call. More flexible but fragile, error-prone, and requires
          additional parsing logic.
        selected: false
    selectionRationale: >
      The IAgentExecutor interface already supports outputSchema in AgentExecutionOptions.
      Using structured output guarantees the DeploySkill fields (method, instructions,
      ports) are always present and correctly typed, eliminating parsing failures.
    answer: 'Structured output via zod schema'

  - question: 'How should the deploy agent graph be structured (number of nodes)?'
    resolved: true
    options:
      - option: 'Two nodes: analyze and deploy'
        description: >
          A minimal graph with an analyze node (produces DeploySkill) and a deploy node
          (executes the skill). The analyze node is skipped when a cached skill exists.
          Simple, testable, follows the analyze-repo agent pattern. Monitoring (port
          detection, readiness) stays in the existing DeploymentService infrastructure.
        selected: true
      - option: 'Three nodes: analyze, deploy, and monitor'
        description: >
          Adds a dedicated monitor node that watches process output for readiness
          signals. Moves port detection into the graph. More self-contained but
          duplicates existing DeploymentService monitoring, increasing complexity
          and migration risk.
        selected: false
      - option: 'Single node: analyze-and-deploy combined'
        description: >
          Combines analysis and execution into one node. Simpler graph but breaks
          the caching model (cannot skip analysis independently of execution) and
          reduces testability.
        selected: false
    selectionRationale: >
      Two nodes provides clean separation between the cacheable analysis step and
      the stateful execution step. The analyze node output (DeploySkill) is the
      natural cache boundary. Monitoring stays in the existing DeploymentService
      which already handles port detection, log buffering, and SSE emission well.
    answer: 'Two nodes: analyze and deploy'

  - question: 'Where should the DeploySkill cache be stored?'
    resolved: true
    options:
      - option: 'Main SQLite database with new migration'
        description: >
          Add a deploy_skills table to the existing SQLite database using the
          established migration pattern. Follows the same pattern as features,
          repositories, and other persisted entities. Single source of truth,
          transactional consistency, existing tooling (mappers, repositories).
        selected: true
      - option: 'Separate JSON file per repo'
        description: >
          Store each DeploySkill as a JSON file alongside the repository (e.g.,
          .shep/deploy-skill.json). Simpler to inspect and debug but scattered
          across the filesystem, no transactional guarantees, pollutes repo
          directories, and diverges from the established persistence pattern.
        selected: false
      - option: 'In-memory LRU cache only'
        description: >
          Cache DeploySkills in memory with no persistence. Fast but lost on daemon
          restart, defeating the user's requirement for fast subsequent starts across
          sessions.
        selected: false
    selectionRationale: >
      The main SQLite database is the established persistence mechanism for all
      domain entities. Using it for DeploySkills maintains consistency, leverages
      existing infrastructure (migrations, mappers, repositories), and ensures
      cache survives daemon restarts.
    answer: 'Main SQLite database with new migration'

  - question: 'What should be used as the cache key for DeploySkills?'
    resolved: true
    options:
      - option: 'Absolute repository path'
        description: >
          Use the absolute filesystem path of the repository as the unique key.
          Already used as targetId in the deployment flow. Deterministic, requires
          zero computation, and naturally unique on the local filesystem.
        selected: true
      - option: 'Repository path hash (SHA-256)'
        description: >
          Hash the absolute path to produce a fixed-length key. Avoids long path
          strings in the database but adds unnecessary computation and makes
          debugging harder (cannot visually identify the repo from the key).
        selected: false
    selectionRationale: >
      Absolute repository path is already the natural identifier used throughout
      the deployment flow (targetId). It is deterministic, human-readable in the
      database for debugging, and uniquely identifies a repo on the local filesystem.
    answer: 'Absolute repository path'

  - question: 'Should we extend the existing IDeploymentService interface or create a new interface for agent-driven deployments?'
    resolved: true
    options:
      - option: 'Extend IDeploymentService'
        description: >
          Add analyzeRepository() and getSkill() methods to the existing
          IDeploymentService interface. Keeps deployment as a cohesive lifecycle
          concern. Consumers (server actions, hooks) continue using one interface.
          Avoids additional DI complexity.
        selected: true
      - option: 'Create separate IDeployAgentService'
        description: >
          Create a new interface for agent-specific operations (analyze, cache
          management). Cleaner separation of concerns but fragments the deployment
          API across two interfaces, requiring consumers to inject both. Adds DI
          wiring complexity.
        selected: false
    selectionRationale: >
      Deployment analysis and execution are tightly coupled lifecycle steps.
      Splitting them across interfaces forces consumers to coordinate two services
      and complicates DI registration. Extending the existing interface keeps the
      deployment API cohesive while adding the new capabilities.
    answer: 'Extend IDeploymentService'

  - question: 'How should the DeploySkill be surfaced in the web UI?'
    resolved: true
    options:
      - option: 'Show deploy method in status badge'
        description: >
          Display the deploy method (Script, Docker Compose, Docker) alongside the
