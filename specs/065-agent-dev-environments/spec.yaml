content: |
  ## Problem Statement

  The current deployment service (`packages/core/src/infrastructure/services/deployment/deployment.service.ts`) is a simple process spawner:

  1. It reads `package.json` to find a dev script (`dev`, `start`, or `serve`)
  2. It spawns the script via the detected package manager (`pnpm`, `yarn`, or `npm`)
  3. It watches stdout/stderr for port-detection regexes to determine when the server is ready
  4. It provides an in-memory log ring buffer and SSE streaming

  **Limitations of the current approach:**
  - Only supports Node.js projects with a recognizable dev script in package.json
  - Cannot deploy Python, Go, Rust, Java, or other ecosystems
  - Cannot use Docker, Docker Compose, or Kubernetes
  - No intelligence about the repository — blind script execution
  - No caching — every start re-detects the dev script (though detection is fast, the lack of a DeploySkill means no learning)
  - No persistence — all state is in-memory, lost on daemon restart
  - The TypeSpec models (`LocalDeployAgent`, `LocalDeployAgentOperations`, `DeploySkill`, `Deployment`, `DeployTarget`) are fully defined but have **zero implementation** — the current service ignores them entirely

  The user requests an **agent-based deployment** that:
  - Can start a dev environment for **any** repository (not just Node.js)
  - Uses AI to analyze the repo and determine the optimal deployment strategy
  - Caches the deployment configuration (DeploySkill) per-repo for fast subsequent starts
  - Manages the full deployment lifecycle (Booting → Ready → Stopped)

  ## Codebase Analysis

  ### Project Structure

  ```
