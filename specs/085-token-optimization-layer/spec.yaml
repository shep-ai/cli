oneLiner: "Unified token optimization layer to reduce LLM token consumption across the agent pipeline"
summary: >
  Add a Token Optimization Layer that sits between Shep's graph nodes and the LLM executors,
  reducing token consumption through five integrated capabilities: command output filtering,
  skill pruning with lazy loading, delta-context state diffing, semantic text compression,
  and alias/meta-token compression. The layer hooks into the existing prompt-building and
  executor pipeline without changing the agent-agnostic architecture.
