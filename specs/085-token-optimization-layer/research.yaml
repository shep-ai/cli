  ### Integration Points

  1. **executeNode() in node-helpers.ts** — Primary insertion point (line 571-584)
  2. **implement.node.ts** — Secondary insertion point (before retryExecute)
  3. **phase-timing-context.ts** — Extended to accept optimization metrics
  4. **state.ts** — New specFileHashes channel for delta-context
  5. **settings-defaults.factory.ts** — New tokenOptimization defaults
  6. **container.ts** — DI registration for 6 new services

  ### Data Flow

  ```
  Worker bootstrap:
    setOptimizerContext(container.resolve<IPromptOptimizerService>('IPromptOptimizerService'))

  executeNode() flow:
    1. buildResumeContext(state.resumeReason) -> resumePrefix (NOT optimized)
    2. buildPrompt(state, log) -> rawPrompt
    3. getOptimizerContext()?.optimize(rawPrompt, { nodeName, state }) -> { prompt: optimizedPrompt, metrics }
    4. prompt = resumePrefix + optimizedPrompt
    5. recordPhaseStart(nodeName, { prompt, ... })
    6. executor.execute(prompt, options)
    7. recordPhaseEnd(timingId, durationMs, { ...usageMetrics, ...optimizationMetrics })
  ```

  ### TypeSpec Changes

  New models in `tsp/domain/entities/settings.tsp`:
  ```
  model TokenOptimizationConfig {
    enabled: boolean = true;
    outputFiltering: boolean = true;
    skillRouting: boolean = true;
    deltaContext: boolean = true;
    semanticCompression: boolean = true;
    aliasCompression: boolean = true;
  }
  ```

  New fields in `tsp/agents/phase-timing.tsp`:
  ```
  originalTokenEstimate?: int64;
  optimizedTokenEstimate?: int64;
  savingsPercent?: float64;
  capabilitiesApplied?: string;  // JSON array
  outputFilterLinesRemoved?: int32;
  deltaContextFilesSkipped?: int32;
  compressionRatio?: float64;
  aliasesCreated?: int32;
  ```

  ### Database Migration (migration 055)

  ```sql
  -- Settings table: token optimization config
  ALTER TABLE settings ADD COLUMN token_opt_enabled INTEGER DEFAULT 1;
  ALTER TABLE settings ADD COLUMN token_opt_output_filtering INTEGER DEFAULT 1;
  ALTER TABLE settings ADD COLUMN token_opt_skill_routing INTEGER DEFAULT 1;
  ALTER TABLE settings ADD COLUMN token_opt_delta_context INTEGER DEFAULT 1;
  ALTER TABLE settings ADD COLUMN token_opt_semantic_compression INTEGER DEFAULT 1;
  ALTER TABLE settings ADD COLUMN token_opt_alias_compression INTEGER DEFAULT 1;

  -- Phase timings table: optimization metrics
  ALTER TABLE phase_timings ADD COLUMN original_token_estimate INTEGER;
  ALTER TABLE phase_timings ADD COLUMN optimized_token_estimate INTEGER;
  ALTER TABLE phase_timings ADD COLUMN savings_percent REAL;
  ALTER TABLE phase_timings ADD COLUMN capabilities_applied TEXT;
  ALTER TABLE phase_timings ADD COLUMN output_filter_lines_removed INTEGER;
  ALTER TABLE phase_timings ADD COLUMN delta_context_files_skipped INTEGER;
  ALTER TABLE phase_timings ADD COLUMN compression_ratio REAL;
  ALTER TABLE phase_timings ADD COLUMN aliases_created INTEGER;
  ```

  All columns nullable, no NOT NULL, no renames, no drops. Fully backward-compatible.

