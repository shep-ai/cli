# This is the source of truth. Markdown is auto-generated from this file.

name: token-optimization-layer
summary: >
  Technical research for the Token Optimization Layer feature. Evaluated five optimization
  capabilities (command output filtering, skill routing, delta-context diffing, semantic
  compression, alias compression) against existing codebase architecture. Key decisions:
  single interceptor in executeNode() at line 571 between buildPrompt() and executor.execute(),
  no external libraries needed (all capabilities use TypeScript stdlib), new TypeSpec models
  for settings and metrics, additive-only DB migration, and module-level context singleton
  pattern matching phase-timing-context.ts for optimizer state.

relatedFeatures: []

technologies:
  - "TypeScript"
  - "LangGraph (state graph annotations and reducers)"
  - "tsyringe (dependency injection with @injectable/@inject decorators)"
  - "TypeSpec (domain model generation via tsp/ files)"
  - "better-sqlite3 (persistence via umzug migrations)"
  - "Node.js crypto (SHA-256 hashing for delta-context)"

relatedLinks:
  - title: "Caveman Claude - Token-Cutting Skill (60-75% output savings via rule-based compression)"
    url: "https://dev.to/onsen/caveman-claude-the-token-cutting-skill-thats-changing-ai-workflows-4hmc"
  - title: "RTK - CLI proxy reducing LLM token consumption (80% avg session savings)"
    url: "https://github.com/rtk-ai/rtk"
  - title: "SkillReducer - Optimizing LLM Agent Skills for Token Efficiency (75% per-task reduction)"
