  - title: "Lossless Token Sequence Compression via Meta-Tokens (15-27% lossless reduction)"
    url: "https://arxiv.org/abs/2506.00307"
  - title: "Dynamic Toolsets - Reducing MCP token usage by 100x (Speakeasy)"
    url: "https://www.speakeasy.com/blog/how-we-reduced-token-usage-by-100x-dynamic-toolsets-v2"
  - title: "LLM Token Optimization Best Practices 2026 (Redis)"
