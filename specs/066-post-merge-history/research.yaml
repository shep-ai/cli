  - question: 'How should onApprove/onReject be handled when readOnly is true?'
    resolved: true
    options:
      - option: 'Pass no-op callbacks, rely on DrawerActionBar not rendering'
        description: >
          Keep the existing callback props as required in MergeReviewProps but pass no-ops
          from the parent. The readOnly flag prevents the action bar from rendering, so the
          callbacks are never invoked. Simple and requires no interface changes.
        selected: true
      - option: 'Make onApprove optional in MergeReviewProps'
        description: >
          Change onApprove from required to optional (onApprove?: () => void). This makes
          the type system enforce that read-only mode doesn't need callbacks. However, it
          changes the existing interface contract and requires all existing call sites to handle
          the optional case, even though the action bar always needs onApprove when rendered.
        selected: false
      - option: 'Create a discriminated union type for MergeReviewProps'
        description: >
          Use { readOnly: true; data: MergeReviewData } | { readOnly?: false; data: ... ;
          onApprove: () => void; ... } to enforce that read-only mode doesn't receive action
          callbacks. Type-safe but adds significant complexity to the interface for no runtime
          benefit. The component is simple enough that the readOnly conditional is sufficient.
        selected: false
    selectionRationale: >
      The existing pattern in feature-drawer-tabs.tsx:458 already passes
      onApprove={onMergeApprove ?? (() => undefined)} — a no-op fallback. The readOnly prop
      prevents the DrawerActionBar from mounting, so callbacks are never invoked. Keeping
      onApprove required maintains backward compatibility (NFR-3) and avoids changing the
      interface for all existing consumers. The no-op pattern is already established.

  - question: 'Should the green status dot color change in read-only mode?'
