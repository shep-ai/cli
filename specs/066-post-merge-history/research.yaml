# Markdown content (the full research document)
content: |
  ## Technology Decisions

  ### 1. Tab Visibility Extension Strategy

  **Chosen:** Add a second condition branch in `computeVisibleTabs()` for maintain+pr

  **Rejected:**
  - Config-driven tab visibility map — Over-engineering for a single additional condition. The current imperative if-block style is clear and matches existing patterns.
  - Combining with existing review condition (`lifecycle === 'review' || lifecycle === 'maintain'`) — Would show merge-review for ALL maintain features, even those without PR data, violating FR-2.

  **Rationale:** The existing function uses simple if-blocks. Adding `if (node.lifecycle === 'maintain' && node.pr) tabs.push('merge-review')` follows this exact pattern and satisfies FR-1 and FR-2.

  ### 2. Read-Only Mode Implementation

  **Chosen:** Add optional `readOnly` prop to `MergeReviewProps`, conditionally render `DrawerActionBar`

  **Rejected:**
  - Separate `MergeHistory` component — Violates DRY; duplicates ~200 lines of JSX.
  - CSS-based hiding of action bar — Fragile; action bar still mounts, receives focus, and requires callbacks.

  **Rationale:** MergeReview has clean separation between data display (lines 209-341) and DrawerActionBar (lines 343-353). A single `{!readOnly && <DrawerActionBar ... />}` conditional is the minimal, idiomatic change.

  ### 3. Dynamic Tab Label Strategy

  **Chosen:** Compute label dynamically in `visibleTabDefs` derivation using node lifecycle

  **Rejected:**
  - Changing `computeVisibleTabs()` return type to include labels — Breaks all consumers and mixes concerns.
  - Separate `getLabelOverrides()` function — Over-engineering for a single conditional label.

  **Rationale:** The `visibleTabDefs` memo at line 164-167 already maps ALL_TABS to visible tabs. Adding a ternary for merge-review label is minimal and keeps ALL_TABS as the canonical display-order source.

  ### 4. Props Threading Strategy

  **Chosen:** Derive `readOnly` directly from `featureNode.lifecycle === 'maintain'` in FeatureDrawerTabs

  **Rejected:**
  - Adding readOnly to FeatureDrawerTabsProps — Unnecessary indirection; lifecycle is already available.
  - React Context for read-only mode — Massive over-engineering for single-level prop passing.

  **Rationale:** The merge-review tab content at line 452-471 already has `featureNode` in scope. `readOnly={featureNode.lifecycle === 'maintain'}` is trivial to derive.

  ### 5. deriveInitialTab() Behavior

  **Chosen:** No changes — maintain lifecycle defaults to overview

  **Rejected:**
  - Auto-navigate to merge-review for maintain+pr — Spec requires overview (FR-8); would be disorienting.
  - First-visit tracking — Adds state complexity for marginal UX benefit.

  **Rationale:** The function's fall-through to 'overview' already handles maintain correctly. Existing tests verify this behavior.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | React 19 | Component framework | Use (existing) | Already in use; no new dependencies needed |
  | shadcn/ui Tabs | Tab component | Use (existing) | Already powers FeatureDrawerTabs |
  | shadcn/ui Badge | Status badges | Use (existing) | Already used in MergeReview |
  | Tailwind CSS | Styling | Use (existing) | All styling via existing utility classes |
  | lucide-react | Icons | Use (existing) | All needed icons already imported |

  **No new libraries required.** This feature is entirely implemented with existing dependencies.

  ## Security Considerations

  - **No new attack surface:** No new server actions, API endpoints, or data fetching paths are introduced (NFR-1).
  - **No data exposure changes:** The `getMergeReviewData()` server action already returns the same data regardless of lifecycle phase. The read-only mode is purely a UI presentation concern.
  - **No authorization changes:** Tab visibility is computed client-side from node data already authorized by the server action layer. Adding maintain+pr visibility doesn't bypass any access controls.
  - **Evidence file serving:** Evidence files are already served via the existing `/api/evidence` endpoint with path validation. No changes to this endpoint are needed.

  ## Performance Implications

  - **No additional data fetching:** The merge-review tab data loads lazily on activation via the existing `useTabDataFetch` pattern (NFR-6). No eager loading is introduced.
  - **No additional renders:** The `readOnly` prop is derived from `featureNode.lifecycle` which is already in the render path. No new state, effects, or subscriptions.
  - **Tab visibility computation:** Adding one more if-block to `computeVisibleTabs()` has negligible performance impact — the function runs once per featureNode change (memoized via `useMemo`).
  - **Evidence persistence:** Evidence files are read from disk by the existing server action. Post-merge evidence access has the same performance characteristics as during review.

  ## Architecture Notes

  This feature is a **pure presentation-layer change**. It does not touch:
  - Domain models or TypeSpec definitions (NFR-2)
  - Database schema or migrations (NFR-2)
  - Server actions or API endpoints (NFR-1)
  - Application layer use cases
  - Infrastructure layer

  The changes are confined to three files in `src/presentation/web/components/common/`:
  1. `feature-drawer-tabs/feature-drawer-tabs.tsx` — Visibility logic + label + readOnly threading
  2. `merge-review/merge-review-config.ts` — Add `readOnly?: boolean` to `MergeReviewProps`
  3. `merge-review/merge-review.tsx` — Conditional action bar + header text

  Plus test and story files:
  4. `tests/unit/.../feature-drawer-tabs.test.tsx` — New visibility tests for maintain+pr
  5. `tests/unit/.../drawer-view.test.ts` — Verify existing maintain→overview behavior
  6. `merge-review/merge-review.stories.tsx` — Read-only mode stories (NFR-4)

  This adheres to Clean Architecture by keeping UI concerns in the presentation layer and avoiding changes to inner layers.

  ## Implementation Summary

  | Change | File | Lines of Code | Risk |
  | ------ | ---- | ------------- | ---- |
  | Visibility condition | feature-drawer-tabs.tsx | ~3 | Low |
  | Dynamic tab label | feature-drawer-tabs.tsx | ~5 | Low |
  | readOnly prop threading | feature-drawer-tabs.tsx | ~1 | Low |
  | readOnly prop definition | merge-review-config.ts | ~2 | Low |
  | Conditional action bar | merge-review.tsx | ~5 | Low |
  | Header text adaptation | merge-review.tsx | ~8 | Low |
  | Unit tests | feature-drawer-tabs.test.tsx | ~30 | Low |
  | Existing test verification | drawer-view.test.ts | ~0 | None |
  | Storybook stories | merge-review.stories.tsx | ~40 | Low |

  **Total estimated change:** ~95 lines across 5 files (3 source + 1 test + 1 story)

