name: post-merge-history
summary: >
  Pure UI-layer change requiring no new libraries, schema changes, or server action modifications.
  Extends computeVisibleTabs() with a maintain+pr condition, adds a readOnly prop to MergeReview
  to conditionally hide DrawerActionBar, and uses a dynamic tab label map for "Merge History" vs
  "Merge Review". All underlying data (PR metadata, evidence, diffs) already persists post-merge.

