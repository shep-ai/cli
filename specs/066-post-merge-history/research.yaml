relatedLinks: []

# Structured technology decisions
decisions:
  - title: 'Tab visibility extension strategy'
    chosen: 'Add a second condition branch in computeVisibleTabs() for maintain+pr'
    rejected:
      - >-
        Refactor computeVisibleTabs() into a config-driven tab visibility map — Over-engineering
        for a single additional condition. The current imperative style with if-blocks is clear,
        matches the existing pattern for prd-review, tech-decisions, and merge-review tabs, and
        keeps the function easy to read at ~20 lines. A config-driven approach would add
        abstraction for no benefit given the function's simplicity.
      - >-
        Add 'maintain' to the existing review condition (lifecycle === 'review' || lifecycle ===
        'maintain') — This would show the merge-review tab for ALL maintain features, even those
        that never had a PR (e.g., manually completed features). The spec explicitly requires
        node.pr to be truthy (FR-2), so a separate condition branch is needed to check both
        lifecycle and pr presence.
    rationale: >
      The existing computeVisibleTabs() function at feature-drawer-tabs.tsx:57-74 uses simple
      if-blocks for each tab's visibility condition. Adding a new if-block for maintain+pr follows
      this exact pattern. The condition is: if (node.lifecycle === 'maintain' && node.pr)
      tabs.push('merge-review'). This is minimal, clear, and consistent with FR-1 and FR-2.

  - title: 'Read-only mode implementation approach'
    chosen: 'Add optional readOnly prop to MergeReviewProps, conditionally render DrawerActionBar'
    rejected:
      - >-
        Create a separate MergeHistory component that duplicates the data display sections without
        the action bar — Violates DRY. The MergeReview component already renders all the needed
        sections (PR card, branch direction, diff summary, evidence, file diffs). Duplicating
        ~200 lines of JSX to avoid one conditional would be maintenance-heavy and error-prone
        when the display evolves.
      - >-
        Use a wrapper component that renders MergeReview inside a container that hides the action
        bar via CSS (display:none) — CSS hiding is fragile (the action bar would still mount,
        receive focus, and consume resources). The component would still require onApprove
        callbacks, making the API confusing. Conditional rendering is the React-idiomatic approach
        and matches how other components in the codebase handle mode-specific rendering.
    rationale: >
      The MergeReview component at merge-review.tsx:193-356 has a clean separation between its
      data display section (lines 209-341, wrapped in a scrollable div) and the DrawerActionBar
      (lines 343-353). Adding readOnly?: boolean to MergeReviewProps with a default of false
      (NFR-3) and wrapping the DrawerActionBar in {!readOnly && <DrawerActionBar ... />} is a
      one-line change that preserves all existing behavior. The header text and description can
      also be adjusted based on readOnly to say "Merge History" instead of "Merge Review".

  - title: 'Dynamic tab label strategy'
    chosen: 'Compute label dynamically in visibleTabDefs derivation using node lifecycle'
    rejected:
      - >-
        Store label overrides in computeVisibleTabs() return value by changing return type from
        FeatureTabKey[] to {key, label}[] — This would change the function's contract and break
        all consumers (visibleTabs.includes() calls, tests). The function's purpose is to compute
        which tabs are visible, not their labels. Mixing concerns reduces clarity.
      - >-
        Add a separate getLabelOverrides() function that returns a Map<FeatureTabKey, string> —
        Over-engineering for a single conditional label. A simple inline ternary in the
        visibleTabDefs memo is clearer and requires no new abstraction. If more tabs need dynamic
        labels in the future, this can be extracted then.
    rationale: >
      The tab labels are rendered via visibleTabDefs at feature-drawer-tabs.tsx:164-167 which
      filters ALL_TABS by visibility. The cleanest approach is to map the label dynamically in
      this derivation: for the merge-review tab, use "Merge History" when node.lifecycle ===
      'maintain', otherwise keep "Merge Review". This keeps the ALL_TABS constant unchanged
      (preserving its role as the canonical display-order definition) while allowing per-render
      label customization. The featureNode is already available in scope.

  - title: 'Props threading from FeatureDrawerTabs to MergeReview'
    chosen: 'Pass readOnly prop directly based on featureNode.lifecycle check'
    rejected:
      - >-
        Add readOnly to FeatureDrawerTabsProps and pass it through from the parent — Unnecessary
        indirection. The FeatureDrawerTabs component already has access to featureNode.lifecycle,
        so it can derive readOnly={featureNode.lifecycle === 'maintain'} directly without
        requiring the parent to compute and pass it.
      - >-
        Use React Context to provide read-only mode to deeply nested components — Massive
        over-engineering. MergeReview is a direct child of FeatureDrawerTabs; there is no deep
        nesting that would justify a context. Props are the correct mechanism for one-level-deep
        communication.
    rationale: >
      The merge-review tab content is rendered at feature-drawer-tabs.tsx:452-471. The component
      already has featureNode in scope (line 136). Passing readOnly={featureNode.lifecycle ===
      'maintain'} to MergeReview is a trivial addition. When readOnly is true, the callback
      props (onApprove, onReject) become irrelevant — the component simply won't render the
      action bar. No-op fallbacks already handle undefined callbacks.

  - title: 'deriveInitialTab() behavior for maintain lifecycle'
    chosen: 'No changes to deriveInitialTab() — maintain lifecycle defaults to overview'
    rejected:
      - >-
        Return merge-review as the initial tab when lifecycle=maintain and pr exists — The spec
        explicitly requires overview as the default for maintain (FR-8). Maintain is a terminal
        state; users primarily want status information. Merge history is one click away. Auto-
        navigating to a read-only archive tab would be unexpected and disorienting.
      - >-
        Add a special case to return merge-review only on the first visit after merge — Would
        require tracking "first visit" state somewhere (localStorage, feature flag), adding
        complexity far out of proportion to the marginal UX benefit. The overview tab already
        shows merged status clearly.
    rationale: >
      deriveInitialTab() at drawer-view.ts:54-61 falls through to 'overview' for any lifecycle/
      state combination not explicitly matched. The maintain lifecycle is intentionally not matched
      because the spec (FR-8) requires overview as the default. Existing tests in drawer-view.
      test.ts already verify this behavior. No changes needed.

