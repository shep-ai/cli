summary: >
  After a feature is merged and transitions to the Maintain lifecycle, the Merge
  Review tab disappears because `computeVisibleTabs()` only shows it when
  `lifecycle === 'review'`. The underlying data (PR metadata in DB, evidence
  manifest on disk, diffs) already persists after merge. This feature extends
  the tab visibility logic and adapts the MergeReview component to render in a
  read-only "history" mode for completed features, letting users review what was
  changed and what evidence was captured without any actionable merge controls.
