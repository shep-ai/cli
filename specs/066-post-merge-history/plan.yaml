# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This feature is a **pure presentation-layer change** confined to three source files in
  `src/presentation/web/components/common/`. It does not touch domain models, TypeSpec
  definitions, database schema, server actions, or any inner architectural layer.

  The existing data infrastructure already supports post-merge viewing:
  - PR metadata (`feature.pr`) persists in SQLite after merge
  - Evidence manifest persists at `~/.shep/repos/<hash>/evidence/<featureId>/manifest.json`
  - `getMergeReviewData()` server action already handles missing worktrees gracefully
  - `useTabDataFetch` hook provides lazy loading and caching for tab data

  The only gap is the UI visibility logic in `computeVisibleTabs()` and the MergeReview
  component's assumption that it's always in an actionable review state.

  ## Key Design Decisions

  ### 1. Tab Visibility: Separate Condition Branch (not combined with review)

  Add a new if-block `if (node.lifecycle === 'maintain' && node.pr) tabs.push('merge-review')`
  rather than combining with the existing review condition. This ensures FR-2 compliance —
  maintain features without PR data don't show an empty tab. Follows the existing imperative
  if-block pattern used for prd-review, tech-decisions, and merge-review tabs.

  ### 2. Read-Only Mode: Optional Prop on Existing Component (not a new component)

  Add `readOnly?: boolean` to `MergeReviewProps` (defaulting to `false` per NFR-3) and use
  `{!readOnly && <DrawerActionBar ... />}` to conditionally hide the action bar. This avoids
  duplicating ~200 lines of JSX (DRY violation) and is the React-idiomatic approach. The
  existing `onApprove` callback receives a no-op fallback (already the pattern at line 458)
  so no interface change is needed.

  ### 3. Dynamic Tab Label: Inline Ternary in visibleTabDefs (not a new function)

  Compute the tab label dynamically in the `visibleTabDefs` memo by checking
  `featureNode.lifecycle === 'maintain'` for the merge-review tab. This keeps `ALL_TABS`
  as the canonical display-order constant and avoids changing `computeVisibleTabs()` return
  type (which would break all consumers).

  ### 4. Header Text Adaptation: Match Tab Label for Consistency

  When `readOnly` is true, the MergeReview header changes from "Merge Review" to
  "Merge History" and the description updates to archival language. This maintains
  consistency between tab label and component header.

  ### 5. deriveInitialTab(): No Changes

  The function's fall-through to `'overview'` already handles maintain lifecycle correctly.
  FR-8 explicitly requires overview as the default for completed features. Existing tests
  verify this behavior.

  ## Implementation Strategy

  **Phase 1** establishes tab visibility and labeling — the foundation that makes the tab
  appear for maintain+pr features. This is tested in isolation with unit tests for
  `computeVisibleTabs()`.

  **Phase 2** adapts the MergeReview component for read-only mode and threads the prop
  from FeatureDrawerTabs. This depends on Phase 1 because the tab must be visible before
  read-only rendering matters. Includes Storybook stories per NFR-4.

  **Phase 3** validates the full integration — existing tests still pass, build succeeds,
  and the deriveInitialTab() behavior is confirmed for maintain lifecycle.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Breaking existing merge-review behavior for review lifecycle | All changes use additive conditions (readOnly defaults to false); existing tests must pass unchanged |
  | Tab label change affecting other consumers | Label is computed in visibleTabDefs memo, not in ALL_TABS constant; no other consumers affected |
  | DrawerActionBar still mounting in read-only mode | Using conditional rendering ({!readOnly && ...}), not CSS hiding — component does not mount |
  | Missing no-op callback for onApprove in read-only mode | Existing pattern at line 458 already passes `onMergeApprove ?? (() => undefined)` — no change needed |
  | visibleTabDefs memo not re-computing on lifecycle change | featureNode is already a dependency of visibleTabs (via computeVisibleTabs); label derivation uses featureNode which triggers re-render |

  ---

