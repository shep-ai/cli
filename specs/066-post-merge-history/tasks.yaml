# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation follows a bottom-up approach across 3 phases with 7 tasks.

  **Phase 1 (Tab Visibility & Label Logic)** establishes the foundation: first we extend
  `computeVisibleTabs()` with a maintain+pr condition so the tab appears for completed
  features, then we add dynamic label mapping so it reads "Merge History" instead of
  "Merge Review" for the maintain lifecycle. Both changes are in feature-drawer-tabs.tsx
  and are tested in isolation.

  **Phase 2 (MergeReview Read-Only Mode)** adapts the component: we add a `readOnly`
  prop to the interface, implement conditional rendering (hide action bar, update header),
  thread the prop from FeatureDrawerTabs, and add Storybook stories for three read-only
  variants. The prop threading depends on Phase 1 (tab must be visible), and stories
  depend on the component changes.

  **Phase 3 (Integration Verification)** runs the full test suite, build, and lint to
  confirm zero regressions. This validates that existing merge-review behavior for the
  review lifecycle remains unchanged and that deriveInitialTab() correctly defaults to
  overview for maintain lifecycle.

  Total estimated effort: ~2 hours across all tasks.

  ---

