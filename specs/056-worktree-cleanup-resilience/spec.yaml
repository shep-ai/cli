# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When a worktree directory is manually deleted (or deleted by another process)
  but git still tracks it, the cleanup use case fails in two stages:

  1. `git worktree remove --force <path>` fails with "is not a working tree"
  2. `git branch -d <branch>` fails with "cannot delete branch used by worktree"

  The root cause is that git maintains stale worktree metadata even after the
  directory is gone. Running `git worktree prune` clears these stale entries.

  ## Success Criteria

  - [x] Add `prune()` method to IWorktreeService interface
  - [x] Implement `prune()` in WorktreeService using `git worktree prune`
  - [x] Call prune after worktree remove fails in CleanupFeatureWorktreeUseCase
  - [x] Branch deletion proceeds successfully after pruning stale entries
  - [x] Prune failure is caught and logged without blocking branch deletion

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | IWorktreeService | New method | Added prune() to interface |
  | WorktreeService | New method | Implements git worktree prune |
  | CleanupFeatureWorktreeUseCase | Bug fix | Calls prune on removal failure |

