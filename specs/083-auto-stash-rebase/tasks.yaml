content: |
  ## Summary

  The task breakdown covers 9 tasks across 3 phases. Phase 1 addresses the three
  implementation gaps identified during research: stash message format, multi-commit
  rebase loop bug, agent-powered stash pop resolution, and the supporting stashDrop
  method. Phase 2 adds comprehensive unit test coverage for all new and modified
  behavior. Phase 3 provides integration tests against real git repositories.

  The work starts with the independent fixes (tasks 1, 2, and 4 can run in parallel),
  then builds the stash pop resolution service (task 3), wires it into the use case
  (task 5), and finishes with test suites (tasks 6-9). Total estimated effort is
  approximately 5 hours.

  The implementation leverages existing patterns throughout: the ConflictResolutionService's
  internal helpers for file reading and validation, the GitPrService's execFile wrapper
  for new git commands, and the test harness from existing integration tests.
