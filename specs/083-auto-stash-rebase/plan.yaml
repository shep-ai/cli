content: |
  ## Architecture Overview

  The auto-stash-rebase feature fits cleanly into the existing Clean Architecture layering.
  The core flow is already implemented: the RebaseFeatureOnMainUseCase orchestrates
  stash → sync → rebase → conflict resolution → stash pop, with ConflictResolutionService
  handling agent-powered conflict resolution via IAgentExecutorProvider.

  The remaining work is surgical — three targeted fixes to close gaps between the current
  implementation and the spec requirements, plus test coverage for the new behavior.

  ### Existing Architecture (Unchanged)

  - **Port interface (IGitPrService):** Already has stash() and stashPop() methods.
  - **Infrastructure (GitPrService):** Already implements stash/stashPop via execFile.
  - **Infrastructure (ConflictResolutionService):** Already has dual-loop pattern with
    agent invocation, validation, and retry logic.
  - **Use case (RebaseFeatureOnMainUseCase):** Already orchestrates the full flow with
    try/finally for stash pop guarantee.
  - **DI container:** ConflictResolutionService and RebaseFeatureOnMainUseCase already
    registered as singletons with string token aliases.
  - **Presentation (server action):** Thin wrapper, unchanged.

  ## Key Design Decisions

  ### 1. Stash Message Format (Gap #1)

  **Current:** `'shep-rebase: auto-stash before rebase'` — generic, no feature identification.
  **Target:** `'shep-auto-stash: feat/my-feature'` — includes feature branch per spec decision.

  The fix is a one-line change in the use case. The feature branch name is already available
  on the feature entity (`feature.branch`). This enables manual recovery via `git stash list`
  when users need to identify which stash belongs to which feature.

  ### 2. Multi-Commit Rebase Loop Fix (Gap #2)

  **Current:** ConflictResolutionService.resolve() line 106 has `return` after a successful
  `rebaseContinue()`. This exits the entire method instead of looping back to check for
  conflicts on subsequent commits in a multi-commit rebase.

  **Fix:** Replace `return` with `continue` to loop back to the outer `while(true)` which
  checks `getConflictedFiles()`. If no conflicts remain, it returns naturally at line 59.
  If the next commit has conflicts, the inner retry loop handles them.

  This is a one-character fix (return → continue) but has significant behavioral impact
  for multi-commit rebases. The catch block on line 110 already handles the case where
  rebaseContinue throws REBASE_CONFLICT (immediate new conflicts), but the return on
  line 106 prevents detecting conflicts that emerge without an error (clean continue
  followed by the outer loop's getConflictedFiles check).

  ### 3. Agent-Powered Stash Pop Resolution (Gap #3)

  **Current:** The finally block calls `stashPop()` directly. If it throws (conflict between
  rebased code and stashed changes), the error propagates unhandled.

  **Target:** Wrap `stashPop()` in try/catch within the finally block. On failure:
  1. Detect that stash pop failed (catch the error)
  2. Get conflicted files from the stash pop
  3. Invoke ConflictResolutionService to resolve stash pop conflicts
  4. If agent resolves: success
  5. If agent fails: throw a clear error distinguishing what succeeded (rebase) and what
     failed (stash pop restoration) with recovery instructions

  The ConflictResolutionService already handles conflict resolution generically — it reads
  conflicted files, invokes the agent, validates, and stages. For stash pop conflicts,
  the flow is: detect failure → resolve conflicts → `git add` resolved files →
  `git stash drop` (the stash entry that partially applied). This reuses the existing
  service rather than duplicating logic.

  **Important nuance:** After a failed `git stash pop`, git leaves the working directory
  in a conflicted state (partially applied stash). The conflicted files have markers just
  like rebase conflicts. We can reuse getConflictedFiles() and the resolution service,
  but we need a stash-pop-specific prompt context (not rebase context) and we finish with
  `git stash drop` instead of `git rebase --continue`. This means adding a
  `resolveStashPopConflicts()` method or a mode parameter to the existing resolve() method.

  **Chosen approach:** Add a separate `resolveStashPop()` method on ConflictResolutionService
  that reuses the internal helpers (readConflictedFileContents, validateResolution,
  buildFeedbackFromRemainingMarkers) but with stash-pop-specific orchestration: resolve →
  stage → stash drop. This keeps the rebase and stash-pop resolution flows distinct while
  sharing the common agent invocation and validation logic.

  ## Implementation Strategy

  Phase 1 (Bug Fixes) comes first because the fixes are prerequisites for meaningful testing.
  Writing tests against buggy behavior would require rewriting them after the fix.

  Phase 2 (Unit Tests) follows TDD methodology — but since the code already exists, the TDD
  cycle is: write test for the desired behavior (RED if there's a gap), fix the code (GREEN),
  then refactor. For already-correct behavior, tests are written as characterization tests.

  Phase 3 (Integration Tests) provides end-to-end validation with real git repositories.
  These are the most expensive to write and run, so they come last after unit-level confidence
  is established.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Multi-commit rebase loop fix could break existing single-commit behavior | The outer loop's `getConflictedFiles()` check returns empty for clean rebases, causing immediate return. Single-commit behavior is unaffected. Unit tests verify both paths. |
  | Stash pop conflicts leave working directory in inconsistent state if agent fails | On agent failure, preserve the stash entry and throw a clear error with `git stash pop` recovery instructions. The stash is not dropped until conflicts are fully resolved. |
  | ConflictResolutionService reuse for stash pop may have subtle differences from rebase conflicts | Stash pop conflicts use the same marker format as rebase conflicts. The key difference is the finish step (stash drop vs rebase continue). The separate `resolveStashPop()` method handles this cleanly. |
  | Stash message format change could break existing stash detection logic | No code currently parses stash messages. The message is purely for human identification in `git stash list`. No downstream impact. |
  | Integration tests may be flaky due to git timing or temp directory issues | Follow existing harness pattern (create bare repo, clone, configure user). Use unique temp dirs per test. Clean up in afterEach. |
