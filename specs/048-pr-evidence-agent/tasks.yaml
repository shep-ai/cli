name: pr-evidence-agent
summary: >
  9 tasks across 4 phases implementing PR evidence collection in the merge node.
  Phase 1 sets up the TypeSpec enum and state channels. Phase 2 builds the evidence
  prompt with full TDD coverage — e2e test execution, dynamic port detection for the
  dev server (not hardcoded), screenshot/video capture, agent-driven spec inspection
  for artifact discovery, GitHub API upload (artifacts NOT committed to branch), and
  structured PR comment formatting. Phase 3 integrates evidence collection into the
  merge node BEFORE the CI watch/fix loop (not after). Phase 4 validates the system.

relatedFeatures:
  - 036-agent-driven-merge
  - 041-ci-watch-fix-loop

technologies:
  - LangGraph (StateGraph, Annotation, interrupt)
  - TypeSpec (EvidenceStatus enum)
  - GitHub CLI (gh pr comment, gh api for uploads)
  - Playwright (e2e test execution, screenshot/video capture)
  - Vitest (TDD)
  - js-yaml (YAML parsing)

relatedLinks: []

tasks:
  - id: task-1
    phaseId: phase-1
    title: 'Add EvidenceStatus enum to TypeSpec'
    description: >
      Define the EvidenceStatus enum in tsp/common/enums/workflow.tsp alongside
      the existing CiStatus and PrStatus enums. Values: Skipped, Success,
      Partial, Failed. Run pnpm tsp:compile to generate the output type.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'EvidenceStatus enum defined in tsp/common/enums/workflow.tsp with Skipped, Success, Partial, Failed values'
      - 'pnpm tsp:compile succeeds and EvidenceStatus appears in packages/core/src/domain/generated/output.ts'
      - 'Each enum value has a @doc annotation explaining its meaning'
    tdd:
      red:
        - 'Write a test that imports EvidenceStatus from domain/generated/output and asserts all four values exist'
      green:
        - 'Add the EvidenceStatus enum to workflow.tsp with four values and @doc annotations'
        - 'Run pnpm tsp:compile to generate the output file'
      refactor:
        - 'Verify enum value ordering matches the logical flow (Skipped -> Success -> Partial -> Failed)'
    estimatedEffort: '30min'

  - id: task-2
    phaseId: phase-1
    title: 'Add evidenceStatus and evidenceArtifacts channels to FeatureAgentAnnotation'
    description: >
      Add two new state channels to FeatureAgentAnnotation in state.ts.
      evidenceStatus uses the generated EvidenceStatus type (or a string union
      matching the enum) with a last-wins reducer and default 'Skipped'.
      evidenceArtifacts is string[] with a last-wins reducer and default [].
      evidenceArtifacts stores URLs of uploaded artifacts (GitHub API URLs),
      not file paths on the branch.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'evidenceStatus channel exists with reducer (_prev, next) => next and default Skipped'
      - 'evidenceArtifacts channel exists with reducer (_prev, next) => next and default []'
      - 'Both channels are typed correctly and accessible on FeatureAgentState'
      - 'Existing channels are unchanged — no regressions'
    tdd:
      red:
        - 'Write a test that creates a FeatureAgentState and asserts evidenceStatus defaults to Skipped and evidenceArtifacts defaults to []'
        - 'Write a test that asserts the channels accept new values via the reducer pattern'
      green:
        - 'Add the two channels to FeatureAgentAnnotation following the ciFixStatus and ciFixHistory patterns'
        - 'Import EvidenceStatus from generated output for the type'
      refactor:
        - 'Add inline comments grouping the new channels under an evidence section header, matching the existing section comment pattern'
    estimatedEffort: '30min'

  - id: task-3
    phaseId: phase-2
    title: 'Create evidence-prompts.ts with buildEvidencePrompt() core function'
    description: >
      Create the main prompt builder function that constructs a comprehensive prompt
      instructing the agent to: (1) run e2e tests via Playwright to validate the
      feature, (2) capture screenshots of UI changes with dynamic port detection
      (the dev server starts on a random port — detect it from stdout, never hardcode),
      (3) discover generated artifacts via spec inspection, (4) upload binary evidence
      via GitHub API (NOT committed to the branch), (5) post a structured PR comment
      with evidence links. The function reads spec files via readSpecFile() and takes
      evidence-specific parameters (prNumber, prUrl, branch, ciStatus, ciFixHistory).
    state: Todo
    dependencies:
      - task-2
    acceptanceCriteria:
      - 'buildEvidencePrompt() exported from evidence-prompts.ts'
      - 'Function signature: (state, prNumber, prUrl, ciStatus, ciFixHistory, branch) => string'
      - 'Prompt includes all required sections: implementation summary, test results, build verification, files changed, spec compliance'
      - 'Prompt includes the idempotency marker instruction (<!-- shep-evidence-v1 -->)'
      - 'Prompt includes the gh pr comment posting instruction'
      - 'Prompt reads spec.yaml, plan.yaml, and tasks.yaml via readSpecFile()'
      - 'Prompt is deterministic — same inputs produce same output'
    tdd:
      red:
        - 'Write test that buildEvidencePrompt() returns a string containing all required section headers'
        - 'Write test that prompt includes the PR number and URL'
        - 'Write test that prompt includes spec context from readSpecFile()'
        - 'Write test that prompt includes idempotency marker instruction (<!-- shep-evidence-v1 -->)'
        - 'Write test that prompt includes gh pr comment instruction'
        - 'Write test for determinism — same input produces same output on two calls'
      green:
        - 'Create evidence-prompts.ts with buildEvidencePrompt() that constructs the full prompt'
        - 'Use readSpecFile() to embed spec.yaml, plan.yaml, tasks.yaml content'
        - 'Include sections for each evidence category with clear agent instructions'
      refactor:
        - 'Extract section builders into private helper functions for readability'
        - 'Ensure consistent formatting with other prompt builders in the prompts/ directory'
    estimatedEffort: '2h'

  - id: task-4
    phaseId: phase-2
    title: 'Add e2e test execution and screenshot capture instructions with dynamic port detection'
    description: >
      Add instructions for the agent to run e2e tests via Playwright and capture
      screenshots of UI changes. Critical: the dev server starts on a RANDOM port
      (not hardcoded 3001). The prompt instructs the agent to start the dev server
      with `pnpm dev:web`, parse the port from the server stdout output (e.g.,
      "ready on localhost:XXXX" or "started server on 0.0.0.0:XXXX"), and use that
      detected port for Playwright baseURL. The prompt also includes instructions
      to run `pnpm test:e2e` for e2e test execution, collecting screenshots and
      video artifacts from the Playwright output directory. When no UI changes are
      detected (no files in src/presentation/web/), the screenshot section is skipped.
    state: Todo
    dependencies:
      - task-3
    acceptanceCriteria:
      - 'Prompt includes e2e test execution instructions using pnpm test:e2e'
      - 'Prompt includes screenshot capture instructions when state indicates UI file changes'
      - 'Prompt instructs agent to start dev server with pnpm dev:web (no PORT= env var, no hardcoded port)'
      - 'Prompt instructs agent to parse the actual port from dev server stdout output'
      - 'Prompt explicitly states: do NOT hardcode port 3001 or any other port number'
      - 'Prompt instructs agent to use the detected port for Playwright baseURL'
      - 'Prompt omits screenshot section when no UI changes detected'
      - 'Prompt includes instructions to collect video artifacts from Playwright output directory'
      - 'Instructions specify evidence artifacts should be saved to a temp directory (not committed to branch)'
    tdd:
      red:
        - 'Write test that prompt includes e2e test execution instructions referencing pnpm test:e2e'
        - 'Write test that prompt includes dynamic port detection instructions (parse port from stdout)'
        - 'Write test that prompt does NOT contain hardcoded port 3001'
        - 'Write test that prompt includes screenshot instructions when messages contain web UI file paths'
        - 'Write test that prompt omits screenshot section when no UI changes are mentioned'
        - 'Write test that prompt includes Playwright video artifact collection instructions'
      green:
        - 'Add e2e test execution section to the evidence prompt'
        - 'Add a helper function that generates screenshot capture section with dynamic port detection'
        - 'Conditionally include the section based on UI file changes in state.messages or spec context'
        - 'Add video artifact collection instructions referencing test-results/ directory'
      refactor:
        - 'Extract the UI change detection logic into a focused helper for testability'
        - 'Extract port detection instructions into a reusable prompt block'
    estimatedEffort: '1.5h'

  - id: task-5
    phaseId: phase-2
    title: 'Add spec-driven artifact discovery, GitHub API upload, and security exclusions'
    description: >
      Add instructions for agent-driven spec inspection to discover generated
      artifacts. The prompt instructs the agent to read spec files to understand
      what the feature produces, then search for those specific artifacts. Critically,
      artifacts are NOT committed to the feature branch — they are uploaded via
      GitHub API (using gh api to upload as issue/PR attachments) and linked from
      the PR comment. Include the explicit security exclusion list (NFR-9), size
      limits (NFR-6), and the commit instruction for evidence/ is REMOVED.
    state: Todo
    dependencies:
      - task-3
    acceptanceCriteria:
      - 'Prompt instructs agent to read spec.yaml, plan.yaml, tasks.yaml to identify expected artifacts'
      - 'Prompt instructs agent to extract artifact expectations from success criteria and task acceptance criteria'
      - 'Prompt instructs agent to search for artifacts matching what the spec describes'
      - 'Prompt includes a fallback to common output patterns only when spec provides no artifact hints'
      - 'Prompt instructs agent to upload binary artifacts via GitHub API (gh api), NOT git commit'
      - 'Prompt explicitly states: do NOT commit artifacts to the feature branch'
      - 'Prompt includes explicit security exclusion list (.env, *.key, *.pem, credentials.json, etc.)'
      - 'Prompt includes size limits (10 MB per file, 50 MB total)'
    tdd:
      red:
        - 'Write test that prompt instructs agent to read spec files for artifact identification'
        - 'Write test that prompt references success criteria and acceptance criteria as artifact sources'
        - 'Write test that prompt includes spec-driven search as the primary discovery strategy'
        - 'Write test that prompt includes fallback to common output patterns as secondary strategy'
        - 'Write test that prompt includes GitHub API upload instructions (gh api)'
        - 'Write test that prompt does NOT include git commit instructions for evidence artifacts'
        - 'Write test that prompt includes the security exclusion patterns (.env, *.key, *.pem, credentials.json)'
        - 'Write test that prompt includes size limit instructions (10 MB per file, 50 MB total)'
      green:
        - 'Add spec-driven artifact discovery section that instructs agent to analyze spec for expected outputs'
        - 'Add fallback common output pattern section for specs with no artifact hints'
        - 'Add GitHub API upload instructions replacing the git commit/push approach'
        - 'Add security exclusion list as a constant array, embedded in prompt text'
        - 'Add size limit instructions'
      refactor:
        - 'Ensure the exclusion list is a single constant that can be maintained easily'
        - 'Group spec-driven discovery and fallback scanning under clear sub-headings'
    estimatedEffort: '1.5h'

  - id: task-6
    phaseId: phase-2
    title: 'Add CI fix history and edge case handling to evidence prompt'
    description: >
      Add CI fix history section to the evidence prompt when ciFixHistory has
      entries. Add edge case handling: empty CI data, missing spec files, null
      prNumber. Ensure the prompt degrades gracefully with placeholder text for
      missing data.
    state: Todo
    dependencies:
      - task-3
    acceptanceCriteria:
      - 'Prompt includes CI fix history section when ciFixHistory is non-empty'
      - 'Prompt omits CI fix history section when ciFixHistory is empty'
      - 'Prompt handles null/empty ciStatus with appropriate placeholder text'
      - 'Prompt handles missing spec files (readSpecFile returns empty string) without errors'
      - 'Prompt still generates valid output when all optional data is missing'
    tdd:
      red:
        - 'Write test that prompt includes CI fix history when ciFixHistory has entries'
        - 'Write test that prompt omits CI fix history when ciFixHistory is empty array'
        - 'Write test that prompt handles null ciStatus gracefully'
        - 'Write test that prompt handles empty spec file content without errors'
        - 'Write test with minimal state (all optional fields null/empty) produces valid prompt'
      green:
        - 'Add conditional CI fix history section to the prompt builder'
        - 'Add null/empty checks for ciStatus and spec content with fallback text'
        - 'Ensure all string interpolation handles null/undefined safely'
      refactor:
        - 'Consolidate null-handling patterns into a consistent approach'
    estimatedEffort: '45min'

  - id: task-7
    phaseId: phase-3
    title: 'Add evidence collection phase to merge node BEFORE CI watch'
    description: >
      Add the evidence collection phase to merge.node.ts BEFORE the CI watch/fix
      loop — immediately after Agent Call 1 (commit/push/PR) and PR URL parsing,
      but before runCiWatchFixLoop is called. This is a critical change from the
      previous plan which placed evidence AFTER CI watch. The new flow is:
      Agent Call 1 -> parse PR -> EVIDENCE -> CI watch -> persist data -> approval gate.
      Import buildEvidencePrompt, call retryExecute with maxTurns=5, wrap in try-catch
      for graceful degradation, set evidenceStatus and evidenceArtifacts.
      Include evidenceStatus in the interrupt payload. Evidence only runs when
      openPr is true and prNumber is available.
    state: Todo
    dependencies:
      - task-3
      - task-4
      - task-5
      - task-6
    acceptanceCriteria:
      - 'Evidence collection runs AFTER Agent Call 1 (commit/push/PR) and BEFORE CI watch/fix loop'
      - 'Evidence is skipped when openPr is false or prNumber is null — evidenceStatus set to Skipped'
      - 'buildEvidencePrompt is called with correct parameters from local merge node state'
      - 'retryExecute is called with executor, prompt, and options (maxTurns overridden to 5)'
      - 'On success, evidenceStatus is set to Success'
      - 'On failure (try-catch), evidenceStatus is set to Failed, warning logged, flow continues to CI watch'
      - 'evidenceStatus and evidenceArtifacts are included in the interrupt() payload'
      - 'evidenceStatus and evidenceArtifacts are included in the return state object'
      - 'Evidence phase does not run on resume after interrupt (isResumeAfterInterrupt check)'
      - 'No evidence/ directory cleanup needed (artifacts uploaded via API, not committed)'
    tdd:
      red:
        - 'Write test that evidence agent call is made AFTER PR creation and BEFORE CI watch when openPr=true and prNumber exists'
        - 'Write test that evidence is skipped (no agent call) when openPr=false'
        - 'Write test that evidence is skipped when prNumber is null'
        - 'Write test that on agent executor failure, evidenceStatus is Failed and flow continues to CI watch'
        - 'Write test that CI watch still runs after evidence failure'
        - 'Write test that evidenceStatus appears in interrupt payload'
        - 'Write test that evidenceStatus and evidenceArtifacts appear in return state'
        - 'Write test that evidence phase does not run on resume after interrupt'
      green:
        - 'Add evidence collection block AFTER PR URL parsing (line ~140) and BEFORE CI watch/fix loop (line 142)'
        - 'Import buildEvidencePrompt from evidence-prompts.ts'
        - 'Call retryExecute with maxTurns=5 override in options'
        - 'Wrap in try-catch, set evidenceStatus on success or failure'
        - 'Add evidenceStatus to interrupt() payload object'
        - 'Add evidenceStatus and evidenceArtifacts to the return state'
      refactor:
        - 'Extract evidence collection into a clearly bounded code block with comments matching the ci-watch-fix-loop section style'
        - 'Ensure log messages follow the existing [merge] prefix pattern'
    estimatedEffort: '2h'

  - id: task-8
    phaseId: phase-3
    title: 'Persist evidenceStatus in feature record before approval gate'
    description: >
      Include evidenceStatus in the feature record update that happens at the PR
      data persistence step (line 168-184). Also ensure that on resume after
      interrupt, evidenceStatus is restored from the feature record alongside
      prUrl, prNumber, etc.
    state: Todo
    dependencies:
      - task-7
    acceptanceCriteria:
      - 'evidenceStatus is saved to the feature record before the approval gate'
      - 'evidenceStatus is restored from the feature record on resume after interrupt'
      - 'Feature record update does not fail if evidenceStatus is the default Skipped value'
    tdd:
      red:
        - 'Write test that feature repository update includes evidenceStatus after evidence phase'
        - 'Write test that evidenceStatus is restored from feature record on resume'
      green:
        - 'Add evidenceStatus to the feature record update alongside PR data'
        - 'Add evidenceStatus restoration in the resume-after-interrupt block'
      refactor:
        - 'Verify the feature record schema can accommodate the new field without migration'
    estimatedEffort: '30min'

  - id: task-9
    phaseId: phase-4
    title: 'Full integration validation'
    description: >
      Run the complete test suite (pnpm test), TypeSpec compilation (pnpm tsp:compile),
      lint/format/typecheck (pnpm validate), and verify all tests pass. Fix any
      issues discovered during integration. Ensure existing merge node tests still
      pass with the new state channels.
    state: Todo
    dependencies:
      - task-7
      - task-8
    acceptanceCriteria:
      - 'pnpm tsp:compile succeeds'
      - 'pnpm validate (lint + format + typecheck + tsp) passes'
      - 'pnpm test:unit passes — all existing and new tests green'
      - 'No type errors introduced by new state channels or prompt builder'
      - 'Existing merge node tests pass unchanged (backward compatibility)'
    tdd: null
    estimatedEffort: '1h'

totalEstimate: '10.25h'
openQuestions: []

content: |
  ## Summary

  The implementation is organized into 9 tasks across 4 phases. Phase 1 establishes
  the type foundation — the EvidenceStatus TypeSpec enum and the two new state channels
  (evidenceStatus, evidenceArtifacts) in FeatureAgentAnnotation. Phase 2 builds the
  evidence prompt builder as a pure function with full TDD coverage across 4 tasks:
  the core prompt, e2e test execution with dynamic port detection for screenshots,
  spec-driven artifact discovery with GitHub API upload (no branch commits), and CI
  fix history with edge cases. Phase 3 integrates everything into the merge node
  across 2 tasks: the evidence collection phase (placed BEFORE CI watch) and feature
  record persistence. Phase 4 runs the full validation suite.

  Key changes from the previous iteration addressing user feedback:

  1. **Evidence runs BEFORE CI watch** — The evidence phase (e2e tests, screenshots,
     artifact discovery) executes immediately after PR creation, before CI monitoring
     starts. This ensures evidence artifacts are on the PR before CI results arrive.

  2. **Artifacts are NOT committed to the feature branch** — Binary evidence
     (screenshots, videos, generated files) is uploaded via GitHub API and linked from
     the PR comment. This eliminates the evidence/ directory, the cleanup commit before
     merge, and task-8 from the previous plan (evidence cleanup phase).

  3. **Dynamic dev server port** — The prompt instructs the agent to detect the actual
     port from `pnpm dev:web` stdout, never hardcoding 3001 or any other port number.
     The dev server picks a random available port.

  4. **Agent-driven spec inspection** for artifact discovery remains the primary
     strategy, with generic directory scanning as a fallback only.

  The dependency chain ensures each task builds on prior work: TypeSpec enum -> state
  channels -> prompt builder -> merge node integration -> validation. Within Phase 2,
  tasks 4, 5, and 6 all depend only on task 3 (the core prompt) and can be worked in
  sequence or parallel. Phase 3 task 8 depends on task 7 (evidence phase).

  All code tasks follow TDD: write failing tests first (RED), implement minimal code
  to pass (GREEN), then clean up (REFACTOR). Tests follow the patterns established in
  merge-prompts.test.ts (baseState factory, readSpecFile mocking) and merge.node.test.ts
  (vi.hoisted mocks, full dependency injection).
