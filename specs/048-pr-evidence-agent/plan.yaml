content: |
  ## Architecture Overview

  The PR evidence feature integrates into the existing merge node's multi-phase flow
  without changing the LangGraph graph topology. The key architectural change from
  previous iterations is the **placement and timing** of evidence collection:

  ### Revised Flow Order

  Evidence collection runs BEFORE CI watch, not after. This is because:
  1. E2e tests and screenshots should be captured before CI runs — they ARE part of
     the validation that CI will verify
  2. Screenshots and artifacts should be available on the PR before CI status is known
  3. The evidence phase effectively runs the project's e2e tests as part of evidence
     gathering, producing screenshots and videos as proof

  ```
  Agent Call 1: Commit + Push + PR (line 117)
    |
  Parse PR URL/number (line 130-140)
    |
  * EVIDENCE PHASE (new — after PR creation, BEFORE CI watch)
  *   1. Run e2e tests via Playwright (captures screenshots + videos)
  *   2. Discover generated artifacts via spec inspection
  *   3. Upload binary evidence via GitHub API
  *   4. Post structured PR comment with evidence links
    |
  CI Watch/Fix Loop (line 142) — now runs AFTER evidence is collected
    |
  Persist PR data (line 168)
    |
  Merge Approval Gate (line 186) — includes evidenceStatus in interrupt payload
    |
  Resume after approval (line 202)
    |
  Merge (line 220)
  ```

  ### Key Changes from Previous Iteration

  1. **Evidence BEFORE CI watch** — Evidence collection (e2e tests, screenshots,
     artifacts) runs immediately after PR creation, before CI monitoring starts.
     This means evidence artifacts are already on the PR when CI begins.

  2. **No evidence committed to feature branch** — Binary artifacts (screenshots,
     videos, generated files) are uploaded via GitHub API instead of being committed
     to the feature branch. This eliminates the need for an evidence cleanup phase
     before merge and avoids polluting the branch with binary files. The agent uses
     `gh api` to upload files as PR comment attachments or issue attachments, then
     links them from the evidence comment.

  3. **Dynamic dev server port** — The dev server (`pnpm dev:web`) starts on a
     random available port, not hardcoded 3001. The evidence prompt instructs the
     agent to: start the dev server, parse the port from stdout, and use that port
     for Playwright navigation. This matches the actual behavior where `pnpm dev:web`
     picks an available port.

  4. **No evidence cleanup phase** — Since artifacts are uploaded via GitHub API
     (not committed to the branch), there is no `evidence/` directory to clean up
     before merge. This simplifies the merge flow significantly.

  ### File Organization

  ```
  packages/core/src/infrastructure/services/agents/feature-agent/
  +-- state.ts                          # + evidenceStatus, evidenceArtifacts channels
  +-- nodes/
  |   +-- merge/
  |   |   +-- merge.node.ts             # + evidence phase (before CI watch)
  |   +-- prompts/
  |       +-- evidence-prompts.ts        # NEW: buildEvidencePrompt() + helpers
  tsp/
  +-- common/enums/workflow.tsp         # + EvidenceStatus enum
  tests/unit/.../nodes/
  +-- merge/
  |   +-- merge.node.evidence.test.ts   # NEW: evidence phase integration tests
  +-- prompts/
      +-- evidence-prompts.test.ts      # NEW: prompt builder unit tests
  ```

  ## Key Design Decisions

  ### 1. Evidence BEFORE CI Watch (User Feedback #3)

  The user explicitly stated: "it should go before the CI watch, before creating
  pull request we need to do e2e testing and create the screenshots for the pr."
  This means evidence collection (including e2e test execution and screenshot
  capture) happens AFTER the PR is created but BEFORE CI monitoring begins. The
  e2e tests and screenshots are captured locally by the agent, then uploaded to
  the PR. CI watch monitors the remote CI pipeline separately.

  **Rejected:** Evidence after CI watch — the user specifically wanted evidence
  gathered before CI, not after.

  ### 2. No Artifacts Committed to Feature Branch (User Feedback #3)

  The user stated: "the artifact shouldnt get commited." Binary evidence is uploaded
  via GitHub API (`gh api` for file uploads or using issue comment attachment
  workflow) instead of being committed to the feature branch. This eliminates:
  - The evidence/ directory on the branch
  - The cleanup commit before merge
  - Binary file pollution in git history

  Text evidence is posted as a PR comment. Binary files (screenshots, videos,
  generated artifacts) are uploaded and linked from the comment.

  **Rejected:** Committing to evidence/ directory — user explicitly said artifacts
  should not be committed to the branch.

  ### 3. Dynamic Dev Server Port (User Feedback #3)

  The user stated: "the dev start starts on a random port so dont have it hard
  coded on 3001 as it can change." The evidence prompt instructs the agent to:
  1. Start the dev server with `pnpm dev:web`
  2. Parse the server output to find the actual port (e.g., "ready on port XXXX")
  3. Use the detected port for Playwright navigation
  4. Never assume port 3001

  This is robust against port conflicts and environment differences.

  **Rejected:** Hardcoded PORT=3001 — the dev server picks a random available port.

  ### 4. Agent-Driven Spec Inspection for Artifact Discovery (User Feedback #2)

  Generated artifacts (CSV, PDF, etc.) are discovered through agent-driven spec
  inspection. The agent reads spec.yaml, plan.yaml, and tasks.yaml to understand
  what the feature produces, then searches for those specific artifacts.

  **Rejected:** Generic workspace scanning with hardcoded directories — too noisy,
  misses non-standard locations.

  ### 5. Single Agent Call with maxTurns=5 (Research Decision #10)

  Evidence collection uses one comprehensive agent call. The prompt is ordered by
  priority: (1) run e2e tests, (2) capture screenshots, (3) discover artifacts,
  (4) upload binaries via GitHub API, (5) post PR comment.

  ### 6. Integrated into Merge Node (Research Decision #1)

  Evidence needs PR metadata (prUrl, prNumber) from the merge node's first agent
  call. A separate graph node would require splitting the merge node.

  ### 7. Agent-Driven gh CLI for PR Comments (Research Decision #3)

  The agent posts evidence via `gh pr comment` and uploads binaries via `gh api`.

  ### 8. HTML Comment Marker for Idempotency (Research Decision #8)

  `<!-- shep-evidence-v1 -->` marker enables find-and-update on re-runs.

  ### 9. Try-Catch Degradation (Research Decision #7)

  Evidence failure does not block CI watch or merge. On failure, evidenceStatus is
  set to 'failed' and the flow continues.

  ### 10. TypeSpec-First for EvidenceStatus Enum

  Following the mandatory TypeSpec-first rule, the EvidenceStatus enum is defined
  in `tsp/common/enums/workflow.tsp` alongside CiStatus and PrStatus.

  ## Implementation Strategy

  Phase 1 (Foundation) comes first because state channels and TypeSpec types are
  dependencies for all other code. Phase 2 (Prompt Builder) follows because it is
  a pure function — ideal for TDD isolation. The key changes in Phase 2 are:
  (a) the prompt instructs e2e test execution before screenshot capture,
  (b) the dev server port is dynamically detected, not hardcoded,
  (c) artifacts are uploaded via GitHub API rather than committed,
  (d) artifact discovery uses agent-driven spec inspection.
  Phase 3 (Merge Node Integration) wires the evidence phase BEFORE the CI watch/fix
  loop and removes the evidence cleanup phase (no longer needed since artifacts
  aren't committed). Phase 4 (Validation) confirms the system works end-to-end.

  Each phase follows strict TDD: failing tests first (RED), minimal implementation
  (GREEN), then cleanup (REFACTOR).

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Evidence phase adds latency before CI watch | 120s timeout; text evidence posted first; screenshots/artifacts are additive and non-blocking |
  | Screenshot capture fails (Playwright error) | Prompt instructs agent to skip on failure; evidenceStatus tracks partial success; CI watch proceeds |
  | Dev server port detection fails | Agent falls back to checking common ports or skipping screenshots; evidence degrades gracefully |
  | GitHub API upload fails for binary artifacts | Agent logs warning, posts text-only evidence comment, continues to CI watch |
  | Agent runs out of turns | Prompt ordered by priority: e2e tests then screenshots then artifacts then comment; partial evidence better than none |
  | Merge node grows too large | Evidence follows ci-watch-fix-loop pattern: focused try-catch + single agent call; prompt in separate file |
  | Re-runs create duplicate PR comments | HTML marker <!-- shep-evidence-v1 --> enables find-and-update via gh api |
  | Spec lacks artifact details | Agent falls back to searching common output patterns as a secondary strategy |
  | Sensitive files accidentally uploaded | Explicit exclusion list in prompt (.env, *.key, *.pem, credentials.json, etc.) |
  | Large binary artifacts | 10 MB per-file, 50 MB total limits; agent skips oversized files |
