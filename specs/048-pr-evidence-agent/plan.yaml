name: pr-evidence-agent
summary: >
  Integrate a PR evidence collection phase into the existing merge node that
  gathers text evidence (test summaries, build status, spec compliance), captures
  screenshots/videos via Playwright for UI features, discovers generated artifacts
  through agent-driven spec inspection (reading spec.yaml, plan.yaml, tasks.yaml
  to understand what the feature produces), commits binary evidence to an evidence/
  directory on the feature branch, posts a structured PR comment, and cleans up
  evidence before merge. The implementation adds two state channels (evidenceStatus,
  evidenceArtifacts), a new TypeSpec enum (EvidenceStatus), a new prompt builder file
  (evidence-prompts.ts), and evidence collection + cleanup logic within the merge
  node — all following established patterns (prompt builders, retryExecute, try-catch
  degradation, TDD).

relatedFeatures:
  - 036-agent-driven-merge
  - 041-ci-watch-fix-loop

technologies:
  - LangGraph (StateGraph, Annotation, interrupt)
  - TypeSpec (domain model generation for EvidenceStatus enum)
  - GitHub CLI (gh pr comment for posting evidence)
  - Playwright (screenshot and video capture for UI evidence)
  - Vitest (TDD unit tests)
  - js-yaml (YAML parsing for spec artifacts)

relatedLinks: []

phases:
  - id: phase-1
    name: 'State & Domain Foundation'
    description: >
      Add EvidenceStatus enum to TypeSpec, compile generated output, and add
      evidenceStatus and evidenceArtifacts channels to FeatureAgentAnnotation.
      This must come first because all subsequent code depends on these state
      channels and types existing.
    parallel: false

  - id: phase-2
    name: 'Evidence Prompt Builder'
    description: >
      Create evidence-prompts.ts with buildEvidencePrompt() and helper functions
      for section generation, spec-driven artifact discovery instructions,
      security exclusions, and comment formatting. The artifact discovery
      approach is agent-driven spec inspection — the prompt instructs the agent
      to read the feature spec (spec.yaml, plan.yaml, tasks.yaml) to understand
      what artifacts the feature is expected to produce, then search for those
      specific artifacts rather than blindly scanning directories. This is the
      pure-function core — ideal for TDD with no external dependencies. Must be
      complete before merge node integration because the merge node calls this
      function.
    parallel: false

  - id: phase-3
    name: 'Merge Node Evidence Integration'
    description: >
      Wire the evidence phase into merge.node.ts between CI watch/fix and the
      approval gate. Add the evidence cleanup phase between approval and merge.
      Include evidenceStatus and evidenceArtifacts in the interrupt payload and
      the return state. Implement graceful degradation via try-catch.
    parallel: false

  - id: phase-4
    name: 'Integration Validation & Polish'
    description: >
      Run full test suite, verify TypeSpec compilation, ensure lint/typecheck
      pass, and validate the complete evidence flow end-to-end through the merge
      node test harness. Fix any issues discovered during integration.
    parallel: false

filesToCreate:
  - packages/core/src/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.ts
  - tests/unit/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.test.ts
  - tests/unit/infrastructure/services/agents/feature-agent/nodes/merge/merge.node.evidence.test.ts

filesToModify:
