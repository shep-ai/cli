name: pr-evidence-agent
summary: >
  Integrate a PR evidence collection phase into the existing merge node that runs
  BEFORE CI watch — after commit/push/PR creation but before CI monitoring begins.
  The evidence phase runs e2e tests via Playwright, captures screenshots/videos of
  UI changes, discovers generated artifacts through agent-driven spec inspection,
  uploads binary evidence via GitHub API (not committed to the feature branch), and
  posts a structured PR comment linking all evidence. The dev server port is detected
  dynamically (not hardcoded) since `pnpm dev:web` assigns a random available port.
  The implementation adds two state channels (evidenceStatus, evidenceArtifacts), a
  new TypeSpec enum (EvidenceStatus), a new prompt builder file (evidence-prompts.ts),
  and evidence collection logic within the merge node — all following established
  patterns (prompt builders, retryExecute, try-catch degradation, TDD).

relatedFeatures:
  - 036-agent-driven-merge
  - 041-ci-watch-fix-loop

technologies:
  - LangGraph (StateGraph, Annotation, interrupt)
  - TypeSpec (domain model generation for EvidenceStatus enum)
  - GitHub CLI (gh pr comment for posting evidence, gh api for uploading artifacts)
  - Playwright (e2e test execution, screenshot and video capture for UI evidence)
  - Vitest (TDD unit tests)
  - js-yaml (YAML parsing for spec artifacts)

relatedLinks: []

phases:
  - id: phase-1
    name: 'State & Domain Foundation'
    description: >
      Add EvidenceStatus enum to TypeSpec, compile generated output, and add
      evidenceStatus and evidenceArtifacts channels to FeatureAgentAnnotation.
      This must come first because all subsequent code depends on these state
      channels and types existing.
    parallel: false

  - id: phase-2
    name: 'Evidence Prompt Builder'
    description: >
      Create evidence-prompts.ts with buildEvidencePrompt() and helper functions
      for section generation, spec-driven artifact discovery instructions,
      security exclusions, and comment formatting. The prompt instructs the agent
      to run e2e tests, capture screenshots with dynamic port detection, discover
      artifacts via spec inspection, upload binaries via GitHub API, and post a
      structured PR comment. This is the pure-function core — ideal for TDD with
      no external dependencies.
    parallel: false

  - id: phase-3
    name: 'Merge Node Evidence Integration'
    description: >
      Wire the evidence phase into merge.node.ts BEFORE the CI watch/fix loop —
      after commit/push/PR creation (Agent Call 1) but before CI monitoring begins.
      This allows e2e tests and screenshot capture to complete before CI runs,
      ensuring evidence artifacts are available on the PR before CI status is known.
      Include evidenceStatus and evidenceArtifacts in the interrupt payload and
      the return state. Implement graceful degradation via try-catch.
    parallel: false

  - id: phase-4
    name: 'Integration Validation & Polish'
    description: >
      Run full test suite, verify TypeSpec compilation, ensure lint/typecheck
      pass, and validate the complete evidence flow end-to-end through the merge
      node test harness. Fix any issues discovered during integration.
    parallel: false

