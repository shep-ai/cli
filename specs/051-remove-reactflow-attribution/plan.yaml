# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This change is entirely within the **presentation layer** (`src/presentation/web/`).
  No domain, application, or infrastructure layers are affected. No interfaces, types,
  or contracts change.

  The `<ReactFlow>` component in `features-canvas.tsx` (line 104) is the main production
  canvas used to render the feature dependency graph. The `<ReactFlow>` component in
  `dependency-edge.stories.tsx` (line 51) is a Storybook story that demonstrates the
  DependencyEdge component in isolation.

  Both files follow the same inline-prop pattern used across the codebase for ReactFlow
  configuration (nodesDraggable, nodesConnectable, elementsSelectable, etc.).

  ## Key Design Decisions

  ### 1. Inline proOptions prop (not extracted to a shared config)

  Every existing ReactFlow instance in the codebase applies `proOptions` inline as a JSX
  attribute. Extracting it into a shared constant would introduce a pattern not used
  elsewhere and add unnecessary indirection. The inline approach is consistent with both
  the codebase convention and each component's own style.

  ### 2. No new tests

  The `features-canvas.test.tsx` file renders `<FeaturesCanvas>` (the wrapper component),
  not `<ReactFlow>` directly. The `proOptions` prop is applied inside the component. Adding
  a test that asserts on a specific prop value would couple the test to React Flow internals
  and provide minimal value for a static boolean. The existing test suite verifies the
  component renders correctly and will catch any regressions from the prop addition.

  ### 3. No CSS-based approach

  Using CSS to hide the attribution element would be fragile, depending on React Flow's
  internal DOM structure and class names. The `proOptions` API is the officially documented
  and supported mechanism for this purpose.

  ## Implementation Strategy

  This is a single-phase implementation. Both files need an identical one-line prop addition.
  The production file (features-canvas.tsx) is modified first because it addresses the
  user-facing requirement, followed by the story file for consistency. Verification
  (existing tests, build, lint) confirms no regressions.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Prop breaks existing component behavior | proOptions only controls the attribution watermark — no layout, interaction, or render changes. Existing test suite covers component rendering. |
  | Prop not available in installed version | @xyflow/react v12.10.0 is already installed and six other files already use this exact prop successfully. |
  | Story rendering breaks | The prop is already used in four other story files without issues. Run Storybook build to confirm. |
