# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The React Flow library renders a small attribution watermark ("React Flow") in the
  bottom-right corner of the canvas by default. This watermark is currently visible in
  the production features canvas. According to the React Flow documentation, the
  attribution can be removed by passing `proOptions={{ hideAttribution: true }}` to the
  `<ReactFlow>` component.

  Several Storybook stories and test files in this codebase already use
  `proOptions={{ hideAttribution: true }}` on their own `<ReactFlow>` instances, but the
  main production component (`features-canvas.tsx`) and the `dependency-edge.stories.tsx`
  file do not.

  ## Success Criteria

  - [ ] The React Flow attribution watermark is not rendered in the production features canvas
  - [ ] The `dependency-edge.stories.tsx` story also hides the attribution for consistency
  - [ ] All existing unit tests pass without modification
  - [ ] The build completes without errors
  - [ ] Lint and typecheck pass without errors

  ## Functional Requirements

  - **FR-1**: The `<ReactFlow>` component in `features-canvas.tsx` MUST include the prop `proOptions={{ hideAttribution: true }}` to suppress the attribution watermark in the production UI.
  - **FR-2**: The `<ReactFlow>` component in `dependency-edge.stories.tsx` MUST include the prop `proOptions={{ hideAttribution: true }}` for consistency with other story files.

  ## Non-Functional Requirements

  - **NFR-1**: No new runtime dependencies may be introduced; the `proOptions` API is already available in the installed `@xyflow/react` v12.10.0.
  - **NFR-2**: The change must not alter any existing component behavior, layout, interaction, or render output beyond removing the attribution watermark.
  - **NFR-3**: All existing Storybook stories must continue to render correctly after the change.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should the dependency-edge story also hide attribution? | Yes — hide in all ReactFlow instances | Other stories already do this; consistency prevents watermark artifacts in screenshots |
  | 2 | Should a unit test assert proOptions.hideAttribution is true? | No — rely on existing test coverage | Testing a static prop couples tests to React Flow internals with minimal value |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/web/components/features/features-canvas/features-canvas.tsx` | High | The main `<ReactFlow>` component where `proOptions` must be added (line 104) |
  | `src/presentation/web/components/features/features-canvas/dependency-edge.stories.tsx` | Low | Story file with a `<ReactFlow>` instance that also lacks `proOptions` — should be consistent |

  Files that ALREADY have `proOptions={{ hideAttribution: true }}` (no changes needed):
  - `src/presentation/web/components/common/feature-node/feature-node.stories.tsx`
  - `src/presentation/web/components/common/repository-node/repository-node.stories.tsx`
  - `tests/unit/presentation/web/common/feature-node/feature-node.test.tsx`
  - `tests/unit/presentation/web/common/repository-node/repository-node.test.tsx`

  ## Dependencies

  - `@xyflow/react` v12.10.0 already installed — the `proOptions` API is available in this version
  - No new dependencies required

  ## Size Estimate

  **S** — This is a one-line prop addition to the `<ReactFlow>` component in
  `features-canvas.tsx` and `dependency-edge.stories.tsx`. No architectural changes,
  no new components, no new dependencies. The existing test suite covers the component
  and requires no modifications.
