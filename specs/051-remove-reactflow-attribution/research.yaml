content: |
  ## Status

  - **Phase:** Research (Complete)
  - **Updated:** 2026-03-08

  ## Technology Decisions

  ### 1. Attribution Removal Approach

  **Chosen:** Use `proOptions={{ hideAttribution: true }}` prop on `<ReactFlow>` component

  **Rejected:**
  - CSS override to hide the attribution element — fragile, depends on internal DOM structure and class names that may change between React Flow versions
  - Wrap ReactFlow in a custom component that always injects proOptions — over-engineering for a two-file change; deviates from the existing per-instance pattern

  **Rationale:** The `proOptions` prop is the officially documented API for hiding the React Flow attribution watermark. It is already used consistently across six files in this codebase. Using the same pattern on the two remaining instances is the simplest and most maintainable approach.

  ### 2. Prop Placement in features-canvas.tsx

  **Chosen:** Add `proOptions` prop directly to the existing `<ReactFlow>` JSX element inline

  **Rejected:**
  - Extract proOptions into a shared constant — unnecessary abstraction; no other ReactFlow instance uses shared config
  - Pass proOptions as a FeaturesCanvas prop — adds prop surface area for no benefit; breaks existing pattern

  **Rationale:** Every existing `<ReactFlow>` instance in the codebase applies `proOptions` inline. The `features-canvas.tsx` component already has all its ReactFlow configuration inline. Consistency dictates the same approach.

  ### 3. Testing Strategy

  **Chosen:** Rely on existing test suite — no new tests needed

  **Rejected:**
  - Unit test asserting `proOptions.hideAttribution` is true — couples to React Flow internals, minimal value for a static boolean
  - Visual regression test checking attribution DOM element is absent — brittle, couples to library internals

  **Rationale:** The `features-canvas.test.tsx` already renders `FeaturesCanvas` with nodes and verifies correct mounting. The prop addition does not change behavior. This aligns with the spec's resolved Q2.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | `@xyflow/react` v12.10.0 | React Flow graph visualization | Already installed — use `proOptions` API | The `proOptions.hideAttribution` flag is a stable, documented API available in the installed version. No upgrade or new dependency needed. |

  ## Security Considerations

  No security implications. The change adds a single static boolean prop to suppress a UI watermark. No user data, authentication, authorization, or external communication is involved.

  ## Performance Implications

  No performance impact. The `proOptions` prop is evaluated once during component initialization to determine whether to render the attribution panel. Setting `hideAttribution: true` actually eliminates a small DOM element, resulting in a negligible (immeasurable) improvement.

  ## Architecture Notes

  ### Affected Files

  **Files requiring changes (2):**
  1. `src/presentation/web/components/features/features-canvas/features-canvas.tsx` (line 104) — Production component. Add `proOptions={{ hideAttribution: true }}` to the `<ReactFlow>` element.
  2. `src/presentation/web/components/features/features-canvas/dependency-edge.stories.tsx` (line 51) — Storybook story. Add `proOptions={{ hideAttribution: true }}` to the `<ReactFlow>` element.

  **Files already correct (6, no changes needed):**
  - `src/presentation/web/components/common/feature-node/feature-node.stories.tsx` (lines 37, 433)
  - `src/presentation/web/components/common/repository-node/repository-node.stories.tsx` (lines 29, 102, 135, 216)
  - `tests/unit/presentation/web/common/feature-node/feature-node.test.tsx` (line 83)
  - `tests/unit/presentation/web/common/repository-node/repository-node.test.tsx` (line 20)

  **Test files requiring no changes:**
  - `tests/unit/presentation/web/features/features-canvas/features-canvas.test.tsx` — Renders `<FeaturesCanvas>` (not `<ReactFlow>` directly), so the prop is applied inside the component.

  ### Layer Impact

  This change is confined entirely to the **presentation layer** (`src/presentation/web/`). No domain, application, or infrastructure layers are affected. No interfaces, types, or contracts change.
