content: |
  ## Problem Statement

  The existing feature dependency system (spec 041) allows setting a parent feature at creation
  time via `--parent <fid>` (CLI) or the parent selector in the create drawer (Web). However,
  once created, a feature's parent cannot be changed. Users need the ability to:

  1. **Reparent features interactively** — drag a feature node on the canvas to set or change its
     parent dependency, without recreating the feature.
  2. **Auto-rebase child branches** — when a parent feature completes its implementation cycle
     (reaches post-implementation lifecycle), automatically rebase all child feature branches
     so they incorporate the parent's changes.

  Currently, the canvas is read-only (`nodesDraggable=false`, `nodesConnectable=false`). The
  `CheckAndUnblockFeaturesUseCase` transitions blocked children to Started and spawns agents,
  but does not perform any git rebase. The `RebaseFeatureOnMainUseCase` rebases onto main but
  has no concept of parent feature branches.

  ## Success Criteria

  - [ ] User can drag from a source handle on one feature node to a target handle on another to set/change its parent dependency
  - [ ] Reparenting validates: same repository, no cycles, and lifecycle guards (cannot reparent Done/Archived features)
  - [ ] Reparenting updates the child's lifecycle state to Blocked if the new parent is pre-implementation
  - [ ] Reparenting is reflected immediately in the canvas layout via optimistic UI and persisted to the database
  - [ ] User can delete a dependency edge (click + Delete key or hover delete button) to detach a feature from its parent
  - [ ] When a parent feature reaches post-implementation lifecycle, all child feature branches are automatically rebased onto the parent branch
  - [ ] Auto-rebase runs asynchronously and does not block the parent's lifecycle transition
  - [ ] Auto-rebase uses the existing smart rebase infrastructure (stash, conflict resolution via ConflictResolutionService)
  - [ ] Auto-rebase failures are recorded in the child feature's activity timeline and surfaced in the UI
  - [ ] The canvas re-layouts correctly after reparenting (dagre recalculates positions for the affected subtree)
  - [ ] Feature tree table reflects reparenting changes in real-time
  - [ ] Reparenting a feature with children moves the entire subtree (children keep their direct parent relationship)
  - [ ] All new use cases have string token aliases registered in the DI container for web server action access
  - [ ] All new web components have colocated Storybook stories
  - [ ] TDD: failing tests written first for use cases, server actions, and graph derivation changes

  ## Functional Requirements

  ### Canvas Reparenting (FR-1 through FR-8)

  - **FR-1: Enable drag-to-connect on feature nodes.** Set `nodesConnectable={true}` on the React Flow canvas and `isConnectable={true}` on feature node target handles. Source handles on feature nodes must also be connectable. Only feature-to-feature connections are valid — connections to/from repo group nodes must be rejected.

  - **FR-2: Handle onConnect to trigger reparent.** When the user completes a drag-to-connect gesture, the `onConnect` callback receives a `Connection` object with `source` (new parent node ID) and `target` (child node ID). Validate the connection and call the `reparent-feature` server action. On validation failure, show a toast with the specific error (cycle detected, cross-repo, lifecycle blocked).

  - **FR-3: Optimistic UI for reparenting.** On successful local validation, immediately update `featureMap` in `useGraphState` to set the child's `parentNodeId` to the new parent. Use `beginMutation`/`endMutation` guards to prevent poll data from overwriting the optimistic state. The canvas should re-layout via the existing topology-key cache mechanism within the same animation frame.

  - **FR-4: Edge deletion for unparenting.** The DependencyEdge component must support deletion. On hover, render a delete button (X icon) on the edge. Support keyboard deletion (select edge + Delete/Backspace). When deleted, call the `reparent-feature` server action with `parentId: null` to clear the parent. Apply optimistic UI removal of the edge.

  - **FR-5: Validation — same repository.** Reject reparenting if the child and new parent belong to different repositories. Display error: "Features must be in the same repository to form a dependency."

  - **FR-6: Validation — cycle detection.** Walk the ancestor chain from the proposed new parent upward. If the child feature is found in the chain, reject with error: "Cannot create a dependency cycle." This reuses the cycle detection logic from CreateFeatureUseCase.

  - **FR-7: Validation — lifecycle guards.** Reject reparenting if the child feature is in Done or Archived lifecycle state. Display error: "Completed features cannot be reparented."

  - **FR-8: Lifecycle state adjustment on reparent.** When a feature is reparented under a new parent that is NOT in post-implementation lifecycle (Implementation, Review, Maintain), and the child is currently in a Started or later active state, transition the child to Blocked. When reparented under a parent that IS in post-implementation, the child's lifecycle state remains unchanged. When unparented (parent set to null), if the child was Blocked, transition it to Started.

  ### Auto-Rebase on Parent Completion (FR-9 through FR-14)

  - **FR-9: Trigger auto-rebase in CheckAndUnblockFeaturesUseCase.** When a parent feature enters post-implementation lifecycle and has Blocked children, after transitioning each child to Started, rebase the child's feature branch onto the parent's feature branch before spawning the child's agent.

  - **FR-10: Rebase onto parent branch.** Add a `rebaseOnBranch(cwd, featureBranch, targetBranch)` method to `IGitPrService` interface and implement it in the git PR service. This method fetches the target branch, then rebases the feature branch onto it. The implementation is similar to `rebaseOnMain` but targets an arbitrary branch instead of `origin/<defaultBranch>`.

  - **FR-11: Smart stash before rebase.** Before rebasing, stash any uncommitted changes in the child's working directory (worktree or repo root). Restore the stash after rebase completes, regardless of success or failure. Reuse the existing `stash()`/`stashPop()` methods.

  - **FR-12: Agent-powered conflict resolution.** When rebase encounters conflicts, delegate to the existing `ConflictResolutionService`. Create an agent run for the conflict resolution attempt. If resolution fails, abort the rebase and record the failure.

  - **FR-13: Activity timeline recording.** Create an agent run and phase timing record for each auto-rebase operation. Record success with a summary of rebased commits, or failure with the error details. The activity timeline in the web UI will display these records without additional UI work.

  - **FR-14: Failure isolation.** If auto-rebase fails for one child, it must not prevent other children from being unblocked and rebased. Each child's rebase is independent. Failures are recorded per-child.

  ### Server Action and Use Case (FR-15 through FR-17)

  - **FR-15: ReparentFeatureUseCase.** New use case in `packages/core/src/application/use-cases/features/` that accepts `{ featureId: string, parentId: string | null }`. Performs all validations (FR-5, FR-6, FR-7), updates the feature's `parentId` via `IFeatureRepository.update()`, adjusts lifecycle state (FR-8), and calls `CheckAndUnblockFeaturesUseCase` if the reparented feature is now a parent of Blocked children.

  - **FR-16: reparent-feature server action.** New server action at `src/presentation/web/app/actions/reparent-feature.ts` following the established pattern. Resolves `ReparentFeatureUseCase` via string token from DI container. Accepts `{ featureId: string, parentId: string | null }`. Returns `{ success: boolean, error?: string }`.

  - **FR-17: DI container registration.** Register `ReparentFeatureUseCase` as a class token and add a string token alias `'ReparentFeatureUseCase'` in the DI container for web server action resolution.

  ## Non-Functional Requirements

  - **NFR-1: Optimistic UI latency.** The canvas must reflect reparenting within 100ms of the user completing the drag gesture. Server persistence is eventual but must not cause visible flicker or layout jumps when the poll reconciles.

  - **NFR-2: Rebase timeout.** Auto-rebase operations must have a configurable timeout (default 5 minutes per child). If a rebase exceeds the timeout, abort and record the timeout as a failure.

  - **NFR-3: Concurrent rebase safety.** If a child feature already has an active agent run, skip the auto-rebase for that child and log a warning. Do not interrupt running agents with unexpected rebases.

  - **NFR-4: Connection validation feedback.** Invalid drag-to-connect attempts (cross-repo, cycle, lifecycle) must show a toast notification within 200ms of the drop. The toast must contain a specific, actionable error message — not a generic "operation failed."

  - **NFR-5: Backward compatibility.** Features created without a parent (the majority) must be unaffected. The canvas must function identically when no dependency edges exist. No database migration required — `parent_id` column and UPDATE clause already exist.

  - **NFR-6: Accessibility.** Edge deletion must be keyboard-accessible (select edge via Tab, delete via Delete/Backspace). The drag-to-connect gesture must have an alternative interaction path for keyboard-only users (future consideration — document as known limitation if not implemented in this iteration).

  - **NFR-7: Test coverage.** Unit tests for ReparentFeatureUseCase covering: successful reparent, cycle detection, cross-repo rejection, lifecycle guard, unparent, and lifecycle state adjustment. Integration tests for the auto-rebase flow in CheckAndUnblockFeaturesUseCase. Unit tests for deriveGraph edge changes after reparent.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | How should the user initiate reparenting? | Drag-to-connect via handles | Native React Flow idiom; handles already rendered; familiar UX from node-based editors |
  | 2 | How should the user unparent a feature? | Delete the dependency edge | Consistent graph-editing interaction; edge hover delete button + keyboard shortcut |
  | 3 | When should auto-rebase trigger? | When parent enters post-implementation lifecycle | Aligns with existing CheckAndUnblock gate; parent code is stable at this point |
  | 4 | Should auto-rebase be sync or async? | Asynchronous background | Parent transition should not block on child git operations |
  | 5 | How to handle rebase conflicts? | Use existing ConflictResolutionService | Already battle-tested in RebaseFeatureOnMainUseCase; agent-powered resolution |
  | 6 | Allow reparenting features with children? | Yes, move entire subtree | Parent-child relationships are direct, not transitive; dagre handles re-layout |
  | 7 | Trigger immediate rebase on reparent? | No, wait for parent post-implementation | Reparenting is dependency reorganization, not a git operation |
  | 8 | What lifecycle guards for reparenting? | Block only Done/Archived features | Balance between flexibility and safety; child lifecycle adjusts to new parent |

