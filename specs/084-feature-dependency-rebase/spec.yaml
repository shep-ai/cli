  | `src/presentation/web/hooks/use-graph-state.ts` | High | New `reparentFeature()` mutation to update `parentNodeId` in featureMap optimistically. |
  | `src/presentation/web/components/features/features-canvas/dependency-edge.tsx` | Medium | Add hover delete button and selection support for edge deletion. |
  | `src/presentation/web/app/actions/` | Medium | New `reparent-feature.ts` server action calling `ReparentFeatureUseCase`. |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Register `ReparentFeatureUseCase` class token + string alias for web server actions. |
