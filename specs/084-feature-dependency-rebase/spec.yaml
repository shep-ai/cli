  | `src/presentation/web/components/features/feature-tree-table/` | Low | No changes expected — already reads parentId from data and will reflect reparenting via data refresh. |
  | `packages/core/src/infrastructure/repositories/sqlite-feature.repository.ts` | Low | No changes needed — parent_id is already in the UPDATE SET clause. |
  | `tsp/` | Low | No TypeSpec changes expected — parentId field already exists on Feature entity. |

  ## Dependencies

  ### Existing Code Dependencies
  - **Spec 041 (Feature Dependencies)** — Foundation: parentId field, Blocked lifecycle, gate logic,
    CheckAndUnblockFeaturesUseCase, dependency edges in canvas. This spec 084 extends spec 041.
  - **Spec 080 (Smart Rebase)** — RebaseFeatureOnMainUseCase with stash/conflict resolution.
    Auto-rebase will reuse this infrastructure.
  - **React Flow onConnect** — The canvas already accepts `onConnect` prop; enabling connections
    requires setting `nodesConnectable={true}` and implementing the handler.
  - **dagre layout** — Topology changes from reparenting trigger automatic re-layout via the
    existing topology-key cache mechanism.

  ### Library Dependencies
  - No new library dependencies expected. All needed functionality exists in `@xyflow/react`,
    `better-sqlite3`, and `node:child_process`.

  ## Size Estimate

  **L** — This feature spans all four architecture layers (domain, application, infrastructure,
  presentation) and requires two distinct capabilities: (1) interactive canvas reparenting with
  optimistic UI, validation, and cycle detection, and (2) automatic git rebase orchestration
  triggered by lifecycle transitions. The rebase orchestration requires careful handling of
  worktrees, stash, conflict resolution, and failure reporting. The canvas interaction requires
  enabling React Flow connections, handling edge creation/deletion, and maintaining optimistic
  state.

