summary: >
  Extends the existing feature dependency system (spec 041) with two capabilities:
  (1) interactive drag-and-drop on the React Flow canvas to reparent features —
  moving a feature under another feature as a dependency, and (2) automatic git
  rebase of child feature branches onto the parent feature branch when the parent
  completes its implementation cycle (reaches post-implementation lifecycle).
