name: "feature-dependency-rebase"
summary: >
  Comprehensive technical analysis for interactive feature reparenting via React Flow
  drag-to-connect and automatic child branch rebase on parent completion. All infrastructure
  exists — no new libraries needed. Key decisions: extend existing onConnect no-op handler
  in use-control-center-state.ts, add reparentFeature mutation to useGraphState, add
  rebaseOnBranch to IGitPrService, and inject rebase orchestration into
  CheckAndUnblockFeaturesUseCase between lifecycle transition and agent spawn.

