content: |
  ## Summary

  14 tasks across 4 phases implement the complete feature-dependency-rebase capability.

  **Phase 1 (tasks 1-3)** establishes the backend contract: ReparentFeatureUseCase with all
  business validations (cycle detection, same-repo, lifecycle guards, state adjustment),
  the server action, and DI registration. This is the foundation everything else depends on.

  **Phase 2 (tasks 4-5)** adds the git infrastructure: rebaseOnBranch method on IGitPrService
  and its implementation in GitPrService. Small, focused change following the existing
  rebaseOnMain pattern.

  **Phase 3 (tasks 6-7)** wires auto-rebase into CheckAndUnblockFeaturesUseCase. This is
  the most complex phase — injecting rebase orchestration with stash, conflict resolution,
  timeout, and failure isolation between the existing lifecycle transition and agent spawn.
  All patterns are proven in RebaseFeatureOnMainUseCase.

  **Phase 4 (tasks 8-14)** implements the canvas interaction layer: optimistic mutations in
  useGraphState, handleConnect/handleEdgesDelete in control-center state, canvas prop updates,
  enhanced DependencyEdge with delete button, feature node handle updates, and integration
  tests. Task 13 (handle updates) has no dependencies and can start in parallel with phase 1.

  Every code task follows TDD (RED-GREEN-REFACTOR). Tests are written first to define
  expected behavior, then minimal implementation to pass, then cleanup. The task order
  ensures dependencies are satisfied — inner architecture layers before outer, contracts
  before consumers.
