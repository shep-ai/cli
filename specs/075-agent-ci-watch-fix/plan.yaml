# Markdown content (the full plan document)
content: |
  ## Status

  - **Phase:** Planning
  - **Updated:** 2026-03-23

  ## Architecture Overview

  ```
  Merge Node
  └─ CI Watch/Fix Loop (ci-watch-fix-loop.ts)
     ├─ BEFORE: getCiStatus() + watchCi() [hardcoded, single run]
     │   └─ gh run watch <id> --exit-status [buggy]
     │
     └─ AFTER: Agent Call [follows CI/CD rules]
         ├─ buildCiWatchPrompt() → agent watches ALL runs
         ├─ parseCiWatchResult() → structured pass/fail
         ├─ recordPhaseStart/End('merge:ci-watch') → timeline
         └─ If failed:
             ├─ getFailureLogs() → context for fix agent
             ├─ buildCiWatchFixPrompt() → agent fixes + pushes
             ├─ recordPhaseStart/End('merge:ci-fix') → timeline
             └─ Loop back to watch
  ```

  ## Implementation Strategy

  **Phase 1 (parallel):** Add the new prompt builder and output parser.
  These are independent units that can be built and tested in isolation.

  **Phase 2 (sequential):** Refactor the CI watch/fix loop to use agent calls
  instead of hardcoded watchCi. Add phase timing records for each sub-phase.

  **Phase 3:** Run all tests and verify the integration works end-to-end.

  ## Files to Modify

  | File | Change |
  | ---- | ------ |
  | merge-output-parser.ts | Add parseCiWatchResult function |
  | merge-prompts.ts | Add buildCiWatchPrompt function |
  | ci-watch-fix-loop.ts | Replace watchCi calls with agent calls + phase timing |
  | merge.node.ci-watch.test.ts | Update tests for new agent-based flow |

  ## Testing Strategy (TDD: Tests FIRST)

  Each task defines explicit RED-GREEN-REFACTOR cycles. Tests are written before
  implementation in every case.

  - Unit tests for parseCiWatchResult (regex parsing edge cases)
  - Unit tests for buildCiWatchPrompt (prompt content verification)
  - Unit tests for refactored CI loop (mock agent executor)
  - Verify phase timing records are created for sub-phases

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Agent may not follow CI rules perfectly | Prompt is explicit with exact commands to run |
  | Agent output parsing may miss edge cases | Fallback: treat unparseable output as failure |
  | Token cost increase from agent CI watching | gh run watch handles polling; agent overhead is ~2K tokens |
  | Breaking existing merge flow | Existing merge tests still pass; watchCi not removed from interface |
