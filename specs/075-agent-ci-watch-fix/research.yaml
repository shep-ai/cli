# Structured technology decisions
decisions:
  - title: Agent-based vs programmatic CI watching
    chosen: Agent-based CI watching with structured output parsing
    rejected:
      - Enhanced programmatic polling (fix watchCi to check all runs)
      - Hybrid approach (programmatic poll + agent verification)
    rationale: >
      Agent-based watching is more robust because the agent can follow CI/CD rules naturally,
      handle edge cases (rate limits, unexpected states), and adapt to different CI providers.
      The hardcoded approach has proven brittle with gh run watch --exit-status bugs. Token cost
      is acceptable since gh run watch handles the actual waiting internally — the agent just
      orchestrates the commands.

  - title: CI status reporting format
    chosen: Structured markers in agent output (CI_STATUS PASSED/FAILED)
    rejected:
      - JSON structured output
      - Exit code based detection
    rationale: >
      Matches existing pattern used by parseCommitHash and parsePrUrl — simple regex parsing
      of agent text output. JSON would require teaching agents a specific output format.
      Exit-code detection is unreliable since agent process exit codes don't map to CI status.

  - title: Phase timing granularity for CI sub-phases
    chosen: Separate phase timing records per CI watch and fix attempt
    rejected:
      - Single merged phase timing for entire CI loop
      - No phase timing (status quo)
    rationale: >
      Separate records per watch/fix give visibility into each attempt in the Activity Timeline.
      The phase-timing-context already supports iteration suffixes (:2, :3) automatically.
      Using merge:ci-watch and merge:ci-fix as phase names integrates naturally.

