content: |
  ## Summary

  The implementation is broken into 11 tasks across 4 phases, totaling approximately 4.5 hours.

  Phase 1 handles the foundation: a 1-line sidebar bug fix and the new resume-feature server
  action. These two tasks have no dependencies on each other and establish the prerequisites
  for all UI work.

  Phase 2 builds the canvas retry experience: adding the onRetry callback type, rendering
  the clickable retry badge on error-state nodes, and wiring the callback through
  FeaturesCanvas's enrichedNodes pattern.

  Phase 3 completes the full integration: the control-center-state handler that calls the
  server action, the wiring through control-center-inner, the retry button in the dashboard's
  feature-drawer-client, and the retry prop on the simpler feature-drawer for parity.

  Phase 4 adds Storybook stories for both the feature node and feature drawer retry states,
  satisfying the mandatory Storybook coverage rule.

  Tasks within each phase are ordered by dependency — type changes come before component
  changes, server action comes before handler wiring, and all component changes come before
  stories. Tasks 1 and 2 in Phase 1 are independent and could be implemented in parallel.
  Tasks 3 and 5 in Phase 2 are also parallelizable (type change + canvas wiring).
