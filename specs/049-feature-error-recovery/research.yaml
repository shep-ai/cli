name: feature-error-recovery
summary: >
  Technical research for adding error recovery UI and fixing sidebar status mapping for failed
  features. The implementation requires a 1-line sidebar bug fix, a new resume-feature server
  action following established patterns, retry UI in both the feature drawer and canvas node
  leveraging existing callback wiring and badge patterns, plus Storybook stories and unit tests.
  All backend infrastructure (ResumeFeatureUseCase, DI registration) already exists — this is
  purely a presentation-layer feature.

