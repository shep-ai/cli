content: |
  ## Architecture Overview

  This feature operates entirely in the presentation layer (`src/presentation/web/`). The
  backend `ResumeFeatureUseCase` is already fully implemented and registered in the DI container
  — no domain or application layer changes are needed.

  The implementation touches four areas of the web UI:

  1. **Sidebar context** — A 1-line bug fix in `stateMapping` to correctly route error features
     to the "Action Needed" bucket instead of "In Progress."

  2. **Server action** — A new `resume-feature.ts` server action following the exact pattern
     of `delete-feature.ts`: `'use server'` directive, `resolve()` from `server-container.ts`,
     input validation, try/catch, structured return type.

  3. **Canvas node** — Adding an `onRetry` callback to `FeatureNodeData`, rendering a clickable
     retry badge on error-state nodes (following the `action-required` badge pattern), and
     wiring the callback through `FeaturesCanvas.enrichedNodes`.

  4. **Feature drawer** — Adding a retry button to `feature-drawer-client.tsx` (the real
     dashboard drawer used via the parallel route) when the feature is in error state. The
     simpler `feature-drawer.tsx` also gets a retry button for Storybook/reuse parity.

  ### Callback Chain

  ```
  control-center-inner.tsx
    └── handleResumeFeature (calls resumeFeature server action)
        ├── FeaturesCanvas (onFeatureRetry prop)
        │   └── enrichedNodes (wires onRetry per node)
        │       └── FeatureNode (data.onRetry → retry badge click)
        └── feature-drawer-client.tsx (calls resumeFeature directly)
  ```

  The canvas path flows: `control-center-inner → FeaturesCanvas → FeatureNode`.
  The drawer path calls the server action directly (same as delete/approve/reject).

  ## Key Design Decisions

  ### 1. Map error → action-needed (not a 4th sidebar status)

  Both error and action-required states require user intervention. The sidebar is a summary
  view with 3 buckets; the canvas already provides red error-specific styling for detailed
  differentiation. A 4th status would require new types, config, icons, and tests for
  minimal user benefit.

  ### 2. Resume only (no restart-from-scratch)

  Matches CLI `shep feat resume` behavior exactly. Reuses `ResumeFeatureUseCase` as-is.
  Restart is achievable via delete + re-create. Keeps scope to M-size.

  ### 3. Inline retry badge on canvas node

  Follows the existing `action-required` badge pattern. Error recovery is the primary
  action for a failed node — it should be immediately accessible without opening the drawer.

  ### 4. SSE-driven state transition (not manual optimistic update)

  After the server action succeeds, the SSE stream naturally delivers `AgentStarted` within
  1-2 seconds, transitioning the node to `running`. The button shows a spinner immediately
  for responsiveness, then SSE handles the visual state transition. This avoids manually
  manipulating context/node state and leverages the existing SSE infrastructure.

  ### 5. Two drawer files need changes

  The codebase has two drawer implementations:
  - `feature-drawer.tsx` — simpler, used in Storybook and for potential reuse
  - `feature-drawer-client.tsx` — the real dashboard drawer (rendered via the parallel
    route at `@drawer/feature/[featureId]/page.tsx`)

  Both need the retry button. The client version calls the server action directly (like
  delete/approve/reject). The simpler version receives an `onRetry` callback prop.

  ### 6. Server action resolution via string token

  Following the established pattern in `delete-feature.ts` (`resolve<DeleteFeatureUseCase>('DeleteFeatureUseCase')`),
  the resume action will use `resolve<ResumeFeatureUseCase>('ResumeFeatureUseCase')`. If the
  class is registered without a string token, we fall back to the class token — verified
  during implementation.

  ## Implementation Strategy

  Work proceeds in dependency order across 4 phases:

  **Phase 1** lays the foundation — the sidebar fix is a standalone 1-line change, and the
  server action is a prerequisite for all retry UI. Both are small and independently testable.

  **Phase 2** builds the canvas retry affordance — adding `onRetry` to `FeatureNodeData`,
  rendering the badge, and wiring through `FeaturesCanvas`. This can be tested with unit
  tests for the component and manual Storybook verification.

  **Phase 3** completes the full flow — the drawer retry button, the handler in
  `use-control-center-state`, and the wiring in `control-center-inner`. This connects
  all pieces end-to-end.

  **Phase 4** adds Storybook stories for visual regression coverage, satisfying the
  mandatory Storybook rule.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | DI token mismatch for ResumeFeatureUseCase | Verify registration in container setup; test resolves in unit test mock |
  | Double-click creates multiple agent runs | Disable button on click + isPending state; use case validates run status |
  | SSE doesn't update node after resume | Button spinner provides immediate feedback; SSE is a bonus, not a requirement |
  | Existing sidebar tests break after mapping change | Update the test expectation for error mapping in the same task |
  | feature-drawer-client.tsx is complex (670+ lines) | Keep changes minimal — add retry state + handler + conditional button render |
