summary: >
  The feature drawer currently shows all information in a single scrollable view.
  This feature adds a tabbed layout to organize content into four logical sections
  (Overview, Activity, Messages, Plan), matching the rich data available via
  `shep feat show <id>` in the CLI. The shadcn/ui Tabs component and an existing
  tabbed pattern (TechReviewTabs) are already in the codebase. The Overview tab
  preserves existing drawer content, while Activity, Messages, and Plan tabs
  surface data that was previously only available via the CLI.
