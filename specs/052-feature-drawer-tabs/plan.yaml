name: feature-drawer-tabs
summary: >
  Implementation plan for adding a tabbed layout to the feature drawer with
  Overview, Activity, Messages, and Plan tabs. The approach replaces the current
  single-body feature view in FeatureDrawerClient with a FeatureDrawerTabs
  component that uses shadcn/ui Tabs primitives and follows the TechReviewTabs
  flex-column layout pattern. Three new server actions fetch tab-specific data
  lazily (phase timings, messages, plan) via DI-resolved repositories. A custom
  useTabDataFetch hook manages per-tab caching, lazy triggering, and feature-change
  reset. The Activity tab adapts the CLI phase timing visualization to web using
  Tailwind CSS proportional-width bars. All components have colocated Storybook
  stories. Implementation is split into 5 phases: server actions, custom hook,
  tab content components, container integration, and stories/validation.

relatedFeatures: []

technologies:
  - React 19 (Next.js 16 App Router)
  - shadcn/ui Tabs (Radix UI primitives)
  - Tailwind CSS v4
  - Storybook 8
  - TypeSpec domain models
  - Next.js Server Actions
  - SSE (Server-Sent Events)
  - tsyringe (DI container)

relatedLinks:
  - https://github.com/shep-ai/cli/issues/230

phases:
  - id: phase-1
    name: 'Server Actions & Data Layer'
    description: >
      Create three new server actions (getFeaturePhaseTimings, getFeatureMessages,
      getFeaturePlan) that fetch tab-specific data via DI-resolved repositories.
      Each action follows the established pattern: resolve repository from container,
      query data, convert bigint fields to number, return typed result with error
      handling. Storybook mock stubs are created alongside to prevent build failures.
      This phase comes first because all tab content components depend on these
      data-fetching functions.
    parallel: false

  - id: phase-2
    name: 'Custom Hook — useTabDataFetch'
    description: >
      Build the useTabDataFetch custom hook that provides lazy loading, per-tab
      caching, feature-change reset, and SSE-triggered re-fetch semantics. Uses
      ref-based callbacks (matching useArtifactFetch pattern) to avoid stale
      closures. This hook is the shared data management layer that all tab content
      components consume, so it must be built before the tab components.
    parallel: false

  - id: phase-3
    name: 'Tab Content Components'
    description: >
      Build the four tab content components: OverviewTab (extracted from existing
      feature view body), ActivityTab (phase timing visualization with duration bars
      and multi-run grouping), MessagesTab (chronological message list with role
      distinction), and PlanTab (plan state badge and task list with status indicators).
      Each component is self-contained with loading, empty, and error states.
      Components can be built in parallel since they share no dependencies beyond
      the hook from Phase 2.
    parallel: true

  - id: phase-4
    name: 'Container Integration'
    description: >
      Build the FeatureDrawerTabs container component that wires together the
      shadcn/ui Tabs primitives, the useTabDataFetch hook, and the four tab content
      components. Integrate into FeatureDrawerClient by replacing the feature view
      body (lines 544-578). Wire up controlled tab state with feature-change reset
      and SSE-driven refresh. This phase depends on all tab content components
      being complete.
    parallel: false

  - id: phase-5
    name: 'Storybook Stories & Validation'
    description: >
      Create comprehensive Storybook stories for all new components covering
      populated, empty, loading, and error states. Run full validation suite
      (build, test, lint, typecheck) to ensure production readiness. This phase
      is last because stories need finalized component APIs to test against.
    parallel: false

