  ### Phase Timing Visualization Logic (Adapted from CLI)

  The CLI show command (lines 130-404) provides the reference implementation:

  1. **Group by agentRunId** — `groupTimingsByRun()` groups timings into runs
  2. **Filter lifecycle events** — `isLifecycleEvent()` checks for `run:*` prefixed phases
  3. **Compute max duration** — used for proportional bar width scaling
  4. **Render per-timing:**
     - Completed: green bar proportional to duration, shows `Xs`
     - Running: blue bar with elapsed time, shows `Xs (running)`
     - Crashed: red bar with frozen time, shows `Xs (crashed)`
     - Waiting: yellow text "awaiting review"
  5. **Approval wait sub-row:** amber bar under gated phases showing wait duration
  6. **Rejection feedback:** displayed after approval wait rows
  7. **Summary totals:** total execution, total wait, total wall-clock time

  The web version adapts this to Tailwind CSS with percentage widths instead of
  character counts, and semantic color classes instead of terminal color functions.

