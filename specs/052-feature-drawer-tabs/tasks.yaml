name: feature-drawer-tabs
summary: >
  20 tasks across 5 phases implementing a tabbed layout for the feature drawer.
  Phase 1 creates three server actions and Storybook mocks for data fetching.
  Phase 2 builds the useTabDataFetch custom hook for lazy loading and caching.
  Phase 3 builds four tab content components (Overview, Activity, Messages, Plan).
  Phase 4 integrates the container component into FeatureDrawerClient.
  Phase 5 creates Storybook stories and runs full validation.
  Total estimated effort: 18 hours.

relatedFeatures: []

technologies:
  - React 19 (Next.js 16 App Router)
  - shadcn/ui Tabs (Radix UI primitives)
  - Tailwind CSS v4
  - Storybook 8
  - Next.js Server Actions
  - tsyringe (DI container)
  - Vitest + React Testing Library

relatedLinks:
  - https://github.com/shep-ai/shep/issues/230

