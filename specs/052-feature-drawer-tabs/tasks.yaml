      red:
        - 'Write test in tests/unit/presentation/web/app/actions/get-feature-phase-timings.test.ts'
        - 'Mock the DI container resolve function to return a mock IPhaseTimingRepository'
        - 'Test that calling getFeaturePhaseTimings("feat-1") returns { timings: [...] } with bigint fields converted to number'
        - 'Test that calling getFeaturePhaseTimings("") returns { error: string }'
        - 'Test that findByFeatureId is called with the correct featureId'
        - 'Run pnpm test:unit -- get-feature-phase-timings — tests should fail (action does not exist yet)'
      green:
        - 'Create src/presentation/web/app/actions/get-feature-phase-timings.ts'
        - 'Add "use server" directive, import resolve from @/lib/server-container'
        - 'Import IPhaseTimingRepository type from @shepai/core'
        - 'Define PhaseTimingData interface and GetPhaseTimingsResult type'
        - 'Implement the action: validate featureId, resolve repo, call findByFeatureId, convert bigint to number, return result'
        - 'Run tests — should pass'
