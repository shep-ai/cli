      Create a new server action that fetches phase timings for a feature by resolving
      IPhaseTimingRepository from the DI container and calling findByFeatureId(). The
      action converts bigint fields (durationMs, approvalWaitMs) to number for RSC
      serialization safety. Returns typed result with error handling following the
      existing getFeatureArtifact/getMergeReviewData patterns.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - Server action file exists at src/presentation/web/app/actions/get-feature-phase-timings.ts
      - Action is marked with 'use server' directive
      - Action resolves IPhaseTimingRepository from DI container via resolve<T>('IPhaseTimingRepository')
      - Action calls findByFeatureId(featureId) on the repository
      - Action converts bigint fields (durationMs, approvalWaitMs) to number via Number()
      - 'Action returns { timings: PhaseTimingData[] } on success'
      - 'Action returns { error: string } on failure with try/catch'
      - Action validates featureId is non-empty before querying
      - PhaseTimingData interface includes agentRunId, phase, startedAt, completedAt, durationMs, waitingApprovalAt, approvalWaitMs
