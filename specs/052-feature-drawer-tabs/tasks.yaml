  # ============================================================================
  # PHASE 2: CUSTOM HOOK — useTabDataFetch
  # ============================================================================

  - id: task-5
    phaseId: phase-2
    title: 'Create useTabDataFetch hook with lazy loading and caching'
    description: >
      Build a custom React hook that manages lazy data fetching for tabs. The hook
      accepts a map of tab keys to fetcher functions, and provides: (1) explicit
      fetch triggering when a tab is activated, (2) per-tab cached data so revisiting
      a loaded tab is instant, (3) per-tab loading and error states, (4) full cache
      clear when featureId changes, (5) re-fetch of active tab when triggered by
      external events (SSE). Uses ref-based callbacks following useArtifactFetch pattern.
    state: Todo
    dependencies:
      - task-1
      - task-2
      - task-3
    acceptanceCriteria:
      - Hook file exists at src/presentation/web/components/common/feature-drawer-tabs/use-tab-data-fetch.ts
      - Hook accepts featureId and a configuration for each tab (fetcher function)
      - Hook returns per-tab state (data, loading, error) and a fetchTab function
      - Calling fetchTab("activity") triggers the activity fetcher only on first call
      - Subsequent fetchTab("activity") calls return cached data without re-fetching
      - When featureId changes, all cached data is cleared and active tab resets
      - Hook provides a refreshActiveTab function for SSE-triggered re-fetch
      - Uses useRef for fetcher callbacks to avoid stale closures
      - TypeScript types are clean and generic where appropriate
    tdd:
      red:
        - 'Write tests in tests/unit/presentation/web/components/common/feature-drawer-tabs/use-tab-data-fetch.test.ts'
        - 'Test: calling fetchTab("activity") invokes the activity fetcher'
        - 'Test: calling fetchTab("activity") a second time does NOT invoke the fetcher again (cache hit)'
        - 'Test: after featureId changes, cached data is cleared'
        - 'Test: loading state is true while fetcher is in progress, false after completion'
        - 'Test: error state is populated when fetcher throws'
        - 'Test: refreshActiveTab re-invokes the fetcher for the currently active tab'
        - 'Run tests — should fail (hook does not exist yet)'
      green:
        - 'Create use-tab-data-fetch.ts with the hook implementation'
        - 'Use useState for per-tab data, loading, and error maps'
        - 'Use useRef for fetcher callbacks (avoids stale closures)'
        - 'Use useEffect to clear cache when featureId changes'
        - 'Implement fetchTab to check cache before invoking fetcher'
        - 'Implement refreshActiveTab to bypass cache for active tab'
        - 'Run tests — should pass'
      refactor:
        - 'Extract types to improve readability'
        - 'Ensure the hook handles unmount/cancellation to prevent state updates on unmounted components'
        - 'Verify ref-based callback pattern matches useArtifactFetch conventions'
    estimatedEffort: '2h'

