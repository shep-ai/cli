content: |
  ## Summary

  This task breakdown implements the feature drawer tabs through five dependency-ordered
  phases totaling 20 tasks.

  The work begins with the **data layer** (Phase 1): three server actions fetch phase
  timings, messages, and plan data from the DI-resolved repositories, with Storybook
  mock stubs created alongside to prevent build failures. These actions follow the
  established codebase patterns (getFeatureArtifact, getMergeReviewData) with consistent
  error handling and bigint-to-number conversion at the serialization boundary.

  Next, the **useTabDataFetch hook** (Phase 2) provides the shared lazy-loading and
  caching mechanism. It manages per-tab state (data, loading, error), explicit fetch
  triggering on tab activation, cache invalidation on feature change, and SSE-triggered
  refresh. The hook uses ref-based callbacks matching the useArtifactFetch pattern.

  **Tab content components** (Phase 3) are built in parallel: OverviewTab extracts the
  current feature view body, ActivityTab adapts the CLI phase timing visualization to
  web with proportional-width bars and multi-run grouping, MessagesTab renders a
  chronological message list with role distinction, and PlanTab shows plan state and
  task list with status indicators. Each handles loading, empty, and error states.

  The **container integration** (Phase 4) wires everything together: FeatureDrawerTabs
  uses shadcn/ui Tabs with controlled state, the custom hook for data management, and
  the four tab components for rendering. It integrates into FeatureDrawerClient by
  replacing the feature view body block. SSE refresh is handled by watching nodeData
  prop changes.

  Finally, **Storybook stories and validation** (Phase 5) ensure production readiness
  with comprehensive stories for all components (populated, empty, loading, error states)
  and a full test/build/lint verification pass.

  Every code task follows TDD (RED-GREEN-REFACTOR) as mandated by CLAUDE.md. The most
  complex task is ActivityTab (3h estimate) due to multi-run grouping, proportional
  duration bars, and approval wait visualization. Total effort: 18 hours.
