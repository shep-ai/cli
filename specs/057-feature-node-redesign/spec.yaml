content: |
  ## Problem Statement

  The current FeatureNode component (288x140px+ card) displays feature metadata on the React
  Flow canvas with a fixed layout: lifecycle label top-left, agent icon top-right, bold name,
  truncated description, and a bottom section that varies significantly by state — 4 different
  conditional layouts for creating (spinner), running (agent icon + verb), progress bar, and
  state badge. This inconsistency makes the cards visually unpredictable and the component
  code unnecessarily complex (362 lines with deeply nested conditional rendering).

  The designer has proposed updated mockups that unify the bottom section into a consistent
  status row across all states, refine text spacing, and maintain the current information
  hierarchy with the feature name as the primary focal point. This redesign simplifies both
  the visual design and the component implementation.

  ## Success Criteria

  - [ ] SC-1: Feature node renders the unified bottom status row with state icon + status text for all 6 states
  - [ ] SC-2: All 6 lifecycle phases display correct labels and running verbs
  - [ ] SC-3: All agent type icons render at correct size (h-3.5 w-3.5 in top-right badge)
  - [ ] SC-4: Fast mode indicator (Zap icon) remains visible and functional in top-right area
  - [ ] SC-5: Deployment status indicator (booting/ready) renders correctly with the new layout
  - [ ] SC-6: Delete button hover behavior preserved (left side, visible on group hover)
  - [ ] SC-7: Action (+) button hover behavior preserved (right side, visible on group hover)
  - [ ] SC-8: Text truncation works correctly for names up to 80 characters and descriptions up to 200 characters
  - [ ] SC-9: Selection ring (ring-2 ring-primary) renders correctly on the new card layout
  - [ ] SC-10: React Flow handles (source/target) positioned correctly for edge connections
  - [ ] SC-11: Storybook stories updated with all 18+ existing scenarios reflecting the new layout
  - [ ] SC-12: Indeterminate progress bar appears only for creating and running states
  - [ ] SC-13: Node card maintains 288px width (w-72) and minimum 140px height (min-h-35)
  - [ ] SC-14: Build compiles without errors (`pnpm build`)
  - [ ] SC-15: All existing tests pass (`pnpm test`)
  - [ ] SC-16: Lint passes clean (`pnpm lint`)
  - [ ] SC-17: Component bottom section uses a single unified template (no 4-way conditional)

  ## Functional Requirements

  - **FR-1: Unified bottom status row**: Replace the current 4-way conditional bottom section
    (creating spinner / running verb / progress bar / state badge) with a single unified
    layout: a row containing a state-appropriate icon + status text, with an optional
    indeterminate progress bar below for active states.

  - **FR-2: State-specific status icon**: The status row icon varies by state:
    - `creating`: Loader2 icon (spinning)
    - `running`: Agent type icon (from `getAgentTypeIcon`)
    - `action-required`: State-specific icon (FileText for requirements, Wrench for implementation, GitMerge for review, CircleAlert default)
    - `done`: CircleCheck icon
    - `blocked`: Ban icon
    - `error`: CircleX icon

  - **FR-3: State-specific status text**: The status row text varies by state:
    - `creating`: "Creating..."
    - `running`: Lifecycle running verb (e.g. "Researching", "Implementing")
    - `action-required`: Context-specific text (e.g. "Review Product Requirements", "Review Technical Planning", "Review Merge Request")
    - `done`: "Completed in {runtime}" or "Completed"
    - `blocked`: "Waiting on {blockedBy}" or "Blocked"
    - `error`: Error message or "Something went wrong"

  - **FR-4: Progress bar for active states**: Show an indeterminate progress bar below
    the status row only for `creating` and `running` states. Hide the progress bar for
    all other states (done, blocked, error, action-required).

  - **FR-5: Feature ID display**: Display the feature ID (e.g. "#f1") in the bottom area
    for non-active states (done, blocked, error, action-required), positioned above the
    status row as a subtle metadata line.

  - **FR-6: Preserved top row layout**: The top row continues to show the lifecycle label
    (left) and agent badge with optional fast mode Zap icon (right). No changes to this
    section beyond minor spacing refinements if needed.

  - **FR-7: Preserved text section**: Feature name (bold, truncated, text-sm) and optional
    description (muted, truncated, text-xs) remain in the same position below the top row.
    Spacing may be refined (mt-1, mt-0.5).

  - **FR-8: Preserved deployment indicator**: The deployment status pill (booting/ready)
    continues to render between the description and the bottom section when present.

  - **FR-9: Preserved interactive elements**: Delete button (hover left), action button
    (hover right/source handle), settings button (agent badge click), and confirmation
    dialog all remain functional with no behavioral changes.

  - **FR-10: Preserved handle positioning**: React Flow `<Handle>` components (source/target)
    remain at Position.Left and Position.Right with identical styling.

  - **FR-11: Updated Storybook stories**: All existing 18+ stories must be updated to
    visually verify the new layout. No new stories required unless the layout introduces
    genuinely new visual states not covered by existing stories.

  - **FR-12: State-dependent border color**: The left border color continues to indicate
    state via the existing `borderClass` from state config (currently not applied in the
    component — if the mockup shows left border coloring, add `border-l-4` with the
    state-specific color class from config).

  ## Non-Functional Requirements

  - **NFR-1: Component complexity reduction**: The refactored bottom section should have
    fewer conditional branches than the current 4-way conditional. Target: 1 unified
    template with variable icon/text, not 4 separate JSX blocks.

  - **NFR-2: Rendering performance**: The component must render without layout shifts or
    visual jank when state transitions occur (e.g. creating → running → done). The
    unified bottom row ensures consistent card height across state changes.

  - **NFR-3: Accessibility**: All interactive elements (agent badge button, delete button,
    action button) must retain `aria-label` attributes. Status text must be readable by
    screen readers (no icon-only status indicators).

  - **NFR-4: Dark mode compatibility**: All colors must use Tailwind's semantic color
    classes (text-muted-foreground, bg-card, border) or state-specific classes that work
    with the existing dark mode configuration. No hardcoded hex/rgb values.

  - **NFR-5: Animation continuity**: The Loader2 spin animation (creating state) and
    indeterminate progress bar animation must remain smooth. No new animations required.

  - **NFR-6: Storybook visual coverage**: Every state × lifecycle combination that
    appears in the existing stories must be visually verifiable in Storybook after
    the redesign. No reduction in story coverage.

  - **NFR-7: Zero domain layer impact**: No changes to FeatureNodeData interface,
    state derivation logic, domain types, or any file outside the presentation layer.
    The redesign is purely visual.

  - **NFR-8: Code maintainability**: The refactored component should be shorter than
    or equal to the current 362 lines. The unified bottom section should reduce total
    line count, not increase it.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | How many layout variants to implement? | Single refined variant | Mockups show design exploration; one layout is most maintainable |
  | 2 | Large centered agent icon or small badge? | Keep small top-right badge | Feature name should be primary focal point, not agent type |
  | 3 | Change node width from 288px? | Keep 288px (w-72) | No design benefit; changing width cascades into canvas layout |
  | 4 | Replace all bottom sections or just some? | Replace all with unified status row | Simplifies component; state differentiation via border/label/icon |
  | 5 | Progress bar visibility behavior? | Active states only (creating, running) | Clear visual distinction between working and idle nodes |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/web/components/common/feature-node/feature-node.tsx` | High | Main component — bottom section JSX restructuring, reduced conditionals |
  | `src/presentation/web/components/common/feature-node/feature-node-state-config.ts` | Medium | May need adjusted classes or new fields for unified bottom row styling |
  | `src/presentation/web/components/common/feature-node/feature-node.stories.tsx` | High | All 18+ stories must be updated to reflect new visual layout |
  | `src/presentation/web/components/common/feature-node/agent-type-icons.tsx` | Low | No size changes needed — badge remains h-3.5 w-3.5 |
  | `src/presentation/web/components/common/feature-node/agent-type-icons.stories.tsx` | Low | No changes expected |
  | `src/presentation/web/components/features/features-canvas/features-canvas.tsx` | None | Node dimensions unchanged; no canvas-level changes |
  | `tailwind.config.ts` | Low | May need border-l-4 utility if not available; existing animations suffice |

  ## Dependencies

  - **No domain/application layer changes**: This is a purely presentational redesign. The
    `FeatureNodeData` interface and state derivation logic remain unchanged.
  - **No backend changes**: The feature node receives data via SSE → hooks → React Flow props.
    The data pipeline is unaffected.
  - **Existing UI primitives**: Uses shadcn/ui Tooltip, Lucide icons, and Tailwind — all
    already in the project.
  - **React Flow constraints**: Custom nodes must still include `<Handle>` components for
    edge connections. The delete button and action button (+ add child) hover behaviors
    must be preserved.
  - **Existing state config**: The `featureNodeStateConfig` record provides icons, colors,
    and CSS classes per state. The unified bottom row reuses these — no new config shape needed.

  ## Size Estimate

  **M (days)** — The core work is restructuring the bottom section JSX in `feature-node.tsx`
  (replacing 4 conditional branches with 1 unified template) and updating all 18+ Storybook
  stories to reflect the new layout. The component is 362 lines but the refactoring should
  reduce line count. No domain/backend changes. No new dependencies. The main risk was the
  open question of variant count — resolved to a single variant, which keeps this firmly at M.

  ---

