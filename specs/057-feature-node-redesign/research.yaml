name: feature-node-redesign
summary: >
  Technical research for redesigning the FeatureNode bottom section into a
  unified status row with lifecycle-stage-relevant icons. The current component
  has 4 conditional bottom-section branches (creating, running, progress-bar,
  badge) totaling 362 lines. The redesign collapses these into 1 unified
  template with variable icon/text, adds a new lifecycleStageIcons mapping to
  the state config module, and requires importing 4 additional Lucide icons
  (Search, Code, GitPullRequest, Rocket). No new libraries, no domain changes,
  no API changes — purely presentational refactoring within existing patterns.

relatedFeatures: []

technologies:
  - React (functional components with hooks)
  - React Flow (@xyflow/react) custom nodes
  - Tailwind CSS (utility-first styling)
  - Lucide React icons
  - Storybook (component stories and visual testing)
  - shadcn/ui (tooltip, dialog primitives)

relatedLinks:
  - https://lucide.dev/icons/
  - https://reactflow.dev/docs/api/nodes/custom-nodes/

decisions:
  - title: 'Lifecycle icon mapping location'
    chosen: >
      Add a new exported const `lifecycleStageIcons` record in
      feature-node-state-config.ts alongside the existing
      lifecycleDisplayLabels and lifecycleRunningVerbs records
    rejected:
      - >
        Create a separate file (e.g. lifecycle-icons.ts) — Rejected because
        the existing state config module already houses all per-lifecycle and
        per-state mappings (lifecycleDisplayLabels, lifecycleRunningVerbs,
        featureNodeStateConfig). Adding a separate file for a single record
        would fragment the config surface and break the convention.
      - >
        Embed the icon mapping inline in feature-node.tsx — Rejected because
        the component file should contain rendering logic, not configuration
        data. The existing pattern cleanly separates config (state-config.ts)
        from rendering (feature-node.tsx). Adding more config to the component
        would increase its line count rather than reducing it.
    rationale: >
      The state config module (feature-node-state-config.ts) is the established
      location for all feature-node configuration data: state configs, lifecycle
      labels, and running verbs are all exported from there. A new
      Record<FeatureLifecyclePhase, LucideIcon> follows the exact same pattern
      as lifecycleDisplayLabels and lifecycleRunningVerbs. This keeps all
      mapping data co-located and lets the component import it alongside
      existing configs.

  - title: 'Bottom section refactoring approach'
    chosen: >
      Replace all 4 conditional branches with a single unified template that
      uses a helper function to resolve the correct icon and text based on
      state and lifecycle, then conditionally renders the progress bar below
      based on whether the state is active (creating/running)
    rejected:
      - >
        Extract a separate FeatureNodeBottomRow sub-component — Rejected
        because the bottom section is tightly coupled to the node's data props
        and state config. Extracting it into a separate file adds import
        overhead and indirection for a section that is only used in one place.
        The unified template is simple enough to remain inline.
      - >
        Keep 2 branches (active vs terminal) — Rejected because even 2
        branches maintain unnecessary duplication. The only difference between
        active and terminal states in the new design is (a) the progress bar
        visibility and (b) the featureId line above the status row. These are
        two simple conditionals within a single template, not worth separate
        JSX blocks.
    rationale: >
      The current 4-way conditional (lines 251-327 in feature-node.tsx) is the
      primary source of component complexity. The new design intentionally
      unifies the bottom section: every state gets an icon + status text row.
      The only variations are: (1) which icon (resolved by a helper function
      that checks state first, then lifecycle), (2) which text (already handled
      by the existing getBadgeText function), (3) whether to show a progress
      bar (boolean check: state === 'creating' || state === 'running'), and
      (4) whether to show the featureId line (shown for non-active states).
      A single template with these 4 inline conditionals is far simpler than
      4 separate JSX blocks.

  - title: 'Icon resolution strategy for the status row'
    chosen: >
      Create a single getStatusRowIcon(data) helper function that returns the
      appropriate LucideIcon: for running state, look up lifecycleStageIcons
      by data.lifecycle; for action-required, use the existing getBadgeIcon
      logic (lifecycle-specific overrides); for all other states, use the
      state config icon (Loader2, CircleCheck, Ban, CircleX)
    rejected:
      - >
        Add lifecycle icons to the existing featureNodeStateConfig record by
        nesting them — Rejected because featureNodeStateConfig is keyed by
        FeatureNodeState (6 states), not by FeatureLifecyclePhase (6 phases).
        Lifecycle icons vary by phase, not by state. Nesting lifecycle data
        inside a state-keyed record would create a confusing cross-product
        structure and require accessing config.lifecycleIcons[lifecycle] from
        a state-keyed record, which is semantically wrong.
      - >
        Use a switch statement directly in JSX — Rejected because inline
        switch statements in JSX require IIFEs (immediately invoked function
        expressions), which the codebase already uses but are considered a
        code smell when a simple helper function would be cleaner. The existing
        getBadgeIcon and getBadgeText functions demonstrate the preferred
        pattern: extract resolution logic into named helper functions above
        the component.
    rationale: >
      The existing codebase pattern uses helper functions above the component
      for icon/text resolution (getBadgeIcon at line 34, getBadgeText at line
      59). A new getStatusRowIcon function follows this exact pattern. It
      cleanly separates the resolution logic (which icon for which
      state/lifecycle combination) from the rendering logic. The function
      can also absorb the existing getBadgeIcon logic for action-required
      states, potentially replacing getBadgeIcon entirely and reducing total
      helper count.

  - title: 'Left border color implementation'
    chosen: >
      Add border-l-4 to the card's className alongside the existing
      config.borderClass (which already defines colors like
      border-l-blue-500, border-l-amber-500 etc.)
    rejected:
      - >
        Use a CSS variable for the border color — Rejected because the
        existing state config already provides Tailwind utility classes for
        border colors (borderClass). Using CSS variables would introduce a
        different styling pattern inconsistent with the rest of the config.
      - >
        Skip the left border entirely — Rejected because the spec FR-13
        explicitly requires state-dependent border color using the existing
        borderClass from state config. The config already defines these
        classes (border-l-blue-500, border-l-amber-500, etc.) but the current
        component doesn't apply them to the card. This is an explicit
        requirement to wire up existing config to the card element.
    rationale: >
      The featureNodeStateConfig already defines borderClass for every state
      (e.g. 'border-l-blue-500' for creating/running, 'border-l-amber-500'
      for action-required). The current component never uses these classes —
      the card div at line 146 only has 'border' (thin border all around).
      Adding border-l-4 and config.borderClass to the cn() call is a one-line
      change that activates an already-designed feature. No new Tailwind
      utilities needed — border-l-4 is a standard Tailwind class.

  - title: 'Storybook story structure'
    chosen: >
      Update all existing 18+ stories to reflect the new layout, and add a
      new AllLifecyclesRunning story grid that shows all 6 lifecycle phases
      in the running state to verify correct stage-relevant icons
    rejected:
      - >
        Create a separate story file for the new layout — Rejected because
        the redesign replaces the old layout, not supplements it. Having two
        story files would imply two component variants, which is not the case.
        The existing story file should be updated in place.
      - >
        Add only individual stories per lifecycle (6 new stories) — Rejected
        because a grid story (all 6 in one view) is more effective for visual
        comparison and icon verification. Individual stories are useful for
        detailed testing but the grid provides at-a-glance verification that
        all icons are correct. The existing AllLifecycles story already uses
        this grid pattern and simply needs to be verified/updated.
    rationale: >
      The existing story file already has an AllLifecycles story (line 188)
      that renders all 6 lifecycle phases in running state as a grid. This
      story will automatically verify the new stage-relevant icons once the
      component is updated. The primary work is ensuring all existing stories
      (Default, AllStates, AllAgentTypes, WithAction, LongContent,
      DoneWithRuntime, BlockedByFeature, Creating, MergeReviewActionRequired,
      ErrorWithMessage, WithDeleteButton, FastMode, FastModeDone,
      DeploymentBooting, DeploymentReady, DeploymentReadyNoUrl, Interactive)
      render correctly with the new unified bottom row. Additional stories
      for action-required across lifecycle phases (requirements,
      implementation, review) should be added to verify the lifecycle-specific
      icon overrides.

  - title: 'New Lucide icon imports'
    chosen: >
      Import Search, Code, GitPullRequest, and Rocket from lucide-react in
      the state config module where the lifecycleStageIcons mapping lives
    rejected:
      - >
        Import icons in feature-node.tsx alongside existing imports — Rejected
        because the icons are configuration data (which icon maps to which
        lifecycle), not rendering logic. Following the pattern where
        featureNodeStateConfig imports its own icons (Loader2, CircleAlert,
        CircleCheck, Ban, CircleX), the lifecycle stage icons should be
        imported in the same config module.
      - >
        Use dynamic imports for the new icons — Rejected because Lucide icons
        are tree-shaken at build time and each icon is ~200 bytes gzipped.
        4 additional icons add ~800 bytes — negligible for a desktop web
        application. Dynamic imports would add runtime complexity for no
        meaningful bundle size benefit.
    rationale: >
      The state config module already imports 5 Lucide icons for state config
      (Loader2, CircleAlert, CircleCheck, Ban, CircleX). Adding 4 more
      (Search, Code, GitPullRequest, Rocket) follows the same pattern. FileText
      and Wrench are currently imported in feature-node.tsx for the
      getBadgeIcon helper — these should move to the state config module as
      part of the refactoring since they'll be used in the lifecycle icon
      mapping. GitMerge (already imported in feature-node.tsx) is used for
      the action-required review state and should also move to state config.

