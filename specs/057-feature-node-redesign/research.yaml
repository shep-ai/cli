content: |
  ## Technology Decisions

  ### 1. Lifecycle Icon Mapping Location

  **Chosen:** Add a new `lifecycleStageIcons` record in `feature-node-state-config.ts`

  **Rejected:**
  - Separate file (lifecycle-icons.ts) — Fragments config surface; violates the established pattern of co-locating all feature-node config
  - Inline in feature-node.tsx — Mixes configuration data with rendering logic; increases component line count

  **Rationale:** The state config module already houses `lifecycleDisplayLabels`, `lifecycleRunningVerbs`, and `featureNodeStateConfig`. A new `Record<FeatureLifecyclePhase, LucideIcon>` follows the exact same pattern and keeps all mapping data co-located.

  ### 2. Bottom Section Refactoring Approach

  **Chosen:** Single unified template with helper function for icon/text resolution

  **Rejected:**
  - Extract separate sub-component — Adds indirection for a section only used in one place
  - Keep 2 branches (active vs terminal) — Still duplicates the icon + text row structure unnecessarily

  **Rationale:** The current 4-way conditional (lines 251-327) is the primary complexity source. The unified design means every state gets the same layout: icon + text row, with optional progress bar below. The only variations (which icon, which text, progress bar visibility, featureId visibility) are simple inline conditionals within one template.

  ### 3. Icon Resolution Strategy

  **Chosen:** Single `getStatusRowIcon(data)` helper function that resolves state → icon, with lifecycle lookup for running state

  **Rejected:**
  - Nest lifecycle icons in state config — Wrong key dimension (states vs phases); creates confusing cross-product
  - Inline switch in JSX — Requires IIFEs; existing pattern uses named helper functions

  **Rationale:** Follows the existing pattern of `getBadgeIcon` and `getBadgeText` helpers above the component. The new function absorbs `getBadgeIcon` logic and adds lifecycle-stage resolution for running state.

  ### 4. Left Border Color

  **Chosen:** Add `border-l-4` + `config.borderClass` to the card div

  **Rejected:**
  - CSS variables — Inconsistent with existing Tailwind utility class pattern
  - Skip border — FR-13 explicitly requires it; config already defines the classes

  **Rationale:** `featureNodeStateConfig` already defines `borderClass` for every state but the current component never applies it. One-line change to activate existing config.

  ### 5. Storybook Stories

  **Chosen:** Update existing 18+ stories in place; add action-required lifecycle variant stories

  **Rejected:**
  - Separate story file — Redesign replaces old layout, not supplements it
  - Only individual per-lifecycle stories — Grid story more effective for at-a-glance verification

  **Rationale:** The existing `AllLifecycles` story already renders all 6 phases in running state. It will automatically verify new stage-relevant icons. New stories for action-required variants (requirements, implementation, review) should be added.

  ### 6. New Lucide Icon Imports

  **Chosen:** Import Search, Code, GitPullRequest, Rocket in state config module

  **Rejected:**
  - Import in feature-node.tsx — Icons are config data, not rendering logic
  - Dynamic imports — Negligible bundle impact (~800 bytes for 4 icons)

  **Rationale:** State config already imports 5 Lucide icons. Adding 4 more follows the same pattern. Move FileText, Wrench, GitMerge from feature-node.tsx to state config since they'll be used in the lifecycle icon mapping.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | lucide-react | Icons for lifecycle stages and states | Use (already in project) | Need 4 additional imports: Search, Code, GitPullRequest, Rocket. All available in lucide-react. Total cost ~800 bytes gzipped. |
  | @xyflow/react | React Flow custom node framework | Use (already in project) | No changes to React Flow integration. Handle components, node dimensions, and canvas layout remain unchanged. |
  | shadcn/ui Tooltip | Tooltip for agent badge and buttons | Use (already in project) | No changes needed. Existing tooltip usage preserved. |
  | @radix-ui primitives | Accessible dialog/tooltip | Use (already in project, via shadcn/ui) | No direct usage changes. DeleteFeatureDialog and tooltips continue using existing Radix primitives. |
  | framer-motion | Animation library | Reject | Not needed. Existing CSS animations (spin, indeterminate-progress) in globals.css are sufficient. Adding a JS animation library for a simple status row would be over-engineering. |
  | react-spring | Animation library | Reject | Same reasoning as framer-motion. No new animations required per NFR-5. |

  ## Security Considerations

  - **No security impact.** This is a purely presentational change within the React component layer. No data flows change, no new API calls, no new user inputs, no state mutations. The component receives data via props from the existing SSE → hooks → React Flow pipeline.
  - **Existing security properties preserved:** The `aria-label` attributes on interactive elements (agent badge button, delete button, action button) remain unchanged. The `onClick` handlers with `e.stopPropagation()` continue to prevent event bubbling.
  - **No new external dependencies.** All icons come from lucide-react, which is already in the project and audited.

  ## Performance Implications

  - **No performance impact.** The refactoring reduces conditional branches (from 4 to 1 unified template), which marginally improves rendering performance by avoiding unnecessary branch evaluation. The difference is negligible for this component.
  - **Bundle size:** 4 additional Lucide icon imports add ~800 bytes gzipped. Lucide icons are tree-shaken at build time. No measurable impact.
  - **Layout stability (NFR-2):** The unified bottom section ensures consistent card height across state transitions. The current 4-way conditional can cause layout shifts when switching between branches with different heights. The unified template with a fixed icon + text row structure eliminates this risk.
  - **Animation continuity (NFR-5):** Loader2 spin animation and indeterminate progress bar animation use existing CSS keyframes from globals.css. No changes to animation definitions needed.

  ## Architecture Notes

  ### Files to Modify

  1. **`feature-node-state-config.ts`** (Medium impact)
     - Add new `lifecycleStageIcons: Record<FeatureLifecyclePhase, LucideIcon>` export
     - Import Search, Code, GitPullRequest, Rocket from lucide-react
     - Move FileText, Wrench, GitMerge imports here (currently in feature-node.tsx)
     - Consider removing `showProgressBar` and `progressClass` from FeatureNodeStateConfig interface (dead code)

  2. **`feature-node.tsx`** (High impact)
     - Replace 4-way conditional bottom section (lines 251-327) with unified template
     - Replace `getBadgeIcon` with `getStatusRowIcon` helper
     - Rename `getBadgeText` to `getStatusRowText`
     - Rename `getActionRequiredBadgeClasses` to `getActionRequiredStatusClasses`
     - Add `border-l-4` + `config.borderClass` to card div className
     - Remove imports for FileText, Wrench, GitMerge (moved to state config)
     - Target: fewer than 362 lines (current count)

  3. **`feature-node.stories.tsx`** (High impact)
     - Verify all existing 18+ stories render correctly with new layout
     - Add stories for action-required across lifecycle phases
     - The existing `AllLifecycles` story already covers running state × all 6 phases
     - May need to add `repositoryPath` and `branch` fields to story data objects that are missing them (required by FeatureNodeData but some stories omit them)

  ### Files NOT Modified

  - `agent-type-icons.tsx` — No changes. Agent badge remains in top-right.
  - `features-canvas.tsx` — No changes. Node dimensions unchanged.
  - `tailwind.config.*` — No changes. All needed utilities (border-l-4, animate classes) already available.
  - `globals.css` — No changes. Indeterminate progress animation already defined.
  - Domain layer — Zero impact per NFR-7.

  ### Data Flow (unchanged)

  ```
  SSE events → useAgentEvents hook → deriveGraph → React Flow nodes → FeatureNode component
  ```

  The `FeatureNodeData` interface is unchanged. The component receives the same props. All changes are internal to how the component renders that data.

  ### Implementation Order

  1. Update `feature-node-state-config.ts` — add lifecycle icon mapping, move icon imports
  2. Refactor `feature-node.tsx` — replace bottom section, update helpers, add border
  3. Update `feature-node.stories.tsx` — verify existing stories, add new ones
  4. Run build, tests, lint to verify zero regressions

  ---

  _Research complete — proceed with planning phase_
