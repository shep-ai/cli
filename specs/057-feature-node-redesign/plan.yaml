content: |
  ## Architecture Overview

  The feature node redesign is a purely presentational refactoring within the
  presentation layer. The component receives `FeatureNodeData` props via the
  existing SSE -> useAgentEvents -> deriveGraph -> React Flow pipeline. No data
  flow changes occur.

  Three files are modified — all within
  `src/presentation/web/components/common/feature-node/`:

  1. **feature-node-state-config.ts** — Configuration data module. Already
     houses `featureNodeStateConfig`, `lifecycleDisplayLabels`, and
     `lifecycleRunningVerbs`. Extended with a new `lifecycleStageIcons` record
     mapping each FeatureLifecyclePhase to a Lucide icon component.
  2. **feature-node.tsx** — Main component (362 lines). Bottom section
     restructured from 4 conditional branches to 1 unified template. Helper
     functions renamed/consolidated to match the new "status row" terminology.
  3. **feature-node.stories.tsx** — Visual test coverage (543 lines, 18 stories).
     All stories verified against new layout; new action-required lifecycle
     variant stories added.

  Files NOT modified: agent-type-icons.tsx, features-canvas.tsx, domain layer,
  tailwind config, globals.css, derive-feature-state.ts.

  ## Key Design Decisions

  ### 1. Lifecycle Icon Mapping in State Config

  **Chosen:** Add `lifecycleStageIcons: Record<FeatureLifecyclePhase, LucideIcon>`
  to feature-node-state-config.ts alongside existing lifecycle records.

  **Rejected alternatives:**
  - Separate file (lifecycle-icons.ts) — fragments config surface; violates the
    established pattern of co-locating all feature-node config in one module.
  - Inline in feature-node.tsx — mixes configuration data with rendering logic;
    increases component line count rather than reducing it.

  **Rationale:** The state config module is the established location for all
  feature-node configuration. `lifecycleDisplayLabels` and `lifecycleRunningVerbs`
  already follow the `Record<FeatureLifecyclePhase, T>` pattern. A new icon
  record is identical in shape and co-location.

  ### 2. Single Unified Bottom Template

  **Chosen:** Replace all 4 conditional branches with one template containing:
  - Optional featureId line (non-active states only)
  - Icon + status text row (all states)
  - Optional indeterminate progress bar (creating/running only)

  **Rejected alternatives:**
  - Extract separate FeatureNodeBottomRow sub-component — adds indirection for a
    section only used in one place and tightly coupled to node data props.
  - Keep 2 branches (active vs terminal) — still duplicates the icon + text row
    structure for no benefit.

  **Rationale:** The 4-way conditional (lines 251-327) is the primary source of
  component complexity. The new design intentionally unifies the bottom section.
  The only variations (icon, text, progress bar, featureId) are simple inline
  conditionals within one template — far simpler than 4 separate JSX blocks.

  ### 3. Icon Resolution via Helper Function

  **Chosen:** Single `getStatusRowIcon(data)` helper function that returns the
  appropriate LucideIcon based on state and lifecycle. Replaces `getBadgeIcon`.

  **Rejected alternatives:**
  - Nest lifecycle icons inside featureNodeStateConfig — wrong key dimension
    (states vs phases); creates a confusing cross-product structure.
  - Inline switch in JSX — requires IIFEs; existing codebase pattern uses named
    helper functions above the component.

  **Rationale:** Follows the existing pattern of helper functions (getBadgeIcon at
  line 34, getBadgeText at line 59). The new function absorbs getBadgeIcon's
  logic and adds lifecycle-stage resolution for running state.

  ### 4. Left Border Color Activation

  **Chosen:** Add `border-l-4` + `config.borderClass` to the card div's `cn()` call.

  **Rationale:** `featureNodeStateConfig` already defines `borderClass` for every
  state (e.g. `border-l-blue-500`, `border-l-amber-500`) but the current component
  at line 146 never applies it. Adding `border-l-4` and the config class is a
  one-line change that activates an already-designed feature per FR-13.

  ### 5. Dead Code Removal

  **Chosen:** Remove `showProgressBar` and `progressClass` from
  `FeatureNodeStateConfig` interface and all 6 state records.

  **Rationale:** `showProgressBar` is `false` for all 6 states. The determinate
  progress bar JSX branch (lines 283-300) never renders. Removing dead code is
  part of the NFR-1 complexity reduction goal.

  ## Implementation Strategy

  **Phase 1 (State Config)** comes first because it introduces the
  `lifecycleStageIcons` export that phase 2 imports. It also moves icon imports
  from the component to the config module — a prerequisite for the component
  refactoring. This phase is pure configuration: no rendering logic changes.

  **Phase 2 (Component)** depends on phase 1. This is the core refactoring:
  replacing the 4-way conditional with the unified template, updating helper
  functions, and adding the left border. All changes are within feature-node.tsx.
  TDD approach: write tests that assert the new rendering behavior first, then
  implement the minimal changes to pass them.

  **Phase 3 (Stories)** depends on phase 2. Stories verify the visual output
  of the refactored component. The existing AllLifecycles story automatically
  verifies stage-relevant icons once the component is updated. New stories are
  added for action-required lifecycle variants.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Removing showProgressBar breaks something | Verify field is false for all 6 states and the JSX branch (lines 283-300) is dead code. No external code references it — only used in feature-node.tsx. |
  | Border-l-4 conflicts with existing border styling | The card has `border` (1px all sides). `border-l-4` overrides only left border width. Tailwind applies independently. Verify visually in Storybook. |
  | Helper function renames break imports | getBadgeIcon, getBadgeText, getActionRequiredBadgeClasses are defined and used within the same file. No external imports exist. Rename is safe. |
  | Missing icon imports after moving to state config | TypeScript compiler (`pnpm build`) catches missing imports immediately. Run build as part of verification. |
  | Story data objects missing required fields | Some stories may omit `repositoryPath`/`branch` fields. Fix by adding these fields if TypeScript errors surface. |
  | Visual regression in existing stories | Verify every existing story renders correctly in Storybook. AllStates and AllLifecycles grids provide at-a-glance comparison. |
