content: |
  ## Summary

  The implementation is organized into 9 tasks across 3 phases totaling an
  estimated 3.5 hours.

  Phase 1 (State Config Extension) lays the foundation by adding the
  lifecycleStageIcons and actionRequiredLifecycleIcons mappings to the state
  config module and removing the dead showProgressBar/progressClass fields.
  These are pure configuration changes with no rendering impact.

  Phase 2 (Component Refactoring) is the core work: replacing the 4-way
  conditional bottom section with a unified status row template, creating the
  getStatusRowIcon helper, renaming badge-era helpers to status-row terminology,
  and activating the left border color. Each task in this phase is small and
  focused — the icon helper, the naming cleanup, the template replacement, and
  the border addition are independent concerns that happen to depend on each
  other sequentially.

  Phase 3 (Stories & Verification) updates all 18 existing stories and adds 3
  new action-required lifecycle variant stories, then runs the full build/test/
  lint verification suite to confirm zero regressions.

  The TDD approach for each task follows the project's mandatory RED-GREEN-
  REFACTOR cycle: write tests asserting the new behavior first, implement the
  minimum code to pass, then clean up.
