name: settings-page-7e93cb
summary: >
  Implementation plan for the settings page feature spanning four architecture
  layers: TypeSpec domain model extension (FeatureFlags), SQLite persistence
  (migration v24, mapper, repository), infrastructure service update
  (updateSettings), and presentation (Next.js page with 6 section components,
  server actions, sidebar integration, feature flags migration, Storybook
  stories). The plan follows a bottom-up approach — domain first, then
  infrastructure, then presentation — ensuring each layer is tested before
  building on it.

relatedFeatures: []
technologies:
  - Next.js 16 (App Router, Server Components, Server Actions)
  - React 19 (client components, hooks-based state)
  - shadcn/ui (Card, Select, Input, Label, Button, Switch, Separator)
  - Tailwind CSS v4
  - TypeSpec (domain model extension for FeatureFlags)
  - SQLite (better-sqlite3, migration v24)
  - tsyringe (DI container, string-token resolution)
  - Storybook (mandatory colocated .stories.tsx files)
  - lucide-react (Settings, Eye, EyeOff icons)
  - sonner (toast notifications)
  - Vitest (unit + integration tests)
relatedLinks: []

phases:
  - id: phase-1
    name: 'Domain & Infrastructure Foundation'
    description: >
      Extend the TypeSpec Settings model with FeatureFlags, regenerate types,
      add database migration v24 (feature flag columns + CI workflow columns),
      update the settings mapper and repository to handle the new columns,
      update the defaults factory, and add updateSettings() to the settings
      service. This phase establishes the data layer that all UI work depends on.
    parallel: false

  - id: phase-2
    name: 'Server Actions & Feature Flags Migration'
    description: >
      Create the load-settings and update-settings server actions following
      the existing DI-based pattern. Migrate feature-flags.ts from env-var-only
      resolution to DB-primary with env var fallback. Install the shadcn/ui
      Switch component. This phase bridges infrastructure and presentation.
    parallel: false

  - id: phase-3
    name: 'Settings Page & Section Components'
    description: >
      Build the settings page Server Component, the SettingsPageClient
      orchestrator, and all six section components (Agent, Environment,
      Workflow, Notifications, Feature Flags, Database Location). Each section
      gets its own file, Storybook stories, and unit tests. This is the
      largest phase by volume.
    parallel: false

  - id: phase-4
    name: 'Sidebar Integration & Final Validation'
    description: >
      Add the Settings nav item to the sidebar, verify feature flag sidebar
      integration works end-to-end, run the full validation suite (build,
      test, lint, typecheck), and fix any issues. This phase ensures
      everything works together.
    parallel: false

