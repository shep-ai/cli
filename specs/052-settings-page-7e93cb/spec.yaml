summary: >
  Create a new /settings page in the web UI with sidebar navigation. The page
  exposes six settings sections: preferred agent (without model), IDE and
  terminal preferences, workflow configuration, notification preferences,
  feature flags (migrated from NEXT_PUBLIC_ env vars into the Settings database
  entity), and database location display. The backend Settings domain model, use
  cases, and repository already exist — this feature is primarily a
  presentation-layer effort with a small domain extension for feature flags.
