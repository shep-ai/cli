name: settings-page-7e93cb
summary: >
  21 tasks across 4 phases. Phase 1 (Domain & Infrastructure Foundation) has 7
  tasks covering TypeSpec model, migration, mapper, repository, defaults factory,
  settings service, and integration tests. Phase 2 (Server Actions & Feature
  Flags Migration) has 3 tasks for server actions, feature flags migration, and
  Switch installation. Phase 3 (Settings Page & Section Components) has 9 tasks
  for the page, client orchestrator, and 6 section components with stories/tests.
  Phase 4 (Sidebar Integration & Final Validation) has 2 tasks for sidebar nav
  and full validation.

