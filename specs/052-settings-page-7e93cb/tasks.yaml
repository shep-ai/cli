    title: 'Add FeatureFlags model to TypeSpec Settings entity'
    description: >
      Define a new FeatureFlags model in settings.tsp with three boolean fields
      (skills, envDeploy, debug — all default false) and add it as an optional
      property on the Settings entity. Run pnpm tsp:compile to regenerate
      output.ts. Verify the generated types are additive-only (no breaking
      changes to existing types).
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'FeatureFlags model exists in settings.tsp with skills, envDeploy, debug boolean fields'
      - 'Settings entity has optional featureFlags property of type FeatureFlags'
      - 'pnpm tsp:compile succeeds and output.ts contains FeatureFlags type'
      - 'Existing Settings type fields are unchanged in output.ts'
    tdd:
      red:
        - 'No test — this is a TypeSpec model change verified by compilation'
      green:
        - 'Add FeatureFlags model to settings.tsp with @doc decorators'
        - 'Add featureFlags?: FeatureFlags to Settings model'
        - 'Run pnpm tsp:compile and verify output.ts diff'
      refactor:
        - 'Ensure @doc descriptions are clear and consistent with existing models'
    estimatedEffort: '30min'

