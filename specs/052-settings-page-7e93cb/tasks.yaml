      feature_flag_debug (INTEGER NOT NULL DEFAULT 0) and ci_max_fix_attempts,
      ci_watch_timeout_ms, ci_log_max_chars (INTEGER, nullable). Update
      LATEST_SCHEMA_VERSION. Add migration integration tests.
    state: Todo
