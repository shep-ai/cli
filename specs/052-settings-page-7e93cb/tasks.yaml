content: |
  ## Summary

  The implementation is broken into 21 tasks across 4 phases, following a
  bottom-up approach through the Clean Architecture layers.

  Phase 1 (7 tasks, ~4h) establishes the data foundation: TypeSpec model
  extension, database migration, mapper/repository updates, defaults factory,
  settings service, and integration tests. Everything in this phase is
  backend/infrastructure work that the UI depends on.

  Phase 2 (3 tasks, ~2h) bridges infrastructure and presentation: server
  actions for loading and updating settings, the feature flags migration
  from env vars to DB-primary resolution, and the shadcn Switch component
  installation. These are prerequisites for the UI components.

  Phase 3 (9 tasks, ~7h 15min) is the bulk of the work: the settings page
  Server Component, the client orchestrator, all six section components
  with their Storybook stories and unit tests, and wiring up the save
  handlers. Each section is independent, allowing focused development
  and testing.

  Phase 4 (2 tasks, ~1h 30min) integrates the sidebar nav item and runs
  the full validation suite to ensure everything works together. This
  comes last because it depends on the feature flags migration and all
  UI components being in place.

  The TDD approach is applied throughout: each task defines what tests
  to write first (RED), what minimal implementation satisfies them (GREEN),
  and what cleanup to perform afterward (REFACTOR). Infrastructure tasks
  have integration tests against SQLite; UI components have unit tests
  with mock data and Storybook stories for visual verification.
