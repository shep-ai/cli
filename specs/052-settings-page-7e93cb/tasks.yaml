    acceptanceCriteria:
      - 'Migration v24 exists in MIGRATIONS array with correct SQL'
      - 'Feature flag columns use INTEGER NOT NULL DEFAULT 0'
      - 'CI columns use INTEGER (nullable, no DEFAULT)'
      - 'LATEST_SCHEMA_VERSION equals 24'
      - 'Migration test verifies all 6 new columns exist with correct types and defaults'
