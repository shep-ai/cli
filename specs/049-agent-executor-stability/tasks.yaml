# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation starts at the contract boundary (phase 1: interface update) and
  flows inward-to-outward through Clean Architecture layers. The interface change is
  a prerequisite for TypeScript to accept the updated callers, even though runtime
  behaviour changes land in the infrastructure layer.

  Phase 2 wires the value from the application layer options into the forked process
  argv — a one-liner addition in FeatureAgentProcessService that mirrors the existing
  --resume-payload pattern.

  Phase 3 is the core fix: the worker learns to read the pinned agentType from its
  argv and resolve the executor directly via IAgentExecutorFactory, bypassing the
  settings-driven executorProvider when an explicit type is provided. The graceful
  fallback keeps all existing spawn paths unaffected.

  Phase 4 closes the loop at the two call sites that trigger the bug:
  ApproveAgentRunUseCase and ResumeFeatureUseCase both already hold the full AgentRun
  object at the point where spawn() is called, so passing agentType is a one-field
  addition to the existing options object in each.

  Every production code change is covered by a corresponding TDD cycle. Tasks 5 and 6
  (the use case updates) depend only on task 1 (the interface) and can be developed in
  parallel with tasks 2-4 if desired, though the dependency graph orders them after
  the infrastructure work for sequential clarity.
