      Graceful fallback is the safer choice for a targeted bug fix. The initial spawn (first
      run creation) is not affected by the bug, so it is acceptable for it to continue reading
      current settings. Requiring the arg unconditionally would require updating every spawn
      site simultaneously and risks introducing new failures. Backward compatibility also
      simplifies testing of the worker in isolation.
    answer: 'Graceful fallback to settings'

