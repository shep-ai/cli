  - question: 'Should the worker fall back to current settings when --agent-type is absent, or require the arg unconditionally?'
    resolved: true
    options:
      - option: 'Graceful fallback to settings'
        description: >
          If --agent-type is not present (e.g. initial spawn on older code paths), the worker
          falls back to executorProvider.getExecutor() which reads current settings. Maintains
          backward compatibility with any code path that does not yet pass the arg, and avoids
          a hard failure if the arg is accidentally omitted.
        selected: true
      - option: 'Require arg unconditionally'
        description: >
          Always require --agent-type; throw if absent. Stricter contract guarantees the bug
          cannot silently recur, but risks runtime failures on any spawn call that has not been
          updated, and breaks backward compatibility with direct worker invocations used in tests.
