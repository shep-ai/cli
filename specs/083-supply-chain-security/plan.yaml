phases:
  - id: "phase-1"
    name: "Domain Models & Schema Foundation"
    description: >
      Define all security domain types in TypeSpec (SecurityMode enum, SecurityActionCategory
      enum, SecurityActionDisposition enum, SecurityPolicy, SecurityEvent, DependencyFinding,
      ReleaseIntegrityResult, EffectivePolicySnapshot) and extend Settings with a SecurityConfig
      nested model. Run tsp:compile to generate TypeScript types. Create additive SQLite
      migrations for security columns on settings and a new security_events table. Extend the
      settings mapper and defaults factory. This phase produces zero runtime behavior but
      establishes the type foundation every subsequent phase depends on.
    parallel: false

  - id: "phase-2"
    name: "Policy Engine & Persistence"
    description: >
      Implement the central policy engine as an application-layer service behind
      ISecurityPolicyService. Build the policy file reader (shep.security.yaml via js-yaml),
      policy validator with fail-fast semantics, and deterministic policy evaluator that merges
      global defaults with repository policy. Implement ISecurityEventRepository and
      SQLiteSecurityEventRepository for event persistence with 90-day retention cleanup.
      Register all services in the DI container. This phase delivers the core abstraction
      that all consumers depend on.
    parallel: false

  - id: "phase-3"
    name: "CLI Enforcement Command"
    description: >
      Create the shep security command group with the enforce subcommand. Build
      EnforceSecurityUseCase that orchestrates policy evaluation, dependency-risk checks,
      and release-integrity checks. Implement the DependencyRiskEvaluator (lockfile
      consistency, lifecycle scripts, source types, allowlist/denylist, version-range policy)
      and ReleaseIntegrityEvaluator (CI-only publishing, provenance, workflow integrity).
      Wire OutputFormatter for human-readable and machine-readable (JSON) output. Exit code
      0 for pass, 1 for enforce-mode failure.
    parallel: false

  - id: "phase-4"
    name: "Executor & Runtime Guardrails"
    description: >
      Add securityConstraints to AgentExecutionOptions and validate in executors before
      launch. Extend FeatureAgentState with security policy channels. Thread effective
      policy through all spawn sites (create, start, resume, approve, reject, unblock)
      as CLI args. Add pre-execution security checks in the executeNode() helper that
      classify actions against policy and either allow, deny (with SecurityViolationError),
      or route through existing interrupt() for approval-required actions. Persist security
      events from runtime decisions.
    parallel: false

  - id: "phase-5"
    name: "GitHub Governance Audit"
    description: >
      Extend IGitHubRepositoryService with an auditRepositoryGovernance() method. Implement
      gh-CLI-backed checks for branch protection rules, CODEOWNERS presence, and workflow
      permissions. Surface results as DependencyFinding-style findings with severity and
      remediation suggestions. Integrate governance audit into the EnforceSecurityUseCase
      flow. Mark all remote enforcement as audit-only.
    parallel: false

  - id: "phase-6"
    name: "Web UI Security Surfaces"
    description: >
      Add a SupplyChainSecuritySettingsSection component for the settings page showing
      effective mode, policy source, last evaluation, and recent findings. Add a security
      panel to the repository drawer with governance audit and dependency risk summaries.
      Add a security badge (shield icon) to feature nodes in the Control Center via
      build-graph-nodes.ts enrichment. Create server actions that resolve security use cases.
      All new components get colocated .stories.tsx files.
    parallel: false

  - id: "phase-7"
    name: "CI Integration & Release Gating"
    description: >
      Add a security-enforce job to ci.yml that runs shep security enforce --output json.
      Gate the release job and dev-publish workflows on the security-enforce job passing.
      Add the spec-initializer scaffold for shep.security.yaml in new repositories.
      Run full validation (lint, typecheck, build, unit tests, integration tests, e2e)
      to confirm no regressions.
    parallel: false

