summary: >
  Seven-phase implementation plan for a policy-driven supply-chain security subsystem.
  Introduces TypeSpec domain models, a central policy engine behind ISecurityPolicyService,
  hybrid policy storage (shep.security.yaml + SQLite), runtime guardrails in the feature-agent
  graph via executeNode() pre-checks, executor security validation, a shep security enforce
  CLI command, CI/release gating, and security surfaces in the Control Center, repository
  drawer, and settings UI. All decisions follow Clean Architecture layering, TypeSpec-first
  modeling, and existing DI/persistence patterns.

