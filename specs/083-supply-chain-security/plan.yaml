content: |
  ## Architecture Overview

  The supply-chain security feature introduces a cross-cutting security subsystem that spans
  all four Clean Architecture layers. The design follows the established codebase patterns:
  TypeSpec-first domain modeling, application-layer use cases as the sole orchestration point,
  infrastructure services behind port interfaces, and thin presentation layers that call use
  cases through DI.

  The central architectural element is a **policy engine** (ISecurityPolicyService) in the
  application layer that computes a deterministic effective policy from three sources: global
  settings defaults, a repository-scoped shep.security.yaml file, and per-feature-run state.
  Every consumer — CLI enforcement, runtime guardrails, executor validation, CI checks, and
  web UI projections — resolves the same service via DI and evaluates the same rules. No
  executor, node, or workflow implements its own security-rule interpretation (FR-5).

  The runtime enforcement model extends the existing feature-agent graph. The effective policy
  is computed at agent spawn time, serialized as a CLI arg, parsed in the worker, and injected
  into LangGraph state channels — matching the existing pattern for per-feature flags like
  forkAndPr and ciWatchEnabled (per LESSONS.md). The executeNode() helper in node-helpers.ts
  gains pre-execution security checks that classify agent actions into five categories
  (FR-7) and either allow, deny, or route through the existing interrupt() mechanism for
  approval (reusing feature 016 HITL infrastructure).

  Persistence follows the established SQLite pattern. Security settings are added as flattened
  columns on the existing singleton settings row (matching the 100+ column convention). Security
  events get their own table (matching the agent_runs pattern for entity-per-row storage).
  Migrations are additive and idempotent per LESSONS.md.

  ## Key Design Decisions

  ### 1. Central Policy Engine in Application Layer

  The policy engine is an application-layer service behind ISecurityPolicyService, with its
  implementation in infrastructure/. This matches how IAgentExecutorProvider and
  IGitHubRepositoryService are structured. The engine reads shep.security.yaml via a file
  reader, merges with SQLite-persisted defaults, validates with fail-fast semantics, and
  returns a deterministic EffectivePolicySnapshot. All consumers resolve the same instance.

  **Alternative rejected:** Scattering policy logic across executors and nodes would violate
  FR-5 and create untestable divergent interpretations.

  ### 2. TypeSpec-First Domain Models in Dedicated File

  New security types go in tsp/domain/entities/security.tsp rather than inflating settings.tsp.
  A small SecurityConfig model is added to settings.tsp for the settings-embedded fields (mode,
  lastEvaluationAt, policySource). The full security domain (events, findings, policy, results)
  lives independently and compiles to the same output.ts.

  **Alternative rejected:** Hand-written TypeScript types would violate the mandatory
  TypeSpec-first rule. Inlining everything in settings.tsp would overload an already large model.

  ### 3. Hybrid Policy Storage (YAML File + SQLite)

  Repository policy rules live in shep.security.yaml (reviewable in git, portable). Effective
  mode, evaluation timestamps, and event history persist in SQLite (queryable from web UI,
  available across sessions). js-yaml (already a project dependency) parses the file.

  ### 4. Runtime Guardrails via executeNode() Pre-Checks

  The executeNode() factory in node-helpers.ts is the central execution point for all graph
  nodes. Pre-execution checks classify the pending action against the effective policy in
  state. This is an application-layer enforcement backstop — prompt constraints are a
  defense-in-depth layer only. Denied actions throw SecurityViolationError before the agent
  prompt is sent. Approval-required actions call interrupt() per the feature 016 pattern.

  ### 5. Per-Feature Security Policy Threading

  Following LESSONS.md, the effective policy flows through all spawn sites as a CLI arg:
  create, start, resume, approve, reject, and unblock. The worker parses it into WorkerArgs,
  and the graph injects it into state channels. Nodes read from state, never from the global
  settings singleton.

  ### 6. Executor Validation via Optional SecurityConstraints

  AgentExecutionOptions gains an optional securityConstraints field (non-breaking). Before
  spawning, the executor validates compatibility. In Enforce mode, incompatible executors
  throw SecurityViolationError. This preserves the IAgentExecutorProvider resolution pattern
  (FR-19) while adding fail-closed behavior (NFR-3).

  ## Implementation Strategy

  The seven phases are strictly ordered by dependency:

  **Phase 1 (Foundation)** must come first because every subsequent phase depends on the
  generated TypeScript types. Without SecurityMode, SecurityEvent, etc. in output.ts, nothing
  can compile.

  **Phase 2 (Policy Engine)** builds on the types to create the core abstraction. The CLI,
  runtime, and UI all depend on ISecurityPolicyService, so it must exist before any consumer.

  **Phase 3 (CLI Enforcement)** is the first consumer of the policy engine and delivers
  immediate local value. It also defines the DependencyRiskEvaluator and
  ReleaseIntegrityEvaluator that CI and runtime later reuse.

  **Phase 4 (Runtime Guardrails)** is the most complex phase, touching executor contracts,
  worker args, state channels, all spawn sites, and node-helpers.ts. It depends on the policy
  engine and evaluators from phases 2-3.

  **Phase 5 (GitHub Governance)** extends the existing GitHub service and integrates into
  the enforcement flow. It is isolated from the runtime guardrails and can be built independently.

  **Phase 6 (Web UI)** depends on the use cases and server actions being available. Settings
  section, drawer panel, and Control Center badge are independent components that can be
  built in parallel within the phase.

  **Phase 7 (CI Integration)** is last because it depends on the CLI enforcement command
  existing and working correctly. CI changes are the highest-risk modification and should
  only be made once all local functionality is verified.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Migration breaks branch switching | All migrations are additive (new columns/tables only), idempotent (check existence before ALTER/CREATE), and down() is no-op. Per LESSONS.md, never drop or rename columns. |
  | Policy engine divergence across consumers | Single ISecurityPolicyService port resolved via DI. No consumer implements its own evaluation. Comprehensive unit tests verify deterministic output. |
  | Runtime guardrails bypass via prompt injection | Application-layer enforcement in executeNode() is the primary mechanism. Prompt constraints are defense-in-depth only. Tests verify blocked actions cannot execute regardless of agent output. |
  | Spawn sites miss security policy threading | Follow LESSONS.md pattern: grep for all processService.spawn calls, verify each passes security policy from feature entity. Use create-feature.use-case.ts as canonical reference. |
  | CI workflow changes break existing jobs | Security-enforce is a new parallel job added to the existing needs array. No existing job structure changes. Test in PR before merging. |
  | Web UI regressions | All new components get colocated .stories.tsx files. Existing components are modified minimally (add section to settings page, panel to drawer, badge to node enrichment). |
  | Performance degradation from per-action checks | Effective policy computed once at spawn, cached in state. Per-action checks are O(1) map lookups against five categories. NFR-4 budget (100ms) is easily met. |
  | Settings mapper/repository desync | Follow the established pattern: SettingsRow interface → toDatabase/fromDatabase → SQL column list. Verify all three are in sync per LESSONS.md. |
