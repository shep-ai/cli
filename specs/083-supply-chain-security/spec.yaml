name: "supply-chain-security"
number: 83
branch: "feat/083-supply-chain-security"
oneLiner: "Add a policy-driven security mode that constrains agent execution, validates dependency and release risk, and exposes security state in CI and the control center."
summary: >
  Add a phased security subsystem that introduces repository policy authoring,
  persisted effective security state, agent runtime guardrails, dependency and
  release-risk enforcement in CLI and CI, and security observability in the
  Control Center. The MVP is intentionally scoped to work with the current
  `gh`-based GitHub integration and existing executor stack, prioritizing
  advisory visibility, enforceable runtime controls, and publish-path
  protection before deeper GitHub App or external threat-intelligence
  integrations.
