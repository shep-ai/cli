openQuestions:
  - question: "What should be the default rollout posture for existing repositories?"
    resolved: true
    options:
      - option: "Disabled by default"
        description: "Existing repositories keep today's behavior until a user explicitly enables security mode, which minimizes rollout risk but provides no immediate visibility."
        selected: false
      - option: "Advisory by default"
        description: "Existing repositories immediately evaluate policy and surface findings, but blocking behavior only begins when users switch to enforce mode."
        selected: true
      - option: "Enforce by default"
        description: "All existing repositories begin blocking risky actions immediately, which maximizes security posture but creates a high regression risk given today's permissive executors."
        selected: false
    selectionRationale: "Advisory by default is the safest and most informative rollout path. It exposes security posture and violations immediately in CLI, CI, and the Control Center, while avoiding sudden breakage for repositories currently relying on permissive executor defaults. Teams can then opt into enforce mode once they have tuned policy and observed real findings."
    answer: "Advisory by default"
  - question: "How should security policy be authored and stored?"
    resolved: true
    options:
      - option: "Settings only"
        description: "Keep all policy in persisted settings, which is simple for local state but makes policy hard to review, version, and share across clones."
        selected: false
      - option: "Repository file only"
        description: "Store policy exclusively in a checked-in repo file, which is portable and reviewable but does not preserve local evaluation state or UI-driven defaults."
        selected: false
      - option: "Hybrid file plus settings"
        description: "Use a repository policy file as the reviewable source of rules while persisting effective mode, cached results, and local defaults in SQLite."
        selected: true
    selectionRationale: "Hybrid file plus settings matches the product surface already described in the analysis. Security rules need to be reviewable in git and portable across machines, but the product also needs local persistence for effective policy snapshots, last evaluation status, event history, and global defaults shown in the Control Center and settings UI."
    answer: "Hybrid file plus settings"
  - question: "How should risky agent actions be handled at runtime?"
    resolved: true
    options:
      - option: "Warn only"
        description: "Record risky actions and continue execution, which is simple but does not materially improve supply-chain safety."
        selected: false
      - option: "Approval gate plus deny list"
        description: "Block explicitly denied actions and route approval-required actions through existing human-in-the-loop interrupts before execution."
        selected: true
      - option: "Hard block everything"
        description: "Block all risky categories without exception, which maximizes safety but is too rigid for legitimate actions such as intentional dependency upgrades."
        selected: false
    selectionRationale: "Approval gate plus deny list provides meaningful protection without making the agent unusable. It reuses the repository's existing HITL pattern for operations like dependency installation, CI workflow edits, and publishing, while still allowing the policy engine to fail closed on explicitly forbidden actions."
    answer: "Approval gate plus deny list"
  - question: "What dependency-risk model should the MVP implement?"
    resolved: true
    options:
      - option: "Local heuristics only"
        description: "Evaluate repository-local signals such as lockfile consistency, dependency source type, lifecycle scripts, allowlists, and version-range policy without external services."
        selected: true
      - option: "Registry metadata plus heuristics"
        description: "Augment local checks with npm registry lookups for package age, ownership, or publish activity, which improves signal quality but adds network variability and failure modes."
        selected: false
      - option: "Third-party intel feeds"
        description: "Integrate external security or reputation feeds, which offers richer risk scoring but significantly expands scope, cost, and operational complexity."
        selected: false
    selectionRationale: "Local heuristics only is the right MVP because it is deterministic, fast, compatible with offline and CI environments, and does not require introducing new external dependencies or trust boundaries. The analysis already identifies the absence of existing dependency-intelligence integrations, so the initial requirement set should focus on enforceable checks Shep can own end to end."
    answer: "Local heuristics only"
  - question: "What GitHub governance scope should the MVP support?"
    resolved: true
    options:
      - option: "gh audit only"
        description: "Use the existing `gh`-backed integration to inspect repository state and report governance gaps without trying to mutate remote settings."
        selected: true
      - option: "Direct API enforcement"
        description: "Add direct GitHub API mutations for branch protection and related settings, which increases capability but requires new auth and error-handling scope."
        selected: false
      - option: "GitHub App enforcement"
        description: "Build governance enforcement around a GitHub App and webhook ingestion, which is the strongest long-term model but far beyond the current integration architecture."
        selected: false
    selectionRationale: "gh audit only is the only recommendation that fits the current architecture and feature scope. The repository already has local `gh` CLI integration but no GitHub App, no webhook storage, and no reconciliation layer. The MVP should therefore audit and surface governance issues instead of attempting remote enforcement it cannot support robustly yet."
    answer: "gh audit only"
  - question: "Which publish paths should be blocked by release-integrity failures?"
    resolved: true
    options:
      - option: "Main releases only"
        description: "Block semantic-release on `main` but allow PR dev publishes to continue, which lowers friction but leaves a bypass in the artifact supply chain."
        selected: false
      - option: "All publish jobs"
        description: "Block both semantic-release and PR dev publish paths whenever provenance or policy requirements are not satisfied."
        selected: true
      - option: "Warn only"
        description: "Surface integrity problems but never block publishing, which preserves throughput but fails the stated goal of release enforcement."
        selected: false
    selectionRationale: "All publish jobs should be blocked because any publish path can distribute artifacts outside the repository. Allowing dev publishes to bypass integrity controls would leave an obvious gap and make the security mode unreliable. The MVP should therefore enforce the same minimum release-integrity policy anywhere Shep initiates package publishing."
    answer: "All publish jobs"
  - question: "How much security history should the product retain and surface by default?"
    resolved: true
    options:
      - option: "Latest snapshot only"
        description: "Store and display only the current security state, which keeps implementation lean but removes audit context and trend visibility."
        selected: false
      - option: "90-day event history"
        description: "Persist and surface recent security findings, approvals, and release checks for a meaningful audit trail without turning the MVP into a long-term archive system."
        selected: true
      - option: "Permanent full history"
        description: "Retain every security event indefinitely, which maximizes traceability but increases storage, UI, and migration complexity."
        selected: false
    selectionRationale: "90-day event history is the best default balance for the MVP. It gives teams enough recent context to investigate policy violations, approval patterns, and release incidents while containing storage growth and keeping the UI focused. The retention window can remain configurable later without blocking the initial feature design."
    answer: "90-day event history"
content: |
  ## Problem Statement

  Shep already coordinates repository analysis, feature execution, approvals, CI watching, GitHub import, and automated publishing, but it does not treat supply-chain security as a first-class product concern. Security behavior is currently fragmented across executor defaults, workflow conventions, and ad hoc CI jobs. As a result, users cannot define a central Shep policy for risky actions, cannot evaluate dependency or release integrity in a consistent way, and cannot see a durable security state in the Control Center.

  The current baseline is intentionally permissive. Executor integrations use high-trust flags, there is no central policy engine, no action-level runtime guardrail for tasks like dependency installation or CI workflow edits, no persisted security-event model, and no first-class `shep security enforce` path for local or CI enforcement. The feature therefore needs a phased MVP that delivers reviewable policy authoring, effective-policy persistence, runtime guardrails, dependency and publish-risk enforcement, and UI visibility without requiring a new GitHub App or external threat-intelligence platform.

  ## Success Criteria

  - [ ] Repositories can define a reviewable security policy and Shep can compute a persisted effective security mode of `Disabled`, `Advisory`, or `Enforce` for each repository and feature run.
  - [ ] Invalid or contradictory security policy definitions fail validation with actionable error output that identifies the offending rule or field.
  - [ ] All agent execution entry points use the same effective policy, so create, start, resume, approve, reject, and unblock flows never fall back to permissive defaults when security mode is enabled.
  - [ ] Executors launched through `IAgentExecutorProvider` either satisfy the requested policy constraints or fail before execution with a clear security violation message.
  - [ ] Runtime attempts to install dependencies, edit CI or release files, or trigger publish-related actions are either blocked or routed through explicit approval according to policy.
  - [ ] `shep security enforce` evaluates repository security posture, prints a human-readable summary, supports machine-readable output, and exits non-zero when enforce-mode checks fail.
  - [ ] CI runs the security enforcement flow on pull requests and before every Shep-managed publish path, and publish jobs stop when required release-integrity checks fail.
  - [ ] Security findings, approval events, and release-integrity results are persisted and visible in the Control Center and repository drawer without requiring direct database inspection.
  - [ ] The settings experience shows the current mode, the effective policy source, the last evaluation outcome, and the most recent high-severity findings.
  - [ ] New or changed web UI components introduced for this feature have colocated Storybook stories.
  - [ ] The MVP ships without requiring a GitHub App, webhook ingestion, or third-party threat-intelligence service.

  ## Functional Requirements

  - **FR-1**: The system must introduce a security domain model in TypeSpec for security mode, policy rules, dependency findings, release-integrity findings, security events, approval decisions, and effective-policy summaries. Generated output must remain the source of truth for all durable security data.
  - **FR-2**: The product must support three effective security modes: `Disabled`, `Advisory`, and `Enforce`. Existing repositories must default to `Advisory`, and mode changes must be persisted through the existing settings persistence flow.
  - **FR-3**: The MVP must support hybrid policy authoring. Repository-scoped rules must be readable from a reviewable repo file such as `shep.security.yaml`, while SQLite-backed settings persist global defaults, effective-policy snapshots, last evaluation status, and recent event history.
  - **FR-4**: Policy evaluation must define deterministic precedence. Global defaults are applied first, repository policy rules refine them second, and feature-run state persists the final effective policy used for that execution. A lower-precedence layer must not silently weaken a stricter higher-precedence deny rule during the same run.
  - **FR-5**: The application must expose a central policy-evaluation abstraction that all runtime guardrails, CLI enforcement, and UI projections use. No executor, node, or workflow may implement its own divergent security-rule interpretation.
  - **FR-6**: `IAgentExecutorProvider` and the executor contract must support security-aware execution. Before launching an agent, Shep must evaluate whether the selected executor can satisfy the requested sandbox, approval, and tool restrictions. In `Enforce` mode, executors that require unsafe flags incompatible with policy must fail closed instead of launching permissively.
  - **FR-7**: The feature-agent runtime must classify and gate at least these action categories: dependency installation or upgrade, package-manager script execution, CI or release workflow modification, publish or release actions, and explicit sandbox-escalation requests. Each category must be configurable as allowed, denied, or approval-required.
  - **FR-8**: When runtime policy marks an action as approval-required, the feature agent must route the decision through the existing human-in-the-loop approval mechanism and persist the resulting approval or rejection as a security event tied to the feature run.
  - **FR-9**: When runtime policy marks an action as denied, the feature agent must block the action before execution, record a security violation event, and surface a remediation message that explains which rule caused the block.
  - **FR-10**: The MVP dependency-risk evaluator used by CLI and CI must operate without third-party threat-intelligence services. It must evaluate repository-local security signals including manifest-lockfile consistency, dependency source type, presence of risky package-manager lifecycle scripts, allowlist or denylist violations, and policy violations around version-range strictness.
  - **FR-11**: The CLI must provide `shep security enforce` for repository evaluation. The command must read the effective policy, execute dependency and release-integrity checks, print a readable summary, support structured output for CI consumption, and return an exit status that distinguishes pass from enforce-mode failure.
  - **FR-12**: The security enforcement flow must support both local execution and CI execution against the same policy inputs so that developers and GitHub Actions evaluate the same repository state using the same rule engine.
  - **FR-13**: CI workflows must invoke the security enforcement flow on pull requests and before all Shep-managed publish jobs. A failing enforce-mode result must block the associated workflow job from reporting success.
  - **FR-14**: Release-integrity enforcement must verify that Shep-managed publish paths meet policy requirements for trusted publishing or equivalent provenance configuration before publishing. If the required release-integrity prerequisites are missing, the publish path must fail before artifact publication.
  - **FR-15**: The MVP GitHub governance check must audit, not mutate, remote repository state. Where policy includes branch protection, CODEOWNERS, or workflow-governance expectations, Shep must report the gap using the existing `gh`-based integration and mark unsupported remote enforcement as audit-only.
  - **FR-16**: Security findings and events must be persisted with repository scope, optional feature scope, severity, decision type, actor or source, timestamp, and remediation summary so the Control Center and CLI can show current state and recent history without re-running every check.
  - **FR-17**: The Control Center, repository drawer, and settings UI must surface the effective security mode, last enforcement result, highest-severity open findings, recent approval or denial events, and release-integrity status using projection-driven data from existing server-action and DI patterns.
  - **FR-18**: If the spec initializer creates default repository artifacts for new features or repositories, it must be able to scaffold a baseline security policy file that matches the supported MVP rule schema.
  - **FR-19**: The implementation must preserve the current architecture rule that agent resolution flows through `IAgentExecutorProvider`. Security mode may constrain or veto executor choice, but it must not introduce agent-type hardcoding in workflows, nodes, or presentation code.

  ## Non-Functional Requirements

  - **NFR-1**: Security schema and persistence changes must be additive and backward compatible. New SQLite migrations must not drop or rename existing columns, and switching branches must not break older code paths that still read prior schema.
  - **NFR-2**: Policy evaluation must be deterministic. Given the same repository contents, settings, and policy file, local CLI, CI, and runtime checks must produce the same effective policy and the same pass or fail decision.
  - **NFR-3**: In `Enforce` mode, the system must fail closed. If a required security check cannot run or an executor cannot satisfy the requested restrictions, Shep must report the result as blocked or unknown instead of silently passing.
  - **NFR-4**: `shep security enforce` must complete in under 10 seconds on a typical single-repository workspace when using only repository-local checks and no network lookups. Individual runtime policy decisions during agent execution must add no more than 100 milliseconds of overhead per gated action.
  - **NFR-5**: Security error messages must be actionable and user-facing. Validation failures, blocked actions, and CI failures must identify the relevant rule, severity, and remediation path without exposing raw stack traces as the primary message.
  - **NFR-6**: Security observability must retain at least 90 days of event history by default and present results in chronological order, while allowing future retention tuning without requiring another domain-model redesign.
  - **NFR-7**: The policy engine and enforcement logic must remain centrally testable through unit and integration tests. No critical behavior may depend solely on prompt text or executor-specific string matching without application-layer test coverage.
  - **NFR-8**: New web UI introduced for this feature must preserve the existing Control Center visual language, resolve data through server actions and DI, and include colocated `.stories.tsx` files for every new component.
  - **NFR-9**: The MVP must not depend on a GitHub App, webhook ingestion, or paid external intelligence provider. Any unavailable external signal must be represented explicitly as unsupported or unknown rather than inferred as compliant.
  - **NFR-10**: The feature must be implemented with TDD across the affected layers. Unit tests must cover policy parsing and evaluation, integration tests must cover persistence and CLI or CI enforcement paths, and end-to-end coverage must cover the primary security state surfaces shown in the web UI.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | What should be the default rollout posture for existing repositories? | Advisory by default | This exposes findings immediately without breaking repositories that still rely on permissive executor defaults. |
  | 2 | How should security policy be authored and stored? | Hybrid file plus settings | Security rules stay reviewable in git, while effective state, defaults, and event history remain available locally in SQLite and the UI. |
  | 3 | How should risky agent actions be handled at runtime? | Approval gate plus deny list | This reuses existing HITL approvals for legitimate sensitive actions while still failing closed on explicitly forbidden behavior. |
  | 4 | What dependency-risk model should the MVP implement? | Local heuristics only | It is deterministic, testable, and does not require new external services or network dependencies. |
  | 5 | What GitHub governance scope should the MVP support? | gh audit only | The current architecture can inspect state through `gh` but cannot yet support reliable remote enforcement via a GitHub App. |
  | 6 | Which publish paths should be blocked by release-integrity failures? | All publish jobs | Any bypassable publish path weakens the supply-chain model, so main and dev publishes should follow the same minimum policy. |
  | 7 | How much security history should the product retain and surface by default? | 90-day event history | This provides a useful audit window without expanding the MVP into a permanent archival system. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `tsp/domain/entities/settings.tsp` and new TypeSpec security models | High | Security policy, risk reports, security events, and any security-mode defaults must start in TypeSpec because generated domain types are the source of truth. |
  | `packages/core/src/domain/factories/settings-defaults.factory.ts` | High | New security defaults and opt-in security mode behavior originate here and currently have no equivalent fields. |
  | `packages/core/src/infrastructure/persistence/sqlite/mappers/settings.mapper.ts`, `packages/core/src/infrastructure/repositories/sqlite-settings.repository.ts`, `packages/core/src/infrastructure/persistence/sqlite/migrations/` | High | Persisted security settings or event data require flattened columns, hardcoded SQL updates, and additive migrations. |
  | `packages/core/src/application/ports/output/agents/agent-executor.interface.ts` | High | The agent port has no first-class contract for policy evaluation, security violations, sandbox level, or restricted tool execution. |
  | `packages/core/src/infrastructure/services/agents/common/executors/` | High | Current executor implementations launch agents in permissive modes, so security mode must either wrap or reconfigure these integrations. |
  | `packages/core/src/infrastructure/services/agents/feature-agent/` | High | Runtime interception, approval requirements for risky actions, policy-aware prompts, and security event emission belong in the worker, graph, nodes, and state channels. |
  | `packages/core/src/application/use-cases/features/` and `packages/core/src/application/use-cases/agents/` | High | Feature creation, start, resume, approve, reject, and unblock flows must thread effective security policy and approval context through every spawn and resume path. |
  | `packages/core/src/infrastructure/services/spec/spec-initializer.service.ts` | Medium | If the MVP scaffolds `shep.security.yaml` or related policy files for new repositories or features, this service owns the default template generation. |
  | `src/presentation/cli/index.ts` and `src/presentation/cli/commands/` | High | The `shep security enforce` flow and any security inspection commands need new CLI wiring here. |
  | `src/presentation/web/app/actions/`, `src/presentation/web/app/build-graph-nodes.ts`, `src/presentation/web/components/features/control-center/`, `src/presentation/web/components/features/settings/`, `src/presentation/web/components/common/repository-node/repository-drawer.tsx` | High | The existing Control Center and settings UI are the natural surfaces for security overview, dependency risk, agent activity, alerts, and release integrity. |
  | `.github/workflows/ci.yml` and `release.config.mjs` | High | CI-only publishing, policy enforcement, provenance verification, and gating release jobs all require workflow and release-path changes. |
  | `packages/core/src/infrastructure/services/external/github-repository.service.ts` and `packages/core/src/application/ports/output/services/github-repository-service.interface.ts` | Medium | Repo enforcement can reuse current `gh` CLI access for audit-style checks, but full branch-protection enforcement will remain out of scope for the MVP. |
  | `tests/unit/`, `tests/integration/`, `tests/e2e/` | High | The repository mandates TDD, and this feature spans core services, CLI behavior, workflow execution, CI integration, and new web components. |

  ## Dependencies

  This feature depends on the following existing infrastructure:

  - The TypeSpec-first domain pipeline in `tsp/` and generated output in `packages/core/src/domain/generated/output.ts`.
  - The global settings singleton plus SQLite-backed repositories and additive Umzug migrations.
  - The agent abstraction stack: `IAgentExecutorProvider`, executor factory, detached feature-agent worker, LangGraph state, and phase approval logic.
  - Existing git and GitHub integrations: `IGitPrService`, `IGitHubRepositoryService`, the local `gh` CLI, and repository import or sync flows.
  - Existing web projections and settings update flow: server actions resolve use cases from DI, then feed the Control Center canvas and drawers.
  - Existing CI and release automation in GitHub Actions, semantic-release, `RELEASE_TOKEN`, and `NPM_TOKEN`.
  - Existing approval-gate UX from feature 016, which the MVP can reuse for approval-required security actions.
  - Existing CI-watch plumbing from feature 062, which can surface enforcement outcomes without requiring a new webhook ingestion layer.

  Important dependency gaps and explicit MVP constraints:

  - There is no existing policy-engine abstraction today, so this feature must introduce one centrally rather than scattering logic across executors and workflows.
  - There is no persisted security-event or risk-report model today, so persistence, mapping, and projection layers must all be extended together.
  - There is no GitHub App or webhook ingestion layer for remote governance enforcement or anomaly detection, so the MVP is limited to `gh`-based audit checks and local workflow inspection.
  - There is no external dependency-intelligence integration today, so dependency risk scoring must rely on repository-local heuristics for the MVP.
  - Release-integrity enforcement must build on the existing GitHub Actions and semantic-release pipeline rather than introducing a separate release platform.

  ## Size Estimate

  **XL** — Even with the narrowed MVP, this feature remains cross-cutting. It requires new TypeSpec models, settings and event persistence, a central policy engine, executor contract changes, runtime enforcement in the feature agent, a new CLI enforcement path, CI and release gating, and new Control Center surfaces. The scope is intentionally capped at `gh`-based audit checks and local heuristics, but the implementation still spans nearly every architectural layer in the product.
