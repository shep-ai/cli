content: |
  ## Summary

  This breakdown contains 34 tasks across 7 phases, estimated at approximately 40 hours
  of implementation effort.

  The work begins with the type foundation in Phase 1: TypeSpec security models, settings
  extension, SQLite migrations, and mapper/factory updates. This produces zero runtime
  behavior but establishes the generated types that every subsequent phase depends on.

  Phase 2 builds the central policy engine (ISecurityPolicyService) with file reading,
  validation, deterministic evaluation, and event persistence. This is the core abstraction
  that all consumers share.

  Phase 3 delivers the first user-facing value: the shep security enforce CLI command
  backed by DependencyRiskEvaluator and ReleaseIntegrityEvaluator. Developers can evaluate
  their repository security posture locally and in CI.

  Phase 4 is the most complex phase, threading security policy through the entire agent
  execution pipeline: executor constraints, state channels, all spawn sites, worker args,
  and pre-execution checks in executeNode(). This follows the per-feature flag threading
  pattern established in LESSONS.md.

  Phase 5 adds GitHub governance auditing via the existing gh CLI, reporting branch
  protection and CODEOWNERS gaps as advisory-only findings.

  Phase 6 creates the web UI surfaces: settings section with mode selector, repository
  drawer security panel, and Control Center security badge. All components get Storybook
  stories.

  Phase 7 completes the loop with CI integration: a security-enforce job gates the release
  pipeline, and the spec initializer gains a policy file scaffold for new repositories.

  Every task follows TDD (RED-GREEN-REFACTOR) and explicitly tests the boundaries defined
  in the acceptance criteria. Dependencies are strictly ordered — no task depends on a later
  task, and each phase builds on the foundation established by previous phases.
