content: |
  ## Executive Summary

  The POST /api/tools/[id]/install endpoint returns 404 errors despite the route file,
  DI registrations, and frontend code all appearing correct. Investigation reveals the
  route structure matches the working sibling /api/tools/[id]/launch route exactly.
  The root cause requires diagnostic logging to distinguish between route discovery
  failure (Turbopack not compiling the route) vs. handler execution failure (TOOL_METADATA
  check returning 404 for valid tool IDs).

  ## Technology Decisions

  ### 1. Diagnostic Approach

  **Chosen:** Add console.log at the start of POST handler

  **Rejected:**
  - Examine .next build output — slower feedback loop, doesn't distinguish route discovery vs. execution
  - Use curl directly — still won't reveal if handler is invoked

  **Rationale:** Console logging at handler start instantly reveals whether Next.js invokes
  the route or returns 404 from the router itself. This takes seconds to implement and
  provides clear signal for the next debugging step.

  ### 2. TOOL_METADATA Validation

  **Chosen:** Verify TOOL_METADATA is populated before returning 404

  **Rejected:**
  - Remove validation — breaks error handling for invalid tool IDs
  - Hardcode tool IDs — violates DRY, creates maintenance burden

  **Rationale:** The handler's `if (!TOOL_METADATA[id])` check is the most likely source of
  the 404. If TOOL_METADATA loads as an empty object (path resolution issue with Turbopack),
  all tool IDs would fail validation. Logging the TOOL_METADATA contents reveals the cause.

  ### 3. Route Handler Pattern

  **Chosen:** Keep existing pattern matching sibling launch route

  **Rejected:**
  - Use route groups — unnecessary complexity for identical pattern
  - Switch to Pages Router — inconsistent with App Router architecture

  **Rationale:** Both routes use identical patterns. The launch route works, so the pattern
  is valid. Focus investigation on what differs between the routes, not the shared pattern.

  ### 4. DI Container Access

  **Chosen:** Continue using string token resolution via server-container.ts

  **Rejected:**
  - Import class directly — Turbopack cannot bundle tsyringe, would fail
  - Separate container per route — duplicates initialization, harder to maintain

  **Rationale:** String tokens are the established pattern for Turbopack compatibility.
  InstallToolUseCase is registered at container.ts:368-370. This matches all other routes.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | Next.js App Router | Dynamic API routes | Use | Standard routing for the web app, no change needed |
  | tsyringe | DI container | Use (string tokens only) | Already configured, works when using string tokens |
  | TOOL_METADATA | Tool validation | Investigate | Main suspect for 404 — may not be loading in Turbopack context |

  ## Security Considerations

  - **Tool ID validation**: Route validates tool ID against TOOL_METADATA whitelist before
    executing installation. This prevents arbitrary command execution via tool ID injection.
  - **DI container access**: Container is initialized by trusted CLI/dev-server bootstrap,
    not by untrusted request data. String tokens are safe against injection.
  - **No new attack surface**: Fix involves diagnostic logging and potential path resolution
    correction, not new functionality.

  ## Performance Implications

  - **Diagnostic logging**: Minimal overhead, should be removed or gated behind DEBUG flag
    after root cause is identified and fixed.
  - **TOOL_METADATA loading**: Currently synchronous at module load time. If this causes
    slow route startup, consider lazy loading, but this is not the primary issue.
  - **NFR-1 compliance**: Response time requirement (<200ms for health check) should be
    met easily since the handler is lightweight; actual installation is a separate concern.

  ## Architecture Notes

  ### Route Structure
  ```
  src/presentation/web/app/api/tools/
  ├── route.ts                    # GET /api/tools (list all tools)
  └── [id]/
      ├── install/
      │   └── route.ts            # POST /api/tools/[id]/install (this route)
      └── launch/
          └── route.ts            # POST /api/tools/[id]/launch (working sibling)
  ```

  ### Data Flow
  ```
  Frontend (tool-card.tsx)
       │ fetch('/api/tools/zed/install', { method: 'POST' })
       ▼
  Next.js App Router
       │ routes to [id]/install/route.ts
       ▼
  POST handler
       │ 1. Extract id from params
       │ 2. Check TOOL_METADATA[id]  ← LIKELY FAILURE POINT
       │ 3. resolve('InstallToolUseCase')
       │ 4. useCase.execute(id)
       ▼
  InstallToolUseCase
       │ delegates to IToolInstallerService
       ▼
  ToolInstallerServiceImpl
       │ executes platform-specific installation command
       ▼
  Response JSON
  ```

  ### Key Difference from Launch Route

  The install route imports and uses `TOOL_METADATA`:
  ```typescript
  // install/route.ts
  import { TOOL_METADATA } from '@shepai/core/infrastructure/services/tool-installer/tool-metadata';
  // ...
  if (!TOOL_METADATA[id]) {
    return NextResponse.json({ error: 'Tool not found' }, { status: 404 });
  }
  ```

  The launch route does NOT import TOOL_METADATA — it delegates tool validation to the use case:
  ```typescript
  // launch/route.ts
  // No TOOL_METADATA import
  const result = await useCase.execute({ toolId: id, ... });
  if (result.code === 'tool_not_found') {
    return NextResponse.json({ error: 'Tool not found' }, { status: 404 });
  }
  ```

  This import difference is the primary suspect. If Turbopack fails to resolve the
  TOOL_METADATA import path, the entire route module may fail to load, resulting in
  a 404 from the Next.js router (not from the handler).

  ## Implementation Recommendation

  1. **Diagnostic Phase** (required first)
     - Add `console.log('[install route] POST handler invoked, id:', id);` at line 11
     - Add `console.log('[install route] TOOL_METADATA keys:', Object.keys(TOOL_METADATA));` at line 12
     - Start dev server and call the endpoint
     - Check server logs for output

  2. **Based on Diagnostic Results**
     - **If no logs appear**: Route not discovered. Check Turbopack compilation. May need
       to clear .next cache or adjust import path for TOOL_METADATA.
     - **If logs appear with empty TOOL_METADATA**: Path resolution issue. Fix the
       import path or use a different loading mechanism.
     - **If logs appear with populated TOOL_METADATA but tool ID missing**: Verify the
       tool JSON file exists and is valid (e.g., zed.json).
     - **If logs appear and tool ID exists**: Something else in handler logic fails.
       Add more logging around DI resolution and use case execution.

  3. **Fix Implementation**
     - Address the specific issue identified by diagnostics
     - Remove or gate diagnostic logging behind DEBUG flag
     - Add unit test for the API route
     - Verify fix works in both dev (Turbopack) and production (webpack) modes

  ## Risk Assessment

  | Risk | Likelihood | Impact | Mitigation |
  | ---- | ---------- | ------ | ---------- |
  | Turbopack-specific issue | Medium | Medium | Test in production build too |
  | TOOL_METADATA path resolution | High | High | Log and verify import works |
  | Breaking launch route during fix | Low | High | Don't modify shared code without testing both routes |
  | Regression in future | Low | Medium | Add integration test for install endpoint |

  ---

  _Research completed 2026-03-02. Proceed to planning phase._
