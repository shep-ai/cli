content: |
  ## Summary

  This task breakdown implements a diagnostic-first approach to fixing the 404 error
  on the tool install endpoint. The work is organized into three phases:

  **Phase 1: Diagnostic & Root Cause Analysis**
  First, we add targeted logging to both the route handler and the TOOL_METADATA loader
  to identify whether the 404 comes from Next.js not discovering the route or from the
  handler's validation logic failing. Tasks 1-2 can run in parallel, followed by task 3
  which analyzes the results.

  **Phase 2: Fix Implementation**
  With diagnostic data in hand, we implement the minimal targeted fix. The most likely
  scenario is TOOL_METADATA path resolution failing in Turbopack context due to
  `import.meta.url` resolving differently. Task 4 includes writing a failing test first
  (TDD RED) before implementing the fix (GREEN).

  **Phase 3: Testing & Verification**
  We add unit tests for the route handler to prevent regression, remove the diagnostic
  logging, and verify the fix works in both development (Turbopack) and production
  (webpack) modes. This ensures NFR-3 compliance.

  The total estimated effort is 2 hours, appropriate for an "S" sized bug fix task.

  ---

