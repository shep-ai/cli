content: |
  ## Architecture Overview

  This feature extends the existing deployment pipeline (spec 045) with a two-mode
  analysis system while preserving backward compatibility. The architecture follows
  Clean Architecture bottom-up: domain types define the shape, persistence stores
  the cache, services implement the logic, and presentation provides the UI.

  The key architectural addition is a **DevEnvironmentAnalyzerService** that sits
  between the server actions and DeploymentService. It encapsulates mode detection
  (fast vs agent), cache lookup/storage, and analysis execution. The existing
  DeploymentService gains a new `startWithAnalysis()` entry point that accepts
  pre-computed analysis results instead of calling `detectDevScript()` directly.

  ### Data Flow

  ```
  User clicks Deploy
    -> useDeployAction (mode selection)
    -> Server action: analyze-repository
      -> RepoCacheKeyResolver.resolve(cwd) -> cacheKey
      -> IDevEnvAnalysisRepository.findByCacheKey(cacheKey)
      -> If cached: return cached analysis
      -> If not cached:
        -> DevEnvironmentAnalyzerService.analyze(path, mode)
          -> If fast: detectDevScript() -> build DevEnvironmentAnalysis
          -> If agent: pre-read config files -> StructuredAgentCaller.call()
        -> IDevEnvAnalysisRepository.save(analysis)
        -> Return analysis
    -> Server action: deploy-feature / deploy-repository
      -> DeploymentService.startWithAnalysis(targetId, analysis)
        -> If canStart: false -> set state NotStartable, no spawn
        -> If canStart: true -> spawn first command, attach listeners
    -> UI updates via polling (existing pattern)
  ```

  ## Key Design Decisions

  ### 1. StructuredAgentCaller over LangGraph

  Repo analysis is a single-shot task. The existing StructuredAgentCallerService
  handles native structured output and JSON fallback parsing. Pre-reading config
  files (package.json, pyproject.toml, Cargo.toml, etc.) into the prompt gives
  the agent all necessary context without tool-use loops. This avoids StateGraph
  complexity and keeps testing deterministic.

  ### 2. Unified Cache for Both Modes

  Both fast-path and agent results are stored in the same SQLite table with a
  `source` field (fast-path | agent | manual). This gives a single data model,
  single repository, single editor UI. When a user edits a fast-path result, it
  becomes source=manual. No divergent code paths for cached vs live detection.

  ### 3. First Command Only Execution

  The analysis returns an ordered commands array, but DeploymentService only
  executes the first (primary) command. This aligns with the current single-process-
  per-target architecture. Additional commands are stored for user reference and
  future multi-process support. Users can reorder commands via the cache editor.

  ### 4. Additive Refactoring via startWithAnalysis()

  DeploymentService.start() is preserved unchanged. A new startWithAnalysis()
  method accepts DevEnvironmentAnalysis and spawns from the first command. The
  refactored deploy server actions resolve analysis first, then call
  startWithAnalysis(). This avoids breaking existing callers.

  ### 5. Cache Key: Git Remote URL with Root Repo Path Fallback

  The cache key uses `git remote get-url origin` (primary) or `git rev-parse
  --git-common-dir` (fallback for repos without a remote). This ensures all
  worktrees of the same repo share one cache entry, since worktrees live at
  different filesystem paths but share the same git remote and root repo.

  ### 6. TypeSpec Models Follow Deployment Module Pattern

  The existing Deployment and DeploySkill models define id and createdAt directly
  (they do NOT extend BaseEntity). DevEnvironmentAnalysis follows this same
  pattern for consistency within the deployment module.

  ### 7. Config File Pre-reading Strategy

  A fixed list of known config files (package.json, pyproject.toml, Cargo.toml,
  go.mod, Gemfile, pom.xml, build.gradle, Dockerfile, docker-compose.yml,
  Makefile, requirements.txt, etc.) is read before the agent call. A shallow
  directory listing (depth 1-2, excluding node_modules/.git/dist/build) provides
  structural context. Deterministic inputs enable reliable testing.

  ## Implementation Strategy

  The six phases build bottom-up through the Clean Architecture layers:

  **Phase 1 (Domain)** establishes the type system. All subsequent code depends
  on these generated types, so this must come first.

  **Phase 2 (Persistence)** creates the SQLite table and data access layer. The
  analyzer service needs the repository to cache results.

  **Phase 3 (Cache Key)** is a standalone utility returning a plain string. It
  has no dependency on phase 1-2 types but is sequenced after for clarity.

  **Phase 4 (Services)** is the core logic phase. The analyzer service combines
  cache key resolution, repository access, fast-path detection, and agent calls.
  DeploymentService refactoring also happens here.

  **Phase 5 (Server Actions)** wires the services to the web layer. Must follow
  phase 4 since actions call the analyzer service.

  **Phase 6 (UI)** builds the user-facing components. Must follow phase 5 since
  components call server actions.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Agent returns invalid/incomplete analysis | StructuredAgentCallerService handles parse failures via StructuredCallError. Validate required fields (canStart, language, commands when canStart=true) before caching. Return user-visible error on failure. |
  | TypeSpec compilation breaks existing types | Run `pnpm tsp:compile` after each TypeSpec change. New models are additive (new files + new enum values). Only existing modification is adding NotStartable to DeploymentState enum. |
  | Migration 040 conflicts with concurrent features | Check for existing migration 040 before naming. Use CREATE TABLE IF NOT EXISTS for idempotent migration. |
  | DeploymentService refactoring breaks existing deploys | Preserve existing start() method unchanged. New startWithAnalysis() is additive. Existing server actions continue to work until updated in phase 5. |
  | Cache key resolution fails in edge cases | Three-level fallback: remote URL, root repo path, working directory path. Each level has try/catch. Unit tests cover all three paths plus error cases. |
  | Agent analysis takes too long | UI shows analyzing spinner with cancel button (FR-21). StructuredAgentCaller has configurable maxTurns. 30-second timeout enforced at server action level. |
  | NotStartable state confuses existing UI consumers | NotStartable is a new enum value. Existing code switching on Booting/Ready/Stopped falls through to default/null handling safely. Only updated components explicitly handle NotStartable. |
