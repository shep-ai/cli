content: |
  ## Summary

  The implementation spans 22 tasks across 6 phases, building bottom-up through
  the Clean Architecture layers. The first phase establishes the TypeSpec domain
  models that all subsequent code depends on. Phase 2 creates the persistence
  layer (migration, mapper, repository) for caching analysis results. Phase 3
  builds the standalone cache key resolver. Phase 4 is the largest phase,
  implementing the core analyzer service, config file reader, deployment service
  refactoring, and DI registration. Phase 5 wires everything to the web layer
  via server actions and hook extensions. Phase 6 builds the user-facing
  components with Storybook stories.

  Each code task follows TDD: write failing tests first (RED), implement minimal
  code to pass (GREEN), then clean up (REFACTOR). Non-code tasks (interface
  definitions, TypeSpec models) skip TDD since they are validated by compilation.

  The dependency graph ensures no task references work that has not been completed
  in a prior task. The phases are strictly ordered (no parallel phases) to
  maintain a clear progression and avoid integration surprises.

  Estimated total effort is approximately 16 hours of implementation time.
