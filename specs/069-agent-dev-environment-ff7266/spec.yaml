oneLiner: >
  Replace the simple script-only DeploymentService with an agent-based dev
  environment that analyzes any repo, caches results per-repo, supports a fast
  path for recognized projects, and correctly reports when there is nothing to
  start
userQuery: >
  The current deployment env feature is simple stupid. lets introduce agent
  based deployment. so it could start dev env for any repo. it should have some
  level of cache per repo so it would be fast. it should support all languages
  and be basically an agent for that. there are some repos which is basically
  impossible to start local dev server as there is no server or ui maybe its
  just a script in such case the agent should respond that there is nothing to
  start. The user should be able to select to run with "fast path" or non
  agentic. If we recognize it has package.json with basic start dev / start the
  cache invalidation should be manual. Should the user be able to override or
  edit the cached analysis result? Full Manual.
summary: >
  Replace the current hard-coded Node.js-only DeploymentService
  (detect-dev-script + spawn) with a two-mode system: (1) a "fast path" that
  reuses the existing deterministic package.json detection for recognized
  Node.js projects, and (2) an agent-based path that uses IAgentExecutor (via
  StructuredAgentCaller) to analyze any repository — regardless of language or
  framework — and produce a structured DevEnvironmentAnalysis (commands, ports,
  prerequisites). Analysis results are cached per-repo in SQLite keyed by git
  remote URL (falling back to root repo absolute path for non-git repos), with
  manual-only invalidation and full manual editing. Repos with no startable
  server/UI get a clear "nothing to start" response.
phase: Requirements
sizeEstimate: L
