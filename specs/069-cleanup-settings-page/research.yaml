        selected: false
      - option: Keep buildAgentPayload but simplify it to only handle agentType
        description: >-
          Simplify buildAgentPayload to only handle the type field since that is
          the only agent setting the user can change. Remove authMethod and token
          logic entirely. The function becomes { agent: { type: merged.type } }.
        selected: true
      - option: Remove buildAgentPayload entirely and inline the save call
        description: >-
          Since the only agent setting is type, inline the save payload at the
          call site. This eliminates the helper function. However, the function
          may be called from multiple places.
        selected: false
    selectionRationale: >
      buildAgentPayload is called when the agent type changes. After removing
      authMethod and token dead code, the only agent setting the user can change
