content: |
  ## Technology Decisions

  ### 1. Dead Code Removal Strategy for Auth Method Row

  **Chosen:** Remove the entire auth method SettingsRow, AUTH_METHOD_OPTIONS constant, authMethod variable, token/showToken state, unreachable token input JSX, and token logic in buildAgentPayload — all in a single pass.

  **Rejected:**
  - Replace with read-only display — the auth method is set programmatically and showing it adds no user value
  - Keep disabled row and only remove token code — "Coming soon" tooltip on disabled control is confusing dead UI

  **Rationale:** The disabled auth method Select is dead UI. All code behind `authMethod === AgentAuthMethod.Token` is unreachable since default is `Session` and no UI changes it. Safe single-pass removal since nothing else depends on these variables.

  ### 2. Import Cleanup After Auth Method Removal

  **Chosen:** Remove Eye, EyeOff, Tooltip*, AgentAuthMethod imports. Keep Select imports (used by editor/shell/terminal selects).

  **Rejected:**
  - Leave all imports — fails lint
  - Remove Select too — still used in 3 other selects

  **Rationale:** Grep confirms Eye/EyeOff only in token toggle, Tooltip* only in auth row, AgentAuthMethod only in dead code. Select used at lines 809, 849, 883.

  ### 3. New Notification Toggle Pattern

  **Chosen:** Add two SwitchRow components after prChecksFailed, using identical pattern: label, id, testId, checked from events state, onChange spreads events + saves via buildNotificationPayload.

  **Rejected:**
  - New reusable event toggle component — over-engineering for 2 additions
  - Data-driven toggle rendering — refactor beyond cleanup scope

  **Rationale:** events state already contains prBlocked and mergeReviewReady (initialised from settings at line 441). buildNotificationPayload already serialises the full events object. Zero new infrastructure needed.

  ### 4. Storybook Story Updates

  **Chosen:** Clean up AllSections story to remove authMethod/token agent config. Default story already covers new toggles via createDefaultSettings() defaults.

  **Rejected:**
  - New dedicated notification story — existing stories render full page
  - Remove AllSections — still tests valid non-default configs

  **Rationale:** AllSections references `authMethod: Token` and `token:` which map to removed UI. Default story uses factory that already includes prBlocked: true and mergeReviewReady: true.

  ### 5. Unit Test Updates

  **Chosen:** No structural test changes needed. Existing tests verify section-level rendering, not individual toggles. New toggles render within existing tested sections.

  **Rejected:**
  - Add comprehensive toggle interaction tests — inconsistent with existing test coverage level
  - Rewrite tests — unnecessary, existing tests are valid

  **Rationale:** No tests assert on auth method row or individual notification toggles. Section-level testIds remain unchanged.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | shadcn/ui Switch | Toggle component for new events | Use (existing) | Already used by all 9 existing event toggles; no new dependency |
  | shadcn/ui Tooltip | Was wrapping auth method Select | Remove usage | Only used in auth method row being removed |
  | lucide-react Eye/EyeOff | Was showing/hiding token | Remove usage | Only used in unreachable token input block |
  | AgentAuthMethod enum | Was used in auth options and dead checks | Remove import | No remaining usage after dead code removal |

  No new libraries or dependencies are introduced by this change.

  ## Security Considerations

  - **No security impact.** The token input field being removed was unreachable dead code — the condition `authMethod === AgentAuthMethod.Token` could never be true since the default is `Session` and no UI allows changing it. Removing it eliminates a potential future vector if the field were ever accidentally enabled without proper validation.
  - The new notification toggles control boolean preferences only — no sensitive data, no authentication flows, no external API calls.

  ## Performance Implications

  - **Bundle size decrease (marginal).** Removing dead JSX (token input, auth method Select, Tooltip wrapper) and unused imports (Eye, EyeOff, Tooltip components) will slightly reduce the component bundle. If Tooltip is tree-shaken out entirely (only import site), the savings could be meaningful.
  - **No runtime overhead.** The two new SwitchRow components are lightweight — same as existing toggles. The events state object already tracks 9 events; going to 11 has negligible memory impact. No additional re-renders since the pattern is identical.
  - **Auto-save latency unchanged.** New toggles use the same `save(buildNotificationPayload(...))` path as existing toggles — no additional network calls or state management overhead (NFR-2 satisfied).

  ## Architecture Notes

  This change is entirely within the **Presentation layer** (`src/presentation/web/`). It does not cross any Clean Architecture boundaries:

  - **Domain layer**: No changes. `NotificationEventConfig` already includes `prBlocked` and `mergeReviewReady` fields. `AgentAuthMethod` enum remains in the domain for use by agent configuration code — only the UI import is removed.
  - **Application layer**: No changes. `updateSettingsAction` already handles the full settings payload including all notification events.
  - **Infrastructure layer**: No changes. `notification.service.ts` already maps PrBlocked and MergeReviewReady events. `settings.mapper.ts` already persists all notification event fields.
  - **Presentation layer**: Only `settings-page-client.tsx`, its stories, and tests are modified.

  ### Files to Modify

  | File | Changes |
  | ---- | ------- |
  | `settings-page-client.tsx` | Remove auth row (lines ~696-757), AUTH_METHOD_OPTIONS (lines ~52-55), authMethod/token/showToken state (lines ~367-369), token logic in buildAgentPayload (lines ~496-500), unused imports. Add 2 SwitchRow toggles after line ~1438. |
  | `settings-page-client.stories.tsx` | Remove `authMethod: Token` and `token:` from AllSections story agent config |
  | `settings-page-client.test.tsx` | No changes expected — existing tests don't assert on removed or added elements |

  ### New Toggle Specifications

  | Field | ID | TestID | Label | Position |
  | ----- | -- | ------ | ----- | -------- |
  | prBlocked | notif-event-prBlocked | switch-event-prBlocked | PR blocked | After prChecksFailed |
  | mergeReviewReady | notif-event-mergeReviewReady | switch-event-mergeReviewReady | Merge review ready | After prBlocked |

  ---

