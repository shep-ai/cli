decisions:
  - title: Dead code removal strategy for auth method row
    chosen: >-
      Remove the entire auth method SettingsRow, the AUTH_METHOD_OPTIONS constant,
      the authMethod variable reference, the token/showToken state, the unreachable
      token input JSX block, and the token logic in buildAgentPayload — all in a
      single pass
    rejected:
      - >-
        Replace disabled Select with read-only text display — rejected because the
        spec explicitly resolved this question in favour of showing a read-only
        display, but there is zero user value in showing a value the user cannot
        change and that is set programmatically. The spec answer says "Show
        read-only display" but the selectionRationale recommends removal. Given
        that the auth method is set automatically during agent configuration,
        removal is the cleaner path and the spec requirements (FR-1 through FR-3,
        SC-1 through SC-3) mandate removal of the row and dead code.
      - >-
        Keep disabled row and only remove dead token code — rejected because the
        "Coming soon" tooltip on a permanently disabled control is confusing dead
        UI that provides no user value
    rationale: >
      The disabled auth method Select with "Coming soon" tooltip is dead UI —
      users cannot interact with it and the value is set programmatically. All
      code guarded by `authMethod === AgentAuthMethod.Token` is unreachable since
      the default is `Session` and there is no UI to change it. Removing
      everything in one pass is safe because: (1) the `authMethod` variable is
      only read, never written via UI; (2) the token input is behind an
      unreachable condition; (3) AUTH_METHOD_OPTIONS is only consumed by the
      removed Select. This aligns with FR-1, FR-2, FR-3.

  - title: Import cleanup after auth method removal
    chosen: >-
      Remove Eye, EyeOff from lucide-react import; remove Tooltip,
      TooltipContent, TooltipProvider, TooltipTrigger import; remove
      AgentAuthMethod from domain import. Keep Select/SelectContent/SelectItem/
      SelectTrigger/SelectValue since they are used by editor, shell, and
      terminal selects.
    rejected:
      - >-
        Leave all imports in place — rejected because unused imports fail lint
        checks and violate FR-10
      - >-
        Remove Select imports too — rejected because Select is used at lines 809
        (editor), 849 (shell), and 883 (terminal). Only the auth method usage is
        removed.
    rationale: >
      Grep analysis confirms: Eye/EyeOff are only used in the token visibility
      toggle (line 753, inside unreachable block). Tooltip components are only
      used in the auth method row (lines 701-725). AgentAuthMethod is only used
      in AUTH_METHOD_OPTIONS and dead code checks. Select components are used in
      3 other places (editor, shell, terminal) so they must stay. This targeted
      removal satisfies FR-10 and SC-13.

  - title: New notification toggle implementation pattern
    chosen: >-
      Use the existing SwitchRow component with the same onChange pattern:
      spread events into newEvents with the toggled value, call setEvents, then
      call save(buildNotificationPayload({ events: newEvents })). Place after
      the prChecksFailed SwitchRow (line 1438) and before the closing
      </SettingsSection> tag (line 1439).
    rejected:
      - >-
        Create a new reusable component for event toggles — rejected because the
        existing SwitchRow component already encapsulates the pattern perfectly
        and all 9 existing event toggles use it directly. Adding abstraction for
        2 more toggles is over-engineering.
      - >-
        Use a data-driven approach mapping event keys to labels and rendering
        toggles from an array — rejected because this would be a refactor beyond
        the cleanup scope. The spec says to follow the same pattern as existing
        toggles (FR-4, FR-5, FR-7, SC-7).
    rationale: >
      The existing pattern is simple and consistent: each event toggle is a
      SwitchRow with label, id, testId, checked bound to events[key], and
      onChange that creates a new events object and saves. The
      buildNotificationPayload helper already handles serialising the full
      notification state. Adding two more SwitchRow instances following this
      exact pattern is the minimum-change approach that satisfies FR-4 through
      FR-7. The new toggles will automatically work with auto-save because the
      events state already includes prBlocked and mergeReviewReady (initialised
      from settings.notifications.events at line 441).

  - title: Storybook story updates
    chosen: >-
      Update the AllSections story to remove authMethod: Token and token from
      agent config (since those fields are no longer relevant to UI). Verify
      Default story uses createDefaultSettings() which already includes
      prBlocked and mergeReviewReady defaults (both true). No new stories
      needed — existing stories cover the new toggles through defaults.
    rejected:
      - >-
        Add a dedicated story for notification toggles — rejected because the
        Default and AllSections stories already render the full settings page
        including all notification toggles. The new toggles will appear
        automatically since defaults factory includes them.
      - >-
        Remove the AllSections story entirely — rejected because it tests
        non-default configurations for other sections (featureFlags, etc.) which
        are still valid
    rationale: >
      The AllSections story currently sets authMethod: Token and token:
      'sk-test-token-12345' which would reference removed UI. This must be
      cleaned up. The Default story uses createDefaultSettings() which already
      sets prBlocked: true and mergeReviewReady: true, so the new toggles will
      render in all stories without changes. FR-8 is satisfied by cleaning up
      the stale auth reference and confirming toggles render.

  - title: Unit test updates
    chosen: >-
      No test changes needed for the removal — there are no existing tests that
      assert on the auth method row or token input. For the new toggles, the
      existing test structure tests sections at a high level (checking testIds
      like notification-settings-section exist) rather than individual toggles.
      Adding toggle-specific tests is optional but not required by the current
      test pattern.
    rejected:
      - >-
        Add comprehensive toggle interaction tests (click, verify state, verify
        save called) — rejected because the existing test suite does not test
        individual toggle interactions for any of the 9 existing event toggles.
        Adding tests only for the 2 new ones would be inconsistent.
      - >-
        Remove existing tests and rewrite — rejected because the existing tests
        are valid and passing; FR-9 says to update tests if needed, not rewrite
        them
    rationale: >
      The existing test file has 6 tests that verify section rendering,
      props passing, and edge cases. None test individual notification toggles
      or the auth method row. Since the new toggles follow the identical pattern
      as existing ones and the section-level test (notification-settings-section
      testId) still passes, the tests remain valid. FR-9 is satisfied. SC-11
      requires tests pass — they will since no tested elements are removed.

