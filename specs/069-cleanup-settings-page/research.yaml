    options:
      - option: Remove authMethod from buildAgentPayload entirely
        description: >-
          Remove the authMethod references from buildAgentPayload. The function
          currently spreads authMethod into the merged object and conditionally
          adds token. Since authMethod is always Session (the default) and is not
          user-changeable, we can hardcode the default or omit it. However, the
