# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation follows a subtract-then-add approach across 3 phases with
  6 tasks total.

  First, we remove the dead auth method UI from the settings page component:
  the AUTH_METHOD_OPTIONS constant, unused imports (Eye, EyeOff, Tooltip*,
  AgentAuthMethod), the disabled auth method SettingsRow with its "Coming soon"
  tooltip, the unreachable token input JSX block, and all associated state
  variables (authMethod, token, showToken). The buildAgentPayload helper is
  simplified to only handle the agent type field.

  Next, we add two new SwitchRow toggles for prBlocked ("PR blocked") and
  mergeReviewReady ("Merge review ready") to the PR Events subsection, placed
  after the existing four PR event toggles. These follow the identical pattern
  used by all existing event toggles, wired to auto-save via
  buildNotificationPayload.

  Finally, we update the AllSections Storybook story to remove stale auth method
  references, and run the full test suite plus lint/typecheck to verify zero
  regressions.

  All changes are confined to the presentation layer. No domain, TypeSpec,
  database, or backend modifications are needed.
