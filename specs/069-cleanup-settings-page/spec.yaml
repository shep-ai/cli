openQuestions:
  - question: >-
      Should the "Coming soon" auth method row be removed entirely or replaced
      with a non-interactive display of the current value?
    resolved: true
    options:
      - option: Remove entirely
        description: >-
          Delete the auth method row completely from the Agent section. The
          field is used internally for agent configuration but the user cannot
          change it via UI today. Removing eliminates dead UI and reduces
          confusion. The row can be re-added when the feature is actually
          implemented.
        selected: true
      - option: Show read-only display
        description: >-
          Replace the disabled select with a read-only text display showing the
          current auth method value. Gives visibility into the setting but no
          interaction. Adds complexity for minimal user value since users cannot
          change it.
        selected: false
    selectionRationale: >-
      Remove entirely is recommended because a permanently disabled control with
      "Coming soon" is confusing dead UI. The auth method is set
      programmatically during agent configuration and does not require user
      visibility. Re-adding it when the feature ships is trivial.
    answer: Remove entirely
  - question: What labels should be used for the two new notification event toggles?
    resolved: true
    options:
      - option: PR blocked / Merge review ready
        description: >-
          Follows the existing pattern where PR events use "PR" prefix with
          title case. "PR blocked" is consistent with "PR merged", "PR closed",
          etc. "Merge review ready" describes the event clearly without PR
          prefix since it relates to the merge review process.
        selected: true
      - option: PR blocked / PR review ready
        description: >-
          Both use "PR" prefix for consistency. However, the backend event is
          named "mergeReviewReady" not "prReviewReady", so using "PR review
          ready" could create a naming mismatch and confuse the meaning (it is
          specifically about merge reviews, not general PR reviews).
        selected: false
    selectionRationale: >-
      "PR blocked / Merge review ready" is recommended because it matches the
      backend event naming (prBlocked, mergeReviewReady) and follows the
      established label pattern used by existing PR event toggles.
    answer: PR blocked / Merge review ready
  - question: >-
      Where should the new PR event toggles be positioned within the PR Events
      subsection?
    resolved: true
    options:
      - option: After existing PR events (append)
        description: >-
          Add prBlocked and mergeReviewReady after the existing four PR events
          (prMerged, prClosed, prChecksPassed, prChecksFailed). This preserves
          existing UI order and appends new items at the end, minimizing visual
          disruption for existing users.
        selected: true
      - option: Grouped by lifecycle stage
        description: >-
          Reorder all PR events by lifecycle: prBlocked (blocking issue) ->
          prChecksPassed/Failed (CI) -> mergeReviewReady (merge review) ->
          prMerged/prClosed (terminal states). More logical ordering but changes
          existing UI positions which could confuse users.
        selected: false
    selectionRationale: >-
      Appending after existing events is recommended because it preserves the
      current toggle order that users are familiar with. Reordering would change
      muscle memory and is out of scope for a cleanup task.
    answer: After existing PR events (append)
content: |
  ## Problem Statement

  The settings page displays several settings that are either unsupported (never consumed
  by backend code), permanently disabled in the UI, or missing from the UI despite being
  fully supported in the backend. This creates user confusion and maintenance burden.

  Specific issues identified:

  1. **Authentication method row** — shown as a disabled `Select` with a "Coming soon"
     tooltip in the Agent section. The `authMethod` field IS used in agent configuration,
     but the UI disables it, making it misleading dead UI. Behind this row there is also
     dead code for a token input field (conditionally rendered when `authMethod === Token`,
     which never evaluates to true since the default is `Session`). This token field is
     never visible to users — it is purely unreachable dead code.
  2. **Missing notification toggles** — `prBlocked` and `mergeReviewReady` events are
     fully supported in `notification.service.ts` (event mapping exists), defaults are
     set to `true` in `settings-defaults.factory.ts`, but they are missing from the
     settings page notification event toggles (only 4 of 6 PR events are shown).

  Settings that were audited and confirmed as SUPPORTED (no changes needed):

  - Shell preference (used by `open-shell.ts` and CLI tables)
  - CI settings (used by `ci-watch-fix-loop.ts`)
  - All Agent & Model, Environment, Workflow, Stage Timeouts, Feature Flags, Database settings

  Domain-only dead fields (no UI change needed — kept in domain for future use):

  - `system.autoUpdate`, `system.logLevel`, `user.name`, `user.email`, `user.githubUsername`

  ## Success Criteria

  - [ ] SC-1: Authentication method row (disabled Select with "Coming soon" tooltip) is removed from the Agent section
  - [ ] SC-2: `AUTH_METHOD_OPTIONS` constant is removed from the component
  - [ ] SC-3: Dead code associated with auth method is cleaned up: `authMethod` variable references, the unreachable token input field JSX (conditionally rendered behind `authMethod === Token`), `token` state, `showToken` state, and the `buildAgentPayload` token logic
  - [ ] SC-4: `prBlocked` notification toggle is added to PR Events subsection with label "PR blocked"
  - [ ] SC-5: `mergeReviewReady` notification toggle is added to PR Events subsection with label "Merge review ready"
  - [ ] SC-6: New toggles are appended after the existing four PR event toggles
  - [ ] SC-7: New toggles follow the same Switch component pattern as existing event toggles
  - [ ] SC-8: New toggles trigger auto-save via the same `updateSettingsAction` mechanism
  - [ ] SC-9: All existing supported settings remain functional and visually unchanged
  - [ ] SC-10: Storybook stories are updated to reflect the removed auth row and added toggles
  - [ ] SC-11: Unit tests pass with updated assertions reflecting the UI changes
  - [ ] SC-12: No TypeSpec, domain model, database, or backend changes are required
  - [ ] SC-13: Unused imports (if any) are cleaned up after removing auth method row and dead code

  ## Functional Requirements

  - **FR-1**: Remove the authentication method `SettingsRow` from the Agent section, including
    the disabled `Select` component, `Tooltip`/`TooltipProvider` wrapping it, and the
    "Coming soon" `TooltipContent`.
  - **FR-2**: Remove the `AUTH_METHOD_OPTIONS` constant array that defines the auth method
    select options.
  - **FR-3**: Clean up all dead code associated with the auth method feature: the `authMethod`
    variable reference (line ~367), the `token` and `showToken` state variables (lines ~368-369),
    the conditionally-rendered token input field JSX (lines ~727-757, which is behind an
    unreachable `authMethod === AgentAuthMethod.Token` check since default is `Session`),
    and the token-related logic in `buildAgentPayload` (lines ~498-499).
  - **FR-4**: Add a `Switch` toggle for `prBlocked` in the PR Events notification subsection,
    labeled "PR blocked", following the same pattern as `prMerged`, `prClosed`, `prChecksPassed`,
    and `prChecksFailed` toggles.
  - **FR-5**: Add a `Switch` toggle for `mergeReviewReady` in the PR Events notification
    subsection, labeled "Merge review ready", following the same pattern as existing toggles.
  - **FR-6**: Position the two new toggles after the existing four PR event toggles
    (prMerged, prClosed, prChecksPassed, prChecksFailed, then prBlocked, mergeReviewReady).
  - **FR-7**: Wire both new toggles to the existing auto-save mechanism so toggling them
    persists the change via `updateSettingsAction`, consistent with all other event toggles.
  - **FR-8**: Update Storybook stories to reflect the removal of the auth method row and
    addition of the new notification toggles.
  - **FR-9**: Update unit tests to remove assertions for the auth method row and add
    coverage for the new notification event toggles if the existing test structure supports it.
  - **FR-10**: Clean up any imports that become unused after removing the auth method row
    and associated dead code (e.g., if `Select`, `Tooltip`, `Eye`, `EyeOff` components are
    no longer used elsewhere in the file).

  ## Non-Functional Requirements

  - **NFR-1**: No visual regression — all sections other than Agent (auth row removal) and
    Notifications (added toggles) must render identically before and after the change.
  - **NFR-2**: Auto-save latency — new toggles must save with the same latency as existing
    toggles (no additional network calls or state management overhead).
  - **NFR-3**: Accessibility — new Switch toggles must include proper `aria-label` or
    associated label text, matching the pattern used by existing event toggles.
  - **NFR-4**: Bundle size — removal of dead UI and dead code should not increase bundle size;
    the net effect should be neutral or a slight decrease.
  - **NFR-5**: Storybook — all settings page stories must render without errors after changes.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should the auth method row be removed entirely or shown as read-only? | Remove entirely | A permanently disabled control with "Coming soon" is confusing dead UI. It can be re-added when the feature ships. |
  | 2 | What labels for the new notification toggles? | "PR blocked" / "Merge review ready" | Matches backend event naming and existing label patterns. |
  | 3 | Where to position new PR event toggles? | After existing PR events (append) | Preserves current UI order; avoids disrupting user familiarity. |

  ## Codebase Analysis

  ### Project Structure

  Settings system spans four layers:

  - **Domain**: `tsp/domain/entities/settings.tsp` (TypeSpec source of truth) generates
    `packages/core/src/domain/generated/output.ts`
  - **Domain factory**: `packages/core/src/domain/factories/settings-defaults.factory.ts`
  - **Infrastructure**: `packages/core/src/infrastructure/persistence/sqlite/mappers/settings.mapper.ts`
    maps domain to/from SQLite columns
  - **Presentation (Web)**: `src/presentation/web/components/features/settings/settings-page-client.tsx`
    is the main settings page (~1555 lines)
  - **Presentation (CLI)**: `src/presentation/cli/ui/tables.ts` displays settings summary

  ### Key Code Locations

  - **Auth method row**: `settings-page-client.tsx` lines ~696-726 (SettingsRow with disabled Select)
  - **AUTH_METHOD_OPTIONS**: `settings-page-client.tsx` lines ~52-55
  - **authMethod variable**: `settings-page-client.tsx` line ~367
  - **token/showToken state (dead code)**: `settings-page-client.tsx` lines ~368-369
  - **Token input field (dead code, never rendered)**: `settings-page-client.tsx` lines ~727-757
    (behind unreachable `authMethod === AgentAuthMethod.Token` condition; default is `Session`)
  - **Token logic in buildAgentPayload (dead code)**: `settings-page-client.tsx` lines ~498-499
  - **PR event toggles**: `settings-page-client.tsx` lines ~1395-1438 (prMerged, prClosed, prChecksPassed, prChecksFailed)
  - **Notification defaults**: `settings-defaults.factory.ts` lines ~117-134 (prBlocked: true, mergeReviewReady: true)
  - **Event mapping**: `notification.service.ts` lines ~22-34 (PrBlocked and MergeReviewReady already mapped)

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/web/components/features/settings/settings-page-client.tsx` | High | Remove auth method row + dead token code; add prBlocked and mergeReviewReady toggles |
  | `src/presentation/web/components/features/settings/settings-page-client.stories.tsx` | Medium | Update stories to reflect UI changes |
  | `tests/unit/presentation/web/components/features/settings/settings-page-client.test.tsx` | Medium | Update tests for removed/added UI elements |

  ## Dependencies

  - `NotificationEventConfig` type already includes `prBlocked` and `mergeReviewReady` fields
  - `notification.service.ts` already maps these events — no backend changes needed
  - `settings-defaults.factory.ts` already includes defaults for these events (both default to `true`)
  - No TypeSpec, domain model, or database schema changes required

  ## Size Estimate

  **S** — This is a focused UI-only change: remove one disabled row and associated dead code,
  add two switch toggles following an existing pattern, update stories and tests. No domain
  model, TypeSpec, database, or backend changes required. Estimated 3 files changed.

