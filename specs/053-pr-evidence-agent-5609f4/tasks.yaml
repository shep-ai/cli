  ## Summary

  13 tasks across 8 phases implementing the evidence-collection node. The work
  proceeds bottom-up: TypeSpec domain models first (phase 1), then state
  annotation (phase 2), standalone output parser and prompt builder (phases 3-4),
  the evidence node itself (phase 5), merge prompt integration (phase 6), graph
  wiring (phase 7), and finally integration testing with regression verification
  (phase 8).

  Each code task follows TDD: write failing tests first (RED), implement minimal
  code to pass (GREEN), then clean up (REFACTOR). Non-code tasks (TypeSpec
  compilation, final verification) skip TDD.

  ## Acceptance Checklist

  - [ ] EvidenceType enum and Evidence value object in TypeSpec, compiled to TypeScript
  - [ ] evidence channel in FeatureAgentAnnotation with accumulating reducer
  - [ ] evidence-output-parser.ts with parseEvidenceRecords function
  - [ ] evidence-prompts.ts with buildEvidencePrompt function
  - [ ] evidence.node.ts with createEvidenceNode factory
  - [ ] Merge prompt renders evidence section in PR body
  - [ ] Graph wired: implement → evidence → merge
  - [ ] Unit tests for parser, prompt, node, and merge prompt evidence
  - [ ] Integration tests for graph wiring and state flow
  - [ ] Zero test regressions across the full suite
  - [ ] pnpm validate and pnpm build pass cleanly

