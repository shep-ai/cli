# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  The evidence node fits into the existing feature-agent LangGraph workflow as a
  new node between `implement` and `merge`. The architecture follows the
  established clean architecture patterns:

  - **Domain layer**: New `Evidence` value object and `EvidenceType` enum defined
    in TypeSpec, generated into `domain/generated/output.ts`
  - **Infrastructure layer**: New evidence node, prompt builder, and output parser
    in the feature-agent nodes directory
  - **No application layer changes**: No new ports or use cases needed — the
    evidence node uses the existing `IAgentExecutor` port

  ### Graph Flow

  ```
  START → analyze → validate → requirements → validate → research → validate
        → plan → validate → implement → evidence → merge → END
  ```

  The evidence node sits after all code is written (implement) and before the
  commit/push/PR operations (merge). This is the natural position — evidence
  captures proof of what was implemented.

  ### State Flow

  ```
  implement node completes
    ↓
  evidence node reads: state.specDir, state.worktreePath
  evidence node writes: state.evidence (Evidence[])
    ↓
  merge node reads: state.evidence (via buildCommitPushPrPrompt)
  merge prompt includes evidence section in PR body
    ↓
  agent creates PR with embedded evidence
  ```

  ## Key Design Decisions

  ### 1. Evidence Node — Custom Node with Helper Reuse

  The evidence node cannot use the pure `executeNode` helper directly because
  it needs a post-execution parsing step to extract `Evidence[]` from the
  agent's text output and populate the state channel. Instead, it follows a
  custom node pattern that reuses the same helpers (`createNodeLogger`,
  `buildExecutorOptions`, `retryExecute`, `getCompletedPhases`,
  `markPhaseComplete`) while adding evidence-specific parsing. This is simpler
  than merge.node.ts (no CI loops, no approval gates, no multi-step agent calls)
  but more than a pure executeNode call.

  **Rejected**: Pure `executeNode` — no way to parse evidence and populate state.
  **Rejected**: Merge-style custom node — massive over-engineering for a single
  agent call.

  ### 2. Single Evidence State Channel

  A single `evidence: Annotation<Evidence[]>` channel with accumulating reducer
  `(prev, next) => [...prev, ...next]` follows the `ciFixHistory` pattern.
  Default value is empty array. The merge node reads `state.evidence` directly.

  **Rejected**: Multiple channels — unnecessary surface area.
  **Rejected**: File-based transfer — breaks LangGraph-native state flow.

  ### 3. JSON Output Parsing from Agent Text

  The evidence prompt instructs the agent to output a JSON array of evidence
  records in a fenced code block. The evidence-output-parser extracts this
  using regex + JSON.parse, following the merge-output-parser pattern.

  **Rejected**: File-based manifest — adds I/O coupling.
  **Rejected**: Agent outputSchema — not all agents support it.

  ### 4. Evidence in PR Body via Merge Prompt Extension

  `buildCommitPushPrPrompt()` is extended to render evidence when
  `state.evidence` is non-empty. Atomic — evidence appears at PR creation.

  **Rejected**: Post-creation `gh pr edit` — two operations, brief gap.

  ### 5. Graceful Degradation (FR-8)

  The evidence node catches parse failures and returns `{ evidence: [] }`. The
  merge node omits the evidence section when the array is empty. Evidence
  failures never block the merge workflow.

