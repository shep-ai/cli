  ## Testing Strategy

  - **Unit tests**: Evidence output parser (JSON extraction, edge cases, malformed input)
  - **Unit tests**: Evidence prompt builder (spec context, task list, output instructions)
  - **Unit tests**: Evidence node (mocked executor, graceful degradation, state updates)
  - **Unit tests**: Merge prompt evidence rendering (with/without evidence, per-type formatting)
  - **Integration tests**: Graph wiring (evidence node between implement and merge, state flow)

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec compilation breaks existing types | Run `pnpm tsp:compile` and `pnpm validate` immediately after adding new .tsp files |
  | Evidence parser fails on unexpected agent output | Parser returns empty array on any failure; comprehensive edge case tests |
  | Evidence node breaks existing graph flow | Integration tests verify existing implement-to-merge flow; graceful empty evidence |
  | Large evidence files bloat feature branch | Prompt instructs standard resolution, image compression, 500-line test output truncation |
  | Merge prompt changes break existing PR creation | Existing merge-prompts tests continue to pass; evidence section is additive only |
  | Graph wiring change breaks existing edges | Test both paths: with mergeNodeDeps and without |

