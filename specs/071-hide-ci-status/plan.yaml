name: hide-ci-status
summary: >
  Implementation follows TypeSpec-first workflow: define hideCiStatus in WorkflowConfig,
  generate TypeScript types, create SQLite migration 042 for hide_ci_status column (INTEGER
  DEFAULT 0), update settings mapper with boolean ↔ INTEGER conversion, add conditional
  rendering to OverviewTab and MergeReview components, integrate Switch control in
  WorkflowSettingsSection with optimistic update pattern, and add comprehensive test
  coverage (mapper, components, settings UI). Zero new dependencies. Four phases: Foundation
  (TypeSpec + migration), Infrastructure (mapper + repository), Presentation (UI components),
  Integration (settings UI + server actions).

relatedFeatures: []
technologies:
  - TypeSpec (domain model definition)
  - SQLite (settings table with INTEGER column)
  - better-sqlite3 (database driver)
  - umzug v3 (migration framework)
  - React (conditional rendering)
  - Next.js (server actions)
  - shadcn/ui Switch (settings toggle)
  - tsyringe (DI for settings service)
  - Vitest (unit testing)
  - React Testing Library (component testing)

