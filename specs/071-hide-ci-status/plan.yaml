phases:
  - id: phase-1-foundation
    name: 'Foundation & Domain Setup'
    description: >
      Define the domain model in TypeSpec and establish database schema. This phase creates
      the foundation by adding hideCiStatus to WorkflowConfig (TypeSpec), compiling to
      TypeScript types, and creating SQLite migration 042 to add hide_ci_status column.
      This must come first because all subsequent phases depend on the domain type and
      database schema existing.
    parallel: false

  - id: phase-2-infrastructure
    name: 'Infrastructure Layer (Mapper & Persistence)'
    description: >
      Update the persistence layer to handle the new field. This phase modifies the settings
      mapper to convert between domain boolean (hideCiStatus) and database INTEGER
      (hide_ci_status 0/1), updates SettingsRow interface, and adds test coverage for
      round-trip mapping. This must come after phase 1 (needs TypeSpec types and migration)
      and before phase 3 (UI needs mapper to save/load settings).
    parallel: false

  - id: phase-3-presentation
    name: 'Presentation Layer (UI Components)'
    description: >
      Add conditional rendering to feature drawer and merge review components. This phase
      updates OverviewTab and MergeReview to hide CI status row when hideCiStatus is true,
      modifies server actions to pass the setting, updates types, and adds component tests.
      This must come after phase 2 (needs mapper to load settings) and before phase 4
      (settings UI needs components to be wired for end-to-end verification).
    parallel: false

  - id: phase-4-integration
    name: 'Settings UI Integration'
    description: >
      Add user-facing settings control and verify end-to-end flow. This phase adds Switch
      to WorkflowSettingsSection, implements optimistic update pattern, adds settings UI
      tests, and performs integration verification. This must come last because it ties
      together all previous phases (domain model, mapper, UI components) into the complete
      user workflow.
    parallel: false

