content: |
  ## Status

  - **Phase:** Research
  - **Updated:** 2026-03-17

  ## Technology Decisions

  ### 1. TypeSpec Field Definition

  **Chosen:** Add `hideCiStatus?: boolean` to WorkflowConfig model at line 328 (after commitEvidence)

  **Rejected:**
  - Create new UiPreferences model — premature abstraction for one setting, adds unnecessary complexity
  - Add to FeatureFlags model — inappropriate because this is a user preference, not a feature flag
  - Store in UserProfile model — wrong domain, UserProfile is for identity, not workflow preferences

  **Rationale:** WorkflowConfig is the correct home because CI status is semantically part of the PR/CI workflow domain. The spec explicitly resolved this (openQuestion #3) choosing WorkflowConfig over UiPreferences. Existing evidence settings (enableEvidence, commitEvidence) are already in WorkflowConfig and follow the same pattern (boolean preferences affecting PR/CI behavior). The field is optional (hideCiStatus?: boolean) for backward compatibility—existing databases without the column will treat it as undefined, which defaults to false (show CI status) via TypeScript's optional chaining.

  ### 2. Database Column Design

  **Chosen:** SQLite INTEGER column `hide_ci_status` with `NOT NULL DEFAULT 0` (0 = show, 1 = hide)

  **Rejected:**
  - Store as TEXT ("true"/"false") — violates existing SQLite mapping conventions
  - Use BOOLEAN type — SQLite has no native BOOLEAN type
  - Nullable column (DEFAULT NULL) — creates tri-state logic when only two states are needed

  **Rationale:** INTEGER 0/1 is the SQLite standard for booleans and matches all 30+ existing boolean settings columns (sys_auto_update, notif_in_app_enabled, workflow_open_pr_on_impl_complete, ci_watch_enabled, etc.). The mapper layer already handles boolean ↔ INTEGER conversion in toDatabase() and fromDatabase() functions. NOT NULL DEFAULT 0 ensures existing settings rows automatically get the "show CI status" behavior without requiring data migration scripts. This is the exact pattern used in migration 037 (ci_watch_enabled) and migration 040 (feature_flag_adopt_branch).

  ### 3. Migration Strategy

  **Chosen:** Create migration 042-add-hide-ci-status.ts using ALTER TABLE with idempotent column check

  **Rejected:**
  - Inline migration in legacy-migrations.ts — violates codebase convention (established at migration 035+)
  - Data migration script to update existing rows — unnecessary because NOT NULL DEFAULT 0 handles existing rows
  - Drop and recreate settings table — destructive and loses user data

  **Rationale:** Migration files 035-041 establish the pattern: individual .ts files in migrations/ directory, runtime discovery via readdirSync, idempotent column check using db.pragma('table_info(settings)'), and down() function as a no-op (void db;). Migration 037 (ci_watch_enabled) and 040 (feature_flag_adopt_branch) are exact precedents for adding boolean settings columns. The idempotent check prevents errors on re-run. ALTER TABLE with DEFAULT clause is atomic and safe—SQLite applies the default to existing rows in a single transaction. No manual data migration needed.

  ### 4. Settings Mapper Integration

  **Chosen:** Add hide_ci_status to SettingsRow interface, map in toDatabase() and fromDatabase() with boolean ↔ INTEGER 0/1 conversion

  **Rejected:**
  - Store as nested JSON in workflow column — breaks architectural precedent and complicates SQL queries
  - Use separate ui_preferences table — premature abstraction for one field
  - Skip mapper layer and access database directly — violates Clean Architecture

  **Rationale:** The mapper layer (settings.mapper.ts) has 114 lines of existing SettingsRow ↔ Settings conversion logic. All WorkflowConfig fields are flattened to workflow_* columns. Adding hide_ci_status follows this exact pattern. In toDatabase() line 175: add `hide_ci_status: settings.workflow.hideCiStatus ? 1 : 0`. In fromDatabase() line 322-338: add `hideCiStatus: row.hide_ci_status === 1` inside the workflow spread. Zero new logic needed—just copy the pattern from ci_watch_enabled (lines 181, 335).

  ### 5. Conditional Rendering in OverviewTab

  **Chosen:** Wrap CI status row (lines 225-230) in `{hideCiStatus !== true ? ... : null}` conditional using settings.workflow.hideCiStatus from server action data

  **Rejected:**
  - Use CSS display:none — keeps DOM node in memory and violates React best practices
  - Filter PR data before passing to component — breaks single source of truth
  - Create separate component variants — massive code duplication

  **Rationale:** The OverviewTab component already conditionally renders PR sections (pr.mergeable, pr.commitHash). Wrapping the CI status row in a conditional is a one-line change. The hideCiStatus value comes from the server action (get-feature-drawer-data.ts) which already passes workflow settings. React conditional rendering has zero performance overhead—it's the standard pattern for show/hide UI logic.

  ### 6. Conditional Rendering in MergeReview

  **Chosen:** Wrap CI status row (lines 258-263) in `{pr.ciStatus && hideCiStatus !== true ? ... : null}` conditional using hideCiStatus from getMergeReviewData server action response

  **Rejected:**
  - Duplicate hideCiStatus logic — acceptable for a one-line conditional
  - Pass hideCiStatus as separate prop — adds prop clutter
  - Read settings directly in client component — breaks server action pattern

  **Rationale:** The MergeReview component already conditionally renders PR sections (pr.mergeable, pr.commitHash). The getMergeReviewData server action needs to include hideCiStatus in the MergeReviewData type and return payload. This maintains consistency between both components and ensures the setting applies uniformly.

  ### 7. Settings UI Integration

  **Chosen:** Add Switch control to WorkflowSettingsSection after CI Settings section (line 447), before Stage Timeouts section (line 449), using optimistic update pattern with handleSwitchChange

  **Rejected:**
  - Create new Settings section for UI Preferences — premature abstraction for one toggle
  - Add as checkbox instead of Switch — violates UI consistency
  - Defer update until form submit — breaks UX consistency

  **Rationale:** WorkflowSettingsSection manages 12 workflow settings with a consistent pattern: useState for each field, handleSwitchChange for optimistic updates, buildPayload for server action calls. Adding hideCiStatus requires: (1) state hook with default false; (2) Switch JSX after CI Settings section; (3) add to buildPayload function. This follows the exact pattern of ci_watch_enabled (lines 360-373).

  ### 8. Default Value Strategy

  **Chosen:** Default to false (show CI status) in TypeSpec, database (DEFAULT 0), mapper, settings factory, and UI state initialization

  **Rejected:**
  - Default to true (hide CI status) — breaks backward compatibility
  - No default (undefined/null) — creates tri-state logic
  - Different defaults in different layers — creates inconsistency

  **Rationale:** Defaulting to false (show CI status) is the conservative choice that preserves existing behavior for all users. The spec's openQuestion #2 explicitly chose this approach. TypeSpec field is optional so omission defaults to undefined, which the UI interprets as false via `hideCiStatus !== true` conditionals. The database migration uses DEFAULT 0 so existing settings rows automatically get the correct behavior.

  ### 9. Testing Strategy

  **Chosen:** Unit tests for mapper (round-trip true/false), component tests for conditional rendering (hideCiStatus: true hides row, false/undefined shows row), settings UI tests for switch toggle

  **Rejected:**
  - Integration tests only — insufficient coverage
  - Manual testing only — not sustainable
  - Snapshot tests for components — brittle and low value

  **Rationale:** The testing strategy follows existing patterns from similar features. For the mapper: add test cases to settings.mapper.test.ts verifying hideCiStatus: true → hide_ci_status: 1 and hide_ci_status: 0 → hideCiStatus: false. For OverviewTab: add test verifying CI Status row is absent when hideCiStatus: true. For MergeReview: identical test. For WorkflowSettingsSection: test switch exists, toggles state, and calls updateSettingsAction. Total test additions: ~6 new test cases across 4 files.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | TypeSpec | Domain model definition | Use (existing) | Already in use for Settings entity. No new dependency needed. |
  | better-sqlite3 | SQLite database driver | Use (existing) | Already in use for all persistence. No new dependency needed. |
  | umzug v3 | Database migrations | Use (existing) | Already in use for 41 existing migrations. No new dependency needed. |
  | React | UI framework | Use (existing) | Already in use for all web components. No new dependency needed. |
  | Next.js | Web application framework | Use (existing) | Already in use for server actions. No new dependency needed. |
  | shadcn/ui Switch | Toggle component | Use (existing) | Already in use for 7 boolean settings in WorkflowSettingsSection. No new dependency needed. |
  | tsyringe | Dependency injection | Use (existing) | Already in use for settings service singleton. No new dependency needed. |
  | Vitest | Unit testing | Use (existing) | Already in use for 1200+ tests. No new dependency needed. |
  | React Testing Library | Component testing | Use (existing) | Already in use for all component tests. No new dependency needed. |

  **Summary:** Zero new dependencies needed. All implementation uses existing libraries and patterns.

  ## Security Considerations

  **No security implications.** This feature is a display-only preference with zero security risk:

  1. **No authentication/authorization changes:** The hideCiStatus setting is stored in the singleton Settings entity, which is only accessible to the local user. No multi-user concerns, no permission checks needed.

  2. **No data exposure:** The setting controls UI visibility only. The underlying pr.ciStatus data continues to be fetched, stored, and accessible via the database and server actions. No data is hidden from legitimate access paths.

  3. **No injection risks:** The boolean value is type-safe (TypeScript boolean, SQLite INTEGER 0/1) and never interpolated into SQL queries or HTML. The mapper uses parameterized queries (better-sqlite3 prepared statements). The UI uses React conditional rendering (not dangerouslySetInnerHTML).

  4. **No privilege escalation:** Hiding CI status does not grant or revoke any capabilities. It's purely cosmetic. Users can still access PR data via GitHub directly or via the database.

  5. **No cross-site scripting (XSS):** The Switch component renders a boolean state. No user-controlled strings are rendered. The CiStatusBadge component already sanitizes pr.ciStatus values.

  6. **No CSRF concerns:** The updateSettingsAction server action already has CSRF protection via Next.js server actions security model (same-origin policy, no cookies needed).

  **Conclusion:** This feature has zero security attack surface. It's a low-risk, display-only preference that follows all existing security patterns.

  ## Performance Implications

  **Zero performance impact.** This feature is a simple boolean check with negligible overhead:

  1. **Database query performance:** The hide_ci_status column is a single INTEGER in the settings table (which has only 1 row due to singleton pattern). Adding one column to a 1-row table has zero measurable impact on query time. The settings table is accessed via a singleton service with in-memory caching, so the column is read once per app startup.

  2. **Mapper overhead:** The boolean ↔ INTEGER conversion in toDatabase/fromDatabase is a trivial ternary operation (settings.workflow.hideCiStatus ? 1 : 0). This is O(1) and takes nanoseconds. The mapper already performs 30+ similar conversions for other boolean settings.

  3. **React rendering performance:** The conditional rendering logic ({hideCiStatus !== true ? ... : null}) is a simple boolean check evaluated during the render phase. React's reconciliation algorithm skips rendering the CI status row when the condition is false, which is actually more performant than rendering it (fewer DOM nodes to create/update). No useEffect, no state updates, no re-renders triggered. This is the standard React pattern for show/hide logic with zero overhead.

  4. **Server action overhead:** The get-feature-drawer-data and get-merge-review-data server actions already access settings (workflow.enableEvidence, workflow.commitEvidence). Adding hideCiStatus to the response payload is one additional field in the JSON response (~10 bytes). This is negligible compared to the PR metadata, diff data, and evidence payloads (kilobytes).

  5. **Bundle size:** The feature adds ~100 lines of code total (TypeSpec field, mapper logic, conditional rendering, settings UI). This is <1KB minified+gzipped. The codebase is already 2MB+ (web bundle). The impact is unmeasurable.

  6. **Network overhead:** The hideCiStatus boolean adds 1 field to server action responses. In JSON, this is `"hideCiStatus":false` (20 bytes). Network transfer time for 20 bytes on any connection is sub-millisecond.

  **Conclusion:** This feature has zero measurable performance impact. The boolean check is trivial, the database overhead is negligible, and the React rendering is more efficient when the row is hidden.

  ## Architecture Notes

  **This feature perfectly aligns with Clean Architecture principles:**

  1. **Domain Layer (tsp/domain/entities/settings.tsp):** The hideCiStatus field is defined in the WorkflowConfig model, which is part of the Settings entity. This is pure domain logic—no dependencies on infrastructure, UI, or frameworks. The TypeSpec model is the single source of truth.

  2. **Infrastructure Layer (packages/core/src/infrastructure/):** The persistence layer (SQLite repository + mapper) handles the translation between domain objects (Settings with WorkflowConfig.hideCiStatus) and database rows (settings table with hide_ci_status column). The migration (042-add-hide-ci-status.ts) updates the schema to support the new field. The settings service singleton provides access to settings across the application. All infrastructure concerns are isolated from domain logic.

  3. **Presentation Layer (src/presentation/web/):** The web UI (OverviewTab, MergeReview, WorkflowSettingsSection) consumes the hideCiStatus value via server actions and renders conditionally based on the domain preference. The UI has zero knowledge of how the setting is stored (SQLite INTEGER, JSON file, remote API—it doesn't matter). The server actions (get-feature-drawer-data, get-merge-review-data) bridge the presentation and application layers.

  4. **Dependency Rule:** Dependencies point inward. The UI depends on the domain model (Settings type), the mapper depends on the domain model, but the domain model has zero dependencies on infrastructure or UI. This feature adds zero cross-layer dependencies.

  5. **Single Responsibility:** Each layer has one job. The domain defines what hideCiStatus means (boolean preference in WorkflowConfig). The infrastructure handles persistence (SQLite column + mapper). The presentation handles display (conditional rendering). No layer does another layer's job.

  6. **Testability:** Each layer can be tested independently. Domain types are pure TypeScript (no test setup needed). Mapper tests use in-memory SQLite (no mocking). Component tests use React Testing Library (no database needed). This isolation makes testing fast and reliable.

  **Conclusion:** This feature is a textbook example of Clean Architecture. It follows all existing patterns, respects layer boundaries, and maintains testability. Zero architectural debt introduced.

