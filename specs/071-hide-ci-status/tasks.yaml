content: |
  ## Summary

  This task breakdown covers the complete implementation of the hideCiStatus feature across
  14 tasks organized into 4 phases. Each task follows TDD methodology with explicit
  RED-GREEN-REFACTOR cycles.

  **Phase 1 (Foundation & Domain Setup):** Tasks 1-4 establish the domain model and database
  schema. We start by defining hideCiStatus in TypeSpec, compiling to TypeScript types,
  creating SQLite migration 042, and verifying the migration executes correctly on both
  fresh and existing databases. This foundation is critical because all subsequent phases
  depend on the domain type and database column existing.

  **Phase 2 (Infrastructure Layer):** Tasks 5-7 update the persistence layer to handle the
  new field. We update the SettingsRow interface, add boolean → INTEGER conversion in
  toDatabase(), and add INTEGER → boolean conversion in fromDatabase(). Comprehensive
  mapper tests verify round-trip conversion correctness. This ensures settings can be
  persisted and retrieved correctly before the UI depends on them.

  **Phase 3 (Presentation Layer):** Tasks 8-9 add conditional rendering to UI components.
  We update OverviewTab and MergeReview to hide the CI status row when hideCiStatus is
  true, modify server actions to pass the setting, update types, and add component tests.
  Both components use the same {hideCiStatus !== true ? ... : null} pattern for consistency.
  This phase ensures the UI respects the setting before users can toggle it.

  **Phase 4 (Integration):** Tasks 10-14 add the user-facing settings control and verify
  the complete workflow. We add state hooks, render the Switch component, wire save
  functionality, perform manual end-to-end verification, and run the full test suite.
  This final phase ties together all previous work into a complete, testable user feature.

  **Task Dependencies:** Tasks are strictly ordered by dependency. Phase 1 must complete
  before Phase 2 (mapper needs domain types and migration). Phase 2 must complete before
  Phase 3 (UI needs mapper to load settings). Phase 3 must complete before Phase 4
  (settings UI needs components wired). Within Phase 3, tasks 8 and 9 can be parallelized
  after server action types are updated (they're independent components).

  **TDD Approach:** Every code task includes explicit RED (write failing test), GREEN
  (minimal implementation), REFACTOR (cleanup) cycles. Mapper tests verify round-trip
  conversion. Component tests verify conditional rendering. Settings UI tests verify
  switch toggle and save. The final task runs the complete test suite to catch regressions.

  **Estimated Effort:** Total estimated effort is ~6.5 hours across 14 tasks. This aligns
  with the "S" size estimate from the spec (small feature, hours not days). The largest
  tasks are the UI component updates (45min each) and integration verification (30min).
  Most tasks are <30min due to following established patterns and having clear precedents.
