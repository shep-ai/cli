name: database-management-ui
summary: >
  Technical research for a phpMyAdmin-style database browser in the Shep web UI.
  Key decisions: use getSQLiteConnection() directly in server actions (bypassing
  domain layer since this is a pure debugging tool), add shadcn/ui Table component
  (no npm dependency needed), use regex-based SQL validation with server-side
  defense-in-depth, and structure as four focused server actions with a single
  client page component managing tab state.

