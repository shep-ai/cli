# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation proceeds in three phases across 18 tasks.

  **Phase 1 (Foundation)** installs the shadcn/ui Table file component, then builds all
  four server actions (list-tables, get-table-rows, get-table-schema, execute-query) with
  full TDD coverage. Each action is tested for correct results, error handling, and security
  (SQL injection prevention, write operation rejection). A shared table name validation
  helper and BLOB formatting utility emerge during refactoring.

  **Phase 2 (Components)** builds five feature components in parallel where possible:
  CellValueDialog (truncated value expansion), TableList (sidebar with search), RowBrowser
  (paginated data table), SchemaViewer (column metadata), and QueryRunner (SQL textarea
  with results). Each component gets colocated Storybook stories with realistic mock data.

  **Phase 3 (Assembly)** wires everything together: DatabasePageClient manages state and
  orchestrates server action calls, the /database page route provides the server component
  entry point, and the sidebar gets a new Database nav item. Storybook mocks are created
  for all server actions, integration tests verify the full flow, and build/lint verification
  ensures everything is clean.

  The total estimated effort is approximately 10.5 hours.

