  - "zod (already a project dependency v4.3.6 — used for MCP tool input schemas)"
  - "tsyringe (existing DI container — for resolving use cases in tool handlers)"
  - "commander (existing CLI framework — new `shep mcp` command)"
  - "TypeSpec (domain model definitions for any new MCP-related types)"
