name: "mcp-server"
number: 77
branch: "feat/077-mcp-server"
oneLiner: "Expose shep capabilities as an MCP server for AI agent integration"
userQuery: "Add MCP support, make shep expose MCP\n"
summary: "Add an MCP (Model Context Protocol) server to shep so that external AI agents (Claude Desktop, Cursor, VS Code Copilot, etc.) can discover and invoke shep capabilities as MCP tools. The server will expose core use cases — feature management, agent runs, repository operations, and settings — over stdio and streamable HTTP transports using the official @modelcontextprotocol/sdk.\n"
phase: "Requirements"
sizeEstimate: "L"
