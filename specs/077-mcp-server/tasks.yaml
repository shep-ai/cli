name: "mcp-server"
summary: >
  14 tasks across 4 phases: foundation and first tool (phase 1), tool registration
  in domain batches (phase 2), CLI command and integration wiring (phase 3), and
  integration tests with polish (phase 4).

relatedFeatures: []
technologies:
  - "@modelcontextprotocol/sdk"
  - "zod"
  - "tsyringe"
  - "commander"
relatedLinks:
  - title: "MCP TypeScript SDK — npm"
    url: "https://www.npmjs.com/package/@modelcontextprotocol/sdk"
  - title: "MCP specification — transports"
    url: "https://modelcontextprotocol.io/specification/2025-03-26/basic/transports"

tasks:
  - id: "task-1"
    phaseId: "phase-1"
    title: "Install @modelcontextprotocol/sdk dependency"
    description: >
      Add @modelcontextprotocol/sdk v1.23+ to the root package.json dependencies.
      Verify it resolves correctly with the existing zod v4.3.6 — no version conflicts.
      Run pnpm install and confirm the lockfile updates cleanly.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "@modelcontextprotocol/sdk is listed in package.json dependencies"
      - "pnpm install completes without errors or peer dependency warnings for zod"
      - "import { McpServer } from '@modelcontextprotocol/sdk/server/mcp.js' resolves in TypeScript"
    tdd: null
    estimatedEffort: "15min"

  - id: "task-2"
    phaseId: "phase-1"
    title: "Create McpServerService core with stdio transport"
    description: >
      Create the MCP server service class that wraps the SDK McpServer. The service
      accepts the DI container, creates the McpServer with name/version metadata,
      and exposes start() (connects stdio transport) and stop() (closes transport)
      methods. No tools registered yet — just the server lifecycle.
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "McpServerService class exists at packages/core/src/infrastructure/services/mcp/mcp-server.service.ts"
      - "Constructor accepts DI container and version string"
      - "start() connects StdioServerTransport and returns a promise"
      - "stop() closes the transport gracefully"
      - "Server identifies as name 'shep' with the provided version in MCP initialize response"
      - "All unit tests pass"
    tdd:
      red:
        - "Write test that McpServerService constructor creates an instance without throwing"
        - "Write test that start() connects the transport (mock StdioServerTransport)"
        - "Write test that stop() closes the transport"
        - "Write test that server metadata includes name 'shep' and the provided version"
      green:
        - "Implement McpServerService with McpServer from SDK"
        - "Wire StdioServerTransport in start()"
        - "Implement stop() to close transport"
      refactor:
        - "Extract server configuration into typed options if constructor grows"
    estimatedEffort: "1h"

  - id: "task-3"
    phaseId: "phase-1"
    title: "Implement list_features tool with zod schema"
    description: >
      Register the first MCP tool — list_features — to validate the full tool
      registration pattern end-to-end. Define the zod input schema (optional status
      filter), implement the handler that resolves ListFeaturesUseCase from the
      container and returns JSON-serialized results. Include error handling wrapper.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "list_features tool is registered on the MCP server"
      - "Tool has a zod schema with optional status filter parameter"
      - "Handler resolves ListFeaturesUseCase from container and delegates"
      - "Successful results returned as JSON text content"
      - "Use case errors returned as MCP error response (isError: true)"
      - "All unit tests pass"
    tdd:
      red:
        - "Write test that list_features tool is registered (appears in tool list)"
        - "Write test that handler calls ListFeaturesUseCase.execute() with correct params"
        - "Write test that successful result is returned as JSON text content"
        - "Write test that use case error is returned as MCP error response with isError: true"
        - "Write test that invalid input (wrong type for status) is rejected by zod validation"
      green:
        - "Create feature-tools.ts with registerFeatureTools() function"
        - "Define zod schema for list_features input"
        - "Implement handler that resolves use case and delegates"
        - "Add try-catch error wrapper"
        - "Call registerFeatureTools() from McpServerService constructor"
      refactor:
        - "Extract shared error-handling wrapper into a helper function for reuse by other tools"
        - "Create tools/index.ts barrel with registerAllTools()"
    estimatedEffort: "1.5h"

  - id: "task-4"
    phaseId: "phase-1"
    title: "Register McpServerService in DI container"
    description: >
      Register the McpServerService in the DI container so it can be resolved
      by the CLI command. Follow the existing lazy-registration pattern to avoid
      importing the MCP SDK for non-MCP commands (same pattern as IWebServerService).
    state: "Todo"
    dependencies:
      - "task-3"
    acceptanceCriteria:
      - "McpServerService is registered in container.ts with a string token"
      - "Registration uses lazy factory to avoid importing MCP SDK for other commands"
      - "container.resolve('McpServerService') returns a valid instance"
      - "Existing tests still pass (no side effects from registration)"
    tdd:
      red:
        - "Write test that container.resolve('McpServerService') returns an instance"
        - "Write test that resolving does not import MCP SDK eagerly (lazy factory)"
      green:
        - "Add lazy factory registration for McpServerService in container.ts"
      refactor:
        - "Verify registration follows the same pattern as IWebServerService lazy proxy"
    estimatedEffort: "30min"

  - id: "task-5"
    phaseId: "phase-2"
    title: "Implement show_feature, create_feature, and start_feature tools"
    description: >
      Register the remaining feature-domain tools. show_feature takes a featureId
      string (supports prefix matching via ShowFeatureUseCase). create_feature takes
      name and description. start_feature takes featureId and returns immediately
      with the run ID.
    state: "Todo"
    dependencies:
      - "task-3"
    acceptanceCriteria:
      - "show_feature tool registered with featureId zod schema"
      - "create_feature tool registered with name and description zod schema"
      - "start_feature tool registered with featureId zod schema"
      - "Each handler resolves its use case from the container"
      - "start_feature returns run ID without blocking"
      - "Error cases return MCP error responses"
      - "All unit tests pass"
    tdd:
      red:
        - "Write test that show_feature calls ShowFeatureUseCase with featureId"
        - "Write test that show_feature returns feature data as JSON text"
        - "Write test that show_feature returns error when feature not found"
        - "Write test that create_feature calls CreateFeatureUseCase with name and description"
        - "Write test that start_feature calls StartFeatureUseCase and returns run ID"
      green:
        - "Add show_feature, create_feature, start_feature registrations to feature-tools.ts"
        - "Define zod schemas for each tool"
        - "Implement handlers delegating to respective use cases"
      refactor:
        - "Ensure consistent JSON response format across all feature tools"
    estimatedEffort: "1.5h"

  - id: "task-6"
    phaseId: "phase-2"
    title: "Implement run_agent, show_agent_run, list_agent_runs, and stop_agent_run tools"
    description: >
      Register agent-domain tools. run_agent takes agentName and prompt, returns
      the run ID immediately (non-blocking). show_agent_run takes runId. list_agent_runs
      takes no required params. stop_agent_run takes runId.
    state: "Todo"
    dependencies:
      - "task-3"
    acceptanceCriteria:
      - "run_agent tool registered with agentName and prompt zod schema"
      - "show_agent_run tool registered with runId zod schema"
      - "list_agent_runs tool registered (no required params)"
      - "stop_agent_run tool registered with runId zod schema"
      - "run_agent returns run ID immediately without blocking"
      - "Error cases return MCP error responses"
      - "All unit tests pass"
    tdd:
      red:
        - "Write test that run_agent calls RunAgentUseCase and returns run ID"
        - "Write test that run_agent does not block (returns before agent completes)"
        - "Write test that show_agent_run calls GetAgentRunUseCase with runId"
        - "Write test that list_agent_runs calls ListAgentRunsUseCase"
        - "Write test that stop_agent_run calls StopAgentRunUseCase with runId"
        - "Write test that unknown agent returns error response"
      green:
        - "Create agent-tools.ts with registerAgentTools() function"
        - "Define zod schemas for each agent tool"
        - "Implement handlers delegating to respective use cases"
      refactor:
        - "Verify run_agent uses execute() (blocking variant that returns run object) not executeStream()"
