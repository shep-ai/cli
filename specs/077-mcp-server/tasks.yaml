openQuestions: []

content: |
  ## Summary

  The implementation is structured as 14 tasks across 4 phases, totaling approximately
  12 hours of effort.

  Phase 1 (Foundation) establishes the full vertical slice: SDK installation, the
  McpServerService core with stdio transport, the first tool (list_features) that
  validates the entire tool registration pattern, and DI container wiring. This phase
  is intentionally front-loaded with risk mitigation — if the MCP SDK has compatibility
  issues with zod v4, we discover it immediately on task 1-2 rather than after building
  out all 11 tools.

  Phase 2 (Tool Registration) is the bulk of the work but follows a mechanical pattern
  established in phase 1. Tools are registered in domain-grouped batches: features
  (show, create, start), agents (run, show, list, stop), repositories (list), and
  settings (get, update). Each batch has its own test file and follows the same
  zod-schema + handler + error-wrapper pattern. The final task in this phase wires all
  groups together via the barrel export.

  Phase 3 (CLI Command) creates the shep mcp CLI command, registers it in the entry
  point, adds help text with Claude Desktop configuration examples, implements graceful
  SIGINT/SIGTERM shutdown, and ensures all logging goes to stderr only.

  Phase 4 (Integration and Polish) adds protocol-level integration tests using the MCP
  SDK client for full round-trip verification, then runs the complete validation suite
  (lint, typecheck, tests, build) to confirm nothing is broken.
