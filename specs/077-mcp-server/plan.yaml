name: "mcp-server"
summary: >
  Implement an MCP server as a thin presentation adapter over existing use cases,
  following the established clean architecture pattern. The server uses the official
  @modelcontextprotocol/sdk with stdio transport, registers 11 core tools with zod v4
  input schemas, resolves use cases from the shared DI container, and is launched via
  a new `shep mcp` CLI command. Architecture is designed for easy extensibility —
  adding a tool requires only a schema, a registration call, and a handler function.

relatedFeatures: []
technologies:
  - "@modelcontextprotocol/sdk (v1.23+ with native zod v4 support)"
  - "zod (v4.3.6 — existing dependency, used for MCP tool input schemas)"
  - "tsyringe (existing DI container — resolves use cases in tool handlers)"
  - "commander (existing CLI framework — new shep mcp command)"

relatedLinks:
  - title: "MCP TypeScript SDK — npm"
    url: "https://www.npmjs.com/package/@modelcontextprotocol/sdk"
  - title: "MCP specification — transports"
    url: "https://modelcontextprotocol.io/specification/2025-03-26/basic/transports"
  - title: "Build an MCP server — official tutorial"
    url: "https://modelcontextprotocol.io/docs/develop/build-server"
  - title: "MCP TypeScript SDK — GitHub"
    url: "https://github.com/modelcontextprotocol/typescript-sdk"

phases:
  - id: "phase-1"
    name: "Foundation — SDK, Server Core, and First Tool"
    description: >
      Install the MCP SDK dependency, create the MCP server service with stdio
      transport, wire it into the DI container, and implement one tool (list_features)
      end-to-end. This validates the entire architecture before scaling to more tools.
    parallel: false

  - id: "phase-2"
    name: "Tool Registration — Feature and Agent Tools"
    description: >
      Register the remaining 10 tools in batches: feature tools (show, create, start),
      agent tools (run, show, list, stop), repo tools (list), and settings tools
      (get, update). Each tool follows the same thin-adapter pattern established in
      phase 1: zod schema + handler that delegates to a use case.
    parallel: false

  - id: "phase-3"
    name: "CLI Command and Integration"
    description: >
      Create the `shep mcp` CLI command, register it in the CLI entry point, add
      help text with Claude Desktop configuration example, implement graceful
      shutdown on SIGINT/SIGTERM, and wire up stderr-only logging.
    parallel: false

  - id: "phase-4"
    name: "Integration Tests and Polish"
    description: >
      Write integration tests using the MCP SDK client for full protocol round-trips
      (initialize -> tools/list -> tools/call -> response). Verify error handling paths,
      input validation, and stdio safety. Final polish and documentation.
    parallel: false

