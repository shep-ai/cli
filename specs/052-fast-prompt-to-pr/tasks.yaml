# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 14 tasks across 5 phases, following a
  bottom-up approach through the Clean Architecture layers.

  First, the domain and application layer interfaces are established: the fast
  boolean on CreateFeatureInput, the spec initializer mode parameter, and the
  process service spawn options (tasks 1-3, parallelizable). These define the
  contracts that all downstream work depends on.

  Next, the core infrastructure is built: the fast-implement prompt builder,
  the fast-implement node factory, and the fast feature agent graph factory
  (tasks 4-6, sequential). This is the heart of the feature — a new 2-node
  LangGraph that composes the existing merge node.

  The worker integration (task 7) connects the new graph to the existing
  spawn/resume infrastructure by adding --fast arg parsing and graph factory
  selection.

  Finally, the presentation layer is wired up: the CLI --fast flag (task 8),
  the Web UI toggle and server action (tasks 9-13), and cross-cutting
  validation (task 14).

  Each task follows TDD: write failing tests first (RED), implement the
  minimum to pass (GREEN), then clean up (REFACTOR). Non-code tasks like
  Storybook stories use null TDD cycles.

  ---

