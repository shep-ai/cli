name: fast-prompt-to-pr
summary: >
  Add a fast execution mode that bypasses multi-step SDLC phases and sends the
  user's prompt directly to the implementation executor. Uses a separate
  createFastFeatureAgentGraph() factory with only fast-implement → merge nodes,
  reusing the existing merge infrastructure, FeatureAgentAnnotation state, and
  worker process. The domain model gains a fast boolean on CreateFeatureInput
  (no TypeSpec change), the CLI gains a --fast flag, the Web UI gets a
  CheckboxGroupItem toggle in the create drawer, and the spec initializer gains
  a minimal mode. Implementation follows bottom-up: domain/application layer
  first, then infrastructure (graph + nodes), then presentation (CLI + Web UI).

