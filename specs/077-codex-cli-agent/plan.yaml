name: "codex-cli-agent"
summary: >
  Integrate OpenAI Codex CLI as a new agent executor following the established subprocess-based
  pattern (ClaudeCodeExecutorService, GeminiCliExecutorService). The implementation is purely
  additive — extend TypeSpec AgentType enum, implement CodexCliExecutorService with JSONL
  parsing and session resume, wire through factory/DI/presentation layers. Four phases:
  domain foundation, executor core, factory+DI wiring, and presentation layer integration.

relatedFeatures: []
technologies:
  - "TypeSpec (AgentType enum extension)"
  - "TypeScript (executor service implementation)"
  - "Node.js child_process (subprocess spawning via SpawnFunction)"
  - "OpenAI Codex CLI (codex exec --json --sandbox danger-full-access)"
  - "JSONL (newline-delimited JSON event stream parsing)"
  - "Vitest (unit and integration testing)"
  - "Next.js (web UI agent selection components)"
  - "Storybook (UI component story variants)"
  - "Inquirer.js (TUI agent selection prompt)"

relatedLinks:
  - title: "Codex CLI documentation"
    url: "https://developers.openai.com/codex/cli"
  - title: "Codex CLI non-interactive mode"
    url: "https://developers.openai.com/codex/noninteractive"
  - title: "Codex CLI command reference"
    url: "https://developers.openai.com/codex/cli/reference"
  - title: "Codex models"
    url: "https://developers.openai.com/codex/models"
  - title: "Codex CLI GitHub repository"
    url: "https://github.com/openai/codex"

phases:
  - id: "phase-1"
    name: "Domain Foundation"
    description: |
      Add CodexCli variant to the AgentType enum in TypeSpec and regenerate
      domain output. This must come first because every downstream component
      (executor, factory, DI, UI) depends on the AgentType enum having the
      codex-cli value. Quick phase — single enum addition plus tsp compile.
    parallel: false

  - id: "phase-2"
    name: "Executor Service Core"
    description: |
      Implement CodexCliExecutorService — the main engineering effort. Includes
      execute(), executeStream(), supportsFeature(), JSONL event parsing, session
      resume, authentication injection, and error handling. TDD-driven with
      comprehensive unit tests modeled on gemini-cli-executor.test.ts. This phase
      depends on phase-1 for the AgentType enum value.
    parallel: false

  - id: "phase-3"
    name: "Factory, DI, and Infrastructure Wiring"
    description: |
      Wire the executor into the system: add codex-cli case to AgentExecutorFactory
      (createExecutor, getSupportedAgents, getCliInfo, getSupportedModels), register
      StubSessionRepository in DI container. Update existing factory tests. This phase
      depends on phase-2 for the executor class.
    parallel: false

  - id: "phase-4"
    name: "Presentation Layer Integration"
    description: |
      Add Codex CLI to all user-facing surfaces: TUI agent select prompt, Web UI
      agent settings section, agent type icons, agent model picker, and all
      associated Storybook stories. Includes sourcing the OpenAI brand icon asset.
      This phase depends on phase-3 for factory integration (model picker reads
      from factory).
    parallel: false

