  ## Dependencies

  - **OpenAI Codex CLI binary** (`codex`) must be installed on the user's system
    (`npm i -g @openai/codex` or `brew install --cask codex`)
  - **Authentication:** Either ChatGPT login (`codex login`) for session auth, or
    `CODEX_API_KEY` / `OPENAI_API_KEY` env var for token auth
  - **Existing infrastructure:** Relies on SpawnFunction, IAgentExecutor interface,
    AgentExecutorFactory pattern — all already established
  - **No new npm dependencies required** — Codex is invoked as a subprocess, same as
    all other agent executors

  ## Implementation Strategy

  The implementation follows the exact pattern established by existing executors
  (ClaudeCodeExecutorService, GeminiCliExecutorService):

  1. **TypeSpec:** Add `CodexCli: "codex-cli"` to AgentType enum, compile
  2. **Executor:** Create `CodexCliExecutorService` implementing IAgentExecutor
     - Command: `codex exec` with prompt piped via stdin or as positional arg
     - Output format: `--json` for JSONL streaming, plain text for non-streaming
     - Flags: `--full-auto`, `--sandbox workspace-write`, `--model <model>`
     - Token auth: Set `CODEX_API_KEY` env var when authMethod is token
     - Features: streaming, session-resume (via thread IDs), tool-scoping
  3. **Factory:** Wire codex-cli case in switch, add to supported agents/models/CLI info
  4. **DI:** Register stub session repository
  5. **Presentation:** Add to TUI prompt, web UI icons/labels/options, Storybook stories

  ## Size Estimate

  **M** — This is a well-patterned task with clear precedent (3 existing executor
  implementations to follow). The executor service is the main effort (~400 lines),
  plus TypeSpec enum addition, factory wiring, DI registration, and UI updates across
  TUI and Web. No architectural changes needed — purely additive within established
  patterns. Estimated 2-3 days including TDD test coverage.

