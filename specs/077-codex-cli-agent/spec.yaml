content: |
  ## Problem Statement

  Shep's agent system currently supports Claude Code, Cursor, and Gemini CLI (coming soon) as
  AI coding agent executors. Users who prefer OpenAI's Codex CLI — a Rust-based terminal coding
  agent that uses GPT models — have no way to use it with Shep. Adding Codex CLI as a supported
  agent type extends Shep's multi-agent architecture to cover the OpenAI ecosystem, giving users
  more choice in which AI tool powers their SDLC workflows.

  OpenAI Codex CLI provides a non-interactive `exec` mode that is well-suited for programmatic
  invocation: `codex exec "prompt"` streams progress to stderr and outputs the final result to
  stdout, with `--json` for JSONL structured output. This maps cleanly to Shep's IAgentExecutor
  interface pattern (spawn subprocess, pipe prompt, collect result).

  ## Codebase Analysis

  ### Project Structure

  The codebase follows Clean Architecture with four layers:

  | Layer | Path | Purpose |
  | ----- | ---- | ------- |
  | Domain | `packages/core/src/domain/` | TypeSpec-generated models (AgentType enum, AgentConfig) |
  | Application | `packages/core/src/application/` | Port interfaces (IAgentExecutor, IAgentExecutorFactory) |
  | Infrastructure | `packages/core/src/infrastructure/` | Executor implementations, factory, DI container |
  | Presentation | `src/presentation/` | CLI commands, TUI wizards, Web UI components |

  Agent executors live at `packages/core/src/infrastructure/services/agents/common/executors/`.
  Each executor is a class implementing `IAgentExecutor` that spawns an agent CLI subprocess.

  ### Architecture Patterns

  **Settings-Driven Agent Resolution (MANDATORY):** No component hardcodes an agent type. All
  resolution flows through `getSettings().agent.type` → `AgentExecutorFactory.createExecutor()` →
  concrete executor. Nodes in LangGraph graphs receive the executor as a dependency injection
  parameter.

  **Executor Pattern:** Each agent executor:
  1. Implements `IAgentExecutor` with `execute()`, `executeStream()`, and `supportsFeature()`
  2. Takes a `SpawnFunction` via constructor injection for testability
  3. Builds CLI args from `AgentExecutionOptions` (cwd, model, timeout, systemPrompt, etc.)
  4. Pipes the prompt via stdin to avoid ENAMETOOLONG on Windows
  5. Parses stdout for the result and extracts token usage metadata
  6. Returns `AgentExecutionResult` with result text, sessionId, and usage stats

  **Factory Pattern:** `AgentExecutorFactory` maps `AgentType` → executor class, caches instances,
  and exposes `getSupportedAgents()`, `getCliInfo()`, and `getSupportedModels()`.

  **DI Container:** `packages/core/src/infrastructure/di/container.ts` registers the factory,
  provider, and all related services. Session repositories are registered per-agent-type.

  ### Relevant Technologies

  - **OpenAI Codex CLI:** Rust-based terminal agent installed via `npm i -g @openai/codex` or
    Homebrew. Non-interactive mode: `codex exec [--json] [--full-auto] "prompt"`. Supports
    `--model`, `--sandbox`, `--output-schema`, and `CODEX_API_KEY` env var for CI auth.
  - **TypeSpec:** Domain enum `AgentType` at `tsp/common/enums/agent-config.tsp` compiles to
    `packages/core/src/domain/generated/output.ts`. Adding a new variant here propagates to
    all typed references automatically.
  - **LangGraph:** Workflow graphs are agent-agnostic — they call `executor.execute()` without
    knowing which agent backs it. No graph changes needed for a new executor.

