# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 11 tasks across 3 phases. Phase 1 extends the
  IGitPrService interface and implementation with 5 new git operation methods (fetch,
  local merge, rebase, merge abort, rebase abort) — these are the building blocks.
  Phase 2 builds the BatchRebaseFeaturesUseCase which orchestrates the batch operation:
  feature discovery, filtering, worktree resolution, dirty/missing branch detection,
  merge/rebase execution with conflict abort-and-continue, and typed result aggregation.
  Phase 3 wires everything together with the CLI command, DI registration, and
  result rendering.

  Tasks within Phase 1 (task-2, task-3, task-4) are independent and can be developed
  in parallel after the interface is defined in task-1. Tasks within Phase 2 all depend
  on the base use case (task-5) but are otherwise independent, so task-6 through task-10
  can be developed in any order after task-5. Task-11 (CLI) depends on the use case
  interface from task-5 but can be developed in parallel with the Phase 2 refinement
  tasks since it mocks the use case.
