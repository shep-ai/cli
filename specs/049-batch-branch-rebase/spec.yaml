summary: >
  Add a new CLI command `shep feat rebase` that iterates over all tracked features
  in the current repository, fetches the latest remote default branch (main/master), and
  rebases or merges it into each feature branch. Provides per-feature status reporting
  with skip/fail/success outcomes, handles worktree-based branch isolation, and supports
  configurable strategy (merge default, rebase opt-in) with optional scope filtering.
