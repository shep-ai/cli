        - "Write test: globals.css does not contain margin-left, margin-right, padding-left, padding-right, text-align: left, text-align: right"
      green:
        - "Replace each physical property with its logical equivalent"
        - "Update any custom CSS that uses left/right positioning"
      refactor:
        - "Verify no visual regression in LTR mode"
    estimatedEffort: "1h"

  - id: "task-22"
    phaseId: "phase-4"
    title: "Replace physical Tailwind classes with logical property equivalents"
    description: >
      Audit all Web UI component files for Tailwind classes with physical directional
      values (ml-, mr-, pl-, pr-, left-, right-, text-left, text-right) and replace
      with logical property equivalents (ms-, me-, ps-, pe-, start-, end-, text-start,
      text-end). Tailwind v4 supports logical properties natively.
    state: "Todo"
    dependencies:
      - "task-21"
    acceptanceCriteria:
      - "No Tailwind classes with physical directional values remain in RTL-affected components"
      - "All directional utilities use logical equivalents"
      - "LTR layout renders identically to before"
      - "RTL layout mirrors correctly when dir='rtl' is set"
    tdd:
      red:
        - "Write test: grep for ml-, mr-, pl-, pr- classes in component files returns zero matches"
        - "Write test: RTL rendering of navigation component mirrors layout"
      green:
        - "Systematically replace physical classes in each component file"
        - "Use ms- (margin-inline-start), me- (margin-inline-end), ps-, pe- equivalents"
        - "Replace text-left/text-right with text-start/text-end"
      refactor:
        - "Verify React Flow canvas and absolute-positioned elements still work (may need exceptions)"
    estimatedEffort: "3h"

  - id: "task-23"
    phaseId: "phase-4"
    title: "Lazy-load Noto Sans Arabic and Noto Sans Hebrew fonts"
    description: >
      Configure lazy font loading for Arabic and Hebrew languages. When the user
      switches to Arabic or Hebrew, dynamically load Noto Sans Arabic or Noto Sans
      Hebrew from Google Fonts (via next/font/google or dynamic import). Fonts should
      be cached after first load.
    state: "Todo"
    dependencies:
      - "task-11"
    acceptanceCriteria:
      - "Arabic text renders with Noto Sans Arabic font when language is 'ar'"
      - "Hebrew text renders with Noto Sans Hebrew font when language is 'he'"
      - "Fonts are NOT included in the initial bundle for LTR languages"
      - "Fonts are cached after first load (no re-download on subsequent visits)"
      - "No FOUT for LTR languages"
    tdd:
      red:
        - "Write test: no Arabic/Hebrew font loaded when language is 'en'"
        - "Write test: Arabic font class applied to body when language is 'ar'"
        - "Write test: Hebrew font class applied to body when language is 'he'"
      green:
        - "Create font loading utility that conditionally imports Noto Sans Arabic/Hebrew"
        - "Apply font-family via CSS class on language change"
        - "Integrate with I18nProvider or layout.tsx language switching"
      refactor:
        - "Ensure font loading does not block initial render"
    estimatedEffort: "1.5h"

  - id: "task-24"
    phaseId: "phase-4"
    title: "Verify Radix UI components in RTL mode"
    description: >
      Test all Radix UI components (Select, Dialog, DropdownMenu, Tabs, etc.) in RTL
      mode to verify they render correctly. Radix UI supports RTL via the dir attribute
      on the root element. Fix any components that do not mirror correctly.
    state: "Todo"
    dependencies:
      - "task-22"
    acceptanceCriteria:
      - "Select dropdown opens and aligns correctly in RTL"
      - "Dialog/Sheet components position correctly in RTL"
      - "Tab navigation follows RTL reading order"
      - "DropdownMenu items align correctly in RTL"
      - "All Radix components inherit dir from root HTML element"
    tdd:
      red:
        - "Write test: Select component in RTL context renders dropdown aligned to inline-end"
        - "Write test: Dialog close button positions correctly in RTL"
      green:
        - "Set dir='rtl' on test wrapper elements"
        - "Verify each Radix component type renders correctly"
        - "Fix any components that need explicit dir propagation"
      refactor:
        - "Document any Radix components that require special RTL handling"
    estimatedEffort: "2h"

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: Non-English Translations and Final Validation
  # ═══════════════════════════════════════════════════════════════════

  - id: "task-25"
    phaseId: "phase-5"
    title: "Generate AI translations for all 7 non-English languages"
    description: >
      Use LLM to translate all English translation files (common.json, cli.json, tui.json,
      web.json) into 7 languages: Russian (ru), Portuguese (pt), Spanish (es), Arabic (ar),
      Hebrew (he), French (fr), German (de). Each language gets its own directory under
      translations/ with all 4 namespace files.
    state: "Todo"
    dependencies:
      - "task-20"
    acceptanceCriteria:
      - "translations/{locale}/ directories exist for all 7 non-English languages"
      - "Each language directory contains common.json, cli.json, tui.json, web.json"
      - "All translation files have the same key structure as English files"
      - "No missing keys compared to English files"
      - "All JSON files parse without errors"
      - "Arabic and Hebrew translations use proper RTL text"
    tdd:
      red:
        - "Write test: every non-English language has all 4 namespace files"
        - "Write test: key count in each non-English file matches English file"
        - "Write test: no keys present in English but missing in other languages"
      green:
        - "Generate translations using LLM for each language"
        - "Create directory structure translations/{locale}/"
        - "Validate JSON structure matches English source files"
      refactor:
        - "Review technical terms (git, CLI, API) are not translated where they should remain in English"
    estimatedEffort: "3h"

  - id: "task-26"
    phaseId: "phase-5"
    title: "Write translation completeness validation tests"
    description: >
      Create automated tests that verify translation file completeness and consistency
      across all languages and namespaces. These tests run in CI to prevent regressions
      when new keys are added to English files.
    state: "Todo"
    dependencies:
      - "task-25"
    acceptanceCriteria:
      - "Test verifies all 8 languages have all 4 namespace files"
      - "Test verifies key parity between English and each non-English language"
      - "Test verifies no empty string values in any translation file"
      - "Test verifies all JSON files are valid"
      - "Tests run as part of pnpm test:unit"
    tdd:
      red:
        - "Write test: enumerate all translation files and verify complete coverage"
        - "Write test: deep-compare key trees between English and each language"
        - "Write test: no empty string values in any file"
      green:
        - "Implement recursive key extraction from nested JSON"
        - "Compare key sets between English source and each target language"
        - "Report specific missing keys for easy debugging"
      refactor:
        - "Ensure test output is clear about which language and key is missing"
    estimatedEffort: "1h"

  - id: "task-27"
    phaseId: "phase-5"
    title: "Write language switching integration tests"
    description: >
      Create integration tests that verify the full language switching flow:
      changing language in settings, i18n re-initialization, and UI updates.
      Cover CLI, TUI, and Web UI switching scenarios.
    state: "Todo"
    dependencies:
      - "task-25"
    acceptanceCriteria:
      - "Test: changing language in settings persists to database"
      - "Test: CLI output changes language after settings change"
      - "Test: Web UI re-renders all visible strings on language change"
      - "Test: RTL direction is applied when switching to Arabic or Hebrew"
      - "Test: fallback to English works when a key is missing in target language"
    tdd:
      red:
        - "Write integration test: settings update with language 'fr' persists and loads correctly"
        - "Write integration test: Web UI renders French strings after language change"
        - "Write integration test: switching to Arabic sets dir='rtl' on HTML element"
        - "Write integration test: missing key in Russian falls back to English"
      green:
        - "Implement test fixtures with settings database"
        - "Test each presentation layer's language switching flow"
        - "Verify RTL attribute changes"
      refactor:
        - "Extract common test setup into shared fixtures"
    estimatedEffort: "2h"

  - id: "task-28"
    phaseId: "phase-5"
    title: "Run full test suite and fix regressions"
    description: >
      Run pnpm test, pnpm validate, and pnpm build:release to verify all existing
      tests pass with i18n changes. Fix any regressions introduced by string extraction,
      RTL changes, or dependency additions. This is the final validation gate.
    state: "Todo"
    dependencies:
      - "task-26"
      - "task-27"
    acceptanceCriteria:
      - "pnpm test passes with zero failures"
      - "pnpm validate passes (lint + format + typecheck + tsp)"
      - "pnpm build:release succeeds"
      - "No regressions in existing functionality"
      - "All new tests pass"
    tdd:
      red:
        - "Run full test suite and capture any failures"
      green:
        - "Fix each failing test by correcting the i18n integration"
        - "Update test assertions that expect hardcoded English strings to use translation mocking"
      refactor:
        - "Verify test mocking patterns are consistent across all test files"
    estimatedEffort: "2h"

totalEstimate: "42h"
