content: |
  ## Summary

  This task breakdown covers 28 tasks across 5 phases to implement multi-language i18n support.

  **Phase 1 (Domain Foundation, 5 tasks, ~2.5h)** establishes the Language TypeSpec enum,
  extends UserProfile with preferredLanguage, creates database migration 049, and updates
  the settings mapper and repository. This is the foundation all other phases build on.

  **Phase 2 (i18n Framework Setup, 6 tasks, ~5.5h)** installs i18next/react-i18next, creates
  the English translation file structure, builds initialization modules for CLI, TUI, and Web,
  and wires the I18nProvider into the Web UI root layout with server-side language detection.

  **Phase 3 (String Extraction, 9 tasks, ~20h)** is the largest phase. It systematically
  extracts ~600 hardcoded English strings across all three presentation layers to translation
  keys. It also creates the language settings section in the Web UI with Storybook stories
  and adds a language option to the CLI settings command.

  **Phase 4 (RTL Support, 4 tasks, ~7.5h)** implements right-to-left layout support by
  replacing physical CSS properties with logical properties, lazy-loading Arabic and Hebrew
  fonts, and verifying Radix UI components work correctly in RTL mode.

  **Phase 5 (Translations and Validation, 4 tasks, ~8h)** generates AI-powered translations
  for 7 non-English languages, writes translation completeness tests, creates language switching
  integration tests, and runs the full test suite to catch regressions.

  The dependency chain ensures each phase builds on the previous one's output. Within phases,
  tasks are ordered so that foundational work (enum definition, migration, framework setup)
  precedes the work that depends on it (string extraction, RTL styling, translation generation).
