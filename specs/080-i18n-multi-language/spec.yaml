summary: >
  Introduce a full internationalization (i18n) system across all three presentation layers
  (CLI, TUI, Web UI) supporting 8 languages: English, Russian, Portuguese, Spanish, Arabic,
  Hebrew, French, and German. Arabic and Hebrew require right-to-left (RTL) layout support
  in the Web UI. Includes a new Language enum in TypeSpec, a language preference in Settings,
  translation file infrastructure with namespaced JSON resource bundles, and a language selector
  in both the Web UI settings page and CLI. All ~600 hardcoded English strings will be extracted
  to translation keys and resolved at runtime via i18next.
