name: "i18n-multi-language"
summary: >
  Implement multi-language i18n support across CLI, TUI, and Web UI using i18next as the
  universal translation framework. A new Language TypeSpec enum and Settings.user.preferredLanguage
  field anchor the domain model. Translation files are organized in a shared translations/
  directory with four namespaces (common, cli, tui, web). The Web UI gains RTL support for
  Arabic and Hebrew via CSS logical properties and lazy-loaded Noto Sans fonts. Implementation
  proceeds in five phases: domain foundation, i18n framework setup, string extraction per layer,
  RTL support, and cross-cutting integration testing.

