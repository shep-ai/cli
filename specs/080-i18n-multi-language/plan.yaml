phases:
  - id: "phase-1"
    name: "Domain Foundation"
    description: >
      Establish the domain model and persistence layer for language preference. This phase
      creates the Language TypeSpec enum, extends UserProfile with preferredLanguage, runs
      TypeSpec compilation, adds database migration 049, and updates the settings mapper and
      repository. All subsequent phases depend on this foundation being solid.
    parallel: false

  - id: "phase-2"
    name: "i18n Framework Setup"
    description: >
      Install i18next and react-i18next, create the shared translation directory structure,
      author English translation files for all four namespaces, and build initialization
      modules for each presentation layer. This phase produces the scaffolding that string
      extraction in Phase 3 plugs into.
    parallel: false

  - id: "phase-3"
    name: "String Extraction and Integration"
    description: >
      Extract all ~600 hardcoded English strings across CLI (51 files), TUI (11 files), and
      Web UI (45+ files) to translation keys. Add the language settings section to the Web UI
      settings page with a language selector dropdown and Storybook stories. Add a language
      option to the CLI settings command. This is the largest phase by volume.
    parallel: false

  - id: "phase-4"
    name: "RTL Support and Multilingual Fonts"
    description: >
      Implement right-to-left layout support for Arabic and Hebrew in the Web UI. Replace
      physical CSS directional properties with logical properties, set dynamic lang and dir
      attributes on the root HTML element, lazy-load Noto Sans Arabic and Noto Sans Hebrew
      fonts, and verify Radix UI components render correctly in RTL mode.
    parallel: false

  - id: "phase-5"
    name: "Non-English Translations and Final Validation"
    description: >
      Generate AI-powered translations for all 7 non-English languages across all four
      namespaces. Run comprehensive cross-layer integration tests verifying language switching,
      translation completeness, RTL rendering, and fallback behavior. Fix any remaining issues.
    parallel: false

