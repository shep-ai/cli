content: |
  ## Architecture Overview

  The i18n system follows Clean Architecture boundaries precisely:

  **Domain layer** — Contains only the Language enum and Settings.user.preferredLanguage field.
  No i18n library imports, no translation logic. The domain defines *what* languages exist and
  *where* the preference is stored; it knows nothing about how translations work.

  **Application layer** — Untouched. The existing UpdateSettingsUseCase already handles arbitrary
  Settings field updates via its generic update path. No new use cases needed for language changes.

  **Infrastructure layer** — Migration 049 adds the `user_preferred_language` TEXT column to the
  settings table with DEFAULT 'en'. The settings mapper adds bidirectional conversion for the new
  field. The repository's INSERT/UPDATE statements include the new column.

  **Presentation layer** — Each presentation layer (CLI, TUI, Web) owns its own i18n initialization
  module. All three share a common i18next core and load from the same `translations/` directory.
  Translation is a UI concern — it lives entirely in the presentation layer.

  ### Translation File Architecture

  ```
  translations/
  ├── en/
  │   ├── common.json    # Shared strings: errors, confirmations, labels
  │   ├── cli.json       # CLI-specific: command descriptions, help text
  │   ├── tui.json       # TUI-specific: prompt messages, choice labels
  │   └── web.json       # Web UI-specific: component text, headings, tooltips
  ├── ru/
  │   ├── common.json
  │   ├── cli.json
  │   ├── tui.json
  │   └── web.json
  ├── ... (pt, es, ar, he, fr, de)
  ```

  **Key convention:** Keys use dot-separated hierarchical naming (i18next standard):
  - `cli.commands.init.description` maps to nested JSON in cli.json under `commands.init.description`
  - `common.errors.notFound` maps to nested JSON in common.json under `errors.notFound`
  - `web.settings.language.label` maps to nested JSON in web.json under `settings.language.label`

  ### i18n Initialization Flow

  **CLI/TUI:** On startup, the CLI bootstrap reads `Settings.user.preferredLanguage` from the
  database (via the existing settings service), then calls the presentation-layer i18n init
  module which configures i18next with the correct locale and loads the relevant namespace files.

  **Web UI:** The root `layout.tsx` (server component) fetches settings synchronously via
  better-sqlite3, extracts the language preference, and passes it to a client-side I18nProvider
  component. The provider initializes react-i18next with the correct locale. The HTML `lang` and
  `dir` attributes are set server-side to prevent any flash of wrong language/direction.

  ### RTL Strategy

  RTL is implemented via CSS logical properties — the modern, automatic approach:
  - `margin-left` becomes `margin-inline-start`
  - `padding-right` becomes `padding-inline-end`
  - `text-align: left` becomes `text-align: start`

  Tailwind v4 supports logical properties natively. The root `<html>` element gets
  `dir="rtl"` for Arabic and Hebrew, `dir="ltr"` for all other languages. Radix UI
  components inherit `dir` from the root element and render correctly in both directions.

  Noto Sans Arabic and Noto Sans Hebrew fonts are lazy-loaded only when the user selects
  those languages, avoiding any bundle size impact for the majority of LTR users.

  ## Key Design Decisions

  ### 1. Shared i18next core across all layers (decision-002)
  react-i18next was chosen over next-intl because it shares the same i18next core used by
  CLI and TUI. This means one set of translation files, one namespace convention, and one
  API pattern. next-intl would have required a second parallel i18n system.

  ### 2. UserProfile.preferredLanguage placement (decision-001)
  Language preference is placed in the UserProfile nested object alongside name, email, and
  githubUsername. This follows the established nesting pattern for user-specific settings and
  maps cleanly to a `user_preferred_language` column in the flattened database schema.

  ### 3. Shared directory with layer namespaces (decision-003)
  A single `translations/` directory at the project root with per-language subdirectories
  and per-layer namespace files. Common strings (errors, labels) go in `common.json` and are
  shared across layers. Layer-specific strings go in `cli.json`, `tui.json`, or `web.json`.

  ### 4. CSS logical properties for RTL (decision-006)
  Logical properties work automatically for both LTR and RTL without conditional logic.
  This is less error-prone than Tailwind `rtl:` variant modifiers which require explicit
  RTL handling for every directional style.

  ### 5. Server-side language detection (decision-008)
  Root layout fetches language from settings on the server and sets HTML `lang`/`dir`
  attributes during SSR. This prevents any flash of wrong language or direction — the page
  renders correctly from the first frame.

  ### 6. Lazy font loading (decision-007)
  Arabic and Hebrew fonts are loaded only when the user switches to those languages.
  This avoids penalizing the ~95% of users who use LTR languages with an extra 100-200KB
  in the initial bundle.

  ## Implementation Strategy

  The five phases are ordered by dependency:

  **Phase 1 (Domain Foundation)** must come first because all other phases depend on the
  Language enum existing in TypeSpec and the database being able to persist language preference.
  This phase is small (S) and well-defined.

  **Phase 2 (i18n Framework Setup)** installs the libraries and creates the translation
  infrastructure. It depends on Phase 1 for the Language type but is otherwise independent.
  The English translation files authored here become the source of truth for all other languages.

  **Phase 3 (String Extraction)** is the largest phase (L). It depends on Phase 2 for the
  i18n infrastructure to exist. The work is parallelizable across layers (CLI, TUI, Web) but
  must be done carefully to avoid merge conflicts. The language settings UI is also built here.

  **Phase 4 (RTL Support)** depends on Phase 3 for the Web UI to be using i18n. RTL changes
  affect CSS and layout, which are easier to validate after string extraction is complete.

  **Phase 5 (Translations and Validation)** comes last because it needs all English keys
  finalized before generating translations for 7 other languages. Integration testing validates
  the entire system end-to-end.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Volume: ~600 strings across 107+ files creates risk of missed strings | Systematic file-by-file extraction with grep verification. Run a post-extraction script to detect remaining hardcoded strings. |
  | Translation key conflicts between namespaces | Namespace prefixing convention (cli.*, tui.*, web.*) eliminates conflicts. Common keys live only in common namespace. |
  | RTL layout breaks in complex components (React Flow canvas, modals) | RTL testing with visual regression. Canvas and absolutely-positioned elements may need explicit RTL exceptions. |
  | i18next initialization race condition on Web UI | Server-side language detection in layout.tsx eliminates client-side race. Provider wraps entire app before any component renders. |
  | Database migration backwards compatibility | Migration adds column with DEFAULT 'en'. Existing installations get English by default, no data loss. Mapper handles missing column gracefully via nullish coalescing. |
  | Bundle size increase from translation files | Lazy-load non-active language files. Only load needed namespaces per layer. Fonts lazy-loaded on demand. |
  | TypeSpec compilation breaking existing types | Run tsp:compile immediately after TypeSpec changes and verify output.ts diff. New Language enum and optional field should be additive-only. |
