name: pending-feature-state
summary: >
  Implementation plan for adding SdlcLifecycle.Pending state. The feature
  reuses the proven shouldSpawn=false pattern from Blocked features, adds a
  new StartFeatureUseCase following the ResumeFeatureUseCase blueprint, and
  extends the CLI, Web UI, and SSE layers to support creating, displaying,
  and starting pending features. Five phases: domain foundation, application
  layer (create + start use cases), CLI commands, Web UI state + actions,
  and integration testing with Storybook.

relatedFeatures:
  - '041-feature-dependencies (Blocked state — shouldSpawn=false pattern reused)'
  - '024-optimistic-feature-creation (two-phase create pattern leveraged)'

technologies:
  - TypeSpec (add Pending enum value to SdlcLifecycle)
  - SQLite (TEXT lifecycle column — no migration needed)
  - Commander.js (--pending flag and new start subcommand)
  - tsyringe (DI for StartFeatureUseCase)
  - React / Next.js (server action + feature node state)
  - lucide-react (Clock icon for pending state)
  - Storybook (pending state story)

relatedLinks: []

phases:
  - id: phase-1
    name: 'Domain Foundation'
    description: >
      Add the Pending enum value to TypeSpec, compile to regenerated output,
      verify lifecycle gates exclude Pending, and add the LIFECYCLE_TO_NODE
      SSE mapping. This phase comes first because every subsequent layer
      depends on the domain enum value existing in generated code.
    parallel: false

  - id: phase-2
    name: 'Application Layer — CreateFeature + StartFeature Use Cases'
    description: >
      Extend CreateFeatureInput with pending flag, modify createRecord() to
      handle pending state, and build the new StartFeatureUseCase following
      the ResumeFeatureUseCase blueprint. Register both in the DI container
      with string-token aliases. This phase is the core business logic and
      must complete before presentation layers can consume the use cases.
    parallel: false

  - id: phase-3
    name: 'CLI Presentation — --pending flag and start command'
    description: >
      Add --pending flag to feat new command, create the new feat start
      subcommand, and update feat ls to display Pending features with
      distinct formatting. CLI is implemented before Web UI because it
      provides the fastest feedback loop for testing the use cases.
    parallel: false

  - id: phase-4
    name: 'Web UI — State, Actions, and Components'
    description: >
      Add pending to FeatureNodeState and FeatureLifecyclePhase types, add
      state config with Clock icon and slate colors, update deriveNodeState()
      and deriveLifecycle(), add onStartFeature callback to GraphCallbacks and
      derive-graph, render Start button on feature node, create start-feature
      server action, wire handleStartFeature in control-center-state, add
      pending checkbox to feature-create-drawer, and create Storybook stories.
    parallel: false

  - id: phase-5
    name: 'Integration Testing and Validation'
    description: >
      Write integration tests verifying the full pending-to-running flow
      (create with pending flag, verify Pending lifecycle, start, verify
      transition and agent spawn). Run pnpm validate to confirm zero errors.
      This phase is last because it exercises the entire vertical slice.
    parallel: false

