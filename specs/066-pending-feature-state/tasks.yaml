name: pending-feature-state
summary: >
  20 tasks across 5 phases implementing SdlcLifecycle.Pending state. Covers
  domain enum extension, CreateFeatureUseCase pending flag, new
  StartFeatureUseCase, CLI commands (--pending flag + feat start), Web UI
  state derivation + Start button + server action + Storybook, and
  integration testing with full validation.

relatedFeatures:
  - '041-feature-dependencies (Blocked state — shouldSpawn=false pattern)'
  - '024-optimistic-feature-creation (two-phase create pattern)'

technologies:
  - TypeSpec
  - tsyringe
  - Commander.js
  - React / Next.js
  - lucide-react
  - Storybook

relatedLinks: []

tasks:
  # ── Phase 1: Domain Foundation ────────────────────────────────────────

  - id: task-1
    phaseId: phase-1
    title: 'Add SdlcLifecycle.Pending enum value to TypeSpec'
    description: >
      Add a Pending enum member to SdlcLifecycle in tsp/common/enums/lifecycle.tsp,
      placed after Blocked and before Deleting. Run pnpm tsp:compile to regenerate
      output.ts. Verify the new value appears in the generated SdlcLifecycle enum.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'Pending member exists in SdlcLifecycle enum in lifecycle.tsp with @doc annotation'
      - 'pnpm tsp:compile succeeds without errors'
      - 'SdlcLifecycle.Pending is available in packages/core/src/domain/generated/output.ts'
    tdd:
      red:
        - 'Write a test that imports SdlcLifecycle and asserts SdlcLifecycle.Pending is defined'
      green:
        - 'Add Pending to lifecycle.tsp enum after Blocked, run pnpm tsp:compile'
      refactor:
        - 'Ensure @doc annotation is descriptive and consistent with other enum members'
    estimatedEffort: '15min'

  - id: task-2
    phaseId: phase-1
    title: 'Verify lifecycle gates exclude Pending'
    description: >
      Confirm that POST_IMPLEMENTATION in lifecycle-gates.ts does not include
      SdlcLifecycle.Pending. Add a clarifying comment that Pending features
      cannot unblock children. Add a unit test to guard this invariant.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'POST_IMPLEMENTATION does not contain SdlcLifecycle.Pending'
      - 'A unit test asserts Pending is not in POST_IMPLEMENTATION'
      - 'A clarifying comment documents why Pending is excluded'
    tdd:
      red:
        - 'Write test: expect(POST_IMPLEMENTATION.has(SdlcLifecycle.Pending)).toBe(false)'
      green:
        - 'Verify the set already excludes Pending (no code change needed); add comment'
      refactor:
        - 'Ensure comment is concise and placed near the set definition'
    estimatedEffort: '10min'

  - id: task-3
    phaseId: phase-1
    title: 'Add Pending to LIFECYCLE_TO_NODE SSE mapping'
    description: >
      Add [SdlcLifecycle.Pending]: "pending" entry to the LIFECYCLE_TO_NODE
      record in agent-events/route.ts. Also add "pending" entries to
      sdlcLifecycleMap and phaseNameToLifecycle in derive-feature-state.ts
      so the SSE event pipeline correctly handles pending features.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'LIFECYCLE_TO_NODE contains SdlcLifecycle.Pending mapped to "pending"'
      - 'sdlcLifecycleMap contains Pending mapped to "pending" FeatureLifecyclePhase'
      - 'phaseNameToLifecycle contains "pending" mapped to "pending" FeatureLifecyclePhase'
      - 'No TypeScript errors from the new mappings'
    tdd:
      red:
        - 'Write test: import LIFECYCLE_TO_NODE or sdlcLifecycleMap and assert Pending mapping exists'
      green:
        - 'Add the mapping entries to route.ts and derive-feature-state.ts'
      refactor:
        - 'Verify ordering consistency with other entries'
    estimatedEffort: '15min'

  # ── Phase 2: Application Layer ────────────────────────────────────────

  - id: task-4
    phaseId: phase-2
    title: 'Add pending field to CreateFeatureInput'
    description: >
      Add "pending?: boolean" to CreateFeatureInput in types.ts. This is the
      input contract for the pending flag flowing from CLI/Web to the use case.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'CreateFeatureInput has pending?: boolean field'
      - 'TypeScript compiles without errors'
    tdd:
      red:
        - 'Write test that constructs CreateFeatureInput with pending: true and asserts it compiles'
      green:
        - 'Add pending?: boolean field to the interface after fast field'
      refactor:
        - 'Add JSDoc comment explaining the field purpose'
    estimatedEffort: '5min'

  - id: task-5
    phaseId: phase-2
    title: 'Handle pending flag in CreateFeatureUseCase.createRecord()'
    description: >
      Modify createRecord() to check input.pending before the parentId check.
      When pending is true, set initialLifecycle = SdlcLifecycle.Pending and
      shouldSpawn = false. When both pending and parentId are provided, Pending
      takes precedence — the parent gate is deferred to StartFeatureUseCase.
    state: Todo
    dependencies:
      - task-4
    acceptanceCriteria:
      - 'createRecord({pending: true}) sets lifecycle to Pending and shouldSpawn to false'
      - 'createRecord({pending: true, parentId: "x"}) sets lifecycle to Pending (not Blocked)'
      - 'createRecord({pending: false}) or no flag preserves existing behavior'
      - 'initializeAndSpawn skips agent spawn when shouldSpawn is false (already works via line 288)'
    tdd:
      red:
        - 'Write test: call createRecord with pending:true, assert feature.lifecycle === Pending'
        - 'Write test: call createRecord with pending:true + parentId, assert lifecycle === Pending (not Blocked)'
        - 'Write test: call createRecord without pending, assert existing behavior unchanged'
      green:
        - 'Add pending check before parentId block in createRecord(): if (input.pending) { initialLifecycle = SdlcLifecycle.Pending; shouldSpawn = false; }'
      refactor:
        - 'Consider extracting initial lifecycle determination into a private method if the logic gets complex'
    estimatedEffort: '30min'

  - id: task-6
    phaseId: phase-2
    title: 'Create StartFeatureUseCase'
    description: >
      Create packages/core/src/application/use-cases/features/start-feature.use-case.ts
      following the ResumeFeatureUseCase pattern. Injects IFeatureRepository,
      IAgentRunRepository, IFeatureAgentProcessService, IWorktreeService.
      execute() method: find feature by ID (with prefix matching), validate
      lifecycle === Pending, check parent gate if parentId exists (transition
      to Blocked if parent not in POST_IMPLEMENTATION), transition lifecycle
      to Requirements (or Implementation if fast), find existing AgentRun,
      derive worktree path, spawn agent. Returns StartFeatureResult with
      feature and agentRun.
    state: Todo
    dependencies:
      - task-1
      - task-2
    acceptanceCriteria:
      - 'StartFeatureUseCase is @injectable() with proper @inject decorators'
      - 'Throws "Feature not found" when feature does not exist'
      - 'Throws "Feature is not in Pending state" when lifecycle !== Pending'
      - 'Transitions to Blocked when parentId exists and parent not in POST_IMPLEMENTATION'
      - 'Transitions to Requirements when no parent gate issue and feature is not fast'
      - 'Transitions to Implementation when feature.fast is true'
      - 'Spawns agent via IFeatureAgentProcessService.spawn() with correct args'
      - 'Returns updated feature and agentRun'
    tdd:
      red:
        - 'Write test: feature not found → throws'
        - 'Write test: feature lifecycle !== Pending → throws with descriptive message'
        - 'Write test: Pending feature with no parent → transitions to Requirements, spawns agent'
        - 'Write test: Pending fast feature → transitions to Implementation, spawns agent'
        - 'Write test: Pending feature with parent not in POST_IMPLEMENTATION → transitions to Blocked, no spawn'
        - 'Write test: Pending feature with parent in POST_IMPLEMENTATION → transitions to Requirements, spawns agent'
        - 'Write test: no agentRunId → throws'
        - 'Write test: missing specPath → throws'
      green:
        - 'Implement execute() following ResumeFeatureUseCase pattern but simpler: no new run creation, no thread preservation, no crashed detection'
      refactor:
        - 'Extract parent gate check into private method for readability'
        - 'Ensure error messages are human-readable per NFR-8'
    estimatedEffort: '1h 30min'

  - id: task-7
    phaseId: phase-2
    title: 'Register StartFeatureUseCase in DI container'
    description: >
      Add import, registerSingleton, and string-token alias (useFactory
      pattern) for StartFeatureUseCase in container.ts. Follow the exact
      pattern used for ResumeFeatureUseCase.
    state: Todo
    dependencies:
      - task-6
    acceptanceCriteria:
      - 'StartFeatureUseCase imported at top of container.ts'
      - 'container.registerSingleton(StartFeatureUseCase) called near ResumeFeatureUseCase registration'
      - 'String-token alias registered: container.register("StartFeatureUseCase", { useFactory: (c) => c.resolve(StartFeatureUseCase) })'
      - 'DI resolution works for both class token and string token'
    tdd:
      red:
        - 'Write test: resolve StartFeatureUseCase from container, assert it is an instance of StartFeatureUseCase'
      green:
        - 'Add registration lines to container.ts'
      refactor:
        - 'Verify import order is consistent with surrounding imports'
    estimatedEffort: '10min'

  # ── Phase 3: CLI Presentation ─────────────────────────────────────────

  - id: task-8
    phaseId: phase-3
    title: 'Add --pending flag to feat new command'
    description: >
      Add .option("--pending", "Create feature without starting the agent")
