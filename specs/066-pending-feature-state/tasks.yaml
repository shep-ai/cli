content: |
  ## Summary

  The implementation follows a bottom-up approach across 5 phases. First, the
  domain foundation establishes the Pending enum value and updates all mapping
  layers (lifecycle gates, SSE, state derivation). Next, the application layer
  adds the pending flag to CreateFeatureInput and builds the new
  StartFeatureUseCase with full TDD coverage. The CLI phase adds the --pending
  flag to feat new, creates the feat start subcommand, and updates feat ls
  formatting. The Web UI phase adds the pending visual state (Clock icon,
  slate colors, Start button), server action, state wiring, create drawer
  checkbox, and Storybook stories. Finally, integration tests verify the full
  pending-to-running flow and pnpm validate confirms zero errors.

  Each task follows RED-GREEN-REFACTOR: write a failing test first, implement
  the minimal code to pass, then clean up. The total effort is estimated at
  ~8 hours across 20 tasks. The critical path runs through Phase 1 (domain) →
  Phase 2 (StartFeatureUseCase) → Phase 3 (CLI) → Phase 4 (Web UI) →
  Phase 5 (integration + validation).
