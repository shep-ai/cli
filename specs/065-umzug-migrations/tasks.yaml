content: |
  ## Summary

  The implementation is organized into 11 tasks across 4 phases, estimated at ~10.75 hours total.

  First, the foundation is laid by installing umzug and building the custom SQLiteMigrationStorage
  adapter with bootstrap seeder logic (Phase 1, tasks 1-3). In parallel with task 2-3, the legacy
  migrations are extracted into a separate module (Phase 2, task 4).

  Next, the umzug runner is wired into the refactored migrations.ts, combining the storage adapter,
  legacy migrations, and glob-based discovery for new migration files (Phase 3, tasks 5-6).

  Finally, the comprehensive test suite is updated to work with umzug's tracking mechanism, all
  remaining test files are verified, and the full validation suite confirms zero regressions
  (Phase 4, tasks 7-11).

  The key architectural constraint is preserving the `runSQLiteMigrations(db)` export signature,
  which eliminates changes to 16 importing files and keeps the refactoring internal to the
  migration modules.
