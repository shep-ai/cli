  | Area | Impact | Reasoning |

  | ---- | ------ | --------- |

  | `packages/core/src/infrastructure/persistence/sqlite/migrations.ts` | High |
  Core file being refactored — umzug replaces the manual migration runner;
  legacy migration array stays but runner logic is replaced |

  | `packages/core/src/infrastructure/persistence/sqlite/` (new files) | High |
