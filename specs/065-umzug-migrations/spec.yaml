# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The current migration system in `packages/core/src/infrastructure/persistence/sqlite/migrations.ts`
  uses a manual approach with significant limitations:

  1. **No migration history**: Only `PRAGMA user_version` tracks the current version number — there is
     no record of which specific migrations ran, when they ran, or how long they took.
  2. **Monolithic file**: All 34 migrations (593 lines) are inlined in a single TypeScript file, making
     it increasingly difficult to navigate and maintain.
  3. **No rollback support**: There are no down/undo migrations — schema changes are one-way only.
  4. **No validation or logging**: No metadata about migration success/failure, no timing, no audit trail.
  5. **Repetitive handler logic**: Migrations 20-31 contain nearly identical boilerplate for conditional
     DDL (checking if columns exist before adding them).
  6. **Fragile versioning**: The linear `user_version` approach has already caused issues during rebasing,
     requiring compensating migrations (e.g., migrations 19-23 with backfill logic).

  The goal is to replace this with **umzug**, a mature migration framework that provides proper tracking,
  up/down support, better error handling, and a clean migration file structure.

  ## Codebase Analysis

  ### Project Structure

  This is a Clean Architecture monorepo (`@shepai/cli`) with:

  - `packages/core/src/domain/` — Domain layer (TypeSpec-generated models, no external deps)
  - `packages/core/src/application/` — Use cases and output port interfaces
  - `packages/core/src/infrastructure/` — External concerns: DB, agents, services
  - `src/presentation/` — CLI (Commander), TUI (Inquirer), Web UI (Next.js 16)

  The migration system lives entirely in the **infrastructure layer**:

  - `packages/core/src/infrastructure/persistence/sqlite/migrations.ts` — Migration definitions + runner (593 lines, 34 migrations)
  - `packages/core/src/infrastructure/persistence/sqlite/connection.ts` — Singleton DB connection via `getSQLiteConnection()`
  - `packages/core/src/infrastructure/di/container.ts` — Calls `runSQLiteMigrations(db)` at line 146 during `initializeContainer()`

  ### Architecture Patterns

  - **Clean Architecture** with strict inward dependency flow
  - **Dependency Injection** via tsyringe — container initialized in `initializeContainer()`
  - **Singleton DB connection** — `getSQLiteConnection()` returns cached instance with WAL mode, NORMAL synchronous, foreign keys, defensive mode
  - **Inline SQL migrations** — SQL embedded in TypeScript to survive `tsc` compilation
  - **Migration interface**: `{ version: number; sql: string; handler?: (db) => void }` — 27 pure SQL + 7 handler-based
  - **Version tracking**: `PRAGMA user_version` (integer, no history), dynamically computed via `LATEST_SCHEMA_VERSION = MIGRATIONS[MIGRATIONS.length - 1].version`

  ### Relevant Technologies

  - **better-sqlite3 v12.6.2** — Synchronous SQLite driver (stays as-is)
  - **tsyringe** — DI container (migration runs during container init)
  - **TypeScript 5.3** — Compiled with `tsc` + `tsc-alias` (no .sql file support)
  - **Vitest 4.0.18** — Test framework (existing migration test suite)
  - **@blackglory/better-sqlite3-migrations ^0.1.20** — Listed in root package.json but completely UNUSED (zero imports in codebase, can be removed)

  ### Current Migration System Details

  **34 migrations** (versions 1-34) managing 5 tables:

  | Table | Created In | Purpose |
  | --- | --- | --- |
  | `settings` | V1 | User configuration, model preferences |
  | `agent_runs` | V3 | AI agent execution tracking |
  | `features` | V4 | Features being developed |
  | `phase_timings` | V8 | Phase duration tracking |
  | `repositories` | V15 | Git repository metadata |

  **Execution flow**: `initializeContainer() → getSQLiteConnection() → runSQLiteMigrations(db)`

  **Connection configuration** (connection.ts):
  - WAL journal mode for concurrent reads
  - NORMAL synchronous for write performance
  - Foreign keys enabled
  - Defensive mode enabled
  - 64MB cache size

  **Test coverage**:
  - `tests/integration/infrastructure/persistence/sqlite/migrations.test.ts` (872 lines) — comprehensive suite
  - `tests/integration/infrastructure/persistence/sqlite/migration-015.test.ts` (116 lines) — focused test
  - `tests/helpers/database.helper.ts` — Utilities: `createInMemoryDatabase()`, `createDatabaseWithMigrations()`, `tableExists()`, `getSchemaVersion()`, `getTableSchema()`, `getTableIndexes()`

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/persistence/sqlite/migrations.ts` | High | Core file being replaced — umzug replaces the manual migration runner and migration format |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Migration initialization call (line 146) changes from `runSQLiteMigrations(db)` to umzug instance |
  | `tests/integration/infrastructure/persistence/sqlite/migrations.test.ts` | High | 872-line test suite must be updated to work with umzug's API |
  | `tests/integration/infrastructure/persistence/sqlite/migration-015.test.ts` | Medium | Specific migration test (116 lines) may need adaptation for umzug format |
  | `tests/helpers/database.helper.ts` | Medium | `createDatabaseWithMigrations()` helper signature will change to use umzug |
  | `packages/core/src/infrastructure/persistence/sqlite/connection.ts` | Low | May need minor adjustments for umzug storage configuration |
  | `package.json` (root) | Low | Add umzug dependency, remove unused @blackglory/better-sqlite3-migrations |

  ## Dependencies

  - **umzug** — New dependency (migration framework, provides Umzug class + storage adapters)
  - **better-sqlite3 v12.6.2** — Existing dependency (umzug custom storage adapter will use this)
  - **tsyringe** — Existing DI container (initialization point at `initializeContainer()`)
  - All **repository implementations** depend on migrations running first (no change in contract)
  - All **integration tests** use `createInMemoryDatabase()` + `runSQLiteMigrations()` pattern (all callers must update)

  ## Success Criteria

  - [ ] umzug is installed and configured with a custom better-sqlite3 storage adapter
  - [ ] All 34 existing migrations are converted to umzug-compatible format
  - [ ] Existing user databases (with PRAGMA user_version up to 34) are seamlessly migrated to umzug tracking
  - [ ] New migrations can be added as individual .ts files with up/down functions
  - [ ] Migration history is tracked in a dedicated table (which migrations ran, when)
  - [ ] All existing migration tests pass with the new system
  - [ ] DI container initialization works with umzug
  - [ ] @blackglory/better-sqlite3-migrations dependency is removed
  - [ ] No data loss or schema corruption during transition

  ## Size Estimate

  **M** — This is a medium-sized refactoring effort. The core work involves:
  (1) installing and configuring umzug with a custom better-sqlite3 storage adapter (umzug is async-first but better-sqlite3 is synchronous — need adapter),
  (2) converting 34 existing inline migrations to umzug format while preserving backward compatibility,
  (3) implementing a bootstrap mechanism to seed umzug's tracking table for existing databases that already have PRAGMA user_version set,
  (4) updating the DI container initialization (container.ts line 146),
  (5) updating the comprehensive test suite (872+ lines of migration tests plus helpers).
  The scope is well-defined and contained within the infrastructure layer, but requires careful
  handling of the transition for existing user databases.

