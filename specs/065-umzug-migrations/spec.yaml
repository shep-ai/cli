content: >
  ## Problem Statement


  The current migration system in
  `packages/core/src/infrastructure/persistence/sqlite/migrations.ts`

  uses a manual approach with significant limitations:


  1. **No migration history**: Only `PRAGMA user_version` tracks the current
  version number — there is
     no record of which specific migrations ran, when they ran, or how long they took.
  2. **Monolithic file**: All 34 migrations (593 lines) are inlined in a single
  TypeScript file, making
     it increasingly difficult to navigate and maintain.
  3. **No rollback support**: There are no down/undo migrations — schema changes
  are one-way only.

  4. **No validation or logging**: No metadata about migration success/failure,
  no timing, no audit trail.

  5. **Repetitive handler logic**: Migrations 20-31 contain nearly identical
  boilerplate for conditional
     DDL (checking if columns exist before adding them).
  6. **Fragile versioning**: The linear `user_version` approach has already
  caused issues during rebasing,
     requiring compensating migrations (e.g., migrations 19-23 with backfill logic).

  The goal is to replace this with **umzug**, a mature migration framework that
  provides proper tracking,

  up/down support, better error handling, and a clean migration file structure.


  ## Success Criteria


  - [ ] umzug is installed and configured with a custom better-sqlite3 storage
  adapter

  - [ ] All 34 existing migrations are preserved and execute identically under
  umzug

  - [ ] Existing user databases (PRAGMA user_version 1-34) transition seamlessly
  to umzug tracking with zero user intervention

  - [ ] The umzug_migrations tracking table records migration name and execution
  timestamp for each applied migration

  - [ ] PRAGMA user_version continues to be set as a secondary safety marker
  alongside umzug tracking

  - [ ] New migrations (35+) can be added as individual .ts files with up() and
  optional down() functions

  - [ ] New migrations (35+) must include a down() rollback function

  - [ ] All existing migration integration tests pass with the new system (zero
  regressions)

  - [ ] DI container initialization (initializeContainer) works with umzug
  without changing the external contract

  - [ ] @blackglory/better-sqlite3-migrations unused dependency is removed from
  package.json

  - [ ] No data loss, schema corruption, or behavioral change during or after
  transition

  - [ ] The runSQLiteMigrations export signature remains compatible or test
  helpers are updated accordingly

  - [ ] Migration execution order is deterministic and matches the existing
  version-number ordering


  ## Functional Requirements


  - **FR-1: Custom better-sqlite3 storage adapter** — Implement a custom umzug
  storage adapter that uses
    better-sqlite3 to read/write the `umzug_migrations` tracking table. The adapter must handle the
    sync-to-async wrapping since better-sqlite3 is synchronous and umzug expects async storage methods
    (`logMigration`, `unlogMigration`, `executed`).

  - **FR-2: Legacy migration registration** — Register all 34 existing
  migrations programmatically with
    umzug from a single TypeScript module. Each migration's `up()` function must execute the same SQL
    and/or handler logic as the current system. Legacy migrations do not require `down()` functions.

  - **FR-3: Bootstrap seeder for existing databases** — On first umzug run,
  detect if `PRAGMA user_version > 0`
    but the `umzug_migrations` table does not exist. If so, create the tracking table and insert records
    for migrations 1 through `user_version`, marking them as already applied. This must run before umzug's
    normal `up()` execution so umzug does not re-apply already-executed migrations.

  - **FR-4: Dual version tracking** — Each migration's `up()` function must set
  `PRAGMA user_version = N`
    (where N is the migration's version number) in addition to being tracked by umzug. This maintains
    backward safety and enables the bootstrap seeder to work reliably.

  - **FR-5: New migration file convention** — Migrations 35+ must be individual
  `.ts` files in a dedicated
    directory (e.g., `packages/core/src/infrastructure/persistence/sqlite/migrations/`). Each file exports
    `up(db)` and `down(db)` functions. umzug resolves them via glob pattern or explicit registration.

  - **FR-6: Migration execution within transaction** — Each migration must
  execute within a SQLite
    transaction, matching the current behavior where `db.transaction(() => { ... })()` wraps each
    migration. If a migration fails, the transaction rolls back and no partial state is committed.

  - **FR-7: DI container integration** — Replace the `runSQLiteMigrations(db)`
  call in
    `initializeContainer()` (container.ts line 146) with umzug's `up()` method. The external contract
    of `initializeContainer()` must not change — it still returns `Promise<typeof container>`.

  - **FR-8: Deterministic execution order** — Migrations must execute in strict
  numerical order by version
    number (1, 2, 3, ..., 34, 35, ...). umzug must be configured to sort migrations by their version
    number prefix, not alphabetically by filename.

  - **FR-9: Remove unused dependency** — Remove
  `@blackglory/better-sqlite3-migrations` from
    `package.json` since it has zero imports in the codebase.

  - **FR-10: Test helper compatibility** — Update
  `createDatabaseWithMigrations()` in
    `tests/helpers/database.helper.ts` to work with the new umzug-based migration runner. The helper
    must continue to accept a database instance and apply all migrations to it.

  ## Non-Functional Requirements


  - **NFR-1: Zero-downtime transition** — Existing databases must transition to
  umzug tracking
    transparently during normal application startup. No CLI commands, no manual steps, no data loss.

  - **NFR-2: Migration performance** — The full migration suite (34 migrations
  on a fresh database) must
    complete within 500ms on in-memory SQLite. The bootstrap seeder (inserting 34 tracking records) must
    complete within 100ms. These are well within current performance characteristics.

  - **NFR-3: Error isolation** — A failed migration must not leave the database
  in a partially migrated
    state. Transaction rollback must be guaranteed per-migration. Error messages must include the
    migration name/version and the underlying SQLite error.

  - **NFR-4: Test isolation** — Each integration test must use its own in-memory
  database instance.
    Migration tests must not depend on shared state or execution order between test cases.

  - **NFR-5: Build compatibility** — All migration code must be pure TypeScript
  that survives `tsc`
    compilation. No `.sql` files, no dynamic `require()`, no `fs.readFile()` at runtime. Inline SQL
    strings in TypeScript modules are the required approach (matching current architecture).

  - **NFR-6: Minimal dependency footprint** — Only `umzug` is added as a new
  dependency. No additional
    migration-related packages. The net dependency count should decrease by 1 (add umzug, remove
    @blackglory/better-sqlite3-migrations).

  - **NFR-7: Maintainability** — New developers must be able to add a migration
  by creating a single .ts
    file in the migrations directory with exported up/down functions. No registration in a central array
    or configuration file should be required for new migrations.

  - **NFR-8: Logging and observability** — umzug should be configured with a
  logger that emits migration
    events (migrating, migrated, reverting, reverted) at debug level. This enables troubleshooting
    without cluttering normal CLI output.

  ## Product Questions & AI Recommendations


  | # | Question | AI Recommendation | Rationale |

  | - | -------- | ----------------- | --------- |

  | 1 | Should existing 34 migrations remain inline or be split into individual
  files? | Keep inline in single module | Avoids 34-file churn, handles
  handler-based migrations, sidesteps tsc issues. New migrations (35+) get
  individual files. |

  | 2 | How should umzug handle the sync/async mismatch with better-sqlite3? |
  Wrap sync calls in async adapter | Standard community pattern,
  well-documented, keeps full umzug API surface. |

  | 3 | What should the migration tracking table be named? | umzug_migrations |
  Self-documenting, follows umzug conventions, avoids table name collisions. |

  | 4 | How should the bootstrap/transition work for existing databases? |
  Auto-bootstrap by reading PRAGMA user_version | Zero user intervention,
  deterministic detection, seamless upgrade path. |

  | 5 | Should down/rollback migrations be implemented for existing 34
  migrations? | No — only require for new migrations (35+) | Retroactive
  rollbacks are error-prone for data migrations. Pragmatic forward-only
  approach. |

  | 6 | Should PRAGMA user_version continue to be set alongside umzug tracking?
  | Yes — dual tracking for safety | Nearly free, provides fallback, enables
  bootstrap seeder. |


  ## Codebase Analysis


  ### Project Structure


  This is a Clean Architecture monorepo (`@shepai/cli`) with:


  - `packages/core/src/domain/` — Domain layer (TypeSpec-generated models, no
  external deps)

  - `packages/core/src/application/` — Use cases and output port interfaces

  - `packages/core/src/infrastructure/` — External concerns: DB, agents,
  services

  - `src/presentation/` — CLI (Commander), TUI (Inquirer), Web UI (Next.js 16)


  The migration system lives entirely in the **infrastructure layer**:


  - `packages/core/src/infrastructure/persistence/sqlite/migrations.ts` —
  Migration definitions + runner (593 lines, 34 migrations)

  - `packages/core/src/infrastructure/persistence/sqlite/connection.ts` —
  Singleton DB connection via `getSQLiteConnection()`

  - `packages/core/src/infrastructure/di/container.ts` — Calls
  `runSQLiteMigrations(db)` at line 146 during `initializeContainer()`


  ### Architecture Patterns


  - **Clean Architecture** with strict inward dependency flow

  - **Dependency Injection** via tsyringe — container initialized in
  `initializeContainer()`

  - **Singleton DB connection** — `getSQLiteConnection()` returns cached
  instance with WAL mode, NORMAL synchronous, foreign keys, defensive mode

  - **Inline SQL migrations** — SQL embedded in TypeScript to survive `tsc`
  compilation

  - **Migration interface**: `{ version: number; sql: string; handler?: (db) =>
  void }` — 27 pure SQL + 7 handler-based

  - **Version tracking**: `PRAGMA user_version` (integer, no history),
  dynamically computed via `LATEST_SCHEMA_VERSION = MIGRATIONS[MIGRATIONS.length
  - 1].version`


  ### Current Migration System Details


  **34 migrations** (versions 1-34) managing 6 tables:


  | Table | Created In | Purpose |

  | --- | --- | --- |

  | `settings` | V1 | User configuration, model preferences |

  | `agent_runs` | V3 | AI agent execution tracking |

  | `features` | V4 | Features being developed |

  | `phase_timings` | V8 | Phase duration tracking |

  | `repositories` | V15 | Git repository metadata |

  | `pr_sync_lock` | V33 | Cross-process PR poll coordination |


  **Execution flow**: `initializeContainer() → getSQLiteConnection() →
  runSQLiteMigrations(db)`


  **Connection configuration** (connection.ts):

  - WAL journal mode for concurrent reads

  - NORMAL synchronous for write performance

  - Foreign keys enabled

  - Defensive mode enabled

  - ~8MB cache size


  **Test coverage**:

  - `tests/integration/infrastructure/persistence/sqlite/migrations.test.ts`
  (872 lines) — comprehensive suite

  - `tests/integration/infrastructure/persistence/sqlite/migration-015.test.ts`
  (116 lines) — focused test

  - `tests/helpers/database.helper.ts` — Utilities: `createInMemoryDatabase()`,
  `createDatabaseWithMigrations()`, `tableExists()`, `getSchemaVersion()`,
  `getTableSchema()`, `getTableIndexes()`


