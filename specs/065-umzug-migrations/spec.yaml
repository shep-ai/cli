  | `packages/core/src/infrastructure/di/container.ts` | Medium | Migration
  initialization call (line 146) changes from `runSQLiteMigrations(db)` to
  umzug-based runner |

  | `tests/integration/infrastructure/persistence/sqlite/migrations.test.ts` |
  High | 872-line test suite must be updated to work with umzug's API |

  | `tests/integration/infrastructure/persistence/sqlite/migration-015.test.ts`
  | Medium | Specific migration test (116 lines) may need adaptation for umzug
  format |

  | `tests/helpers/database.helper.ts` | Medium |
  `createDatabaseWithMigrations()` helper signature may change to use umzug |

  | `packages/core/src/infrastructure/persistence/sqlite/connection.ts` | Low |
  No changes expected — umzug receives the same db instance |

  | `package.json` (root) | Low | Add umzug dependency, remove unused
  @blackglory/better-sqlite3-migrations |


  ## Dependencies


  - **umzug** — New dependency (migration framework, provides Umzug class +
  storage adapters)

  - **better-sqlite3 v12.6.2** — Existing dependency (umzug custom storage
  adapter will use this)

  - **tsyringe** — Existing DI container (initialization point at
  `initializeContainer()`)

  - All **repository implementations** depend on migrations running first (no
  change in contract)

  - All **integration tests** use `createInMemoryDatabase()` +
  `runSQLiteMigrations()` pattern (callers must update)


  ## Size Estimate


  **M** — This is a medium-sized refactoring effort. The core work involves:

  (1) installing and configuring umzug with a custom better-sqlite3 storage
  adapter (async wrapper around sync API),

  (2) registering 34 existing inline migrations with umzug while preserving
  their exact behavior,

  (3) implementing the bootstrap seeder to transition existing databases from
  PRAGMA user_version to umzug tracking,

  (4) updating the DI container initialization (container.ts line 146),

  (5) updating the comprehensive test suite (872+ lines of migration tests plus
  helpers),

  (6) removing the unused @blackglory/better-sqlite3-migrations dependency.

  The scope is well-defined and contained within the infrastructure layer, but
  requires careful

  handling of the transition for existing user databases.


