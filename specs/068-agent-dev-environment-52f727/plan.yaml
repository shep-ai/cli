# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This feature extends the existing deployment system (spec 045) with AI-powered
  repository analysis. The architecture follows Clean Architecture with dependencies
  pointing inward:

  **Domain Layer** (TypeSpec-first):
  - New `DevEnvironmentAnalysis` model with structured fields (language, framework,
    command, workingDirectory, expectedPort, environmentVariables, confidence,
    explanation, hasDevServer, source)
  - New enums: `AnalysisConfidence` (High/Medium/Low), `AnalysisSource`
    (AgentGenerated/UserEdited), `DevStartMode` (Fast/Agent)
  - Extended `DeploymentState` with `Analyzing` value
  - Updated `LocalDeployAgentOperations.Analyze()` return type

  **Application Layer** (interfaces):
  - `IDevEnvironmentCacheRepository` — output port for cache persistence
    (get/set/update/clear keyed by repo path)
  - Extended `IDeploymentService` — adds mode parameter to start(), discriminated
    union return type, reanalyze(), updateCachedAnalysis()

  **Infrastructure Layer** (implementations):
  - `SQLiteDevEnvironmentCacheRepository` — SQLite-backed cache with mapper
  - `DevEnvironmentAnalysisGraph` — LangGraph StateGraph with single analyze node
  - Updated `DeploymentService` — orchestrates mode selection, cache lookup,
    agent invocation, Analyzing state lifecycle
  - SQLite migration 040 for `dev_environment_cache` table

  **Presentation Layer** (web UI):
  - Updated server actions with mode parameter and NothingToStart handling
  - Updated hooks for Analyzing state and mode selection
  - New components: DevStartModeSelector, CachedAnalysisEditor
  - Updated DeploymentStatusBadge with Analyzing and NothingToStart states

  ## Key Design Decisions

  ### 1. Single-node LangGraph graph (not multi-node)
  **Chosen:** Single `analyze` node following the AnalyzeRepositoryGraph pattern.
  **Alternatives considered:** Multi-node graph with separate detect/validate/format
  nodes. **Rationale:** The analysis is a single AI inference call — the agent reads
  files, reasons, and returns structured output. Breaking it into multiple nodes adds
  complexity without benefit. The prompt handles all reasoning. If future needs require
  multi-step analysis, the graph can be extended without changing the interface.

  ### 2. Discriminated union return type for start()
  **Chosen:** `DeploymentStartResult = DeploymentStarted | NothingToStart` union type.
  **Alternatives considered:** New DeploymentState enum value, typed error.
  **Rationale:** "Nothing to start" is an expected outcome, not an error. A discriminated
  union lets callers handle it with type narrowing (`if (result.kind === 'nothing-to-start')`)
  without try/catch. The DeploymentState enum stays clean — Analyzing/Booting/Ready/Stopped
  represent actual deployment lifecycle states.

  ### 3. Cache keyed by absolute repo path
  **Chosen:** Repository absolute path as primary key.
  **Alternatives considered:** Hash of path, composite key with branch.
  **Rationale:** Absolute path is unique, human-readable for debugging, and directly
  available at call sites. No hash collisions to worry about. Branch-awareness is
  unnecessary because the dev command typically doesn't change between branches.

  ### 4. Separate test file for agent-related DeploymentService tests
  **Chosen:** New `deployment.service.agent.test.ts` for all agent/cache/mode tests.
  **Alternatives considered:** Adding to existing `deployment.service.test.ts`.
  **Rationale:** The existing test file covers the fast-path (spawn, port detection,
  stop). Agent integration tests are a distinct concern with different mocks (cache repo,
  executor provider). Separation keeps both files focused and manageable.

  ### 5. Agent prompt returns JSON, parsed in the node
  **Chosen:** The agent prompt instructs the AI to return a JSON block with the
  DevEnvironmentAnalysis fields. The graph node extracts and validates the JSON.
  **Alternatives considered:** Using structuredOutput executor feature.
  **Rationale:** Not all agent executors support structuredOutput (it's an optional
  AgentFeature). JSON-in-markdown is universally supported and the extraction is
  straightforward. A validation step in the node ensures type safety.

  ### 6. DeploymentService receives cache repo and executor provider as deps
  **Chosen:** Extend `DeploymentServiceDeps` with optional `cacheRepository` and
  `executorProvider` fields.
  **Alternatives considered:** Constructor injection via tsyringe, separate orchestrator.
  **Rationale:** The existing DeploymentService uses a deps object pattern (not decorator
  injection). Adding to the same pattern maintains consistency. Optional deps mean the
  service works in fast-path-only mode when agent infrastructure isn't available (tests,
  minimal setups).

  ## Implementation Strategy

  The implementation proceeds bottom-up through 7 phases:

  **Phase 1 (TypeSpec)** comes first because all code depends on generated types. This
  is the foundation — every model, enum, and interface reference flows from TypeSpec.

  **Phase 2 (Cache)** follows because it's a self-contained persistence layer with no
  upstream dependencies. Tests can fully validate cache CRUD in isolation.

  **Phase 3 (Agent Graph)** builds on Phase 1 types to define the graph. It's testable
  in isolation with mock executors, independent of the cache or service.

  **Phase 4 (Service Integration)** is the core integration phase that combines cache
  (Phase 2) and agent graph (Phase 3) into the DeploymentService. This is the highest
  risk phase and gets the most thorough TDD coverage.

  **Phase 5 (DI Wiring)** connects everything in the container. Quick but must be
  correct — wrong wiring causes runtime failures.

  **Phase 6 (Server Actions & Hooks)** adapts the web layer to the new service contract.
  Depends on Phase 4 interface changes being stable.

  **Phase 7 (UI Components)** is the final presentation layer work. Can reference all
  types and actions from earlier phases. Storybook stories provide visual validation.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Breaking existing deployment flows | Phase 4 makes mode parameter optional with default behavior matching current fast-path. Existing test suite runs unchanged. New agent tests in separate file. |
  | IDeploymentService interface changes break consumers | start() return type change uses a union — existing callers that ignore the return value (current server actions) continue working. New callers can opt into type narrowing. mode parameter is optional. |
  | Agent returns malformed JSON | Graph node includes JSON extraction with regex fallback, schema validation, and descriptive error on parse failure. Timeout prevents hung analysis. |
  | Cache corruption or migration failure | Migration 040 creates a new table (additive). No modifications to existing tables. Cache is non-critical — failures fall through to agent re-analysis. |
  | Agent executor unavailable | FR-5 explicitly handles this: fast-path only for Node.js repos, clear error for non-Node repos. No silent fallback that could confuse users. |
  | Performance regression on fast-path | Fast-path code path is unchanged — mode='fast' bypasses cache and agent entirely. NFR-1 verified by ensuring no new code runs in fast path. |
  | Storybook/component regressions | All new components get stories first (TDD for UI). Existing badge stories updated alongside implementation. |
