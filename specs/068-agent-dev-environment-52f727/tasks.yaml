content: |
  ## Summary

  The implementation is structured as a bottom-up build across 7 phases with 28 tasks
  totaling approximately 15 hours of effort.

  The work begins with TypeSpec domain model definitions (Phase 1) since all code
  depends on the generated types. Next, the SQLite cache persistence layer (Phase 2)
  is built as a self-contained repository following the existing feature repository
  pattern. The LangGraph agent graph (Phase 3) is then created following the
  AnalyzeRepositoryGraph pattern with a single analyze node.

  The core integration happens in Phase 4, where the DeploymentService is extended
  with mode selection (fast/agent), cache-first flow, the Analyzing state lifecycle,
  discriminated union return types, and manual cache editing methods. This is the
  highest-risk phase with the most thorough TDD coverage (7 tasks).

  Phase 5 wires everything in the DI container. Phase 6 adapts the web server actions
  and hooks to the new service contract. Finally, Phase 7 builds the UI components
  (badge updates, mode selector, cache editor) with mandatory Storybook stories.

  Every code task follows TDD: write failing tests first (RED), implement minimally
  (GREEN), then clean up (REFACTOR). The agent graph and cache layer are independently
  testable with mock executors and in-memory SQLite. The DeploymentService tests use
  injected mocks for both cache repository and executor provider.
