summary: >
  This feature adds two related git workflow capabilities: (1) rebase a feature worktree
  branch on top of the current main branch so it stays up-to-date, and (2) sync a fork
  repository's local main branch with its upstream remote main before or after rebasing.
  Both operations extend the existing GitPrService and introduce new CLI commands and use
  cases following the established Clean Architecture patterns. Conflict detection aborts
  with a clear error; no interactive resolution UI is in scope.
