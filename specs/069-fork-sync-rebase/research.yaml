technologies:
  - TypeScript
  - Node.js (child_process execFile)
  - git CLI
  - GitHub CLI (gh)
  - TSyringe (DI)
  - Vitest (unit + integration tests)
  - Commander.js (CLI)
  - Better-SQLite3

