name: fork-sync-rebase
summary: >
  The feature extends GitPrService with rebase and fork-sync capabilities using the
  existing execFile/ExecFunction injection pattern. Two new use cases
  (RebaseFeatureUseCase, SyncForkMainUseCase) follow the established injectable/inject
  TSyringe pattern. Fork detection runs via `gh repo view --json parent` at most once per
  invocation, with the upstream remote managed under the conventional "upstream" name.

# Relationships
relatedFeatures:
