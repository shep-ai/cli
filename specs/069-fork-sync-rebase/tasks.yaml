# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation proceeds in four phases with 14 tasks totalling approximately 10 hours.

  Phase 1 (tasks 1-2) establishes the contract: new error code enum values and the
  extended IGitPrService interface. This unlocks all downstream work because use case
  unit tests mock the interface, and the service implementation must satisfy it.

  Phase 2 (tasks 3-5) builds the GitPrService implementation TDD-first with real
  temporary git repos. The methods are implemented in dependency order: fork detection
  and remote management (task 3) before upstream fetch and sync (task 4), and both
  before rebase with conflict handling (task 5).

  Phase 3 (tasks 6-8) implements the two use cases and wires them into the DI container.
  SyncForkMainUseCase (task 6) is implemented before RebaseFeatureUseCase (task 7) because
  the rebase use case orchestrates the sync flow. DI registration (task 8) follows after
  both use cases are verified by unit tests.

  Phase 4 (tasks 9-14) creates the CLI commands, registers them in their index barrels,
  and runs the full validation and test suites to confirm zero failures. The two CLI
  commands (tasks 9, 11) are independent of each other and can be written concurrently
  but both depend on DI registration being complete (task 8).
