content: |
  ## Summary

  Implementation follows a three-phase approach: (1) inject dependencies and
  import required modules, (2) implement core AgentRun creation and spec
  directory logic following CreateFeatureUseCase pattern, (3) comprehensive
  testing and validation.

  **Phase 1** sets up the foundation by adding IAgentRunRepository and
  ISpecInitializerService to the constructor and importing Node.js built-in
  modules (crypto, fs, path) plus settings service. This enables all subsequent
  AgentRun creation logic.

  **Phase 2** implements the core feature by calculating feature numbers,
  conditionally initializing spec directories (preserving existing work),
  creating AgentRun records with all required fields (agentType from settings,
  status=pending, prompt placeholder, threadId), linking AgentRun to Feature via
  agentRunId, and ensuring correct persistence order (AgentRun first, then
  Feature).

  **Phase 3** validates the implementation through comprehensive unit tests
  (AgentRun field population, spec directory logic, error handling) and
  integration tests (adopt → start → resume → reject flow). Runs full test
  suite to ensure no regressions.

  Every task follows TDD: write failing test (RED), implement minimal code to
  pass (GREEN), refactor for clarity (REFACTOR). Tasks are ordered by
  dependency—no task depends on a later task. Total estimated effort is 8-10
  hours across 12 tasks.

  Key architectural decisions:
  - Follow CreateFeatureUseCase pattern exactly (lines 156-210) for consistency
  - Conditional spec initialization to preserve existing work
  - No agent validation during adoption (deferred to StartFeatureUseCase)
  - Persistence order respects referential integrity (AgentRun before Feature)
