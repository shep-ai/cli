name: adopted-branch-agent-runs
summary: >
  Task breakdown for adding AgentRun support to adopted branches. 12 tasks
  across 3 phases with comprehensive TDD cycles. Total estimated effort: 8-10
  hours.

relatedFeatures: []
technologies: []
relatedLinks: []

tasks:
  # Phase 1: Dependency Injection & Setup
  - id: task-1
    phaseId: phase-1
    title: 'Add IAgentRunRepository and ISpecInitializerService to constructor'
    description: >
      Inject IAgentRunRepository and ISpecInitializerService into
      AdoptBranchUseCase constructor following existing tsyringe pattern. Add
      @inject decorators and store as private readonly fields. Update DI
      container registration in packages/core/src/di/container.ts if needed
      (verify providers are already registered).
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'AdoptBranchUseCase constructor has two new parameters with @inject decorators'
      - 'Parameters stored as private readonly runRepository and specInitializer fields'
      - 'TypeScript compilation succeeds with no type errors'
      - 'Existing unit tests still pass (DI mocking works correctly)'
    tdd:
      red:
        - 'Write unit test that instantiates AdoptBranchUseCase with mocked IAgentRunRepository and ISpecInitializerService'
        - 'Test should fail because constructor does not accept these parameters yet'
      green:
        - 'Add @inject("IAgentRunRepository") private readonly runRepository: IAgentRunRepository to constructor'
        - 'Add @inject("ISpecInitializerService") private readonly specInitializer: ISpecInitializerService to constructor'
        - 'Test should now pass'
      refactor:
        - 'Verify constructor parameter ordering matches other use cases (repositories first, then services)'
        - 'Add inline comment explaining why these dependencies are needed'
    estimatedEffort: '30min'

  - id: task-2
    phaseId: phase-1
    title: 'Import required Node.js modules and types'
    description: >
      Add imports for randomUUID (node:crypto), existsSync (node:fs), join
      (node:path), getSettings (infrastructure/services/settings.service.ts),
      and TypeSpec-generated types (AgentRunStatus, SdlcLifecycle). Verify all
      imports resolve correctly.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'Import randomUUID from node:crypto'
      - 'Import existsSync from node:fs'
      - 'Import join from node:path'
      - 'Import getSettings from settings service'
      - 'Import AgentRunStatus and SdlcLifecycle from domain/generated/output.ts'
      - 'TypeScript compilation succeeds with no import errors'
    tdd: null
    estimatedEffort: '15min'

  # Phase 2: Core AgentRun & Spec Directory Logic
  - id: task-3
    phaseId: phase-2
    title: 'Calculate feature number for spec directory'
    description: >
      After repository resolution (line 81), add logic to calculate next feature
      number by listing existing features for the repository and using length as
      hint. This number will be passed to SpecInitializerService which resolves
      the actual filesystem number.
    state: Todo
    dependencies:
      - task-2
    acceptanceCriteria:
      - 'Feature number calculated via await this.featureRepo.list({ repositoryPath: effectiveRepoPath })'
      - 'Number stored as const featureNumber = existingFeatures.length'
      - 'Logic placed after repository resolution, before AgentRun creation'
      - 'Unit test verifies correct feature number calculation'
    tdd:
      red:
        - 'Write unit test that mocks featureRepo.list() to return 5 features'
        - 'Assert featureNumber is calculated as 5 (existingFeatures.length)'
        - 'Test should fail because feature number calculation does not exist yet'
      green:
        - 'Add const existingFeatures = await this.featureRepo.list({ repositoryPath: effectiveRepoPath })'
        - 'Add const featureNumber = existingFeatures.length'
        - 'Test should now pass'
      refactor:
        - 'Add inline comment explaining why we use length as hint (SpecInitializerService resolves actual number)'
    estimatedEffort: '30min'

  - id: task-4
    phaseId: phase-2
    title: 'Implement conditional spec directory initialization'
    description: >
      Add logic to check if spec directory already exists at
      worktreePath/specs/NNN-slug/. If exists, use existing path. If not exists,
      call specInitializer.initialize() to create directory with empty YAMLs.
      Store resulting path in specDir variable for later Feature entity update.
    state: Todo
    dependencies:
      - task-3
    acceptanceCriteria:
      - 'Construct expected spec directory path using featureNumber and slug'
      - 'Check existence with existsSync(expectedSpecDir)'
      - 'If exists, set specDir = expectedSpecDir'
      - 'If not exists, call this.specInitializer.initialize() and use returned specDir'
      - 'Pass "(adopted from existing branch)" as prompt parameter to initialize()'
      - 'Unit test verifies existing spec directory is preserved'
      - 'Unit test verifies new spec directory is created when none exists'
    tdd:
      red:
        - 'Write unit test that mocks existsSync to return true (spec exists)'
        - 'Assert specInitializer.initialize() is NOT called'
        - 'Assert specDir is set to expected directory path'
        - 'Test should fail because spec detection logic does not exist yet'
        - 'Write second unit test that mocks existsSync to return false (no spec)'
        - 'Assert specInitializer.initialize() IS called with correct parameters'
        - 'Assert specDir is set to returned path from initialize()'
      green:
        - 'Add const nnn = String(featureNumber).padStart(3, "0")'
        - 'Add const expectedSpecDir = join(worktreePath, "specs", `${nnn}-${slug}`)'
        - 'Add let specDir: string'
        - 'Add if (existsSync(expectedSpecDir)) { specDir = expectedSpecDir } else { ... }'
        - 'In else block, call const result = await this.specInitializer.initialize(worktreePath, slug, featureNumber, "(adopted from existing branch)")'
        - 'Set specDir = result.specDir'
        - 'Both tests should now pass'
      refactor:
        - 'Extract spec directory path construction to helper variable for clarity'
        - 'Add inline comment explaining why we preserve existing specs'
    estimatedEffort: '1h'

  - id: task-5
