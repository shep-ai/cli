        - 'Assert runRepository.create() is called with AgentRun having agentType="claude-code", modelId="sonnet", status=pending, prompt="(adopted from existing branch)"'
        - 'Test should fail because AgentRun creation logic does not exist yet'
        - 'Write second unit test that mocks getSettings() with NO models.default'
        - 'Assert AgentRun is created with modelId=undefined'
      green:
        - 'Add const runId = randomUUID()'
        - 'Add const threadId = randomUUID()'
        - 'Add const settings = getSettings()'
        - 'Add const agentType = settings.agent.type'
        - 'Add const modelId = settings.models?.default'
        - 'Create AgentRun entity object with all fields'
        - 'Add const createdRun = await this.runRepository.create(agentRun)'
        - 'Both tests should now pass'
      refactor:
        - 'Extract AgentRun creation to follow exact CreateFeatureUseCase structure (lines 156-210)'
