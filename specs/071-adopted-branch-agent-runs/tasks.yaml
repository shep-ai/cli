    acceptanceCriteria:
      - 'Generate const runId = randomUUID()'
      - 'Generate const threadId = randomUUID()'
      - 'Read const settings = getSettings()'
      - 'Extract agentType = settings.agent.type'
      - 'Extract modelId = settings.models?.default (optional chaining)'
      - 'Create AgentRun entity with all required fields (id, featureId, agentType, agentName="feature-agent", modelId, status=AgentRunStatus.pending, prompt, threadId, repositoryPath)'
