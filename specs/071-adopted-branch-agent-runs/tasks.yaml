      156-210. Generate runId and threadId via randomUUID(). Read settings for
      agentType and modelId. Create AgentRun entity with status=pending,
      prompt="(adopted from existing branch)", and all required fields. Persist
      via this.runRepository.create().
    state: Todo
    dependencies:
