content: |
  ## Problem Statement

  When a user adopts an existing git branch via `shep feat adopt <branch>`, the system creates a Feature entity and worktree but does **not** create an associated AgentRun record. This breaks the entire agent execution flow:

  1. **Cannot start the feature**: `StartFeatureUseCase` requires `feature.agentRunId` (line 53-56) and throws "No agent run found" when missing
  2. **Cannot resume after interruption**: `ResumeFeatureUseCase` also requires `feature.agentRunId` (line 54-56)
  3. **Cannot process rejection feedback**: `RejectAgentRunUseCase` expects an agent run to attach rejection feedback and spawn the resume worker
  4. **No agent execution history**: Without an AgentRun, there's no tracking of agent status, phase timings, or lifecycle events

  The root cause is in `AdoptBranchUseCase` (packages/core/src/application/use-cases/features/adopt-branch.use-case.ts) which creates only a Feature entity, while the normal feature creation flow in `CreateFeatureUseCase` creates both Feature **and** AgentRun records and links them via `agentRunId`.

  ## Codebase Analysis

  ### Project Structure

  This is a monorepo using pnpm workspaces with Clean Architecture:

  ```
  packages/core/src/
  ├── domain/           # TypeSpec-generated domain models (Feature, AgentRun, etc.)
  ├── application/      # Use cases and port interfaces
  │   ├── use-cases/
  │   │   ├── features/ # Feature lifecycle use cases
  │   │   └── agents/   # Agent execution use cases
  │   └── ports/output/ # Interface definitions (repositories, services)
  ├── infrastructure/   # Concrete implementations
  │   ├── repositories/ # SQLite persistence
  │   ├── services/
  │   │   └── agents/   # LangGraph-based agent system
  │   └── di/           # tsyringe container
  └── presentation/     # CLI, TUI, Web UI
  ```

  Key directories:
  - `tsp/` - TypeSpec domain model definitions (source of truth)
  - `packages/core/src/domain/generated/output.ts` - Generated domain types (never edit directly)
  - `tests/unit/` and `tests/integration/` - Test suites following TDD practices
  - `specs/NNN-feature-name/` - Spec-driven development artifacts

  ### Architecture Patterns

  **Clean Architecture (Hexagonal)**:
  - Dependencies flow inward: Presentation → Application → Domain ← Infrastructure
  - Application layer defines output ports (interfaces)
  - Infrastructure layer provides adapters (implementations)
  - Domain layer is pure business logic with zero external dependencies

  **Repository Pattern**:
  - All persistence through repository interfaces: `IFeatureRepository`, `IAgentRunRepository`
  - SQLite implementations with soft delete support
  - Dependency injection via tsyringe container

  **TypeSpec-First Domain Modeling**:
  - Domain models defined in `tsp/` directory
  - Run `pnpm tsp:compile` to generate TypeScript types
  - Generated code is read-only - all changes go through TypeSpec files

  **Agent System (LangGraph)**:
  - State-driven workflow using LangGraph StateGraphs
  - Background process execution via `FeatureAgentProcessService`
  - Agent-agnostic execution through `IAgentExecutor` interface
  - Settings-driven agent resolution (mandatory - no hardcoding)

  **TDD Mandatory**:
  - RED → GREEN → REFACTOR cycle required
  - Tests written first before implementation
  - Unit tests in `tests/unit/`, integration tests in `tests/integration/`

