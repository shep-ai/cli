branch: feat/071-adopted-branch-agent-runs
oneLiner: Adopted branches lack agent run support - cannot start, resume, or reject iterations
summary: >
  Adopted branches (via `shep feat adopt`) create Feature entities without AgentRun records,
  breaking the agent execution flow. This feature adds AgentRun creation to AdoptBranchUseCase,
  enabling adopted features to start, resume, and iterate via rejection feedback just like
  features created through the normal flow.

