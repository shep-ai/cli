content: |
  ## Problem Statement

  When a user adopts an existing git branch via `shep feat adopt <branch>`, the system creates a Feature entity and worktree but does **not** create an associated AgentRun record. This breaks the entire agent execution flow:

  1. **Cannot start the feature**: `StartFeatureUseCase` requires `feature.agentRunId` (line 53-56) and throws "No agent run found" when missing
  2. **Cannot resume after interruption**: `ResumeFeatureUseCase` also requires `feature.agentRunId` (line 54-56)
  3. **Cannot process rejection feedback**: `RejectAgentRunUseCase` expects an agent run to attach rejection feedback and spawn the resume worker
  4. **No agent execution history**: Without an AgentRun, there's no tracking of agent status, phase timings, or lifecycle events

  The root cause is in `AdoptBranchUseCase` (packages/core/src/application/use-cases/features/adopt-branch.use-case.ts) which creates only a Feature entity, while the normal feature creation flow in `CreateFeatureUseCase` creates both Feature **and** AgentRun records and links them via `agentRunId`.

  ## Success Criteria

  - [ ] Adopted features have a valid AgentRun record linked via `feature.agentRunId`
  - [ ] `shep feat start <adopted-feature-id>` successfully starts the agent for an adopted feature
  - [ ] Adopted features can be resumed after interruption via `shep feat resume <id>`
  - [ ] Rejected adopted features spawn a resume worker and process rejection feedback
  - [ ] AgentRun record has correct initial state (status=pending, agentType from settings, threadId generated)
  - [ ] Spec directory is initialized for adopted features (empty YAML files)
  - [ ] All existing AdoptBranchUseCase tests pass without modification
  - [ ] New unit tests validate AgentRun creation and linking
  - [ ] Integration test validates full adopt → start → resume flow
  - [ ] No breaking changes to existing feature creation flow

  ## Functional Requirements

  - **FR-1**: AdoptBranchUseCase MUST create an AgentRun record when creating a Feature entity
  - **FR-2**: AgentRun.featureId MUST be set to the adopted Feature's ID
  - **FR-3**: Feature.agentRunId MUST be set to the created AgentRun's ID
  - **FR-4**: AgentRun.status MUST be initialized to `pending` (not `running` or other states)
  - **FR-5**: AgentRun.agentType MUST be populated from current settings (getSettings().agent.type)
  - **FR-6**: AgentRun.modelId MUST be populated from current settings if settings.models.default exists
  - **FR-7**: AgentRun.threadId MUST be a newly generated UUID for LangGraph checkpoint isolation
  - **FR-8**: AgentRun.prompt MUST be set to "(adopted from existing branch)" to indicate retroactive import
  - **FR-9**: AgentRun.repositoryPath MUST be set to the feature's repositoryPath for context scoping
  - **FR-10**: Feature.lifecycle MUST be initialized to `Pending` (user must explicitly start agent execution)
  - **FR-11**: A spec directory MUST be initialized at `worktreePath/specs/NNN-slug/` with empty YAML files
  - **FR-12**: Feature.specPath MUST be set to the created spec directory path
  - **FR-13**: StartFeatureUseCase MUST successfully start an adopted feature with valid agentRunId
  - **FR-14**: ResumeFeatureUseCase MUST successfully resume an adopted feature after interruption
  - **FR-15**: RejectAgentRunUseCase MUST successfully process rejection feedback for adopted features
  - **FR-16**: AgentRun.approvalGates MAY be initialized to default values (allowPrd: false, allowPlan: false, allowMerge: false)
  - **FR-17**: Agent validation MUST NOT occur during adoption (deferred to StartFeatureUseCase execution time)

  ## Non-Functional Requirements

  - **NFR-1**: Performance - AgentRun creation MUST NOT add more than 50ms to adoption flow (simple DB insert)
  - **NFR-2**: Consistency - Adopted features MUST be structurally identical to created features (same fields populated)
  - **NFR-3**: Idempotency - Duplicate adoption attempts MUST fail with clear error (existing validation preserved)
  - **NFR-4**: Error Handling - AgentRun creation failure MUST rollback Feature creation (transactional integrity)
  - **NFR-5**: Backward Compatibility - Existing features without agentRunId MUST continue to work (graceful degradation)
  - **NFR-6**: Test Coverage - AdoptBranchUseCase MUST have 100% branch coverage including new AgentRun logic
  - **NFR-7**: Maintainability - Code MUST follow CreateFeatureUseCase pattern (lines 156-210) for consistency
  - **NFR-8**: Documentation - Inline comments MUST explain why adopted features start as Pending
  - **NFR-9**: Clean Architecture - All new dependencies MUST be injected via constructor (IAgentRunRepository, ISpecInitializerService)
  - **NFR-10**: TypeScript Safety - All AgentRun fields MUST use TypeSpec-generated types (no manual type definitions)

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should adopted features start with lifecycle=Pending or lifecycle=Maintain? | **Pending (requires explicit start)** | Provides maximum flexibility and explicit control. Users can adopt a branch and decide later whether to start agent execution. Matches the --pending flag pattern in CreateFeatureUseCase. |
  | 2 | What should the AgentRun.prompt field contain for adopted features? | **Empty string with note** | Use "(adopted from existing branch)" as placeholder. Accurately represents that no original user query exists. Agent will derive context from spec files and codebase state. |
  | 3 | Should adopted features create a spec directory? | **Yes, initialize empty spec directory** | Maintains consistency with normal feature flow. All features should have a spec directory as a core architectural invariant. Required by StartFeatureUseCase validation. |
  | 4 | How should agent validation failure be handled during adoption? | **Skip agent validation entirely** | Validation should happen at execution time (StartFeatureUseCase), not adoption time. Matches pattern for features created with --pending flag. Prevents transient availability issues from blocking adoption. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/application/use-cases/features/adopt-branch.use-case.ts` | **High** | Must be modified to create AgentRun record, initialize spec directory, and link to Feature |
  | `packages/core/src/application/use-cases/features/start-feature.use-case.ts` | **Low** | Already validates agentRunId presence - no changes needed (adopted features will now pass validation) |
  | `packages/core/src/application/use-cases/features/resume-feature.use-case.ts` | **Low** | Already requires agentRunId - no changes needed (adopted features will now have valid agentRunId) |
  | `packages/core/src/application/use-cases/agents/reject-agent-run.use-case.ts` | **Low** | Already expects agentRunId - no changes needed (adopted features will now support rejection flow) |
  | `tests/unit/use-cases/features/adopt-branch.use-case.test.ts` | **High** | Must add test cases for AgentRun creation, spec initialization, and linking |
  | `tests/integration/features/adopt-flow.integration.test.ts` | **Medium** | New integration test for adopt → start → resume → reject flow |

  ## Dependencies

  ### Existing Code Dependencies

  1. **IAgentRunRepository** (`application/ports/output/agents/agent-run-repository.interface.ts`)
     - Interface for creating and persisting AgentRun records
     - Concrete implementation: `AgentRunRepository` (infrastructure/repositories/agent-run.repository.ts)
     - Method: `create(agentRun: AgentRun): Promise<AgentRun>`

  2. **ISpecInitializerService** (`application/ports/output/services/spec-initializer.interface.ts`)
     - Interface for creating spec directory with empty YAML files
     - Concrete implementation: `SpecInitializerService` (infrastructure/services/spec-initializer.service.ts)
     - Method: `initialize(worktreePath: string, slug: string, featureNumber: number, userInput: string): Promise<{ specDir: string }>`

  3. **getSettings()** (`infrastructure/services/settings.service.ts`)
     - Retrieves current agent type, model config, and approval gates
     - Required for populating AgentRun.agentType and AgentRun.modelId
     - Returns: `{ agent: { type: AgentType }, models?: { default?: string } }`

  4. **AgentType enum** (`domain/generated/output.ts`)
     - TypeSpec-generated enum: claude-code, cursor, gemini-cli, etc.
     - Used for AgentRun.agentType field

  5. **AgentRunStatus enum** (`domain/generated/output.ts`)
     - TypeSpec-generated enum: pending, running, completed, failed, interrupted, waiting_approval
     - Initial status should be 'pending' (agent not yet spawned)

  6. **CreateFeatureUseCase** (`application/use-cases/features/create/create-feature.use-case.ts`)
     - Reference implementation for creating Feature + AgentRun together
     - Lines 156-210 show the pattern to follow for AgentRun creation
     - Lines 241-258 show spec directory initialization pattern

  7. **randomUUID** (`node:crypto`)
     - Built-in Node.js function for generating UUIDs
     - Used for AgentRun.id and AgentRun.threadId

  8. **SdlcLifecycle enum** (`domain/generated/output.ts`)
     - TypeSpec-generated enum: Pending, Requirements, Analysis, Planning, Implementation, Testing, Review, Maintain, Blocked
     - Adopted features should start as `Pending`

  ### Library Dependencies

  All required libraries are already installed:
  - `tsyringe` (dependency injection)
  - `better-sqlite3` (SQLite)
  - `js-yaml` (YAML parsing for spec files)
  - `uuid` (node:crypto randomUUID)
  - `vitest` (testing framework)

  ### Infrastructure Dependencies

  - SQLite tables `features` and `agent_runs` already exist
  - Migration system supports schema evolution
  - No new migrations needed - existing schema supports this feature
  - Spec directory templates already exist in `SpecInitializerService`

  ## Implementation Notes

  ### AdoptBranchUseCase Modifications

  The implementation should follow this sequence (mirroring CreateFeatureUseCase pattern):

  1. **After repository resolution** (line 81, after `resolveRepository`):
     - Generate AgentRun UUID: `const runId = randomUUID()`
     - Get current settings: `const settings = getSettings()`
     - Determine next feature number (count existing features in repo)

  2. **Initialize spec directory** (before feature creation):
     - Call `this.specInitializer.initialize(worktreePath, slug, featureNumber, "(adopted from existing branch)")`
     - Store returned `specDir` path

  3. **Create AgentRun record** (before feature creation):
     - Set `agentType` from settings
     - Set `modelId` from settings if available
     - Set `status` to `AgentRunStatus.pending`
     - Set `prompt` to `"(adopted from existing branch)"`
     - Set `threadId` to new UUID
     - Set `featureId` to feature ID
     - Set `repositoryPath` to normalized path

  4. **Link Feature to AgentRun**:
     - Add `agentRunId: runId` to Feature entity
     - Add `specPath: specDir` to Feature entity
     - Set `lifecycle: SdlcLifecycle.Pending`

  5. **Persist in correct order**:
     - Create AgentRun first (foreign key dependency)
     - Then create Feature (references AgentRun)

  ### Error Handling

  - If spec initialization fails, throw error before any DB writes
  - If AgentRun creation fails, throw error before Feature creation
  - If Feature creation fails, the transaction should rollback (existing repository pattern handles this)

  ### Testing Strategy (TDD Required)

  **Unit Tests** (`tests/unit/use-cases/features/adopt-branch.use-case.test.ts`):
  1. Test AgentRun creation with correct fields (agentType, status, prompt, threadId)
  2. Test Feature.agentRunId is set correctly
  3. Test spec directory is initialized
  4. Test Feature.specPath is populated
  5. Test lifecycle is set to Pending
  6. Test agent type is read from settings
  7. Test model ID is read from settings (if available)
  8. Test feature number calculation for spec directory

  **Integration Tests** (new file `tests/integration/features/adopt-flow.integration.test.ts`):
  1. Adopt → Start flow: adopt branch, verify agentRunId, call StartFeatureUseCase, verify agent spawns
  2. Adopt → Resume flow: adopt branch, start, interrupt, verify ResumeFeatureUseCase works
  3. Adopt → Reject flow: adopt branch, start, pause, reject with feedback, verify rejection processing

  ## Size Estimate

  **M (Medium - days)** - Estimated 1-2 days of work

  **Reasoning**:

  1. **Core Implementation (4-6 hours)**:
     - Add IAgentRunRepository and ISpecInitializerService to constructor (~30 min)
     - Implement AgentRun creation logic following CreateFeatureUseCase pattern (~2 hours)
     - Implement spec directory initialization (~1 hour)
     - Update Feature entity creation to include agentRunId and specPath (~30 min)
     - Write comprehensive unit tests (TDD required) (~2-3 hours)

  2. **Integration Testing (2-3 hours)**:
     - End-to-end tests for adopt → start → resume → reject flow (~2 hours)
     - Test coverage for edge cases (missing settings, spec init failure) (~1 hour)

  3. **Documentation & Validation (1-2 hours)**:
     - Update inline code documentation (~30 min)
     - Validate no breaking changes to existing features (~30 min)
     - Run full test suite and fix any regressions (~1 hour)

  **Complexity Factors**:
  - Simple scope: one file modification, two new dependencies injected
  - Low risk: CreateFeatureUseCase provides exact pattern to follow
  - Moderate testing: need comprehensive coverage but pattern is clear
  - No schema changes: existing tables support the solution
  - No API changes: purely internal use case modification

  **Not XL because**:
  - No new infrastructure components needed
  - No multi-system coordination
  - Pattern already exists in CreateFeatureUseCase
  - No TypeSpec changes needed (all types already exist)
