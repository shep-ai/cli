  ## Architecture Notes

  ### Clean Architecture Compliance

  **Dependency Flow:**
  ```
  AdoptBranchUseCase (Application Layer)
    ↓ depends on (interface)
  IAgentRunRepository (Application Ports - Output)
    ↑ implemented by
  AgentRunRepository (Infrastructure Layer)
  ```

  **Layer Responsibilities:**
  - **Application Layer (AdoptBranchUseCase):** Orchestrates business logic—determines when to create AgentRun, what fields to populate, and persistence order
  - **Infrastructure Layer (AgentRunRepository, SpecInitializerService):** Handles technical details—SQL queries, file I/O, error handling

  **Interface Segregation:**
  - IAgentRunRepository provides only `create()` method needed by this use case
  - ISpecInitializerService provides only `initialize()` method needed by this use case
  - No leaky abstractions—use case does not know about SQLite or file system details

  ### Consistency with Existing Patterns

  **AdoptBranchUseCase** mirrors **CreateFeatureUseCase** structure:
  1. Validation and guards (protected branches, duplicates, slug collision)
  2. External service calls (branch resolution, PR detection)
  3. Repository resolution (find or create Repository entity)
  4. AgentRun creation (new for adoption)
  5. Spec directory initialization (new for adoption, but conditional)
  6. Feature entity construction
  7. Persistence (AgentRun first, then Feature)

  This structural consistency makes code reviews easier, reduces cognitive load for maintainers, and ensures similar behavior across feature creation flows.

  ### Testing Strategy

  **Unit Tests (AdoptBranchUseCase):**
  - Mock IAgentRunRepository.create() and verify it's called with correct fields
  - Mock ISpecInitializerService.initialize() and verify conditional calls (only when spec dir does not exist)
  - Mock fs.existsSync to simulate existing vs. missing spec directories
  - Verify Feature.agentRunId and Feature.specPath are set correctly
  - Verify lifecycle remains Review/Maintain based on PR status
  - Test error handling: spec init failure, AgentRun create failure

  **Integration Tests (New File):**
  - Real SQLite database (in-memory or temp file)
  - Real file system (temp directory)
  - Adopt branch → Start feature → Verify agent spawns
  - Adopt branch → Resume feature → Verify resumption works
  - Adopt branch with existing spec → Verify spec is preserved
  - Adopt branch without spec → Verify spec is created

  **E2E Tests (Optional):**
  - Full CLI command: `shep feat adopt <branch>`
  - Verify UI displays adopted feature with correct lifecycle
  - Verify `shep feat start <id>` succeeds

