  | node:path | Path manipulation | **Use (built-in)** | Need `join` to construct spec directory paths for existence check. Built-in module, no installation required. |
  | node:crypto | UUID generation | **Use (built-in)** | Need `randomUUID` for AgentRun.id and AgentRun.threadId. Built-in module, already used by CreateFeatureUseCase. |
  | Vitest | Testing framework | **Use (already installed)** | All unit and integration tests use Vitest. Comprehensive test coverage required for this feature. |

  **No new library installations required.** All dependencies exist in the codebase.

