  | ------- | ------- | -------- | --------- |
  | tsyringe | Dependency injection container | **Use (already installed)** | All use cases already use tsyringe for DI. Adding IAgentRunRepository and ISpecInitializerService follows existing pattern. No new installation needed. |
  | better-sqlite3 | SQLite database driver | **Use (already installed)** | AgentRunRepository already uses better-sqlite3 for persistence. No schema changes needed—agent_runs table already exists with all required fields. |
