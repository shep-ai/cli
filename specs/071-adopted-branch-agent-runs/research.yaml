content: |
  ## Status

  - **Phase:** Research
  - **Updated:** 2026-03-17

  ## Technology Decisions

  ### 1. AgentRun Creation Pattern

  **Chosen:** Follow CreateFeatureUseCase pattern exactly (lines 156-210)

  **Rejected:**
  - Create custom AgentRun initialization logic — Would introduce inconsistency between created and adopted features, making maintenance harder and risking subtle bugs from divergent implementations
  - Defer AgentRun creation to StartFeatureUseCase — Would require StartFeatureUseCase to handle two different initialization paths, violating Single Responsibility Principle and breaking existing contract
  - Make AgentRun optional on Feature entity — Would require nullable checks throughout the codebase, break existing use cases that expect agentRunId, and violate the architectural invariant that all features have agent execution capability

  **Rationale:**
  CreateFeatureUseCase provides the exact pattern in lines 156-210. This ensures structural consistency between created and adopted features. The pattern:
  1. Generate `runId` via `randomUUID()`
  2. Read settings for `agentType` and `modelId`
  3. Create AgentRun with `status=pending`, `agentName="feature-agent"`, `threadId` (new UUID), `prompt`, `featureId`, `repositoryPath`
  4. Link via `feature.agentRunId = runId`
  5. Persist AgentRun before Feature (respects referential integrity)

  Following this pattern guarantees that StartFeatureUseCase, ResumeFeatureUseCase, and RejectAgentRunUseCase work identically for both feature types without special-case handling.

  ### 2. Spec Directory Initialization Strategy

  **Chosen:** Conditional initialization - preserve existing, create only if missing

  **Rejected:**
  - Always initialize new spec directory — Would overwrite existing spec work done via /shep-kit:new-feature or manual editing, causing data loss and breaking the common workflow where developers start specs before adopting
  - Never initialize spec directory (defer to agent) — Violates the architectural invariant that all features have a spec directory, breaks StartFeatureUseCase validation (expects specPath), and creates inconsistency with CreateFeatureUseCase behavior
  - Prompt user to choose — Adds friction to adoption flow, breaks non-interactive CLI usage (scripts, CI), and forces users to make a decision that can be safely automated via detection

  **Rationale:**
  Detection via `fs.existsSync(join(worktreePath, 'specs', \`\${nnn}-\${slug}\`))` before calling `specInitializer.initialize()` handles the common case where a developer has already started spec work on a branch (e.g., via `/shep-kit:new-feature`).

  **Implementation Pattern:**
  ```typescript
  import { existsSync } from 'node:fs';
  import { join } from 'node:path';

  // After determining featureNumber and slug
  const nnn = String(featureNumber).padStart(3, '0');
  const expectedSpecDir = join(worktreePath, 'specs', `${nnn}-${slug}`);

  let specDir: string;
  if (existsSync(expectedSpecDir)) {
    // Spec directory already exists — use it without modification
    specDir = expectedSpecDir;
  } else {
    // No spec directory — initialize with empty YAMLs
    const result = await this.specInitializer.initialize(
      worktreePath,
      slug,
      featureNumber,
      "(adopted from existing branch)"
    );
    specDir = result.specDir;
  }
  ```

  This preserves existing work, maintains the architectural invariant (all features have specs), and is transparent (no user prompts).

  ### 3. Feature Lifecycle Initial State

  **Chosen:** Preserve existing lifecycle logic (Review if has PR, Maintain otherwise)

  **Rejected:**
  - Always set to Pending — Would change the existing UX where adopted features with PRs show as "REVIEW" in the UI, breaking the semantic distinction between in-progress (Review) and completed (Maintain) branches
  - Always set to Maintain — Would hide in-progress work from users, making adopted features with open PRs appear completed when they are actually under review
  - Require explicit --pending flag — Adds CLI complexity, breaks backward compatibility with existing adoption scripts, and forces users to learn a new flag when PR detection already provides good default behavior

  **Rationale:**
  AdoptBranchUseCase lines 102-103 already set lifecycle based on PR status:
  - `Review` if PR status is `Open`
  - `Maintain` otherwise (merged, closed, or no PR)

  This logic accurately reflects branch state. Creating an AgentRun does NOT mean the feature is pending agent execution; it means the feature HAS agent execution capability if needed.

  **Key Insight:** Lifecycle reflects current branch state, while `AgentRun.status=pending` reflects agent execution state. These are orthogonal concerns. Users can still explicitly start the agent via `shep feat start` if desired, which will transition lifecycle accordingly.

  ### 4. AgentRun.prompt Field Content

  **Chosen:** Use placeholder "(adopted from existing branch)" literal string

  **Rejected:**
  - Generate prompt from branch name — Branch names are often cryptic (e.g., "feat/TSK-1234-fix") and cannot be reliably converted to natural language prompts, leading to misleading or nonsensical prompt text
  - Leave prompt empty (empty string "") — Would break agent workflows that expect non-empty prompt for context, and does not clearly signal to users/developers that this is an adopted feature
  - Require user to provide prompt during adoption — Adds mandatory user input to a fast operation, breaks non-interactive adoption scripts, and contradicts the "fast import" use case

  **Rationale:**
  The prompt field is primarily for audit trail and agent context. For adopted features, there is no original user query—the branch already exists with unknown provenance.

  Using the literal string `"(adopted from existing branch)"` is:
  - **Honest:** Clearly indicates this is a retroactive feature import, not a user-initiated creation
  - **Self-documenting:** Developers reading the database or debugging agent runs immediately understand the origin
  - **Non-blocking:** The agent can still derive context from spec files (if they exist), git history, and codebase analysis

  This matches the CreateFeatureUseCase pattern where `prompt` comes from user input; for adopted features, the "input" is the placeholder.

  ### 5. Agent Validation During Adoption

  **Chosen:** Skip validation entirely during adoption

  **Rejected:**
  - Validate agent availability and fail adoption — Adoption is a metadata import operation (not execution), agent unavailability is transient (user might install later), and validation failure would block tracking an existing branch
  - Validate agent and mark AgentRun as failed — Would pollute the AgentRun status with a failure that is not an actual execution failure, confuse users with "failed" status before they even tried to start the agent
  - Validate agent and log warning — Warnings are easily missed, do not prevent future execution attempts, and still add overhead to a fast operation

  **Rationale:**
  Adoption is a metadata operation—creating Feature and AgentRun records to track an existing branch. Agent validation belongs at execution time (StartFeatureUseCase lines 306-328) when the user has explicit intent to run the agent.

  This matches the pattern for features created with `--pending` flag (CreateFeatureUseCase line 93), which skip agent validation until explicitly started.

  **Implementation:** Do NOT inject `IAgentValidator` into AdoptBranchUseCase. Do NOT call `isAvailable()`. StartFeatureUseCase will handle validation when needed.

  ### 6. Dependency Injection Strategy

  **Chosen:** Inject IAgentRunRepository and ISpecInitializerService via constructor

  **Rejected:**
  - Use service locator pattern to resolve dependencies — Violates Clean Architecture dependency rule, hides dependencies from constructor signature making testing harder, and goes against the existing tsyringe DI pattern
  - Import concrete implementations directly — Creates tight coupling to infrastructure layer, breaks Clean Architecture dependency inversion (application should depend on interfaces, not implementations)
  - Create AgentRun inline without repository — Bypasses the repository abstraction, creates inconsistent persistence patterns (Feature uses repo, AgentRun does not)

  **Rationale:**
  AdoptBranchUseCase already follows constructor injection pattern with IFeatureRepository, IRepositoryRepository, IWorktreeService, and IGitPrService (lines 37-45).

  **Implementation:**
  ```typescript
  @injectable()
  export class AdoptBranchUseCase {
    constructor(
      @inject('IFeatureRepository')
      private readonly featureRepo: IFeatureRepository,
      @inject('IRepositoryRepository')
      private readonly repositoryRepo: IRepositoryRepository,
      @inject('IWorktreeService')
      private readonly worktreeService: IWorktreeService,
      @inject('IGitPrService')
      private readonly gitPrService: IGitPrService,
      // NEW: Add these two dependencies
      @inject('IAgentRunRepository')
      private readonly runRepository: IAgentRunRepository,
      @inject('ISpecInitializerService')
      private readonly specInitializer: ISpecInitializerService
    ) {}
  }
  ```

  Constructor injection makes dependencies explicit, enables dependency mocking in unit tests, and ensures the DI container can resolve all dependencies at registration time.

  ### 7. Persistence Order

  **Chosen:** Create AgentRun first, then Feature (respects foreign key dependency)

  **Rejected:**
  - Create Feature first, then AgentRun — Feature has agentRunId foreign key reference, so the AgentRun must exist first or the Feature create will fail with referential integrity violation (though FK is not enforced in current schema, pattern should still be correct)
  - Create both in a single transaction — Repository pattern abstracts transactions, we cannot control transaction boundaries from use case layer (infrastructure concern), and current implementation already handles rollback correctly
  - Create AgentRun and Feature in parallel — Feature depends on AgentRun.id, so there is an inherent ordering dependency that cannot be parallelized

  **Rationale:**
  CreateFeatureUseCase lines 190-210 show the correct order:
  1. Create AgentRun record with all fields populated
  2. Create Feature record with `agentRunId` set to the `AgentRun.id`

  This ensures the referenced entity exists before the referencing entity. Although SQLite foreign keys are not enforced in the current schema, following the correct order prevents future migration issues if FK constraints are added.

  **Error Handling:**
  - If AgentRun creation fails, throw before Feature creation
  - If Feature creation fails, repository layer handles rollback (existing pattern)

  ### 8. Feature Number Calculation for Spec Directory

  **Chosen:** Use existing feature count in repository (matches CreateFeatureUseCase line 241)

  **Rejected:**
  - Scan specs/ directory for highest NNN — SpecInitializerService already does this internally (lines 316-335), duplicating this logic in the use case would violate DRY and create inconsistent numbering if implementations diverge
  - Use a global feature counter — Would not be repository-scoped, causing collision across repositories, and would require introducing new global state tracking
  - Let user specify feature number — Adds cognitive load, risks collisions, and breaks automated sequential numbering

  **Rationale:**
  CreateFeatureUseCase line 241 uses `existingFeatures.length` to determine the next feature number, then passes it to SpecInitializerService. SpecInitializerService.resolveNextNumber() (lines 316-335) then scans the filesystem to find the actual next available number.

  **Implementation:**
  ```typescript
  const existingFeatures = await this.featureRepo.list({
    repositoryPath: effectiveRepoPath,
  });
  const featureNumber = existingFeatures.length;
  ```

  This two-layer approach is correct: use-case provides a hint (DB-derived), service resolves actual filesystem state. Ensures consistency with created features and defers filesystem concerns to the service layer.

