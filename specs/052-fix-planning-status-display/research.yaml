content: |
  ## Technology Decisions

  ### 1. Fix Approach — Extend Existing Mappings

  **Chosen:** Extend existing mappings with the missing planning entry

  **Rejected:**
  - Auto-derive UI phases from SdlcLifecycle enum — larger scope, touches 5+ files, disproportionate risk
  - Runtime assertion for exhaustive coverage — unnecessary given Record<FeatureLifecyclePhase, string> already provides compile-time exhaustiveness

  **Rationale:** The codebase uses a clear pattern: FeatureLifecyclePhase union type defines valid phases,
  Record-typed objects (lifecycleDisplayLabels, lifecycleRunningVerbs) enforce that every phase has entries,
  and two mapping objects (sdlcLifecycleMap, phaseNameToLifecycle) bridge domain→UI. Adding 'planning' to all
  four locations follows this pattern exactly. TypeScript's Record type constraint ensures compile-time
  exhaustiveness — once 'planning' is in the union, missing keys in any Record will cause build errors.

  ### 2. Display Label — PLANNING

  **Chosen:** PLANNING

  **Rejected:**
  - PLAN — inconsistent with existing full-word labels (REQUIREMENTS, RESEARCH, IMPLEMENTATION)

  **Rationale:** All labels use full words. Consistency matters for visual uniformity in the UI.

  ### 3. Running Verb — Planning

  **Chosen:** Planning

  **Rejected:**
  - Analyzing Plan — breaks single-word gerund pattern (Analyzing, Researching, Implementing, etc.)

  **Rationale:** All verbs are single gerund words. Pattern consistency aids readability.

  ### 4. Test Strategy — Fix Existing + Add New

  **Chosen:** Fix the incorrect test assertion AND add new planning-specific tests

  **Rejected:**
  - Only fix existing test — misses new sdlcLifecycleMap coverage
  - Only add new tests — leaves incorrect assertion in place

  **Rationale:** The test `maps "plan" to implementation` at derive-feature-state.test.ts explicitly
  asserts buggy behavior and must be corrected. New tests should cover the sdlcLifecycleMap path for
  Planning and the deriveLifecycle function with a Planning-phase feature.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | N/A | No new libraries needed | N/A | This is a pure mapping/type fix in existing code |

  ## Security Considerations

  No security implications. This fix only changes static mapping objects and a union type in the
  presentation layer. No user input handling, API calls, or data persistence is affected.

  ## Performance Implications

  No performance implications. The mapping objects are static JavaScript objects with O(1) property
  lookup. Adding one key to each object has zero measurable impact.

  ## Architecture Notes

  ### Affected Files (3 source + 1 test)

  1. **feature-node-state-config.ts** — Add `'planning'` to the `FeatureLifecyclePhase` union type.
     This is the type definition that gates all phase-related Record types. Once added here, TypeScript
     will enforce that `lifecycleDisplayLabels` and `lifecycleRunningVerbs` include the new key.

  2. **feature-node-state-config.ts** — Add `planning: 'PLANNING'` to `lifecycleDisplayLabels` and
     `planning: 'Planning'` to `lifecycleRunningVerbs`. Required by the Record type constraint.

  3. **derive-feature-state.ts** — Add `Planning: 'planning'` to `sdlcLifecycleMap` so that
     `SdlcLifecycle.Planning` (domain enum value `'Planning'`) correctly resolves to the UI phase.

  4. **derive-feature-state.ts** — Change `plan: 'implementation'` to `plan: 'planning'` in
     `phaseNameToLifecycle` so the `plan` agent graph node name maps to the correct UI phase.

  5. **derive-feature-state.test.ts** — Update the assertion from `plan→implementation` to
     `plan→planning` and add new test cases for Planning lifecycle coverage.

  ### Data Flow

  The lifecycle resolution follows two paths, both converging on `FeatureLifecyclePhase`:

  ```
  Path A (domain lifecycle): Feature.lifecycle → sdlcLifecycleMap → FeatureLifecyclePhase
  Path B (agent node name):  AgentRun.result / SSE phaseName → phaseNameToLifecycle → FeatureLifecyclePhase
  ```

  Both paths feed into `deriveLifecycle()` which returns the phase used by `lifecycleDisplayLabels`
  and `lifecycleRunningVerbs` for rendering.

  The bug exists in both paths:
  - Path A: sdlcLifecycleMap has no `Planning` key → falls through to default `'requirements'`
  - Path B: phaseNameToLifecycle maps `plan` → `'implementation'` instead of `'planning'`

  ### Downstream Consumers (unchanged)

  These files import from the affected modules but require NO changes:

  - `build-graph-nodes.ts` — calls `deriveLifecycle()`, will automatically get correct results
  - `build-feature-node-data.ts` — calls `deriveLifecycle()`, same benefit
  - `use-control-center-state.ts` — calls `resolveSseEventUpdates()` which uses `mapPhaseNameToLifecycle()`, same benefit
  - `feature-drawer-client.tsx` — reads `lifecycleDisplayLabels[lifecycle]`, will automatically show correct label

  ### Scope Boundary

  This fix is strictly in the presentation layer. No changes to:
  - Domain model (SdlcLifecycle enum already has Planning)
  - TypeSpec definitions (already correct)
  - Generated output.ts (already correct)
  - Infrastructure layer
  - Application layer
  - CLI or TUI presentation
