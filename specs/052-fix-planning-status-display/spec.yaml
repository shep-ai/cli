content: |
  ## Problem Statement

  Features with `SdlcLifecycle.Planning` status display as "IMPLEMENTATION" in the web UI
  instead of "PLANNING". This is because the `FeatureLifecyclePhase` union type in
  `feature-node-state-config.ts` is missing a `'planning'` variant, and the mapping in
  `derive-feature-state.ts` incorrectly maps the `plan` agent node name to `'implementation'`.

  ## Codebase Analysis

  ### Root Cause

  In `derive-feature-state.ts` line 130, the `phaseNameToLifecycle` mapping has:
  ```
  plan: 'implementation'  // BUG: should be 'planning'
  ```

  The `sdlcLifecycleMap` (line 116-123) also lacks a `Planning` entry entirely.

  The `FeatureLifecyclePhase` type (line 14-20 of `feature-node-state-config.ts`) does not
  include `'planning'` as a valid variant.

  ### Data Flow

  1. Domain model has `SdlcLifecycle.Planning` = "Planning"
  2. SSE route converts to agent node name `'plan'`
  3. Client-side `phaseNameToLifecycle` maps `plan` → `'implementation'` (BUG)
  4. UI displays "IMPLEMENTATION" instead of "PLANNING"

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/web/components/common/feature-node/feature-node-state-config.ts` | High | Add 'planning' to FeatureLifecyclePhase type, labels, and verbs |
  | `src/presentation/web/components/common/feature-node/derive-feature-state.ts` | High | Fix plan→planning mapping in both phaseNameToLifecycle and sdlcLifecycleMap |
  | `tests/unit/presentation/web/common/feature-node/derive-feature-state.test.ts` | Medium | Update test expecting plan→implementation to expect plan→planning |

  ## Dependencies

  None — this is a self-contained UI mapping fix.

  ## Success Criteria

  - [x] `FeatureLifecyclePhase` type includes `'planning'`
  - [x] `lifecycleDisplayLabels` has `planning: 'PLANNING'`
  - [x] `lifecycleRunningVerbs` has `planning: 'Planning'`
  - [x] `phaseNameToLifecycle` maps `plan: 'planning'`
  - [x] `sdlcLifecycleMap` maps `Planning: 'planning'`
  - [x] Unit test updated to expect correct mapping
  - [x] Features in Planning phase display "PLANNING" in web UI

  ## Size Estimate

  **S** — Simple mapping fix across 3 files, all in the web presentation layer.

