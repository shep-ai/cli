content: |
  ## Summary

  The implementation follows a foundation-first approach across three phases. Phase 1 establishes
  the type-level foundation by adding 'planning' to the FeatureLifecyclePhase union and its
  Record-typed config objects (display labels and running verbs). This leverages TypeScript's
  exhaustiveness checking to surface any missed locations at compile time.

  Phase 2 fixes the two mapping objects that bridge domain values to UI phases: correcting the
  phaseNameToLifecycle plan-to-planning mapping (the root cause bug) and adding the missing
  sdlcLifecycleMap Planning entry. Tests are written/updated before each code change following TDD.

  Phase 3 runs the full verification suite to confirm zero regressions across the entire codebase,
  ensuring downstream consumers continue to work without modification.
