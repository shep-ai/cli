# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The UI sidebar shows a stale version (e.g. 1.100) even though the CLI
  is running version 1.101.0. This happens because `NEXT_PUBLIC_*` env
  vars are inlined at build time for client components, so they reflect
  the version from when the bundle was built — not the currently running
  CLI version.

  ## Success Criteria

  - [x] Sidebar displays the correct running CLI version
  - [x] Version data is fetched at runtime from a server-side API route
  - [x] All tests pass

  ## Affected Areas

  | Area       | Impact | Reasoning                                      |
  | ---------- | ------ | ---------------------------------------------- |
  | Web UI     | High   | Version badge in sidebar showed wrong version  |
  | API routes | New    | New GET /api/version endpoint                  |
  | Hooks      | New    | New useVersion hook for runtime version fetch  |

  ## Dependencies

  None identified.

  ## Size Estimate

  **M** - Small API route + hook + sidebar update

