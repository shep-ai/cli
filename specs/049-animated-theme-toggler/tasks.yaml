# Markdown content (the full tasks document)
content: |
  ## Summary

  Seven tasks across four phases implement the animated theme toggler. The work
  flows from CSS infrastructure to component logic to test coverage to visual
  documentation.

  **Phase 1** lays the CSS foundation: the `theme-reveal` @keyframes and
  `::view-transition-*` pseudo-element rules are added to `globals.css` before
  any JS touches the View Transitions API, ensuring no partial state where
  `startViewTransition` fires without animation rules.

  **Phase 2** updates the component in two steps: first wiring the MouseEvent
  coordinate injection (task-2), then adding the `startViewTransition` wrapper
  with its two-layer guard (task-3). Splitting these keeps each diff small and
  reviewable.

  **Phase 3** extends the existing unit test file with three new tests: the
  happy path (task-4), the unsupported-browser fallback (task-5), and the
  reduced-motion skip (task-6). All three are built on the same `vi.stubGlobal`
  mock pattern; existing sound tests remain unmodified.

  **Phase 4** adds the two required Storybook variants (LightMode, DarkMode)
  with a stable `startViewTransition` mock, completing the mandatory story
  coverage required by CLAUDE.md.
