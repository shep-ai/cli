# Markdown content (the full plan document)
content: |
  ## Status

  - **Phase:** Planning (complete)
  - **Updated:** 2026-03-04

  ## Architecture Overview

  This feature is entirely confined to the **presentation layer**
  (`src/presentation/web/`). The Clean Architecture constraint (NFR-5) is
  satisfied: no domain, application, or infrastructure files are touched.

  The existing ThemeToggle sits at:
  `src/presentation/web/components/common/theme-toggle/theme-toggle.tsx`

  It already encapsulates all theme-switching logic via `useTheme` (localStorage
  + system preference) and `useSoundAction` (audio feedback). The only change is
  extending `toggleTheme` to:
  1. Accept a `React.MouseEvent<HTMLButtonElement>` (reads `clientX`/`clientY`)
  2. Guard on `document.startViewTransition` availability and `prefers-reduced-motion`
  3. Inject `--x`/`--y` CSS custom properties onto `document.documentElement`
  4. Wrap `setTheme` inside `startViewTransition`'s callback

  The `useTheme` hook's `setTheme` applies the theme by toggling the `dark` class
  on `document.documentElement.classList`. This is the correct insertion point
  for the View Transitions API: the browser captures the current visual state
  before the callback, runs the callback (which mutates the DOM), then animates
  between old and new snapshots using the `::view-transition-*` pseudo-elements
  and the `@keyframes` defined in `globals.css`.

  ## Key Design Decisions

  ### 1. Inline logic in toggleTheme (not a custom hook)
  The MagicUI pattern lives directly in the click handler. No new hook or wrapper
  component is introduced — YAGNI applies: the component is used once in app-shell,
  and extracting the logic would add indirection with no consumer benefit.

  ### 2. CSS custom properties on :root for click coordinates
  `document.documentElement.style.setProperty('--x', e.clientX + 'px')` is the
  only mechanism that makes the click coordinates accessible to
  `::view-transition-new(*)`, which the browser renders at the document level
  outside the React component tree. Scoped CSS vars (e.g., inline style on a
  wrapper div) would not reach these top-level pseudo-elements.

  ### 3. @keyframes in globals.css (not JS-injected)
  globals.css already owns all animation definitions (accordion-down, spinner,
  indeterminate-progress, option-highlight). `@keyframes theme-reveal` belongs
  alongside these. Plain `@keyframes` outside `@theme` are valid in Tailwind v4's
  CSS-first approach and pass through as standard CSS.

  ### 4. Two-layer reduced-motion handling
  NFR-8 requires prefers-reduced-motion support. The JS layer
  (`window.matchMedia('(prefers-reduced-motion: reduce)').matches`) skips
  `startViewTransition` entirely — no snapshot capture overhead. The CSS layer
  (`@media (prefers-reduced-motion: reduce) { animation: none }`) is a defensive
  fallback. Both reduced-motion and unsupported-browser paths share the same
  direct `setTheme` call — DRY.

  ### 5. ::view-transition-old(*) hidden immediately
  Hiding the old snapshot via `animation: none` produces the MagicUI reference
  visual: the new theme "grows in" on top of a static old snapshot that instantly
  disappears. A simultaneous fade produces an undesirable double-animation with a
  grey/washed-out middle state.

  ### 6. 400ms ease-in-out animation duration
  Within NFR-2's 500ms upper bound. Matches the MagicUI reference. Existing project
  animations range from 200ms (accordion) to 1500ms (indeterminate-progress); 400ms
  is appropriate for a full-page transition triggered by deliberate user intent.

  ### 7. Keyboard activation via React.MouseEvent (clientX/clientY = 0)
  React's synthetic MouseEvent from Enter/Space keyboard activation provides
  `clientX = clientY = 0`. The animation originates from the top-left corner for
  keyboard users — an acceptable degradation, not a regression. NFR-3 is satisfied:
  keyboard activation still triggers the view transition. Using useRef +
  getBoundingClientRect() for keyboard origin would add complexity disproportionate
  to the benefit.

  ## Implementation Strategy

  Phases are ordered so each builds on the previous without partial states:

  1. **CSS first** — keyframes exist before any JS calls startViewTransition
  2. **Component logic** — wires the animation using the CSS already in place
  3. **Tests** — validates all paths (happy, fallback, reduced-motion) with mocks
  4. **Stories** — visual documentation of both theme states with stable mocks

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | ::view-transition-* rules interfere with existing animations | Scoped to pseudo-elements that only exist during an active view transition; no overlap with existing @keyframes |
  | Tailwind v4 purges ::view-transition-* rules | Browser pseudo-elements are not processed by Tailwind's purge; they pass through as plain CSS |
  | startViewTransition unavailable in test environment (jsdom) | vi.stubGlobal mocks the API; tests don't depend on the real browser API |
  | Sound assertions break after MouseEvent change | Mock startViewTransition calls its callback synchronously; existing assertions work unchanged |
  | Storybook iframe View Transitions API inconsistency | Stories mock startViewTransition as a no-op; no real browser API is invoked |
  | prefers-reduced-motion check fails in SSR/test environments | Guard with `typeof window !== 'undefined'` before accessing window.matchMedia |
