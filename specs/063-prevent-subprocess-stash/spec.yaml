# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When the feature agent's requirements phase subprocess encounters a failing E2E test
  during its `pnpm test` verification step (instructed by `buildCommitPushBlock`), it
  attempts to "prove" the failure is pre-existing by running `git stash && pnpm test:e2e`
  — stashing its own uncommitted spec.yaml changes. If the subprocess is then killed
  (timeout) or exits before running `git stash pop`, the structured spec.yaml written by
  the requirements agent is lost.

  ## Root Cause

  `buildCommitPushBlock()` instructs the agent to run `pnpm build`, `pnpm test`, and
  `pnpm lint` before pushing. When tests fail, the agent (an LLM) decides on its own to
  run `git stash` to investigate — there's nothing in the prompt forbidding destructive
  git commands.

  ## Required Fix

  1. In `buildCommitPushBlock()` — Add explicit prohibition of `git stash`, `git reset`,
     `git checkout -- .`, `git restore`, and `git clean` during verification.
  2. In `validateSpecAnalyze()` — Reject non-empty `openQuestions` arrays (analysis phase
     should always produce `openQuestions: []`).

  ## Files Changed

  - `packages/core/src/infrastructure/services/agents/feature-agent/nodes/node-helpers.ts`
  - `packages/core/src/infrastructure/services/agents/feature-agent/nodes/schemas/spec.schema.ts`
  - `tests/unit/.../node-helpers.test.ts`
  - `tests/unit/.../spec.schema.test.ts`

  ## Acceptance Criteria

  - [x] `buildCommitPushBlock()` output contains explicit prohibition of destructive git commands
  - [x] `buildCommitPushBlock()` instructs agent to proceed with commit+push if unrelated tests fail
  - [x] `validateSpecAnalyze()` rejects specs where openQuestions is a non-empty array
  - [x] All existing tests pass, new tests cover the changes
  - [x] No changes to domain models, TypeSpec, or settings

  ## Success Criteria

