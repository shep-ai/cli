oneLiner: add file attachment support to UI (drag-drop/paste) and CLI (--files flag) with @filepath agent references
summary: >
  Users need to attach files (images, documents, code snippets) when creating or messaging features
  in both the web UI and CLI. The web UI should support drag-and-drop and Ctrl+V image pasting into
  the prompt area, uploading files to a .shep/attachments/<feature-slug>/ directory and referencing
  them with @<within-shep-dir-path> syntax; the CLI should accept a --files flag that appends
  @filepath references to prompts. Attachment metadata (name, size, mime-type, path) is persisted
  in SQLite and defined as a TypeSpec value object. All agent executors already accept file
  references in prompt text, so the primary work is in ingestion, storage, and prompt composition.
phase: Requirements
sizeEstimate: L

