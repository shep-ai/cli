name: attachment-support
summary: >
  Implementation extends the existing FileAttachment infrastructure and AttachmentCard UI
  scaffold into a complete attachment ingestion system. The approach follows the TypeSpec-first
  mandate: an Attachment value object is defined in tsp/ first, then a JSON column mirrors
  how messages and relatedArtifacts are already stored in the features table. A pending-session
  upload strategy allows files to be stored before the feature slug is known. A dedicated
  AttachmentStorageService handles all file I/O and dedup, keeping the upload route and use
  case thin. No new third-party libraries are required.

relatedFeatures: []

technologies:
  - TypeSpec (Attachment value object in tsp/domain/value-objects/attachment.tsp)
  - Next.js App Router (POST /api/attachments/upload route handler)
  - React 19 (onDrop, onDragOver, onDragLeave, onPaste event handlers, useState)
  - Node.js crypto (SHA-256 deduplication), fs/path (file storage and rename)
  - better-sqlite3 (JSON column attachments TEXT DEFAULT '[]' in features table, migration 022)
  - Commander.js (repeatable --attach option on shep feat new)
  - Tailwind CSS + Radix UI (drag-over visual feedback, ARIA attributes)
  - Storybook (mandatory .stories.tsx for all new/modified components)
  - Vitest (unit tests for validation, dedup, prompt composition, CLI parsing)
  - Playwright (E2E test for web drag-drop to create to agent prompt flow)

relatedLinks:
  - https://github.com/shep-ai/shep/issues/223

phases:
  - id: phase-0
    name: 'Static HTML Mock'
    description: >
      FR-15 mandates a static HTML mock showing the drag-over state, attachment chips, and
      error state be committed to specs/ BEFORE any code is written. This phase is a
      non-negotiable prerequisite. It defines the visual target for all subsequent UI work
      and de-risks the design before any implementation cost is incurred.
    parallel: false

  - id: phase-1
    name: 'Foundation and Domain Setup'
    description: >
      Establish the TypeSpec-first domain model (Attachment value object, Feature entity
      updated with attachments field), run tsp:compile to generate TypeScript types, add
      SQLite migration 022 for the attachments JSON column, and update the feature mapper
      to serialize/deserialize attachments alongside existing messages and relatedArtifacts.
      This phase gates all subsequent work — no code above the infrastructure layer can
      be written until the generated type is available.
    parallel: false

  - id: phase-2
    name: 'Infrastructure Services and Upload Route'
    description: >
      Implement AttachmentStorageService (store, commit, delete) with SHA-256 dedup and
      filename sanitization. Implement the POST /api/attachments/upload route handler with
      10 MB enforcement at two layers (HTTP config + programmatic check). Wire
      AttachmentStorageService into the DI container. This phase provides the server-side
      primitives required by both the web UI and the use case.
    parallel: false

  - id: phase-3
    name: 'Application Layer — Use Case and Prompt Composition'
    description: >
      Extend CreateFeatureInput with attachments and sessionId fields. Update
      CreateFeatureUseCase to call AttachmentStorageService.commit() during initializeAndSpawn,
      persist Attachment records in the feature JSON column, and pass them forward. Update
      composeUserInput() in create-feature.ts to produce @<relative-path> format. This phase
      connects the storage layer to the feature creation business logic.
    parallel: false

  - id: phase-4
    name: 'Web UI — Drag-Drop, Paste, and AttachmentCard'
    description: >
      Extract the inline AttachmentCard function in feature-create-drawer.tsx into a standalone
      exported component with a colocated .stories.tsx (required by Storybook mandate). Add
      drag-drop and Ctrl+V paste handlers to FeatureCreateDrawer using the native HTML5
      Drag and Drop API and ClipboardEvent. Add sessionId generation on drawer open and wire
      the upload flow via the new upload route. Update feature-create-drawer.stories.tsx.
    parallel: false

  - id: phase-5
    name: 'CLI — --attach Flag'
    description: >
      Add a repeatable --attach <path> Commander.js option to new.command.ts supporting both
      --attach path1 --attach path2 and --attach path1,path2 forms. Validate paths exist on
      disk, copy files to .shep/attachments/<slug>/ via AttachmentStorageService, persist
      Attachment records, and compose @path references in the prompt. Consistent with web
      UI behaviour.
    parallel: false

  - id: phase-6
    name: 'Tests and Verification'
    description: >
      Write unit tests (Vitest) for file validation, SHA-256 dedup, @path composition, and
      CLI flag parsing. Write the Playwright E2E test covering the full web drag-drop to
      feature create to agent prompt flow. Run pnpm build, pnpm test, pnpm lint to zero errors.
    parallel: false

