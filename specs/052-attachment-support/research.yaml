  ## Architecture Notes

  ### Clean Architecture Layer Placement

  ```
  domain/          <- Attachment value object (TypeSpec -> generated output.ts)
  application/     <- CreateFeatureUseCase gains Attachment[] + sessionId in input type
  infrastructure/  <- AttachmentStorageService (new), migration 024, mapper update
  presentation/    <- Route handler (web upload), drag-drop component (web), CLI flag
  ```

  The dependency rule is respected: presentation -> application -> infrastructure.
  The upload route handler is presentation layer — it parses HTTP and delegates to
  `AttachmentStorageService` (infrastructure) through the use case (application).

  ### New Infrastructure Service: AttachmentStorageService

  Thin injectable service in `packages/core/src/infrastructure/services/`:

  ```typescript
  @injectable()
  export class AttachmentStorageService {
    store(buffer: Buffer, filename: string, sessionId: string, repoPath: string): Promise<Attachment & { sha256: string }>;
    commit(sessionId: string, featureSlug: string, repoPath: string): Promise<Attachment[]>;
    delete(featureSlug: string, repoPath: string): Promise<void>;
  }
  ```

  Keeps the route handler thin and file I/O logic fully testable in Vitest unit tests.

