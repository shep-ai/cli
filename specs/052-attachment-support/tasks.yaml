content: |
  ## Summary

  The implementation proceeds in strict dependency order across 7 phases. First, a static
  HTML mock establishes the visual design contract (phase-0). Then the domain foundation is
  laid: TypeSpec Attachment value object, SQLite migration 022, and feature mapper update
  (phase-1). With the generated Attachment type available, the infrastructure layer is built:
  AttachmentStorageService encapsulating all file I/O and SHA-256 dedup, and the upload
  route handler with two-layer 10 MB enforcement (phase-2).

  The application layer is updated next: CreateFeatureInput gains attachments and sessionId
  fields, the use case calls commit() to finalize pending uploads after slug resolution, and
  composeUserInput() switches to @path reference format (phase-3). With the full stack wired,
  the web UI receives drag-drop and paste event handlers, an optimistic loading chip, and the
  extracted AttachmentCard component with mandatory Storybook stories (phase-4). The CLI gains
  its --attach flag with validation and identical file-copy behaviour (phase-5). Finally,
  integration-level unit and E2E tests verify the full flows (phase-6).

  Each code task follows TDD cycles: tests are written first (RED), then minimal code to pass
  (GREEN), then cleanup (REFACTOR). The static mock and TypeSpec tasks (which produce no
  runtime-tested code) are exempt from TDD cycles.
