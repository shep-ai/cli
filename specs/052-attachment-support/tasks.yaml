name: attachment-support
summary: >
  12 tasks across 7 phases (phase-0 through phase-6). Foundation work (TypeSpec model,
  SQLite migration, mapper) gates all other phases. Infrastructure services and upload route
  come next, followed by the application use case update, web UI component work, CLI flag,
  and finally integration-level tests to verify the full flow end-to-end.

relatedFeatures: []
technologies: []
relatedLinks: []

tasks:
  - id: task-1
    phaseId: phase-0
    title: 'Commit static HTML mock to specs/'
    description: >
      FR-15 requires a static HTML mock showing the drag-over highlighted border, attachment
      chips with filename/size/remove button, file-too-large inline error state, and the
      empty (no attachments) state — all committed to specs/052-attachment-support/ before
      any implementation code is written. This is a documentation/design task, not a code task.
    state: Todo
    dependencies: []
    acceptanceCriteria:
      - 'specs/052-attachment-support/mock.html exists and renders correctly in a browser'
      - 'Mock shows drag-over state with highlighted border on the prompt area'
      - 'Mock shows at least two AttachmentCard chips with filename, file size, and a remove button'
      - 'Mock shows an inline error message for the file-too-large case'
      - 'Mock shows the empty state (prompt only, no attachments)'
      - 'File is committed to git before any Phase 1 code is written'
    tdd: null
    estimatedEffort: '1h'

  - id: task-2
    phaseId: phase-1
    title: 'Define Attachment TypeSpec value object and update Feature entity'
    description: >
      Create tsp/domain/value-objects/attachment.tsp with fields: id (UUID), name (string),
      size (int64), mimeType (string), path (string), createdAt (utcDateTime). Export it from
      tsp/domain/value-objects/index.tsp. Add `attachments?: Attachment[]` to the Feature
      entity in tsp/domain/entities/feature.tsp. Run pnpm tsp:compile to regenerate
      packages/core/src/domain/generated/output.ts. Fix any compile errors.
    state: Todo
    dependencies:
      - task-1
    acceptanceCriteria:
      - 'tsp/domain/value-objects/attachment.tsp exists with all 6 required fields'
      - 'Attachment is exported from tsp/domain/value-objects/index.tsp'
      - 'Feature entity in tsp/domain/entities/feature.tsp has attachments?: Attachment[]'
      - 'pnpm tsp:compile runs with zero errors'
      - 'packages/core/src/domain/generated/output.ts contains the Attachment type with all fields'
      - 'No manual edits made to output.ts'
    tdd: null
    estimatedEffort: '30min'

  - id: task-3
    phaseId: phase-1
    title: 'Add SQLite migration 022 and update feature mapper'
    description: >
      Add migration version 022 to migrations.ts: ALTER TABLE features ADD COLUMN attachments
      TEXT NOT NULL DEFAULT '[]'. Update FeatureRow interface in feature.mapper.ts to include
      attachments: string. Update toDatabase() to JSON.stringify feature.attachments (or '[]').
      Update fromDatabase() to JSON.parse the attachments column. Mirror the exact pattern
      used for messages and relatedArtifacts.
    state: Todo
    dependencies:
      - task-2
    acceptanceCriteria:
      - 'migrations.ts has a new entry at version 022 with the ALTER TABLE SQL'
      - 'FeatureRow interface includes attachments: string'
      - 'toDatabase() serializes attachments via JSON.stringify'
      - 'fromDatabase() deserializes attachments via JSON.parse with fallback to []'
      - 'pnpm test:unit passes (no mapper regression)'
      - 'A Feature created without attachments saves with empty array and loads correctly'
    tdd:
      red:
        - 'Write a unit test for feature.mapper.ts: toDatabase() with attachments array serializes to JSON string'
        - 'Write a unit test: fromDatabase() with attachments JSON string deserializes to Attachment[]'
        - 'Write a unit test: fromDatabase() with missing attachments column (pre-migration row) defaults to []'
      green:
        - 'Add migration 022 entry to migrations.ts'
        - 'Add attachments field to FeatureRow interface'
        - 'Update toDatabase() to JSON.stringify(feature.attachments ?? [])'
        - 'Update fromDatabase() to JSON.parse(row.attachments ?? "[]")'
      refactor:
        - 'Extract a helper parseJsonColumn() if the same pattern appears 3+ times in mapper'
        - 'Ensure null safety matches existing messages/relatedArtifacts handling'
    estimatedEffort: '45min'

  - id: task-4
    phaseId: phase-2
    title: 'Implement AttachmentStorageService'
    description: >
      Create packages/core/src/infrastructure/services/attachment-storage.service.ts as an
      @injectable() class with three methods: store(buffer, filename, mimeType, sessionId,
      repoPath) -> Attachment & { sha256: string } — sanitizes filename, computes SHA-256,
      deduplicates against existing records in the session, writes to
      .shep/attachments/pending-<sessionId>/; commit(sessionId, featureSlug, repoPath) ->
      Attachment[] — renames pending dir to <featureSlug> dir, updates path fields;
      delete(featureSlug, repoPath) -> void — removes the attachment directory. Register in
      DI container. Write unit tests using tmp directories.
    state: Todo
    dependencies:
      - task-3
    acceptanceCriteria:
      - 'AttachmentStorageService is injectable and registered in the DI container'
      - 'store() sanitizes filenames: strips ../ and replaces non-alphanum chars with _'
      - 'store() computes SHA-256 of file buffer and returns it on the Attachment record'
      - 'store() returns existing Attachment record without writing if SHA-256 matches (dedup)'
      - 'store() writes file to .shep/attachments/pending-<sessionId>/<sanitized-name>'
      - 'store() creates directory if it does not exist'
      - 'commit() renames pending-<sessionId> dir to <featureSlug> dir atomically'
      - 'commit() updates the path field on all returned Attachment records to be relative to repoPath'
      - 'delete() removes the feature attachment directory (fs.rm recursive)'
      - 'Unit tests pass in Vitest with real tmp filesystem operations'
    tdd:
      red:
        - 'Write test: store() with a new file writes to pending dir and returns Attachment with correct fields'
        - 'Write test: store() with duplicate SHA-256 returns existing record without writing new file'
        - 'Write test: store() sanitizes filename containing path traversal (../) and spaces'
        - 'Write test: commit() renames pending dir to slug dir and returns updated paths'
        - 'Write test: delete() removes the attachment directory'
      green:
        - 'Implement store() with mkdirSync, createHash SHA-256, dedup check, writeFileSync'
        - 'Implement commit() with renameSync and path field update'
        - 'Implement delete() with fs.rm recursive'
      refactor:
        - 'Extract getAttachmentDir() and getPendingDir() helpers to avoid path string repetition'
        - 'Ensure all paths returned are relative to repoPath (path.relative(repoPath, absPath))'
    estimatedEffort: '2h'

