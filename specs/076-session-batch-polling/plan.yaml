content:
  architectureOverview: |
    Browser                           Server
    ┌─────────────────────┐          ┌──────────────────────────┐
    │ SessionsProvider     │  30s     │ /api/sessions-batch      │
    │  └─ useSessionsBatch │──GET───→│  ├─ check cache (30s TTL)│
    │      ↓ context value │         │  ├─ scanClaudeSessions()  │
    │  ┌────────────┐      │         │  └─ scanCursorSessions()  │
    │  │FeatureNode │      │         └──────────────────────────┘
    │  │ └─Dropdown │      │
    │  │   reads ctx│      │
    │  ├────────────┤      │
    │  │ RepoNode   │      │
    │  │ └─Dropdown │      │
    │  │   reads ctx│      │
    │  └────────────┘      │
    └─────────────────────┘

  implementationStrategy: >
    Phase 1 builds the server-side batch endpoint by extracting shared scanner
    functions from the existing /api/sessions route into a reusable module,
    then creating the batch route that iterates over multiple paths.
    Phase 2 creates the client-side React context and polling hook.
    Phase 3 refactors FeatureSessionsDropdown to consume from context and
    wires the provider into the control center component tree.

  testingStrategy: >
    TDD throughout. Phase 1: test batch endpoint with mocked filesystem.
    Phase 2: test hook polling behavior with fake timers.
    Phase 3: test dropdown renders from context data without fetching.

  riskMitigation:
    - risk: batch scan for 25+ repos takes too long
      mitigation: server-side 30s cache means only first request per cycle does I/O
    - risk: large response payload bloats network
      mitigation: limit to 5 sessions per path (vs current 10), only send summary fields
