tasks:
  - id: "task-1"
    phaseId: "phase-1"
    title: "Add getViewerPermission to IGitHubRepositoryService interface"
    description: >
      Extend the IGitHubRepositoryService interface with a getViewerPermission(repoPath: string)
      method that returns Promise<string>. Add a GitHubPermissionError class for permission
      check failures. This defines the contract that the implementation and all consumers depend on.
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "IGitHubRepositoryService has a getViewerPermission(repoPath: string): Promise<string> method"
      - "GitHubPermissionError class exists with name, message, and optional cause"
      - "JSDoc documents the method signature, return values (ADMIN, MAINTAIN, WRITE, TRIAGE, READ), and throws clause"
    tdd:
      red:
        - "Write a type-level test that asserts IGitHubRepositoryService has getViewerPermission method (compile-time check — the interface change itself causes existing mock implementations to fail type-check)"
      green:
        - "Add getViewerPermission(repoPath: string): Promise<string> to the interface"
        - "Add GitHubPermissionError class following the pattern of GitHubAuthError, GitHubCloneError, etc."
      refactor:
        - "Ensure JSDoc is consistent with existing methods in the interface"
    estimatedEffort: "15min"

  - id: "task-2"
