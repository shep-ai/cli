content: |
  ## Summary

  The implementation is broken into 8 tasks across 3 phases following the dependency chain:
  service layer, server integration, then UI.

  **Phase 1 (Service Layer)** establishes the foundation by adding getViewerPermission() to
  the IGitHubRepositoryService interface and implementing it with gh repo view --json
  viewerPermission using the cwd pattern from GitForkService. Unit tests verify all permission
  levels and error paths using mock ExecFunction.

  **Phase 2 (Server Integration)** connects the service to the UI layer. The create/page.tsx
  server component adds the permission check to its existing Promise.all for the initial load.
  A new get-viewer-permission server action enables dynamic re-checks when the user switches
  repos in the combobox. CreateDrawerClient threads the canPushDirectly boolean through to
  FeatureCreateDrawer.

  **Phase 3 (UI)** implements the visible behavior: conditional rendering of the Fork & PR
  toggle block, internal canPush state management, server action calls on repo change, and
  automatic state reset of forkAndPr and its dependent toggles (push, openPr, commitSpecs)
  when the user has push access. Storybook stories demonstrate both states without requiring
  a real gh CLI. A final validation task ensures the entire codebase remains green.
