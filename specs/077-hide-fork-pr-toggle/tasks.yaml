name: "hide-fork-pr-toggle"
summary: >
  8 tasks across 3 phases. Phase 1 adds getViewerPermission to the service layer with
  unit tests. Phase 2 wires the permission check into the server component, creates a
  server action for re-checks, and threads the prop through CreateDrawerClient. Phase 3
  implements conditional rendering, state reset logic, component tests, and Storybook stories.

