      Create a new server action at src/presentation/web/app/actions/get-viewer-permission.ts.
      It resolves IGitHubRepositoryService from DI, calls getViewerPermission(repoPath),
      maps the permission string to a canPushDirectly boolean (ADMIN/MAINTAIN/WRITE = true),
      and catches errors to return canPushDirectly=false as graceful degradation.
      Follows the pattern of list-github-repositories.ts.
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "Server action exports getViewerPermission(repoPath: string): Promise<{ canPushDirectly: boolean }>"
      - "Returns { canPushDirectly: true } for ADMIN, MAINTAIN, WRITE permissions"
      - "Returns { canPushDirectly: false } for TRIAGE, READ permissions"
      - "Returns { canPushDirectly: false } when service throws (graceful degradation)"
      - "Marked with 'use server' directive"
      - "Resolves service via resolve<IGitHubRepositoryService>('IGitHubRepositoryService')"
    tdd:
