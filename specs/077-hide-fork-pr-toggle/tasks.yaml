    title: "Implement getViewerPermission in GitHubRepositoryService"
    description: >
      Implement the getViewerPermission method using this.execFile('gh', ['repo', 'view',
      '--json', 'viewerPermission'], { cwd: repoPath }). Parse the JSON output to extract
      the permission string. Throw GitHubPermissionError on ENOENT (gh not installed) or
      exec failure. Follows the exact pattern from GitForkService (git-fork.service.ts:26).
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "getViewerPermission returns 'ADMIN' when gh outputs {\"viewerPermission\":\"ADMIN\"}"
      - "getViewerPermission returns 'WRITE' when gh outputs {\"viewerPermission\":\"WRITE\"}"
      - "getViewerPermission returns 'READ' when gh outputs {\"viewerPermission\":\"READ\"}"
      - "getViewerPermission throws GitHubPermissionError when execFile throws ENOENT"
      - "getViewerPermission throws GitHubPermissionError when execFile throws generic error"
      - "execFile is called with args ['repo', 'view', '--json', 'viewerPermission'] and { cwd: repoPath }"
    tdd:
      red:
