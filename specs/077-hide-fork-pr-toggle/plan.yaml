name: "hide-fork-pr-toggle"
summary: >
  Add a getViewerPermission() method to IGitHubRepositoryService that calls
  gh repo view --json viewerPermission with cwd. The create drawer server component
  fetches the initial permission in its existing Promise.all, threading a canPushDirectly
  boolean through CreateDrawerClient to FeatureCreateDrawer. A new get-viewer-permission
  server action handles dynamic re-checks on repo change. The Fork & PR toggle block is
  conditionally unmounted when canPushDirectly is true, with forkAndPr and dependent states
  auto-reset via useEffect. TDD throughout: service unit tests, component conditional
  rendering tests, and Storybook stories for both states.

