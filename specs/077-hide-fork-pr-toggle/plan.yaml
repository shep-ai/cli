phases:
  - id: "phase-1"
    name: "Service Layer — Permission Detection"
    description: >
      Add getViewerPermission(repoPath) to the IGitHubRepositoryService interface and
      implement it in GitHubRepositoryService using gh repo view --json viewerPermission
      with cwd. This is the foundational building block — everything downstream depends on
      this method existing. Includes unit tests for success and error paths.
    parallel: false

  - id: "phase-2"
    name: "Server Integration — Data Flow to UI"
    description: >
      Wire the permission check into the create drawer data flow. Add the initial
      canPushDirectly fetch to create/page.tsx (inside the existing Promise.all), create
      the get-viewer-permission server action for dynamic re-checks, and thread the prop
      through CreateDrawerClient. This phase bridges the service layer to the UI layer.
    parallel: false

  - id: "phase-3"
    name: "UI — Conditional Rendering & State Management"
    description: >
      Modify FeatureCreateDrawer to accept canPushDirectly prop, manage internal state,
      call the server action on repo change, auto-reset forkAndPr and dependent states,
      and conditionally unmount the Fork & PR toggle block. Includes component tests and
      Storybook stories for both toggle-visible and toggle-hidden states.
    parallel: false

