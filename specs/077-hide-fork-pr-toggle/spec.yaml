summary: >
  The Fork & PR toggle in the feature create drawer should be hidden when the user
  already has write/push access to the repository (i.e., is the owner, maintainer,
  or collaborator with push permissions). This requires adding a permission check
  via the GitHub CLI and conditionally rendering the toggle in the web UI.

