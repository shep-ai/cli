name: "hide-fork-pr-toggle"
summary: >
  The feature adds a `getViewerPermission()` method to the existing IGitHubRepositoryService
  interface, implemented via `gh repo view --json viewerPermission`. The create drawer server
  component passes an initial `canPushDirectly` boolean prop through the component chain, and
  a new lightweight server action enables re-checking on repo change. The Fork & PR toggle
  block is conditionally rendered (not shown/hidden — simply not mounted) when the user has
  ADMIN, MAINTAIN, or WRITE permission, with forkAndPr state auto-reset to false.

