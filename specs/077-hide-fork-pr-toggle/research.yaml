content: |
  ## Technology Decisions

  ### 1. Permission Detection Method

  **Chosen:** `gh repo view --json viewerPermission`

  **Rejected:**
  - `gh api /repos/{owner}/{repo}` — requires parsing owner/repo from local path and constructing the API call; over-complex
  - Git remote parsing + GitHub REST API — multiple steps for a single field

  **Rationale:** The codebase already uses `gh repo view --json <fields>` in GitForkService
  (git-fork.service.ts:26). The `viewerPermission` field returns ADMIN, MAINTAIN, WRITE,
  TRIAGE, or READ. Verified locally: output is `{"viewerPermission":"ADMIN"}`.

  ### 2. Service Method Location

  **Chosen:** Add `getViewerPermission(repoPath: string)` to existing `IGitHubRepositoryService`

  **Rejected:**
  - New `IGitHubPermissionService` — over-abstraction for one method
  - Add to `IGitForkService` — permission is general, not fork-specific

  **Rationale:** `IGitHubRepositoryService` handles auth, listing, URL parsing, cloning —
  all general GitHub operations. Permission detection belongs here. Already registered in
  DI container (container.ts:230-233).

  ### 3. Data Flow to UI

  **Chosen:** Fetch in `create/page.tsx` server component + new server action for re-check

  **Rejected:**
  - Extend `WorkflowDefaults` — couples permissions to user preferences
  - Client-side only via `useEffect` — causes layout shift (violates NFR-4)

  **Rationale:** The server component already runs `Promise.all([listFeatures, listRepos,
  getWorkflowDefaults])`. Adding one more concurrent call provides the initial value with
  zero layout shift. A dedicated `get-viewer-permission.ts` server action handles repo
  change re-checks.

  ### 4. Repo Identification for Permission Check

  **Chosen:** Use `cwd` option with `gh repo view` (pass local repo path as working directory)

  **Rejected:**
  - Parse git remote URL to extract `nameWithOwner` — extra step
  - Store `nameWithOwner` on Repository entity — requires TypeSpec/schema change

  **Rationale:** Matches the exact pattern in GitForkService (git-fork.service.ts:26)
  where `gh repo view --json isFork,parent` is called with `{ cwd }`. The gh CLI
  auto-detects the repo from the working directory.

  ### 5. Conditional Rendering Approach

  **Chosen:** Conditional JSX — do not mount toggle when `canPushDirectly` is true

  **Rejected:**
  - CSS `display:none` — leaves DOM nodes, accessibility issues
  - Render disabled with text — unnecessary UI complexity

  **Rationale:** `{!canPushDirectly && <Tooltip>...</Tooltip>}` prevents layout shift
  by never including the element. The toggle takes minimal space in the GIT row.

  ### 6. State Reset Strategy

  **Chosen:** `useEffect` watching `canPushDirectly` — resets `forkAndPr` to false
  and reverts `push`, `openPr`, `commitSpecs` to workflow defaults

  **Rejected:**
  - Reset only `forkAndPr` — leaves dependent states in force-locked state
  - Ignore in payload — leaks stale state

  **Rationale:** When `forkAndPr=true`, it forces `push=true`, `openPr=true`,
  `commitSpecs=false`. Hiding the toggle must revert all of these.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | GitHub CLI (gh) | Permission detection | Use (existing) | Already integrated; `gh repo view --json viewerPermission` provides exactly what we need |
  | tsyringe | DI for service resolution | Use (existing) | Service registered as IGitHubRepositoryService singleton |
  | Vitest | Unit testing | Use (existing) | Existing test suite for GitHubRepositoryService follows mock-exec pattern |
  | Storybook | Component stories | Use (existing) | Stories demonstrate toggle-visible and toggle-hidden states |
  | React (useState/useEffect) | State management | Use (existing) | No new state libraries needed; follows existing pattern in FeatureCreateDrawer |

  No new libraries are required. All dependencies are already in the project.

  ## Security Considerations

  - **Permission check runs server-side only** — the `gh repo view` command runs in
    server actions and the server component. No GitHub tokens or CLI access is exposed
    to the client. The client only receives a boolean `canPushDirectly`.
  - **No command injection risk** — the repo path passed to `execFile` as `cwd` option
    is an object property, not interpolated into the command string. The `ExecFunction`
    (promisified `execFile`) does not use shell interpretation by default on non-Windows.
  - **Graceful degradation** — if the permission check fails (gh not installed, not
    authenticated, network error), the feature defaults to showing the toggle (the
    pre-existing behavior). This is per NFR-2.
  - **No new error classes needed** — permission check failures are caught and
    handled silently (return default). No error surfaces to the user.

  ## Performance Implications

  - **Initial load**: The `gh repo view --json viewerPermission` call adds ~200-500ms
    but runs in parallel with existing `Promise.all` calls in `create/page.tsx`. Net
    impact on drawer open time is negligible (bounded by the slowest of the 4 calls).
  - **Repo change re-check**: The server action call on combobox change adds ~200-500ms
    per repo switch. This is acceptable as it's user-initiated and infrequent. The UI
    can optimistically maintain the current toggle state until the response arrives.
  - **No caching needed** — permission checks are infrequent (once per drawer open,
    once per repo switch). The overhead doesn't justify caching complexity.
  - **No bundle size impact** — no new client-side dependencies. The server action
    is code-split by Next.js automatically.

  ## Architecture Notes

  ### Service Layer (Clean Architecture)

  The change follows the established pattern:
  - **Interface** (`application/ports/output/`): Add `getViewerPermission(repoPath: string): Promise<string>`
    to `IGitHubRepositoryService`. Returns the raw permission string (ADMIN, MAINTAIN, etc.).
  - **Implementation** (`infrastructure/services/external/`): In `GitHubRepositoryService`,
    implement using `this.execFile('gh', ['repo', 'view', '--json', 'viewerPermission'], { cwd: repoPath })`.
    Parse the JSON output. Handle ENOENT and other errors by throwing a new `GitHubPermissionError`
    (or reuse a general error approach — see open question resolution above about silent fallback).
  - **Error handling in service**: Throw on failure. Let the calling layer decide how to
    handle (server action catches and returns default).

  ### Presentation Layer

  - **Server component** (`create/page.tsx`): Resolve `IGitHubRepositoryService` from DI,
    call `getViewerPermission(repoPath)`, map to `canPushDirectly` boolean, pass as prop.
  - **Server action** (`get-viewer-permission.ts`): `'use server'` directive, resolves
    service from DI container via `resolve<IGitHubRepositoryService>('IGitHubRepositoryService')`,
    calls `getViewerPermission(repoPath)`, returns `{ canPushDirectly: boolean }`.
  - **Client component chain**: `CreateDrawerClient` threads `canPushDirectly` prop to
    `FeatureCreateDrawer`. The drawer manages internal state and re-checks on repo change.

  ### Component Changes

  `FeatureCreateDrawer`:
  1. New prop: `canPushDirectly?: boolean` (optional, defaults to false for backwards compat)
  2. Internal state: `const [canPush, setCanPush] = useState(canPushDirectly ?? false)`
  3. Sync from prop: `useEffect` to update `canPush` when prop changes
  4. On repo change: call server action, update `canPush`
  5. Auto-reset: `useEffect` watching `canPush` — when true, reset `forkAndPr=false`,
     revert `push`/`openPr`/`commitSpecs` to defaults
  6. Conditional render: `{!canPush && <Tooltip>...</Tooltip>}` for the Fork & PR block

  ### Testing Strategy

  - **Unit tests** (Vitest): Test `getViewerPermission()` in GitHubRepositoryService:
    - Returns "ADMIN" for admin repos
    - Returns "WRITE" for collaborator repos
    - Throws on ENOENT (gh not installed)
    - Throws on exec failure (not authenticated)
  - **Component tests**: Verify Fork & PR toggle renders when `canPushDirectly=false`,
    does not render when `canPushDirectly=true`
  - **Storybook stories**: Two new variants — "Toggle Visible (No Push Access)" and
    "Toggle Hidden (Has Push Access)" — using the existing `CreateDrawerTrigger` pattern
