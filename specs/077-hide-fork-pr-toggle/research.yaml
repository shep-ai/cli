decisions:
  - title: "Permission detection method"
    chosen: "gh repo view --json viewerPermission"
    rejected:
      - "gh api /repos/{owner}/{repo} — returns full repo JSON including permissions object, but requires parsing owner/repo from the local repo path and constructing the API call. The gh repo view command is simpler and already used in GitForkService for similar metadata queries."
      - "git remote parsing + GitHub REST API — would need to extract the remote URL, parse owner/repo, then call the REST API. Over-engineered for a single field when gh repo view does it in one command."
    rationale: >
      The codebase already uses `gh repo view --json <fields>` in GitForkService
      (git-fork.service.ts:26) to query repo metadata. The `viewerPermission` field
      returns one of ADMIN, MAINTAIN, WRITE, TRIAGE, or READ — exactly what we need.
      This follows the established pattern and requires no additional dependencies.
      Verified locally: `gh repo view --json viewerPermission` returns `{"viewerPermission":"ADMIN"}`.

  - title: "Service method location"
    chosen: "Add getViewerPermission() to existing IGitHubRepositoryService interface and GitHubRepositoryService implementation"
    rejected:
      - "Create a new IGitHubPermissionService interface — over-abstraction for a single method. The permission check is a GitHub repository operation that logically belongs with the existing service."
      - "Add to IGitForkService — the fork service handles fork-specific operations (fork, push-to-fork, create-upstream-PR). Permission detection is a general repo capability, not fork-specific."
    rationale: >
      IGitHubRepositoryService already handles auth checks, repo listing, URL parsing, and
      cloning — all general GitHub repo operations. Permission detection fits naturally here.
      The service is already registered as a singleton in the DI container
      (container.ts:230-233) and is accessible via the resolve() helper in server actions.

  - title: "How to pass permission to the UI"
    chosen: "Fetch in create/page.tsx server component + new server action for dynamic re-check"
    rejected:
      - "Extend WorkflowDefaults to include canPushDirectly — couples permission logic to workflow settings, which are user preferences, not repo-level permissions. WorkflowDefaults comes from getSettings() which has no GitHub context."
      - "Client-side only via useEffect — would cause layout shift (toggle renders then disappears). NFR-4 requires no layout shift, so the initial state must come from the server."
    rationale: >
      The create/page.tsx server component already fetches repos and workflow defaults
      via Promise.all. Adding one more service call here provides the initial
      canPushDirectly value with zero layout shift. For repo changes in the combobox,
      a dedicated server action (getViewerPermission) lets the client re-check without
      a full page reload. This matches the pattern used by listGitHubRepositories.ts
      which resolves services via the server container.

  - title: "Server action for dynamic re-check"
    chosen: "New dedicated server action: get-viewer-permission.ts"
    rejected:
      - "Reuse listGitHubRepositories action with extra field — the list action returns repos, not permission for a specific repo. Coupling these would be semantically wrong."
      - "No server action, re-fetch via page navigation — would require full page reload on repo change, breaking the smooth combobox UX."
    rationale: >
      A focused server action follows the existing pattern (e.g., list-github-repositories.ts,
      import-github-repository.ts). It resolves IGitHubRepositoryService from the DI container
      via `resolve<IGitHubRepositoryService>('IGitHubRepositoryService')`, calls
      getViewerPermission(nameWithOwner), and returns a simple `{ canPushDirectly: boolean }`
      result. The nameWithOwner is derived from the selected repo's path — the service will
      need to accept either a nameWithOwner string or a local path. Since the combobox repos
      are local paths, the server action will resolve the nameWithOwner using git remote parsing.

  - title: "Resolving nameWithOwner from local repo path for permission check"
    chosen: "Parse the git remote URL in the server action to extract nameWithOwner, then pass to getViewerPermission"
    rejected:
      - "Require nameWithOwner to be stored on the Repository entity — would require a domain model change (TypeSpec update, migration) for a UI-only feature. Over-engineered."
      - "Have getViewerPermission accept a local path and run gh repo view with --cwd — the gh repo view command supports running from a directory via cwd option on execFile. This is actually simpler and aligns with how GitForkService calls gh repo view with { cwd }."
    rationale: >
      After further analysis, the simplest approach is to have getViewerPermission accept
      a repo path and use the `cwd` option when calling `gh repo view`, matching how
      GitForkService (git-fork.service.ts:26) already calls `gh repo view --json isFork,parent`
      with `{ cwd }`. This avoids needing to parse remote URLs or store nameWithOwner.
      The server action receives the repo path directly from the selected repository option.

  - title: "Permission-to-boolean mapping"
    chosen: "Map ADMIN, MAINTAIN, WRITE to canPushDirectly=true; TRIAGE, READ to false"
    rejected:
      - "Only ADMIN and MAINTAIN as push-capable — WRITE permission explicitly grants push access on GitHub. Excluding it would incorrectly show the fork toggle for collaborators with write access."
      - "Return raw permission string to the UI and let the component decide — leaks domain logic into the presentation layer. The boolean is a cleaner contract."
    rationale: >
      GitHub's permission model is well-defined: ADMIN > MAINTAIN > WRITE > TRIAGE > READ.
      Users with WRITE or above can push directly to the repository. The service method
      returns the raw permission string, but the server action (or a utility function)
      maps it to the boolean. This keeps the service generic while the mapping lives
      close to the UI concern.

  - title: "Conditional rendering approach"
    chosen: "Do not mount the Fork & PR toggle block when canPushDirectly is true (conditional JSX)"
    rejected:
      - "Render with CSS display:none — still mounts the component, leaves DOM nodes, and could cause accessibility issues with hidden interactive elements."
      - "Render disabled with explanatory text — adds UI complexity for a case where the toggle is simply unnecessary. A missing toggle is cleaner than a greyed-out one with an explanation."
    rationale: >
      NFR-4 requires no layout shift. By not rendering the toggle block at all (conditional
      JSX with `{!canPushDirectly && <Tooltip>...</Tooltip>}`), the layout never includes
      the toggle when it shouldn't. The toggle area occupies minimal space in the GIT row,
      so its absence is unnoticeable.

  - title: "State reset strategy when toggle is hidden"
    chosen: "useEffect that resets forkAndPr to false and reverts dependent states when canPushDirectly changes to true"
    rejected:
      - "Reset only forkAndPr, not dependent states — would leave push/openPr in their force-locked state from a previous forkAndPr=true. Must also revert push and openPr to their independent defaults."
      - "No reset, just ignore forkAndPr in submit payload when hidden — leaks stale state into the submission. The form payload should always reflect visible UI state."
    rationale: >
      When forkAndPr is enabled, it forces push=true, openPr=true, and commitSpecs=false
      (lines 981, 1011, 1085 in feature-create-drawer.tsx). When canPushDirectly becomes true
      and the toggle hides, we must: (1) set forkAndPr=false, (2) revert push, openPr, and
      commitSpecs to their workflow default values. A useEffect watching canPushDirectly
      handles this cleanly.

