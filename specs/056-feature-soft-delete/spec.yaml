content: >
  ## Problem Statement


  We have delay in feature deletion process, it probably takes some time but our
  UI do optimistic deletion then updated and reappeared, total chaos.

  I want to fix the root cause, i want to add Deleting status to feature, while
  delting ui shows appropriate icon etc, deleting will do evertyhing including
  cleanup and delete the feature completly.

  We should do soft delete to feature in Db, put the feature in Deleted state
  and NOT show in any place. Only wiht explicit flag show deleted (both for ui
  and cli)


