name: "copilot-cli-agent"
summary: >
  Integrate GitHub Copilot CLI as a new agent executor following the established subprocess-based
  pattern (ClaudeCodeExecutorService, CodexCliExecutorService, GeminiCliExecutorService). The
  implementation is purely additive — extend TypeSpec AgentType enum, implement
  CopilotCliExecutorService with JSONL parsing and session resume, wire through factory/DI/
  presentation layers. Four phases: domain foundation, executor core, factory+DI wiring, and
  presentation layer integration.

relatedFeatures: []
technologies:
  - "TypeSpec (AgentType enum extension)"
  - "TypeScript (executor service implementation)"
  - "Node.js child_process (subprocess spawning via SpawnFunction)"
  - "GitHub Copilot CLI (copilot -p <prompt> --allow-all --output-format json)"
  - "JSONL (newline-delimited JSON event stream parsing)"
  - "Vitest (unit and integration testing)"
  - "Next.js (web UI agent selection components)"
  - "Storybook (UI component story variants)"
  - "Inquirer.js (TUI agent selection prompt)"

relatedLinks:
  - title: "GitHub Copilot CLI documentation"
    url: "https://docs.github.com/en/copilot/using-github-copilot/using-github-copilot-in-the-command-line"
  - title: "GitHub Copilot models"
    url: "https://docs.github.com/en/copilot/using-github-copilot/ai-model-in-github-copilot"

phases:
  - id: "phase-1"
    name: "Domain Foundation"
    description: |
      Add CopilotCli variant to the AgentType enum in TypeSpec and regenerate
      domain output. This must come first because every downstream component
      (executor, factory, DI, UI) depends on the AgentType enum having the
      copilot-cli value. Quick phase — single enum addition plus tsp compile.
    parallel: false

  - id: "phase-2"
    name: "Executor Service Core"
    description: |
      Implement CopilotCliExecutorService — the main engineering effort. Includes
      execute(), executeStream(), supportsFeature(), JSONL event parsing (-p flag
      prompt delivery, assistant.message_delta/assistant.message/result events),
      session resume via --resume=<sessionId>, and error handling. TDD-driven with
      comprehensive unit tests modeled on codex-cli-executor.test.ts. This phase
      depends on phase-1 for the AgentType enum value.
    parallel: false

  - id: "phase-3"
    name: "Factory, DI, and Infrastructure Wiring"
    description: |
      Wire the executor into the system: add copilot-cli case to AgentExecutorFactory
      (createExecutor, getSupportedAgents, getCliInfo, getSupportedModels), register
      stub session repository in DI container. Update existing factory tests. This phase
      depends on phase-2 for the executor class.
    parallel: false

  - id: "phase-4"
    name: "Presentation Layer Integration"
    description: |
      Add Copilot CLI to all user-facing surfaces: TUI agent select prompt, Web UI
      agent settings section (session-only auth), agent type icons, agent model picker,
      and all associated Storybook stories. Includes sourcing the GitHub Copilot brand
      icon asset. This phase depends on phase-3 for factory integration (model picker
      reads from factory).
    parallel: false

