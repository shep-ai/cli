      Follows existing Commander.js patterns from ls/show commands and
      @inquirer/prompts wizard patterns from agent-config.wizard.ts.
    parallel: false

  - id: phase-5
    name: 'Web UI — GitHub Import Dialog & Server Actions'
    description: >
      Refactor add-repository-button from simple button to popover with
