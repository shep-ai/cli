name: github-repo-import
summary: >
  Implementation plan for importing GitHub repositories into Shep via URL or
  interactive browse. Follows Clean Architecture with a new
  IGitHubRepositoryService port, two use cases (Import + List), a gh CLI-based
  infrastructure adapter, CLI command with interactive wizard, and Web UI dialog
  with URL/Browse tabs. The domain model gains an optional remoteUrl field via
  TypeSpec + SQLite migration, and the settings model gains
  defaultCloneDirectory.

