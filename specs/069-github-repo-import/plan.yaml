content: |
  ## Architecture Overview

  This feature adds GitHub repository import capability across all three
  presentation layers (CLI, TUI wizard, Web UI) while keeping business logic
  in the application layer per Clean Architecture.

  The architecture follows the established pattern:
  - **Domain layer**: Repository entity gains optional `remoteUrl` field (TypeSpec).
    Error classes for GitHub-specific failure modes defined in the service port file
    following the `SessionNotFoundError` pattern (extends Error, Object.setPrototypeOf).
  - **Application layer**: New `IGitHubRepositoryService` output port interface
    defines the contract for GitHub operations. Two new use cases
    (`ImportGitHubRepositoryUseCase`, `ListGitHubRepositoriesUseCase`) orchestrate
    the import flow using existing `AddRepositoryUseCase` composition.
  - **Infrastructure layer**: `GitHubRepositoryService` implements the port using
    `gh` CLI subprocesses (execFile for auth/list, spawn for clone with progress
    streaming). SQLite migration adds `remote_url` column. Repository mapper and
    implementation extended with `findByRemoteUrl()` and `update()`.
  - **Presentation layer**: CLI command (`shep repo add --url --dest`), TUI
    interactive wizard, Web UI popover + dialog with URL/Browse tabs.

  The dependency flow mirrors existing patterns:
  ```
  Presentation (CLI/Web/TUI)
    -> ImportGitHubRepositoryUseCase / ListGitHubRepositoriesUseCase
      -> IGitHubRepositoryService (port) -> GitHubRepositoryService (infra)
      -> IRepositoryRepository (port) -> SQLiteRepositoryRepository (infra)
      -> AddRepositoryUseCase (existing, composed via DI)
  ```

  ## Key Design Decisions

  ### 1. Domain Model Extension (Research Decision #1)
  Add optional `remoteUrl?: string` to Repository TypeSpec model. One-line
  TypeSpec change, one migration (ALTER TABLE ADD COLUMN remote_url TEXT),
  mapper extension. Enables duplicate detection by URL and future "open on
  GitHub" features. The field is optional so existing local-only repos are
  unaffected.

  ### 2. Subprocess Strategy (Research Decision #2)
  ExecFunction (execFile) for `gh auth status` and `gh repo list --json` —
  fast, bounded output, returns JSON. Spawn for `gh repo clone` — streams
  progress to stderr in real-time, no maxBuffer risk. The DI container
  already provides ExecFunction and imports spawn for AgentExecutorFactory.

  ### 3. Single Service Port (Research Decision #3)
  One `IGitHubRepositoryService` interface with four methods rather than
  multiple fine-grained interfaces. Mirrors `IGitPrService` pattern — one
  interface per integration boundary. Error classes (GitHubAuthError,
  GitHubCloneError, GitHubUrlParseError, GitHubRepoListError) defined in
  the port file following `SessionNotFoundError` pattern.

  ### 4. Use Case Composition (Research Decision #4)
  ImportGitHubRepositoryUseCase composes with AddRepositoryUseCase via DI
  injection. The import use case handles GitHub-specific logic (URL
  validation, auth, clone, duplicate detection) then delegates local
  registration to the existing, unchanged AddRepositoryUseCase. This
  preserves SRP and avoids modifying tested code.

  ### 5. Repository Update Method (Research Decision #10)
  Add `update(id, partial)` to IRepositoryRepository. Needed to set
  remoteUrl after AddRepositoryUseCase returns the entity (since
  AddRepositoryUseCase should not know about remoteUrl). The SQLite
  implementation builds a dynamic SET clause from provided fields.

  ### 6. Clone Destination Configuration (Research Decision #6)
  Configurable `defaultCloneDirectory` added to EnvironmentConfig TypeSpec
  model. Defaults to `~/repos` in settings factory. CLI `--dest` flag
  overrides. Web UI shows default with option to change. Settings are
  stored in the existing JSON blob column — no additional schema migration
  needed for this field, just a defaults factory update.

  ### 7. Web UI Pattern (Research Decision #7)
  Add-repository-button refactored from simple Button to PopoverTrigger
  with two choices: "Local folder" (existing pickFolder flow) and
  "From GitHub" (opens dialog). Dialog uses shadcn/ui Tabs for URL input
  and repo browser. Follows delete-feature-dialog and repository-combobox
  patterns already in the codebase.

  ### 8. URL Normalization for Duplicate Detection (Research Decision on normalization)
  Before storing remoteUrl, normalize: strip trailing `.git`, lowercase.
  Consistent with git-pr.service.ts URL handling. Ensures
  `https://github.com/Owner/Repo.git` and `https://github.com/owner/repo`
  match as duplicates.

  ## Implementation Strategy

  The six phases follow Clean Architecture's dependency rule — inner layers
  first, outer layers last:

  **Phase 1 (Domain & Persistence)** comes first because every subsequent
  layer depends on the Repository entity having remoteUrl, the mapper
  knowing how to serialize it, and the repository interface exposing
  findByRemoteUrl/update.

  **Phase 2 (Application Layer)** builds the port interface and use cases
  that depend only on domain types and port interfaces — no infrastructure
  yet. Fully testable with mocks.

  **Phase 3 (Infrastructure)** implements the gh CLI service and wires
  everything into the DI container. After this phase, the feature is
  functionally complete at the service level.

  **Phase 4 (CLI)** and **Phase 5 (Web UI)** are presentation layers that
  consume the use cases. They could theoretically be parallel but are
  sequenced for focus — CLI first (simpler, validates the use case API),
  then Web UI (more complex, needs server actions and multiple components).

  **Phase 6 (Integration)** exercises the full stack with integration tests
  and covers edge cases missed by unit tests.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | gh CLI not installed or not authenticated | Check `gh auth status` before any operation; throw GitHubAuthError with clear "run `gh auth login`" message |
  | Clone fails (network, permissions, disk space) | GitHubCloneError wraps subprocess error with stderr output; cleanup partial clone directory on failure |
  | Large repos take minutes to clone | Spawn with progress streaming so user sees activity; no artificial timeout (per NFR-1) |
  | TypeSpec model change breaks generated output | Run `pnpm tsp:compile` immediately after model change; verify output.ts diffs are as expected |
  | Migration fails on existing databases | Migration uses idempotent ALTER TABLE ADD COLUMN with pragma check (existing pattern from migration 039) |
  | Path traversal via --dest flag | Validate with path.resolve(); reject paths containing `..`; ensure resolved path is absolute |
  | URL injection via crafted GitHub URLs | Strict regex validation; only accept github.com domain; pass args as array to execFile/spawn (no shell interpolation) |
  | Web UI popover breaks existing folder picker flow | "Local folder" option calls existing pickFolder() unchanged; regression test with Storybook |
  | Settings JSON blob lacks defaultCloneDirectory for existing users | Settings factory provides fallback default; existing settings without the field get the default on read |
