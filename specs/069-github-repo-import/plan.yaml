      importGitHubRepository and listGitHubRepositories. Wire to canvas
      with optimistic add pattern. Create Storybook stories for all new
      components.
    parallel: false

  - id: phase-6
    name: 'Integration Testing & Polish'
    description: >
      Write integration tests that exercise the full import flow (mock gh
