  ### Dependency Flow

  ```
  CLI Command / Web Action
    → ImportGitHubRepositoryUseCase
      → IGitHubRepositoryService (port)
        → GitHubRepositoryService (infra, uses gh CLI)
      → IRepositoryRepository (port)
        → SQLiteRepositoryRepository (infra)
      → AddRepositoryUseCase
        → IRepositoryRepository
  ```

  ### DI Registration (container.ts additions)

  ```
  1. Register IGitHubRepositoryService with factory (needs ExecFunction)
  2. Register ImportGitHubRepositoryUseCase as singleton
  3. Register ListGitHubRepositoriesUseCase as singleton
  4. Register string token aliases for web route resolution
  ```

  ### Key Integration Points

  - **AddRepositoryUseCase**: Existing, unchanged. ImportGitHubRepositoryUseCase calls it after clone.
  - **IRepositoryRepository**: Extended with findByRemoteUrl() and update(). SQLite impl updated.
  - **Repository mapper**: Extended with remote_url ↔ remoteUrl mapping.
  - **Settings factory**: Updated with defaultCloneDirectory default value.
  - **CLI repo command group**: New add subcommand registered in index.ts.
  - **Web add-repository-button**: Refactored from simple button to popover trigger.
  - **Web control center**: Existing onRepositoryAdd callback wired to new import flow.
