content: |
  ## Summary

  This task breakdown covers 22 tasks across 6 phases, implementing GitHub
  repository import end-to-end following Clean Architecture.

  The work begins with domain and persistence foundation — extending the
  Repository TypeSpec model with `remoteUrl`, creating the SQLite migration,
  and adding `findByRemoteUrl()`/`update()` to the repository interface.
  These are prerequisites for everything else.

  Next, the application layer is built: the IGitHubRepositoryService port
  interface defines the contract, and two use cases (Import + List)
  orchestrate the business logic using only port interfaces — fully testable
  with mocks before any infrastructure exists.

  The infrastructure phase implements the gh CLI adapter behind the port,
  using execFile for auth/list and spawn for clone with progress streaming.
  DI container wiring connects all layers.

  Presentation layers come next: the CLI command with interactive wizard
  (Phase 4), then the Web UI with popover method picker, tabbed dialog,
  server actions, and Storybook stories (Phase 5).

  Finally, integration tests validate the full pipeline with real SQLite
  and mocked subprocesses, plus edge case coverage and validation suite
  verification.

  Each task includes explicit TDD cycles ensuring tests are written before
  implementation. Dependencies are strictly ordered so no task depends on
  a later task.
