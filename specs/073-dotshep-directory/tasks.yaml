content: |
  ## Summary

  The implementation is broken into 21 tasks across 6 phases, totaling approximately 8.5 hours.

  **Phase 1 (Foundation)** establishes the data model: a shared `computeRepoHash()` utility
  eliminates hash algorithm duplication, the TypeSpec Repository model gains `specStorageMode`,
  migration 044 adds the column to SQLite, the mapper and repository implementation are updated.
  These 5 tasks are the foundation everything else builds on.

  **Phase 2 (Core)** is the heart of the feature with 3 tasks: update the spec-initializer
  interface with the options parameter, implement dual-mode path construction (in-repo
  `.shep/specs/` vs shep-managed `~/.shep/repos/<hash>/specs/`), and add multi-directory
  NNN scanning to prevent number collisions during the transition period.

  **Phase 3 (Wiring)** connects everything with 2 tasks: wire the CreateFeatureUseCase to
  read `specStorageMode` from the repository entity and pass it to the initializer, and
  update evidence-prompts to force `commitEvidence=false` when the spec directory is outside
  the worktree (shep-managed mode).

  **Phase 4 (Tests)** handles all test updates with 5 tasks: relocate the test fixtures from
  `specs/032-example-specs/` to `tests/fixtures/spec-yaml-samples/`, update the 3 YAML
  parser tests, update spec-initializer tests for both modes, update dev-executor and
  integration tests, and update the e2e test.

  **Phase 5 (Docs)** updates documentation and config with 4 tasks: the init-feature.sh
  shell script, all 9 SKILL.md files plus 2 validation docs, CLAUDE.md and
  spec-driven-workflow.md, and .prettierignore.

  **Phase 6 (Validation)** is the final gate with 2 tasks: run the full test suite and fix
  any remaining failures, then run validate and build to confirm everything compiles.

  The dependency graph ensures no task runs before its prerequisites are complete. Phase 1
  tasks 1-3 can run in parallel (no interdependencies). Task 4 depends on tasks 2-3.
  Task 5 depends on task 4. Phase 2 depends on task 1. Phase 3 depends on phases 1-2.
  Phase 4 test relocations can start immediately but test updates depend on production code.
  Phase 5 has no code dependencies. Phase 6 depends on everything.
