content: |
  ## Technology Decisions

  ### 1. Spec-Initializer Interface Design for Storage Mode

  **Chosen:** Add an optional options object parameter to `ISpecInitializerService.initialize()`

  **Rejected:**
  - Read `specStorageMode` from `getSettings()` inside the service — violates Clean Architecture; storage mode is per-repo, not global
  - Create a separate `ShepManagedSpecInitializerService` — 95% code duplication for one path difference

  **Rationale:** The spec-initializer is a pure stateless service. The `CreateFeatureUseCase` resolves the storage mode from the repository record and passes it via an options object. This preserves the existing architecture pattern where use cases orchestrate and services are tools.

  **Interface change:**
  ```typescript
  interface SpecInitializerOptions {
    storageMode?: 'in-repo' | 'shep-managed';  // default: 'in-repo'
    repositoryPath?: string;  // required when storageMode is 'shep-managed'
  }

  initialize(
    basePath: string,
    slug: string,
    featureNumber: number,
    description: string,
    mode?: 'fast',
    options?: SpecInitializerOptions
  ): Promise<SpecInitializerResult>;
  ```

  ### 2. Per-Repo specStorageMode Storage Mechanism

  **Chosen:** Add `spec_storage_mode TEXT DEFAULT 'in-repo'` column to the `repositories` table

  **Rejected:**
  - Global Settings singleton — per-installation, not per-repo; contradicts singleton design
  - `.shep/config.json` in worktree — introduces second config source; complicates read path
  - New `repo_settings` table — over-engineering for one field

  **Rationale:** Follows the exact precedent set by migration `040-add-repository-remote-url` which added `remote_url` to the same table. The Repository TypeSpec model gets a new optional `specStorageMode` field, the mapper handles the column, and existing queries automatically include it. No new tables, services, or interfaces needed.

  **Migration:**
  ```sql
  ALTER TABLE repositories ADD COLUMN spec_storage_mode TEXT DEFAULT 'in-repo';
  ```

  ### 3. RepoHash Computation Reuse

  **Chosen:** Extract a shared `computeRepoHash(repoPath)` utility function

  **Rejected:**
  - Duplicate hash logic in spec-initializer — creates a 3rd copy of the same algorithm
  - Pass repoHash from use case — couples use case to hash implementation details

  **Rationale:** The SHA-256 hash computation (normalize backslashes, hash, take first 16 hex chars) is already duplicated between `WorktreeService.getWorktreePath()` (line 208) and `compute-worktree-path.ts` (line 24). Extracting `computeRepoHash()` into `shep-directory.service.ts` (or a dedicated `repo-hash.ts`) creates a single source of truth. All three consumers import the same function.

  ### 4. Dual-Directory NNN Scanning

  **Chosen:** Scan up to 3 directories and take max NNN across all

  **Rejected:**
  - Scan only `.shep/specs/` — collision risk with existing `specs/` directories
  - Query database — adds DB dependency to a pure filesystem service

  **Rationale:** The `resolveNextNumber()` method scans:
  1. `join(basePath, 'specs')` — legacy location (backward compat)
  2. `join(basePath, '.shep', 'specs')` — new in-repo location
  3. `join(getShepHomeDir(), 'repos', repoHash, 'specs')` — shep-managed location (only when in shep-managed mode)

  Each scan gracefully handles non-existent directories via try/catch. The max NNN across all locations prevents collisions during the transition period.

  ### 5. Evidence-Prompts Handling for Shep-Managed Mode

  **Chosen:** Force `commitEvidence=false` when storage mode is shep-managed

  **Rejected:**
  - Handle relative paths outside worktree — `relative()` produces paths escaping the worktree; git operations fail
  - Copy evidence into worktree before commit — over-engineered; contradicts shep-managed philosophy

  **Rationale:** In `evidence-prompts.ts` (line 61), `relative(cwd, state.specDir)` assumes specDir is within the worktree. When specDir is in `~/.shep/` (shep-managed), the relative path escapes the worktree, making git operations invalid. Forcing `commitEvidence=false` is safe because evidence is still captured to `~/.shep/repos/<hash>/evidence/` and accessible via the UI. Users who chose shep-managed mode want no repo artifacts — committing evidence would be contradictory.

  ### 6. Interface Change Strategy

  **Chosen:** Add optional options object as last parameter to `initialize()`

  **Rejected:**
  - Add individual positional parameters — already 5 params; hurts readability
  - Create overloaded `initializeManaged()` method — splits shared logic into two methods

  **Rationale:** An optional trailing options object is self-documenting, extensible, and backward-compatible. Existing callers pass no options and get in-repo behavior (the default). The pattern matches `EvidencePromptOptions` used elsewhere in the codebase.

  ### 7. Test Fixture Relocation

  **Chosen:** Move `specs/032-example-specs/` to `tests/fixtures/spec-yaml-samples/`

  **Rejected:**
  - Move to `.shep/specs/` — .shep/ is for runtime artifacts, not committed test fixtures
  - Keep in `specs/` — undermines the clean-root goal; confuses NNN scanner

  **Rationale:** Three test files reference the fixture: `spec-yaml-parser.test.ts`, `spec-yaml-artifact-parsing.test.ts`, `spec-yaml-backward-compatibility.test.ts`. Moving to `tests/fixtures/` separates test data from production output. Path update is a simple string constant change.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | `node:path` (join, relative, dirname) | Path construction | Use (existing) | Already used throughout; no new dependency |
  | `node:fs/promises` (mkdir, readdir, writeFile) | Directory and file operations | Use (existing) | Already used in spec-initializer; recursive mkdir handles .shep/ creation |
  | `node:crypto` (createHash) | SHA-256 repo hash | Use (existing) | Already used in worktree.service.ts and compute-worktree-path.ts |
  | `better-sqlite3` | Database migration | Use (existing) | Already used for all SQLite operations; new migration follows existing pattern |
  | `tsyringe` | Dependency injection | Use (existing) | Already used for spec-initializer registration in container.ts |
  | TypeSpec compiler | Domain model update | Use (existing) | Repository model update requires `pnpm tsp:compile` to regenerate types |
  | Vitest | Testing | Use (existing) | All test files already use Vitest |

  No new libraries are required. This feature exclusively uses existing dependencies.

  ## Security Considerations

  ### Path Traversal Prevention
  - All path construction uses `path.join()` which resolves `..` segments safely
  - The spec-initializer receives `basePath` from the use case (validated upstream)
  - `computeRepoHash()` normalizes the repo path before hashing — no injection risk
  - `mkdir({ recursive: true })` only creates directories under the computed parent

  ### Shep-Managed Mode File Permissions
  - The `~/.shep/` directory is created with `0o700` (owner-only) by `ensureShepDirectory()`
  - Specs stored under `~/.shep/repos/<hash>/specs/` inherit these permissions
  - No change needed — existing permission model covers the new subdirectory

  ### Database Migration Safety
  - `ALTER TABLE ADD COLUMN` with `DEFAULT 'in-repo'` is a non-destructive, additive change
  - Existing rows get the default value automatically
  - No data migration or rewrite needed

  ## Performance Implications

  ### NNN Scanning Overhead
  - Current: 1 readdir call (specs/)
  - After: 2-3 readdir calls (specs/, .shep/specs/, optionally ~/.shep/repos/<hash>/specs/)
  - Each call that hits a non-existent directory returns immediately via ENOENT
  - Total overhead: ~0-2ms additional (negligible for a directory creation operation)

  ### Path Construction
  - One additional `computeRepoHash()` call in shep-managed mode (~0.1ms for SHA-256)
  - All other operations (mkdir, writeFile) are identical in both modes

  ### No Caching Needed
  - Spec initialization is a one-time operation per feature creation
  - The repoHash could be cached but the computation is so fast it is unnecessary

  ## Architecture Notes

  ### Clean Architecture Compliance

  The changes respect the existing layer boundaries:

  - **Domain Layer**: Repository TypeSpec model gets a new optional `specStorageMode` field. No business logic changes.
  - **Application Layer**: `CreateFeatureUseCase` reads `repository.specStorageMode` and passes it to the spec-initializer via options. The interface (`ISpecInitializerService`) is updated with the optional parameter.
  - **Infrastructure Layer**: `SpecInitializerService` implements the path branching logic. Database migration adds the column. Mapper handles the new field.
  - **Presentation Layer**: No changes. CLI passes the same inputs; the use case handles the rest.

  ### Dependency Direction
  ```
  Presentation → Application → Domain
       ↓              ↓
  Infrastructure (implements Application ports)
  ```
  - The spec-initializer interface is defined in `application/ports/output/services/`
  - The implementation is in `infrastructure/services/spec/`
  - The use case orchestrates by calling the port interface
  - No layer violations introduced

  ### Key Files Changed (Production Code)

  | File | Change | Layer |
  | ---- | ------ | ----- |
  | `tsp/domain/entities/repository.tsp` | Add `specStorageMode?: string` | Domain |
  | `packages/core/src/domain/generated/output.ts` | Regenerated (auto) | Domain |
  | `packages/core/src/application/ports/output/services/spec-initializer.interface.ts` | Add options param | Application |
  | `packages/core/src/application/use-cases/features/create/create-feature.use-case.ts` | Pass options to initializer | Application |
  | `packages/core/src/infrastructure/services/spec/spec-initializer.service.ts` | Path branching + multi-dir scan | Infrastructure |
  | `packages/core/src/infrastructure/services/filesystem/shep-directory.service.ts` | Add `computeRepoHash()` or new file | Infrastructure |
  | `packages/core/src/infrastructure/persistence/sqlite/mappers/repository.mapper.ts` | Map spec_storage_mode column | Infrastructure |
  | `packages/core/src/infrastructure/repositories/sqlite-repository.repository.ts` | Include new column in queries | Infrastructure |
  | Migration file (044-add-spec-storage-mode.ts) | ALTER TABLE repositories ADD COLUMN | Infrastructure |
  | `.claude/skills/shep-kit-new-feature/scripts/init-feature.sh` | Change specs/ to .shep/specs/ | Presentation |
  | `evidence-prompts.ts` | Force commitEvidence=false for shep-managed | Infrastructure |

  ### Data Flow for Feature Creation

  ```
  CLI/Web → CreateFeatureUseCase
    1. Resolve repository entity from DB (includes specStorageMode)
    2. Create worktree via WorktreeService
    3. Call specInitializer.initialize(worktreePath, slug, num, desc, mode, {
         storageMode: repository.specStorageMode ?? 'in-repo',
         repositoryPath: repository.path
       })
    4. SpecInitializerService:
       - if storageMode === 'in-repo':  specDir = join(basePath, '.shep', 'specs', specDirName)
       - if storageMode === 'shep-managed': specDir = join(getShepHomeDir(), 'repos', computeRepoHash(repositoryPath), 'specs', specDirName)
    5. mkdir(specDir, { recursive: true })
    6. Write template files
    7. Return { specDir, featureNumber }
    8. Feature.specPath = specDir (absolute path stored in DB)
  ```

  ### Backward Compatibility

  - Existing features with `specPath` pointing to `specs/NNN-feature/` continue to work
  - The database stores absolute paths — no path rewriting needed
  - All downstream consumers (agent nodes, UI use cases, evidence) read from `feature.specPath`
  - The `readSpecFile()` helper works with any absolute path
  - No database migration for existing feature records

  ---

  _Research phase complete — proceed with /shep-kit:plan_
