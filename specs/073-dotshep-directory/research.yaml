decisions:
  - title: "Spec-initializer interface design for storage mode"
    chosen: "Add a storageMode option object parameter to ISpecInitializerService.initialize()"
    rejected:
      - "Read specStorageMode from getSettings() inside the service — rejected because the global settings singleton is a per-installation setting, not per-repo. The storage mode is per-repo, so the caller (CreateFeatureUseCase) must resolve it from the repository record and pass it in. Also violates Clean Architecture by having infrastructure read settings directly instead of receiving them via the use case."
      - "Create a separate ShepManagedSpecInitializerService — rejected because both modes share 95% of logic (template rendering, NNN scanning, file writing). Only the path computation differs. A strategy/mode parameter avoids class duplication and keeps the single-service pattern."
    rationale: >
      The spec-initializer currently accepts basePath and constructs join(basePath, 'specs', specDirName).
      Adding a storageMode parameter (plus repositoryPath for hash computation in shep-managed mode)
      lets the initialize() method branch on path construction while keeping all other logic unchanged.
      The CreateFeatureUseCase already has access to the repository entity and can resolve the
      specStorageMode setting before calling initialize(). This follows the existing pattern where
      the use case orchestrates and the service is a stateless tool.

  - title: "Per-repo specStorageMode storage mechanism"
    chosen: "Add a spec_storage_mode TEXT column to the existing repositories table via SQLite migration"
    rejected:
      - "Add to the global Settings singleton — rejected because Settings is per-installation (one row, singleton constraint). specStorageMode is per-repository. Adding it to Settings would require a map/object keyed by repo path, which contradicts the flat singleton design and adds mapper complexity."
      - "Store in a .shep/config.json file inside each worktree — rejected because this introduces a second configuration source (files vs database), complicating the read path. The spec-initializer runs in the context of CreateFeatureUseCase which already has the repository entity from the DB. A DB column is the natural place and follows the existing pattern (repository.remoteUrl was added the same way via migration 040)."
      - "Create a new repo_settings table — rejected because it adds an entire new table, repository interface, mapper, and use case for a single field. Over-engineering for the current scope. A column on repositories is simpler and follows the remoteUrl precedent."
    rationale: >
      The repositories table already stores per-repo metadata (name, path, remoteUrl). Adding a
      spec_storage_mode column with a DEFAULT of 'in-repo' is the simplest approach. It follows
      the exact pattern used by migration 040-add-repository-remote-url which added remoteUrl to
      the same table. The Repository TypeSpec model gets a new optional field, the mapper gets
      the column mapping, and the existing findByPath/findById queries automatically include it.
      No new tables, no new services, no new repository interfaces needed.

  - title: "RepoHash computation reuse strategy"
    chosen: "Extract a shared computeRepoHash(repoPath) utility function from the existing worktree code"
    rejected:
      - "Duplicate the hash logic in spec-initializer.service.ts — rejected because the hash algorithm (SHA-256, normalize backslashes, first 16 hex chars) is already duplicated between WorktreeService.getWorktreePath() and compute-worktree-path.ts. Adding a third copy increases maintenance risk. DRY principle demands extraction."
      - "Pass repoHash as a parameter from the use case — rejected because the use case does not currently compute the hash (the worktree service does it internally). While this would work, it couples the use case to hash implementation details. A shared utility is cleaner."
    rationale: >
      The same SHA-256 hash algorithm appears in worktree.service.ts:208 and compute-worktree-path.ts:24.
      Both normalize backslashes and take the first 16 hex chars. Extracting computeRepoHash(repoPath)
      into a shared utility (e.g., packages/core/src/infrastructure/services/filesystem/repo-hash.ts
      or adding it to shep-directory.service.ts) eliminates duplication. The spec-initializer imports
      this utility for shep-managed path construction. WorktreeService and compute-worktree-path can
      also be updated to use it, reducing the codebase from 3 copies to 1.

  - title: "Dual-directory NNN scanning implementation"
    chosen: "Scan up to 3 directories (specs/, .shep/specs/, and ~/.shep/repos/<hash>/specs/) and take max across all"
    rejected:
      - "Scan only .shep/specs/ — rejected because during the transition period, existing features may have specs/ directories in the worktree. This could cause number collisions (e.g., specs/073-feature and .shep/specs/073-other-feature)."
      - "Query the database for existing feature numbers — rejected because the spec-initializer is currently a pure filesystem service with no DB dependency. Adding a DB dependency breaks its clean design and makes it harder to test. The additional readdir calls are negligible in cost."
    rationale: >
      The resolveNextNumber() method currently scans join(basePath, 'specs'). It must also scan
      join(basePath, '.shep', 'specs') for in-repo mode. For shep-managed mode, it additionally
      scans join(getShepHomeDir(), 'repos', repoHash, 'specs'). Each scan is a try/catch readdir
      that gracefully returns 0 entries if the directory doesn't exist. The max NNN across all
      scanned directories is used. This prevents collisions during the transition period at
      negligible performance cost (~1-3 readdir calls that may return ENOENT).

  - title: "Evidence-prompts handling for shep-managed mode"
    chosen: "Force commitEvidence=false when specDir is outside the worktree (shep-managed mode)"
    rejected:
      - "Adjust relative path computation to handle paths outside the worktree — rejected because relative(cwd, specDir) produces paths like '../../../.shep/repos/<hash>/specs/...' which break git add instructions and violate the worktree boundary. The resulting prompts would instruct the agent to run git operations outside the worktree, which is invalid."
      - "Copy evidence from shep-managed location into the worktree for committing — rejected because it adds complexity (two-step copy + commit), can fail if the worktree is on a different filesystem, and the spec requirement (FR-10) states that shep-managed mode should be transparent with no downstream changes needed."
    rationale: >
      When specDir is outside the worktree (shep-managed mode), the evidence-prompts.ts relative()
      call (line 61) produces a path that escapes the worktree. The commitEvidence option instructs
      the agent to git-add files at this relative path, which fails because git cannot track files
      outside the worktree. The simplest fix is to force commitEvidence=false when the spec storage
      mode is shep-managed. Evidence is still captured to the shep home evidence directory
      (~/.shep/repos/<hash>/evidence/<featureId>/) and remains available via the UI. This is
      consistent with the spec's intent: shep-managed mode means no spec artifacts in the repo.

  - title: "ISpecInitializerService interface change strategy"
    chosen: "Add an optional options object parameter to initialize() with storageMode and repositoryPath"
    rejected:
      - "Add individual parameters (storageMode, repositoryPath) — rejected because adding 2+ positional params to an already 5-param method hurts readability. An options object is extensible and self-documenting."
      - "Create a new overloaded method initializeManaged() — rejected because it splits the flow into two methods that share most logic. Callers would need conditional branching to pick the right method."
    rationale: >
      The current interface is initialize(basePath, slug, featureNumber, description, mode?).
      Adding an optional options object as the last parameter preserves backward compatibility
      (existing callers pass nothing and get in-repo behavior). The options object contains
      storageMode ('in-repo' | 'shep-managed') and repositoryPath (needed for hash computation
      in shep-managed mode). This is the same extensibility pattern used throughout the codebase
      (e.g., EvidencePromptOptions). The interface JSDoc is updated to document the new parameter.

  - title: "Test fixture relocation strategy"
    chosen: "Move specs/032-example-specs/ to tests/fixtures/spec-yaml-samples/ and update all 3 referencing test files"
    rejected:
      - "Move to .shep/specs/032-example-specs/ — rejected because .shep/ is for runtime-generated artifacts, not committed test fixtures. Test fixtures are version-controlled source code that should live under tests/."
      - "Keep in specs/ — rejected because leaving a specs/ directory in the project root undermines the goal of this feature (clean root with .shep/ convention). It would also confuse the NNN scanner."
    rationale: >
      Three test files reference specs/032-example-specs: spec-yaml-parser.test.ts,
      spec-yaml-artifact-parsing.test.ts, and spec-yaml-backward-compatibility.test.ts. Moving
      the fixture to tests/fixtures/spec-yaml-samples/ follows the convention of separating test
      data from production output. The path update is a simple constant change in each file.
      No test logic changes needed — only the directory path string.

