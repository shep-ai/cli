summary: >
  Migrate spec file storage from the project root specs/ directory to .shep/specs/ within
  each worktree, following established dotfile conventions (.git/, .vscode/, .claude/).
  Additionally, introduce a configurable spec storage mode — "in-repo" (default, specs
  committed to git under .shep/specs/) vs "shep-managed" (specs stored in
  ~/.shep/repos/<hash>/specs/, never committed to the repo). The shep-managed mode
  supports repos or features where spec artifacts should not pollute the repository
  history but must still be available to the UI and agent context. The storage mode
  is configurable per-repo via settings, with a per-feature override possible in the
  future. Existing features with absolute specs/ paths in the database remain
  functional with no migration required.
