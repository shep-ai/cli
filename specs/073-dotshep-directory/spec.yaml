content: |
  ## Problem Statement

  Currently, spec files are written to a top-level `specs/` directory in each worktree
  (e.g., `specs/073-dotshep-directory/`). This clutters the project root and doesn't follow
  the dotfile convention used by other developer tools (`.git/`, `.vscode/`, `.claude/`).

  The issue requests moving all shep-generated files into a `.shep/` directory within the
  project, starting with specs at `.shep/specs/`. This also positions the project for future
  extensibility — other shep-related files can be added under `.shep/` without further
  polluting the project root.

  Additionally, for some repositories or features, users do **not** want spec files
  committed to the repo at all — but they still want specs stored and available for both
  the UI and agent context. This requires a configurable **spec storage mode**:

  - **In-repo** (default): Specs live at `<worktree>/.shep/specs/NNN-feature/`, committed
    to git and visible in PRs. This preserves the current workflow.
  - **Shep-managed**: Specs live at `~/.shep/repos/<hash>/specs/NNN-feature/`, stored
    alongside the per-repo database. They are never committed to git but remain fully
    accessible to the UI (via `specPath` in the database) and agent context (via
    `readSpecFile()` which reads from the absolute `specPath`).

  Note: The per-worktree `.shep/` directory (inside the repo checkout) is distinct from
  the global `~/.shep/` home directory that stores databases, daemon state, and attachments.

  ## Success Criteria

  - [ ] New features create spec directories at `.shep/specs/NNN-feature/` (in-repo mode) or `~/.shep/repos/<hash>/specs/NNN-feature/` (shep-managed mode) instead of `specs/NNN-feature/`
  - [ ] `.shep/` parent directory is created automatically via recursive mkdir when first spec is initialized
  - [ ] Existing features with absolute `specs/` paths in the database continue to function without modification
  - [ ] Spec number scanning checks both `specs/` and `.shep/specs/` to prevent NNN collisions during transition
  - [ ] A per-repo `specStorageMode` setting controls where new specs are written ("in-repo" or "shep-managed")
  - [ ] The default spec storage mode is "in-repo" (preserves current behavior)
  - [ ] In shep-managed mode, specs are stored at `~/.shep/repos/<hash>/specs/NNN-feature/`
  - [ ] In shep-managed mode, the UI can read spec content via the stored absolute `specPath` (no code changes needed in use cases)
  - [ ] In shep-managed mode, agent nodes can read spec content via `readSpecFile()` using the stored absolute `specPath` (no code changes needed)
  - [ ] `init-feature.sh` shell script creates specs at `.shep/specs/` path (in-repo mode)
  - [ ] All SKILL.md documentation files reference `.shep/specs/` paths
  - [ ] `CLAUDE.md` updated to reference `.shep/specs/`
  - [ ] `.prettierignore` updated to ignore `.shep/specs/` instead of `specs/`
  - [ ] Test fixture `specs/032-example-specs/` relocated to `tests/fixtures/spec-yaml-samples/`
  - [ ] All unit tests updated to construct `.shep/specs/` paths in temp directories
  - [ ] All integration tests updated to use `.shep/specs/` paths
  - [ ] E2E test updated to verify spec directory at `.shep/specs/` (in-repo mode)
  - [ ] E2E or integration test verifies shep-managed mode stores specs at `~/.shep/repos/<hash>/specs/`
  - [ ] Evidence collection works correctly with both spec storage modes
  - [ ] All unit, integration, and e2e tests pass

  ## Functional Requirements

  - **FR-1: New spec path construction (in-repo mode)** — The `SpecInitializerService.initialize()` method must construct spec directories at `join(basePath, '.shep', 'specs', specDirName)` instead of `join(basePath, 'specs', specDirName)` when the spec storage mode is "in-repo". The `.shep/specs/` parent directories must be created recursively if they do not exist.

  - **FR-2: Shep-managed spec path construction** — When the spec storage mode is "shep-managed", the `SpecInitializerService.initialize()` method must construct spec directories at `join(getShepHomeDir(), 'repos', repoHash, 'specs', specDirName)`. The `repoHash` is derived from the repository path using the same SHA-256 hash (first 16 chars) already used by the worktree service. The parent directories must be created recursively.

  - **FR-3: Dual-directory NNN scanning** — The `SpecInitializerService.resolveNextNumber()` method must scan both `join(basePath, 'specs')` and `join(basePath, '.shep', 'specs')` for existing NNN-prefixed directories. When in shep-managed mode, it must also scan `join(getShepHomeDir(), 'repos', repoHash, 'specs')`. The method returns the next number after the maximum found across all locations. This prevents number collisions during the transition period.

  - **FR-4: Per-repo spec storage mode setting** — A new `specStorageMode` field must be added to the repo-level configuration. Valid values are "in-repo" (default) and "shep-managed". This setting controls where the spec-initializer writes new spec directories. The setting must be readable by the spec-initializer service at initialization time.

  - **FR-5: Backward compatibility** — Existing features with `specPath` values pointing to `specs/` must continue to function. No database migration, no path rewriting. All downstream consumers (agent nodes, evidence, merge flow, UI use cases) already use the stored absolute `specPath` and will work with any valid absolute path regardless of storage mode.

  - **FR-6: Shell script update** — The `init-feature.sh` script must construct spec directories at `.shep/specs/NNN-feature-name/` instead of `specs/NNN-feature-name/`. The shell script only needs to support in-repo mode (shep-managed mode is handled programmatically by the spec-initializer service). The `mkdir -p` command ensures parent directory creation.

  - **FR-7: Test fixture relocation** — The test fixture directory `specs/032-example-specs/` must be moved to `tests/fixtures/spec-yaml-samples/`. All test files referencing this fixture path must be updated: `spec-yaml-parser.test.ts`, `spec-yaml-artifact-parsing.test.ts`, and `spec-yaml-backward-compatibility.test.ts`.

  - **FR-8: Documentation update** — All documentation referencing `specs/NNN-feature-name/` paths must be updated to `.shep/specs/NNN-feature-name/`. Documentation must also mention the shep-managed mode as an alternative. This includes `CLAUDE.md`, all `SKILL.md` files in `.claude/skills/shep-kit-*/`, and `docs/development/spec-driven-workflow.md`.

  - **FR-9: Config file update** — `.prettierignore` must replace the `specs/` entry with `.shep/specs/` (or `.shep/` if broader ignoring is appropriate). No changes needed to `.gitignore` since spec files remain committed to git in in-repo mode. Users who choose shep-managed mode may add `.shep/` to their own `.gitignore`.

  - **FR-10: Transparent access for UI and agents** — Both spec storage modes must be transparent to downstream consumers. The `specPath` stored in the feature database record is an absolute path. Use cases like `GetFeatureArtifactUseCase`, `GetResearchArtifactUseCase`, and `GetPlanArtifactUseCase` read from `feature.specPath` directly. Agent nodes use `readSpecFile(state.specDir, filename)`. Since all these consumers operate on absolute paths, no changes are needed — the specPath simply points to a different location depending on the storage mode.

  ## Non-Functional Requirements

  - **NFR-1: Zero downtime** — The change must not break any in-progress features. Since existing features use absolute paths stored in the database, they are unaffected by the path constant change or the new storage mode setting.

  - **NFR-2: Cross-platform path handling** — All path construction must use `path.join()` (not string concatenation) to ensure correct separators on Windows. Stored paths must continue to use forward-slash normalization per existing codebase conventions.

  - **NFR-3: Idempotent directory creation** — Creating spec directories must be safe to call multiple times without error, using `{ recursive: true }` on `mkdir`, regardless of storage mode.

  - **NFR-4: No performance regression** — The additional `readdir` calls for multi-directory scanning (FR-3) must gracefully handle non-existent directories via try/catch, adding negligible overhead.

  - **NFR-5: Test coverage** — All modified code paths must have corresponding test updates. The spec-initializer unit tests must verify both storage modes, the new `.shep/specs/` path construction, and the multi-directory scanning behavior.

  - **NFR-6: Clean project root** — After this change, no `specs/` directory should be created in worktree roots for new features. In in-repo mode, the only top-level shep artifact directory should be `.shep/`. In shep-managed mode, no spec artifacts appear in the worktree at all.

  - **NFR-7: Sensible defaults** — The default storage mode must be "in-repo" to preserve the current behavior. Users must explicitly opt in to shep-managed mode. This follows the principle of least surprise.

  - **NFR-8: Data availability** — In shep-managed mode, specs must remain available to both the web UI (which reads from disk via use cases) and agent context (which reads via `readSpecFile()`). Since both paths use the absolute `specPath` from the database, availability is guaranteed as long as the `~/.shep/` directory exists.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should existing specs/ directories be migrated? | No migration | Absolute paths in DB mean old features work as-is. Zero risk, zero complexity. |
  | 2 | Should NNN scanning check both directories? | Scan both specs/ and .shep/specs/ | Prevents number collisions during transition with minimal cost (one extra readdir). |
  | 3 | Should test fixtures move to .shep/specs/? | Move to tests/fixtures/ | Test fixtures are committed source code, not runtime artifacts. Keeps project root clean. |
  | 4 | Should .shep/ be gitignored? | No (by default) | In-repo mode needs specs committed. Users on shep-managed mode can add .shep/ to gitignore themselves. |
  | 5 | How should .shep/ directory be created? | Implicit via mkdir -p | Spec initializer already uses recursive mkdir. No separate init step needed. |
  | 6 | What should the default spec storage mode be? | In-repo | Preserves current behavior. Specs visible in PRs. Least surprise for existing users. |
  | 7 | At what level should storage mode be configurable? | Per-repo setting | Covers the stated use case ("some repos"). Per-feature override can be added later. |
  | 8 | Where should shep-managed specs be stored? | ~/.shep/repos/<hash>/specs/ | Co-locates with existing per-repo data directory. Absolute specPath means zero downstream changes. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/spec/spec-initializer.service.ts` | High | Primary path construction — change to support both in-repo (.shep/specs/) and shep-managed (~/.shep/repos/<hash>/specs/) modes. Add dual-directory scanning. Accept storage mode parameter. |
  | `packages/core/src/infrastructure/services/filesystem/shep-directory.service.ts` | Medium | May need a new helper to compute per-repo specs path: `getRepoSpecsDir(repoHash)` returning `~/.shep/repos/<hash>/specs/`. |
  | `.claude/skills/shep-kit-new-feature/scripts/init-feature.sh` | High | Shell script hardcodes `SPEC_DIR="specs/${NNN}-${FEATURE_NAME}"` — must update to `.shep/specs/` |
  | `.claude/skills/shep-kit-*/SKILL.md` | Medium | 8+ skill docs reference `specs/NNN-feature-name/` paths — all need updating |
  | `.claude/skills/shep-kit-new-feature-fast/SKILL.md` | Medium | References `specs/` in shell snippets and instructions |
  | `.claude/skills/shep-kit-parallel-task/SKILL.md` | Medium | References `specs/` for worktree spec creation |
  | `.prettierignore` | Low | Currently ignores `specs/` — needs updating to `.shep/specs/` |
  | `CLAUDE.md` | Low | References `specs/NNN-feature-name/` in workflow documentation |
  | `docs/development/spec-driven-workflow.md` | Low | Documentation references to spec directory location |
  | `specs/032-example-specs/` | Medium | Test fixtures must relocate to `tests/fixtures/spec-yaml-samples/` |
  | `tests/unit/infrastructure/services/spec/spec-initializer.service.test.ts` | High | Tests construct `join(tempDir, 'specs', ...)` paths — must update to `.shep/specs/` and add tests for shep-managed mode |
  | `tests/unit/domain/factories/spec-yaml-parser.test.ts` | Low | References `specs/032-example-specs` — update to `tests/fixtures/spec-yaml-samples` |
  | `tests/unit/domain/factories/spec-yaml-artifact-parsing.test.ts` | Low | References `specs/032-example-specs` — update to `tests/fixtures/spec-yaml-samples` |
  | `tests/unit/infrastructure/spec-yaml-backward-compatibility.test.ts` | Low | Scans `specs/` directory — must update to `.shep/specs/` or `tests/fixtures/` |
  | `tests/e2e/cli/feat.test.ts` | Medium | E2E test checks `join(worktreePath, 'specs', ...)` — update to `.shep/specs/` |
  | `tests/integration/infrastructure/services/agents/` | Medium | Multiple integration tests construct `specs/` paths — update to `.shep/specs/` |
  | `tests/unit/infrastructure/services/agents/executors/dev-executor.service.test.ts` | Low | Constructs `specs/042-dark-mode` paths — update to `.shep/specs/` |
  | `packages/core/src/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.ts` | Low | Uses `relative()` to compute spec path — automatically produces correct relative path from new location |
  | Repo-level settings/config | Medium | A new `specStorageMode` field must be persisted per-repo. Exact storage mechanism (DB column, JSON config file, or settings table) to be determined in research phase. |

  ## Dependencies

  - **spec-initializer.service.ts** is the single source of truth for path construction — all other production code changes cascade from this
  - **shep-directory.service.ts** provides `getShepHomeDir()` which resolves `~/.shep/` — needed for shep-managed mode path construction
  - **worktree.service.ts** already computes `repoHash` from the repository path — the same hashing logic must be reused (not duplicated) for shep-managed spec paths
  - **SQLite database** stores absolute paths in `spec_path` — existing records remain valid regardless of storage mode; no migration needed
  - **TypeSpec domain model** defines `specPath` as optional string — no schema change needed for the path itself
  - **Per-repo configuration** — a mechanism to store the `specStorageMode` setting per repo is needed; the research phase should evaluate whether to use the existing settings service, a new DB column, or a `.shep/config.json` file
  - **Git worktree structure** is managed by `worktree.service.ts` — the worktree base path doesn't change
  - **Evidence storage** uses `state.specDir` for relative path calculation — automatically adjusts for in-repo mode; evidence-prompts.ts may need minor updates for shep-managed mode where specDir is outside the worktree
  - **Test fixtures** at `specs/032-example-specs/` must move before the backward-compatibility test can be updated (it scans the `specs/` directory)
  - **UI use cases** (GetFeatureArtifactUseCase, etc.) read from `feature.specPath` — they work with any absolute path, so shep-managed mode requires zero UI changes

  ## Size Estimate

  **L** — The scope has grown from the original M estimate. The core path change is still
  straightforward, but adding the configurable spec storage mode introduces: a new per-repo
  setting (storage mechanism, TypeSpec model update if applicable, DB migration or config
  file), branching logic in the spec-initializer, additional test cases for both modes,
  and documentation for the new option. The ripple effects still touch ~20+ files across
  skills, tests, documentation, and config files. Each individual change is manageable,
  but the total breadth plus the new configuration surface justifies an L estimate.

  ---

