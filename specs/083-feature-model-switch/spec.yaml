oneLiner: "Allow switching a feature's pinned agent/model before start, approval, or retry"
summary: >
  Current per-feature agent/model overrides are captured when a feature is created
  and then reused from the linked agent run, but there is no way to change that
  pinned execution config after creation. Repository analysis shows the clean path
  is to update the current AgentRun for a pending, action-required, or error
  feature and reuse the existing web picker/model metadata stack, without changing
  the Feature domain model or database schema.
