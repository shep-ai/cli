phases:
  - id: "phase-1"
    name: "Current Run Mutation Foundation"
    description: "Add the narrow AgentRun persistence mutation and the feature-scoped core use case so pinned config changes can be validated and saved without changing Feature, TypeSpec, or SQLite schema."
    parallel: false
  - id: "phase-2"
    name: "Continuation Contract Hardening"
    description: "Lock down start, approval, rejection, and retry behavior with regression coverage so every continuation path consumes the persisted run config after a successful switch."
    parallel: false
  - id: "phase-3"
    name: "Web Mutation and Picker Refactor"
    description: "Expose the core mutation through a thin web action and refactor AgentModelPicker so parent components can drive saved values, saving state, and rollback."
    parallel: false
  - id: "phase-4"
    name: "Drawer Integration and UX Safeguards"
    description: "Integrate the switch into the Overview settings area, gate it to eligible states, block continuation while saving, and extend component and Storybook coverage for the new drawer flow."
    parallel: false

