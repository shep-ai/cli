name: "feature-model-switch"
summary: "Implement feature-scoped pinned agent/model switching by mutating the current AgentRun in place, exposing a dedicated core use case plus thin web action, and reusing the existing drawer/picker stack with immediate persistence, rollback, and continuation guards."

