    acceptanceCriteria:
      - "buildPrototypeGeneratePrompt produces a prompt emphasizing speed over quality"
      - "buildPrototypeGeneratePrompt includes user query, repo context, and iteration context"
      - "buildApplyFeedbackPrompt includes feedback text, iteration history summary, and instruction to modify prototype"
      - "Both prompt builders handle first iteration (no prior feedback) and subsequent iterations (with history)"
      - "Older feedback (beyond 3 iterations) is summarized to manage context window"
    tdd:
      red:
        - "Write test: buildPrototypeGeneratePrompt includes user query in output"
        - "Write test: buildPrototypeGeneratePrompt on iteration 0 has no feedback context"
        - "Write test: buildPrototypeGeneratePrompt on iteration 3 includes summarized history"
        - "Write test: buildApplyFeedbackPrompt includes current feedback text"
        - "Write test: buildApplyFeedbackPrompt includes iteration count"
      green:
