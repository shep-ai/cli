  - id: "task-18"
    phaseId: "phase-5"
    title: "Add --explore flag to feat new command"
    description: "Add --explore flag to the feat new CLI command. When --explore is specified, create the feature with mode=Exploration. Update the mutually exclusive flag logic so --explore, --fast, and default (regular) are exclusive. Update getWorkflowDefaults to return mode enum instead of fast boolean."
