  - id: "task-9"
    phaseId: "phase-3"
    title: "Create exploration prompt builders"
    description: "Create buildPrototypeGeneratePrompt in prototype-generate.prompt.ts and buildApplyFeedbackPrompt in apply-feedback.prompt.ts. The generate prompt emphasizes quick prototyping, minimal scope, and throwaway quality. The feedback prompt includes previous prototype context, accumulated feedback history, and current iteration number."
    state: "Todo"
    dependencies:
