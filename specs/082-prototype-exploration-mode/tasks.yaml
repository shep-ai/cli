name: "prototype-exploration-mode"
summary: >
  29 tasks across 7 phases implementing exploration/prototyping mode. Starts with TypeSpec
  domain models (FeatureMode enum, Exploring lifecycle state, iteration fields), then persistence
  migration (fast boolean to mode enum), agent graph infrastructure (exploration graph factory,
  prototype-generate and apply-feedback nodes, worker routing), application use cases (create,
  promote, discard), CLI commands (--explore, feedback, promote), Web UI (mode selector, canvas
  nodes, prototype drawer tab), and settings integration (defaultMode, maxIterations).

relatedFeatures:
  - "052-fast-prompt-to-pr"

technologies:
  - "TypeScript"
  - "TypeSpec"
  - "LangGraph (@langchain/langgraph)"
  - "React / Next.js"
  - "Commander.js"
  - "shadcn/ui"
  - "SQLite (better-sqlite3)"
  - "tsyringe (DI)"
  - "React Flow (@xyflow/react)"
  - "Lucide React (icons)"
  - "Storybook"
  - "Vitest"

relatedLinks:
  - title: "LangGraph Interrupt/Resume Documentation"
    url: "https://langchain-ai.github.io/langgraphjs/how-tos/human_in_the_loop/breakpoints/"
  - title: "TypeSpec Enum Documentation"
    url: "https://typespec.io/docs/language-basics/enums"

tasks:
  # ============================================================
  # Phase 1: Domain Foundation (TypeSpec + Generated Code)
  # ============================================================

  - id: "task-1"
    phaseId: "phase-1"
    title: "Define FeatureMode enum in TypeSpec"
    description: "Create a new FeatureMode enum in tsp/common/enums/feature-mode.tsp with values Regular, Fast, and Exploration. Follow the pattern of existing enums like SdlcLifecycle. Import and use the new enum in tsp/domain/entities/feature.tsp to replace the boolean fast field."
    state: "Todo"
    dependencies: []
    acceptanceCriteria:
      - "FeatureMode enum exists in tsp/common/enums/feature-mode.tsp with Regular, Fast, Exploration values"
      - "Feature entity in feature.tsp uses FeatureMode instead of boolean fast"
      - "pnpm tsp:compile succeeds and generates output.ts with FeatureMode"
      - "Generated output.ts includes FeatureMode type and enum values"
    tdd:
      red:
        - "Write test asserting FeatureMode enum has exactly three values: Regular, Fast, Exploration"
        - "Write test asserting Feature type has mode field of type FeatureMode instead of fast boolean"
      green:
        - "Create tsp/common/enums/feature-mode.tsp with FeatureMode enum"
        - "Update tsp/domain/entities/feature.tsp to replace fast: boolean with mode: FeatureMode"
        - "Run pnpm tsp:compile to regenerate output.ts"
      refactor:
        - "Ensure enum doc comments match the domain language from the spec"
    estimatedEffort: "45min"

  - id: "task-2"
    phaseId: "phase-1"
    title: "Add Exploring state to SdlcLifecycle enum"
    description: "Add Exploring to the SdlcLifecycle enum in tsp/common/enums/lifecycle.tsp. Position it logically near Started since it represents an early-stage exploratory state. Recompile TypeSpec."
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "SdlcLifecycle enum includes Exploring state"
      - "pnpm tsp:compile succeeds"
      - "Generated output.ts includes Exploring in the lifecycle type"
    tdd:
      red:
        - "Write test asserting SdlcLifecycle includes 'Exploring' as a valid value"
      green:
        - "Add Exploring variant to SdlcLifecycle in lifecycle.tsp"
        - "Run pnpm tsp:compile"
      refactor:
        - "Add doc comment explaining Exploring state purpose and valid transitions"
    estimatedEffort: "20min"

  - id: "task-3"
    phaseId: "phase-1"
    title: "Add iteration fields to Feature entity in TypeSpec"
    description: "Add iterationCount (integer, default 0) and maxIterations (optional integer) fields to the Feature model in feature.tsp. These fields track exploration feedback loop progress and are persisted to the database for Web UI access."
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "Feature entity has iterationCount: int32 = 0 field"
      - "Feature entity has maxIterations?: int32 optional field"
      - "pnpm tsp:compile succeeds"
      - "Generated output.ts includes both fields on Feature type"
    tdd:
      red:
        - "Write test asserting Feature type has iterationCount (number) and maxIterations (optional number) fields"
      green:
        - "Add iterationCount and maxIterations fields to Feature model in feature.tsp"
        - "Run pnpm tsp:compile"
      refactor:
        - "Add doc comments explaining field purpose and when they are populated"
    estimatedEffort: "15min"

  - id: "task-4"
    phaseId: "phase-1"
    title: "Update lifecycle gate definitions for Exploring state"
    description: "Add lifecycle gate configuration for the Exploring state in the domain lifecycle gates module. Define valid transitions: Exploring -> Implementation (promote-fast), Exploring -> Requirements (promote-regular), Exploring -> Deleting (discard). The Exploring state has no approval gates since exploration bypasses SDLC."
    state: "Todo"
    dependencies:
      - "task-2"
    acceptanceCriteria:
      - "Lifecycle gates module includes Exploring state with valid transition targets"
      - "Exploring state transitions to Implementation, Requirements, and Deleting only"
      - "No approval gates defined for Exploring state"
      - "Existing lifecycle gate tests still pass"
    tdd:
      red:
        - "Write test asserting Exploring state has valid transitions to Implementation, Requirements, and Deleting"
        - "Write test asserting Exploring state has no approval gates"
        - "Write test asserting invalid transition from Exploring to Review throws error"
      green:
        - "Add Exploring configuration to lifecycle gates"
        - "Define valid transition targets"
      refactor:
        - "Ensure gate definitions follow the same pattern as existing states"
    estimatedEffort: "30min"

  # ============================================================
  # Phase 2: Persistence Migration (Boolean-to-Enum + Schema)
  # ============================================================

  - id: "task-5"
    phaseId: "phase-2"
    title: "Create SQLite migration to replace fast boolean with mode enum"
    description: "Create migration 051-replace-fast-with-mode.ts that adds a TEXT mode column to the features table, migrates existing data (fast=1 -> 'Fast', fast=0 -> 'Regular'), and drops the fast column via SQLite table recreation. Register the migration in the migrations index."
    state: "Todo"
    dependencies:
      - "task-1"
    acceptanceCriteria:
      - "Migration file exists at 051-replace-fast-with-mode.ts"
      - "Migration adds TEXT mode column with DEFAULT 'Regular'"
      - "Migration maps fast=1 to mode='Fast' and fast=0 to mode='Regular'"
      - "Migration drops the fast column after data migration"
      - "Migration is registered in migrations/index.ts"
      - "Migration handles empty tables gracefully"
    tdd:
      red:
        - "Write integration test creating a test DB with features (fast=0 and fast=1), running migration, asserting mode column values are 'Regular' and 'Fast'"
        - "Write test asserting fast column no longer exists after migration"
      green:
        - "Implement migration using table recreation pattern (create temp, copy data, drop old, rename)"
        - "Add migration to index.ts exports"
      refactor:
        - "Add comments explaining the SQLite table recreation pattern"
    estimatedEffort: "1h"

  - id: "task-6"
    phaseId: "phase-2"
    title: "Update feature mapper from boolean fast to enum mode"
    description: "Update feature.mapper.ts to map between FeatureMode enum (domain) and TEXT mode column (database). Replace toDatabase: fast ? 1 : 0 with mode string, and toDomain: row.fast === 1 with FeatureMode enum parsing. Add iterationCount and maxIterations field mapping."
    state: "Todo"
    dependencies:
      - "task-3"
      - "task-5"
    acceptanceCriteria:
      - "toDatabase maps FeatureMode enum to string ('Regular', 'Fast', 'Exploration')"
      - "toDomain maps string mode column to FeatureMode enum"
      - "toDatabase and toDomain handle iterationCount and maxIterations"
      - "No references to boolean fast remain in mapper"
      - "Existing mapper tests updated and passing"
    tdd:
      red:
        - "Write test: toDatabase with mode=FeatureMode.Fast produces row with mode='Fast'"
        - "Write test: toDomain with row.mode='Exploration' produces feature with mode=FeatureMode.Exploration"
        - "Write test: toDomain with row.mode='Regular' produces feature with mode=FeatureMode.Regular"
        - "Write test: iterationCount and maxIterations round-trip correctly through mapper"
      green:
        - "Replace fast boolean mapping with mode enum mapping in toDatabase"
        - "Replace fast boolean mapping with mode enum parsing in toDomain"
        - "Add iterationCount/maxIterations field mapping"
      refactor:
        - "Remove any dead code related to boolean fast mapping"
        - "Update existing tests that reference the fast boolean"
    estimatedEffort: "45min"

  - id: "task-7"
    phaseId: "phase-2"
    title: "Update feature repository queries for mode enum"
    description: "Update any repository queries that filter or sort by the fast boolean to use the mode TEXT column instead. Update any query builders or raw SQL that references the fast column."
    state: "Todo"
    dependencies:
      - "task-6"
    acceptanceCriteria:
      - "No repository queries reference the fast column"
      - "Queries that filtered on fast now filter on mode"
      - "Repository can query features by mode (findByMode or equivalent)"
      - "All existing repository tests pass with mode instead of fast"
    tdd:
      red:
        - "Write test: repository query filters features by mode='Exploration'"
        - "Write test: repository returns correct mode value for persisted features"
      green:
        - "Update SQL queries and query builders from fast column to mode column"
        - "Add any new mode-based query methods if needed"
      refactor:
        - "Search for remaining references to 'fast' in repository layer and update"
    estimatedEffort: "30min"

  # ============================================================
  # Phase 3: Agent Graph Infrastructure
  # ============================================================

  - id: "task-8"
    phaseId: "phase-3"
    title: "Extend FeatureAgentAnnotation with exploration state channels"
    description: "Add exploration-specific channels to the FeatureAgentAnnotation in state.ts: iterationCount (number, default 0), maxIterations (number, default 10), feedbackHistory (string array with accumulating reducer), and explorationStatus (string union type). Follow the pattern of existing CI fix channels."
    state: "Todo"
    dependencies:
