content: |
  ## Summary

  This task breakdown implements exploration/prototyping mode across 29 tasks in 7 phases.
  The work follows a strict dependency chain: domain types must exist before persistence can
  map them, persistence must work before the agent graph can read/write features, the graph
  must exist before use cases can spawn it, and use cases must exist before CLI/Web UI can
  call them.

  Phase 1 establishes the TypeSpec foundation — FeatureMode enum, Exploring lifecycle state,
  and iteration fields on the Feature entity. Phase 2 migrates the database from boolean fast
  to enum mode and updates the mapper. Phase 3 builds the exploration agent graph with its
  prototype-generate and apply-feedback nodes, prompt builders, state channels, and worker
  routing. Phase 4 creates the application use cases: extending CreateFeatureUseCase for
  exploration mode, creating PromoteExplorationUseCase for mode transitions, and extending
  delete logic for exploration cleanup. Phase 5 adds CLI commands: --explore flag, feedback
  subcommand, and promote subcommand. Phase 6 builds the Web UI: mode selector component,
  canvas node styling, prototype review drawer tab, and server actions. Phase 7 integrates
  settings: replacing defaultFastMode with defaultMode and adding explorationMaxIterations.

  Every code task follows TDD: write a failing test first (RED), implement the minimum to
  pass (GREEN), then clean up (REFACTOR). The total estimated effort is 24 hours of
  focused development work.
