        - "Write test: graph invocation calls prototype-generate node first"
        - "Write test: graph interrupts after prototype-generate"
        - "Write test: graph routes to apply-feedback on 'iterate' resume action"
        - "Write test: graph routes to END on 'promote' resume action"
        - "Write test: graph routes to END on 'discard' resume action"
      green:
