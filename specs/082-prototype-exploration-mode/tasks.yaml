    estimatedEffort: "1h"

  - id: "task-10"
    phaseId: "phase-3"
    title: "Implement prototype-generate node"
    description: "Create the prototype-generate node function in prototype-generate.node.ts. This node calls the agent executor with the exploration prompt, writes code changes to the worktree, updates iterationCount on the feature entity, and interrupts for user feedback. Uses retryExecute and createNodeLogger from shared utilities."
    state: "Todo"
    dependencies:
