    estimatedEffort: "1.5h"

  - id: "task-13"
    phaseId: "phase-3"
    title: "Update worker routing from --fast boolean to --mode enum"
    description: "Replace the --fast boolean flag in feature-agent-worker.ts with --mode string flag accepting 'regular', 'fast', or 'exploration'. Update WorkerArgs interface, parseWorkerArgs function, and graph selection logic to route based on mode value. Update feature-agent-process.service.ts to pass --mode instead of --fast."
