  - id: "task-12"
    phaseId: "phase-3"
    title: "Create exploration agent graph factory"
    description: "Create createExplorationAgentGraph in exploration-agent-graph.ts with topology: START -> prototype-generate -> interrupt -> apply-feedback -> prototype-generate (loop). The graph exits via conditional routing when the resume action is 'promote' or 'discard' instead of 'iterate'. Follow the factory pattern of createFastFeatureAgentGraph."
    state: "Todo"
    dependencies:
      - "task-10"
      - "task-11"
    acceptanceCriteria:
