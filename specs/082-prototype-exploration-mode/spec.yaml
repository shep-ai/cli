oneLiner: "Add a prototype/exploration mode for iterative visual prototyping before committing to full feature development"
summary: >
  Add a new \"exploration\" mode alongside the existing \"fast\" and \"regular\" (full SDLC) modes.
  In exploration mode, users describe a vague idea and the system generates quick, disposable
  prototypes that can be viewed in the Web UI, iterated on with feedback, and eventually
  promoted to a real feature (fast or regular mode) once the direction is clear. This enables
  a discovery-first workflow where users explore design space before committing to implementation.
