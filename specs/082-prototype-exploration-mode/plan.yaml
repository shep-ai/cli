name: "prototype-exploration-mode"
summary: >
  Implementation plan for adding exploration/prototyping mode to Shep. The approach replaces
  the boolean fast field with a FeatureMode enum (Regular, Fast, Exploration), adds an Exploring
  lifecycle state, creates a new LangGraph exploration graph factory with interrupt-based feedback
  loops, extends the Web UI with a three-way mode selector and prototype review drawer, adds CLI
  commands for feedback and promotion, and performs an in-place database migration. The plan is
  organized into 7 phases: domain foundation, persistence migration, agent graph infrastructure,
  application use cases, CLI presentation, Web UI presentation, and settings integration.

relatedFeatures:
  - "052-fast-prompt-to-pr"

technologies:
  - "TypeScript"
  - "TypeSpec"
  - "LangGraph (@langchain/langgraph)"
  - "React / Next.js"
  - "Commander.js"
  - "shadcn/ui"
  - "SQLite (better-sqlite3)"
  - "tsyringe (DI)"
  - "React Flow (@xyflow/react)"
  - "Lucide React (icons)"
  - "Storybook"
  - "Vitest"

relatedLinks:
  - title: "LangGraph Interrupt/Resume Documentation"
    url: "https://langchain-ai.github.io/langgraphjs/how-tos/human_in_the_loop/breakpoints/"
  - title: "LangGraph Annotation State Channels"
    url: "https://langchain-ai.github.io/langgraphjs/concepts/low_level/"
  - title: "TypeSpec Enum Documentation"
    url: "https://typespec.io/docs/language-basics/enums"

phases:
  - id: "phase-1"
    name: "Domain Foundation (TypeSpec + Generated Code)"
    description: "Define FeatureMode enum and Exploring lifecycle state in TypeSpec, add iteration fields to Feature entity, compile to TypeScript. This phase is the prerequisite for all other work since every layer depends on these domain types."
    parallel: false

  - id: "phase-2"
    name: "Persistence Migration (Boolean-to-Enum + Schema)"
    description: "Create SQLite migration to replace the boolean fast column with a TEXT mode column, update the feature mapper from boolean to enum mapping, and update repository queries. This phase must follow domain types and precede any runtime code that reads mode."
    parallel: false

  - id: "phase-3"
    name: "Agent Graph Infrastructure (Exploration Graph + Worker Routing)"
    description: "Build the exploration agent graph factory with prototype-generate and apply-feedback nodes, extend FeatureAgentAnnotation with exploration state channels, create the exploration prompt builder, and update worker routing from --fast boolean to --mode enum. This is the core runtime engine for exploration mode."
    parallel: false

  - id: "phase-4"
    name: "Application Use Cases (Create + Promote + Discard)"
    description: "Extend CreateFeatureUseCase to handle exploration mode (Exploring lifecycle, minimal spec, exploration graph spawning), create PromoteExplorationUseCase for in-place mode transition, and extend discard/delete logic for exploration cleanup."
    parallel: false

  - id: "phase-5"
    name: "CLI Presentation (Commands + Flags)"
    description: "Add --explore flag to feat new, create feat feedback and feat promote subcommands, update workflow defaults from boolean fast to mode enum. CLI is addressed before Web UI because it is thinner and validates the use case API surface."
    parallel: false

  - id: "phase-6"
    name: "Web UI Presentation (Mode Selector + Canvas + Drawer)"
    description: "Replace the fast toggle with a three-way mode selector (ToggleGroup), add exploring state config for canvas nodes with amber styling and FlaskConical icon, create prototype review drawer tab with diff view and feedback input, and add promote/discard actions."
    parallel: false

  - id: "phase-7"
    name: "Settings Integration + Polish"
    description: "Replace workflow.defaultFastMode boolean with workflow.defaultMode enum in TypeSpec and settings service, add explorationMaxIterations setting, wire defaults into CLI and Web UI, and perform end-to-end integration testing."
    parallel: false

