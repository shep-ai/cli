content: |
  ## Architecture Overview

  This feature operates entirely within the **presentation/web** layer. No domain model,
  TypeSpec, or API changes are needed — collapse is a canvas-only UI concern.

  The implementation follows the existing data flow:

  ```
  useControlCenterState (state + callbacks)
    -> FeaturesCanvas (enrichment + filtering)
      -> ReactFlow (renders visible nodes/edges)
        -> FeatureNode (collapse toggle UI)
  ```

  **Collapse state** is a `Set<string>` of collapsed node IDs managed in
  `useControlCenterState`. It is persisted to `localStorage` so users retain
  their collapse preferences across page reloads. Stale IDs (features deleted
  between sessions) are silently ignored during hydration.

  **Subtree computation** walks dependency edges (`dep-*` prefix) to build a
  recursive descendant set for each collapsed node. This reuses the existing
  edge ID convention — no new data structures needed.

  **Node/edge filtering** happens in `FeaturesCanvas` during the existing
  `enrichedNodes` mapping pass. Collapsed descendants are excluded from the
  arrays passed to both `<ReactFlow>` and `layoutWithDagre()`, so the layout
  algorithm naturally fills gaps without code changes.

  **FeatureNode UI** adds a chevron button to the node header (left of the
  lifecycle label) and a stacked card visual behind the node when collapsed.
  The chevron follows the existing button pattern: `nodrag` class, `e.stopPropagation()`,
  consistent icon sizing (`h-3.5 w-3.5`), and Tailwind utilities only.

  ## Key Design Decisions

  ### 1. localStorage persistence (from research)
  **Chosen:** Persist collapsed node IDs in localStorage.
  **Rationale:** Users retain their collapse preferences across page reloads without
  re-collapsing nodes each session. Implementation is straightforward — serialize
  `Set<string>` to JSON array. Stale IDs from deleted features are ignored on read.
  The localStorage key is scoped per-page to avoid cross-context conflicts.

  ### 2. Filtering vs hidden property
  **Chosen:** Filter nodes/edges from arrays before passing to ReactFlow.
  **Rejected:** Using React Flow's `hidden: true` node property.
  **Rationale:** Filtering produces cleaner edge removal (edges to hidden nodes
  automatically disappear) and ensures Dagre layout only considers visible nodes.
  With `hidden: true`, edges would need separate hiding logic and Dagre would
  allocate space for invisible nodes, causing gaps. The spec explicitly requires
  filtering over hiding.

  ### 3. Subtree computation via edge walking
  **Chosen:** Walk `dep-*` edges recursively to find all descendants.
  **Rationale:** The existing edge ID convention (`dep-${parentId}-${childId}`)
  provides a reliable parent-child relationship graph. Building an adjacency map
  from edges and performing BFS/DFS gives the complete subtree for any node.
  This avoids introducing a separate tree data structure.

  ### 4. Collapse toggle placement
  **Chosen:** Chevron button in node header, left of lifecycle label.
  **Rationale:** The top-left area is currently unused (lifecycle label + settings
  button span the header). Placing the chevron there gives it clear visual
  hierarchy without competing with the settings button (top-right) or delete
  button (hover, left of card). Always visible when `childCount > 0`.

  ### 5. Stacked visual via CSS
  **Chosen:** CSS pseudo-elements or offset divs behind the card.
  **Rationale:** The spec requires the stacked visual to NOT be additional React
  Flow nodes. Using `::before`/`::after` pseudo-elements or absolute-positioned
  divs with slight offset and matching border/shadow creates the layered card
  effect. A badge overlay shows the `+N` count.

  ## Implementation Strategy

  The work proceeds in four phases, ordered by dependency:

  **Phase 1 (Data model & state)** establishes the foundation. FeatureNodeData
  gets three new optional fields. The useControlCenterState hook gains collapse
  state management with localStorage persistence and a subtree computation
  utility. All subsequent phases depend on this.

  **Phase 2 (Filtering & layout)** connects state to rendering. FeaturesCanvas
  learns to filter out collapsed descendants and their edges, then passes the
  reduced set to Dagre and ReactFlow. Node enrichment injects collapse data.

  **Phase 3 (UI)** builds the visible affordance. The FeatureNode component gets
  a chevron button and stacked visual. This is the most visible change but depends
  on the data flowing correctly from phases 1-2.

  **Phase 4 (Edge cases & stories)** handles the tricky scenarios: auto-expand
  on child creation, cleanup on child deletion. Storybook stories document all
  states. Final regression checks ensure no existing interactions break.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Stale localStorage IDs after feature deletion | Ignore unknown IDs during hydration; clean up IDs when features are deleted |
  | Dagre layout jank with rapid toggle | Collapse toggle is synchronous state update; Dagre runs on filtered arrays which is fast for <50 nodes |
  | SSE updates for hidden nodes lost | SSE updates flow through useControlCenterState which updates ALL node data regardless of visibility — filtering is a render-time concern only |
  | Chevron button interfering with node drag | Use `nodrag` CSS class (same pattern as existing Settings button) |
  | Edge cases with deeply nested trees | BFS subtree walk has O(n) complexity where n is total nodes — acceptable for graphs up to 50 nodes |
  | Breaking existing node interactions | Comprehensive regression tests for Settings, Delete, Add Child, drag, and select interactions |
