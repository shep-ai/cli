name: collapsible-feature-nodes
summary: >
  Implement collapse/expand behavior for parent feature nodes on the canvas. Extends
  FeatureNodeData with collapse fields, adds a chevron toggle and stacked visual to
  FeatureNode, manages collapse state in useControlCenterState with localStorage persistence,
  filters hidden descendants from the rendered node/edge arrays in FeaturesCanvas, and
  re-invokes Dagre layout after each toggle. Recursive subtree hiding ensures the entire
  descendant tree is hidden. Edge cases (child added to collapsed parent, collapsed child
  deleted) are handled gracefully. Sidebar remains independent of collapse state.

relatedFeatures: []
technologies:
  - '@xyflow/react v12 (React Flow)'
  - '@dagrejs/dagre (graph layout)'
  - React (useState, useCallback, useMemo, useEffect)
  - Tailwind CSS (styling and animations)
  - Lucide React (ChevronDown, ChevronRight)
  - Vitest + React Testing Library (unit tests)
  - Storybook (component documentation)
relatedLinks: []

phases:
  - id: phase-1
    name: 'Data model & state management'
    description: >
      Extend FeatureNodeData with collapse-related fields (isCollapsed, childCount,
      onToggleCollapse). Build the collapse state management layer in useControlCenterState:
      collapsed node IDs as a Set<string>, toggleCollapse callback, recursive subtree
      computation from dependency edges, and localStorage persistence. This phase comes
      first because all subsequent UI and filtering work depends on the data model and
      state being in place.
    parallel: false

  - id: phase-2
    name: 'Node/edge filtering & layout integration'
    description: >
      Implement the node and edge filtering pipeline in FeaturesCanvas that removes
      collapsed descendants and their edges before passing to ReactFlow and Dagre layout.
      Enrich nodes with collapse data (isCollapsed, childCount, onToggleCollapse callback)
      during the existing enrichedNodes mapping. This phase bridges state management and
      the visual layer — filtering must work correctly before the UI can display collapsed
      states.
    parallel: false

  - id: phase-3
    name: 'FeatureNode UI — collapse toggle & stacked visual'
    description: >
      Add the chevron collapse/expand button to the FeatureNode component header (visible
      only when childCount > 0) and the stacked visual indicator with child count badge
      when the node is collapsed. Implement chevron rotation animation (200ms), accessibility
      attributes (aria-expanded, aria-label), and the nodrag class to prevent drag interference.
      Stacked visual uses CSS pseudo-elements or additional divs with Tailwind utilities.
    parallel: false

  - id: phase-4
    name: 'Edge cases, Storybook stories & integration polish'
    description: >
      Handle edge cases: auto-expand parent when a child is added to a collapsed node,
      graceful cleanup when a collapsed child is deleted (remove from collapsed set, hide
      toggle if no children remain). Add comprehensive Storybook stories for all collapse
      states. Verify no regressions to existing interactions. Polish and final cleanup.
    parallel: false

