openQuestions:
  - question: >-
      How should the prompt treat the main app vs Storybook as evidence sources?
    resolved: true
    options:
      - option: Both as complementary sources
        description: >
          Instruct the agent to capture evidence from BOTH the running app (port
          3000) and Storybook (port 6006). The main app shows integrated UI in
          real context (routing, layout, data flow), while Storybook shows
          isolated component states (variants, edge cases, error states). Both
          are valuable and together provide comprehensive evidence. The prompt
          should give clear guidance on when to use each source.
        selected: true
      - option: App-only with Storybook as fallback
        description: >
          Make the running app the primary and strongly preferred source, only
          allowing Storybook when the component has no app route. Simpler rule
          but misses the value of isolated component evidence from Storybook.
        selected: false
      - option: App-only, no Storybook
        description: >
          Hard ban on Storybook evidence. Simplest rule but loses valuable
          isolated component-level evidence.
        selected: false
    selectionRationale: >
      The user explicitly requested evidence from both Storybook and the main
      app. Both sources provide distinct value: the main app shows how the
      feature works in the real integrated context, while Storybook shows
      isolated component states, variants, and edge cases. Together they provide
      comprehensive evidence coverage.
    answer: Both as complementary sources
  - question: >-
      How should video recording be implemented in the prompt — browser context
      videoDir or page.video() save-after?
    resolved: true
    options:
      - option: Browser context videoDir
        description: >
          Launch browser context with recordVideo: { dir: outputDir, size: {
          width, height } }. Playwright automatically saves the video when the
          page/context closes. Simpler API, no manual save step. This is the
          pattern used in the existing e2e showcase tests in the codebase
          (playwright.config.ts video: on).
        selected: true
      - option: page.video() manual save
        description: >
          Access page.video() after recording, close page, then call
          video.saveAs(path). More control over output location but requires
          explicit lifecycle management. The codebase uses this in
          audio-recording.ts fixture but it's more complex.
        selected: false
    selectionRationale: >
      The browser context videoDir approach is simpler, less error-prone, and
      aligns with Playwright's recommended pattern. The agent just needs to set
      recordVideo when creating the browser context and close the page when done
      — Playwright handles the rest. The manual save pattern adds complexity
      with no benefit for evidence capture.
    answer: Browser context videoDir
  - question: What video resolution and format should be specified in the prompt?
    resolved: true
    options:
      - option: Match screenshot resolution (1280x720, WebM)
        description: >
          Use 1280x720 viewport matching the existing screenshot standard. WebM
          is Playwright's default video format — lightweight, good quality, and
          supported by all modern browsers for PR preview. Keeps file sizes
          manageable (typically under 2-5MB for short flows).
        selected: true
      - option: Higher resolution (1920x1080, WebM)
        description: >
          Full HD resolution for crisper video. Larger files (5-15MB) but better
          visual quality. May be excessive for evidence purposes and increases
          storage costs.
        selected: false
    selectionRationale: >
      1280x720 matches the existing screenshot resolution standard already in
      the prompt, keeps file sizes small, and provides sufficient visual quality
      for evidence purposes. WebM is Playwright's native format and requires no
      transcoding.
    answer: Match screenshot resolution (1280x720, WebM)
  - question: Should the prompt include a maximum video duration limit?
    resolved: true
    options:
      - option: Yes, 30-second limit
        description: >
          Cap video recordings at 30 seconds. Most UI flows (navigation, form
          submit, drawer toggle) complete well within this window. Prevents
          runaway recordings that produce huge files. The agent should be
          instructed to keep interactions focused and concise.
        selected: true
      - option: No limit, rely on file size constraint
        description: >
          Let the existing 500KB file size guideline implicitly constrain
          duration. However, video files can easily exceed 500KB in seconds,
          making this constraint impractical for video. Would need to raise the
          file size limit for video specifically.
        selected: false
    selectionRationale: >
      A 30-second limit is practical — most UI interactions are well under this.
      It also gives the agent a clear, actionable constraint rather than relying
      on file size math. The file size constraint section should be updated to
      note that video files may exceed 500KB and that duration is the primary
      constraint for videos.
    answer: Yes, 30-second limit
  - question: >-
      When should the agent capture from the main app vs Storybook?
    resolved: true
    options:
      - option: App for integrated flows, Storybook for component states
        description: >
          Use the main app (port 3000) for evidence of integrated UI flows —
          navigation, routing, data fetching, layout in context, multi-step
          interactions. Use Storybook (port 6006) for evidence of isolated
          component states — variants, props combinations, edge cases, error
          states, responsive breakpoints. The agent should aim to capture from
          both sources for UI features to provide comprehensive evidence.
        selected: true
      - option: Always capture from both regardless
        description: >
          Require the agent to always capture from both sources for every UI
          task. Provides maximum coverage but may be excessive for simple
          changes and increases evidence collection time significantly.
        selected: false
    selectionRationale: >
      A guided approach gives the agent clear criteria for when each source is
      most valuable. The main app excels at showing real integrated context
      while Storybook excels at showing isolated component quality. For UI
      features, the agent should aim to capture from both, but with clear
      guidance on what each source is best at demonstrating.
    answer: App for integrated flows, Storybook for component states
content: |
  ## Problem Statement

  The evidence collection phase (invoked after implementation completes) uses a
  prompt (`buildEvidencePrompt` in `evidence-prompts.ts`) that gives the agent
  generic instructions to "start the dev server" and capture screenshots. In
  practice, the agent often defaults to capturing only from Storybook (port 6006)
  because the prompt doesn't give explicit guidance about using the actual running
  application on port 3000. This produces evidence showing only isolated component
  stories, missing the real integrated UI experience.

  The prompt should instruct the agent to capture from BOTH the main app and
  Storybook, as they serve complementary purposes:
  - **Main app (port 3000)**: Shows the feature in its real integrated context —
    routing, layout, data flow, navigation, multi-step interactions
  - **Storybook (port 6006)**: Shows isolated component quality — variants, prop
    combinations, edge cases, error states, responsive breakpoints

  Additionally, the prompt lists Video as a supported evidence type but provides
  no concrete instructions on how to record videos using Playwright. For UI flows
  involving multi-step interactions (navigation, form submissions, drawer
  open/close), a static screenshot misses the full picture — video evidence would
  be much more compelling.

  The codebase already has all the infrastructure to support this:
  - The domain model includes `EvidenceType.Video`
  - The evidence output parser handles Video records
  - Playwright's `recordVideo` API is available and used in existing e2e tests
  - The Next.js dev server runs on port 3000 via `pnpm dev:web`
  - Storybook runs on port 6006 via `pnpm storybook`

  The only gap is the prompt itself — it needs explicit dual-source instructions
  and concrete video recording guidance.

  ## Success Criteria

  - [ ] Evidence prompt explicitly instructs agent to capture from BOTH the main
        app (`pnpm dev:web` on port 3000) AND Storybook (`pnpm storybook` on port
        6006) as complementary evidence sources
  - [ ] Evidence prompt provides clear guidance on when to use each source: main
        app for integrated flows, Storybook for isolated component states
  - [ ] Evidence prompt includes Playwright script examples for BOTH sources —
        navigating to app routes (port 3000) and Storybook stories (port 6006)
  - [ ] Evidence prompt includes a concrete Playwright video recording script
        example using the `recordVideo: { dir, size }` browser context option
  - [ ] Evidence prompt defines clear decision criteria for when to capture
        video vs screenshot: multi-step interactions, navigation flows, and
        animations get video; static views get screenshots
  - [ ] Evidence prompt specifies video constraints: 1280x720 resolution, WebM
        format, maximum 30-second duration
  - [ ] File size constraints section updated to accommodate video files
        (duration-based limit for video, existing size limit for other types)
  - [ ] Existing unit tests updated with new assertions verifying dual-source
        instructions, video recording instructions, and decision criteria
  - [ ] All existing unit tests continue to pass (no regressions)
  - [ ] No changes to domain models, parser, evidence node, or any file outside
        of evidence-prompts.ts and its test file

  ## Functional Requirements

  - **FR-1**: The evidence prompt MUST instruct the agent to capture evidence
    from BOTH the running Next.js application (`pnpm dev:web` on port 3000) AND
    Storybook (`pnpm storybook` on port 6006). Both sources must be presented as
    valuable and complementary — not one as primary and the other as fallback.

  - **FR-2**: The evidence prompt MUST provide clear guidance on when to use each
    evidence source:
    - **Main app (port 3000)**: Integrated UI flows, navigation, routing, data
      fetching, layout in context, feature in real environment, multi-step user
      interactions
    - **Storybook (port 6006)**: Isolated component states, prop variants, edge
      cases, error states, responsive breakpoints, component documentation

  - **FR-3**: The evidence prompt MUST include Playwright script examples for
    both sources. The main app example must use `http://localhost:3000` and show
    navigating to an app route. The Storybook example must use
    `http://localhost:6006` and show navigating to a story.

  - **FR-4**: The evidence prompt MUST instruct the agent to aim for evidence
    from both sources when the task involves UI changes, to provide comprehensive
    coverage showing both integrated and isolated perspectives.

  - **FR-5**: The evidence prompt MUST include a concrete Playwright video
    recording script example using the `browserContext.recordVideo` option with
    `{ dir: outputDir, size: { width: 1280, height: 720 } }`. The example must
    show launching the browser, performing a multi-step interaction, and closing
    the context to finalize the video file.

  - **FR-6**: The evidence prompt MUST define clear decision criteria for video
    vs screenshot:
    - **Video**: Multi-step UI flows (form fill + submit, navigation between
      pages, drawer/modal open/close, drag-and-drop, any interaction sequence
      with 2+ steps)
    - **Screenshot**: Static views, single-state UI elements, layout
      verification, API responses

  - **FR-7**: The evidence prompt MUST specify video recording constraints:
    1280x720 viewport resolution, WebM format (Playwright default), maximum
    30-second recording duration.

  - **FR-8**: The file size constraints section MUST be updated to note that
    video files may exceed the 500KB guideline and that duration (30 seconds max)
    is the primary constraint for video evidence. The 500KB limit continues to
    apply to screenshots and text output.

  - **FR-9**: The Playwright script example for screenshots MUST be updated to
    use `pnpm dev:web` as the server start command instead of the generic
    `npm run dev` or `pnpm dev`, and must reference port 3000 explicitly.

  ## Non-Functional Requirements

  - **NFR-1**: Prompt changes must not alter the function signature, parameters,
    or return type of `buildEvidencePrompt`. All changes are internal to the
    returned string.

  - **NFR-2**: The prompt must remain deterministic — same input state produces
    identical output (existing test asserts this).

  - **NFR-3**: Changes must be confined to exactly two files:
    `evidence-prompts.ts` and `evidence-prompts.test.ts`. No other source files
    may be modified.

  - **NFR-4**: The video recording instructions must be copy-pasteable by the
    agent — the Playwright script example must be syntactically valid and
    runnable.

  - **NFR-5**: The prompt must maintain backward compatibility with the evidence
    output parser — the JSON output format section must remain unchanged.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | How should the prompt treat main app vs Storybook? | Both as complementary sources | User explicitly requested both; main app shows integrated context, Storybook shows isolated component quality |
  | 2 | Which Playwright video API to use in the prompt example? | Browser context videoDir | Simpler API, aligns with existing codebase patterns, less error-prone |
  | 3 | What video resolution and format? | 1280x720, WebM | Matches screenshot standard, keeps files small, Playwright native format |
  | 4 | Should there be a max video duration? | Yes, 30 seconds | Practical limit for UI flows, prevents huge files, clear agent constraint |
  | 5 | When should agent use main app vs Storybook? | App for integrated flows, Storybook for component states | Clear criteria gives agent guidance; aim for both on UI features |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.ts` | High | Primary file — add dual-source instructions, video capture script, decision criteria |
  | `tests/unit/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.test.ts` | Medium | Update test assertions to verify dual-source instructions, video instructions, decision criteria |

  ## Dependencies

  - Playwright's `recordVideo` browser context option — already available as a
    Playwright built-in, no new dependencies needed
  - Next.js dev server (`pnpm dev:web`) on port 3000 — already exists, just
    needs explicit reference in prompt
  - Storybook dev server (`pnpm storybook`) on port 6006 — already exists, just
    needs explicit reference in prompt
  - Evidence domain model already includes Video type — no TypeSpec changes needed
  - Evidence output parser already handles Video records — no parser changes needed

  ## Size Estimate

  **S** — This is a prompt-only change in a single file (`evidence-prompts.ts`)
  plus updating its corresponding unit test file. No architectural changes, no
  new dependencies, no domain model changes. The work is:

  1. Update instructions to explicitly reference both evidence sources (main app
     on port 3000 and Storybook on port 6006)
  2. Add guidance on when to use each source
  3. Add Playwright script examples for both sources
  4. Add a new video capture section with Playwright `recordVideo` instructions
  5. Add video vs screenshot decision criteria
  6. Update file size constraints for video
  7. Update unit tests to assert all new prompt content

