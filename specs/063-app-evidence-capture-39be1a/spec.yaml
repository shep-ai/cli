# Open questions (must be resolved before implementation)
openQuestions:
  - question: 'Should the prompt completely forbid Storybook as an evidence source, or deprioritize it as a fallback?'
    resolved: true
    options:
      - option: 'Deprioritize as fallback'
        description: >
          Make the running app (pnpm dev:web) the primary and strongly preferred source,
          but allow Storybook as a last resort if the main app cannot render the relevant
          component (e.g., deeply isolated component with no route). This is pragmatic and
          avoids cases where the agent has no evidence source at all.
        selected: true
      - option: 'Completely forbid Storybook'
        description: >
          Hard ban on Storybook evidence. Simpler rule for the agent to follow but risks
          no evidence being captured for components that only exist in isolation.
        selected: false
    selectionRationale: >
      Deprioritizing Storybook while making the app the strong default covers 95% of cases
      while avoiding edge cases where the agent cannot capture any evidence at all. The prompt
      should make it crystal clear that the running app is the primary source and Storybook
      should only be used as a documented exception.
    answer: 'Deprioritize as fallback'

  - question: 'How should video recording be implemented in the prompt — browser context videoDir or page.video() save-after?'
    resolved: true
    options:
      - option: 'Browser context videoDir'
        description: >
          Launch browser context with recordVideo: { dir: outputDir, size: { width, height } }.
          Playwright automatically saves the video when the page/context closes. Simpler API,
          no manual save step. This is the pattern used in the existing e2e showcase tests
          in the codebase (playwright.config.ts video: on).
        selected: true
      - option: 'page.video() manual save'
        description: >
          Access page.video() after recording, close page, then call video.saveAs(path).
          More control over output location but requires explicit lifecycle management.
          The codebase uses this in audio-recording.ts fixture but it's more complex.
        selected: false
    selectionRationale: >
      The browser context videoDir approach is simpler, less error-prone, and aligns with
      Playwright's recommended pattern. The agent just needs to set recordVideo when creating
      the browser context and close the page when done — Playwright handles the rest. The
      manual save pattern adds complexity with no benefit for evidence capture.
    answer: 'Browser context videoDir'

  - question: 'What video resolution and format should be specified in the prompt?'
    resolved: true
    options:
      - option: 'Match screenshot resolution (1280x720, WebM)'
        description: >
          Use 1280x720 viewport matching the existing screenshot standard. WebM is Playwright's
          default video format — lightweight, good quality, and supported by all modern browsers
          for PR preview. Keeps file sizes manageable (typically under 2-5MB for short flows).
        selected: true
      - option: 'Higher resolution (1920x1080, WebM)'
        description: >
          Full HD resolution for crisper video. Larger files (5-15MB) but better visual quality.
          May be excessive for evidence purposes and increases storage costs.
        selected: false
    selectionRationale: >
      1280x720 matches the existing screenshot resolution standard already in the prompt,
      keeps file sizes small, and provides sufficient visual quality for evidence purposes.
      WebM is Playwright's native format and requires no transcoding.
    answer: 'Match screenshot resolution (1280x720, WebM)'

  - question: 'Should the prompt include a maximum video duration limit?'
    resolved: true
    options:
      - option: 'Yes, 30-second limit'
        description: >
          Cap video recordings at 30 seconds. Most UI flows (navigation, form submit, drawer
          toggle) complete well within this window. Prevents runaway recordings that produce
          huge files. The agent should be instructed to keep interactions focused and concise.
        selected: true
      - option: 'No limit, rely on file size constraint'
        description: >
          Let the existing 500KB file size guideline implicitly constrain duration. However,
          video files can easily exceed 500KB in seconds, making this constraint impractical
          for video. Would need to raise the file size limit for video specifically.
        selected: false
    selectionRationale: >
      A 30-second limit is practical — most UI interactions are well under this. It also
      gives the agent a clear, actionable constraint rather than relying on file size math.
      The file size constraint section should be updated to note that video files may exceed
      500KB and that duration is the primary constraint for videos.
    answer: 'Yes, 30-second limit'

# Markdown content (the actual spec)
content: |
  ## Problem Statement

  The evidence collection phase (invoked after implementation completes) uses a prompt
  (`buildEvidencePrompt` in `evidence-prompts.ts`) that gives the agent generic instructions
  to "start the dev server" and capture screenshots. In practice, the agent often defaults to
  capturing from Storybook (port 6006) because the prompt doesn't explicitly prioritize the
  actual running application on port 3000. This produces evidence showing isolated component
  stories rather than the real integrated UI experience.

  Additionally, the prompt lists Video as a supported evidence type but provides no concrete
  instructions on how to record videos using Playwright. For UI flows involving multi-step
  interactions (navigation, form submissions, drawer open/close), a static screenshot misses
  the full picture — video evidence would be much more compelling.

  The codebase already has all the infrastructure to support this:
  - The domain model includes `EvidenceType.Video`
  - The evidence output parser handles Video records
  - Playwright's `recordVideo` API is available and used in existing e2e tests
  - The Next.js dev server runs on port 3000 via `pnpm dev:web`

  The only gap is the prompt itself — it needs explicit instructions for app-first capture
  and concrete video recording guidance.

  ## Success Criteria

  - [ ] Evidence prompt explicitly instructs agent to start the app with `pnpm dev:web` on
        port 3000 as the PRIMARY evidence source
  - [ ] Evidence prompt explicitly deprioritizes Storybook (port 6006) — allowed only as a
        documented fallback when the component has no app route
  - [ ] Evidence prompt includes a concrete Playwright video recording script example using
        the `recordVideo: { dir, size }` browser context option
  - [ ] Evidence prompt defines clear decision criteria for when to capture video vs screenshot:
        multi-step interactions, navigation flows, and animations get video; static views get
        screenshots
  - [ ] Evidence prompt specifies video constraints: 1280x720 resolution, WebM format,
        maximum 30-second duration
  - [ ] File size constraints section updated to accommodate video files (duration-based
        limit for video, existing size limit for other types)
  - [ ] Existing unit tests updated with new assertions verifying app-first instructions,
        video recording instructions, and decision criteria
  - [ ] All existing unit tests continue to pass (no regressions)
  - [ ] No changes to domain models, parser, evidence node, or any file outside of
        evidence-prompts.ts and its test file

  ## Functional Requirements

  - **FR-1**: The evidence prompt MUST instruct the agent to start the Next.js dev server
    using `pnpm dev:web` (port 3000) as the primary evidence capture source. The prompt
    must reference port 3000 explicitly in the Playwright script example.

  - **FR-2**: The evidence prompt MUST explicitly deprioritize Storybook (port 6006) as an
    evidence source. The prompt should state that Storybook should only be used if the
    component being captured has no route in the running application, and that the agent
    must document why Storybook was chosen in the evidence description.

  - **FR-3**: The evidence prompt MUST include a concrete Playwright video recording script
    example using the `browserContext.recordVideo` option with `{ dir: outputDir, size:
    { width: 1280, height: 720 } }`. The example must show launching the browser, performing
    a multi-step interaction, and closing the context to finalize the video file.

  - **FR-4**: The evidence prompt MUST define clear decision criteria for video vs screenshot:
    - **Video**: Multi-step UI flows (form fill + submit, navigation between pages, drawer/modal
      open/close, drag-and-drop, any interaction sequence with 2+ steps)
    - **Screenshot**: Static views, single-state UI elements, layout verification, API responses

  - **FR-5**: The evidence prompt MUST specify video recording constraints: 1280x720 viewport
    resolution, WebM format (Playwright default), maximum 30-second recording duration.

  - **FR-6**: The file size constraints section MUST be updated to note that video files may
    exceed the 500KB guideline and that duration (30 seconds max) is the primary constraint
    for video evidence. The 500KB limit continues to apply to screenshots and text output.

  - **FR-7**: The Playwright script example for screenshots MUST be updated to use port 3000
    instead of the generic `PORT` placeholder, and must use `pnpm dev:web` as the server
    start command instead of the generic `npm run dev` or `pnpm dev`.

  ## Non-Functional Requirements

  - **NFR-1**: Prompt changes must not alter the function signature, parameters, or return
    type of `buildEvidencePrompt`. All changes are internal to the returned string.

  - **NFR-2**: The prompt must remain deterministic — same input state produces identical
    output (existing test asserts this).

  - **NFR-3**: Changes must be confined to exactly two files: `evidence-prompts.ts` and
    `evidence-prompts.test.ts`. No other source files may be modified.

  - **NFR-4**: The video recording instructions must be copy-pasteable by the agent — the
    Playwright script example must be syntactically valid and runnable.

  - **NFR-5**: The prompt must maintain backward compatibility with the evidence output
    parser — the JSON output format section must remain unchanged.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should Storybook be completely forbidden or deprioritized? | Deprioritize as fallback | Covers 95% of cases while avoiding edge cases where no evidence can be captured |
  | 2 | Which Playwright video API to use in the prompt example? | Browser context videoDir | Simpler API, aligns with existing codebase patterns, less error-prone |
  | 3 | What video resolution and format? | 1280x720, WebM | Matches screenshot standard, keeps files small, Playwright native format |
  | 4 | Should there be a max video duration? | Yes, 30 seconds | Practical limit for UI flows, prevents huge files, clear agent constraint |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.ts` | High | Primary file — add app-first instructions, video capture script, decision criteria |
  | `tests/unit/infrastructure/services/agents/feature-agent/nodes/prompts/evidence-prompts.test.ts` | Medium | Update test assertions to verify new prompt content (app-first, video instructions) |

  ## Dependencies

  - Playwright's `recordVideo` browser context option — already available as a Playwright
    built-in, no new dependencies needed
  - Next.js dev server (`pnpm dev:web`) on port 3000 — already exists, just needs explicit
    reference in prompt
  - Evidence domain model already includes Video type — no TypeSpec changes needed
  - Evidence output parser already handles Video records — no parser changes needed

  ## Size Estimate

  **S** — This is a prompt-only change in a single file (`evidence-prompts.ts`) plus updating
  its corresponding unit test file. No architectural changes, no new dependencies, no domain
  model changes. The work is:
  1. Update the screenshot section to explicitly use `pnpm dev:web` on port 3000
  2. Add Storybook deprioritization language
  3. Add a new video capture section with Playwright `recordVideo` instructions and script
  4. Add video vs screenshot decision criteria
  5. Update file size constraints for video
  6. Update unit tests to assert all new prompt content

