  When creating a new feature, users select settings such as approval gates,
  git push/PR behavior, evidence collection, and the AI model. Previously these
  settings were not visible after feature creation. This feature adds a Settings
  section to the feature drawer overview tab that displays all configured
  settings using descriptive badges.

