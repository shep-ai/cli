# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When `gh repo fork --remote --remote-name origin` fails with "unable to determine
  base repository: no git remotes found" (e.g. in a freshly initialized repo with no
  remotes), the merge flow crashes with an unrecoverable error.

  ## Solution

  Add a fallback path in `GitForkService.forkRepository()` that detects the
  "unable to determine base repository" error and falls back to
  `gh repo create <user>/<repo> --source . --remote origin --private`, which creates
  a new private GitHub repository and sets it as the origin remote.

  The merge node also gracefully handles the case where no upstream remote exists
  after the fallback (since the repo was created, not forked) by transitioning to
  Maintain lifecycle instead of AwaitingUpstream.

  ## Success Criteria

  - [x] GitForkService detects "unable to determine base repository" fork failures
  - [x] Falls back to gh repo create with correct user/repo naming
  - [x] Creates private repository with --source . --remote origin
  - [x] Merge node handles missing upstream gracefully (transitions to Maintain)
  - [x] Unit tests cover happy path, fallback path, and fallback failure

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | GitForkService | High | New createRepositoryFallback method added |
  | Merge Node | Medium | Graceful handling when no upstream exists after fallback |

  ## Dependencies

  None identified.

