name: evidence-validation-loop
summary: >
  Technical research for adding validation and retry loop to evidence collection.
  The implementation will enhance the existing evidence.node.ts with an internal
  validation loop (no new graph nodes), reusing established patterns from
  validate/repair nodes. Validation includes UI app-level proof checks, evidence
  completeness by task type, and file existence verification. Retry loop has
  configurable max attempts (settings-based) and provides structured feedback to
  the agent. Each retry attempt is tracked as a separate phase activity with timing
  data. Graceful degradation is preserved — validation never blocks merge.

