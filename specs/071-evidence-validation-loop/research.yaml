# Markdown content (the full research document)
content: |
  ## Technology Decisions

  ### 1. Validation Loop Architecture — Internal vs Separate Nodes

  **Chosen:** Internal validation loop within evidence.node.ts

  **Rejected:**
  - Separate validate-evidence + retry-evidence graph nodes — Would require restructuring the implement phase and adding two new nodes to the graph topology. Evidence collection is already a sub-process within the implement phase, not a top-level graph node.
  - Hybrid approach (validation node + internal retry) — Unnecessary complexity. If we're keeping evidence as a sub-process, there's no benefit to having a separate validation node.

  **Rationale:** The integrated approach is architecturally sound because evidence collection is fundamentally a sub-phase within the implement node workflow, not a top-level graph phase. The internal loop pattern is proven in the codebase — retryExecute already implements internal retry logic for agent execution failures. We simply extend this pattern to include validation-driven retries. This keeps the graph topology simple and follows the "sub-process with internal retry" pattern.

  ### 2. Validation Criteria — What to Check

  **Chosen:** Comprehensive validation (UI + completeness + file existence)

  **Rejected:**
  - UI-only validation (app screenshots) — Insufficient to meet FR-2, FR-3, FR-4. Spec requires proving ALL tasks were completed.
  - Metadata-only validation (no file checks) — Would miss common issues like typos in paths or empty files. Spec FR-5 explicitly requires file existence validation.
  - Deep content inspection (parse images, analyze test output) — Would violate NFR-1 <500ms latency requirement and require complex dependencies.

  **Rationale:** Comprehensive validation checks three dimensions: (1) UI evidence quality (app-level screenshots required), (2) Evidence completeness by task type (tests require TestOutput, CLI requires TerminalRecording), (3) File existence and size (catch missing/empty files). This reuses existing validateUiEvidenceHasAppProof logic and adds file checks via Node.js fs.promises. Meets <500ms latency requirement while catching 90% of quality issues.

  ### 3. Retry Limit Configuration

  **Chosen:** Configurable limit via settings.workflow.evidenceRetries (default 3)

  **Rejected:**
  - Fixed limit hardcoded as constant — Less flexible, cannot be tuned per user/repo.
  - Unlimited retries until success — Could lead to infinite loops when evidence collection fundamentally cannot succeed.

  **Rationale:** Settings-based configuration follows the established pattern (ciMaxFixAttempts for CI fix loop). Default of 3 retries matches validate/repair pattern and balances quality improvement with bounded execution time. Most evidence issues are fixable in 1-2 retries; environmental failures won't be resolved by more retries.

  ### 4. Validation Feedback for Retries

  **Chosen:** Structured validation feedback augmenting the retry prompt

  **Rejected:**
  - Generic retry prompt (same prompt every time) — Gives the agent no context about what failed, leading to repeated mistakes.
  - Validation errors only in logs (not in prompt) — The agent would have no way to see what failed.

  **Rationale:** Structured feedback enables targeted fixes by telling the agent exactly what's missing. We follow the repair.node.ts pattern where buildRepairPrompt augments the prompt with validation errors. For evidence retries, we create buildEvidenceRetryPrompt that adds a "Validation Feedback" section listing specific failures (e.g., "Missing app-level screenshot for task-3 (UI task)").

  ### 5. File Validation Scope — How Deep to Inspect

  **Chosen:** File existence + metadata validation (no content parsing)

  **Rejected:**
  - Metadata-only (no file checks) — Would miss missing/empty files. Spec FR-5 explicitly requires file existence checks.
  - Deep content inspection (parse images, analyze test output) — Violates NFR-1 <500ms requirement, requires dependencies like sharp, complex test output parsers.

  **Rationale:** File existence + metadata is the sweet spot. We use fs.promises.stat() to verify each Evidence record's relativePath exists and has size > 0. Fast (<1ms per file), catches 90% of issues, no added dependencies. Agent descriptions are sufficient for intent — we don't need to parse image contents or verify test output format.

  ### 6. Retry Exhaustion Handling

  **Chosen:** Log warnings and proceed with partial evidence (graceful degradation)

  **Rejected:**
  - Throw error and block merge — Violates FR-8 and FR-13 graceful degradation requirements.
  - Trigger human-in-the-loop approval (LangGraph interrupt) — Adds interaction overhead. Spec resolved against HITL.

  **Rationale:** Graceful degradation preserves "evidence is best-effort" philosophy. After exhausting retries: (1) Accept whatever evidence was captured, (2) Log detailed validation failures to state.messages[] at ERROR level, (3) Proceed to merge with partial evidence, (4) Include warnings in PR body, (5) Rely on human reviewers to assess evidence quality. This maintains FR-8 while providing visibility into quality issues.

  ### 7. Retry Tracking — New Channel vs Reuse validationRetries

  **Chosen:** Add new evidenceRetries state channel

  **Rejected:**
  - Reuse validationRetries channel — Would conflict with YAML validation retries (validate.node.ts and repair.node.ts). Mixing them makes debugging harder and could cause subtle bugs.

  **Rationale:** A dedicated evidenceRetries channel provides clean separation of concerns. We add it to FeatureAgentAnnotation following the existing pattern: evidenceRetries: Annotation<number>({ reducer: (_prev, next) => next, default: () => 0 }). Mirrors validationRetries and ciFixAttempts. Keeps evidence retry logic independent of YAML validation.

  ### 8. Phase Timing Tracking for Retry Attempts

  **Chosen:** Record each retry as separate phase activity (evidence:attempt-N)

  **Rejected:**
  - Single phase activity for entire evidence collection — Would not expose retry iteration count or per-attempt timing. Spec FR-12 explicitly requires separate activities for each attempt.
  - Record retries as sub-phases within a parent activity — Requires extending the phase timing schema to support hierarchical activities.

  **Rationale:** Separate phase activities provide full visibility into retry loop performance. We wrap each evidence collection attempt in recordPhaseStart / recordPhaseEnd with phase names like 'evidence:attempt-1', 'evidence:attempt-2', etc. Creates separate rows in PhaseTiming table, enabling analysis like "how many retries typically happen?" Matches existing iteration tracking for approval rejection loops (requirements:2, plan:2).

  ### 9. Task Type Inference for Completeness Validation

  **Chosen:** Parse tasks.yaml to infer task types from descriptions/acceptance criteria

  **Rejected:**
  - Hardcoded task type detection (regex on task titles) — Too brittle. Task titles vary widely.
  - Require explicit taskType field in tasks.yaml schema — Breaks backward compatibility.
  - Skip completeness validation entirely — Spec question resolved in favor of comprehensive validation including completeness checks.

  **Rationale:** Parsing tasks.yaml and inferring task types from text content is practical without schema changes. We read tasks.yaml, parse with js-yaml, and classify tasks by analyzing: (1) UI tasks: mentions "component", "UI", "page", "style" in description/criteria; (2) Test tasks: mentions "test", "spec" OR tdd field is non-null; (3) CLI tasks: mentions "CLI", "command", "terminal". Then validate completeness: UI tasks need Screenshot with app-level proof, Test tasks need TestOutput, CLI tasks need TerminalRecording.

  ## Library Analysis

  | Library | Purpose | Decision | Reasoning |
  | ------- | ------- | -------- | --------- |
  | Node.js fs/promises | Async file existence checks (fs.stat, fs.access) | Use | Built-in, zero dependencies, fast, proven. Used for FR-5 file existence validation. |
  | js-yaml | Parse tasks.yaml for completeness validation | Use | Already a dependency, used throughout codebase for YAML parsing. Needed to read tasks for task type inference. |
  | sharp / jimp | Image parsing for deep content inspection | Reject | Not needed. Spec resolution chose file existence + metadata over deep inspection. Would violate NFR-1 <500ms latency. |
  | Vitest | Unit and integration testing | Use | Already the test framework. Comprehensive tests required per NFR-6 (>90% branch coverage). |
  | LangGraph | StateGraph, Annotation for state channels | Use | Core framework. Add evidenceRetries channel, modify evidence.node.ts retry loop. |

  ## Security Considerations

  ### Path Traversal Prevention

  **Risk:** Agent could generate Evidence records with malicious relativePath values like `../../etc/passwd`.

  **Mitigation:** The existing parseEvidenceRecords function already filters records with `..` in relativePath (line 31 of evidence-output-parser.ts). File existence validation will use path.resolve() to normalize paths before fs.stat() to ensure we're checking files within the expected evidence directory. No additional changes needed.

  ### Sensitive Data in Evidence Files

  **Risk:** Evidence files (screenshots, terminal recordings) might contain API keys, tokens, or secrets.

  **Mitigation:** The existing evidence prompt already includes "Sensitive Data Redaction" instructions telling the agent to redact secrets. Validation does not add new risks here — we're only checking file existence, not reading content. If evidence contains secrets, that's a capture-time issue, not a validation-time issue. No additional mitigations needed for validation phase.

  ### File System Access

  **Risk:** fs.stat() calls could fail due to permission errors or ENOENT.

  **Mitigation:** All fs.stat() calls will be wrapped in try/catch blocks per NFR-10. Permission errors and ENOENT will be caught gracefully and returned as validation errors (e.g., "Evidence file not accessible: <path>"). The validation will never crash on file system errors.

  ## Performance Implications

  ### Validation Latency

  **Requirement:** NFR-1 requires <500ms validation latency for typical evidence sets (10-20 records).

  **Analysis:**
  - UI validation (validateUiEvidenceHasAppProof): In-memory regex checks, <1ms total
  - Completeness validation: Iterating over tasks and evidence, in-memory comparison, <5ms for typical task count (10-20 tasks)
  - File existence validation: fs.stat() typically <1ms per file on modern SSDs. For 20 evidence files, ~20ms total. May be slower on network file systems or spinning disks, but still well under 500ms.

  **Conclusion:** Total validation latency estimate for 20 evidence records: <30ms on typical hardware. Comfortably meets NFR-1 requirement.

  ### Retry Overhead

  **Analysis:** Each retry involves re-running the evidence collection agent (executor.execute), which is expensive (could take 30-60 seconds per attempt depending on dev server startup, browser automation, test suite execution). With default 3 retry limit, worst case is 3 × 60s = 3 minutes of additional execution time. This is acceptable because: (1) Retries only happen when validation fails (not on the success path), (2) The alternative is shipping insufficient evidence to the PR, requiring manual evidence collection by the user, (3) The retry limit prevents runaway execution.

  ### State Channel Overhead

  **Analysis:** Adding evidenceRetries channel adds one integer field to graph state. Negligible memory and serialization overhead. LangGraph state snapshots will include this field, adding ~10 bytes to checkpoint size. Acceptable.

  ## Architecture Notes

  ### Integration with Existing Evidence Flow

  **Current Flow:**
  1. evidence.node.ts executes agent with buildEvidencePrompt
  2. Agent captures evidence files, outputs JSON manifest
  3. parseEvidenceRecords extracts Evidence[] from output
  4. validateUiEvidenceHasAppProof runs (warnings only, no retry)
  5. State update returns { evidence, messages }
  6. Graph transitions to merge node

  **New Flow with Validation Loop:**
  1. evidence.node.ts starts evidence collection loop (attemptNumber = 1)
  2. **Loop iteration:**
     - recordPhaseStart(`evidence:attempt-${attemptNumber}`)
     - Execute agent with buildEvidencePrompt (attempt 1) or buildEvidenceRetryPrompt (retries, includes validation errors)
     - parseEvidenceRecords extracts Evidence[]
     - **NEW:** validateEvidenceCompleteness(evidence, tasks) returns ValidationResult
     - If validation passes: recordPhaseEnd, markPhaseComplete, return { evidence, messages }
     - If validation fails and attemptNumber < MAX_RETRIES: recordPhaseEnd, increment attemptNumber, append validation errors to feedback, continue loop
     - If validation fails and attemptNumber >= MAX_RETRIES: recordPhaseEnd, log warnings to messages[], return { evidence, messages } (graceful degradation)
  3. Graph transitions to merge node (same as before)

  **Key Points:**
  - No new graph nodes or edges required
  - Reuses existing helpers (retryExecute pattern, recordPhase, markPhaseComplete)
  - Validation is a new pure function: validateEvidenceCompleteness(evidence: Evidence[], tasks: TasksYaml): ValidationResult
  - Retry prompt builder is new: buildEvidenceRetryPrompt(state, validationErrors): string
  - File existence validation is new: validateFileExistence(evidence: Evidence[]): Promise<string[]>

