# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is structured as a bottom-up build across 5 phases with
  14 tasks totaling approximately 8.5 hours of focused development.

  First, we extend the TypeSpec settings schema and LangGraph state with the
  evidenceRetries configuration and channel (Phase 1 — foundation). Then we
  build the pure validation functions — task type inference, evidence
  completeness checking, and file existence verification — all thoroughly
  unit tested via TDD (Phase 2 — the validation engine). Next we create the
  retry prompt builder that augments evidence prompts with structured
  validation feedback (Phase 3). With all building blocks in place, we
  integrate the validation loop into createEvidenceNode with per-attempt
  phase timing tracking (Phase 4 — the core integration). Finally, we add
  integration tests covering retry success, exhausted retries with graceful
  degradation, and phase activity recording, then run full verification
  (Phase 5).

  Each phase builds on the prior phase's output. Pure functions are tested
  in isolation before integration. The validation loop follows established
  patterns (retryExecute for agent retries, validate/repair for feedback
  loops). No new graph nodes are added — the loop is internal to
  createEvidenceNode. Evidence accumulates across retries (state uses
  accumulate reducer). Graceful degradation is preserved — validation never
  blocks the merge phase.
