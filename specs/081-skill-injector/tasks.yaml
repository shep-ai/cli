content: |
  ## Summary

  The implementation spans 14 tasks across 5 phases, building the feature bottom-up from
  domain types through to CLI integration. Phase 1 establishes the TypeSpec foundation that
  all other code depends on. Phase 2 defines the port contract. Phase 3 is the heaviest,
  implementing the core service logic with 6 tasks covering local copy, idempotency, remote
  npx, .gitignore management, security validation, and DI registration. Phase 4 handles
  persistence mechanics. Phase 5 wires everything together in the use case and CLI.

  The dependency graph ensures no task is started before its prerequisites are complete.
  Tasks within the same phase can sometimes be parallelized (e.g., task-10 and task-12
  only depend on task-1, not on each other), though the recommended execution order is
  sequential for clean TDD flow.

  Every code task follows RED-GREEN-REFACTOR: write a failing test first, implement the
  minimum code to pass, then clean up. The infrastructure service tests use vi.mock for
  fs/promises and mock ExecFunction injection, following the existing test patterns in
  worktree.service.test.ts.
