oneLiner: "Inject curated agent skills into worktrees during feature creation, with idempotency and commit prevention"
summary: >
  Add a skill injection system that copies curated Claude Code skills into
  feature worktrees during CreateFeatureUseCase execution. Skills are sourced
  from a configurable registry of local paths and remote packages (via npx
  skills add). The injector skips skills already present, ensures injected
  files are never committed via .gitignore management, and is opt-in by
  default (controlled via a Settings field). The system follows existing
  Clean Architecture patterns with a port interface, infrastructure service,
  DI registration, and TypeSpec-first domain modeling.
phase: Requirements
sizeEstimate: M

