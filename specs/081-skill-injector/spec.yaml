  ## Dependencies

  - **TypeSpec compiler** (`pnpm tsp:compile`) — Required to regenerate domain types after settings.tsp changes
  - **npx skills add** — Third-party CLI tool for remote skill installation (must be available at runtime; graceful degradation if absent)
  - **Settings migration system** — Existing SQLite migration pattern for adding new columns
  - **CreateFeatureUseCase** — Integration point for injection logic in initializeAndSpawn()
  - **SpecInitializerService** — Pattern reference for filesystem service design; injection runs after spec init
  - **IWorktreeService** — Provides worktree path resolution (already injected into CreateFeatureUseCase)
  - **Logger** — Existing structured logging for injection result reporting

  ## Size Estimate

  **M** — This feature requires changes across multiple architecture layers
  (TypeSpec, domain, application port, infrastructure service, DI, migration,
  mapper, use case integration, CLI flag) but each individual change is
  well-scoped and follows established patterns. The core logic (copy files,
  run npx, update .gitignore) is straightforward. The main complexity is
  ensuring proper Clean Architecture layering, cross-platform path handling,
  and comprehensive test coverage for idempotency and .gitignore management.

  Estimated scope: 13 functional requirements, 9 non-functional requirements,
  ~15 files touched across 4 architecture layers.
