  | `packages/core/src/domain/factories/settings-defaults.factory.ts` | Medium | Default skill list populated here |
  | `packages/core/src/application/ports/output/services/` | High | New ISkillInjectorService port interface |
  | `packages/core/src/application/use-cases/features/create/create-feature.use-case.ts` | High | Calls skill injector in initializeAndSpawn() |
  | `packages/core/src/application/use-cases/features/create/types.ts` | Low | Optional injectSkills flag on CreateFeatureInput |
  | `packages/core/src/infrastructure/services/` | High | New SkillInjectorService implementation |
  | `packages/core/src/infrastructure/di/container.ts` | Low | Register ISkillInjectorService binding |
  | `packages/core/src/infrastructure/persistence/sqlite/migrations/` | Medium | New migration for skill_injection columns |
  | `packages/core/src/infrastructure/persistence/sqlite/mappers/settings.mapper.ts` | Medium | Map new Settings fields to/from SQLite |
  | `src/presentation/cli/commands/feat/new.command.ts` | Low | --inject-skills / --no-inject-skills flag |
  | `.gitignore` | None | Not modified globally; .gitignore changes are per-worktree |

  ## Dependencies

  - **TypeSpec compiler** (`pnpm tsp:compile`) - Required to regenerate domain types
  - **npx skills add** - Third-party CLI tool for remote skill installation (must be available at runtime)
  - **Settings migration system** - Existing SQLite migration pattern for adding new columns
  - **CreateFeatureUseCase** - Integration point for injection logic
  - **SpecInitializerService** - Pattern reference for filesystem service design

  ## Size Estimate

  **M** - This feature requires changes across multiple architecture layers
  (TypeSpec, domain, application port, infrastructure service, DI, migration,
  mapper, use case integration, CLI flag) but each individual change is
  well-scoped. The core logic (copy files, run npx, update .gitignore) is
  straightforward. The main complexity is ensuring proper Clean Architecture
  layering, cross-platform path handling, and comprehensive test coverage
  for idempotency and .gitignore management.

  Estimated effort: 2-3 days including TDD cycles.

