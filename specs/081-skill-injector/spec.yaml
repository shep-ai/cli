# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When a new feature is created in Shep, the spawned agent operates inside a
  git worktree that starts as a clean branch off main. The agent has access to
  whatever skills are already committed in `.claude/skills/`, but there is no
  mechanism to automatically inject additional curated skills that would
  enhance agent effectiveness for the specific feature being developed.

  Currently, 19 skills exist in the repository's `.claude/skills/` directory
  as committed files (e.g., `architecture-reviewer`, `mermaid-diagrams`,
  `shadcn-ui`, `tsp-model`). However, there are external skills (e.g.,
  Anthropic's `frontend-design`) that must be fetched at runtime, and the
  full set of desired skills may vary per-project or per-user.

  This feature adds a **skill injector** that runs as part of feature
  creation (Phase 2 of CreateFeatureUseCase), copying/installing skills
  into the worktree's `.claude/skills/` directory while ensuring:
  1. **Idempotency** — skills already present are never re-injected
  2. **No commit pollution** — injected skills are added to `.gitignore`
  3. **Opt-in by default** — disabled unless the user enables it in Settings
  4. **Configurability** — the curated skill list is stored in Settings

  ## Success Criteria

  - [ ] SC-1: ISkillInjectorService port interface defined in application/ports/output/services/
  - [ ] SC-2: SkillInjectorService implementation in infrastructure/services/ with DI registration
  - [ ] SC-3: Skill injection executes in Phase 2 of CreateFeatureUseCase, after spec initialization and before agent spawn
  - [ ] SC-4: Local skills are deep-copied from source repo's .claude/skills/ into the worktree's .claude/skills/
  - [ ] SC-5: Remote skills are installed via npx skills add with cwd set to the worktree path
  - [ ] SC-6: Skills already present (SKILL.md exists) are skipped without error
  - [ ] SC-7: Each injected (non-tracked) skill path is appended to the worktree's .gitignore
  - [ ] SC-8: Already-tracked skills (committed in git) are NOT added to .gitignore
  - [ ] SC-9: Feature is opt-in by default (disabled unless settings.workflow.skillInjection.enabled = true)
  - [ ] SC-10: CLI flag --inject-skills / --no-inject-skills overrides the settings value per invocation
  - [ ] SC-11: SkillInjectionConfig and SkillSource TypeSpec models defined in settings.tsp
  - [ ] SC-12: SQLite migration adds skill_injection columns (enabled boolean + skills JSON)
  - [ ] SC-13: Settings mapper correctly serializes/deserializes the skill injection config
  - [ ] SC-14: Default skill list populated in createDefaultSettings() factory
  - [ ] SC-15: Remote skill installation has a 30-second timeout per skill
  - [ ] SC-16: Remote skill failures log a warning and continue (do not block feature creation)
  - [ ] SC-17: Cross-platform path handling (works on Windows, macOS, and Linux)
  - [ ] SC-18: All new code has unit tests with TDD cycles (RED-GREEN-REFACTOR)
  - [ ] SC-19: Integration test verifies end-to-end injection into a real worktree

  ## Functional Requirements

  - **FR-1: Skill Injector Service Port** — Define an `ISkillInjectorService` port interface in `application/ports/output/services/` with a single `inject(worktreePath: string, settings: SkillInjectionConfig): Promise<SkillInjectionResult>` method. The result includes counts of injected, skipped, and failed skills plus a list of warnings.

  - **FR-2: Local Skill Injection** — For each skill with `type: "local"`, deep-copy the skill directory from the configured source path into `<worktreePath>/.claude/skills/<name>/`. Use `fs/promises` recursive copy. Preserve directory structure including subdirectories (templates/, examples/, scripts/, references/).

  - **FR-3: Remote Skill Injection** — For each skill with `type: "remote"`, execute `npx skills add <source> --skill <remoteSkillName>` with `cwd` set to the worktree path. Capture stdout/stderr for logging. Apply a 30-second timeout per invocation.

  - **FR-4: Idempotency Check** — Before injecting any skill (local or remote), check if `<worktreePath>/.claude/skills/<name>/SKILL.md` exists. If it does, skip that skill and record it in the "skipped" count. Do not compare versions or overwrite.

  - **FR-5: Git Ignore Management** — After all injections complete, read the worktree's `.gitignore` file (create if absent). For each skill that was actually injected (not skipped), check if its path (`.claude/skills/<name>/`) is already in `.gitignore`. If not, append it. Do NOT add entries for skills that are already tracked in git (use `git ls-files` to check).

  - **FR-6: CreateFeatureUseCase Integration** — Inject a call to `ISkillInjectorService.inject()` in the `initializeAndSpawn()` method of CreateFeatureUseCase, positioned after `SpecInitializerService.initialize()` completes and before the agent spawn step. Guard the call with a check: run injection only if the resolved `injectSkills` flag is true (from CLI override or settings).

  - **FR-7: Settings Domain Model** — Add `skillInjection?: SkillInjectionConfig` to `WorkflowConfig` in the TypeSpec Settings entity. `SkillInjectionConfig` has `enabled: boolean` (default false) and `skills: SkillSource[]` (default empty). `SkillSource` has `name: string`, `type: "local" | "remote"`, `source: string`, and `remoteSkillName?: string`.

  - **FR-8: Settings Persistence** — Add a SQLite migration that creates two new columns on the settings table: `skill_injection_enabled` (INTEGER, default 0) and `skill_injection_skills` (TEXT, nullable, JSON array). Update the settings mapper to serialize/deserialize `SkillInjectionConfig` to/from these columns.

  - **FR-9: Settings Defaults** — Populate `createDefaultSettings()` with a default skill list containing Shep's curated skills: local skills (architecture-reviewer, cross-validate-artifacts, mermaid-diagrams, react-flow, shadcn-ui, tsp-model, vercel-react-best-practices) and any configured remote skills. The `enabled` field defaults to `false`.

  - **FR-10: CLI Flag** — Add `--inject-skills` and `--no-inject-skills` options to `shep feat new`. When provided, this overrides `settings.workflow.skillInjection.enabled` for that single invocation. When omitted, the settings value is used.

  - **FR-11: CreateFeatureInput Extension** — Add an optional `injectSkills?: boolean` field to `CreateFeatureInput` in the use case types. The CLI resolves this from the flag or leaves undefined to fall back to settings.

  - **FR-12: Injection Result Reporting** — The skill injector returns a structured result: `{ injected: string[], skipped: string[], failed: Array<{ name: string, error: string }> }`. The use case logs this result at info level (injected count) and warn level (any failures).

  - **FR-13: .claude/skills Directory Bootstrapping** — If `<worktreePath>/.claude/skills/` does not exist, create it before attempting any skill injection. Handle the case where `.claude/` itself does not exist.

  ## Non-Functional Requirements

  - **NFR-1: Performance** — Skill injection must not add more than 5 seconds to feature creation for local-only skill sets (file copying). Remote skill installation time is bounded by the 30-second per-skill timeout. Total injection should not block the critical path unnecessarily — local and remote skills can be processed sequentially since the total count is small (< 20).

  - **NFR-2: Cross-Platform Compatibility** — All file paths must use `path.join()` or `path.resolve()`, never hardcoded separators. File copy operations must handle Windows, macOS, and Linux filesystem semantics. The `npx` command must be resolved correctly on all platforms (use `npx.cmd` on Windows if needed, or rely on cross-spawn patterns).

  - **NFR-3: Error Isolation** — A failure in skill injection must never prevent feature creation from completing. The injector is a best-effort enhancement. If the entire injection process throws, the use case catches the error, logs a warning, and continues with agent spawn.

  - **NFR-4: Clean Architecture Compliance** — The skill injector must follow the established port/adapter pattern: interface in `application/ports/output/services/`, implementation in `infrastructure/services/`, registration in the DI container. The use case must only depend on the port interface, never the implementation.

  - **NFR-5: Testability** — The port interface must be easily mockable for unit testing the CreateFeatureUseCase integration. The SkillInjectorService implementation must accept injected dependencies (filesystem abstraction, child process executor) to enable isolated unit testing without actual file operations or npx calls.

  - **NFR-6: Logging** — All injection operations must produce structured log output: skill name, type, action taken (injected/skipped/failed), and timing. Use the existing logger infrastructure. Warnings for failures must include the error message and stack trace.

  - **NFR-7: Idempotency Guarantee** — Running feature creation twice with the same skill configuration must produce identical results. The second run must skip all previously injected skills. The .gitignore must not accumulate duplicate entries.

  - **NFR-8: Security** — Remote skill sources execute arbitrary npx commands. The skill list comes from Settings (user-configured), not untrusted input. However, the implementation should validate that `source` values do not contain shell injection characters. Use `child_process.execFile` or `execa` instead of `child_process.exec` to avoid shell interpolation.

  - **NFR-9: Disk Space** — Local skill directories are typically small (< 100KB each). Deep copying 10-20 skills adds < 2MB per worktree. This is negligible relative to worktree size. No disk space optimization is needed.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should skill injection be opt-in or opt-out? | Opt-in (disabled by default) | Injecting files is side-effectful; existing users should not see unexpected changes on upgrade |
  | 2 | Where should skillInjection config live? | Under workflow (WorkflowConfig) | Skill injection is a workflow step, alongside ciWatch, approvalGates, and evidence settings |
  | 3 | How should the skill registry be stored in SQLite? | JSON column | Skills list is always read/written as a whole; JSON avoids separate table complexity |
  | 4 | Should the CLI expose per-invocation overrides? | Yes, --inject-skills / --no-inject-skills | Follows --fast/--no-fast pattern; minimal implementation cost |
  | 5 | How should remote skill failures be handled? | Log warning and continue | Skills are enhancements, not prerequisites; network issues should not block work |
  | 6 | Should the injector handle version updates? | No, skip if present | Strict idempotency is simplest and safest; version management is a follow-up feature |
  | 7 | Should there be a timeout for remote installs? | Yes, 30 seconds per skill | Prevents hanging on network issues; generous enough for normal npm operations |
  | 8 | Should local skills use copy or symlinks? | Copy files | Cross-platform reliability, isolation from source edits, simpler .gitignore handling |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `tsp/domain/entities/settings.tsp` | High | New SkillInjectionConfig, SkillSource, and SkillSourceType models added to WorkflowConfig |
  | `packages/core/src/domain/generated/output.ts` | High | Regenerated from TypeSpec (new types) |
  | `packages/core/src/domain/factories/settings-defaults.factory.ts` | Medium | Default skill list and enabled=false populated here |
  | `packages/core/src/application/ports/output/services/` | High | New ISkillInjectorService port interface |
  | `packages/core/src/application/use-cases/features/create/create-feature.use-case.ts` | High | Calls skill injector in initializeAndSpawn() after spec init |
  | `packages/core/src/application/use-cases/features/create/types.ts` | Low | Optional injectSkills field on CreateFeatureInput |
  | `packages/core/src/infrastructure/services/` | High | New SkillInjectorService implementation |
  | `packages/core/src/infrastructure/di/container.ts` | Low | Register ISkillInjectorService binding |
  | `packages/core/src/infrastructure/persistence/sqlite/migrations/` | Medium | New migration for skill_injection_enabled and skill_injection_skills columns |
  | `packages/core/src/infrastructure/persistence/sqlite/mappers/settings.mapper.ts` | Medium | Map new skillInjection fields to/from SQLite columns |
  | `src/presentation/cli/commands/feat/new.command.ts` | Low | --inject-skills / --no-inject-skills flag |
