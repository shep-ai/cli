content: |
  ## Summary

  This task breakdown covers 16 tasks across 5 phases, implementing Coasts
  containerized runtime isolation for Shep's dev server behind a feature flag.

  The work begins with the feature flag foundation (Phase 1) — wiring
  coastsDevServer through the established 8-step pattern: TypeSpec model,
  SQLite migration, settings mapper, settings repository, feature-flags
  resolution, React context, and UI toggle. This is well-patterned S-sized
  work that produces a visible UI toggle early.

  Next, the ICoastsService interface is defined in the application layer
  (Phase 2), establishing the contract with all 10 method signatures and
  the PrerequisiteCheckResult/CoastInstance types before any infrastructure
  work begins.

  The infrastructure phase (Phase 3) is the heaviest — implementing
  CoastsService with parallel prerequisite checks, six coast CLI operation
  methods, installation prompt caching, and AI-powered Coastfile generation
  via IStructuredAgentCaller. Each method is independently unit-testable
  with mocked ExecFunction. DI container registration follows factory pattern.

  Phase 4 integrates everything into dev-server.ts with a single branching
  point after DI initialization. The Coasts path runs prerequisites, detects
  or generates a Coastfile, builds and runs via coast CLI. The shutdown
  handler gains coastsService.stop() for cleanup. The bare Next.js path
  remains completely unchanged per NFR-1. A dev:coasts convenience script
  is added to package.json.

  Finally, integration tests (Phase 5) verify the full branching logic for
  both flag states, prerequisite failures, and Coastfile generation flow.
  The validation suite confirms zero regressions across the entire codebase.
