summary: >
  Integrate the Coasts (coasts.dev) containerized runtime system as an alternative dev server mode
  for Shep. Coasts provides per-worktree runtime isolation via Docker containers, automatic port
  management, and service orchestration — enabling parallel feature development without port
  conflicts or shared state. A new feature flag toggles between the current bare Next.js dev
  server and the Coasts-managed mode. The feature adds a new infrastructure service wrapping the
  coast CLI, a Coastfile template for the Shep project, and branching logic in the dev server
  entrypoint.
