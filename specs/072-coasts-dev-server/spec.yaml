  - question: 'Should the dev server manage the coastd daemon lifecycle (auto-start/stop) or require the user to start it manually?'
    resolved: true
    options:
      - option: 'Manual daemon management'
        description: >
          Require the user to run `coastd` before starting the dev server. Simplest
          implementation — just check the socket exists and fail with a helpful message
          if not. Avoids complex process management and background daemon ownership issues.
          Users control when the daemon runs and stops.
        selected: true
      - option: 'Auto-start daemon on dev server launch'
        description: >
          Automatically start coastd if not running when the dev server starts. Adds
          convenience but introduces complexity: who owns the process? When does it stop?
          Risk of orphan daemons. Would need health-check retry logic and graceful
          fallback if the daemon fails to start.
        selected: false
      - option: 'Hybrid — auto-start with user opt-out'
        description: >
          Auto-start by default with a setting to disable it. Maximum convenience but
          maximum complexity. Adds another setting to manage and test.
        selected: false
    selectionRationale: >
      Manual daemon management is recommended because coastd is an external Rust binary
      with its own lifecycle. Auto-starting it from Node.js introduces process ownership
      ambiguity, orphan daemon risk, and complex error recovery. A clear prerequisite
      check with a helpful error message is the simplest, most reliable approach. Power
      users who want auto-start can configure their shell profile or use a process manager.
    answer: 'Manual daemon management'

