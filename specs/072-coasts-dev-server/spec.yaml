    answer: 'Bootstrap DI on host, delegate Next.js to coast'

content: |
  ## Problem Statement

  The current Shep dev server (`dev-server.ts`) runs Next.js directly on the host machine. When
  developers work on multiple features in parallel using git worktrees, each worktree's dev server
  competes for the same ports (default 3000) and shares the same SQLite database and background
  services. The current workaround is manual port incrementing via `findAvailablePort()`, but this
  doesn't isolate databases, services, or environment state.

  Coasts (https://coasts.dev) solves this by providing containerized runtime isolation per worktree.
  Each "coast" instance gets its own ports, volumes, services, and network — enabling true parallel
  development. This feature adds Coasts as an optional dev server mode behind a feature flag,
  scoped to the dev server entrypoint only (not production `shep ui`).

  ## Success Criteria

  - [ ] A `coastsDevServer` boolean feature flag exists in the TypeSpec FeatureFlags model and is persisted in SQLite
  - [ ] The feature flag toggle appears in the web UI settings page under Feature Flags
  - [ ] The feature flag defaults to `false` (opt-in)
  - [ ] When the flag is `false`, the dev server behaves identically to the current implementation (no regression)
  - [ ] When the flag is `true` and all prerequisites are met, the dev server starts Next.js via `coast run` instead of bare `next()`
  - [ ] When the flag is `true` but prerequisites are missing (no coast binary, no Docker, no coastd), the dev server exits with a non-zero code and a human-readable error listing missing prerequisites and installation instructions
  - [ ] A `CoastsService` infrastructure service exists with methods for: `checkPrerequisites`, `build`, `run`, `stop`, `lookup`, and `isRunning`
  - [ ] The `CoastsService` is registered in the DI container and accessed via an `ICoastsService` interface
  - [ ] A template `Coastfile` is auto-generated in the project root when the flag is enabled and no Coastfile exists
  - [ ] The generated Coastfile isolates the Next.js port (3000) and SQLite database per worktree
  - [ ] Graceful shutdown in Coasts mode stops the coast instance before exiting
  - [ ] A `pnpm dev:coasts` script exists as a convenience alias for running the dev server with the Coasts flag enabled
  - [ ] Unit tests exist for all `CoastsService` methods with subprocess mocking
  - [ ] Integration tests verify the dev-server branching logic for both flag states
  - [ ] All existing tests continue to pass (zero regressions)

  ## Functional Requirements

  - **FR-1: Feature flag definition** — Add a `coastsDevServer: boolean = false` field to the `FeatureFlags` model in `tsp/domain/entities/settings.tsp`. Run `pnpm tsp:compile` to regenerate `output.ts`. Add the corresponding SQLite migration column.

  - **FR-2: Feature flag resolution** — Add `coastsDevServer` to the `FeatureFlagsState` interface in `feature-flags.ts` with DB-primary resolution and env-var fallback via `NEXT_PUBLIC_FLAG_COASTS_DEV_SERVER`. Default to `false`.

  - **FR-3: Feature flag UI** — Add a "Coasts Dev Server" toggle to the feature flags settings section in the web UI. The toggle must follow the existing pattern: entry in `FLAG_DESCRIPTIONS`, `FLAG_LABELS`, and `FLAG_KEYS` arrays.

  - **FR-4: Feature flag context** — Add `coastsDevServer: false` to the default flags in `feature-flags-context.tsx`.

  - **FR-5: ICoastsService interface** — Define an `ICoastsService` output port interface in `packages/core/src/application/ports/output/services/` with the following methods:
    - `checkPrerequisites(): Promise<PrerequisiteCheckResult>` — checks for coast binary, Docker, and running coastd daemon
    - `build(workDir: string): Promise<void>` — runs `coast build` in the given directory
    - `run(workDir: string): Promise<CoastInstance>` — runs `coast run` and returns instance info
    - `stop(workDir: string): Promise<void>` — stops the coast instance for the given directory
    - `lookup(workDir: string): Promise<CoastInstance | null>` — looks up running instance
    - `isRunning(workDir: string): Promise<boolean>` — checks if an instance is running for this worktree
    - `checkout(workDir: string): Promise<void>` — assigns canonical ports to this worktree's instance

  - **FR-6: CoastsService implementation** — Implement `CoastsService` in `packages/core/src/infrastructure/services/coasts.service.ts`. Each method invokes the `coast` CLI binary via `child_process.spawn`. Parse JSON output where available, fall back to exit code + stderr for error detection.

  - **FR-7: DI registration** — Register `CoastsService` as the `ICoastsService` token in the DI container (`container.ts`).

  - **FR-8: Coastfile template** — Create a Coastfile template that defines:
    - Port 3000 (Next.js dev server) as the primary canonical port
    - A volume mount for the SQLite database directory (`~/.shep/repos/<hash>/`)
    - Setup commands for `pnpm install` and any build prerequisites
    - The template is written to the project root as `Coastfile` when missing

  - **FR-9: Dev server branching logic** — Modify `dev-server.ts` to read the `coastsDevServer` feature flag after DI initialization. If enabled:
    1. Resolve `ICoastsService` from the DI container
    2. Run `checkPrerequisites()` — if any fail, log the error and `process.exit(1)`
    3. Check for existing `Coastfile` — if missing, generate from template
    4. Run `coast build` if needed (image not built or Coastfile changed)
    5. Run `coast run` or `coast checkout` to start/activate the instance
    6. Log the Coasts-managed URL to the console
    7. If disabled (default), proceed with the existing bare Next.js startup path unchanged

  - **FR-10: Graceful shutdown in Coasts mode** — The `shutdown` handler in dev-server.ts must detect Coasts mode and call `coastsService.stop()` before exiting. The 2-second force-exit timeout must still apply.

  - **FR-11: Convenience script** — Add `"dev:coasts": "NEXT_PUBLIC_FLAG_COASTS_DEV_SERVER=true pnpm dev:web"` to `package.json` scripts.

  - **FR-12: Prerequisite check detail** — The `PrerequisiteCheckResult` type must include:
    - `coastBinary: boolean` — whether `coast` is on PATH
    - `docker: boolean` — whether Docker daemon is reachable
    - `coastdRunning: boolean` — whether coastd Unix socket responds
    - `allMet: boolean` — convenience AND of all checks
    - `missingMessages: string[]` — human-readable list of what's missing with fix instructions

  ## Non-Functional Requirements

  - **NFR-1: Zero regression** — When the `coastsDevServer` flag is `false` (default), the dev server must behave identically to the pre-feature implementation. No new imports, checks, or side effects on the default path beyond reading the flag value.

  - **NFR-2: Startup latency** — The prerequisite check (FR-12) must complete within 2 seconds. Each check (coast binary, Docker, coastd) should use a short timeout (500ms) to avoid blocking startup.

  - **NFR-3: Clean Architecture compliance** — The `ICoastsService` interface lives in the application layer. The `CoastsService` implementation lives in the infrastructure layer. No direct subprocess calls from the presentation layer.

  - **NFR-4: Error message quality** — All error messages from failed prerequisites must include:
    (a) what is missing, (b) how to install/fix it, and (c) a link to relevant documentation.
    Example: "coastd daemon is not running. Start it with: coastd &. See https://coasts.dev/docs/daemon"

  - **NFR-5: Subprocess safety** — All coast CLI invocations must:
    - Use `spawn` (not `exec`) to avoid shell injection
    - Set a timeout (30 seconds for build, 10 seconds for other commands)
    - Capture and log stderr on failure
    - Handle ENOENT (binary not found) gracefully

  - **NFR-6: Testability** — `CoastsService` must accept injected dependencies for the subprocess spawner, enabling unit tests to mock all CLI interactions without requiring coast/Docker to be installed.

  - **NFR-7: Idempotent operations** — `coast build` and `coast run` must be safe to call when the image is already built or the instance is already running. The service must check state before invoking and handle "already running" responses gracefully.

  - **NFR-8: Platform scope** — V1 targets macOS and Linux only. Windows is explicitly out of scope (Coasts uses Unix sockets and socat). The prerequisite check should detect Windows and fail with "Coasts dev server is not supported on Windows".

  - **NFR-9: Feature flag env var** — The environment variable fallback must follow the existing naming convention: `NEXT_PUBLIC_FLAG_COASTS_DEV_SERVER`.

  - **NFR-10: Logging consistency** — All Coasts-mode log messages must use the `[dev-server:coasts]` prefix to distinguish them from bare-mode `[dev-server]` messages.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should Shep manage the coastd daemon lifecycle? | Manual management | coastd is an external binary with its own process model; auto-starting introduces orphan risk and ownership ambiguity |
  | 2 | Should Shep auto-generate a Coastfile? | Auto-generate from template | Reduces friction for the common case; template encodes Shep-specific defaults; file remains editable |
  | 3 | What isolation scope for V1? | Ports and SQLite only | Minimum viable isolation solving the stated problem; watchers and services don't suffer cross-worktree interference |
  | 4 | How to handle missing prerequisites? | Fail fast with actionable error | Silent fallback would mask config issues; explicit errors with install instructions are safest |
  | 5 | Should the flag affect production mode too? | Dev server only | Problem is dev-only (worktree parallelism); production doesn't face port/state conflicts |
  | 6 | CLI subprocess or HTTP API? | Coast CLI subprocess | CLI is the public API; HTTP protocol is internal; CLI handles auth, config, error formatting |
  | 7 | Where to bootstrap DI in Coasts mode? | Host-side DI, delegate Next.js to coast | Watchers need host git/GitHub access; container-only approach requires complex volume/credential forwarding |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `tsp/domain/entities/settings.tsp` | Medium | Add `coastsDevServer` boolean to FeatureFlags model |
  | `src/presentation/web/lib/feature-flags.ts` | Medium | Add coastsDevServer flag to FeatureFlagsState interface and resolution |
  | `src/presentation/web/hooks/feature-flags-context.tsx` | Low | Add default for new flag |
  | `src/presentation/web/components/features/settings/feature-flags-settings-section.tsx` | Low | Add toggle entry for coastsDevServer flag |
  | `src/presentation/web/dev-server.ts` | High | Branch startup logic: if flag enabled, invoke coast CLI instead of bare Next.js |
  | `packages/core/src/infrastructure/di/container.ts` | Low | Register CoastsService |
  | `packages/core/src/application/ports/output/services/` | Medium | New ICoastsService interface for coast CLI interaction |
  | `packages/core/src/infrastructure/services/` | High | New coasts.service.ts — wraps coast CLI (build, run, checkout, stop, lookup) |
  | Root `Coastfile` (new) | Medium | Template Coastfile for Shep project defining ports, services, setup |
  | `package.json` scripts | Low | Add `dev:coasts` script for Coasts-mode dev server |
  | SQLite migrations | Low | FeatureFlags column migration for coastsDevServer |
  | Tests | High | Unit tests for CoastsService, integration tests for flag toggle, dev-server branching |

  ## Dependencies

  - **Coasts binary** (`coast` + `coastd`): Must be installed on the host machine. The daemon must
    be running. Installation via `curl -fsSL https://coasts.dev/install | sh`.
  - **Docker**: Required by Coasts for DinD container runtime.
  - **Existing feature flag infrastructure**: TypeSpec model, settings service, flag UI components,
    and context provider are all in place — adding a new flag follows the established pattern.
  - **Existing dev-server.ts**: The branching point where Coasts mode diverges from bare mode.
  - **child_process module**: Node.js built-in, no external dependency needed for subprocess spawning.

  ## Size Estimate

  **L** — This feature involves:
  1. A new TypeSpec field + migration + flag wiring (S — well-patterned, ~30 min)
  2. A new infrastructure service wrapping the coast CLI with 7 methods (M — subprocess management, error handling, output parsing)
  3. Dev-server.ts branching logic with prerequisite checks and Coastfile generation (M — two code paths, graceful shutdown)
  4. A Coastfile template for the Shep project (S — port and SQLite volume config)
  5. Comprehensive tests for CoastsService and dev-server branching (M — subprocess mocking, flag state permutations)
  6. Seven product decisions resolved (captured above, no further blocking questions)

  The well-established feature flag pattern reduces the flag-wiring portion to S-sized work,
  but the CoastsService and dev-server branching logic are non-trivial, pushing the overall
  estimate to L. No changes to WebServerService (production) in V1.

  ---

