  ## Problem Statement

  On a new feature, clicking on rebase on main might show:
  Cannot rebase: working directory has uncommitted changes. Please commit or
  stash your changes before rebasing.

  In such case we need to run stash and pop after the rebase, if there are
  conflicts it should run agentic resolve conflict.

