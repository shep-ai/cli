content: >
  ## Problem Statement


  Attachment images referenced in feature descriptions and activity log entries
  were not rendered in the web UI. Users saw raw attachment references instead
  of the actual images in both the overview tab and the activity tab.


  ## Solution


  Created an `InlineAttachments` component that parses markdown-style image
  references and renders them as `<img>` tags using the existing
  `/api/attachments/preview` route. Updated the overview tab and activity tab
  to use this component for rendering inline attachments. Fixed the attachment
  preview API route to correctly resolve file paths after the pending directory
  rename.


  ## Success Criteria


  - [x] Inline attachment images render in the feature overview tab

  - [x] Inline attachment images render in the activity tab

  - [x] Attachment preview API route resolves paths correctly after pending dir rename

  - [x] InlineAttachments component has unit tests

  - [x] Overview tab and activity tab have updated tests

  - [x] Storybook stories exist for InlineAttachments component


  ## Affected Areas


  | Area | Impact | Reasoning |

  | ---- | ------ | --------- |

  | Web UI - Overview Tab | High | Added inline attachment rendering to feature descriptions |

  | Web UI - Activity Tab | High | Added inline attachment rendering to activity entries |

  | Attachment Preview API | Medium | Fixed path resolution after pending directory rename |

  | InlineAttachments Component | New | New reusable component for rendering inline images |


  ## Dependencies


  None.


  ## Size Estimate


  **M** - New component with tests, stories, and integration into two existing tabs
