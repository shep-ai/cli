# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation flows through six phases ordered by Clean Architecture
  dependency: domain foundation → infrastructure → application → CLI presentation
  → web presentation → test cleanup.

  Phase 1 (tasks 1–2) makes the TypeSpec change and ensures `pnpm build` is
  green before any other work begins. This is the critical path because every
  downstream file imports the generated ModelConfiguration type.

  Phase 2 (tasks 3–5) lays the infrastructure foundation in parallel-safe order:
  the migration adds the model_default column, the mapper reads/writes it, and
  the factory gains getSupportedModels. These three tasks are logically
  independent within the phase but must all complete before the application and
  presentation layers can use them.

  Phase 3 (task 6) threads the model field through the use case input DTO,
  which is the single application-layer contract consumed by both the CLI flag
  and potential future callers.

  Phase 4 (tasks 7–8) delivers the two CLI entry points: the --model flag on
  feat new (thin pass-through, no validation) and the interactive settings model
  subcommand (Inquirer prompt, DI-resolved factory, persist via use case).

  Phase 5 (tasks 9–10) delivers the web surface: the API route exposes the
  factory's static model list as JSON, and the ModelPicker component consumes it
  via a useEffect fetch and renders the shadcn combobox with free-text fallback.
  The Storybook stories are colocated and required for merge.

  Phase 6 (tasks 11–14) is a focused test cleanup sweep: unit fixtures are
  aligned with the new shape, integration tests validate the migration and mapper
  round-trips, and the e2e suite gets its fixture updates. Task 14 is the final
  gate: `pnpm test` and `pnpm validate` must both exit 0 before the branch is
  ready for PR.
