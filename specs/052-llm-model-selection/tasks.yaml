# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation flows through six phases ordered by Clean Architecture
  dependency: domain foundation → infrastructure → application → CLI presentation
  → web presentation → test cleanup.

  Phase 1 (tasks 1–2) makes the TypeSpec change and ensures `pnpm build` is
  green before any other work begins. This is the critical path because every
  downstream file imports the generated ModelConfiguration type.

  Phase 2 (tasks 3–7) lays the infrastructure foundation: the migration adds
  model_default, the mapper reads/writes it, and the factory gains
  getSupportedModels covering all four agent types — claude-code, gemini-cli,
  cursor, and dev. Cursor is explicitly covered with its own model list. Model
  flag passthrough for gemini-cli and cursor is confirmed and test-covered.

  Phase 3 (task 8) threads the model field through the use case input DTO, which
  is the single application-layer contract consumed by both the CLI flag and
  potential future callers.

  Phase 4 (tasks 9–10) delivers the two CLI entry points: the --model flag on
  feat new (thin pass-through, no validation) and the interactive settings model
  subcommand (Inquirer prompt, DI-resolved factory, persist via use case).

  Phase 5 (tasks 11–14) delivers the web surface using server actions, not API
  routes. The get-supported-models server action exposes the factory's static
  model list using the "use server" pattern from existing actions. The ModelPicker
  component consumes it and renders the shadcn combobox with free-text fallback.
  Storybook stories are colocated and required for merge.

  Phase 6 (tasks 15–16) is a focused test cleanup sweep: unit fixtures are
  aligned with the new shape, integration tests validate the migration and mapper
  round-trips, and the e2e suite gets its fixture updates. Task 16 is the final
  gate — `pnpm test` and `pnpm lint` must both exit 0 before the branch is ready
  for PR.
