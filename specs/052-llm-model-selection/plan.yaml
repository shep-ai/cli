# Markdown content (the full plan document)
content: |
  ## Architecture Overview

  This feature modifies all four Clean Architecture layers, with dependencies
  strictly flowing inward:

  ```
  presentation (CLI + Web)
       ↓
  application (use cases + port interfaces)
       ↓
  infrastructure (factory impl, mapper, migration)
       ↓
  domain (TypeSpec → generated types)
  ```

  The TypeSpec change is the root of the dependency graph — it must land first
  because every other layer imports the generated `ModelConfiguration` type.
  The additive SQLite migration ensures backward compatibility: the four legacy
  columns (`model_analyze`, `model_requirements`, `model_plan`, `model_implement`)
  remain in the schema but are ignored by the mapper after migration 024 adds
  `model_default`.

  ## Key Design Decisions

  ### 1. ModelConfiguration Wrapper (not inline scalar)
  Keep the `ModelConfiguration` named TypeSpec model, replacing its four
  phase-specific fields with a single `default: string` field. This limits the
  blast radius of the TypeSpec diff (field rename inside a model vs restructuring
  the entire Settings model) and preserves extensibility for future per-agent
  override fields without another breaking migration.

  ### 2. Additive SQLite Migration (column add, not column drop)
  Migration 024 adds `model_default TEXT NOT NULL DEFAULT 'claude-sonnet-4-6'`
  via the handler pattern established in migrations 20–22. Old columns are
  retained but the mapper stops reading/writing them. SQLite < 3.35 does not
  support `ALTER TABLE DROP COLUMN`, so deferred column removal is the safe
  choice. The migration is idempotent via `IF NOT EXISTS` column check.

  ### 3. getSupportedModels on IAgentExecutorFactory (not a new port)
  `IAgentExecutorFactory` already exposes `getSupportedAgents()` and
  `getCliInfo()`. Adding `getSupportedModels(agentType: AgentType): string[]`
  keeps all agent-capability queries in one place. No new DI token, no new
  injection sites. The method returns synchronously with static arrays (NFR-7).

  ### 4. Accept Any String for --model (no Shep-side validation)
  The spec has a contradiction between FR-9 ("forward the value") and the
  open-question answer ("validate against getSupportedModels"). Research resolves
  this clearly: accept any string and let the agent CLI be the authoritative
  validator. This prevents blocking users from using newly released model
  identifiers not yet in the static list.

  ### 5. Combobox (not restricted dropdown) for ModelPicker
  Despite the open-question answer selecting "dropdown restricted to advertised
  list", the selectionRationale and spec content explicitly argue for combobox
  ("LLM model identifiers evolve faster than release cycles"). The combobox
  (shadcn Command + Popover) shows advertised suggestions while accepting
  free-text fallback — the correct product decision per the spec content.

  ### 6. GeminiCliExecutorService — No Parity Work Needed
  Direct inspection of `gemini-cli-executor.service.ts:357` confirms:
  `if (options?.model) args.push('-m', options.model)` already exists.
  FR-11 is already satisfied. Integration test coverage for this path is
  verified in phase-2 rather than implemented from scratch.

  ## Implementation Strategy

  Phase order is determined by inward dependency:
  1. **Domain first**: TypeSpec compile must succeed before TypeScript can build.
  2. **Infrastructure second**: Migration and mapper must align with the new type
     before use cases or CLI commands can read/write the new field.
  3. **Application third**: Use case input DTO must accept `model?` before the
     CLI layer can pass it.
  4. **CLI fourth**: `--model` flag and `settings model` command depend on the
     application and infrastructure layers being complete.
  5. **Web fifth**: API route and ModelPicker depend on `getSupportedModels`
     being available; component is last because it has no downstream dependents.
  6. **Test cleanup last**: All test fixture updates are concentrated here to
     keep red/green cycles clean.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec compile regenerates output.ts with cascading type errors | Fix all TS errors immediately after tsp:compile; do not proceed until `pnpm build` is green |
  | Migration runs on existing production DBs with only the old flat columns | Handler checks `IF NOT EXISTS` before adding model_default; additive-only, zero data loss |
  | shadcn Command component may not be installed in web package | Verify before task-11; install via shadcn CLI if absent |
  | Spec contradiction on --model validation | Research resolves: accept any string, no Shep-side validation |
  | GeminiCliExecutorService model flag confirmed present but test coverage unknown | Verify integration test covers the -m flag path; add test if missing |
