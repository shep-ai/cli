  | `src/presentation/web/components/` | Low | May need loading states for agent analysis phase |
  | `packages/core/src/infrastructure/repositories/` | Medium | New repository for caching agent analysis results per repo |
  | `tests/unit/infrastructure/services/deployment/` | High | Existing tests must be updated, new tests for agent-based flow |
  | `detect-dev-script.ts` | Medium | Becomes a fallback heuristic rather than the primary detection path |
  | `parse-port.ts` | Low | Still needed — agent provides the start command, port parsing still needed for stdout |

  ## Dependencies

  **Existing infrastructure this feature depends on:**
  - `IAgentExecutorProvider` / `IAgentExecutorFactory` — Agent resolution (MANDATORY pattern)
  - `IStructuredAgentCaller` — For extracting structured JSON from agent responses (dev env config)
  - `DeploymentService` — Process spawning and lifecycle management (reused, but analysis path changes)
  - `LogRingBuffer` and SSE log streaming — Unchanged, still needed for real-time logs
  - SQLite database — For caching analysis results per repository
  - TypeSpec compiler — For new domain models

  **Existing TypeSpec models that align with this feature:**
  - `DeploySkill` — Already models a deployment blueprint (method, ports, instructions) — this is essentially the agent analysis cache target
  - `LocalDeployAgent.Analyze(repositoryPath)` — Already defined in TypeSpec as returning a DeploySkill
  - `DeployMethod` enum — Already includes Script, Docker, DockerCompose, Kubernetes, Manual

  ## Success Criteria

  - [ ] Agent can analyze a Node.js repo and determine correct dev start command
  - [ ] Agent can analyze a Python repo (Django/Flask/FastAPI) and determine correct dev start command
  - [ ] Agent can analyze a Go, Rust, or other language repo
  - [ ] Agent correctly identifies repos with no startable dev server (libraries, CLI tools, scripts)
  - [ ] Analysis results are cached per-repo so subsequent starts skip agent analysis
  - [ ] Cached results are returned within <1 second
  - [ ] Deployment still works end-to-end through web UI (deploy, status, logs, stop)
  - [ ] No hardcoded agent types — resolution via IAgentExecutorProvider
  - [ ] All new code has unit tests (TDD: RED-GREEN-REFACTOR)
  - [ ] TypeSpec models defined for any new domain concepts

  ## Size Estimate

  **L** — This is a week+ effort because it requires:
  1. New LangGraph agent graph for dev environment analysis
  2. Structured output schema for agent responses (dev env config)
  3. New caching layer with SQLite repository
  4. Refactoring DeploymentService to use agent analysis instead of detectDevScript
  5. TypeSpec model additions for cached analysis
  6. Updating web UI server actions for the async analysis step
  7. Comprehensive tests for multi-language scenarios
  8. Handling edge cases (non-startable repos, monorepos, complex setups)

