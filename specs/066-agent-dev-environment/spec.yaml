content: |
  ## Problem Statement

  The current `DeploymentService` (`packages/core/src/infrastructure/services/deployment/`) is limited to Node.js projects only. It reads `package.json`, detects `dev`/`start`/`serve` scripts, picks a package manager from lockfiles (pnpm/yarn/npm), and spawns the script. Port detection relies on regex matching stdout patterns for Next.js, Vite, Express, and generic servers.

  This approach fails for:
  - **Non-Node.js projects**: Python (Django, Flask, FastAPI), Go, Rust, Ruby, Java/Kotlin, PHP, etc. have no `package.json`
  - **Complex setups**: Projects requiring environment variables, database setup, Docker Compose, or multi-step build processes
  - **Non-startable repos**: Libraries, CLI tools, scripts, and data-only repos have no dev server — the current service just errors out
  - **Repeat analysis**: Every deployment re-detects the dev script from scratch with no caching

  The goal is to replace this with an **agent-based approach** where an AI agent analyzes the repository, determines the correct way to start a dev environment (or declares it non-startable), caches its analysis for fast re-use, and supports any language or framework.

  ## Success Criteria

  - [ ] Agent can analyze a Node.js repo (Next.js, Vite, Express) and return correct start command, expected port, and package manager
  - [ ] Agent can analyze a Python repo (Django, Flask, FastAPI) and return correct start command and expected port
  - [ ] Agent can analyze Go, Rust, Java, Ruby, PHP repos and determine the correct dev start command
  - [ ] Agent correctly identifies non-startable repos (libraries, CLI tools, scripts, data-only) and returns `isStartable: false` with a human-readable reason
  - [ ] Analysis results are cached per-repo in SQLite with content-hash invalidation based on sentinel files
  - [ ] Cached results are returned in <500ms (no agent call) on subsequent deploys
  - [ ] Cache is invalidated when sentinel files (package.json, Dockerfile, requirements.txt, etc.) change on disk
  - [ ] Deploy flow shows an explicit "Analyzing" phase in the UI before "Booting" on first deploy (uncached)
  - [ ] Cached deploys skip the "Analyzing" phase entirely — straight to "Booting"
  - [ ] Deployment works end-to-end through web UI: deploy, status polling, log streaming, stop
  - [ ] No hardcoded agent types — resolution via `IAgentExecutorProvider` (MANDATORY)
  - [ ] Agent structured output is extracted via `IStructuredAgentCaller` with JSON schema
  - [ ] All new code has unit tests following TDD (RED → GREEN → REFACTOR)
  - [ ] TypeSpec models defined for `DevEnvironmentAnalysis` (agent output cache target)
  - [ ] `DeploymentState` enum extended with `Analyzing` value
  - [ ] Existing deployment tests updated to reflect new agent-based flow
  - [ ] The existing `detectDevScript.ts` is removed — agent is the single analysis path

  ## Functional Requirements

  ### Agent Analysis (FR-1 through FR-6)

  - **FR-1: Repository Analysis Agent** — A new LangGraph agent graph (`dev-environment-agent`) SHALL analyze a repository at a given path and return a structured `DevEnvironmentAnalysis` result. The graph follows the single-node pattern (like `analyze-repo`), calling the agent executor once with a comprehensive prompt that instructs it to inspect the repo's files, config, and structure.

  - **FR-2: Structured Output Schema** — The agent SHALL return a structured JSON output matching the `DevEnvironmentAnalysis` schema:
    ```
    {
      isStartable: boolean,
      notStartableReason?: string,
      startCommand?: string,
      expectedPort?: number,
      language: string,
      framework?: string,
      prerequisites: string[],
      sentinelFiles: string[],
      envVars: Record<string, string>
    }
    ```
    Extraction uses `IStructuredAgentCaller.call<DevEnvironmentAnalysis>(prompt, schema)` which handles both native structured output and prompt-based fallback.

  - **FR-3: Non-Startable Detection** — When the agent determines a repo has no startable dev server (library, CLI tool, script-only, data repo), it SHALL return `isStartable: false` with a `notStartableReason` explaining why (e.g. "This is an npm library with no dev server — it only exports modules"). The deployment service SHALL surface this reason to the UI without attempting to start a process.

  - **FR-4: Language-Agnostic Support** — The agent prompt SHALL instruct the agent to inspect common config files across all major ecosystems: `package.json` (Node.js), `requirements.txt`/`pyproject.toml`/`Pipfile` (Python), `go.mod` (Go), `Cargo.toml` (Rust), `pom.xml`/`build.gradle` (Java/Kotlin), `Gemfile` (Ruby), `composer.json` (PHP), `Dockerfile`/`docker-compose.yml` (containers), and any `Makefile` or `justfile` with `dev`/`serve`/`start` targets.

  - **FR-5: Prerequisites Reporting** — The agent output SHALL include a `prerequisites` array listing system-level requirements the user may need to install (e.g. `["python3", "pip", "virtualenv"]`, `["docker", "docker-compose"]`). The deployment service logs these as informational messages before attempting to start.

  - **FR-6: Sentinel Files** — The agent output SHALL include a `sentinelFiles` array listing the relative paths of files the agent relied on for its analysis (e.g. `["package.json", "pnpm-lock.yaml", "next.config.js"]`). These files are used for cache invalidation.

  ### Caching Layer (FR-7 through FR-11)

  - **FR-7: DeploySkill Repository** — A new `IDeploySkillRepository` interface and `SQLiteDeploySkillRepository` implementation SHALL persist `DevEnvironmentAnalysis` results keyed by normalized repository path. The repository follows the existing mapper pattern (`toDatabase`/`fromDatabase`).

  - **FR-8: Content-Hash Cache Key** — Each cached entry SHALL store a content hash computed from the sentinel files listed in the analysis result. On subsequent deploys, the service computes the current hash and compares it to the stored hash. If they match, the cached analysis is returned without calling the agent.

  - **FR-9: Cache Hit Path** — When a cache hit occurs (matching repo path AND matching content hash), the deployment service SHALL skip the analysis phase entirely and proceed directly to "Booting" using the cached start command. No agent call is made.

  - **FR-10: Cache Miss / Invalidation Path** — When no cache exists for the repo path, or the content hash has changed (sentinel files modified), the service SHALL run the agent analysis, store the new result (overwriting any previous entry for that repo path), and proceed to "Booting".

  - **FR-11: Force Re-Analyze** — A `forceReanalyze` option SHALL be available on the deploy action that bypasses cache and always runs the agent. This is exposed as a UI action (e.g. "Re-analyze" button on the deployment panel).

  ### Deployment Flow (FR-12 through FR-16)

  - **FR-12: Two-Phase Deploy** — The deploy flow SHALL have two explicit phases: (1) **Analyzing** — agent examines the repo (or cache lookup), (2) **Booting** — process spawning using the determined start command. The `DeploymentState` enum is extended with an `Analyzing` value.

  - **FR-13: Refactored DeploymentService** — The `DeploymentService.start()` method SHALL be refactored to: (a) check cache → if hit, proceed to spawn; (b) if miss, set state to `Analyzing`, call the agent, cache the result, then proceed to spawn; (c) if `isStartable: false`, set state to a new terminal state or emit an error event without spawning a process.

  - **FR-14: Non-Startable Terminal State** — When analysis returns `isStartable: false`, the deployment SHALL NOT spawn a process. Instead, it sets a descriptive status with the `notStartableReason` and remains in a terminal state. The UI displays the reason.

  - **FR-15: Remove detectDevScript** — The existing `detect-dev-script.ts` module SHALL be removed. All analysis flows through the agent. Existing tests for `detectDevScript` are replaced with tests for the agent-based flow.

  - **FR-16: Environment Variables** — If the agent's analysis includes `envVars`, the deployment service SHALL merge them into the spawned process's environment (`{ ...process.env, ...analysis.envVars }`).

  ### Web UI Integration (FR-17 through FR-19)

  - **FR-17: Analysis Loading State** — The web UI deployment components SHALL show an "Analyzing..." state with a descriptive message when the deployment is in the `Analyzing` phase. This replaces the immediate "Booting" indicator on first deploy.

  - **FR-18: Non-Startable Display** — When a deployment resolves to `isStartable: false`, the UI SHALL display the `notStartableReason` in a clear, non-error style (informational — this is expected behavior, not a failure).

  - **FR-19: Re-Analyze Action** — The web UI SHALL expose a "Re-analyze" action (button or menu item) on the deployment panel that triggers a forced re-analysis (bypasses cache), useful when the user has changed their project setup.

  ## Non-Functional Requirements

  - **NFR-1: Cache Lookup Performance** — Cache lookup (hash comparison + SQLite read) SHALL complete in <500ms for any repo. This is verified by unit tests with timing assertions.

  - **NFR-2: Agent Analysis Timeout** — The agent analysis call SHALL have a configurable timeout (default: 120 seconds). If the agent exceeds this timeout, the deploy fails with a descriptive error rather than hanging indefinitely.

  - **NFR-3: No Hardcoded Agent Types** — All agent resolution MUST flow through `IAgentExecutorProvider`. The dev environment agent graph receives an `IAgentExecutor` via dependency injection, never importing a specific agent type directly. This is the MANDATORY pattern per project rules.

  - **NFR-4: TypeSpec-First Models** — The `DevEnvironmentAnalysis` result type and any new `DeploymentState` values SHALL be defined in TypeSpec (`tsp/deployment/`) and compiled to `packages/core/src/domain/generated/output.ts`. No hand-written domain model types.

  - **NFR-5: TDD Compliance** — All implementation follows TDD: write failing test first (RED), implement minimally (GREEN), refactor. Every PR must demonstrate this pattern in commit history.

  - **NFR-6: Error Resilience** — If the agent call fails (network error, timeout, malformed output), the deployment service SHALL report a clear error with actionable guidance (e.g. "Agent analysis failed — check your agent configuration and try again"). It SHALL NOT crash, hang, or leave orphaned state.

  - **NFR-7: Cross-Platform Paths** — Cache keys for repository paths SHALL be normalized (forward slashes, no trailing slash) to avoid duplicate entries on Windows vs macOS/Linux. Follow the existing `REPLACE(column, '\\', '/')` pattern in SQLite queries.

  - **NFR-8: Backward Compatibility** — Existing web UI server actions (`deployFeature`, `deployRepository`, `stopDeployment`, `getDeploymentStatus`, `getDeploymentLogs`) SHALL maintain their current function signatures. Internal behavior changes are transparent to callers.

  - **NFR-9: Log Streaming Continuity** — The log ring buffer and SSE streaming infrastructure SHALL continue working unchanged. Agent analysis logs (if any) are streamed alongside process logs.

  - **NFR-10: Singleton Lifecycle** — The refactored `DeploymentService` SHALL remain a singleton instance (registered via `registerInstance` in the DI container) to maintain the in-memory process registry pattern.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should analysis run inline or as a visible two-phase flow? | Two-phase with analysis state | Shows the user what the agent is doing — transparency is a feature for agent-based systems. Small enum addition. |
  | 2 | How should cache invalidation work? | Content-hash based on sentinel files | Agent already inspects config files, so it can report which ones matter. Avoids both unnecessary re-analysis (TTL) and stale results (manual-only). |
  | 3 | Keep detectDevScript as fast-path fallback? | Remove entirely — agent-only | Single code path, simpler maintenance. Cache makes subsequent deploys fast. User asked for "basically an agent for that." |
  | 4 | How to handle monorepos with multiple services? | Detect primary service only | Matches current single-deployment model. Users can target subdirectories. Multi-service is a follow-up. |
  | 5 | What should the agent output schema include? | Standard — command, port, prerequisites, language, framework, sentinelFiles, envVars | Covers execution needs, cache invalidation, and UI context without over-engineering. |
  | 6 | Single-node or multi-node agent graph? | Single-node analysis | Matches existing analyze-repo pattern. Agent is capable enough for one-pass analysis. Minimizes latency and cost. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/deployment/` | High | Core service refactored to delegate analysis to agent, add caching, handle two-phase flow |
  | `packages/core/src/infrastructure/services/agents/` | High | New `dev-environment-agent/` graph directory with state, node, and prompt |
  | `tsp/deployment/` | Medium | New `DevEnvironmentAnalysis` model, extended `DeploymentState` enum with `Analyzing` |
  | `tsp/agents/deploy-agent.tsp` | Medium | `LocalDeployAgent.Analyze` operation backed by the new agent graph |
  | `packages/core/src/application/ports/output/` | Medium | New `IDeploySkillRepository` interface for cache persistence |
  | `packages/core/src/infrastructure/repositories/` | Medium | New `SQLiteDeploySkillRepository` with mapper and migration |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Register new repository, agent graph factory |
  | `src/presentation/web/app/actions/deploy-*.ts` | Medium | Server actions updated for async analysis phase and non-startable handling |
  | `src/presentation/web/components/` | Medium | Analyzing loading state, non-startable display, re-analyze button |
  | `tests/unit/infrastructure/services/deployment/` | High | Existing tests updated, new tests for agent flow, cache, and non-startable |
  | `detect-dev-script.ts` | High | Removed entirely — replaced by agent |
  | `parse-port.ts` | Low | Still needed for runtime port detection from stdout |

  ## Dependencies

  **Existing infrastructure this feature depends on:**
  - `IAgentExecutorProvider` / `IAgentExecutorFactory` — Agent resolution (MANDATORY pattern)
  - `IStructuredAgentCaller` — For extracting structured JSON from agent responses
  - `DeploymentService` — Process spawning and lifecycle management (reused, analysis path changes)
  - `LogRingBuffer` and SSE log streaming — Unchanged, still needed for real-time logs
  - SQLite database with `better-sqlite3` — For caching analysis results per repository
  - TypeSpec compiler — For new domain models
  - LangGraph `StateGraph` / `Annotation` API — For agent graph construction

  **Existing TypeSpec models that align with this feature:**
  - `DeploySkill` — Already models a deployment blueprint (method, ports, instructions) — extended or replaced by `DevEnvironmentAnalysis`
  - `LocalDeployAgent.Analyze(repositoryPath)` — Already defined as returning a `DeploySkill`
  - `DeployMethod` enum — Already includes Script, Docker, DockerCompose, Kubernetes, Manual
  - `DeploymentState` enum — Extended with `Analyzing` value

  ## Size Estimate

  **L** — This is a week+ effort because it requires:
  1. New LangGraph agent graph for dev environment analysis (single-node, following analyze-repo pattern)
  2. Structured output schema and TypeSpec model for `DevEnvironmentAnalysis`
  3. SQLite repository with content-hash caching and migration
  4. Refactoring `DeploymentService` to two-phase flow (Analyzing → Booting)
  5. Removing `detectDevScript` and updating all callers
  6. `DeploymentState` enum extension with `Analyzing`
  7. Web UI updates: analysis loading state, non-startable display, re-analyze action
  8. Comprehensive TDD test suite for multi-language scenarios, cache behavior, and error cases
  9. DI container registration for new services
