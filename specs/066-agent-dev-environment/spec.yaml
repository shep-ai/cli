name: agent-dev-environment
number: 66
branch: feat/066-agent-dev-environment
oneLiner: >
  Replace the script-only deployment service with an agent-based dev environment
  that analyzes any repo, caches results, and handles non-startable projects
  gracefully
userQuery: >
  The current deployment env feature is simple stupid. lets introduce agent
  based deployment. so it could start dev env for any repo. It should have some
  level of cache per repo so it would be fast. It should support all languages
  and be basically an agent for that. There are some repos which are basically
  impossible to start local dev server as there is no server or UI maybe its
  just a script — in such case the agent should respond that there is nothing to
  start.
summary: >
  Replace the current script-only DeploymentService (which only detects
  package.json dev/start/serve scripts for Node.js projects) with an agent-based
  dev environment system. The agent analyzes any repository — regardless of
  language or framework — discovers ALL startable services (important for
  monorepos), caches the full analysis per-repo for fast subsequent starts, and
  gracefully reports when a repo has nothing startable (e.g. a CLI tool, library,
  or script-only project). At deploy time, the user selects which service(s) to
  start — different features can target different services from the same cached
  analysis.
phase: Requirements
