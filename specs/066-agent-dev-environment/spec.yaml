content: |
  ## Problem Statement

  The current `DeploymentService` (`packages/core/src/infrastructure/services/deployment/`) is limited to Node.js projects only. It reads `package.json`, detects `dev`/`start`/`serve` scripts, picks a package manager from lockfiles (pnpm/yarn/npm), and spawns the script. Port detection relies on regex matching stdout patterns for Next.js, Vite, Express, and generic servers.

  This approach fails for:
  - **Non-Node.js projects**: Python (Django, Flask, FastAPI), Go, Rust, Ruby, Java/Kotlin, PHP, etc. have no `package.json`
  - **Complex setups**: Projects requiring environment variables, database setup, Docker Compose, or multi-step build processes
  - **Non-startable repos**: Libraries, CLI tools, scripts, and data-only repos have no dev server — the current service just errors out
  - **Repeat analysis**: Every deployment re-detects the dev script from scratch with no caching

  The goal is to replace this with an **agent-based approach** where an AI agent analyzes the repository, determines the correct way to start a dev environment (or declares it non-startable), caches its analysis for fast re-use, and supports any language or framework.

  ## Codebase Analysis

  ### Project Structure

  The project follows Clean Architecture with four layers in `packages/core/src/`:

  - **`domain/`** — Core business logic and TypeSpec-generated models (`domain/generated/output.ts`)
  - **`application/`** — Use cases and output port interfaces (e.g. `IDeploymentService`, `IAgentExecutor`)
  - **`infrastructure/`** — Implementations: `services/deployment/`, `services/agents/`, `repositories/`, `di/`
  - **`presentation/`** — CLI (`src/presentation/cli/`), Web UI (`src/presentation/web/`), TUI

  Key deployment files:
  - `packages/core/src/infrastructure/services/deployment/deployment.service.ts` — Process spawning, lifecycle, logs
  - `packages/core/src/infrastructure/services/deployment/detect-dev-script.ts` — Node.js-only script detection
  - `packages/core/src/infrastructure/services/deployment/parse-port.ts` — Regex-based port extraction
  - `packages/core/src/infrastructure/services/deployment/log-ring-buffer.ts` — Circular log buffer
  - `packages/core/src/application/ports/output/services/deployment-service.interface.ts` — Service contract

  TypeSpec models:
  - `tsp/deployment/deployment.tsp` — Deployment entity (state, url, ports)
  - `tsp/deployment/deploy-skill.tsp` — DeploySkill entity (blueprint: method, ports, instructions)
  - `tsp/common/enums/deployment.tsp` — DeploymentState, DeployMethod enums
  - `tsp/agents/deploy-agent.tsp` — LocalDeployAgent with Deploy/Analyze/Ask operations
  - `tsp/agents/deploy-target.tsp` — DeployTarget discriminated union

  Web UI integration:
  - `src/presentation/web/app/actions/deploy-repository.ts` — Deploy repo action
  - `src/presentation/web/app/actions/deploy-feature.ts` — Deploy feature worktree
  - `src/presentation/web/app/actions/stop-deployment.ts` — Stop deployment
  - `src/presentation/web/app/actions/get-deployment-status.ts` — Poll status
  - `src/presentation/web/app/actions/get-deployment-logs.ts` — SSE log stream
  - `src/presentation/web/hooks/use-deploy-action.ts` — Deploy action hook
  - `src/presentation/web/hooks/use-deployment-logs.ts` — Log streaming hook
  - `src/presentation/web/components/deployment-status-badge.tsx` — Status display

  ### Architecture Patterns

  **Agent System**: Built on LangGraph StateGraphs. Key abstractions:
  - `IAgentExecutor` — Execute prompts (supports Claude Code, Cursor, Gemini CLI, Dev mock)
  - `IAgentExecutorProvider` — Resolve executor from settings (MANDATORY: no hardcoding agent types)
  - `IAgentExecutorFactory` — Create typed executors
  - `IStructuredAgentCaller` — JSON extraction with native and fallback paths

  **Existing Agent Graphs**:
  - Feature Agent (`infrastructure/services/agents/feature-agent/`) — Full SDLC workflow (analyze, requirements, research, plan, implement, merge)
  - Analyze Repo (`infrastructure/services/agents/analyze-repo/`) — Single-node repository analysis

  **Agent Execution Pattern**: Nodes are pure async functions receiving state, calling `executor.execute(prompt, options)`, and returning state updates. Prompts are built dynamically per-node with helpers.

  **DI Container**: All services registered in `infrastructure/di/container.ts`. Resolution via `resolve<Interface>('token')`.

  **TypeSpec-First**: All domain models defined in `tsp/`, compiled to `packages/core/src/domain/generated/output.ts`. Never edit generated files.

  ### Relevant Technologies

  - **LangGraph** — StateGraph-based agent workflows with conditional edges, interrupts, and checkpointing
  - **TypeSpec** — Domain model definitions compiled to TypeScript
  - **Node.js child_process** — `spawn()` for process management with `tree-kill` for cleanup
  - **SQLite** — Persistence for agent runs, phase timings, and settings
  - **Server-Sent Events** — Real-time log streaming to web UI
  - **Next.js Server Actions** — Web UI deployment controls

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/deployment/` | High | Core service must be refactored to delegate to agent for analysis instead of hardcoded `detectDevScript()` |
  | `packages/core/src/infrastructure/services/agents/` | High | New agent graph (or extension of analyze-repo) for dev environment analysis |
  | `tsp/deployment/` | Medium | May need new models for cached analysis results (DevEnvironmentConfig) |
