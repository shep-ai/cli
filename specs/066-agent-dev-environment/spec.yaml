  Replace the current script-only DeploymentService (which only detects package.json dev/start/serve scripts for Node.js projects) with an agent-based dev environment system.
  The agent analyzes any repository — regardless of language or framework — determines how to start a local dev server, caches its analysis per-repo for fast subsequent starts, and gracefully reports when a repo has nothing startable (e.g. a CLI tool, library, or script-only project).
