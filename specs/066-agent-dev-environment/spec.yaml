openQuestions:
  - question: >-
      Should the agent analysis run inline (blocking the deploy call) or
      asynchronously with a separate analysis phase visible to the user?
    resolved: true
    options:
      - option: Inline blocking
        description: >-
          Agent analysis runs inside the deploy call. The UI shows a single
          'Booting' state. Simpler flow but the user sees a longer boot time on
          first deploy with no indication of what is happening. Subsequent
          cached deploys are instant.
        selected: false
      - option: Two-phase with analysis state
        description: >-
          Deploy flow has an explicit 'Analyzing' phase before 'Booting'. The UI
          shows analysis progress (e.g. 'Analyzing repository...') then
          transitions to 'Booting' once the start command is determined. More
          transparent but requires a new DeploymentState enum value and UI
          updates.
        selected: true
      - option: Background pre-analysis
        description: >-
          Analysis runs in the background automatically when a repo is first
          opened, before the user clicks deploy. Deploy is always fast because
          analysis is already cached. More complex — requires a trigger
          mechanism and background job orchestration.
        selected: false
    selectionRationale: >-
      Two-phase with analysis state is recommended because it gives the user
      clear feedback about what is happening (analysis vs. startup) without the
      complexity of background orchestration. The user explicitly asked for
      agent-based deployment — showing the agent working is a feature, not a
      bug. Adding an 'Analyzing' state to DeploymentState is a small change.
    answer: Two-phase with analysis state
  - question: >-
      How should the cache invalidation strategy work for stored analysis
      results?
    resolved: true
    options:
      - option: Manual invalidation only
        description: >-
          Cache never expires automatically. Users must explicitly re-analyze
          via a UI action (e.g. 'Re-analyze' button). Simplest to implement, no
          false cache misses, but stale results if the project setup changes.
        selected: false
      - option: Content-hash based
        description: >-
          Hash key config files (package.json, Dockerfile, requirements.txt,
          go.mod, etc.) and invalidate when hashes change. Accurate but requires
          knowing which files to hash per language — the agent would need to
          output the list of sentinel files.
        selected: true
      - option: Time-based TTL
        description: >-
          Cache expires after a fixed duration (e.g. 24 hours). Simple but
          causes unnecessary re-analysis for stable projects and may serve stale
          results for actively changing projects.
        selected: false
    selectionRationale: >-
      Content-hash based invalidation is recommended because it aligns with the
      agent's analysis — the agent already inspects config files to determine
      the start command, so it can also output which files it relied on
      (sentinel files). If those files change, the analysis is stale. This
      avoids both unnecessary re-analysis (time-based) and stale results
      (manual-only). The agent's structured output includes the sentinel file
      list as part of its response.
    answer: Content-hash based
  - question: >-
      Should the existing detectDevScript heuristic be kept as a fast-path
      fallback for Node.js projects?
    resolved: true
    options:
      - option: Keep as fast-path
        description: >-
          For Node.js repos, run the existing detectDevScript first. If it
          succeeds, skip the agent entirely. Faster for the common case but
          creates two code paths to maintain and test. Agent analysis only runs
          for non-Node.js or when heuristic fails.
        selected: false
      - option: Remove entirely, agent-only
        description: >-
          Remove detectDevScript and always use the agent. Single code path,
          simpler to maintain. Slightly slower for Node.js first-deploy (agent
          call) but cached results make subsequent deploys instant. The agent
          handles Node.js just as well.
        selected: true
      - option: Keep as offline fallback
        description: >-
          Only use detectDevScript when the agent executor is unavailable (no
          API key, network error). Provides degraded offline functionality for
          Node.js projects at the cost of maintaining legacy code.
        selected: false
    selectionRationale: >-
      Remove entirely is recommended because the whole point of this feature is
      to replace the limited heuristic with an agent. Keeping detectDevScript
      creates two code paths, doubles testing surface, and the agent handles
      Node.js projects just fine. The cache eliminates the performance concern —
      only the first deploy pays the agent cost. The user explicitly said 'it
      should be basically an agent for that', indicating the agent should be the
      single path.
    answer: Remove entirely, agent-only
  - question: How should the agent handle monorepos with multiple startable services?
    resolved: true
    options:
      - option: Detect primary service only
        description: >-
          The agent picks the single most likely dev server entry point (e.g.
          root-level dev script, main app directory). Simpler output schema,
          matches current single-deployment model. User can specify subdirectory
          manually if needed.
        selected: false
      - option: Return all services, user selects at deploy time
        description: >-
          Agent discovers and returns ALL startable services in the repo. The
          cache stores the full analysis (how to start each service), not which
          service was started. At deploy time, the user selects which service(s)
          to start. Different features can target different services from the
          same cached analysis. The cache invalidates based on sentinel file
          changes, independent of which services were previously deployed.
        selected: true
      - option: Start all services
        description: >-
          Agent detects and starts all services simultaneously. Requires
          managing multiple child processes per deployment, port conflict
          resolution, and significant changes to DeploymentService. High
          complexity.
        selected: false
    selectionRationale: >-
      Return all services is recommended because users need flexibility to
      start different services for different features, or multiple services at
      once. The cache stores how to start each service (the full repo analysis),
      not what was previously started — this means the analysis remains valid
      regardless of which services a user chooses to deploy. Cache invalidation
      is based purely on sentinel file content hashes, so it invalidates when
      the repo setup changes, not when deployment choices change. This keeps the
      cache clean and reusable across features.
    answer: Return all services, user selects at deploy time
  - question: >-
      What should the agent's structured output schema include beyond the start
      command?
    resolved: true
    options:
      - option: Minimal — command and port only
        description: >-
          Output: { startCommand, expectedPort, isStartable }. Minimal surface
          area, fast to parse. Misses useful metadata like required
          prerequisites or environment variables.
        selected: false
      - option: Standard — command, port, prerequisites, language, framework
        description: >-
          Output includes a services array where each service has: { name,
          startCommand, expectedPort, workingDirectory, prerequisites[],
          envVars{} } plus top-level fields: { isStartable,
          notStartableReason, language, framework, sentinelFiles[] }. Covers
          execution needs for multi-service repos, cache invalidation
          (sentinelFiles), and UI context without over-engineering.
        selected: true
      - option: >-
          Comprehensive — includes health check, multi-step setup, docker
          alternative
        description: >-
          Adds: { healthCheckUrl, setupSteps[], dockerAlternative,
          estimatedStartTime }. Full-featured but increases agent prompt
          complexity and parsing surface. Many fields would be null for simple
          projects.
        selected: false
    selectionRationale: >-
      Standard schema is recommended because it includes exactly what is needed:
      a services array for multi-service support, sentinelFiles for cache
      invalidation, prerequisites for user guidance, and language/framework for
      UI display. The notStartableReason field is essential for the
      'non-startable repo' requirement. Each service entry carries its own
      command, port, working directory, prerequisites, and envVars — enabling
      independent service startup. This maps cleanly to an extension of the
      existing DeploySkill TypeSpec model.
    answer: Standard — command, port, prerequisites, language, framework
  - question: Should the agent graph use a single-node or multi-node design?
    resolved: true
    options:
      - option: Single-node analysis
        description: >-
          One LangGraph node calls the agent with a comprehensive prompt. The
          agent reads the repo, determines startability, and returns the full
          structured output in one call. Simpler graph, fewer API calls. May
          produce less reliable results for complex repos.
        selected: true
      - option: Multi-node pipeline
        description: >-
          Multiple nodes: detect-language → analyze-config → determine-command →
          validate. Each node is focused and composable. More reliable for
          complex repos but 3-4x more agent calls, higher latency and cost.
        selected: false
    selectionRationale: >-
      Single-node analysis is recommended because the analyze-repo agent already
      demonstrates this pattern successfully — one focused agent call with a
      well-crafted prompt. The agent executor (Claude Code, etc.) is
      sophisticated enough to handle the full analysis in one pass. The
      structured output extraction via IStructuredAgentCaller handles parsing.
      Multi-node adds latency and cost without significant reliability
      improvement since the agent has full repo access in one call.
    answer: Single-node analysis
content: |
  ## Problem Statement

  The current `DeploymentService` (`packages/core/src/infrastructure/services/deployment/`) is limited to Node.js projects only. It reads `package.json`, detects `dev`/`start`/`serve` scripts, picks a package manager from lockfiles (pnpm/yarn/npm), and spawns the script. Port detection relies on regex matching stdout patterns for Next.js, Vite, Express, and generic servers.

  This approach fails for:
  - **Non-Node.js projects**: Python (Django, Flask, FastAPI), Go, Rust, Ruby, Java/Kotlin, PHP, etc. have no `package.json`
  - **Complex setups**: Projects requiring environment variables, database setup, Docker Compose, or multi-step build processes
  - **Non-startable repos**: Libraries, CLI tools, scripts, and data-only repos have no dev server — the current service just errors out
  - **Repeat analysis**: Every deployment re-detects the dev script from scratch with no caching
  - **Monorepos**: Projects with multiple startable services (frontend, backend, workers) have no way to discover or select which to start

  The goal is to replace this with an **agent-based approach** where an AI agent analyzes the repository, discovers ALL startable services (not just one), caches the full analysis for fast re-use, and supports any language or framework. At deploy time, the user selects which service(s) to start — different features can target different services from the same cached analysis.

  ## Success Criteria

  - [ ] Agent can analyze a Node.js repo (Next.js, Vite, Express) and return correct start command, expected port, and package manager
  - [ ] Agent can analyze a Python repo (Django, Flask, FastAPI) and return correct start command and expected port
  - [ ] Agent can analyze Go, Rust, Java, Ruby, PHP repos and determine the correct dev start command
  - [ ] Agent correctly identifies non-startable repos (libraries, CLI tools, scripts, data-only) and returns `isStartable: false` with a human-readable reason
  - [ ] Agent discovers ALL startable services in a monorepo and returns them as a services array (e.g. frontend on port 3000, backend on port 8080)
  - [ ] Analysis results are cached per-repo in SQLite — the cache stores the full analysis (how to start each service), not which services were deployed
  - [ ] Cache invalidation is based on content-hash of sentinel files — independent of which services were previously started
  - [ ] Cached results are returned in <500ms (no agent call) on subsequent deploys
  - [ ] Cache is invalidated when sentinel files (package.json, Dockerfile, requirements.txt, etc.) change on disk
  - [ ] Force re-analyze action allows users to invalidate the cache manually when needed
  - [ ] Deploy flow shows an explicit "Analyzing" phase in the UI before "Booting" on first deploy (uncached)
  - [ ] Cached deploys skip the "Analyzing" phase entirely — straight to service selection / "Booting"
  - [ ] For repos with multiple services, the UI presents a service picker so the user can choose which to start
  - [ ] Different features deploying the same repo can select different services from the same cached analysis
  - [ ] Deployment works end-to-end through web UI: deploy, status polling, log streaming, stop
  - [ ] No hardcoded agent types — resolution via `IAgentExecutorProvider` (MANDATORY)
  - [ ] Agent structured output is extracted via `IStructuredAgentCaller` with JSON schema
  - [ ] All new code has unit tests following TDD (RED → GREEN → REFACTOR)
  - [ ] TypeSpec models defined for `DevEnvironmentAnalysis` and `DevEnvironmentService` (agent output types)
  - [ ] `DeploymentState` enum extended with `Analyzing` value
  - [ ] Existing deployment tests updated to reflect new agent-based flow
  - [ ] The existing `detectDevScript.ts` is removed — agent is the single analysis path

  ## Functional Requirements

  ### Agent Analysis (FR-1 through FR-6)

  - **FR-1: Repository Analysis Agent** — A new LangGraph agent graph (`dev-environment-agent`) SHALL analyze a repository at a given path and return a structured `DevEnvironmentAnalysis` result. The graph follows the single-node pattern (like `analyze-repo`), calling the agent executor once with a comprehensive prompt that instructs it to inspect the repo's files, config, and structure. The agent SHALL discover ALL startable services, not just the primary one.

  - **FR-2: Structured Output Schema** — The agent SHALL return a structured JSON output matching the `DevEnvironmentAnalysis` schema:
    ```
    {
      isStartable: boolean,
      notStartableReason?: string,
      language: string,
      framework?: string,
      sentinelFiles: string[],
      services: [
        {
          name: string,
          startCommand: string,
          expectedPort?: number,
          workingDirectory: string,
          prerequisites: string[],
          envVars: Record<string, string>
        }
      ]
    }
    ```
    The `services` array contains ALL discovered startable services in the repo. For simple single-service repos, this array has one entry. For monorepos, it may have multiple entries (e.g. `[{name: "frontend", ...}, {name: "api", ...}]`). Extraction uses `IStructuredAgentCaller.call<DevEnvironmentAnalysis>(prompt, schema)` which handles both native structured output and prompt-based fallback.

  - **FR-3: Non-Startable Detection** — When the agent determines a repo has no startable dev server (library, CLI tool, script-only, data repo), it SHALL return `isStartable: false` with a `notStartableReason` explaining why (e.g. "This is an npm library with no dev server — it only exports modules") and an empty `services` array. The deployment service SHALL surface this reason to the UI without attempting to start a process.

  - **FR-4: Language-Agnostic Support** — The agent prompt SHALL instruct the agent to inspect common config files across all major ecosystems: `package.json` (Node.js), `requirements.txt`/`pyproject.toml`/`Pipfile` (Python), `go.mod` (Go), `Cargo.toml` (Rust), `pom.xml`/`build.gradle` (Java/Kotlin), `Gemfile` (Ruby), `composer.json` (PHP), `Dockerfile`/`docker-compose.yml` (containers), and any `Makefile` or `justfile` with `dev`/`serve`/`start` targets. For monorepos, the agent SHALL inspect subdirectories and workspace configurations (pnpm workspaces, Lerna, Turborepo, Nx, etc.) to discover all startable services.

  - **FR-5: Prerequisites Reporting** — Each service entry in the agent output SHALL include a `prerequisites` array listing system-level requirements needed to run that specific service (e.g. `["python3", "pip", "virtualenv"]`, `["docker", "docker-compose"]`). The deployment service logs these as informational messages before attempting to start the selected service.

  - **FR-6: Sentinel Files** — The agent output SHALL include a top-level `sentinelFiles` array listing the relative paths of files the agent relied on for its analysis (e.g. `["package.json", "pnpm-lock.yaml", "packages/web/package.json", "packages/api/package.json"]`). These files are used for cache invalidation. The sentinel files cover the entire repo analysis, not just a single service.

  ### Caching Layer (FR-7 through FR-11)

  - **FR-7: DevEnvironmentAnalysis Repository** — A new `IDevEnvironmentAnalysisRepository` interface and `SQLiteDevEnvironmentAnalysisRepository` implementation SHALL persist `DevEnvironmentAnalysis` results keyed by normalized repository path. The repository follows the existing mapper pattern (`toDatabase`/`fromDatabase`). The cached entry stores the FULL analysis including ALL discovered services — it does NOT store which services were previously started or selected.

  - **FR-8: Content-Hash Cache Key** — Each cached entry SHALL store a content hash computed from the sentinel files listed in the analysis result. On subsequent deploys, the service computes the current hash and compares it to the stored hash. If they match, the cached analysis is returned without calling the agent. The hash is based on file contents, not on deployment choices — changing which services you start does NOT invalidate the cache.

  - **FR-9: Cache Hit Path** — When a cache hit occurs (matching repo path AND matching content hash), the deployment service SHALL skip the analysis phase entirely and return the full cached analysis (with all services). The deploy flow proceeds to service selection (if multiple services) or directly to "Booting" (if single service). No agent call is made.

  - **FR-10: Cache Miss / Invalidation Path** — When no cache exists for the repo path, or the content hash has changed (sentinel files modified), the service SHALL run the agent analysis, store the new result (overwriting any previous entry for that repo path), and proceed to service selection / "Booting". Cache invalidation is triggered ONLY by sentinel file changes — not by deployment choices or service selection changes.

  - **FR-11: Force Re-Analyze** — A `forceReanalyze` option SHALL be available on the deploy action that bypasses cache and always runs the agent. This is exposed as a UI action (e.g. "Re-analyze" button on the deployment panel). This allows users to manually invalidate the cache when they know the repo setup has changed in ways not captured by sentinel files (e.g. new service added to a subdirectory the agent didn't previously detect).

  ### Deployment Flow (FR-12 through FR-18)

  - **FR-12: Two-Phase Deploy** — The deploy flow SHALL have two explicit phases: (1) **Analyzing** — agent examines the repo (or cache lookup), (2) **Booting** — process spawning using the selected service's start command. The `DeploymentState` enum is extended with an `Analyzing` value.

  - **FR-13: Refactored DeploymentService** — The `DeploymentService.start()` method SHALL be refactored to: (a) check cache → if hit, use cached analysis; (b) if miss, set state to `Analyzing`, call the agent, cache the result; (c) if `isStartable: false`, set terminal state with `notStartableReason`; (d) if multiple services, present selection to caller; (e) spawn the selected service(s).

  - **FR-14: Non-Startable Terminal State** — When analysis returns `isStartable: false`, the deployment SHALL NOT spawn a process. Instead, it sets a descriptive status with the `notStartableReason` and remains in a terminal state. The UI displays the reason.

  - **FR-15: Remove detectDevScript** — The existing `detect-dev-script.ts` module SHALL be removed. All analysis flows through the agent. Existing tests for `detectDevScript` are replaced with tests for the agent-based flow.

  - **FR-16: Environment Variables** — If the selected service's analysis includes `envVars`, the deployment service SHALL merge them into the spawned process's environment (`{ ...process.env, ...service.envVars }`).

  - **FR-17: Service Selection at Deploy Time** — When the cached analysis contains multiple services, the deploy flow SHALL accept a `serviceNames` parameter specifying which service(s) to start. If not provided and multiple services exist, the deploy flow returns the service list for the caller (UI) to present a picker. The service selection is NOT cached — it is a deploy-time decision that can differ per feature.

  - **FR-18: Multi-Service Deployment** — When multiple services are selected for deployment, the deployment service SHALL spawn each as a separate child process with independent lifecycle management (start, stop, logs). Each service gets its own log stream and port tracking.

  ### Web UI Integration (FR-19 through FR-22)

  - **FR-19: Analysis Loading State** — The web UI deployment components SHALL show an "Analyzing..." state with a descriptive message when the deployment is in the `Analyzing` phase. This replaces the immediate "Booting" indicator on first deploy.

  - **FR-20: Non-Startable Display** — When a deployment resolves to `isStartable: false`, the UI SHALL display the `notStartableReason` in a clear, non-error style (informational — this is expected behavior, not a failure).

  - **FR-21: Service Picker** — When the analysis returns multiple services, the web UI SHALL display a service picker allowing the user to select one or more services to start. The picker shows service name, working directory, expected port, and prerequisites for each option. The user's selection is passed to the deploy action as `serviceNames`.

  - **FR-22: Re-Analyze Action** — The web UI SHALL expose a "Re-analyze" action (button or menu item) on the deployment panel that triggers a forced re-analysis (bypasses cache), useful when the user has changed their project setup.

  ## Non-Functional Requirements

  - **NFR-1: Cache Lookup Performance** — Cache lookup (hash comparison + SQLite read) SHALL complete in <500ms for any repo. This is verified by unit tests with timing assertions.

  - **NFR-2: Agent Analysis Timeout** — The agent analysis call SHALL have a configurable timeout (default: 120 seconds). If the agent exceeds this timeout, the deploy fails with a descriptive error rather than hanging indefinitely.

  - **NFR-3: No Hardcoded Agent Types** — All agent resolution MUST flow through `IAgentExecutorProvider`. The dev environment agent graph receives an `IAgentExecutor` via dependency injection, never importing a specific agent type directly. This is the MANDATORY pattern per project rules.

  - **NFR-4: TypeSpec-First Models** — The `DevEnvironmentAnalysis`, `DevEnvironmentService`, and any new `DeploymentState` values SHALL be defined in TypeSpec (`tsp/deployment/`) and compiled to `packages/core/src/domain/generated/output.ts`. No hand-written domain model types.

  - **NFR-5: TDD Compliance** — All implementation follows TDD: write failing test first (RED), implement minimally (GREEN), refactor. Every PR must demonstrate this pattern in commit history.

  - **NFR-6: Error Resilience** — If the agent call fails (network error, timeout, malformed output), the deployment service SHALL report a clear error with actionable guidance (e.g. "Agent analysis failed — check your agent configuration and try again"). It SHALL NOT crash, hang, or leave orphaned state.

  - **NFR-7: Cross-Platform Paths** — Cache keys for repository paths SHALL be normalized (forward slashes, no trailing slash) to avoid duplicate entries on Windows vs macOS/Linux. Follow the existing `REPLACE(column, '\\', '/')` pattern in SQLite queries.

  - **NFR-8: Backward Compatibility** — Existing web UI server actions (`deployFeature`, `deployRepository`, `stopDeployment`, `getDeploymentStatus`, `getDeploymentLogs`) SHALL maintain their current function signatures. Internal behavior changes are transparent to callers. The `serviceNames` parameter is optional — omitting it defaults to single-service behavior for backward compatibility.

  - **NFR-9: Log Streaming Continuity** — The log ring buffer and SSE streaming infrastructure SHALL continue working unchanged. When multiple services are running, each service's logs are identifiable by service name in the stream.

  - **NFR-10: Singleton Lifecycle** — The refactored `DeploymentService` SHALL remain a singleton instance (registered via `registerInstance` in the DI container) to maintain the in-memory process registry pattern.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should analysis run inline or as a visible two-phase flow? | Two-phase with analysis state | Shows the user what the agent is doing — transparency is a feature for agent-based systems. Small enum addition. |
  | 2 | How should cache invalidation work? | Content-hash based on sentinel files | Agent already inspects config files, so it can report which ones matter. Avoids both unnecessary re-analysis (TTL) and stale results (manual-only). Cache stores how to start, not what was started. |
  | 3 | Keep detectDevScript as fast-path fallback? | Remove entirely — agent-only | Single code path, simpler maintenance. Cache makes subsequent deploys fast. User asked for "basically an agent for that." |
  | 4 | How to handle monorepos with multiple services? | Return all services, user selects at deploy time | Cache stores the full analysis of all services (how to start each). Different features can start different services. Cache invalidates on sentinel file changes, not on deployment choices. |
  | 5 | What should the agent output schema include? | Standard — services array with command, port, prerequisites per service; top-level language, framework, sentinelFiles | Covers multi-service repos, cache invalidation, and UI context. Each service is independently startable. |
  | 6 | Single-node or multi-node agent graph? | Single-node analysis | Matches existing analyze-repo pattern. Agent is capable enough for one-pass analysis. Minimizes latency and cost. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/infrastructure/services/deployment/` | High | Core service refactored to delegate analysis to agent, add caching, handle two-phase flow, multi-service support |
  | `packages/core/src/infrastructure/services/agents/` | High | New `dev-environment-agent/` graph directory with state, node, and prompt |
  | `tsp/deployment/` | Medium | New `DevEnvironmentAnalysis` and `DevEnvironmentService` models, extended `DeploymentState` enum with `Analyzing` |
  | `tsp/agents/deploy-agent.tsp` | Medium | `LocalDeployAgent.Analyze` operation backed by the new agent graph |
  | `packages/core/src/application/ports/output/` | Medium | New `IDevEnvironmentAnalysisRepository` interface for cache persistence |
  | `packages/core/src/infrastructure/repositories/` | Medium | New `SQLiteDevEnvironmentAnalysisRepository` with mapper and migration |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Register new repository, agent graph factory |
  | `src/presentation/web/app/actions/deploy-*.ts` | Medium | Server actions updated for async analysis phase, service selection, and non-startable handling |
  | `src/presentation/web/components/` | Medium | Analyzing loading state, non-startable display, service picker, re-analyze button |
  | `tests/unit/infrastructure/services/deployment/` | High | Existing tests updated, new tests for agent flow, cache, multi-service, and non-startable |
  | `detect-dev-script.ts` | High | Removed entirely — replaced by agent |
  | `parse-port.ts` | Low | Still needed for runtime port detection from stdout |

  ## Dependencies

  **Existing infrastructure this feature depends on:**
  - `IAgentExecutorProvider` / `IAgentExecutorFactory` — Agent resolution (MANDATORY pattern)
  - `IStructuredAgentCaller` — For extracting structured JSON from agent responses
  - `DeploymentService` — Process spawning and lifecycle management (reused, analysis path changes)
  - `LogRingBuffer` and SSE log streaming — Unchanged, still needed for real-time logs
  - SQLite database with `better-sqlite3` — For caching analysis results per repository
  - TypeSpec compiler — For new domain models
  - LangGraph `StateGraph` / `Annotation` API — For agent graph construction

  **Existing TypeSpec models that align with this feature:**
  - `DeploySkill` — Already models a deployment blueprint (method, ports, instructions) — extended or replaced by `DevEnvironmentAnalysis`
  - `LocalDeployAgent.Analyze(repositoryPath)` — Already defined as returning a `DeploySkill`
  - `DeployMethod` enum — Already includes Script, Docker, DockerCompose, Kubernetes, Manual
  - `DeploymentState` enum — Extended with `Analyzing` value

  ## Size Estimate

  **L** — This is a week+ effort because it requires:
  1. New LangGraph agent graph for dev environment analysis (single-node, following analyze-repo pattern)
  2. Structured output schema with services array and TypeSpec models for `DevEnvironmentAnalysis` and `DevEnvironmentService`
  3. SQLite repository with content-hash caching (caches how to start, not what was started) and migration
  4. Refactoring `DeploymentService` to two-phase flow (Analyzing → Booting) with multi-service support
  5. Removing `detectDevScript` and updating all callers
