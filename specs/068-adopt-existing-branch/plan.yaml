  to IFeatureRepository for duplicate detection, and wires up CLI + Web UI presentation layers.
  No TypeSpec or domain model changes needed — reuses SdlcLifecycle.Maintain. Five phases:
  foundation (interfaces + helpers), infrastructure implementations, use case, CLI, and Web UI.

