# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 14 tasks across 5 phases, totaling approximately 8.5 hours
  of effort.

  The work begins with foundation tasks that establish the interface contracts (addExisting on
  IWorktreeService, findByBranch on IFeatureRepository) and pure utility functions (branch name
  and slug derivation). These have zero dependencies and are the easiest to TDD.

  Next, the infrastructure layer implements the concrete service and repository methods against
  the new interfaces — WorktreeService.addExisting() runs git worktree add without -b, and
  SQLiteFeatureRepository.findByBranch() runs a scoped SQL query.

  The core application phase builds the AdoptBranchUseCase incrementally: first the happy path
  (local branch, no conflicts), then remote branch support, then all validation guards
  (main branch rejection, duplicate detection, existing worktree reuse). DI registration
  completes this phase.

  The CLI phase creates a single adopt.command.ts following the established factory pattern,
  and the Web UI phase adds the server action, adopt drawer with Storybook stories, parallel
  route page, and FAB integration.

  Each task has explicit TDD cycles (RED tests first, GREEN minimal implementation, REFACTOR
  cleanup) and clear acceptance criteria. Dependencies are ordered so no task depends on a
  later task.

  ---

