content: |
  ## Problem Statement

  Create a storybook of orbiting-circles component inspired by
  magicui.design/docs/components/orbiting-circles.

  It should include logos of:
  - WebStorm - JavaScript-focused IDE by JetBrains
  - Visual Studio Code - Lightweight, extensible code editor by Microsoft
  - Sublime Text - Fast, minimal text editor
  - iTerm2 - Advanced terminal for macOS
  - Warp - Modern terminal with AI features
  - Oh My Zsh - Framework for managing Zsh configs
  - GitKraken - Visual Git client
  - Lens - Kubernetes dashboard/IDE by Mirantis
  - tmux - Terminal session manager
  - cmux - Multiplexer library
  - Claude - LLM by Anthropic
  - Cursor - AI-first IDE
  - Gemini - LLM by Google
  - Codex - Code-focused AI by OpenAI
  - Shep AI CLI - Open-source agent orchestration CLI

  ## Success Criteria

  - [x] OrbitingCircles component created with configurable radius, speed, duration, and icon size
  - [x] All 15 tool logos implemented as inline SVG icons
  - [x] Storybook stories created for Default, IDEs & Editors, Terminal Tools, AI Models, DevOps Tools, Reversed, No Path, and On Dark Background variants
  - [x] CSS orbit animation with 3D transforms to prevent icon spinning

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | Web UI | New component | New OrbitingCircles primitive component |
  | Storybook | New stories | 8 story variants showcasing the component |

  ## Dependencies

  None identified.

  ## Size Estimate

  **M** - Component + stories implementation

