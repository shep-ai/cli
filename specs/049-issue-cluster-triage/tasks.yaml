content: |
  ## Summary

  The implementation is broken into 10 tasks across 4 phases, following strict
  TDD cycles (RED → GREEN → REFACTOR) for all code tasks.

  First, the application-layer contracts are established: the IExternalIssueFetcher
  port interface is extended with listIssues() and the transient cluster types are
  defined. This gives all subsequent phases stable type definitions to build against.

  Next, the infrastructure adapter (GitHubIssueFetcher.listIssues) is built with
  tests written first against the mocked execFile — the same proven pattern from
  the existing github-issue.service.test.ts.

  Then the core business logic is implemented in TriageIssuesUseCase, which
  orchestrates fetch → cluster via IStructuredAgentCaller. Tests mock both
  dependencies following the MetadataGenerator test pattern. The use case returns
  clusters to the caller without handling I/O.

  Finally, DI wiring connects the pieces, the CLI command adds the interactive
  review loop via @inquirer/prompts, and the triage command is registered in the
  feat command group. A full build/test/validate cycle confirms zero regressions.

  The task ordering ensures each piece is testable in isolation before integration.
  Tests are always written before implementation (RED phase), keeping TDD discipline
  throughout.

  ---

  _Task breakdown for implementation tracking_
