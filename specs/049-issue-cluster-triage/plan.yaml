content: |
  ## Architecture Overview

  The feature follows the established Clean Architecture layering with dependencies
  pointing inward:

  ```
  Presentation (triage.command.ts)
    → Application (TriageIssuesUseCase, IExternalIssueFetcher port)
      → Infrastructure (GitHubIssueFetcher, container.ts)
  ```

  **Application layer** owns the port interface (`IExternalIssueFetcher`) and the
  use case (`TriageIssuesUseCase`). Transient types (`IssueCluster`, `TriageIssuesInput`,
  `TriageIssuesResult`) live alongside the use case in a co-located `types.ts`,
  following the pattern set by `create-feature/types.ts`.

  **Infrastructure layer** provides the `GitHubIssueFetcher` adapter (extended with
  `listIssues()`) and DI wiring in `container.ts`.

  **Presentation layer** provides the CLI command (`triage.command.ts`) which handles
  interactive review via `@inquirer/prompts` and delegates to `CreateFeatureUseCase`
  for approved clusters. This keeps I/O concerns out of the use case.

  ## Key Design Decisions

  ### 1. Use case scope — fetch + cluster only, no I/O

  The `TriageIssuesUseCase` handles fetching issues and clustering them via AI, then
  returns the clusters to the caller. Interactive review stays in the CLI layer. This
  follows Clean Architecture: the use case is I/O-agnostic. The CLI command handles
  `@inquirer/prompts` interaction and calls `CreateFeatureUseCase` for each approved
  cluster. This mirrors how `new.command.ts` resolves use cases from the container
  and orchestrates the user-facing flow.

  **Alternative rejected:** Putting the entire pipeline (including review) in the use
  case — would violate Clean Architecture by mixing application logic with stdin/stdout.

  ### 2. Extend IExternalIssueFetcher, not a new interface

  Adding `listIssues()` to the existing `IExternalIssueFetcher` keeps the issue-fetching
  concern cohesive. The interface is small (2 existing methods) so a third method is
  appropriate. The `GitHubIssueFetcher` currently implements
  `Pick<IExternalIssueFetcher, 'fetchGitHubIssue'>` — this will be updated to include
  `listIssues`.

  **Alternative rejected:** Separate `IIssueListerService` interface — fragments the
  concern without benefit.

  ### 3. Optional `number` field on ExternalIssue

  Issue numbers are required for cluster output (FR-2) and feature descriptions (FR-4).
  Making `number` optional preserves backward compatibility — existing callers of
  `fetchGitHubIssue` don't use it. The `listIssues` implementation always populates it
  from the gh CLI JSON response.

  **Alternative rejected:** Separate `ListedIssue` type — unnecessary divergence.

  ### 4. Single-shot IStructuredAgentCaller clustering

  Follows the MetadataGenerator pattern exactly: define a const JSON schema, craft a
  prompt with issue context, call with `silent: true` and `allowedTools: []`. The prompt
  includes issue numbers and titles plus truncated bodies (~200 chars) for semantic
  context. The constraint "every issue must appear in exactly one cluster" ensures
  completeness.

  **Alternative rejected:** LangGraph agent or embeddings+k-means — overengineered for
  a single-shot reasoning task.

  ### 5. @inquirer/prompts for interactive review

  The codebase already uses `@inquirer/prompts` v8.2.0 — `confirm` in `del.command.ts`
  and `select` in `ide.command.ts`. Using `select` for approve/skip/edit and `input` for
  editing follows established patterns. The `--yes` flag bypasses prompts.
  `ExitPromptError` handles Ctrl+C (NFR-7).

  ### 6. DI registration via factory for IExternalIssueFetcher

  Register with string token `'IExternalIssueFetcher'` using `useFactory` that resolves
  the existing `'ExecFunction'` token and creates `GitHubIssueFetcher`. This follows the
  same factory pattern used for `IStructuredAgentCaller` and other services.
  `TriageIssuesUseCase` uses `registerSingleton` like all other use cases.

  ### 7. Continue-on-error for feature creation

  If `CreateFeatureUseCase` fails for one cluster, the remaining clusters are still
  processed. Failures are collected and reported in the summary. This matches NFR-2's
  requirement for graceful error handling.

  ## Implementation Strategy

  The phases are ordered by dependency: types first (everything depends on them),
  then infrastructure (the data source), then the use case (consumes the data source),
  then DI + CLI (integrates everything). Each phase builds on the previous one with
  clear boundaries.

  Phase 1 is pure type definitions — no logic, just contracts. This enables TDD from
  phase 2 onward: tests can import the types and mock the interfaces.

  Phase 2 adds the concrete data source. Tests mock `execFile` (already proven in
  `github-issue.service.test.ts`).

  Phase 3 builds the core business logic. Tests mock both `IExternalIssueFetcher` and
  `IStructuredAgentCaller` (following `metadata-generator.test.ts` pattern).

  Phase 4 wires everything together and adds the user-facing command. The CLI command
  is tested indirectly via integration tests (existing pattern) — unit tests focus on
  the use case and infrastructure layers.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | LLM returns malformed clusters (missing issues, duplicates) | Validate that every fetched issue number appears in exactly one cluster. If validation fails, surface a clear error and suggest re-running |
  | gh CLI not installed or not authenticated | Reuse existing IssueServiceUnavailableError and IssueAuthenticationError with actionable messages (install URL, `gh auth login` instructions) |
  | Large issue backlogs exceed token limits | Truncate issue bodies to ~200 chars and enforce --limit (default 100). The prompt stays within context limits |
  | User cancels mid-review (Ctrl+C) | Catch @inquirer/prompts ExitPromptError. Only clusters explicitly approved before cancellation are processed (NFR-7) |
  | CreateFeatureUseCase fails for a cluster | Continue-on-error: collect failures, process remaining clusters, report all failures in summary |
  | ExternalIssue interface change breaks existing code | The `number` field is optional, so existing callers (fetchGitHubIssue, fetchJiraTicket) are unaffected |
  | GitHubIssueFetcher Pick type needs updating | Update the Pick type union to include `listIssues` alongside `fetchGitHubIssue` |

