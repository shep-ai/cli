# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When a repository has many open issues, users must manually read through them,
  identify related groups, and create features one at a time via `shep feat new`.
  This is tedious and error-prone for large backlogs. There is no way to batch-
  triage a set of issues into coherent feature clusters and kick off parallel
  feature development.

  **Current limitations:**
  - `shep feat new` accepts a single description string — no batch mode
  - `IExternalIssueFetcher` can fetch one issue at a time but has no list/batch capability
  - No clustering or grouping logic exists in the codebase
  - No CLI command exists for issue triage or batch feature creation

  ## Success Criteria

  - [ ] `shep feat triage` CLI subcommand exists and is registered under the `feat` command group
  - [ ] Running `shep feat triage` fetches all open issues from the current GitHub repo via `gh issue list --json`
  - [ ] Issues are semantically clustered into named groups using `IStructuredAgentCaller` with a JSON schema
  - [ ] Each cluster has a name, a summary description, and a list of associated issue numbers
  - [ ] User is presented with each proposed cluster sequentially and can approve, skip, or edit it
  - [ ] For each approved cluster, `CreateFeatureUseCase.execute()` is called with the cluster summary as `userInput`
  - [ ] Each created feature's `userInput` includes the source issue numbers (e.g., "Issues: #12, #15, #23")
  - [ ] A `listIssues()` method is added to `IExternalIssueFetcher` and implemented in `GitHubIssueFetcher`
  - [ ] `GitHubIssueFetcher` and `IExternalIssueFetcher` are registered in the DI container
  - [ ] A new `TriageIssuesUseCase` orchestrates the fetch → cluster → review → create pipeline
  - [ ] All new code follows Clean Architecture layering (domain ← app ← infra ← presentation)
  - [ ] All new use cases and services have unit tests written TDD-style (RED → GREEN → REFACTOR)
  - [ ] `pnpm build`, `pnpm test`, and `pnpm validate` pass with zero errors
  - [ ] The command gracefully handles: no issues found, gh CLI not authenticated, empty clusters, user cancellation

  ## Functional Requirements

  - **FR-1 — Batch issue fetching**: The system must fetch all open issues from the
    current GitHub repository by executing `gh issue list --json number,title,body,labels,url`
    and returning them as an array of `ExternalIssue` objects. The new `listIssues(options?)`
    method is added to `IExternalIssueFetcher` and implemented in `GitHubIssueFetcher`.

  - **FR-2 — AI-powered semantic clustering**: The system must send the fetched issue
    titles and bodies to an LLM via `IStructuredAgentCaller.call<T>()` with a JSON
    schema that returns an array of clusters. Each cluster contains a `name` (string),
    `description` (string summarizing the cluster theme), and `issueNumbers` (number[]).
    Every fetched issue must appear in exactly one cluster.

  - **FR-3 — Cluster review flow**: After clustering, the CLI must present each
    proposed cluster to the user one at a time, showing the cluster name, description,
    and the titles of included issues. For each cluster, the user can:
    (a) approve it — the cluster proceeds to feature creation,
    (b) skip it — the cluster is discarded and no feature is created,
    (c) edit the name/description — the user provides a revised name or description
    before approving.

  - **FR-4 — Feature creation per cluster**: For each approved cluster, the system
    must call `CreateFeatureUseCase.execute()` with `userInput` set to the cluster
    description followed by a line listing the source issue numbers (e.g.,
    "Improve error handling across API endpoints\n\nIssues: #12, #15, #23").
    The `repositoryPath` is the current working directory.

  - **FR-5 — CLI subcommand registration**: A `shep feat triage` subcommand must be
    added under the existing `feat` command group. It accepts the following options:
    - `--repo <owner/repo>` (optional) — target a specific repository instead of
      the current directory's repo
    - `--label <label>` (optional, repeatable) — filter issues by one or more labels
    - `--limit <n>` (optional, default: 100) — maximum number of issues to fetch
    - `--yes` / `-y` (optional) — auto-approve all clusters without interactive review

  - **FR-6 — Triage use case orchestration**: A new `TriageIssuesUseCase` in the
    application layer must orchestrate the end-to-end pipeline:
    1. Call `IExternalIssueFetcher.listIssues()` to fetch issues
    2. Call `IStructuredAgentCaller.call()` to cluster them
    3. Return the clusters to the presentation layer for user review
    4. Receive approved clusters back and call `CreateFeatureUseCase` for each
    The use case must be injectable via tsyringe with `@injectable()`.

  - **FR-7 — DI registration**: Register `IExternalIssueFetcher` (with
    `GitHubIssueFetcher` implementation), `TriageIssuesUseCase`, and any supporting
    services in the DI container (`container.ts`). Use string tokens for interfaces
    and class tokens for concrete use cases, following existing patterns.

  - **FR-8 — Summary output**: After all approved clusters have been processed, the
    CLI must print a summary showing:
    - Number of issues fetched
    - Number of clusters proposed vs. approved
    - Names and IDs of created features
    - Any clusters that were skipped

  ## Non-Functional Requirements

  - **NFR-1 — Performance**: Issue fetching and clustering must complete within 60
    seconds for up to 100 issues. The `gh issue list` call should use `--limit` to
    cap results and avoid unbounded fetches.

  - **NFR-2 — Error handling**: The command must handle and report errors gracefully:
    - `gh` CLI not installed or not authenticated → clear error message with
      instructions
    - No open issues found → informational message, exit cleanly (exit code 0)
    - LLM/agent call failure → error message with retry suggestion
    - `CreateFeatureUseCase` failure for one cluster → continue with remaining
      clusters, report failures at the end

  - **NFR-3 — Testability**: All business logic must be in the application layer
    (`TriageIssuesUseCase`) with dependencies injected via interfaces. The CLI
    command layer must be a thin wrapper. This enables unit testing the use case
    with mocked dependencies.

  - **NFR-4 — Clean Architecture compliance**: No infrastructure or presentation
    imports in the application or domain layers. The use case must depend only on
    port interfaces (`IExternalIssueFetcher`, `IStructuredAgentCaller`,
    `CreateFeatureUseCase`).

  - **NFR-5 — Idempotency awareness**: The command should not create duplicate
    features if run multiple times on the same issue set. The triage use case
    should include issue numbers in feature descriptions so users can identify
    overlaps, but hard deduplication is out of scope for v1.

  - **NFR-6 — Agent resolution compliance**: The clustering AI call must go through
    `IStructuredAgentCaller` (resolved via DI), never directly instantiating an
    LLM client. This ensures the user's configured agent type is respected.

  - **NFR-7 — Graceful cancellation**: If the user presses Ctrl+C during the
    interactive review, the command must exit cleanly without creating partial
    features. Only clusters explicitly approved before cancellation are processed.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | AI clustering vs. label-based grouping? | AI-based semantic clustering | Aligns with AI-native philosophy; handles unlabeled issues |
  | 2 | Issue source: repo issues vs. Projects board? | Repository open issues via gh issue list | Simpler, uses existing infra, no extra OAuth scopes |
  | 3 | Auto-create features or interactive review? | Interactive review before creation | Prevents unwanted features; matches existing approval-gate pattern |
  | 4 | Top-level command or feat subcommand? | shep feat triage | Triage produces features; keeps feat commands co-located |
  | 5 | TypeSpec models or plain TS interfaces for clusters? | Plain TypeScript interfaces | Clusters are transient, not persisted; avoids overhead |
  | 6 | Interactive UX: sequential prompts or TUI wizard? | Sequential per-cluster prompts | Simpler to build and test; mirrors feat review flow |
  | 7 | New interface or extend IExternalIssueFetcher? | Extend IExternalIssueFetcher | Keeps issue-fetching concern cohesive; backward-compatible |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/cli/commands/feat/` | High | New `triage.command.ts` file, update `feat/index.ts` to register it |
  | `packages/core/src/application/use-cases/` | High | New `triage/` directory with `TriageIssuesUseCase` and types |
  | `packages/core/src/application/ports/output/services/external-issue-fetcher.interface.ts` | High | Add `listIssues()` method to interface |
  | `packages/core/src/infrastructure/services/external/github-issue.service.ts` | High | Implement `listIssues()` using `gh issue list --json` |
  | `packages/core/src/infrastructure/di/container.ts` | Medium | Register `IExternalIssueFetcher`, `TriageIssuesUseCase` |
  | `packages/core/src/application/use-cases/features/create/` | Low | Consumed by triage use case (no changes needed) |

  ## Dependencies

  **Existing code this feature depends on:**
  - `CreateFeatureUseCase` — called for each approved cluster to create features
  - `IExternalIssueFetcher` / `GitHubIssueFetcher` — extended with `listIssues()` for batch fetching
  - `IStructuredAgentCaller` — for making the structured AI clustering call
  - `IFeatureRepository` — used indirectly via `CreateFeatureUseCase`
  - DI container (`container.ts`) — for registering new services and use cases
  - CLI framework (`Commander.js`) — for adding the new subcommand
  - CLI UI helpers (`messages`, `colors`, `spinner`, `fmt`) — for output formatting

  **External dependencies:**
  - GitHub CLI (`gh`) — must be installed and authenticated for issue fetching
  - LLM API access — required for AI-powered semantic clustering (via configured agent)

  ## Size Estimate

  **L** — This feature spans three architecture layers (application use case,
  infrastructure service extension, CLI presentation), introduces a new AI
  clustering workflow via IStructuredAgentCaller, extends the issue-fetching
  interface with batch capability, and includes an interactive CLI review flow.
  The scope is contained by using plain TS types (no TypeSpec), reusing the
  existing CreateFeatureUseCase, and leveraging IStructuredAgentCaller rather
  than building a full LangGraph agent.

