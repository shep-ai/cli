summary: >
  Add a `shep feat triage` CLI subcommand that fetches open issues from the
  current GitHub repository via `gh issue list`, uses an AI agent
  (`IStructuredAgentCaller`) to semantically cluster them into related groups,
  presents the proposed clusters for interactive user review (approve / edit /
  reject), and then programmatically calls `CreateFeatureUseCase` for each
  approved cluster — enabling batch feature creation from an issue backlog.
