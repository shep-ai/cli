# Markdown content (the actual spec)
content: |
  ## Problem Statement

  When a repository has many open issues, users must manually read through them,
  identify related groups, and create features one at a time via `shep feat new`.
  This is tedious and error-prone for large backlogs. There is no way to batch-
  triage a set of issues into coherent feature clusters and kick off parallel
  feature development.

  **Current limitations:**
  - `shep feat new` accepts a single description string — no batch mode
  - `IExternalIssueFetcher` can fetch one issue at a time but has no list/batch capability
  - No clustering or grouping logic exists in the codebase
  - No CLI command exists for issue triage or batch feature creation

  ## Codebase Analysis

  ### Project Structure

  The repository follows Clean Architecture with four layers:

  | Layer | Path | Purpose |
  | ----- | ---- | ------- |
  | Domain | `packages/core/src/domain/` | Entities, value objects, generated TypeSpec output |
  | Application | `packages/core/src/application/` | Use cases, port interfaces |
  | Infrastructure | `packages/core/src/infrastructure/` | DB, agents, external services |
  | Presentation | `src/presentation/cli/` | CLI commands (Commander.js) |

  Key directories for this feature:
  - `src/presentation/cli/commands/` — CLI command registration
  - `packages/core/src/application/use-cases/features/create/` — CreateFeatureUseCase
  - `packages/core/src/application/ports/output/services/` — Service port interfaces
  - `packages/core/src/infrastructure/services/external/` — GitHub/Jira issue fetchers
  - `packages/core/src/infrastructure/di/container.ts` — DI registration
  - `tsp/domain/entities/` — TypeSpec domain model definitions

  ### Architecture Patterns

  - **Clean Architecture**: Dependencies point inward (domain ← app ← infra ← presentation)
  - **Repository Pattern**: All data access through interfaces (e.g. `IFeatureRepository`)
  - **Dependency Injection**: tsyringe container with `@inject()` decorators
  - **Port/Adapter**: Application defines interfaces; infrastructure implements them
  - **Agent Resolution**: All agent execution via `IAgentExecutorProvider` — no hardcoded types
  - **Use Case Pattern**: Each business operation is an injectable class with `execute()` method
  - **TypeSpec-first**: Domain models defined in `.tsp` files, compiled to TypeScript

  ### Relevant Technologies

  - **Commander.js**: CLI framework for defining commands and options
  - **tsyringe**: DI container for constructor injection
  - **GitHub CLI (gh)**: Used by `GitHubIssueFetcher` to fetch issues via subprocess
  - **LangGraph**: State machine for multi-step agent workflows (feature agent)
  - **SQLite (better-sqlite3)**: Persistence for features, agent runs, settings
  - **TypeSpec**: Domain model definitions compiled to TypeScript interfaces
  - **Vitest**: Test framework (TDD mandatory)

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/cli/commands/` | High | New `triage` command (or `feat triage` subcommand) must be added |
  | `packages/core/src/application/use-cases/` | High | New `TriageIssuesUseCase` (or `ClusterIssuesUseCase`) orchestrating fetch → cluster → create |
  | `packages/core/src/application/ports/output/services/` | High | Extend `IExternalIssueFetcher` with `listGitHubIssues()` method for batch fetching |
  | `packages/core/src/infrastructure/services/external/github-issue.service.ts` | High | Implement `listGitHubIssues()` using `gh issue list --json` |
  | `packages/core/src/infrastructure/services/agents/` | Medium | New clustering agent (or reuse existing agent infra) for semantic grouping |
  | `packages/core/src/infrastructure/di/container.ts` | Low | Register new use case and service implementations |
  | `tsp/domain/entities/` | Medium | May need new types: IssueCluster, TriageResult (or could use inline types) |
  | `packages/core/src/domain/generated/output.ts` | Low | Auto-generated from TypeSpec changes |

  ## Dependencies

  **Existing code this feature depends on:**
  - `CreateFeatureUseCase` — called for each cluster to create features
  - `IExternalIssueFetcher` / `GitHubIssueFetcher` — extended for batch issue listing
  - `IAgentExecutorProvider` — for running the clustering agent
  - `IFeatureRepository` — for checking existing features to avoid duplicates
  - DI container (`container.ts`) — for registering new services
  - CLI framework (`Commander.js`) — for adding the new command

  **External dependencies:**
  - GitHub CLI (`gh`) — must be installed and authenticated
  - LLM API access — for AI-powered semantic clustering

  ## Size Estimate

  **L** — This feature spans all four architecture layers (domain types, application
  use case, infrastructure services, CLI presentation), requires a new agent workflow
  for clustering, introduces batch issue fetching, and includes interactive user
  review of proposed clusters. Estimated at 1-2 weeks including TDD cycles, TypeSpec
  model updates, and Storybook stories if any web UI is involved.

  ## Success Criteria

  - [ ] New CLI command (`shep triage` or `shep feat triage`) fetches open issues from a GitHub repo
  - [ ] Issues are semantically clustered into related groups using an AI agent
  - [ ] User can review, approve, edit, or reject proposed clusters interactively
  - [ ] Approved clusters are automatically converted to features via `CreateFeatureUseCase`
  - [ ] Each created feature references the source issue numbers in its description
  - [ ] Batch issue fetching is added to `IExternalIssueFetcher` interface
  - [ ] All new code follows Clean Architecture layering and passes lint/typecheck
  - [ ] TDD: All use cases and services have comprehensive test coverage
  - [ ] TypeSpec models updated if new domain types are introduced

