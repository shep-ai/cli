name: issue-cluster-triage
summary: >
  Technical research for implementing `shep feat triage` — a CLI subcommand that
  fetches open GitHub issues, clusters them semantically via IStructuredAgentCaller,
  presents clusters for interactive review using @inquirer/prompts, and creates
  features via CreateFeatureUseCase. All patterns follow existing codebase conventions
  with no new external dependencies required.

# Relationships
relatedFeatures: []

technologies:
  - TypeScript
  - Commander.js (CLI framework — existing)
  - tsyringe (DI — existing)
  - '@inquirer/prompts (interactive CLI — existing v8.2.0)'
  - IStructuredAgentCaller (structured AI calls — existing)
  - GitHub CLI gh (issue fetching — existing pattern)
  - Vitest (testing — existing)

relatedLinks:
