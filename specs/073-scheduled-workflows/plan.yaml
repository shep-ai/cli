name: "scheduled-workflows"
summary: >
  Implementation plan for the scheduled-workflows feature, delivering user-defined
  reusable automation (expressed as agent prompts with optional tool constraints)
  that can run on-demand via CLI/web UI or on a cron schedule managed by the shep
  daemon. The plan follows Clean Architecture across five phases: (1) domain model
  foundation with TypeSpec, (2) persistence layer with SQLite repositories and
  migration, (3) application use cases and scheduler service, (4) CLI presentation
  layer, and (5) web UI management page. Each phase builds on the prior, maintaining
  strict dependency inversion and TDD methodology throughout.

