content: |
  ## Status

  - **Phase:** Planning (complete)
  - **Updated:** 2026-03-20

  ## Architecture Overview

  The scheduled-workflows feature integrates into shep's existing Clean Architecture
  as a new vertical slice spanning all four layers. The architecture follows
  established patterns exactly:

  **Domain Layer** — Two new TypeSpec entities (ScheduledWorkflow extending
  SoftDeletableEntity, WorkflowExecution extending BaseEntity) and two new enums
  (WorkflowTriggerType, WorkflowExecutionStatus). This mirrors the existing
  Feature/AgentRun entity separation. ScheduledWorkflow uses soft-delete to preserve
  execution history for audit; WorkflowExecution uses hard-delete via the 30-day
  retention policy.

  **Application Layer** — Nine use cases following the @injectable() single-execute()
  pattern, two repository port interfaces following IFeatureRepository's structure,
  and an IClock interface for testable time handling. Templates are implemented as
  pure factory functions returning partial ScheduledWorkflow objects.

  **Infrastructure Layer** — SQLite repositories with bidirectional mappers following
  the feature.mapper.ts pattern (camelCase to snake_case, dates as unix ms, booleans
  as 0/1, arrays as JSON). A new migration (044) creates both tables. The
  WorkflowSchedulerService follows the NotificationWatcherService/PrSyncWatcherService
  pattern: singleton with start()/stop()/isRunning(), setInterval polling at 60s,
  immediate first poll, graceful shutdown via clearInterval.

  **Presentation Layer** — CLI: new 'workflow' command group with 10 subcommands
  following the feat/ pattern (Commander.js factory functions, cli-table3 output).
  Web: /workflows page following the settings page pattern (server component to server
  actions to client component), with Storybook stories for all components.

  ## Key Design Decisions

  ### 1. croner for Cron Scheduling (not node-cron or cron)

  croner v10.x was selected because it has zero dependencies (matching shep's
  minimal-dependency philosophy), native TypeScript definitions, built-in timezone
  with DST awareness, and both validation and next-run calculation in a single
  package. At ~15 KB it is 3x lighter than node-cron. The paused instantiation
  pattern (new Cron(expr, { paused: true })) enables validation-only use without
  starting timers, and nextRun() accepts a reference Date for injectable clock
  compatibility.

  ### 2. Sequential Execution with In-Memory Queue (not parallel)

  Workflows operate on a shared git repository where concurrent modifications would
  cause conflicts. The existing agent runner uses a single-execution model. Sequential
  execution with a FIFO queue is simpler to implement, test, and debug. The queue is
  in-memory (lost on daemon restart, but missed schedules are not retroactively
  executed per FR-17). A concurrency limit can be added later as an enhancement.

  ### 3. Polling-Based Scheduler (not croner timer triggers)

  The scheduler uses setInterval polling (60s) rather than croner's built-in timer
  triggers. This matches the existing watcher pattern, avoids maintaining in-memory
  Cron instances for every enabled workflow, simplifies daemon restart recovery, and
  enables fully deterministic testing via an injectable IClock. croner is used only
  for validation and nextRun() calculation — not for its timer functionality.

  ### 4. Injectable IClock (not vi.useFakeTimers)

  An IClock interface with now(): Date enables deterministic testing of cron
  evaluation, nextRunAt calculation, and retention cleanup without depending on
  system time or Vitest timer mocking. croner's nextRun() and match() accept a
  reference Date parameter, making them compatible with this approach.

  ### 5. Separate Repository Interfaces (not combined)

  IWorkflowRepository and IWorkflowExecutionRepository follow the existing
  IFeatureRepository pattern. Separating them enables independent testing and clear
  single responsibility, consistent with how the codebase separates Feature from
  AgentRun persistence.

  ### 6. Management View for Web UI (not full CRUD)

  The web UI provides list view, execution history, enable/disable, and manual
  trigger — but workflow creation and editing remain CLI-only. Agent prompt authoring
  is a text-heavy operation better suited to CLI. This reduces frontend complexity
  while delivering real monitoring and quick-action value.

  ## Implementation Strategy

  The five phases follow strict dependency order:

  **Phase 1 (Domain Foundation)** must come first because every subsequent file
  imports the generated TypeSpec types. This is the smallest phase and unblocks
  everything else.

  **Phase 2 (Persistence)** builds on Phase 1 types to create the database schema,
  mappers, and repositories. All use cases depend on repositories.

  **Phase 3 (Application Logic)** is the largest phase, implementing 9 use cases,
  the scheduler service, templates, and notification integration. It depends on
  Phase 2 repositories and Phase 1 types.

  **Phase 4 (CLI)** wires use cases to Commander.js commands and integrates the
  scheduler into the daemon. It depends on Phase 3 use cases.

  **Phase 5 (Web UI)** creates the management page with server actions that resolve
  use cases from the DI container. It depends on Phase 3 use cases and Phase 4
  daemon integration (for the SSE event stream).

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | TypeSpec compilation breaks existing types | Run pnpm tsp:compile immediately after model creation and verify output.ts before proceeding |
  | croner API incompatibility at runtime | Pin croner to v10.x. Write integration tests exercising Cron constructor, nextRun(), and match() |
  | Migration conflicts with other branches | Use migration 044 (next after 043). Use CREATE TABLE IF NOT EXISTS for idempotency |
  | Scheduler service blocks daemon event loop | SQLite queries are fast (<1ms for indexed queries). Poll runs async via setInterval |
  | Stale running executions after daemon crash | Recovery sweep on startup marks running as failed before scheduler starts polling |
  | Unbounded execution history growth | 30-day retention cleanup every 100 scheduler ticks (~100 minutes). Configurable via settings |
  | Web UI deviates from existing patterns | Follow the settings page pattern exactly: server component, server actions, client component |
  | Agent execution within workflow fails silently | Wrap execution in try/catch, mark as failed with error details, emit WorkflowFailed notification |

  ---

  _Planning complete — proceed to implementation phase_
