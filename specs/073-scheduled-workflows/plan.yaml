  - id: "phase-1"
    name: "Domain Foundation"
    description: >
      Define the core domain models in TypeSpec (ScheduledWorkflow entity,
      WorkflowExecution entity, WorkflowTriggerType enum, WorkflowExecutionStatus
      enum) and compile them to TypeScript. Also install the croner dependency and
      create the IClock port interface for testable time handling. This phase has
      zero runtime dependencies and must come first because every subsequent phase
      imports these generated types.
    parallel: false

  - id: "phase-2"
    name: "Persistence Layer"
    description: >
      Create the SQLite migration (044) for the scheduled_workflows and
      workflow_executions tables, build the bidirectional mappers, define the
      IWorkflowRepository and IWorkflowExecutionRepository port interfaces in the
      application layer, and implement the SQLite repository classes. This phase
      depends on the generated domain types from Phase 1 and provides the data
      access layer that all use cases and services need.
    parallel: false

  - id: "phase-3"
    name: "Application Logic and Scheduler Service"
    description: >
      Implement the 9 use cases (Create, Update, Delete, List, Get, Run, Schedule,
      GetHistory, Toggle), build the WorkflowSchedulerService following the existing
      watcher pattern (setInterval polling at 60s, sequential execution queue, crash
      recovery, retention cleanup), create the built-in workflow templates, extend
      notification events, and register everything in the DI container. This is the
      largest phase and the core of the feature — it connects domain models to
      repositories and provides the execution engine.
    parallel: false

  - id: "phase-4"
    name: "CLI Presentation"
    description: >
      Create the 'workflow' command group with 10 subcommands (create, update,
      delete, list, show, run, schedule, enable, disable, history), register it in
      the main CLI program, and integrate the scheduler service startup into the
      daemon's _serve command with graceful shutdown. This phase wires the
      application layer to the CLI interface.
    parallel: false

  - id: "phase-5"
    name: "Web UI"
    description: >
      Build the /workflows management page with server component, client component,
      and server actions for listing workflows, viewing execution history,
      enabling/disabling workflows, and manually triggering runs. Create Storybook
      stories for all new components. Extend the existing SSE endpoint for
      near-real-time workflow status updates.
    parallel: false

