        - "Write test: poll() queries due workflows and enqueues them"
        - "Write test: poll() executes one queued workflow per tick"
        - "Write test: execution creates WorkflowExecution with Running status, updates to Completed on success"
        - "Write test: failed execution sets status to Failed with error message"
        - "Write test: crash recovery marks stale Running executions as Failed on startup"
        - "Write test: retention cleanup deletes records older than 30 days every 100 ticks"
        - "Write test: emits WorkflowStarted event at execution start"
        - "Write test: emits WorkflowCompleted event on success"
        - "Write test: emits WorkflowFailed event on failure"
        - "Write test: updates workflow lastRunAt and recalculates nextRunAt"
