    title: "Implement WorkflowSchedulerService"
    description: >
      Build the core scheduler service following the NotificationWatcherService
      pattern. Implements start()/stop()/isRunning() lifecycle. Polls every 60s
      (configurable). Each tick: queries enabled workflows with nextRunAt <= now,
      enqueues them, dequeues and executes one at a time, updates nextRunAt. Uses
      injectable IClock for deterministic testing. Includes crash recovery on
      startup (marks stale running executions as failed) and retention cleanup
      (every 100 ticks). Emits notification events for workflow start/complete/fail.
    state: "Todo"
    dependencies:
      - "task-5"
      - "task-10"
      - "task-11"
      - "task-6"
    acceptanceCriteria:
      - "Follows start()/stop()/isRunning() pattern from NotificationWatcherService"
      - "Polls at configurable interval (default 60s)"
      - "First poll runs immediately on start()"
      - "Queries enabled workflows where nextRunAt <= clock.now()"
      - "Enqueues due workflows into FIFO queue"
      - "Executes one workflow at a time (sequential)"
      - "Updates workflow lastRunAt and nextRunAt after execution"
      - "Creates WorkflowExecution records with correct status transitions"
      - "Marks stale running executions as failed on startup (crash recovery)"
      - "Runs retention cleanup every 100 ticks"
      - "Emits WorkflowStarted, WorkflowCompleted, WorkflowFailed notification events"
      - "Uses IClock for all time operations (no direct Date.now())"
      - "Graceful stop() clears interval and does not interrupt running execution"
    tdd:
      red:
