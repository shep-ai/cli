content: |
  ## Summary

  The scheduled-workflows feature is broken into 30 tasks across 5 phases.

  **Phase 1 (Domain Foundation, 6 tasks)** establishes the TypeSpec models,
  enums, croner dependency, and IClock interface. These are the atomic building
  blocks that every subsequent phase depends on. Tasks in this phase are mostly
  non-code (TypeSpec definitions) with one small testable unit (IClock).

  **Phase 2 (Persistence Layer, 7 tasks)** creates the database migration, mappers,
  port interfaces, and repository implementations. This is the data access layer
  that use cases and the scheduler service depend on. All repository tasks have
  comprehensive TDD cycles testing against in-memory SQLite databases.

  **Phase 3 (Application Logic, 11 tasks)** is the largest phase, implementing
  all 9 use cases, the WorkflowSchedulerService (the most complex single task),
  built-in templates, and DI container registration. The scheduler service task
  is estimated at 3h and covers polling, sequential execution, crash recovery,
  retention cleanup, and notification emission — all testable via injectable
  IClock and mock repositories.

  **Phase 4 (CLI Presentation, 4 tasks)** wires use cases to Commander.js
  commands and integrates the scheduler into the daemon lifecycle. CLI commands
  are grouped logically: CRUD commands first, then operational commands, then
  daemon integration.

  **Phase 5 (Web UI, 2 tasks)** builds the management page with server actions
  and client components, plus Storybook stories. The web UI is kept to a
  management view (list, history, enable/disable, trigger) — workflow creation
  remains CLI-only.

  The dependency chain flows strictly downward: Phase 1 unblocks Phase 2,
  Phase 2 unblocks Phase 3, Phase 3 unblocks Phases 4 and 5.

  ---

  _Task breakdown complete — proceed to implementation phase_
