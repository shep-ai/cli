name: "scheduled-workflows"
number: 73
branch: "feat/073-scheduled-workflows"
oneLiner: "User-defined workflows that run on demand or on a cron schedule via the shep daemon"
summary: "Add a workflow engine to shep that lets users define reusable automation scripts (expressed as agent prompts with optional tool constraints) and execute them on demand via CLI/web UI or on a recurring cron schedule managed by the daemon process. Workflows are persisted in SQLite, scheduled via a new daemon-hosted scheduler service, and executed as agent tasks. The two motivating examples are auto-closing resolved GitHub issues with evidence and rebasing all tracked feature branches on main.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures: []
technologies:
  - "TypeSpec (domain model definitions)"
  - "better-sqlite3 (workflow and schedule persistence)"
  - "tsyringe (dependency injection)"
  - "croner (cron expression parsing and scheduling)"
  - "LangGraph (agent graph orchestration)"
  - "Commander.js (CLI commands)"
  - "Next.js (web UI for workflow management)"
  - "shadcn/ui (workflow UI components)"
  - "Vitest (testing)"
  - "umzug (database migrations)"
relatedLinks:
