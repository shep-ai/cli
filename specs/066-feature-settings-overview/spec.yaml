content: |
  ## Problem Statement

  When creating a new feature, users select various settings (model, approval
  gates, evidence collection, git push/PR). These settings should be visible
  in the feature drawer overview tab.

  ## Success Criteria

  - [x] Settings section appears in overview tab when settings data exists
  - [x] Model name displayed with friendly label
  - [x] Approval gates shown as enabled/disabled badges
  - [x] Evidence settings shown as enabled/disabled badges
  - [x] Git settings (push, PR) shown as enabled/disabled badges
  - [x] Settings section hidden when no settings data present

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | Web UI | High | New settings section in overview tab |
  | Feature Node Data | Medium | Extended with settings fields |
  | Graph Builder | Low | Passes settings through to node data |

  ## Dependencies

  None identified.

