# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is broken into 7 tasks across 3 phases.

  Phase 1 builds the EvidenceLightbox component incrementally: first the base dialog with
  fullscreen image display (task 1), then the bottom control bar with counter, description, and
  download (task 2), then prev/next navigation buttons with wrap-around (task 3), and finally
  keyboard arrow navigation (task 4). Each task adds a layer of functionality with its own TDD
  cycle, keeping changes small and testable.

  Phase 2 modifies the existing EvidenceList to split evidence into image and non-image arrays,
  render the thumbnail gallery grid, and wire up the EvidenceLightbox with controlled state
  (task 5). This is a single focused task that integrates the Phase 1 component into the
  existing merge review drawer.

  Phase 3 adds comprehensive Storybook stories (task 6) covering all required states (default
  grid, lightbox open, single image, many images, mixed types) and validates the full build
  and test suite (task 7).

  The task ordering ensures each task builds on the previous one with no circular dependencies.
  Phase 1 tasks are sequential because each adds to the same component file. Phase 2 depends
  on Phase 1 completion. Phase 3 validates everything end-to-end.
