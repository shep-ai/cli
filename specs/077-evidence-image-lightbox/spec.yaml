content: |
  ## Problem Statement

  The evidence section in the merge review drawer currently displays each evidence item as an
  independent expandable list entry. Images render inline at a constrained `max-h-80` size with no
  way to view them fullscreen or navigate between multiple screenshots. Users must individually
  expand each evidence item to see its image, making it tedious to review a set of screenshots.

  The feature request is to:
  1. Display evidence images as a visual gallery (thumbnail grid)
  2. Make each image clickable to open a fullscreen lightbox overlay
  3. Allow navigating between images within the lightbox (prev/next)

  ## Success Criteria

  - [ ] Evidence images display as a 3-column square thumbnail grid in the merge review drawer
  - [ ] Each thumbnail shows the image cropped to square (object-cover) with the evidence description as alt text
  - [ ] Clicking a thumbnail opens a fullscreen lightbox dialog overlay
  - [ ] Lightbox displays the image at up to 90vh height with object-contain (no cropping)
  - [ ] Lightbox has a dark overlay background (bg-black/90) consistent with InlineAttachments
  - [ ] Prev/next buttons in the lightbox bottom bar navigate between evidence images
  - [ ] Left/right arrow keys navigate between images when the lightbox is open
  - [ ] Navigation wraps around (last image → first, first image → last)
  - [ ] Image counter displays current position (e.g., "2 / 5") in the bottom bar
  - [ ] Evidence description text shown (truncated) in the lightbox bottom bar
  - [ ] Download button in the lightbox bottom bar downloads the current image
  - [ ] ESC key closes the lightbox (Radix Dialog default behavior)
  - [ ] Close button (X) visible in top-right corner of lightbox
  - [ ] Non-image evidence (video, text, terminal) continues to render as expandable list items below the gallery
  - [ ] Single image evidence still shows gallery grid (1 thumbnail) and opens lightbox without nav controls
  - [ ] Lightbox component lives in `src/presentation/web/components/common/evidence-lightbox/`
  - [ ] Storybook stories cover: gallery grid, lightbox open, single image, many images, mixed evidence types
  - [ ] All interactive elements have accessible labels (aria-label for nav buttons, alt text for images)
  - [ ] Focus is trapped within the lightbox when open (Radix Dialog default)
  - [ ] No new npm dependencies introduced

  ## Functional Requirements

  - **FR-1: Thumbnail gallery grid** — The EvidenceList component must separate image evidence (types with extensions .png, .jpg, .jpeg, .gif, .webp, .svg, .bmp) into a 3-column CSS grid of square thumbnails rendered above the expandable list of non-image evidence.
  - **FR-2: Thumbnail rendering** — Each thumbnail must render the evidence image via the existing `/api/evidence?path=` route, cropped to a 1:1 aspect ratio using `object-cover`, with the evidence description as the `alt` attribute.
  - **FR-3: Lightbox dialog open** — Clicking any thumbnail must open a fullscreen lightbox dialog (Radix Dialog) with the clicked image displayed at its natural aspect ratio using `object-contain`, sized up to 90vh height.
  - **FR-4: Lightbox overlay** — The lightbox must use a dark semi-transparent overlay (`bg-black/90`) consistent with the existing InlineAttachments pattern.
  - **FR-5: Next/previous navigation** — The lightbox must include prev and next navigation buttons (ChevronLeft, ChevronRight icons) in a bottom control bar. Clicking them must navigate to the adjacent image in the evidence list.
  - **FR-6: Keyboard navigation** — When the lightbox is open, pressing the left arrow key must navigate to the previous image and the right arrow key to the next image.
  - **FR-7: Wrap-around navigation** — Navigation must wrap circularly: navigating past the last image returns to the first, and navigating before the first goes to the last.
  - **FR-8: Image counter** — The lightbox bottom bar must display the current image index and total count (e.g., "2 / 5").
  - **FR-9: Evidence description in lightbox** — The lightbox bottom bar must show the current image's evidence description, truncated with ellipsis if it exceeds one line.
  - **FR-10: Download button** — The lightbox bottom bar must include a download button that opens/downloads the current image via the `/api/evidence?path=` route.
  - **FR-11: Close controls** — The lightbox must be closable via ESC key (Radix default), clicking the overlay, or clicking the X close button in the top-right corner.
  - **FR-12: Non-image evidence unchanged** — Evidence items with non-image types (Video, TestOutput, TerminalRecording) must continue to render as expandable list items using the existing EvidenceItem component, displayed below the image gallery.
  - **FR-13: Single image behavior** — When there is only one image, the gallery shows a single thumbnail. The lightbox opens without prev/next buttons and without the counter.
  - **FR-14: Empty gallery** — When there are no image evidence items, no gallery grid is rendered. Only non-image evidence items render in the expandable list.
  - **FR-15: Storybook stories** — The evidence-lightbox component must have a colocated `.stories.tsx` file with stories covering: default gallery grid, lightbox open state, single image, many images (6+), and mixed evidence types (images + non-images).

  ## Non-Functional Requirements

  - **NFR-1: Performance** — Thumbnails must use `loading="lazy"` to avoid loading off-screen images. The lightbox must only render its img element when open (Radix Dialog default unmount behavior).
  - **NFR-2: Visual consistency** — The lightbox overlay, close button styling, and download button must visually match the existing InlineAttachments fullscreen dialog pattern (bg-black/90 overlay, rounded close button with backdrop-blur, bottom bar on bg-background).
  - **NFR-3: Accessibility** — All navigation buttons must have descriptive `aria-label` attributes. The lightbox dialog must have an accessible title via `VisuallyHidden`. Images must have meaningful `alt` text from the evidence description. Focus must be trapped within the lightbox when open.
  - **NFR-4: Component architecture** — The lightbox must be a standalone component in `src/presentation/web/components/common/evidence-lightbox/` following the project's component convention (component.tsx, stories.tsx, index.ts). It must accept an array of image evidence items and the initially selected index as props.
  - **NFR-5: No new dependencies** — The feature must be built entirely from existing Radix Dialog primitives, Lucide icons, and Tailwind CSS. No new npm packages.
  - **NFR-6: Keyboard event isolation** — Arrow key handlers in the lightbox must not propagate to parent components or interfere with Radix Dialog's built-in keyboard handling. Use `event.stopPropagation()` as needed.
  - **NFR-7: Responsive within drawer** — The thumbnail grid must fit within the merge review drawer's constrained width without horizontal overflow. Thumbnails should fill available width evenly within the 3-column grid with consistent gap spacing.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Thumbnail gallery grid layout | Fixed 3-column grid | Drawer width is constrained and fixed; responsive auto-fill adds complexity without benefit |
  | 2 | Thumbnail aspect ratio | Square (1:1) with object-cover | Uniform grid appearance; full image visible in lightbox on click |
  | 3 | Image preloading | No preloading | Images served from localhost with caching; simplicity over marginal UX gain |
  | 4 | Control positioning | Bottom bar (counter + nav + download) | Consistent with InlineAttachments footer pattern; keeps image area clean |
  | 5 | Touch/swipe gestures | Keyboard and buttons only | Desktop-primary use case; swipe adds complexity without proportional benefit |
  | 6 | Description in lightbox | Show in bottom bar (truncated) | Provides context about what each screenshot demonstrates during review |

  ## Codebase Analysis

  ### Project Structure

  The repository follows Clean Architecture with four layers:
  - `packages/core/src/domain/` — Domain models and TypeSpec-generated types
  - `packages/core/src/application/` — Use cases and port interfaces
  - `packages/core/src/infrastructure/` — External concerns (DB, agents)
  - `src/presentation/web/` — Next.js web UI (the focus for this feature)

  Web UI components live under `src/presentation/web/components/`:
  - `ui/` — Base shadcn/ui primitives (Dialog, Badge, Button, etc.)
  - `common/` — Shared domain components (merge-review, inline-attachments, etc.)
  - `features/` — Feature-specific composite components

  Each component follows the convention:
  ```
  component-name/
    component-name.tsx
    component-name.stories.tsx
    component-name-config.ts (optional)
    index.ts
  ```

  ### Architecture Patterns

  - **UI primitives**: shadcn/ui built on Radix UI with Tailwind CSS
  - **Dialog pattern**: Radix `Dialog` + `DialogTrigger` + `DialogContent` with overlay
  - **Image serving**: Evidence files served via `/api/evidence?path=` API route
  - **Component composition**: Small, focused components with barrel exports
  - **Mandatory Storybook**: Every component requires a `.stories.tsx` file

  ### Existing Patterns to Build On

  **InlineAttachments** (`src/presentation/web/components/common/inline-attachments/inline-attachments.tsx`)
  already implements a single-image fullscreen dialog with:
  - Black overlay (`bg-black/90`)
  - Image at `max-h-[70vh]` with `object-contain`
  - Styled close button (rounded, backdrop-blur)
  - Download button in a bottom bar
  - Accessible `DialogTitle` via `VisuallyHidden`

  This pattern should be extended with gallery state and navigation controls.

  **MergeReview EvidenceItem** (`src/presentation/web/components/common/merge-review/merge-review.tsx`)
  is the current evidence rendering component that needs to be modified to:
  - Show image evidence as a thumbnail gallery grid
  - Keep non-image evidence (video, text) as expandable list items
  - Open a lightbox when clicking any gallery thumbnail

  ### Key Types

  ```typescript
  interface MergeReviewEvidence {
    type: 'Screenshot' | 'Video' | 'TestOutput' | 'TerminalRecording';
    capturedAt: string;
    description: string;
    relativePath: string;  // Absolute path, pre-normalized by backend
    taskRef?: string;
  }
  ```

  Image detection uses file extension matching:
  ```typescript
  const IMAGE_EXTENSIONS = new Set(['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg', '.bmp']);
  ```

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `src/presentation/web/components/common/merge-review/merge-review.tsx` | High | EvidenceList must separate images into gallery grid; EvidenceItem unchanged for non-images |
  | New: `src/presentation/web/components/common/evidence-lightbox/` | High | New lightbox component with fullscreen dialog, navigation state, keyboard handling |
  | `src/presentation/web/components/common/merge-review/merge-review-config.ts` | None | MergeReviewEvidence interface already has all required fields |
  | `src/presentation/web/components/ui/dialog.tsx` | None | Reuse as-is — no modifications needed to the base Dialog primitive |

  ## Dependencies

  **Existing code dependencies (no new libraries needed):**
  - `@radix-ui/react-dialog` — Already installed, provides Dialog primitives
  - `lucide-react` — Already installed, provides navigation icons (ChevronLeft, ChevronRight, X, Download)
  - Evidence API route (`/api/evidence`) — Already serves image files with proper MIME types and caching
  - `MergeReviewEvidence` interface — Already contains `type`, `relativePath`, `description` fields needed for gallery

  **No new npm dependencies required.** The lightbox can be built entirely from existing Radix Dialog primitives and Tailwind styling, consistent with how InlineAttachments already handles image previews.

  ## Size Estimate

  **M** — This is a medium-sized feature involving:
  - One new component (`evidence-lightbox/`) with Dialog, navigation state, and keyboard handling
  - Modifications to `EvidenceList` to separate images into a gallery grid vs. non-image list
  - Storybook stories for the new component
  - Follows well-established Dialog patterns already in the codebase
  - No new dependencies, no domain model changes, no API changes
