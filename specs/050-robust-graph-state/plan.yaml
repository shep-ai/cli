  ## Testing Strategy (TDD: Tests FIRST)

  **CRITICAL:** Tests are written FIRST in each TDD cycle.

  ### Unit Tests (RED -> GREEN -> REFACTOR)

  - `derive-graph.test.ts`: Pure derivation вҖ” featureвҶ’node mapping, edge generation from
    repositoryId/parentId, temp node handling, lifecycle/state mapping
  - `use-graph-state.test.tsx`: Reconciliation вҖ” server prop sync merges correctly, SSE event
    updates feature state, optimistic add/remove, tempвҶ’real ID resolution preserves edges
  - `use-control-center-state.test.tsx`: Adapted existing tests вҖ” delete/add handlers still work

  ### Integration Tests

  - Canvas renders correctly with derived nodes after SSE event updates domain state
  - Optimistic feature creation shows node immediately, resolves to real node without edge loss

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | Regression in existing canvas functionality | Adapt all existing tests first; run full test suite at each phase |
  | Performance regression from derivation on every domain change | useMemo with shallow equality on domain Maps; only re-derive when Maps change |
  | Server prop shape changes (layout.tsx passes nodes/edges, not domain data) | Phase 3 adapts layout.tsx to pass raw domain data OR keeps existing buildGraphNodes on server with client-side reconciliation |
  | React Flow StoreUpdater still emits replace changes | Keep onNodesChange as no-op or position-only handler since nodesDraggable=false |
