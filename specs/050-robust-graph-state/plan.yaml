  All mutation paths flow through domain maps. React Flow receives derived data only.

  ## Implementation Strategy

  **MANDATORY TDD**: All phases with executable code follow RED-GREEN-REFACTOR cycles.

  ### Phase 1: Domain-to-Node Derivation Module

  Extract the node/edge building logic from `build-graph-nodes.ts` into a pure `derive-graph.ts`
  module that takes domain Maps and returns `{ nodes, edges }`. This module is the heart of the
  new architecture вҖ” it's a pure function with no side effects, easy to test.

  The existing `build-graph-nodes.ts` server-side function stays as-is (used by `getGraphData`).
  The new `derive-graph.ts` is the client-side equivalent that works from Maps instead of arrays.

  ### Phase 2: useGraphState Hook

  Build the `useGraphState` hook that:
  1. Initializes domain Maps from server props (Feature[], Repository[], AgentRun[])
  2. Exposes `reconcile()` for server prop updates
  3. Exposes `applySSEEvent()` for SSE event processing
  4. Exposes `addPendingFeature()` / `removePendingFeature()` for optimistic UI
  5. Returns derived `nodes` and `edges` via `useMemo` over domain Maps

  ### Phase 3: Integration & Cleanup

  Wire `useGraphState` into `use-control-center-state.ts` (replacing scattered setNodes/setEdges),
  simplify `features-canvas.tsx` (remove enrichedNodes if possible), adapt existing tests, and
  update `web/CLAUDE.md`.

