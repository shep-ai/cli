decisions:
  - title: state architecture - domain maps vs react flow nodes as source of truth
    chosen: domain model maps (Feature, Repository, AgentRun) as source of truth with derived React Flow nodes/edges
    rejected:
      - keep React Flow nodes as source of truth with better coordination
      - use React Flow uncontrolled mode with useReactFlow() imperative API
      - zustand store mirroring React Flow internal state
    rationale: >
      The root cause of cascading breakage is that React Flow node objects serve dual duty as
      both the rendering data structure AND the state model. Domain models from generated output.ts
      already contain all the data needed (feature.repositoryId for edges, feature.parentId for
      dependencies). Storing domain maps and deriving nodes/edges eliminates referential integrity
      issues entirely — edges are computed from relationships, not stored independently. This also
      means SSE events just update a Feature field (lifecycle, status) instead of hunting through
      node arrays. Zustand was rejected because it adds a dependency without solving the derivation
      problem. Uncontrolled mode was rejected because it makes server-prop sync harder.

  - title: optimistic UI temp-to-real ID resolution strategy
    chosen: tempToRealId Map with pending feature entries in domain map
    rejected:
      - match by repositoryPath + name heuristic
      - use server-assigned IDs preemptively via API call
    rationale: >
      When a feature is created optimistically, we insert a pending entry into the features Map
      with a temp ID. When the server confirms (via SSE event or server-prop sync), we detect the
      new real ID and update tempToRealId. Since edges are derived from feature.repositoryId and
      feature.parentId (not from stored edge objects), the temp→real swap automatically produces
      correct edges. The heuristic matching approach (used in the broken polling fix) failed because
      it couldn't reliably match and didn't update edges atomically.

  - title: how to handle React Flow enrichedNodes pattern
    chosen: move callback injection into useGraphState derivation, eliminate separate enrichedNodes useMemo
    rejected:
      - keep enrichedNodes in features-canvas.tsx
      - use React Flow nodeTypes with built-in callback access via context
    rationale: >
      The enrichedNodes useMemo in features-canvas.tsx creates new node objects every render (because
      it injects callbacks), which triggers React Flow StoreUpdater to emit replace changes. Moving
      callback injection into the derivation layer means nodes are created once with stable references
      as long as the underlying domain data and callback refs don't change. This eliminates the need
      for the replace-change-filtering hack.

  - title: server prop sync vs polling fallback
    chosen: server prop sync only, with SSE as real-time layer - no client-side polling
    rejected:
      - 5s polling fallback alongside SSE
      - replace server props with polling entirely
    rationale: >
      The polling fallback added in the #217 fix was the direct cause of the orphaned edges bug.
      Server prop sync (triggered by layout.tsx re-render) combined with SSE events is sufficient.
      If SSE misses an event, the next hard navigation or drawer open triggers layout.tsx to re-render
      with fresh data. Adding polling creates a third update path that must perfectly coordinate with
      the other two — the complexity cost outweighs the benefit.

