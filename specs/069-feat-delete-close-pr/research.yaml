name: feat-delete-close-pr
summary: >
  Technical research for adding a toggleable "Close pull request" checkbox to the
  delete-feature dialog and CLI. The feature threads a closePr flag through the
  existing dialog → server action → use case pipeline, conditionally skips remote
  branch deletion when closePr is false, and updates pr.status to Closed after
  branch deletion. No new dependencies, no TypeSpec changes, no new interface
  methods required — the implementation follows existing codebase patterns exactly.

