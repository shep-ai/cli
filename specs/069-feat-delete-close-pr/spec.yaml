name: feat-delete-close-pr
number: 69
branch: feat/069-feat-delete-close-pr
oneLiner: Ensure open PRs are closed when deleting a feature (via remote branch deletion)
userQuery: >
  Add support to delete feature to also delete the remote branch / close the
  pull request
summary: >
  When a feature is deleted, the existing cleanup logic already removes
  worktrees and deletes local/remote branches. GitHub automatically closes a PR
  when its head branch is deleted, so the PR is already being auto-closed as a
  side effect of the remote branch deletion in Phase 2 cleanup. This feature
  leverages that behavior rather than adding an explicit closePr command —
  the only new work is updating the CLI/Web deletion summary to inform the user
  that the PR was auto-closed, and updating the feature's pr.status in the
  database to reflect the closed state so downstream components (e.g., PR sync
  watcher) remain consistent.
