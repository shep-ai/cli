  Add support to delete feature to also delete the remote branch / close the pull request
summary: >
  When a feature is deleted, the existing cleanup logic removes worktrees and deletes
  local/remote branches, but leaves any open GitHub PR untouched. This feature adds a
  closePr method to IGitPrService and calls it from DeleteFeatureUseCase so that open
  PRs are closed as part of the best-effort cleanup phase. The PR closure follows the
  established two-phase delete pattern: the feature is soft-deleted immediately (Phase 1),
  then PR closure runs as best-effort cleanup (Phase 2) alongside worktree removal and
  branch deletion.
