        selected: false
    selectionRationale: >
      GitHub natively closes PRs when their head branch is deleted. The existing
      cleanup already deletes the remote branch, making explicit PR closure
      redundant. Relying on the platform behavior is simpler, requires no new
      interface methods or service code, and avoids duplicating work that GitHub
      does automatically.
    answer: Rely on GitHub auto-close via branch deletion
  - question: >-
      Should the feature's pr.status be updated to Closed in the database after
      remote branch deletion?
    resolved: true
    options:
      - option: Update pr.status to Closed after remote branch deletion
        description: >
          After successfully deleting the remote branch for a feature that has
          an open PR, update feature.pr.status to Closed in the repository. This
          keeps the database consistent with GitHub's state and prevents the PR
          sync watcher (feature 039) from trying to sync a PR that no longer
          exists on GitHub. Best-effort — failure to update does not block
          deletion.
        selected: true
      - option: Do not update pr.status, let PR sync watcher handle it
        description: >
          Leave the pr.status as-is and let the existing PR sync watcher
          eventually detect that the PR was closed. However, since the feature is
          being soft-deleted, the sync watcher may never process it, leaving
          stale data. Also, the feature record is already soft-deleted at this
          point so updating it is mostly cosmetic.
        selected: false
    selectionRationale: >
      Updating pr.status to Closed after remote branch deletion keeps the
      database consistent. Even though the feature is soft-deleted, if it's ever
      queried with includeDeleted=true, the PR status should reflect reality.
      This is a small, best-effort update that adds consistency without
      complexity.
    answer: Update pr.status to Closed after remote branch deletion
  - question: >-
      Should the CLI and Web UI inform the user that an open PR was auto-closed
      during deletion?
    resolved: true
    options:
      - option: Post-deletion summary only
        description: >
          Only mention PR closure in the deletion summary output after the fact
          (e.g., "Cleanup: worktree, local branch, remote branch, PR #42
          closed"). Keeps the confirmation flow unchanged and avoids adding
          noise to the deletion prompt for a best-effort step.
        selected: true
      - option: Pre-deletion warning and post-deletion summary
        description: >
          Show a warning before deletion that an open PR exists and will be
          closed, and also report the result afterward. More informative but
          adds complexity to the confirmation flow and may be unnecessary since
          the user is already choosing to delete the feature.
        selected: false
    selectionRationale: >
      Post-deletion summary is sufficient. The user is already explicitly
      choosing to delete the feature and has confirmed the action. Adding a
      pre-deletion warning about PR closure adds noise without meaningful value
      — if you're deleting a feature, closing its PR is the obviously expected
      behavior. The summary line confirms what happened.
    answer: Post-deletion summary only
  - question: Should the Web UI delete-feature-dialog mention PR closure?
    resolved: true
    options:
      - option: No change to dialog
        description: >
          Keep the dialog as-is. PR closure is a side effect of remote branch
          deletion that does not need a separate UI control. The "Clean up
          worktree and branches" checkbox already implies full cleanup. Avoids a
          UI change for a low-impact detail.
        selected: true
      - option: Add informational text to dialog
        description: >
          Add a note like "This will also close any open pull request" to the
          dialog when cleanup is checked. Provides transparency but adds visual
          clutter for a behavior that is expected when deleting a feature.
        selected: false
    selectionRationale: >
      No change to the dialog is needed. PR closure is a natural consequence of
      remote branch deletion during feature cleanup. The dialog already
      communicates that cleanup will happen. Adding specific text about PR
      closure would over-communicate a detail that users expect by default.
    answer: No change to dialog
content: |
  ## Problem Statement

  When a user deletes a feature via `shep feat del`, the `DeleteFeatureUseCase` performs
  two-phase deletion: immediate soft-delete (Phase 1) followed by best-effort cleanup
  (Phase 2). The cleanup phase cancels agent runs, removes the git worktree, and deletes
  local/remote branches. GitHub automatically closes a PR when its head branch is deleted,
  so the PR is already being auto-closed as a side effect of the remote branch deletion.

  However, the system currently:
  1. Does not update the feature's `pr.status` in the database to reflect the auto-closure
  2. Does not inform the user in the CLI/Web summary that the PR was closed

  This feature adds awareness of the PR auto-closure: updating the feature's PR status
  in the database after remote branch deletion, and reporting the closure in the CLI
  deletion summary.

  ## Success Criteria

  - [ ] When cleanup deletes a remote branch for a feature with `pr.status === 'Open'`, the feature's `pr.status` is updated to `Closed` in the database
  - [ ] PR status update is best-effort: wrapped in try/catch, failure does not block or abort deletion
  - [ ] PR status update is skipped when `cleanup === false` (user opted out of cleanup)
  - [ ] PR status update is skipped when `feature.pr` is undefined (no PR was ever created)
  - [ ] PR status update is skipped when `feature.pr.status` is `Merged` or `Closed` (already terminal)
  - [ ] PR status update only happens after successful remote branch deletion (confirming GitHub auto-closed the PR)
  - [ ] CLI deletion summary includes "PR #N closed" when a feature with an open PR had its remote branch deleted
  - [ ] CLI deletion summary does not mention PR closure when no PR existed or PR was already closed/merged
  - [ ] Cascade delete updates PR status on child features that have open PRs
  - [ ] Unit tests for DeleteFeatureUseCase PR status update: open PR updated, merged PR skipped, closed PR skipped, no PR skipped, update failure handled gracefully, cleanup=false skips update
  - [ ] All existing tests continue to pass with no modifications

  ## Functional Requirements

  - **FR-1: Update PR status after remote branch deletion** — In `DeleteFeatureUseCase.cleanupSingleFeature`, after successfully deleting the remote branch: if `feature.pr` exists and `feature.pr.status === PrStatus.Open`, update the feature's `pr.status` to `PrStatus.Closed` via `featureRepo.update()`. This reflects the fact that GitHub auto-closed the PR when the head branch was deleted. Wrap in try/catch matching the existing best-effort pattern.

  - **FR-2: Skip PR status update when cleanup is disabled** — When `options.cleanup === false`, do not attempt to update PR status. This matches the existing behavior where branch deletion is also skipped when cleanup is disabled (no remote branch deletion means no PR auto-closure).

  - **FR-3: Skip PR status update for terminal PR states** — Do not update `pr.status` when `feature.pr.status` is `Merged` or `Closed`. These are terminal states where the PR is already resolved. Only `Open` PRs need their status updated to `Closed`.

  - **FR-4: Skip PR status update when no PR exists** — Do not attempt PR status update when `feature.pr` is `undefined`. The feature may never have had a PR created.

  - **FR-5: CLI summary includes PR closure info** — Update the CLI `del.command.ts` cleanup summary to include "PR #N closed" when the deleted feature had an open PR and cleanup was performed. The `DeleteFeatureUseCase.execute()` return value (`Feature`) already contains the PR data needed to determine this. The summary currently lists "worktree, local branch, remote branch" — append PR closure info when applicable.

  - **FR-6: Cascade delete handles child PRs** — When cascade deleting child features, each child's `cleanupSingleFeature` call should independently check and update its own PR status after remote branch deletion. No special handling needed beyond the existing cascade cleanup loop.

  ## Non-Functional Requirements

  - **NFR-1: Best-effort resilience** — PR status update failure must not prevent feature deletion from completing. The try/catch pattern must match the existing cleanup error handling: catch all errors, do not rethrow. The feature soft-delete (Phase 1) is already committed before cleanup begins.

  - **NFR-2: No new dependencies** — No new npm packages, system dependencies, or CLI commands. The implementation only uses existing `IFeatureRepository.update()` and the feature's existing PR data.

  - **NFR-3: No new interface methods** — No changes to `IGitPrService`. GitHub's auto-close behavior via branch deletion means no explicit `closePr` method is needed. The existing `deleteBranch(cwd, branch, true)` call already triggers PR closure on GitHub's side.

  - **NFR-4: Test isolation** — All new unit tests must mock `IFeatureRepository.update()`. No tests should make real GitHub API calls. Tests should verify that `featureRepo.update()` is called with `pr.status = Closed` after remote branch deletion for features with open PRs.

  - **NFR-5: No domain model changes** — The existing `Feature.pr` and `PullRequest` types already contain all necessary data (`number`, `status`). No TypeSpec changes required. `PrStatus.Closed` already exists in the enum.

  - **NFR-6: No Web UI changes** — The delete-feature-dialog does not need modification. PR closure is a side effect of remote branch deletion, not a separate user-facing option.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Should we add an explicit closePr call or rely on GitHub's auto-close? | Rely on GitHub auto-close | GitHub natively closes PRs when their head branch is deleted. The cleanup already deletes the remote branch, making explicit PR closure redundant. |
  | 2 | Should pr.status be updated in the database? | Yes, update to Closed | Keeps database consistent with GitHub state. Even though feature is soft-deleted, querying with includeDeleted should show accurate PR status. |
  | 3 | Should the CLI/Web UI warn about PR closure before deleting? | Post-deletion summary only | User is already confirming deletion. PR closure is expected behavior. Report it in the summary. |
  | 4 | Should the Web UI dialog mention PR closure? | No change to dialog | PR closure is a natural part of branch cleanup. Over-communicating adds clutter without value. |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | `packages/core/src/application/use-cases/features/delete-feature.use-case.ts` | Medium | Add PR status update to Closed after successful remote branch deletion in `cleanupSingleFeature` |
  | `tests/unit/application/use-cases/features/delete-feature.use-case.test.ts` | Medium | Add test cases for PR status update (open PR updated, merged PR skipped, no PR skipped, update failure handled, cleanup=false skips) |
  | `src/presentation/cli/commands/feat/del.command.ts` | Low | Update cleanup summary to mention "PR #N closed" when applicable |

  ## Dependencies

  - **Existing `feature.pr` data** — The `Feature` domain model already has an optional `pr`
    field with `number` and `status` properties. No domain model changes needed.
  - **GitHub auto-close behavior** — GitHub automatically closes a PR when its head branch
    is deleted. This is a platform guarantee that the existing remote branch deletion leverages.
  - **`IFeatureRepository.update()`** — Already used in the delete flow. Will be reused to
    update pr.status after remote branch deletion.
  - **`DeleteFeatureUseCase`** — Already has all necessary injected services. No new DI
    registration needed.

  ## Size Estimate

  **XS** — This is an extra-small change. No new interface methods, no new service code,
  no domain model changes. The main work is:

  1. Add ~5 lines to `cleanupSingleFeature` to update `pr.status` to `Closed` after remote branch deletion
  2. Add ~5 unit tests for the PR status update logic
  3. Update the CLI summary output (~3 lines) to mention PR closure when applicable

  No new dependencies, no web UI changes, no TypeSpec changes.

  ---

