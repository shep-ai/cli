# Markdown content (the full tasks document)
content: |
  ## Summary

  The implementation is split into 10 tasks across 3 phases. Phase 1 establishes
  the core business logic in the application layer by adding `closePr` to
  `DeleteFeatureOptions`, conditionally skipping remote branch deletion, and
  updating `pr.status` to `Closed` after successful remote branch deletion.

  Phase 2 threads the `closePr` flag through the entire web UI data flow: first
  the dialog gets a new checkbox with cleanup coupling, then the callback
  signature and call sites are updated (feature-node, feature-drawer, custom
  event, control-center state), and finally the server action passes it to the
  use case.

  Phase 3 adds CLI support with a `--no-close-pr` flag, an interactive prompt
  shown when the feature has an open PR and cleanup is enabled, and a summary
  line showing PR closure status.

  Each task follows TDD (RED-GREEN-REFACTOR) where applicable, with tests
  written before implementation. The tasks are ordered by dependency: the use
  case changes come first (tasks 1-2), then the web UI changes (tasks 3-7),
  and finally the CLI changes (tasks 8-10). The CLI tasks depend only on the
  use case tasks, not on the web UI tasks, but are sequenced after them for
  a cleaner implementation flow.

  ---

  _Task breakdown for implementation tracking_
