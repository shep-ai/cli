name: "electron-desktop-wrapper"
summary: >
  Package the shep Next.js web UI as a native Electron desktop app. The implementation
  follows a phased approach: (1) scaffold the workspace package and core port interfaces,
  (2) build the Electron main process with bootstrap, window management, and tray,
  (3) create Electron-specific adapters and IPC bridge, (4) configure packaging with
  electron-builder and native module rebuilding, (5) add CI pipeline for cross-platform
  builds. All existing behavior is preserved — Electron-specific code lives exclusively
  in packages/electron/ and adapters are wired via post-initialization DI token replacement.

relatedFeatures: []
technologies:
  - "Electron 35.x"
  - "electron-builder 26.x"
  - "@electron/rebuild"
  - "electron-window-state"
  - "Next.js 16"
  - "better-sqlite3 (native addon)"
  - "tsyringe (DI container)"
  - "pnpm workspaces"
  - "contextBridge / preload scripts"
relatedLinks:
  - title: "Electron Documentation"
    url: "https://www.electronjs.org/docs/latest"
  - title: "electron-builder Configuration"
    url: "https://www.electron.build/configuration.html"
  - title: "Electron Security Best Practices"
    url: "https://www.electronjs.org/docs/latest/tutorial/security"
  - title: "electron-window-state"
    url: "https://github.com/mawie81/electron-window-state"
  - title: "@electron/rebuild"
    url: "https://github.com/electron/rebuild"

phases:
  - id: "phase-1"
    name: "Foundation — Workspace Scaffold & Core Port Interfaces"
    description: >
      Create the packages/electron/ workspace package with package.json, tsconfig.json,
      and basic directory structure. Add IDesktopNotifier and IBrowserOpener port interfaces
      to packages/core/src/application/ports/. Make existing DesktopNotifier and
      BrowserOpenerService implement these interfaces (no logic changes). Register
      BrowserOpenerService in the DI container (it currently is not). This phase establishes
      the foundation that all subsequent phases build upon — it must come first because
      Electron code imports from @shepai/core, and the adapters implement core interfaces.
    parallel: false

  - id: "phase-2"
    name: "Electron Main Process — Bootstrap, Window & Tray"
    description: >
      Build the Electron main process entry point (main.ts) that replicates the
      dev-server.ts / _serve bootstrap sequence: initializeContainer(), settings,
      watchers, WebServerService. Add the splash screen, BrowserWindow creation,
      system tray with minimize-to-tray behavior, window state persistence via
      electron-window-state, and graceful shutdown orchestration. Also add the
      Electron-specific web directory resolver for packaged ASAR paths. This phase
      produces a runnable Electron app that displays the web UI.
    parallel: false

  - id: "phase-3"
    name: "Adapters, IPC Bridge & Update Checker"
    description: >
      Create ElectronDesktopNotifier (subscribes to NotificationEventBus, creates
      Electron Notification objects) and ElectronBrowserOpener (focuses BrowserWindow
      or calls shell.openExternal). Build the preload script with contextBridge API
      (version info, update status, window controls, isElectron flag). Wire adapters
      into the bootstrap via post-initialization DI token replacement. Add the GitHub
      Releases version check with in-app update notification. Add daemon coexistence
      detection (port conflict dialog).
    parallel: false

  - id: "phase-4"
    name: "Packaging & Distribution"
    description: >
      Configure electron-builder (electron-builder.yml) for macOS (.dmg), Windows
      (NSIS .exe), and Linux (.AppImage). Configure native module rebuilding via
      @electron/rebuild for better-sqlite3. Set up asarUnpack for native .node
      binaries. Add app icons and tray icons for all platforms. Add build scripts
      to root package.json. Verify packaged app launches correctly on at least
      one platform.
    parallel: false

  - id: "phase-5"
    name: "CI Pipeline & Backward Compatibility Verification"
    description: >
      Add a new build-electron job to .github/workflows/ci.yml with a matrix
      strategy for macOS, Windows, and Linux. On tagged releases, upload Electron
      installers as GitHub Release assets via release.config.mjs. Run the full
      existing test suite (unit, integration, e2e) to verify zero regressions.
      Ensure pnpm build and pnpm build:release still work unchanged.
    parallel: false

