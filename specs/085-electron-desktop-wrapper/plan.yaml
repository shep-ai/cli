content: |
  ## Architecture Overview

  The Electron desktop app is a new **presentation layer** that sits alongside the existing CLI and
  web UI. It consumes the same `@shepai/core` APIs via the DI container, starts the same Next.js
  web server via `WebServerService`, and runs the same background watchers. The entire Electron
  codebase lives in `packages/electron/` — a new pnpm workspace member.

  ```
  packages/core/           <- Core (unchanged, gains 2 port interfaces)
  src/presentation/cli/    <- CLI (unchanged)
  src/presentation/web/    <- Web UI (unchanged)
  packages/electron/       <- Electron desktop (NEW)
  ```

  The Electron main process replicates the proven bootstrap sequence from `dev-server.ts` (lines
  75-114) and `_serve.command.ts` (lines 69-111):

  1. `initializeContainer()` — DI + DB migrations + all service registrations
  2. `globalThis.__shepContainer = container` — expose to Next.js server actions
  3. Post-init DI overrides — replace DesktopNotifier and IBrowserOpener tokens
  4. `InitializeSettingsUseCase.execute()` + `initializeSettings()`
  5. Start notification, PR-sync, and auto-archive watchers
  6. `WebServerService.start(port, dir, dev)` — Next.js on dynamic localhost port
  7. Load `http://localhost:<port>` in `BrowserWindow`

  ## Key Design Decisions

  ### 1. DI Container Override via Token Replacement (No Core Modifications)

  tsyringe's `container.register()` naturally replaces previous registrations for the same token.
  This is already used in the codebase (container.ts line 284: conditional mock executor via
  `process.env.SHEP_MOCK_EXECUTOR`). The Electron bootstrap calls `initializeContainer()` first
  (completely unchanged), then overrides specific tokens:

  ```typescript
  await initializeContainer();
  container.register('DesktopNotifier', { useFactory: () => new ElectronDesktopNotifier(bus) });
  container.register('IBrowserOpener', { useFactory: () => new ElectronBrowserOpener(mainWindow) });
  ```

  This preserves full backward compatibility — CLI and web see exactly the same container.

  ### 2. ElectronDesktopNotifier Subscribes to NotificationEventBus Directly

  The `NotificationService` currently emits to the bus for in-app toasts (line 56 of
  notification.service.ts) but has desktop notifications disabled (line 59: "removed in favour of
  in-app toasts"). Rather than re-enabling the commented-out path (which would modify
  NotificationService), the `ElectronDesktopNotifier` subscribes directly to the
  `NotificationEventBus` (the `globalThis` singleton via `Symbol.for('shep:notification-bus')`).

  When a notification event is emitted, the Electron adapter independently creates an Electron
  `Notification` object. Zero changes to NotificationService. The adapter is wired up only in the
  Electron bootstrap. In CLI/web context, nothing listens for native OS notifications.

  ### 3. BrowserOpenerService Gets DI Registration

  `BrowserOpenerService` is currently instantiated directly in `start-daemon.ts` (line 144) and
  `ui.command.ts` (line 127) — not registered in the DI container. To support adapter replacement,
  it needs a DI token (`IBrowserOpener`). The existing call sites will resolve from the container
  instead. The Electron bootstrap overrides with `ElectronBrowserOpener` that focuses the existing
  `BrowserWindow` for app URLs or calls `shell.openExternal()` for external URLs.

  ### 4. Custom Server Approach for Next.js

  The codebase already embeds Next.js via `WebServerService` on a localhost port. The Electron
  main process uses the exact same approach — no protocol handlers, no serverless mode, no
  standalone output. The only addition is `resolveWebDirForElectron()` in `packages/electron/`
  that resolves the web bundle from `process.resourcesPath` in packaged mode.

  ### 5. Electron 35.x with Node.js 22 ABI Matching

  The project requires Node.js >= 22. Electron 35.x ships Node.js 22.x, ensuring `better-sqlite3`
  compiled against Node 22 ABI works correctly after `@electron/rebuild`. This avoids the ABI
  mismatch issues that would come from Electron 41.x (Node 24) or Electron 33.x (Node 20).

  ### 6. System Tray with Minimize-to-Tray

  Closing the window (red X / Cmd+W) hides the window and keeps the app alive in the system tray.
  Background watchers continue running. The actual quit path goes through the tray menu or Cmd+Q,
  which triggers the graceful shutdown sequence (stop watchers -> stop web server -> close DB -> exit).

  ### 7. GitHub Releases API for Update Check (No Code Signing Required)

  On app startup (with a 10-second delay), the main process fetches the latest release from GitHub
  API and compares versions. If a newer version exists, an IPC message triggers an in-app banner.
  This avoids the code signing requirement of `electron-updater`.

  ## Implementation Strategy

  The phases are ordered by dependency: Phase 1 creates the workspace and core interfaces that all
  other phases depend on. Phase 2 builds the runnable Electron shell that Phase 3's adapters and
  IPC plug into. Phase 4 packages what Phases 2-3 produce. Phase 5 validates everything in CI.

  Within each phase, tasks follow a strict dependency chain — later tasks build on earlier ones.
  TDD is applied to all testable code (adapters, bootstrap logic, IPC handlers, update checker).
  Packaging and CI tasks use integration-style verification instead of unit tests.

  The critical path is: workspace scaffold -> main process bootstrap -> web server integration ->
  packaging -> CI. Adapters and IPC are on a parallel track that merges before packaging.

  ## Risk Mitigation

  | Risk | Mitigation |
  | ---- | ---------- |
  | better-sqlite3 ABI mismatch in Electron | Use Electron 35.x (Node 22) matching project's engine requirement. @electron/rebuild runs during electron-builder's npmRebuild step. asarUnpack for native .node binaries. Test on all three platforms in CI. |
  | Next.js path resolution fails in ASAR | Separate resolveWebDirForElectron() in packages/electron/ handles packaged paths. Web bundle is copied to resources/web/ outside ASAR. Test with actual packaged build before CI integration. |
  | DI token replacement breaks existing registrations | Token replacement is additive — existing registrations work until overridden. Only the Electron bootstrap calls override. Verify all existing tests pass unchanged (NFR-12). |
  | System tray behavior inconsistencies across platforms | Use Electron's built-in Tray API which handles platform differences. macOS template images, Windows ICO, Linux PNG. Test on all three platforms in CI matrix. |
  | Electron + Next.js memory exceeds 300MB budget | Profile early in Phase 2. Next.js production mode is significantly lighter than dev mode. If over budget, investigate renderer process throttling when window is hidden. |
  | Packaged installer exceeds 250MB | Monitor size during Phase 4. electron-builder's ASAR compression helps. If over budget, investigate excluding dev dependencies and unnecessary node_modules. |
  | Port conflict with running CLI daemon | Phase 3 adds port conflict detection dialog. User chooses to connect to existing daemon or start on a new port. Reuses existing findAvailablePort() logic. |
  | Preload script exposes too much to renderer | Minimal contextBridge API: version, update status, window controls, isElectron flag. No Node.js APIs exposed. Security review as part of Phase 3 task acceptance criteria. |
  | CI build time exceeds 10-minute budget per platform | Electron builds run in parallel with existing CI jobs. electron-builder caches Electron binaries. Expected 3-5 minutes per platform. Monitor in Phase 5. |
  | Backward compatibility regression | Run full existing test suite (unit, integration, e2e) in Phase 5. Any test failure indicates a backward compatibility violation that must be fixed before merge. |
