name: "electron-desktop-wrapper"
number: 85
branch: "feat/085-electron-desktop-wrapper"
oneLiner: "Package shep web UI as a native desktop app using Electron"
summary: "Wrap the existing shep Next.js web UI in an Electron shell to provide a native desktop application\nexperience. The Electron app embeds the existing web server (Next.js) in a BrowserWindow, manages\nthe backend lifecycle (DI container, database, watchers), and distributes as platform-specific\ninstallers for macOS, Windows, and Linux. Users get a dock/taskbar icon, system tray, native\nnotifications, and auto-update — no terminal or Node.js installation required.\n\nCRITICAL DESIGN PRINCIPLE: Full backward compatibility. The existing CLI, web UI, and daemon MUST\ncontinue to work exactly as they do today with ZERO changes to their behavior. Electron-specific\nfunctionality (native notifications, window management, tray) is injected via the DI container\nat bootstrap time — never by modifying core service implementations. The Electron wrapper is a\nnew presentation layer that consumes the same core APIs as the CLI and web UI.\n"
phase: "Requirements"
sizeEstimate: "L"
relatedFeatures: []
