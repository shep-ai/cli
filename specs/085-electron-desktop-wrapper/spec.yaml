content: |
  ## Problem Statement

  Shep currently runs as a CLI tool that spawns a Next.js web UI either in the foreground (`shep ui`) or as a
  background daemon (`shep start`). Users must install Node.js >= 22, install the npm package globally, and
  interact via the terminal. This creates friction for non-CLI-native users and prevents a polished native
  desktop experience (dock icon, system tray, native notifications, auto-launch on login).

  Wrapping shep in Electron provides a native desktop app that bundles Node.js, manages its own lifecycle,
  and delivers the web UI in a dedicated BrowserWindow — no terminal required. The app embeds the same
  Next.js server, DI container, and background watchers that the CLI daemon runs, but packages them as a
  single installable binary with platform-native UX.

  ## Success Criteria

  - [ ] Electron app launches and displays the shep web UI in a BrowserWindow on macOS, Windows, and Linux
  - [ ] DI container initializes correctly with all services (SQLite, watchers, notifications) in the Electron main process
  - [ ] better-sqlite3 native addon loads without errors in the packaged Electron binary on all three platforms
  - [ ] Background watchers (PR sync, notifications, auto-archive) start on app launch and continue while minimized to tray
  - [ ] System tray icon is visible with context menu (Show Window, Quit) on all three platforms
  - [ ] Closing the main window minimizes to tray instead of quitting the app
  - [ ] Native OS notifications fire via Electron Notification API when notification events occur
  - [ ] App checks for updates on launch and shows a notification with download link when a new version is available
  - [ ] Platform-specific installers are produced: .dmg (macOS), .exe NSIS (Windows), .AppImage (Linux)
  - [ ] CI pipeline builds and uploads Electron installers as GitHub Release assets on tagged releases
  - [ ] Electron app coexists with CLI — both can run (not simultaneously) sharing the same ~/.shep/ data directory
  - [ ] App gracefully shuts down on quit: stops web server, closes database connections, cancels watchers
  - [ ] packages/electron/ workspace package exists with its own package.json, tsconfig, and electron-builder config

  ## Functional Requirements

  - **FR-1**: The Electron main process MUST initialize the DI container (`initializeContainer()`), settings, and all background watchers before creating the BrowserWindow — mirroring the bootstrap sequence of the `_serve` CLI command.
  - **FR-2**: The Electron main process MUST start the Next.js web server (via `WebServerService`) on a dynamically allocated port and load the resulting URL in a BrowserWindow.
  - **FR-3**: The app MUST resolve the bundled Next.js web directory correctly in both development mode (source directory) and production mode (packaged ASAR/resources path).
  - **FR-4**: The app MUST display a system tray icon on all platforms with a context menu containing at minimum: "Show Window" and "Quit" actions.
  - **FR-5**: Closing the main window (red X / Cmd+W) MUST minimize the app to the system tray instead of quitting. The Quit action (tray menu or Cmd+Q) MUST fully exit the app.
  - **FR-6**: The app MUST perform a graceful shutdown sequence on quit: stop background watchers, stop the web server, close SQLite database connections, then exit.
  - **FR-7**: The app MUST use Electron's native Notification API to deliver desktop notifications when notification events are emitted by the notification bus, replacing the disabled node-notifier dependency.
  - **FR-8**: The app MUST check GitHub Releases for newer versions on startup and display an in-app notification with a download link when an update is available.
  - **FR-9**: The app MUST rebuild better-sqlite3 against Electron's Node.js ABI during the build process using @electron/rebuild.
  - **FR-10**: The app MUST produce platform-specific installers: .dmg for macOS, NSIS .exe for Windows, and .AppImage for Linux via electron-builder.
  - **FR-11**: The Electron app MUST coexist with the CLI installation — both use the same ~/.shep/ data directory and SQLite database. The app MUST detect if a daemon is already running on the target port and either show an error or connect to the existing server.
  - **FR-12**: The app MUST expose a preload script that bridges any required IPC between the renderer (web UI) and main process (e.g., native notifications, window controls, version info).
  - **FR-13**: The browser-opener service MUST be replaced or stubbed in the Electron context so that "open in browser" actions focus the existing BrowserWindow instead of launching an external browser.
  - **FR-14**: The app MUST set a proper application name, icon, and metadata (description, copyright) that appear in the OS dock/taskbar, About dialog, and installer.

  ## Non-Functional Requirements

  - **NFR-1**: Cold start time (app launch to web UI visible) MUST be under 5 seconds on modern hardware (SSD, 8GB RAM). The Next.js server startup is the bottleneck — a loading splash screen MUST be shown while the server initializes.
  - **NFR-2**: Memory usage of the Electron app at idle (web UI loaded, no active features) MUST stay under 300MB RSS. Electron's baseline (~150MB) plus the Next.js server and SQLite should fit within this budget.
  - **NFR-3**: The Electron package MUST NOT exceed 250MB compressed installer size per platform. This includes Electron runtime (~120MB), Node.js, the web UI bundle, and native addons.
  - **NFR-4**: The Electron main process MUST NOT expose Node.js integration to the renderer via `nodeIntegration: true`. All main-process access MUST go through a contextBridge preload script to maintain Electron security best practices.
  - **NFR-5**: The Electron package MUST be structured as a pnpm workspace package at `packages/electron/` following the existing monorepo conventions, with its own `package.json` and `tsconfig.json`.
  - **NFR-6**: The CI build for Electron installers MUST run in parallel with existing CI jobs (lint, test, build) and MUST NOT increase the total CI wall-clock time by more than 10 minutes per platform.
  - **NFR-7**: The Electron app MUST handle SQLite database migrations on startup the same way the CLI does — running pending migrations before the web server starts. Database file locking MUST prevent concurrent write access if both CLI and Electron attempt to write simultaneously.
  - **NFR-8**: The app MUST support the existing `~/.shep/` data directory conventions — settings, database, logs, and feature data MUST be read from and written to the same locations the CLI uses.
  - **NFR-9**: The app window MUST remember its position and size across restarts using electron-store or equivalent persistent state, respecting multi-monitor setups.
  - **NFR-10**: The Electron app MUST work without an internet connection for all local functionality (viewing features, browsing history, settings). Network-dependent features (PR sync, update check) MUST degrade gracefully with appropriate UI feedback.

  ## Product Questions & AI Recommendations

  | # | Question | AI Recommendation | Rationale |
  | - | -------- | ----------------- | --------- |
  | 1 | Which packaging tool? | electron-builder | Mature, native module support, built-in auto-update, YAML config |
  | 2 | Replace node-notifier? | Yes, use Electron Notification API | node-notifier already disabled; eliminates a native dep rebuild |
  | 3 | Auto-update scope? | Manual download with update notification | Full auto-update requires paid code signing certificates |
  | 4 | Package structure? | New workspace at packages/electron/ | Follows existing monorepo conventions |
  | 5 | Platform support? | macOS, Windows, and Linux | Developers use all three; electron-builder handles natively |
  | 6 | System tray? | Yes, with background mode | Watchers need to run continuously like the daemon model |
  | 7 | Code signing? | Skip for initial release | $500+/yr cost; early adopters can bypass OS warnings |
  | 8 | CLI coexistence? | Coexist independently | Separate distribution channels sharing same data directory |

  ## Affected Areas

  | Area | Impact | Reasoning |
  | ---- | ------ | --------- |
  | New: `packages/electron/` | High | New Electron main process, preload scripts, build config, and electron-builder YAML |
  | `packages/core/src/infrastructure/services/web-server.service.ts` | Medium | Path resolution needs an Electron-aware branch for packaged app resources |
  | `packages/core/src/infrastructure/services/browser-opener.service.ts` | Medium | Must be stubbed or replaced in Electron context to focus BrowserWindow |
  | `packages/core/src/infrastructure/services/notifications/desktop-notifier.ts` | Medium | Electron build uses Electron Notification API instead of node-notifier |
  | `packages/core/src/infrastructure/di/container.ts` | Low | DI initialization reused from Electron main process, no changes expected |
  | `packages/core/src/infrastructure/persistence/sqlite/` | Medium | better-sqlite3 native addon must be rebuilt for Electron's Node.js ABI |
  | `src/presentation/web/next.config.ts` | Low | May need `output: 'standalone'` for optimized Electron bundling |
  | `pnpm-workspace.yaml` | Low | Add `packages/electron` to workspace members |
  | `.github/workflows/ci.yml` | Medium | New job for building Electron installers on macOS, Windows, and Linux runners |
  | `release.config.mjs` | Low | Add Electron installer artifacts to GitHub Release assets |
  | Root `package.json` | Low | New scripts for Electron dev and build commands |

  ## Dependencies

  **Existing code dependencies:**
  - `initializeContainer()` from `@shepai/core` — bootstraps the entire backend DI container
  - `WebServerService` — manages the Next.js server lifecycle (start/stop)
  - `InitializeSettingsUseCase` — settings initialization on first run
  - `resolveWebDir()` — resolves the Next.js web directory (needs Electron-aware path)
  - Notification bus (globalThis singleton) — EventEmitter for notification events
  - Notification, PR-sync, and auto-archive watcher services — background tasks
  - SQLite migration runner — must execute before web server starts

  **New external dependencies:**
  - `electron` (~33.x) — the Electron framework
  - `electron-builder` (~25.x) — packaging and distribution
  - `@electron/rebuild` — rebuilding native addons for Electron's Node.js version
  - `electron-store` — persistent window state (position, size)

  **Native addon concerns:**
  - `better-sqlite3` must be compiled against Electron's Node.js headers via @electron/rebuild
  - `node-notifier` is NOT needed in Electron build (replaced by Electron Notification API)
  - Platform-specific builds: macOS (.dmg), Windows (.exe NSIS), Linux (.AppImage)

  ## Size Estimate

  **L** — This is a week+ effort. Justification:
  1. New Electron main process with full lifecycle management (app ready, window creation, tray, shutdown)
  2. Native addon rebuilding and cross-platform testing (better-sqlite3 is the critical path)
  3. Embedding Next.js server in Electron main process with correct packaged path resolution
  4. electron-builder configuration for macOS, Windows, and Linux packaging
  5. CI pipeline additions for building and publishing platform-specific installers
  6. System tray implementation with background mode across three platforms
  7. Update notification system (GitHub Releases version check)
  8. Replacing browser-opener with Electron-native window management
  9. Preload script and IPC bridge for secure renderer-main communication
  10. Window state persistence and splash screen during server startup

