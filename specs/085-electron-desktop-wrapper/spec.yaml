openQuestions:
  - question: "Which Electron packaging tool should we use?"
    resolved: true
    options:
      - option: "electron-builder"
        description: "Mature, widely used, supports auto-update out of the box, YAML config, handles code signing and notarization. Large community, well-documented. Slightly more opinionated but covers 95% of use cases without custom scripts."
        selected: true
      - option: "Electron Forge"
        description: "Official Electron toolchain, plugin-based architecture, more flexible for custom workflows. Newer, smaller community, requires more configuration for advanced scenarios like native module rebuilding and auto-update."
        selected: false
    selectionRationale: "electron-builder is the safer choice for a first Electron integration. It has broader community adoption, better documentation for native module rebuilding (critical for better-sqlite3), built-in auto-update support via electron-updater, and simpler YAML-based configuration. Electron Forge is catching up but adds complexity we don't need for an initial release."
    answer: "electron-builder"
  - question: "How should the Electron app handle desktop notifications?"
    resolved: true
    options:
      - option: "Conditional adapter via DI — Electron Notification API when in Electron, existing behavior otherwise"
        description: "Create a new IDesktopNotifier port interface and an ElectronDesktopNotifier adapter that uses Electron's built-in Notification class. Register it in the DI container only when running inside Electron. The existing DesktopNotifier (node-notifier) and NotificationService remain completely untouched. If node-notifier is disabled in settings, it stays disabled — the Electron adapter simply provides an alternative implementation that is available when running in the Electron context. Full backward compatibility: CLI and web UI behavior is unchanged."
        selected: true
      - option: "Replace node-notifier globally with Electron Notification API"
        description: "Remove node-notifier entirely and use Electron Notification API everywhere. Breaks backward compatibility — CLI and non-Electron contexts lose the desktop notification capability (even if currently disabled). Couples core to Electron."
        selected: false
      - option: "Keep node-notifier unchanged, no Electron integration"
        description: "Do not integrate Electron's Notification API at all. Desktop notifications remain disabled in all contexts. Misses the opportunity to provide native notifications in the Electron app where they work out of the box."
        selected: false
    selectionRationale: "The user explicitly requires full backward compatibility. The correct approach is a conditional adapter pattern: create a port interface (IDesktopNotifier), keep the existing node-notifier-based DesktopNotifier as the default implementation, and register an ElectronDesktopNotifier adapter only when the app detects it is running inside Electron. This follows the existing DI/port pattern in the codebase and ensures zero changes to CLI or web behavior. If node-notifier is disabled in settings, it stays disabled — the Electron adapter is simply an alternative that the Electron bootstrap can opt into."
    answer: "Conditional adapter via DI — Electron Notification API when in Electron, existing behavior otherwise"
  - question: "What is the scope of auto-update for the initial release?"
    resolved: true
    options:
      - option: "Full auto-update via electron-updater"
        description: "Background update checks on app start, download in background, prompt user to restart to apply. Uses GitHub Releases as the update server (free for open source). Requires code signing on macOS and Windows for update verification."
        selected: true
      - option: "Manual download with update notification"
        description: "Check GitHub Releases API for new versions on app start, show a notification/banner in the app with a link to download. No background download or automatic installation. Simpler to implement, no code signing requirement for updates."
        selected: false
      - option: "No auto-update"
        description: "Users must manually check for and download new versions. Simplest to implement but poor UX for a desktop app."
        selected: false
    selectionRationale: "Full auto-update requires code signing on all platforms (Apple Developer Program $99/yr, Windows EV certificate ~$400/yr) and adds significant implementation complexity. For the initial release, a version-check notification that directs users to download the latest release from GitHub is a pragmatic middle ground — it provides update awareness without the signing infrastructure. Auto-update can be added in a follow-up feature once signing is established."
    answer: "Full auto-update via electron-updater"
  - question: "Should the Electron package live as a new pnpm workspace package or a top-level directory?"
    resolved: true
    options:
      - option: "New workspace package at packages/electron/"
        description: "Follows the existing monorepo pattern (packages/core/, src/presentation/web/). Gets its own package.json, tsconfig, and dependencies. Clean separation of concerns. Can import from @shepai/core via workspace protocol."
        selected: true
      - option: "Top-level electron/ directory"
        description: "Simpler structure, fewer workspace configuration changes. But breaks the established monorepo convention and makes dependency management less clean."
        selected: false
    selectionRationale: "The project already uses pnpm workspaces with packages/core/ and src/presentation/web/ as workspace members. Adding packages/electron/ follows the established pattern, keeps Electron-specific dependencies isolated (electron, electron-builder don't pollute the root), and allows clean workspace imports of @shepai/core."
    answer: "New workspace package at packages/electron/"
  - question: "Which platforms should be supported in the initial release?"
    resolved: true
    options:
      - option: "macOS and Windows only"
        description: "Covers ~95% of desktop developer market share. Reduces CI build matrix complexity. Linux can be added later. macOS requires .dmg, Windows requires .exe (NSIS installer)."
        selected: false
      - option: "macOS, Windows, and Linux"
        description: "Full platform coverage from day one. Linux developers are a significant portion of the target audience (developers). Adds .AppImage and/or .deb to the build matrix. Slightly more CI time but electron-builder handles all three natively."
        selected: true
    selectionRationale: "Shep targets developers, and Linux has significant share among this audience. electron-builder supports all three platforms with minimal additional configuration. The CI cost is one extra build target. Shipping all three from the start avoids community complaints and demonstrates first-class cross-platform support."
    answer: "macOS, Windows, and Linux"
  - question: "Should the app include a system tray icon with background mode?"
    resolved: true
    options:
      - option: "System tray with background mode"
        description: "App minimizes to system tray on close (instead of quitting). Tray icon shows status, provides quick actions (open window, quit). Keeps watchers running in background. More complex but expected behavior for a long-running desktop app."
        selected: true
      - option: "Standard window-only (quit on close)"
        description: "Closing the window quits the app entirely. Simpler implementation. Watchers stop when app closes. Users must reopen app to resume monitoring."
        selected: false
    selectionRationale: "Shep runs background watchers (PR sync, notifications, auto-archive) that users expect to continue running. A system tray icon with 'minimize to tray on close' is the standard pattern for long-running desktop apps. Quitting on window close would stop all watchers and break the 'always monitoring' experience that the daemon model currently provides."
    answer: "System tray with background mode"
  - question: "How should code signing be handled for the initial release?"
    resolved: true
    options:
      - option: "No code signing initially"
        description: "Skip code signing for the first release. macOS users see a Gatekeeper warning (right-click > Open to bypass). Windows users see SmartScreen warning. Reduces cost and setup complexity. Signing can be added later."
        selected: true
      - option: "Full code signing from day one"
        description: "macOS: Apple Developer ID + notarization. Windows: EV code signing certificate. Eliminates OS security warnings. Requires paid certificates and CI secrets management. Higher initial cost (~$500/yr)."
        selected: false
    selectionRationale: "Code signing requires paid certificates (Apple Developer Program $99/yr, Windows EV cert ~$400/yr) and complex CI secrets management. For an initial release targeting early adopters (developers comfortable with Gatekeeper bypass), skipping signing is pragmatic. The Gatekeeper/SmartScreen warnings are a known friction point but acceptable for a v1. Signing should be added before any broader distribution push."
    answer: "No code signing initially"
  - question: "Should the Electron app coexist with the CLI daemon or replace it?"
    resolved: true
    options:
      - option: "Coexist independently"
        description: "Electron app and CLI daemon run as separate processes. They share the same ~/.shep/ data directory and SQLite database. Requires handling concurrent SQLite access (WAL mode). Users can choose either interface."
        selected: true
      - option: "Electron replaces daemon"
        description: "When the Electron app is installed, it becomes the only way to run the web UI. CLI commands delegate to the Electron app via IPC. Tighter integration but couples CLI to Electron installation."
        selected: false
    selectionRationale: "The Electron app and CLI are separate distribution channels for different user preferences. They share the same ~/.shep/ data directory and SQLite database. SQLite with WAL mode already supports concurrent readers, and the existing daemon model already handles single-writer semantics. Keeping them independent means users can run either without conflict, and the CLI remains fully functional without Electron installed."
    answer: "Coexist independently"
  - question: "How should Electron-specific service implementations be wired in?"
    resolved: true
    options:
      - option: "Conditional DI registration with environment detection"
        description: "Detect the Electron runtime at DI container initialization time (e.g., checking for process.versions.electron or a bootstrap flag). Register Electron-specific adapters (ElectronDesktopNotifier, ElectronBrowserOpener) only in that context. Default registrations remain unchanged for CLI and web. Zero modifications to existing service implementations."
        selected: true
      - option: "Runtime if/else checks inside existing services"
        description: "Add Electron detection inside existing services (e.g., if (isElectron) { use Electron API } else { existing behavior }). Simpler to implement initially but violates Clean Architecture — infrastructure services become aware of multiple contexts. Harder to test and maintain."
        selected: false
      - option: "Separate container initialization for Electron"
        description: "Create a completely separate initializeElectronContainer() that duplicates the container setup with Electron-specific services. Avoids changing the existing container but introduces duplication and drift risk."
        selected: false
    selectionRationale: "Conditional DI registration is the cleanest approach and follows the existing codebase pattern. The DI container already supports factory-based registration with runtime decisions. Adding an optional 'context' parameter or post-initialization override step lets the Electron bootstrap swap in Electron-specific adapters without touching any existing code. This preserves full backward compatibility — CLI and web see exactly the same container they always have."
    answer: "Conditional DI registration with environment detection"
content: "## Problem Statement\n\nShep currently runs as a CLI tool that spawns a Next.js web UI either in the foreground (`shep ui`) or as a\nbackground daemon (`shep start`). Users must install Node.js >= 22, install the npm package globally, and\ninteract via the terminal. This creates friction for non-CLI-native users and prevents a polished native\ndesktop experience (dock icon, system tray, native notifications, auto-launch on login).\n\nWrapping shep in Electron provides a native desktop app that bundles Node.js, manages its own lifecycle,\nand delivers the web UI in a dedicated BrowserWindow — no terminal required. The app embeds the same\nNext.js server, DI container, and background watchers that the CLI daemon runs, but packages them as a\nsingle installable binary with platform-native UX.\n\n## Backward Compatibility Principle\n\n**This feature MUST NOT change any existing behavior.** The Electron wrapper is a new presentation layer\nthat sits alongside the CLI and web UI. All Electron-specific behavior is injected via the DI container\nat bootstrap time using adapter pattern — never by modifying existing service implementations.\n\nSpecific guarantees:\n- The CLI (`shep` commands) works exactly as before with zero code changes\n- The web UI (`shep ui` / `shep start`) works exactly as before\n- The existing `DesktopNotifier` (node-notifier) is NOT removed or modified — if it's disabled, it stays disabled\n- The existing `BrowserOpenerService` is NOT modified — Electron provides its own adapter\n- The DI container initialization (`initializeContainer()`) remains unchanged for non-Electron contexts\n- No new runtime dependencies are added to the CLI or web packages\n- All Electron-specific code lives exclusively in `packages/electron/`\n- Core services gain port interfaces where needed (e.g., `IDesktopNotifier`, `IBrowserOpener`) but\n  existing concrete implementations are the default — Electron adapters are opt-in overrides\n\n## Success Criteria\n\n- [ ] Electron app launches and displays the shep web UI in a BrowserWindow on macOS, Windows, and Linux\n- [ ] DI container initializes correctly with all services (SQLite, watchers, notifications) in the Electron main process\n- [ ] better-sqlite3 native addon loads without errors in the packaged Electron binary on all three platforms\n- [ ] Background watchers (PR sync, notifications, auto-archive) start on app launch and continue while minimized to tray\n- [ ] System tray icon is visible with context menu (Show Window, Quit) on all three platforms\n- [ ] Closing the main window minimizes to tray instead of quitting the app\n- [ ] Native OS notifications fire via Electron Notification API when notification events occur in Electron context\n- [ ] Existing CLI and web UI continue to work identically — no behavioral regressions\n- [ ] Existing `DesktopNotifier` (node-notifier) is untouched; if disabled in settings, it remains disabled\n- [ ] Electron-specific adapters are registered via DI only when running inside Electron\n- [ ] App checks for updates on launch and shows a notification with download link when a new version is available\n- [ ] Platform-specific installers are produced: .dmg (macOS), .exe NSIS (Windows), .AppImage (Linux)\n- [ ] CI pipeline builds and uploads Electron installers as GitHub Release assets on tagged releases\n- [ ] Electron app coexists with CLI — both can run (not simultaneously) sharing the same ~/.shep/ data directory\n- [ ] App gracefully shuts down on quit: stops web server, closes database connections, cancels watchers\n- [ ] packages/electron/ workspace package exists with its own package.json, tsconfig, and electron-builder config\n- [ ] All existing tests (unit, integration, e2e) pass without modification\n\n## Functional Requirements\n\n### Bootstrap & Lifecycle\n\n- **FR-1**: The Electron main process MUST initialize the DI container (`initializeContainer()`), settings, and all background watchers before creating the BrowserWindow — mirroring the bootstrap sequence of the `_serve` CLI command. The existing `initializeContainer()` function MUST NOT be modified; Electron-specific adapter registration MUST happen as a post-initialization override step.\n- **FR-2**: The Electron main process MUST start the Next.js web server (via `WebServerService`) on a dynamically allocated port and load the resulting URL in a BrowserWindow. The existing `WebServerService` implementation MUST NOT be modified.\n- **FR-3**: The app MUST resolve the bundled Next.js web directory correctly in both development mode (source directory) and production mode (packaged ASAR/resources path). Path resolution logic for Electron MUST live in `packages/electron/`, not in the core `resolveWebDir()` function.\n- **FR-6**: The app MUST perform a graceful shutdown sequence on quit: stop background watchers, stop the web server, close SQLite database connections, then exit.\n\n### System Tray & Window Management\n\n- **FR-4**: The app MUST display a system tray icon on all platforms with a context menu containing at minimum: \"Show Window\" and \"Quit\" actions.\n- **FR-5**: Closing the main window (red X / Cmd+W) MUST minimize the app to the system tray instead of quitting. The Quit action (tray menu or Cmd+Q) MUST fully exit the app.\n- **FR-14**: The app MUST set a proper application name, icon, and metadata (description, copyright) that appear in the OS dock/taskbar, About dialog, and installer.\n\n### Notifications (Backward Compatible)\n\n- **FR-7**: A new `IDesktopNotifier` port interface MUST be created in `packages/core/src/application/ports/`. The existing `DesktopNotifier` class (node-notifier based) MUST implement this interface without any behavioral changes. A new `ElectronDesktopNotifier` adapter MUST be created in `packages/electron/` that uses Electron's native Notification API. The Electron adapter is registered in the DI container ONLY when running inside Electron. When NOT running in Electron, the existing DesktopNotifier remains the default (and remains disabled per current settings). If node-notifier is disabled in user settings, it stays disabled — the Electron adapter provides an independent notification channel.\n- **FR-7a**: The existing `NotificationService` MUST NOT be modified to add Electron awareness. It continues to call whatever `IDesktopNotifier` implementation the DI container provides. In Electron context, that happens to be the Electron adapter; in CLI context, it remains the node-notifier adapter (disabled or not).\n\n### Browser Opener (Backward Compatible)\n\n- **FR-13**: A new `IBrowserOpener` port interface MUST be created. The existing `BrowserOpenerService` MUST implement this interface without behavioral changes. A new `ElectronBrowserOpener` adapter MUST be created in `packages/electron/` that focuses the existing BrowserWindow instead of launching an external browser. The adapter is registered in the DI container ONLY when running inside Electron. CLI and web contexts continue to use the existing `BrowserOpenerService` unchanged.\n\n### IPC & Security\n\n- **FR-12**: The app MUST expose a preload script that bridges any required IPC between the renderer (web UI) and main process (e.g., native notifications, window controls, version info). All IPC MUST go through contextBridge — no nodeIntegration.\n\n### Packaging & Distribution\n\n- **FR-9**: The app MUST rebuild better-sqlite3 against Electron's Node.js ABI during the build process using @electron/rebuild.\n- **FR-10**: The app MUST produce platform-specific installers: .dmg for macOS, NSIS .exe for Windows, and .AppImage for Linux via electron-builder.\n- **FR-11**: The Electron app MUST coexist with the CLI installation — both use the same ~/.shep/ data directory and SQLite database. The app MUST detect if a daemon is already running on the target port and either show an error or connect to the existing server.\n\n### Update Notification\n\n- **FR-8**: The app MUST check GitHub Releases for newer versions on startup and display an in-app notification with a download link when an update is available.\n\n## Non-Functional Requirements\n\n### Performance\n\n- **NFR-1**: Cold start time (app launch to web UI visible) MUST be under 5 seconds on modern hardware (SSD, 8GB RAM). The Next.js server startup is the bottleneck — a loading splash screen MUST be shown while the server initializes.\n- **NFR-2**: Memory usage of the Electron app at idle (web UI loaded, no active features) MUST stay under 300MB RSS. Electron's baseline (~150MB) plus the Next.js server and SQLite should fit within this budget.\n- **NFR-3**: The Electron package MUST NOT exceed 250MB compressed installer size per platform. This includes Electron runtime (~120MB), Node.js, the web UI bundle, and native addons.\n\n### Security\n\n- **NFR-4**: The Electron main process MUST NOT expose Node.js integration to the renderer via `nodeIntegration: true`. All main-process access MUST go through a contextBridge preload script to maintain Electron security best practices.\n\n### Architecture & Backward Compatibility\n\n- **NFR-5**: The Electron package MUST be structured as a pnpm workspace package at `packages/electron/` following the existing monorepo conventions, with its own `package.json` and `tsconfig.json`.\n- **NFR-11**: All Electron-specific code MUST live in `packages/electron/`. No Electron imports, Electron runtime checks, or Electron-conditional logic may be added to `packages/core/` or `src/presentation/web/`. The only changes allowed in core are new port interfaces (e.g., `IDesktopNotifier`, `IBrowserOpener`) that existing implementations adopt without behavioral changes.\n- **NFR-12**: The existing test suites (unit, integration, e2e) MUST pass without any modifications after this feature is implemented. If a test needs updating, it indicates a backward-compatibility violation.\n- **NFR-13**: New port interfaces added to core (IDesktopNotifier, IBrowserOpener) MUST be backward compatible — existing concrete classes implement them with zero behavioral changes. Default DI registration MUST remain the existing implementations.\n\n### Data & Storage\n\n- **NFR-7**: The Electron app MUST handle SQLite database migrations on startup the same way the CLI does — running pending migrations before the web server starts. Database file locking MUST prevent concurrent write access if both CLI and Electron attempt to write simultaneously.\n- **NFR-8**: The app MUST support the existing `~/.shep/` data directory conventions — settings, database, logs, and feature data MUST be read from and written to the same locations the CLI uses.\n- **NFR-9**: The app window MUST remember its position and size across restarts using electron-store or equivalent persistent state, respecting multi-monitor setups.\n\n### CI/CD\n\n- **NFR-6**: The CI build for Electron installers MUST run in parallel with existing CI jobs (lint, test, build) and MUST NOT increase the total CI wall-clock time by more than 10 minutes per platform.\n\n### Offline\n\n- **NFR-10**: The Electron app MUST work without an internet connection for all local functionality (viewing features, browsing history, settings). Network-dependent features (PR sync, update check) MUST degrade gracefully with appropriate UI feedback.\n\n## Product Questions & AI Recommendations\n\n| # | Question | AI Recommendation | Rationale |\n| - | -------- | ----------------- | --------- |\n| 1 | Which packaging tool? | electron-builder | Mature, native module support, built-in auto-update, YAML config |\n| 2 | How to handle notifications? | Conditional adapter via DI | Electron Notification API in Electron context; existing node-notifier untouched; full backward compat |\n| 3 | Auto-update scope? | Manual download with update notification | Full auto-update requires paid code signing certificates |\n| 4 | Package structure? | New workspace at packages/electron/ | Follows existing monorepo conventions |\n| 5 | Platform support? | macOS, Windows, and Linux | Developers use all three; electron-builder handles natively |\n| 6 | System tray? | Yes, with background mode | Watchers need to run continuously like the daemon model |\n| 7 | Code signing? | Skip for initial release | $500+/yr cost; early adopters can bypass OS warnings |\n| 8 | CLI coexistence? | Coexist independently | Separate distribution channels sharing same data directory |\n| 9 | How to wire Electron adapters? | Conditional DI registration | Detect Electron at bootstrap, override adapters; zero changes to existing container |\n\n## Affected Areas\n\n| Area | Impact | Reasoning |\n| ---- | ------ | --------- |\n| New: `packages/electron/` | High | New Electron main process, preload scripts, build config, electron-builder YAML, Electron-specific adapters (ElectronDesktopNotifier, ElectronBrowserOpener) |\n| New: `packages/core/src/application/ports/i-desktop-notifier.ts` | Low | New port interface — existing DesktopNotifier implements it with zero behavioral changes |\n| New: `packages/core/src/application/ports/i-browser-opener.ts` | Low | New port interface — existing BrowserOpenerService implements it with zero behavioral changes |\n| `packages/core/src/infrastructure/services/notifications/desktop-notifier.ts` | Low | Adds `implements IDesktopNotifier` — no logic changes, no behavioral changes |\n| `packages/core/src/infrastructure/services/browser-opener.service.ts` | Low | Adds `implements IBrowserOpener` — no logic changes, no behavioral changes. May need to become DI-injectable (register in container) |\n| `packages/core/src/infrastructure/di/container.ts` | Low | Register default IDesktopNotifier and IBrowserOpener bindings. Add optional override mechanism for Electron context. No changes to existing registrations. |\n| `packages/core/src/infrastructure/persistence/sqlite/` | Medium | better-sqlite3 native addon must be rebuilt for Electron's Node.js ABI (build-time only, no code changes) |\n| `src/presentation/web/next.config.ts` | Low | May need `output: 'standalone'` for optimized Electron bundling |\n| `pnpm-workspace.yaml` | Low | Add `packages/electron` to workspace members |\n| `.github/workflows/ci.yml` | Medium | New job for building Electron installers on macOS, Windows, and Linux runners |\n| `release.config.mjs` | Low | Add Electron installer artifacts to GitHub Release assets |\n| Root `package.json` | Low | New scripts for Electron dev and build commands |\n\n## Dependencies\n\n**Existing code dependencies (consumed, NOT modified):**\n- `initializeContainer()` from `@shepai/core` — bootstraps the entire backend DI container\n- `WebServerService` — manages the Next.js server lifecycle (start/stop)\n- `InitializeSettingsUseCase` — settings initialization on first run\n- `resolveWebDir()` — resolves the Next.js web directory (Electron provides its own wrapper for packaged paths)\n- Notification bus (globalThis singleton) — EventEmitter for notification events\n- `NotificationService` — dispatches notifications to configured channels (unchanged)\n- `DesktopNotifier` — node-notifier wrapper (unchanged, gains interface only)\n- `BrowserOpenerService` — platform-specific browser launch (unchanged, gains interface only)\n- Notification, PR-sync, and auto-archive watcher services — background tasks\n- SQLite migration runner — must execute before web server starts\n\n**New external dependencies (packages/electron/ ONLY):**\n- `electron` (~33.x) — the Electron framework\n- `electron-builder` (~25.x) — packaging and distribution\n- `@electron/rebuild` — rebuilding native addons for Electron's Node.js version\n- `electron-store` — persistent window state (position, size)\n\n**Native addon concerns:**\n- `better-sqlite3` must be compiled against Electron's Node.js headers via @electron/rebuild\n- `node-notifier` is NOT removed, NOT modified, NOT rebuilt for Electron — it stays as-is\n- Platform-specific builds: macOS (.dmg), Windows (.exe NSIS), Linux (.AppImage)\n\n## Size Estimate\n\n**L** — This is a week+ effort. Justification:\n1. New Electron main process with full lifecycle management (app ready, window creation, tray, shutdown)\n2. Native addon rebuilding and cross-platform testing (better-sqlite3 is the critical path)\n3. Embedding Next.js server in Electron main process with correct packaged path resolution\n4. electron-builder configuration for macOS, Windows, and Linux packaging\n5. CI pipeline additions for building and publishing platform-specific installers\n6. System tray implementation with background mode across three platforms\n7. Update notification system (GitHub Releases version check)\n8. New port interfaces (IDesktopNotifier, IBrowserOpener) with Electron adapters\n9. Conditional DI registration mechanism for Electron-specific adapters\n10. Preload script and IPC bridge for secure renderer-main communication\n11. Window state persistence and splash screen during server startup\n12. Backward compatibility verification — all existing tests must pass unchanged\n\n---\n\n_Requirements defined — proceed with research_\n"
