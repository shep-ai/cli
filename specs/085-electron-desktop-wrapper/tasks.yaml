content: |
  ## Summary

  The implementation is organized into 20 tasks across 5 phases, estimated at ~14 hours total.

  **Phase 1 (Foundation)** establishes the workspace scaffold and core port interfaces. The
  packages/electron/ workspace package is created first since all Electron code lives there.
  Two new port interfaces (IDesktopNotifier, IBrowserOpener) are added to core — existing
  implementations adopt them with zero logic changes. BrowserOpenerService gets registered in
  the DI container for the first time, enabling adapter replacement.

  **Phase 2 (Main Process)** builds the runnable Electron shell. The web directory resolver,
  bootstrap module, splash screen, and tray module are developed independently as focused units,
  then composed in main.ts — the Electron entry point that orchestrates the full lifecycle from
  app.ready through window creation to graceful shutdown.

  **Phase 3 (Adapters & IPC)** creates the Electron-specific adapters that differentiate the
  desktop experience from CLI/web. ElectronDesktopNotifier subscribes directly to the notification
  bus for native OS notifications. ElectronBrowserOpener focuses the app window instead of launching
  an external browser. The preload script and IPC handlers provide a secure bridge between the
  renderer and main process. The update checker queries GitHub Releases for version notifications.
  Port conflict detection ensures coexistence with the CLI daemon.

  **Phase 4 (Packaging)** configures electron-builder for cross-platform distribution. Icon assets,
  native module rebuilding (better-sqlite3), ASAR packaging with exclusions, and platform-specific
  installer targets are all configured. A local build verification confirms the packaged app works
  end-to-end before CI integration.

  **Phase 5 (CI & Verification)** adds the Electron build to the CI pipeline as a parallel job
  and runs the full existing test suite to confirm zero backward compatibility regressions. The
  release pipeline is updated to publish Electron installers alongside the npm package.
