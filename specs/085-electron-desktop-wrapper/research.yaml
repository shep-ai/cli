name: "electron-desktop-wrapper"
summary: >
  Technical research for packaging the shep Next.js web UI as a native Electron desktop app.
  Key decisions cover the Electron main-process bootstrap (replicating the _serve/dev-server pattern),
  Next.js integration via custom server on localhost, native module rebuilding for better-sqlite3,
  conditional DI adapter registration for backward-compatible Electron-specific services,
  system tray with background mode, and cross-platform packaging via electron-builder.

